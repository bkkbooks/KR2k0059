下水關臨洮今陜西洮州衛也在松潘之東北江源果發此則又自東北而來與氐道西徼外之岷山相去懸絶為此説者蓋因隋志云岷山在臨洮郡臨洮縣括地志云岷山在岷州溢樂縣見有一水自木塔山來入江者遂以為發源彼中明與漢志相背無稽之言不可從也又錢氏徐霞客傳曰霞客名𢎞祖江陰人平生好逺逰其行也從一奴或一僧一杖二襥被不治裝不裹糧能忍飢數日能遇食即飽能徒步數百里凌絶壁冒叢箐扳援下上懸渡綆汲捷如飛猿健如黃犢嘗過麗江憩點蒼由雞足而西出玉關數千里至崑崙山窮星宿海去中夏三萬四千三百里登半山風吹衣欲墮又數千里至西畨還至峩睂山下託估客以溯江紀源一篇寄余言禹貢岷山導江乃泛濫中國之始非發源也中國入河之水為省五入江之水為省十一計其吐納江倍于河按其發源河自崑崙之北江亦自崑崙之南非江源短而河源長也又辨三龍大勢北龍夾河之北南龍抱江之南中龍中界之特短北龍秪南向半支入中國惟南龍磅礴半宇內其脈亦發于崑崙與金沙江相並南下環滇池以達五嶺龍長則源脈亦長江之所以大于河也其書數萬言皆桑經酈注及漢宋諸儒疏解禹貢所未及余撮其大略如此胡渭曰古書言崑崙者非一處一在槐江山南一在西海之外山海經所言是也一在于關漢武所名之山是也一在吐蕃劉元鼎所稱紫山者是也霞客云河出崑崙之北江出崑崙之南其所謂崑崙者在何地乎據彼言出玉門關數千里至崑崙則崑崙當在西域玉門以東即是中夏之地既云出玉門數千里何又云去中夏四萬三千餘里即所謂星宿海有若是之逺亦屬妄言昔劉元鼎奉使至廓州洪濟梁南行二千三百里便得崑崙東去長安止五千里而都實使還自星宿海東北至崑崙亦不過三十日程何至如霞客所言之逺且西域之崑崙與星宿海絶無交涉萬季野云朵甘思去雲南麗江西北止一千五百里去四川馬湖正西亦止三千里茍欲窮星宿海既至雞足山便當由麗江而往不半月即可達其地舍此不由而更逺走玉門關何也玉門東距肅州之嘉峪關約九百里嘉峪南至麗江約五千里朵甘思去玉門則六七千里矣不走千五百里之近而走六七千里之逺必非人情意者以漢武所名之崑崙即都實所指之崑崙乎夫漢之崑崙在于闐元之崑崙在吐蕃相距可四五千里而霞客乃灘而一之其不學無識一至此乎余謂霞客所言東西南北茫然無辨恐未必身歷其地徒恃其善走大言以欺人耳非但不學無識也錢氏以為能補桑經酈注及漢宋諸儒疏解禹貢所未及過矣或曰僧宗泐云黃河出西番抹必力赤巴山東北流為河源西南流為犛牛河犛牛河即麗水一名金沙江者自麗江府界東北流合若水為瀘水又東北注敘州府而注于江霞客謂江源自崑崙之南殆謂此耳然抹必力赤巴非崑崙也且岷山導江經有明文其可以麗水為正源乎霞客不足道傳者一代巨公文采炫耀最易動人故吾特為之辨江水又東徑上明城北上明城今在松滋縣界晉太元中苻堅之冦荆州也刺史桓沖徙渡江南使劉波築之移州治城也其地夷敞北據太江江沱枝分東入大江縣治洲上故以枝江為稱地理志曰江沱出西南東入江是也按漢志蜀郡郫縣下云禹貢江沱在西東入江此云出西南南字當屬衍文其民古羅徙羅故居宜城西山楚文王又徙之于長沙今羅縣是矣縣西三里有津鄉津鄉里名也春秋莊公十九年巴人伐楚楚子禦之大敗于津鄉應劭曰南郡江陵有津鄉今則無聞矣江陵今屬荆州津鄉即其縣地郭仲産云尋楚禦巴人枝江是其塗便此津鄉𢎞即其地也朱云津鄉𢎞吳琯改作津鄉縣𢎞字固誤然改作縣亦恐無據或當作似即其地也盛𢎞之曰縣舊治沮中後移出百里洲百里洲在今枝江縣東北六十里西去郡一百六十里縣左右有數十洲槃布州中胡氏引作其中一作江中朱本作洲中其百里洲最為大也中桑田甘果映江依洲自縣西至上明東及江津其中有九十九洲楚諺云洲下石故不出王者此句有誤疑或作洲滿百王者出桓元有問鼎之志乃漕一洲以充百數潛號數旬宗滅身屠及其傾敗洲亦消毁今上在西忽有一洲自生沙流回薄成不淹時其後未幾龍飛江漢矣朱云此今上是盛𢎞之荆州記中語謂宋文帝自鎮西將軍宜都王入繼武帝於江陵隋志云盛𢎞之是宋臨川王侍郎撰荆州記三卷縣東二里有縣人劉凝之故宅凝之字志安兄盛公髙尚不仕凝之慕老萊嚴子陵之為人立屋江湖非力不食妻梁州刺史郭全女宋書本傳作郭銓女亦能安貧宋元嘉中夫妻隱于衡山終焉不返矣縣東北十里土臺北岸有迤洲長十餘里義熙初武陵王斬桓謙處宋書武帝紀桓元既敗挾天子走江陵冠軍將軍劉毅等親率諸軍進討髙祖奉武陵王遵為大將軍承制大赦天下惟桓氏不在赦例及元誅後元從子振聚黨數千人襲陷江陵城桓謙亦聚衆以應義熙元年劉毅等至江津破桓謙桓振江陵平縣東南二十里富城洲上有道士范儕精廬自言巴東人少遊荆土而多盤桓縣界惡衣粗食蕭散自得言來事多驗而辭不可詳人心欲見􅗄然而對貌言尋求終弗遇也雖徑跨諸洲而舟人未嘗見其濟涉也後東遊廣陵卒於彼土儕本疑作作在洲無定止處宿憩一小菴而已弟子慕之於其昔遊其立精舍以存其人縣有陳留王子香廟頌疑訛或屬衍文子香於漢和帝之時出為荆州刺史有惠政天子徵之道卒枝江亭中常有三白虎出入人間送喪踰境百姓追美甘棠以永元十八年立廟設祠刻石銘德號曰枝江白虎王君其子孫世令世下疑有脫文令當是今猶謂之白虎王江水又東會沮口楚昭所謂江漢沮漳楚之望也又南過江陵縣南縣江有洲號曰枚回洲枚回洲在江陵縣西南六十里寰宇記引荆州圖曰百里洲其上寬廣土沃人豐洲首派别南為外江北為內江江水自此兩分而為南北江也北江有故鄉洲元興之末桓元西奔毛祐之與參軍費恬射元於此洲元子升年六嵗輒拔去之王昭之云元之初奔也經日不得食左右進粗粥咽不下升抱元胸撫之元悲不自勝至此益州都護馮遷斬元於此洲斬升於江陵矣宋書武帝紀桓元西走征虜將軍益州刺史毛璩遣從孫祐之與參軍費恬送弟喪璩弟子修之時為元屯騎校尉誘元入蜀至枚回洲恬與祐之迎射之益州都護馮遷斬元首傳京師又斬元子升於江陵市下有龍洲洲東有寵洲二洲之間世擅多魚矣漁者投罟歷宋本作揮網往往繼絶宋本作維絶有潛客泳而視之見水下有兩石牛嘗為罾害矣故漁者莫不擊浪浮舟鼓柂而去矣其下謂之邴里洲洲有髙沙湖湖東北有小水通江名曰曽口江水又東徑燕尾洲此合靈溪水水無泉源上承散水合成大溪南流注江江水之會有靈溪戍背阿面江西帶靈溪故戍得其名矣江水東得馬牧口江水斷洲通會江水又東徑江陵縣故城南江陵故城即今荆府治江水自牧回洲分流至此復合𫝑益大禹貢荆及衡陽惟荆州蓋即荆山之稱而制州名矣故楚也子革曰我先君僻處荆山以供王事遂遷紀郢今城楚船官地也春秋之渚宫矣秦昭襄王二十九年使白起拔鄢郢以漢南地而置南郡焉周書曰南國名也南氏有二臣力鈞勢敵競進爭權君弗能制南氏用分為二南國也朱云出周書史記解按韓嬰敘詩云其地在南郡南陽之間吕氏春秋所謂禹自塗山南省南土者也是郡取名焉景帝以為臨江王榮國王坐侵廟垣地為宫被徵升車出北門而軸折父老竊流涕曰吾王不還矣自後北門不開蓋由榮非理終也漢景帝二年改為江陵縣王莽更名南順縣曰江陵按漢志莽改郡曰南順縣曰江陸今更下漏郡字陸訛作陵舊城關羽所築羽北圍曹仁吕蒙襲而據之羽曰此城吾所築不可攻也乃引而退杜元凱之攻江陵也城上人以瓠繫狗頸示之元凱病癭故也及城陷殺城中老小血流沾足論者以此薄之江陵城地東南傾故緣以金隄自靈溪始桓溫令陳遵造遵善於防攻朱云防攻當作方功謂以方土計功也使人打鼓逺聽之知地勢髙下依傍創築略無差矣城西有栖霞樓俯臨通隍吐納江流城南有馬牧城西側馬徑此洲始自枚回下迄於此長七十餘里洲上有奉城故江津長所治舊主度州郡貢於洛陽因謂之奉城亦謂之江津戍也戍南對馬頭岸昔陸抗屯此與羊祐相對大𢎞信義談者以為華元子反復見於今矣北對大岸謂之江津口故洲亦取名焉江大自此始也家語曰江水至江津非方舟避風不可涉也故郭景純云濟江津以起漲言其深廣也江水又東徑郢城南郢漢志曰楚别邑今為鄖陽府鄖西縣故城在今江陵縣東北三里子囊遺言所築城也地理志曰楚别邑故郢矣王莽以為郢亭城中有趙臺卿冢岐平生自所營也冢圖賔主之容用存情好敘其宿尚矣江水又東得豫章口夏水所通也西北有豫章岡蓋因岡而得名矣或言因楚王豫章臺名所未詳也水經注集釋訂訛卷三十四
