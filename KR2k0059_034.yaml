body:
  text: 水經注集釋訂訛卷三十四歸安沈炳巽撰江水二江水又東徑巫縣故城南縣故楚之巫郡也秦省郡立縣以𨽻南郡吳孫休分為建平郡治巫城城緣山為墉周十二里一百一十步東西北三面皆帶傍深谷南臨大江故謂之夔國也江水又東巫溪水注之溪水道源梁州晉興郡之宣漢縣東宣漢縣今為夔州府達縣又南徑建平郡泰昌縣南今為夔州府大昌縣又徑北井縣西北井廢縣在大寧縣境晉置屬建平郡後周省入大昌東轉歷其縣北井南有鹽井井在縣北故縣名北井建平一郡之所資也鹽水下通巫溪溪水是兼鹽水之稱矣溪水又南屈徑巫縣東縣之東北三百步有聖泉謂之孔子泉明一統志聖泉在巫山縣治東宋王十朋集縣有孔子泉泉之傍雖童子皆能書其水飛清潔飛上下疑有脫字石穴並髙泉下注溪水溪水又南入于大江江水又東徑巫峽在今巫山縣東三十里三峽之一即巫也連山七百里略無斷處圖經云此山當抗峯岷峨偕嶺衡嶽凝結翼附並出青雲杜宇所鑿以通江水也郭仲産云按地理志巫山在縣西南而今縣東有巫山將郡縣居治無恆故也江水歷峽東徑新崩灘此山漢和帝永元十三年崩按後漢書五行志和帝永元十二年閏四月南郡秭歸山髙四百丈崩填溪即此山也今云十三年誤晉太元二年又崩當崩之日水逆流百餘里湧起數十丈今灘上有石或圓如菌或方如屋若此者甚衆皆崩崖所隕致怒湍流故謂之新崩灘其頽巖所餘比之諸嶺尚為竦桀其下十餘里有大巫山非惟三峽所無乃當抗峯岷峩偕嶺衡疑其翼附羣山並槩青雲更就霄漢辨其優劣耳神血塗山海經作孟塗下同所處山海經曰夏后啓之臣曰血塗是司神于巴巴人訟于血塗之所其衣有血者執之是謂山海經作請生居山上郭景純疑漏曰字在丹山西丹山在丹陽屬巴丹山西即巫山者也按山海經在丹山西以下皆屬經文然相其文義疑是景純之注水經注不誤也但據此景純下當有曰字方為得耳又帝女居焉宋玉所謂天帝之季女名曰瑶姫未行而亡封於巫山之臺精魂為草實為靈芝所謂巫山之女髙唐之姫旦為行雲暮為行雨朝朝暮暮陽臺之下旦早視之果如其言故為立廟號朝雲焉其間首尾一百六十里謂之巫峽蓋因山為名也自三峽七百里中兩岸連山略無闕處重巖疊嶂隱蔽天日自非亭午夜分不見曦月至于夏水襄陵沿泝阻絶王命急宣有時朝發白帝暮到江陵其間千二百里雖乘奔御風不以疾也春冬之時則素湍渌潭回清倒景絶巘多生柳柏懸泉瀑布飛潄其間清榮峻茂良多趣味每至晴初霜旦林寒澗肅常有髙猿長嘯屢引淒異荆州記作屬引清逺空谷傳響哀轉久絶故漁者歌曰巴東三峽巫峽長猿鳴三聲淚沾裳荆州記巫峽首尾一百六十里錢謙益箋杜詩云舊云自三峽取蜀數千里恆是一山此蓋好大之言也惟三峽七百里中兩岸連山略無闕處梁簡文帝蜀道難詩峽山七百里巴水三回曲杜詩所謂峽開四千里蓋統論江山之大勢非専指言峽山也江水又東徑石門灘灘北岸有山山上合下開洞達東西緣江步路所由劉備為陸遜所破是徑此門一作走徑此門追者甚急備乃燒斷鎧道孫桓為遜前驅奮不顧命斬上夔道吳志孫桓傳作斬上兜道截其要境備踰山越險僅乃得免忿恚而歎曰吾昔至京桓尚小兒而今迫孤乃至于此遂發憤而薨矣又東過秭歸縣之南縣故歸鄉地理志曰歸子國也樂緯曰昔歸典協聲律宋志曰歸即夔歸鄉即夔鄉矣按宋書州郡志歸鄉故屬秭歸吳分按太康地志云秭歸有歸鄉故夔子國並無歸即夔夔鄉即歸鄉之文且諸字書亦無歸即夔之音不知酈注何據而云然耶古楚之嫡嗣有熊摯者以廢疾不得立而居于夔為楚附庸後王命為夔子春秋僖公二十六年楚以其不祀滅之者也袁嵩曰屈原有賢姊聞原放逐亦來歸喻令自寬全鄉人冀其見從因名曰秭歸即離騷所謂女嬃嬋媛以詈余也縣東城北依山即阪周回二里髙一丈五尺南臨大江古老相傳謂之劉備城蓋備征吳所築也在今歸州縣東北數十里有屈原舊田宅雖畦堰靡漫猶保屈田之稱也明一統志屈原宅在歸州北六十里今其地名樂平宅其東北六十里有原姊女嬃廟縣北一百六十里有屈原故宅纍石為屋基名其地曰樂平里宅之東北六十里有女嬃廟搗衣石猶存故宜都記曰秭歸蓋楚子熊繹之始國而屈原之鄉里也原田宅于今具存指謂此也江水又東徑城北其城憑嶺作固二百一十步夾溪臨谷據山枕江北對丹陽城今歸州治即秭歸故城丹陽城在州之東城據山跨阜周八里二百八十步東北兩面悉臨絶澗西帶亭下溪南枕大江嶮峭壁立信天固也楚子楚衍字熊繹丹陽之所都也地理志以為吳子之丹陽何氏云子字衍陽當作楊論者云尋吳楚悠隔繿縷荆山無容逺在吳境是為非也又楚子先王陵墓在其間蓋為徵矣江水又東南徑夔城南在今歸州東二十里跨據山阜周回一里百一十八步西北皆枕深谷東帶鄉溪南側大江城內西北角有金城東北角有員土獄西南角有石井口徑五尺熊摯始治巫城後疾移此蓋夔徙也春秋左傳僖公二十六年楚令尹子玉滅夔者也服虔曰在巫之陽秭歸歸鄉矣江水又東徑歸鄉縣故城北今為荆州府巴東縣故城在歸州東南大江南岸袁嵩曰父老傳言原既流放忽然暫歸鄉人喜悅因名曰歸鄉抑其山秀水清故出俊異地􅕑流疾故其性亦隘詩云維嶽降神生甫及申信與余謂袁嵩此言可謂因事而立證恐非名縣之本旨矣縣城南面重嶺北背大江東帶鄉口溪前作鄉溪此作鄉口溪非前漏口字則此多口字溪源出縣東南數百里西北入縣徑狗峽西峽崖龕中石隱起有狗形形狀具足故以狗名峽明一統志白狗峽在歸州東一十五里兩岸如削白石隱起狀如狗唐杜甫詩云白狗斜臨北黃牛更在東鄉口溪又西北徑縣下入江謂之鄉口也江水又東徑信陵縣南今歸州東有信陵廢縣臨大江東傍深溪溪源北發梁州上庸縣界南流徑縣下而注於大江也江水又東過夷陵縣南江水自建平至東界峽盛𢎞之謂空舲峽峽甚髙峻即宜都建平二郡界也在歸州東三十里一作空舲峽言夏秋水泛必空舲乃可上自歸州至長陽四百里內峽水崩流石磧險惡唐杜甫詩云峽中丈夫絶輕死少在公門多在水富豪有錢駕大舸貧窮取給行艓子朝發白帝暮江陵最頃來目擊信有徴瞿塘漫天虎鬚怒歸州長年行能其間逺望嶺表有五六峯參差互出上有竒石如二人像攘袂相對俗傳兩郡督郵爭界於此宜都督郵厥勢小東傾議者以為不如也江水歷峽東徑宜昌縣今為宜都縣之埵竈下埵洽聞記作插按説文埵丁果反堅土也與注中所言文義似不相蒙當從洽聞記作插為是江之左岸絶岸壁立數百丈飛鳥所不能棲有一火爐埵在巖間朱本作火燼插在崖間望見可長數尺父老傳言昔洪水之時人薄舟崖側以餘燼插之崖側至今猶存故先後相承謂之埵竈也洽聞記曰空舲峽絶壁上有一火燼長數尺名曰插竈相傳堯時洪水行者泊舟崖側炊爨以餘燼插之至今猶存云云蓋亦據此注耳江水又東徑流頭灘在今夷陵州界其水並浚急奔暴魚鱉所不能遊行者常苦之其歌曰灘頭白勃堅相持倐忽淪沒别無期袁嵩曰自蜀至此五千餘里下水五日上水百日也江水又東徑宜昌縣北今夷陵州西有宜昌故城分夷道佷山所立也縣治江之南岸北枕大江與夷陵對界宜都記曰渡流頭灘十里便得宜昌縣也江水又東徑狼尾灘而歷人灘袁嵩曰二灘相去二里人灘水至峻峭南岸有青石夏沒冬出其石嶔崟廣韻嶔去金切音欽崟魚金切音吟玉篇嶔崟山勢聳立貌説文凡地髙險者曰崟數十步中悉作人面形或大或小其分明者鬚髮皆具因名曰人灘也江水又東徑黃牛山即黃牛峽在今夷陵州西九十里大江南下有灘名曰黃牛灘南岸重嶺疊起最外髙崖間有石如人負刀牽牛人黑牛黃成就分明既人迹所絶莫得究焉此巖既髙加江湍紆回雖途徑信宿猶望見此物故行者謠曰朝發黃牛暮宿黃牛言水路紆深回望如一矣江水又東徑西陵峽在今夷陵州西北二十里宜都記曰自黃牛灘東入西陵界至峽口一百許里山水紆曲而兩岸髙山重嶂非日中夜半不見日月絶壁或千許丈其石彩色形容多所像類林木髙茂略盡冬春猿鳴至清山谷傳響泠泠不絶所謂三峽此其一也嵩言嘗聞峽中水疾書記及口傳悉以臨懼相戒曽無稱有山水之美也及余來踐躋此意疑當作境既至欣然始信之耳聞不如親見矣其疊崿秀峯竒構異形固難以辭敘林木蕭森離離蔚蔚乃在霞氣之表仰矚俯映彌習彌佳原本漏從朱本增流連信宿不覺忘返目所履歷未嘗有也既自欣得此竒觀山水有靈亦當驚知巳於千古矣江水歷禹斷江今夷陵州西南有斷江山南峽北有此胡引及朱本俱作北谷村兩山間有水清深潭而不流又耆舊傳言昔是大江及禹治水此江小不足㵼水禹更開今峽口水勢并衝此江遂絶於今謂之斷江也江水出峽東南流徑故城洲今夷陵州治原本訛城固州洲附岸北洲頭曰郭洲長二里廣一里上有步闡故城方圓稱洲周回略滿故城洲上城周疑漏三五等字里吳西陵督步隲之所築也孫皓鳯凰元年隲息闡復為西陵督據此城降晉遣太傅羊祐接援未至為陸抗所陷也吳志步隲傳隲封西陵侯子協嗣協卒弟闡繼業為西陵侯鳯凰元年召為繞帳督闡纍世在西陵卒被徴命自以失職又懼有讒禍於是據城降晉晉以闡為都督西陵將軍事加侍中假節命車騎將軍羊祐往赴救闡吳遣陸抗西行祐等遁退抗陷城斬闡江水又東徑故城北故城在今夷陵州東南大江南岸所謂陸抗城也城即山為墉四面大險江南岸有山孤秀從江中仰望壁立峻絶袁嵩為郡常登之矚望焉故其記云今自山南上至其嶺嶺容十許人四面望諸山略盡其勢俯臨大江如縈帶焉視舟如鳬雁矣北對夷陵縣之故城城南臨大江秦令白起伐楚三戰而燒夷陵者也應劭曰夷山在西北蓋因山以名縣也王莽改曰居利吳黃武元年更名西陵也後復為夷陵縣北三十里有石穴名白馬穿嘗有白馬出穴食朱云食下當有米麥等字乃成文理白帖引荆州記正同但云昔有馬從穴出復還入潛行乃出漢中人逐之入穴潛行出漢中漢中人失馬亦嘗出此穴相去數千里袁嵩言江北多連山登諸望江南諸山數十百重莫識其名髙者千仞多竒形異勢自非煙褰雨霽不辨見此逺山矣余嘗往返十許過正可再見逺峯耳江水又東徑白鹿巖沿江有峻壁百餘丈猿所不能遊有一白鹿陵峭登崖乘巖而上故世名此岩為白鹿云江水又東歷荆門虎牙之間按夷陵新志云虎牙在州東五十里磯石大小蹲踞隱見正如虎牙戟列舟人望而避之乃由荆門而上是虎牙更險於荆門也明一統志荆門山在宜都西北五十里與虎牙山相對在大江南岸虎牙山在大江北岸昔公孫述遣將依二山作浮橋以拒漢師下有虎牙灘最險惡今荆門州亦有荆門虎牙二山荆門在南上合下開暗徹山南有門象虎牙在北石壁色紅間有白文類牙形並以物象受名此三三疑當作二山楚之西塞何氏云羅隱西塞山詩注云在武昌縣吳以之為西塞則西塞之名自吳始也然隱所指在武昌界乃道士磯非荆門虎牙也也水勢急峻故郭景純江賦曰虎牙桀竪以屹崒荆門鬭當作闕竦而磐礴圓淵九回以懸騰湓流雷詬而雷激者也按郭景純江賦云荆門闕竦而盤薄圓淵九回以懸騰湓流雷詬而電激漢建武十一年公孫述遣其大司徒任滿翼江王田戎將兵數萬人據嶮為浮橋橫江以絶水路營壘