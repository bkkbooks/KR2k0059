body:
  text: 水經注集釋訂訛地理類四河渠之屬提要臣等謹案水經注集釋訂訛四十卷國朝沈炳巽撰炳巽字繹旃歸安人其書據明嘉靖間黃省曽所刋水經注本而以己意校定之多所釐正又以道元徵引之書極為博贍傳寫既久訛誤相仍因遍檢史記漢書志表及諸史各志取其文異同者録於下方以備參考其無他書可校者則闕之間附以諸家考訂之說凡州縣沿革則悉以今名釋焉中間於地理方位往往有不能詳審而漫為臆度者如漳水注稱絳瀆徑九門城南又東南徑南宫城北炳巽釋云九門城在今藁城縣西北二十里而不知一在滹沱之南一在滹沱之北中隔新河寧晉束鹿晉州相去甚逺水經沁水過穀逺縣東又南過崎氏縣東此崎氏在潞安府屯留縣西南即北魏之寄氏崎訛作猗而炳巽釋云今屬平陽府則不知漢志有上黨之崎氏非即河東之猗氏他若河水過髙唐縣南道元言河水於縣漯水注之此下有地理志曰漯水出東武陽今漯水上承河水於武陽縣東南西北徑武陽新城東云云炳巽以其重見於前刪此存彼不知下文水自城東北徑東武陽縣故城南所謂自城者承武陽新城言也使如所刪則自城直接髙唐不可通矣此類皆為舛誤然炳巽作此書凡歷九年而成丹鉛矻矻手自㸃定其初未見朱謀㙔本後求得之而所見大略相同亦可知其用心之勤至雖不能盡出前人範圍而鈎索考證之功實未可沒也乾隆四十三年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀水經注集釋訂訛原序余少時讀水經注服其真能讀萬卷書行盡天下山水路而所成文章又復鈎采羣書造語選辭句斤字削於經史子集中别開面目若天地間不可無一不容有二者然其中間多棘吻刺舌每至不能句讀往往置之後得蜀中朱無易水經注箋見其徴引載籍駮正脫誤厥功良多然所定者祇及什之二三譬疾醫治疾療其半而未起其全難語於身之康强也己巳冬家繹旃貢士過豫草堂出集釋訂訛一書索豫草序讀之見有釐簡編之錯雜者有正援据之未的者有一名類之互異者有改字畫之舛謬者有補考索之缺略者大約本之六經參之史記班范以下諸史采之近代名家鈎纂以為依據至本文既誤又無他書可校者不敢師心自用而仍從闕如其用心也專其用力也勤其積嵗月也多視茍焉著書而急急以取名者不可以同年而語也已憶豫奉敕校舊唐書其錯簡訛字不可勝數至思維斷絶因徴之通鑑綱目與三通英華文粹等書以對勘取裁而後稍復原文之舊既得君家東甫唐書合鈔見其正訛審闕并有豫用意所未到者悉采入每卷考證中於此見校讐之難而君家兄弟之矻矻於古書者一有功於有唐一有功於地利並足增我家之光而今兹之序其緣起者又能易嚮時之沈悶而了然於心目也抑古來著書之家如郭璞郭象裴駰劉昭顔師古之徒不獨注釋皆能自為一書以行於世然其文代𫝊完好獨道元所成久將淪沒至楊用修始有刻本而去其諸家小注又詭竒自喜轉取踳駮不易解者以為生新是彰之而適以紊之也得繹旃之好學深思虛心順理以訂正之是不獨還酈氏之舊物并可為桑氏之功臣也夫乾隆十五年嵗次庚午七月望日長洲沈德潛撰凡例一是書宋本既不可得今世所行惟明嘉靖間黃氏刋本其他如朱鬱儀鍾伯敬及休寧吳氏諸本亦僅或有之余家所藏止黃氏一本其間篇簡脫漏文字踳駮魯魚甚衆亥豕益訛或首尾顛躓而不聨或句讀轉易而不記是以讀者不能通其義余酷好是書而苦於句讀每遇不可解處輒廢書長歎又無他本可以校讐止憑腹笥臆改積數年之功稍稍可以寓目後得朱氏注箋見其㸃定之處大較與余所改略同南潯董訥夫以為朱氏已詳而此復出似宜節去此非僕之復出亦非敢掠取朱氏已成之論攘為已有實緣校改在前得書在後已積數年之功不忍輕棄故兩存之然朱氏雖經修改尚多闕疑違意其條綱紊亂㫖趣乖違者亦復不少巽不揣固陋討尋校勘訛者譯之散者聚之亡者追之俾斷者仍續闕者復補惟古今字有通用稍存之凡改正共一萬闕千闕百闕十字校改訛謬闕百闕十闕條一經文之錯誤者如河水積石一山錯簡在渤海之下葱嶺之上霸水之雜入渭水沔水之中篇錯簡在下篇千年以來無人較正致後來人彈射并其全經而疑之德清胡渭朏明起而正之可以開千載之疑誠有功於是書不淺但胡氏止校正于禹貢錐指之中而閲是書者未能悉知故從胡氏校定之本撮録一道元博覽羣書掇其精華以注水經誠從來所未有但注中所引頗多訛誤雖或𫝊聞異辭然經史具在可以覆校唐宋元明以來諸家撰序大約俱藉以考水道之源流稽山川之古迹其于引用訛誤處概未校正朱本雖略加考訂然亦僅得十中一二巽不揣固陋詳加鈎索如某水之闕條闕注之闕事與原文大異者悉取原書附於本文之下至封建之先後地名之互異尤屬最多則取史記兩漢志表及諸史各志詳加查改若本文既誤而無他書可校者仍闕疑焉一郡邑沿革廢置不常或古有而今無或名同而地異或始分而今合或今合而古離種種不一若不考据精詳則讀者茫然不知為何地矣今以明統志為凖博採輿地諸書參之禹貢錐指細加注明至諸水經行之地亦從錐指採録若憲皇帝時升州為府及分縣為二之各州縣俱未及注出緣脫稿在前難于改注也一崑山顧寧人長洲何義門兩先生俱于是書各有考訂顧氏大約採之于日知録亭林集二書何氏則從其後人假先生手批之本採入先兄東甫亦曽究心於此後緣從事于新舊兩唐書故不暇旁及間有一二條亦為採入一是書經始于雍正三年脫稿於雍正九年其考索鈎纂雖屬炳巽一人而助余不逮者季弟勞山與有力焉至于抄録成書則族弟霞綺一人手筆故得附書
