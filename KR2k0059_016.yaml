body:
  text: 水經注集釋訂訛卷十六歸安沈炳巽撰穀水甘水漆水滻水沮水穀水出𢎞農黽池縣南今屬河南府墦冢林穀陽谷穀水在永寧縣北七十里山海經曰傅山之西有林焉曰墦冢穀水出焉東流注于洛其中多珉玉山海經作珚玉今穀水出于崤東馬頭山穀陽谷東北流歷黽池川本中鄉地也漢景帝三年按漢書地理志景帝中二年初城徙萬家為縣初城徙萬户為縣因崤黽之池以目縣焉亦或謂之彭池故徐廣史記音義曰黽或作彭穀水處也穀水又東徑秦趙二城南司馬彪續漢書曰赤睂從黽池自利陽南欲赴宜陽者也世謂之俱利城耆諺曰昔秦趙之會各據一城秦王使趙王鼓瑟藺相如令秦王擊缶處也馮異又破赤睂于是川矣故光武璽書曰始雖垂翅回溪終能奮翼黽池可謂失之東嵎收之桑榆矣穀水又東徑土崤北孫云土崤土字疑誤蓋有東西二崤此或作西崤也所謂三崤也穀水又東左會北溪溪水北出黽池山東南流注于穀疑即孔安國所謂澗水也穀水又東徑新安縣故城南括地志云新安故城在今黽池縣東十二里北夾流而西接崤黽昔項羽西入秦坑降卒二十萬于此國滅身亡宜矣穀水又東徑千秋亭南其亭纍石為垣世謂之城也潘嶽西征賦曰亭有千秋之號子無七旬之期謂是亭也又東徑于雍谷溪回岫縈紆石路阻峽故亦有峽石之稱矣晉大上下疑有訛字脫文歷側左與北川水合水有二源並導北山東南流合成一水自乾注巽入于穀穀水又東徑缺門山山阜之不接者里餘故得是名矣二壁爭髙斗聳相亂西瞻雙阜右望始低一本作如砥穀水自疑漏缺字門而東廣陽川注之水出廣陽北山東南流注于穀南望微山雲峯相亂穀水又徑白超壘南戴延之西征記云次至白超壘去函谷十五里築壘當大道左右有山夾至孫云當作壘相去百餘步從中出北乃故關城非所謂白超壘也是壘在缺門東一十五里壘側舊有塢故治官所在魏晉之日引穀水為水治水治字疑訛以經國用遺迹尚有當作存穀水又東石默溪水出微山東麓石默溪東北流入于穀穀水又東宋水北流注于穀穀水又東徑魏將作大匠母丘興盛魏志母丘儉父名興今云興盛誤墓南二碑存焉儉父也管輅别傳曰輅嘗隨軍西征過其墓而嘆謂士友曰玄武藏頭青龍無足白虎衝尸魏志作白虎銜尸朱雀悲哭四危已備法應滅族果如其言穀水又東徑函谷關南東北流皂澗水注之水出新安縣東南流經母丘興盛墓東又南徑函谷關西關髙嶮峽路出㕓郭漢元鼎三年樓船將軍楊僕數有大功恥居關外請以家僮七百人築塞徙關于新安即此處也昔郭丹西入關感慨于其下曰不乘駟馬髙車終不出此關也去家十二年果如志焉後漢書郭丹傳丹字少卿南陽人也從師長安買符入函谷關乃慨然嘆曰丹不乘使者車終不出關更始二年三公舉丹賢良徵為諫議大夫持節使歸南陽丹自去家十有二年果乘髙車出關如其志焉皂澗水又東流入于穀穀水又東北徑函谷關城東右合桑爽之水山海經曰白石山西五十里曰穀山其上多穀其下多桑爽之水出焉朱鬱儀據今本山海經以為桑爽二字不得相連愚意以為其誤不在酈注而在山海經經于多下脫去金玉等字遂將桑字連上讀爽下復漏之字遂謂不得相連幸有酈注連引二句可以駮正今反疑酈注之誤似乎失考世謂之紵麻澗北流注于穀山海經曰按山海經其中多碧緑句原接上北流注于穀此山海經曰四字當刪碧下漏緑字其中多碧穀水又東澗水注之山海經曰婁涿山西四十里曰白石之山澗水出焉北流注于穀自下通謂之澗水為穀水之兼稱焉故尚書曰伊洛瀍澗既入于河而無穀水之目是名亦通稱矣劉澄之云新安有澗水源出縣北又有淵水未知其源余考諸地記並無淵水但淵澗字相似時有字錯為淵也故闞駰地理志曰禹貢之淵水是以知傳寫書誤字謬舛真證疑作澄之不思所致耳既無斯水何源之可求乎穀水又東波水注之山海經曰瞻諸山西三十里婁涿之山無草木多金玉波山海經作陂水出于其陰世謂之百答水北流注于穀其中多芘石文石穀水又東少水注之山海經曰廆山西三十里曰瞻諸之山其陽多金其陰多文石少水出于其陰控引衆溪積以成川東流注于穀世謂之慈澗也今在新安縣東三十里穀水又東俞隨之水注之山海經曰平蓬山西十里廆山按山海經平蓬之山西十里曰縞羝之山又西十里曰廆山此云十里誤當作二十里其陰多㻬琈之玉俞隨之水出于其陰北流注于穀世謂之孝水也潘嶽西征賦曰澡孝水以濯纓嘉美名之在兹是水在河南城西十餘里在今府城西南三十里故吕忱曰孝水在河南而戴延之言在函谷關西劉澄之又云出擅山擅山在宜陽縣西在穀水南無南入之理考尋兹説當承緣生述征謬志耳緣生從戍行旅征途訊訪既非舊土故無所究今川瀾北注澄映泥濘得言枯涸也宋本作何得言枯涸也皆為疏僻矣東北過穀城縣北城西臨穀水故縣取名焉穀水又東徑穀城南不歷其北又東徑洛水枝流入焉今無水也又東過河南縣北東南入于洛河南城西北穀水之右有石磧磧南出為死穀北出為湖溝魏太和七年暴水流髙三丈此地下停流以成湖渚造溝以通水東西十里決湖以注瀍水穀水又徑河南王城北所謂成周矣公羊曰成周者何東周也何休曰名為成周者周道始成王所都也地理志曰河南河南縣故郟鄏地也京相璠曰郟山名鄏地邑也卜年定鼎為王之東都謂之新邑是為王城其城東南名曰鼎門蓋九鼎所從入也故謂是地為鼎中楚子伐陸渾之戎問鼎于此述征記曰穀洛二水本于王城東北合流所謂穀洛鬭也今城之東南缺千步世又謂之穀洛鬭處俱為非也余按史傳周靈王之時穀洛二水鬭毁王宫王將堨之太子晉諫王不聽遺堰三堤尚存左傳襄公二十五年齊人城郟穆叔如周賀韋昭曰洛水在王城南穀水在王城北東入于瀍至靈王時穀水盛出于王城西而南流合于洛兩水相格有似于鬭而毁王城西南也穎客之著春秋條例客當作容隋書經籍志漢公車徵士穎容著春秋釋例十卷言西城梁門枯水處世謂之死穀是也始知緣生行中造次入關經究故事與實違矣禹貢錐指曰澗穀二源至新安東而合流自下得通稱古謂之澗周室東遷謂之穀而澗之名遂晦周語靈王二十二年穀洛鬭將毁王宫王欲壅之太子晉諫曰不可引共工伯鯀之言為戒王弗聽卒壅之韋昭注云鬭者兩水相格有似于鬭洛在王城之南穀在王城之北東入于瀍至靈王時穀水盛出于王城之西而南流合于洛水毁王城西南將及王宫故齊人城郟壅之者壅防穀水使北出也郭緣生述征記曰穀洛二水本于王城東北合流所謂穀洛鬭也今城之東南缺千步世又謂之穀洛鬭處酈道元引韋昭語以折緣生之謬愚謂郭固失之而韋亦未為得也穀水出王城之西而南合于洛水者其故道也靈王時偶值暴水大至兩川相觸如格鬭然故謂之鬭非穀水本由城北入瀍而今忽改道由城西而入洛也使穀水本由城北而東入于瀍則洛誥何以指王城為澗水東耶且使穀水故道果在城北則靈王壅之使北出是為復禹之迹太子晉亦何為引共鯀防川之害以戒王哉此理甚明不待多辨道元言靈王壅穀其遺堰三堤尚存今亦不可得詳竊意此三堤者皆在王城之西北當時堰穀水使出于城北與瀍水會折而南歷城東至千金堨處又南入洛此蓋自靈王以迄西漢穀水會洛之故道也何以知之以東漢作堨于河南城東十五里知之也使穀水不由此入洛堨何為在此乎道元云河南城西北穀水之右有石磧磧南出為死穀穎容春秋條例言西城梁門枯水處世謂之死穀是也死穀云者以其有瀆而無水即靈王壅穀後城西所存之枯渠矣方輿紀要云自東漢引穀洛之水以通漕曹魏文明之世大營宫殿分引支流灌注苑囿延及晉代川谷漸移及元魏遷都更加營治大約時所務者都邑之漕渠而已隋大業元年改建東都并河南洛陽而一之大變成周之轍隋東都城即今河南府治直伊闕之口依邙山之塞自周敬王漢光武魏文帝晉武帝後魏孝文帝皆都故洛城至是西移十八里置都城焉而通濟之渠復起隋書煬帝大業元年開通濟渠自西苑引穀洛水達于河自板渚引河通于淮于時又以穀洛二水周匝都城為急故復引穀南流以會洛從城西繞城而南以達城東經偃師鞏縣之間而注于洛口其于千金九曲之故迹又未嘗過而問焉渭按瀍澗水道之變自東周靈王壅穀使東出一變也東漢引水為漕渠二變也魏晉引水灌苑囿三變也元魏決河注瀍水四變也隋煬引水匝都城五變也更此五變禹迹豈可復問韋酈諸人據後世之水道以為禹迹而莫之辨恃有洛誥數言推得其大略而已其穎容所言死穀抑亦古澗水歷王城西之明證也考王封周桓公于是為西周及其孫惠公封少子于鞏為東周故有東西之名矣秦滅周以為三川郡項羽封申陽為河南王漢以為河南郡王莽又名之曰保忠信鄉光武都洛陽以為尹尹正也所以董正京畿率先百郡也穀水又東流徑乾一作軋祭門北子朝之亂晉所開也東至千金堨河南十二縣境簿曰河南縣城東十五里有千金堨洛陽記曰千金堨舊堰穀水魏時更修此偃謂之千金堨積石為堨而開溝渠五所謂之五龍渠渠上立堨堨之東首立一石人石人腹上刻勒云太和五年二月八日庚戌造築此堨更開溝渠此水衝渠上上當作止其水助其堅也必經年歷世是故部立石人以記之云爾蓋魏文帝按太和是魏明帝年號文當作明修王張故績也堨是都水使者陳協所造也語林曰陳協數進阮步兵酒後晉文王欲修九龍堰阮舉協文王用之掘地得古承水銅龍六枚堰遂成水歷堨東注謂之千金渠逮于晉世大水暴注溝瀆泄壞又廣功焉石人東脅下文云太始七年六月二十三日大水并瀑出常流上三丈蕩壞二堨五龍泄水南注㵼下加歲久潄齧每潦即壞歷載涓棄大功今衍故為今堨更于西開泄名曰代龍渠地形正平誠得為宋本作㵼泄泄至理千金不與水勢激爭無緣當壞由其卑下水得輸宋本作踰上潄齧故也今增髙千金于舊一丈四尺五龍自然必歷世無患若五龍歲久復壞可轉于西更開二堨二渠合用二十三萬五千六百九十八功以其年十月二十三日起作功重人少到八年四月二十日畢伐龍渠即九龍渠也後張方入洛破千金堨公私賴之水積年渠堨頽毁石砌殆盡遺基見存朝廷太和中修復故堨按千金堨石人西脅下文云若溝渠久疏深上下疑有訛脫引水者當于河南城北石磧西更開渠北出使首孤立此段上下俱有脫文訛誤故溝東下因故易就磧堅便時事業已訖然後見之加邊方多事人力苦少又渠堨新成未患於水是以不敢預修通之若于後當復興功者宜就西磧故書之于石以遺後賢矣雖石磧淪敗故迹可憑準之于文北引渠東合舊瀆舊瀆又東晉惠帝造石渠于水上按橋西門之南頰文稱晉元康二年十一月二十日改治石巷水門除堅宋本作豎枋更為函枋立作覆枋屋何氏云句讀未詳前後辟級續石障使南北入岸築治潄處破石以為殺矣到三年三月十五日畢記并記列門廣長深淺于左右巷東西長七尺南北龍尾廣十二丈巷瀆口髙三丈謂之睪門橋又潘嶽西征賦曰秣馬睪門即此處也按潘嶽西征賦作秣馬臯門注云臯門周故門也明一統志洛陽舊城穀門上有臯門橋晉惠帝建此云睪門即古臯字也穀水又東又結石梁跨水制城西梁也穀水又東左會金谷水水出大白原東南流歷金谷謂之金谷水東南流徑晉衛尉卿石崇之故居也疑當作西石季倫金谷詩集敘曰余以元康七年從太僕出為征虜將軍有别廬在河南界金谷澗中有清泉茂樹衆果竹柏藥草蔽翳此下訛以渭水注錯簡于此彼注自具今刪之但下文與此不接當另有脫文西北角築之謂之金墉城魏文帝起層樓于東北隅晉宫閣名曰金墉有崇天堂即此地上架木為榭故曰樓矣皇居創徙宫極疑訛未就止蹕于此搆宵榭于故臺所謂臺以停停疑有訛誤也南曰乾光門夾建兩觀觀下列朱桁于塹以為御路東曰含春門北有退門城上西疑當作四面列觀五十步一睥睨屋臺置一鍾以和漏鼓函北上下疑有脫文訛字連廡蔭墉北廣榭炎夏之日髙視何云此處脫誤非一常以避暑為渌水池一所在金墉者也穀水徑洛陽小城北因阿舊城憑結金墉故向地也永嘉亂結以為壘號曰洛陽壘故洛陽記曰陵雲臺西有金市金市北對洛陽壘者也又東歷大夏門下故夏門也陸機與弟書云門有三層髙百尺魏明帝造門內東側際城有魏文帝所起景陽山餘基尚存孫盛魏春秋曰黃初元年文帝愈崇宫殿何氏云黃初當是景初文帝當是明帝雕飾觀閣取白石英及五色大石于太行穀城之山起景陽山于芳林園樹松竹草木捕禽獸以充其中于時百役繁興帝躬自掘土率羣臣三公以下莫不展力山之東舊有九江陸機洛陽記曰九江直作貟水水中作員壇三破之夾水得相徑通何氏云漏東京二字賦曰濯龍芳林九谷八溪芙蓉覆水秋蘭被涯今也山則塊阜獨立江下疑漏則字江字谷亦疑訛或當作溪無復髣佛矣渠水又東枝分南入華林園歷疏圃南洛陽宫殿有蔬圃殿此亦當作蔬圃在華林園中者圃中有古玉井井悉以珉玉為之以緇石為口工作精密猶不變古燦然如新又徑瑶華宫南歷景陽山北山在都亭堂上結方湖湖中起御坐石也御坐前建蓬萊山曲池接筵飛沼拂席南面射侯夾席武峙背山堂上則石路﨑嶇巖嶂峻嶮雲臺風觀纓巒帶阜逰觀者升降耶疑訛或作阿閣出入虹陛望之狀島沒狀下疑漏若字島疑作鳬鸞舉矣其中引水飛睪傾瀾瀑布或枉渚聲溜潺潺不絶竹柏蔭于層石繡薄叢于泉側微飇暫拂則芳溢于六空入為神居矣其水東生疑作注天淵池池中有魏明帝九花叢朱云九花叢當作九華殿洛陽宫殿有九華殿或當作九龍殿魏志云青龍三年還洛陽宫復崇華殿改名九龍殿殿基悉是洛中故碑纍之今造釣臺于其上池南直魏文帝茅茨堂前有茅茨碑是黃初中所立也其水自天淵池東出華林園徑聽訟觀南故平望觀也魏明帝常言獄天下之命也每斷大獄恆幸觀聽之以太和三年更從今名觀西北接華林隸薄當作簿下同昔劉楨磨石處也文士傳曰文帝之在東宫也宴諸文學酒酣命鄄后出坐者咸伏惟劉楨平仰視之太祖以為不敬送徒隸簿後太祖乘步牽車乘城降觀簿作諸徒咸敬而楨摳坐一作匡磨石不動太祖曰此非劉楨耶石如何性楨曰石出荆山玄巖之下外炳五色之章內秉賢當作堅貞之志雕之不增文磨之不加瑩稟氣貞正稟性自然朱本有箋太祖曰名豈虛哉復為文學池水又東流于洛陽縣之南池池即故狄泉也南北百一十步東西七十步皇甫謐曰悼王葬景王于翟泉今洛陽太倉中大冢是也春秋定公元年晉魏獻子合諸侯之大夫于翟泉始盟城周按左傳作將以城成周班固服虔皇甫謐咸言翟泉在洛陽東北周之墓地今按周威烈王葬洛陽城內東北隅景王冢在洛陽太倉中翟泉在兩冢之間側廣莫朱本作墓門道東建春門路北路即東宫街也于洛陽為東北後秦封吕不韋為洛陽十萬户侯大其城并得景王冢矣是其墓地也及晉永嘉元年洛陽東北步廣里地陷有二鵝出蒼色者飛翔沖天白色者止焉陳留孝廉董養曰步廣周之狄泉盟會之地今色蒼胡象矣其可盡言乎後五年劉曜王彌入洛帝居平陽陸機洛陽記曰步廣里在洛陽城內宫東是狄泉所在不得于太倉西南也京相璠與裴司空彥季修晉輿地圖作春秋地名亦言今太倉西南池水名狄泉又曰舊説言狄泉本自在洛陽北萇𢎞城周上下疑有訛字乃繞之杜預因其一證必是狄泉而即實非也後遂為東宫池晉中州記曰惠帝為太子出聞蝦蟇聲問人為是官蝦蟇私蝦蟇侍臣賈胤對曰在官地為官蝦蟇在私地為私蝦蟇令曰若官蝦蟇可給稟先是有讖云蝦蟇當貴昔晉朝收愍懷太子于後池即是池也其一水自大夏門東徑宣武觀憑城結搆不更何氏云更下有脫文層墉左右夾列步廊參差翼跂南望天淵池北矚宣武場竹林七賢論曰王戎幼而清秀魏明帝于宣武場上為欄苞虎阱使力士袒裼迭與之搏縱百姓觀之戎年七歲亦往觀焉虎承門薄欄而吼其聲震地觀者無不辟易顛仆戎亭然不動帝于門上見之使問姓名而異之場西故賈充宅地穀水又東徑廣莫門北漢之穀門也北對芒阜朱云當作邙阜即北邙山或作芒連嶺修亘苞惣衆山始自洛口西踰平陰悉芒壟也魏志曰明帝欲平北芒令登臺見孟津侍中辛毗諌曰若九河溢湧洪水為害丘陵皆夷何以禦之帝乃止穀水又東出屋南徑建春門宋本作又東屈而徑建春門石橋下即上東門也阮嗣宗詠懷詩曰步出上東門者也一曰上升門晉曰建陽門百官志曰洛陽十二門候一人十二門朱本訛作十一門今據漢志改漢志洛陽十二門每門候一人漢官儀云十二門皆有亭六百石東觀漢記曰郅惲為上東門候光武嘗出夜還詔開門欲入惲不納上令從門間識面惲曰火明遼逺遂拒不開由是上益重之亦袁本初挂節處也橋首建兩石柱橋之右柱銘云陽嘉四年乙酉壬申詔書以城下漕渠東通河濟南引江淮方貢委輸所由而至使中謁者魏郡清淵馬憲監作石橋梁柱敦勑工匠盡要妙之巧攢立重石纍髙周距橋工路博流通萬里云云河南尹邳崇㠕丞渤海重合雙福水曺掾中牟任防史王蔭史趙興將作吏睢陽申翔上下疑冇訛字道橋掾成睪卑國洛陽令江雙丞平陽降監掾王騰之主石作左北平山仲三月起作八月畢成其水依柱文自樂里道屈而東出陽渠昔陸機為成都王穎入洛敗此而返水南即馬市也舊洛陽有三市斯其一也朱箋陸機洛陽記云洛陽舊有三市一曰金市在宫西大城內二曰馬市在城東三曰羊市在城南嵇叔夜為司馬昭所害處也北則白社故里也昔孫子荆會董威輦于白社謂此矣以同載為榮故有威輦圖朱箋晉書隱逸傳董京字威輦初與隴西計吏俱至洛陽被髮行吟常宿白社中時乞于市得殘碎繒絮結以自覆或見推排罵辱曾無怒色時孫楚為著作郎數就社中與語遂載與俱歸勸之仕京答以詩又東徑馬市石橋橋南有二石柱並無文刻也漢司空漁陽王梁之為河南疑漏尹字也將引穀水以溉京都渠成而水不流故以坐免後張純堰洛而通漕洛中公私懷瞻是渠今引穀水蓋純之創也按陸機洛陽記劉澄之永初記言城之西面有陽渠周公制之也昔周遷殷民于洛邑城隍逼狹卑陋之所耳晉故城成周以居敬王秦又廣之以封不韋以是推之非專周公可知矣亦謂之九曲瀆故河南十二縣簿云九曲瀆在河南鞏縣西西至洛陽又按傅暢晉書云都水使者陳良鑿運渠從洛口入注九曲至東陽門是以阮嗣宗詠懷詩所謂朝出上東門徑望首陽岑又言遙遙九曲間徘徊欲何之者也陽渠南衍水南暨閶闔門漢之上西門者也漢宫記曰上西門所以不純白者漢家厄于戍故以丹鏤之太和遷都徙門南側其水北乘髙渠枝分上下歷故石橋東入城徑望先寺中有碑碑側法子丹碑作龍矩當作距猶龜趺也勢于今作則佳方古猶劣渠水又東歷故金市南直千秋門右宫門也又枝流入石逗伏流注靈芝九龍池魏太和中皇都遷洛陽經構宫極修理街渠務窮隱隱上疑有脫文或當作幽隱發石視之嘗無毁壞嘗字疑訛或作曾又石工細密非今之所擬亦奇為精至也遂因用之其一水自千秋門南流徑神虎門下東對雲龍門二水疑當作門衡之上皆刻雲龍風虎之狀以火齊薄之及其晨光初起夕景斜輝霜文翠照陸離眩目又南徑通門掖門西又南流東轉徑閶闔門南案禮王有五門謂臯門庫門雉門應門路門路門一曰畢門一曰虎門也魏明帝上法太極于洛陽南宮起太極殿于漢崇德殿之故處改雉門為閶闔門昔在漢世洛陽宮殿門題多是大篆言是蔡雍諸子自董卓焚宮殿魏太祖平荆州漢吏部尚書安定梁孟皇善師宜官八分體求以贖死太祖善其法常仰繫帳中愛玩之以為勝宜官北宫榜題咸是鵠筆南宫既建明帝令侍中京兆韋誕以古篆書之書斷師宜官南陽人靈帝好書徵天下工書者于鴻都門至數八分稱宜官為最大則一字徑丈小則方寸千言梁鵠字孟皇安定烏氏人以善八分知名舉孝廉為郎亦在鴻都門下鵠衛恆四體書勢云師宜官每書輒削而焚其祔梁乃益為版而飲之酒候其醉而竊其祔後奔劉表魏武破荆州募求鵠署軍假司馬在祕書以勤書自效武帝懸著帳中及以釘壁玩之以為勝宜官金壺記鵠法師宜官師善小字鵠善大字文章敘録韋誕字仲將京兆人有書名書斷誕諸書並善尤精題署明帝時凌雲臺初成令誕題榜髙下異好宜就加點正因致危懼頭鬢皆白既下戒子孫無為大字皇都遷洛始令中書舍人沈舍馨疑作含馨以隸書書之景明正始之年又勑符節令江式以大篆易之今諸桁榜題皆是式書周官太宰以正月懸治法于象魏廣雅曰闕謂之象魏風俗通曰魯昭公設兩觀于門是謂之闕從門厥聲爾雅曰觀謂之闕説文曰闕門觀也漢官典職曰偃師去洛四十五里望朱雀闕其上鬱然與天連是明峻極矣洛陽故宫名有朱雀闕白虎闕蒼龍闕北闕南宫闕也東觀漢記曰更始發洛陽李松奉引車馬奔觸北闕鐵柱門三馬皆死即斯闕也白虎通曰門必有闕者何闕者所以飾門别尊卑也今閶闔門外夾建巨闕以應天宿雖不如禮猶象而魏之上加復思以易觀矣孫云當作猶象魏之上而加復思以易觀矣廣雅曰復思謂之屏釋名曰屏自障屏也罦思在門外罦復也臣將入請事原本訛諸事朱本作言事釋名作請事當從釋名為是于此復重思之也漢末兵起壞園陵罦思曰無使民復思漢也故鹽鐵論曰垣闕罦思言樹屛隅角所架也潁容又曰闕者上有所失下得書之于闕所以求論譽于人故謂之闕矣今闕前水南道右置登聞鼓以納諫也昔黃帝立明臺之議堯有衢室之問舜有告善之旌禹有立鼓之訊湯有總街之誹武王有靈臺之復皆所以廣設過誤之備也渠水又支分夾路南徑出太尉司徒兩坊間謂之銅駝街舊魏明帝置銅駝諸獸于閶闔南街陸機云駝髙九尺即原本作積朱本作即出太尉坊者也水西有永寧寺熙平中始創也作九層浮圖浮圖下基方一十四丈自金露柈下至地四十九丈取法代都七級而又髙廣之雖二京之盛五都之富利剎靈圖未有若斯之構朱引洛陽伽藍記永寧寺熙平元年靈太后胡氏所立也在宫前閶闔門南一里中有九層浮圖一所架木為之舉髙九十丈有剎復髙十丈合去地一千尺去京師百里遙已見之初掘基至黃泉下得金像三十軀太后以為信法之徵是以營建過度也按釋法顯行傳西國有爵離浮圖其髙與此相狀東都西域俱為莊妙矣其地是曺爽故宅經始之日于寺院西南隅得爽窟室下入土可丈許地壁悉纍方石砌之石作細密都無所毁其石悉入法用自非曺爽庸匠亦難復制此桓氏有言曺子丹生此豚犢信矣朱箋魏志曺真傳真子爽專政作威飲食居服擬于乘輿尚方珍玩充牣其家妻妾盈後庭擅取太廟樂器武庫禁兵作窟室綺疏四周數與何晏等會其中飲酒作樂魏氏春秋曰爽既罷兵曰我不失為富家翁桓範笑曰曺子丹佳人生汝兄弟犢耳何圖今日坐汝等族滅矣渠左是魏晉故廟地今悉民居無復遺墉也渠水又西歷廟社之間南注南渠疑作陽廟社各以物色辨方周禮廟及路寢皆如明堂而有燕寢焉惟祧廟别疑作則無後代通為一廟列正室于下無復燕寢之制禮天子建國左廟右社以石為主祭則絺冕今多王公攝事王者不親拜焉咸寧元年洛陽大風帝社樹折青氣屬天元王一作皇東渡魏一作晉社代昌矣王隱晉書曰武帝咸寧元年八月大風折太社樹有青氣出焉占曰東莞當有帝者明年元帝生此晉室中興之表也渠水自銅駝街東徑司馬門南魏明帝始築闕崩壓殺數百人遂不復築故無闕門南屏中舊有置銅翁仲處金狄既淪故處亦禠惟壞石存焉自此南直宣陽門經緯通達皆列馳道往來之禁一同兩漢曺子建嘗行御街犯門禁以此見薄渠水又東徑杜元凱所謂狄泉北今無水坎方九丈六尺深二丈餘似是人功而不類于泉陂是驗非之一證也又皇甫謐帝王世紀云王室定遂徙居成周小不受王都故壞翟泉而廣之泉源既塞明無故處是驗非之二證也杜預言翟泉在太倉西南既言西南于洛陽不得為東北是驗非之三證也稽之地説事幾明矣不得為狄泉也渠水歷司空府前徑太倉南東出陽門石橋下注陽渠穀水自閶闔而南徑土山東水西三里有坂坂上有土山漢大將軍梁冀所成築土為山植林成苑張璠漢記曰山多峭坂以象二崤積金玉採捕禽獸以充其中有人殺苑兔者迭相尋逐死者十三人南出徑西陽門舊漢氏之西明門也亦曰雍門矣舊門在南太和中以故門卯出故徙是門東對東陽門穀水又南徑白馬寺東是漢明帝夢見大人金色項佩白光以問羣臣或對曰西方有神名曰佛形如陛下所夢得無是乎于是發使天竺寫致經像始以榆檔成疑作盛經白馬負圖表之中夏故以白馬為寺名此榆檔朱云榆檔字未詳考之袁宏漢記及牟子俱不言其事惟吳越春秋嘗有甘密九檔文笥七枚之文解者以為檔與瓽通而齊民要術云榆十五年後中為車輪及蒲葡知以榆木為逺致蒲葡也檔瓽三字互通則榆檔乃以榆木為經函耳後移在城內愍懷太子浮圖中近世復遷此寺然金光流照法輪東轉創自此矣穀水又南徑平樂觀東李尢平樂觀賦曰乃設平樂之顯觀章祕偉之奇珍華嶠漢書曰靈帝于平樂觀下起大壇上建十二重五采華蓋髙十丈壇東北為小壇復建九重華蓋髙九丈列奇兵騎士數萬人天子住大蓋下禮畢天子躬擐甲稱無上將軍行陳三匝而還設祕戲以示逺人故東京賦曰其一作苑西則有平樂都場示逺之觀龍雀蟠蜿天馬半漢二字疑有訛應劭曰飛廉神禽能致風氣古人以良金鑄其象明帝永平五年長安迎取飛廉并銅馬置上西門外平樂觀今于上西門外無他基觀惟西明門外獨有此臺巍然廣秀疑即平樂觀也又言皇女稚殤霾于臺側故復名之曰皇女臺晉灼曰飛廉鹿身頭如雀有角而蛇尾豹文董卓銷為金用銅馬徙于建始殿東階下胡軍喪亂此象遂淪穀水又南徑西門顧氏云當作西明門門故廣陽門也門左枝渠東𣲖入城徑太社前又東徑太廟南又東于清陽門右下注陽渠穀水又南東屈徑津門南故津門也昔洛水泛泆漂落害者衆衆上疑有脫文津城門校疑漏尉字將築以遏水諫議大夫陳宜止之曰王臣也水絶其足朝廷中興必不入矣水乃造門而退穀水又東徑宣陽門南故苑門也皇都遷洛移置于此對閶闔門南直洛水浮桁故東京賦曰泝洛背河左伊右瀍者也夫洛陽考之中土卜惟洛食實為神也門左即洛陽池處也池東舊平城門所在矣今塞北對南何校改洛陽南宫亭林云當作洛陽南門故蔡雍曰平城門正陽之門與宫連屬郊祀法駕所由從出門之最尊者洛陽諸宫名曰南宫有謻臺疑作門臨照臺東京賦曰其南則有謻門曲榭依阻城洫東京賦作邪阻城洫注云謻門冰室門也阻依洫城下池也皆屈曲邪行依城池為道故説文曰隍城池也有水曰池無水曰隍矣謻門即宣陽門也門內有宣陽冰室周禮有冰人日在北陸而藏之西陸朝覿而出之玉篇陸星也爾雅釋天北陸虛也西陸昴也左傳昭二年古者日在北陸而藏冰西陸朝覿而出之注陸道也謂夏十二月日在虛危在西陸謂夏三月日在昴畢冰室舊在宣陽門內故得是名門既擁塞冰室又罷穀水又徑靈臺北望雲物也漢光武所築髙六丈方二十步世祖嘗宴于此臺得走鼠于臺上朱云走鼠當作鼮鼠竇代家傳云竇攸治爾雅舉孝廉為郎世祖與百僚逰于靈臺得鼠身如豹文熒有光輝羣臣莫有知者惟攸對曰此名鼮鼠事見爾雅乃賜絹百匹亦諫議大夫第五子陵之所居倫少子也以清正朱云此下疑脫為郡功曺四字三輔決録云第五頡字子陵以清正為郡功曺洛陽無主人鄉里無田宅寄止靈臺或十日不炊司隸校尉南陽左雄尚書廬江朱孟興等故孝廉功曺各致禮餉並辭不受永建中卒穀水又東徑平昌門南故平門也又徑明堂北漢光武中元元年立尋其基構上圓下方九室重隅十二堂蔡雍月令章句同之故引水于其下為辟雍也穀水又東徑開陽門南晉宫閣名曰疑衍故建陽門也漢官疑漏儀字曰開陽門始成未有名宿昔有一柱來在樓上琅琊開陽縣上言縣南城門一柱飛去光武皇帝使來識視良是遂堅傳之何氏據漢志文選注改作堅縛之下添一因字刻記年月日以名焉何湯仲弓嘗為門候朱箋引謝承漢書曰何湯字仲弓豫章南昌人受學于桓榮為髙弟建武中拜郎中上微行夜還湯閉門不納朝廷嘉之又東徑國子太學石經北周禮有國學教成均之法學記曰古者家有孰黨有庠遂有序國有學亦有虞氏之上庠下庠夏后氏之東序西序殷人之左學周人之東膠虞庠王制云養國老于上庠養庶老于下庠故有太學小學教國之子弟焉謂之國子漢魏以來置太學于國子堂東漢靈帝光和六年刻石鏤碑載五經立于太學講堂前悉在東側蔡雍以熹平四年與五官中郎將堂溪典光祿大夫磾議郎張訓後漢書蔡雍傳作光祿大夫馬日磾議郎張馴韓説太史令單揚等奏求正定六經文字靈帝許之雍乃書丹于碑使工鐫刻立于大學門外于是後儒晚學咸取正焉及碑始立其觀視及筆寫者車乘日千餘兩填塞街陌矣今碑上悉銘刻蔡雍等名魏正始中又立古篆隸三字石經古文出于黃帝之世倉頡本鳥迹為字取其孳乳相生故文字有六義焉自秦用篆書焚燒先典古文絶矣魯恭王得孔子宅書不知有古文謂之蝌蚪書蓋因科斗之名遂效其形耳言大篆出于周宣之時史籒創著平王東遷文字乖錯秦之李斯及胡母敬又改籒書謂之小篆故有大篆小篆焉然許氏字説專釋一篆而不本古文言古隸之書起于秦代而篆字文繁無會劇者何氏云言劇務則無及也故用隸人之省謂之隸書或云即程邈于雲陽增損者是言隸者篆捷也孫暢之嘗見青州刺史傅𢎞什朱箋初學記引此作傅𢎞仁説臨淄人發古冢得銅棺前和外隱起為隸字言齊太公朱云脫六字世孫胡公之棺也惟三字是古隸初學記作餘同今書證知隸自出古非始于秦魏初傳古文出邯鄲淳石經古文轉失淳法樹之于堂西石長八尺廣四尺刻石于其下碑石四十八枚廣三十丈魏文帝又刊典論六碑附于其次陸璣言太學贊别一碑在講堂西下列石龜碑載蔡雍韓説堂溪典等名太學弟子贊復一碑在外門中今二碑並無石經東有一碑是漢順帝陽嘉八年按陽嘉止四年無八年酈注所引碑文無從查核姑闕疑立碑文云建武二十七年造太學年積毁壞永建六年九月詔書修太學刻石記年用作工徒十一萬二千人陽嘉八年八月作畢碑南面刻頌表裏鏤字猶存不破漢石經北有晉辟雍行禮碑是太始二年立其碑中折但世代不同物不停故石經淪缺存半幾毁駕言永久諒用憮焉洛陽伽藍記漢國子學堂之前有三種字石經二十五碑表裏刻之作篆蝌蚪隸三種字蔡雍筆之遺迹也猶有十八碑餘皆殘毁復有石碑四十八枚亦表裏隸字又讚學碑一所並在堂前東觀餘論石經在洛陽本在洛宫前御史臺中年久摧散洛中好事者時時得之若騏驥一毛虬龍片甲今張燾龍學家有十版最多張氏壻家有五六版玉晉玉家有小塊洛中所有者止此豫皆得其拓本論語之末題云詔書與博士臣左立郎中臣書上臣下皆缺當是著書者姓名或云此即蔡雍書姓名既亡無以辨之獨刻者陳興姓名甚完何其幸與此蓋鴻都石經然經各異手書不必皆蔡雍也三字者不見真刻獨此一字者乃當時所刻字畫髙古精善殊可寶重小金石録漢石經靈帝熹平四年所立其字則蔡雍字八分書也後漢儒林傳序云為古文篆隸三體者非也蓋蔡雍所書乃八分而三體石經乃魏時所建也隸釋水經云光和六年立石于太學其上悉刻蔡雍名魏正始中又刻古篆隸三字石經蓋諸儒受詔在熹平而碑成則光和也隋志有一字石經七種三字石經三種其論云漢鐫七經皆蔡雍書又云魏立一字石經其説自相矛盾新舊唐志有今字石經七種而注論語云蔡雍作又有三字石經古篆兩種蓋唐史以隸為今字也觀遺經字畫之妙非蔡中郎輩不能為以黃初後來碑刻比之不啻霄壤豈魏人筆力可到當以水經為據三體者乃魏人所刻儒林傳云為古文篆隸三體者非也史稱雍自書丹使工鐫刻今所存諸經字體各不同雖雍能分善隸兼備衆體但文字之多恐非一人可辦史云雍與堂溪典等正定今公羊論語之後尚有溪典日磾姓名其外别有趙域劉𢎞張文蘇陵傅楨左立孫表數人當是同時揮毫者考古有三雍之文今靈臺太學並無辟雍處晉永嘉中王彌劉曜入洛焚毁二學尚髣佛前基矣穀水于城東南隅枝分北注徑清陽門東故清明門也亦曰稅門也亦曰芒門又北徑東陽門東故中東門也又北徑故太倉西洛陽地記曰大城東有大倉倉下運船常有千計即是處也又北入洛陽溝穀水又東左迤為池又東右出為方湖東西一百九十步南北七十步故水衡署之所在也穀水又東南轉屈而東注謂之阮曲云阮嗣宗之故居也穀水又東注鴻池陂百官志曰鴻池池名也在洛陽東二十里丞一人二百石池東西千步南北千一百步四周有塘池中又有東西橫塘水溜徑通故李尢鴻池陂銘曰鴻澤之陂聖王所規開水東注出自城池也朱云開水東注原本作開又玉海引此亦作開又其誤久矣今按藝文類聚張載鴻池陂銘曰開厡東注出自城池蓋本李尢語也其水又東左合七里澗晉後略曰成都王頴使吳人陸機為前鋒都督伐京師輕進為治軍所處疑當作為乂軍所困大敗于鹿苑人相登躡死于塹中及七里澗澗為之滿即是澗也晉書陸機傳太安初成都王穎起兵討長沙王乂假機後將軍河北大都督機始臨戎而矛旗折意甚惡之列軍自朝歌至于河橋鼓聲聞數百里漢魏以來出師之盛未嘗有也長沙王乂奉天子與機戰于鹿苑機軍大敗赴七里澗而死者如積焉水為之不流澗有石梁即旅人橋也昔孫登不欲久居洛陽知楊氏榮不保終思欲遁迹林鄉隱淪妄死晉書楊駿傳駿徵髙士孫登遺于布被登截被于門大呼曰斫斫刺刺旬日託疾死今云妄即詐也朱據宋本改作忘死非是楊駿埋之于此橋之東駿後尋亡矣搜神記曰太康末京洛始為折楊之歌有兵革辛苦之辭駿後被誅太后幽死折楊原本漏為之應也凡是數橋皆纍石為之亦髙壯矣制作甚佳雖以時往損功而不廢行旅朱超石與兄書云橋去洛陽宫六七里悉用大石下員以通水可受大舫過也奇制作疑當作制作奇巧題其上云太康三年十一月初日就功用七萬五千人至四月末止此橋經破落復更修補今無復文字陽渠水又東流徑漢廣野君酈食其廟南廟在北山上成公綏所謂偃師西山也山上舊基尚存廟宇東面門有兩石人對倚北石人胸前銘云門亭長石人西有二石闕雖經頽毁猶髙丈餘闕西即廟故基也基前有碑文字剝缺不復可識子安仰澄芬于萬古讚清微於廟像文字厥集矣文字當作文載蓋成公子安集中有酈生廟碑文也陽渠又東徑亳殷南昔盤庚所遷改商曰殷此始也班固曰尸鄉故殷湯所都者也在今河南府城西故亦曰湯亭薛瓚漢書注皇甫謐帝王世紀並以為非以為帝嚳都矣晉太康地理記並言田橫死于是亭故改曰尸鄉非也余按司馬彪郡國志以為春秋之尸氏也其澤野負原夾郭多墳壠焉即陸士衡會王輔嗣處也袁氏王陸詩敘機初入洛次河南之偃師時忽結陰望道左右民居者異苑作左右若有民居無者字按上下文氣當作望道左有民居者因往投宿方順因往退異苑作投宿見一少年姿神端逺與機言玄機服其能而無以酬折一作抗前至一辨文機異苑有乃字題緯古今綜檢名實此少年不甚欣解將曉去稅駕逆旅嫗曰君何宿而來自東數十里無村落上有山陽王家墓機乃怪悵還睇昨路空野昏霾雲攢蔽日知所遇者審王弼也此山即祝雞翁之故居也搜神記曰祝雞翁者洛陽人也居尸鄉北山下養雞百年餘雞至千餘頭皆有名字欲取呼之名則種别而至後之吳山莫知所去矣穀水又東徑偃師城南皇甫謐曰帝嚳作都于亳偃師是也王莽之所謂師氏者也穀水又東流注于洛水矣甘水出𢎞農宜陽縣今屬河南府鹿蹄山在今宜陽縣俗名非山山在河南陸渾縣故城西北陸渾今為河南府嵩縣故城在縣北三十里俗謂之縱山水之所導發于山曲之中故世人目其所為甘棠何氏云舊本作甘掌固誤朱本改甘棠亦疑非是焉明一統志甘水在河南府城西南四十里自宜陽縣西南流入本境下流入澗水水最甘美東北至河南縣南北入洛河南廢縣在府城唐苑內甘水發源東北流北屈徑一故城東在非山上世謂之石城也京相璠曰或云甘水西山上夢汁疑有訛字脫文而平朱云夢汁當作廣濶有故甘城在河南城西二十五里指謂是城也余按甘水東一十許里洛城南有故甘城焉北對河南故城世謂之鑿一作鑒下同洛城鑿甘聲相近即故甘城也為王子帶之故邑矣是以昭叔有甘公之稱焉甘水又與非山水會水出非山東谷東流入于甘水甘水又于河南城西北入洛經言縣南非也故京相璠曰今河南河南縣西有甘水北入洛斯得之矣漆水出扶風杜楊縣俞山杜楊縣今為陜西鳳翔府麟逰縣東北入于渭扶風今為陜西西安府永夀縣邠州漆縣及鳳翔府各縣地山海經曰羭次之山漆水出焉北流注于渭蓋自北而南矣尚書禹貢太史公禹本紀云導渭水東北至涇又東徑史記作過漆沮入于河孔安國曰漆沮一名矣朱箋當作漆沮二水名矣字衍亦曰洛水也出馮翊北周太王去邠度漆踰梁山止岐下故詩云民之初生自土沮漆又曰率西水滸至于岐下是符禹貢本紀之説許慎説文稱漆水出右扶風杜陽縣岐山東入渭從水柒聲又云一曰漆城池也潘嶽關中記曰關中有涇渭灞滻酆鄗漆沮之水酆鄗漆沮四水在長安西有渠縣有渠二字似訛宋本作四水在長安西南鄠縣朱本作西有柒縣皆注酆鄗水北注渭開山圖曰麗山西北有溫地朱箋溫地固訛吳琯本改作溫池亦恐非是蓋驪山湯泉又稱溫泉無作溫池也溫地西南八十里岐川在杜陵埤宋本作北長安西有渠謂之柒古柒與漆同渠班固地理志云柒水出柒縣西闞駰十三州志又云漆水出漆縣西北岐山東入渭今有水出杜陽縣岐山北柒溪謂之柒渠西南流注岐水但川土奇異今説㸦出考之經史各有所據識淺見浮無以辨之矣滻水出京兆藍田谷北入于灞滻水在今陜西西安府城東一十五里源出藍田縣合金谷水北流入灞水地理志曰滻水出南陵縣之藍田谷西北流與一水合水出西南莽谷東北流注滻水滻水又北歷藍田川北流注于灞水地理志曰滻水北至灞陵入灞水沮水出北地直路縣東過馮翊祋祤縣北今為西安府同官縣耀州及延安府宜君縣等地東入于洛地理志曰沮出畿縣西東入洛今水自直路縣東南徑燋石山東南流歷檀臺川俗謂之檀臺水屈而夾山西流又西南徑宜君川世又謂之宜君水在今鄜州宜君縣界縣北去鄜州二百十里又得黃嶔水口水西北出雲陽縣石門山黃嶔谷東南流注宜君水雲陽今淳化縣水西北出雲陽縣今為西安府淳化縣石門山黃嶔谷東南流注宜君水又東南流徑祋祤縣故城西縣以當從宋本作縣以水為名是漢景帝二年置其水南合銅官水今同官縣北有銅官川水蓋即寰宇記所謂漆水也唐書神龍元年同官縣水溢漂居民五百餘家太和三年同官暴水漂沒二百餘家水出東北而西南徑銅官川謂之銅官水又西南流徑祋祤縣東西南流徑其城南原下而西南注宜君水宜君水又南出土門山西又謂之沮水山在今耀州東南四里又東南歷土門南原下東徑懷德城南城在今富平縣西南非朝邑之懷德故城也城在北原上又東徑漢太上皇陵北元和志漢太上皇陵在櫟陽縣東北二十五里今為臨潼縣地陵在南原上沮水東注鄭渠昔韓欲令秦無東伐使水工鄭國間秦鑿涇引水謂之鄭渠渠首上承涇水于中山西瓠口所謂瓠中也爾雅以為周焦誤宋本作穫矣渠並北山東注洛三百餘里欲以溉田中作覺欲殺鄭國曰史記作中以溉田中作而覺秦欲殺鄭國鄭國曰始臣為間然渠成亦秦之利卒使就渠渠成而用注填閼之水溉澤鹵史記索隱云澤鹵一作舄鹵或作斥鹵貨殖傳云營丘地㵼鹵徐廣注云㵼鹵鹹地也四萬餘頃史有收字皆畝一鍾關中沃野無復凶年秦以富強卒并諸侯命曰鄭渠渠瀆東徑宜秋城北又東徑中山南河渠書曰鑿涇水自中山而封禪書漢武帝獲寶鼎于汾陰將薦之甘泉鼎至中氤氲有黃氣蓋焉徐廣史記音義曰關中有中山非冀州者也指證此山俗謂之仲山非也鄭渠又東徑捨車宫南絶治谷水鄭渠故瀆又東徑􅏭􅠣山南池陽縣故城北又東絶清水又東徑北原下濁水注焉自濁水以上無濁水上下疑有脫文上承雲陽縣東大黑泉東南流謂之濁谷水又東南出原注鄭渠又東歷原徑曲梁城北又東徑太上陵南原下北屈徑原東與沮水合分為二水一水東南出即濁水也至白渠與澤泉合俗謂之柒水又謂之柒沮水漆本作柒古漆字也澤泉水自鄭渠合沮水又直絶注濁水至白渠合焉故濁水得漆沮之名絶白渠東徑萬年縣故城北為櫟陽渠萬年故城即櫟陽故城在今臨潼縣東北七十里城即櫟陽宫也漢髙帝葬皇考于是縣起墳陵署邑號改曰萬年也地理志曰馮翊萬年縣髙帝置王莽曰黑一作異赤也故徐廣史記音義曰櫟陽今萬年矣闞駰曰縣西有涇渭北有小河渭疑作謂此一作此渭水也其水又南屈更名石川水括地志云沮水一名石川水源出富平縣東南入櫟陽蓋即此與濁水合流者也又西南徑郭􅚄城西與白渠枝渠合又南入于渭水也今濁水至三原縣界散絶白渠亦不入富平縣境縣所恃以溉者惟石川水而已其一水東出即沮水也東與澤泉合水出沮東澤中與沮水隔原相去十五里俗謂是水為渠水也南流徑薄昭墓南冢在北原上又徑懷德城北東南注鄭渠合沮水長安志云澤多泉在富平縣西十三里東南入漆沮即此水也縣志謂之溫泉水云出縣西北仲山麓又自沮直絶注濁水至白渠合焉故濁水得柒沮之名也沮循鄭渠東徑當道城南城在頻陽縣故城南頻陽故城在今富平縣東北五十里城在頻陽縣故城南頻陽宫也秦厲公置古本脫秦厲二字吳本增入城北有頻山山有漢武帝殿以石架之縣在山南故曰頻陽也古本俱作潁陽誤應劭曰縣在頻水之陽今縣之左右無水以應之所可當者惟鄭渠與沮水又東徑蓮芍縣故城北今渭南縣東北有蓮勺廢縣蓮音輦十三州志曰縣以草受名也沮水又東徑漢光武故城北又東徑粟邑縣故城北今白水縣界有粟邑故城王莽更名粟城也後漢封騎都尉耿夔為侯國其水又東北流注于洛水也洛水在白水縣東禹貢錐指曰酈元以濁水為漆水宋人則以銅官川水來合沮水者為漆水近志皆承其説云沮水出中部縣西北子午嶺中部在延安府鄜州南一百四十里本漢馮翊翟道縣姚秦改置中部縣直路故城在焉唐屬坊州寰宇記云沮水自坊州升平縣北子午嶺出俗號子午水下合榆谷慈馬等州遂為沮水按升平廢縣在今宜君縣西北三十五里沮水所經非所出也子午山在中部縣北亦曰子午嶺沮水出焉嶺綿亘慶陽延安二府之間其南麓抵縣界或云即橋山也東南流徑宜君縣東北又東南徑同官縣西同官在今耀州北七十里又南徑耀州西而東會漆水耀州在西安府北少東一百六十里本唐華原縣漆水出同官縣東北西南流至縣城東北注于銅官水又西南至州南與沮水合寰宇記云華原縣漆水自東北同官縣界來合沮水長安志云漆水經華原縣界十五里南流合沮水入富平縣界俗名石川水同官志云漆水在縣東北五十里源出北髙山以其地多漆木而名西南流合銅官川水耀州志云沮水經州城西循西乳山東會漆水漆水自同官縣西南流入州境尹師澗水入焉又南經五臺山西至乳山與沮水合韓邦竒曰嘗至同官縣見一大潭水湧出三面皆青石山如壁立水流出東壑問其居人曰漆潭正所謂自同官縣界來者沮水又東南徑富平縣西南今鄭渠堙廢沮水不復東入洛又東南徑白水縣南而東注于洛白水縣在同州西北一百二十里白水即沮水今其水不至縣南之水乃烏泥川之下流耳然漆水原委宋人始言之他無所考據也水經注集釋訂訛卷十六
