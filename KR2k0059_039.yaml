body:
  text: 水經注集釋訂訛卷三十九歸安沈炳巽撰滙水深水鍾水耒水洣水漉水瀏水㵋水贛水廬水匯水出桂陽縣盧聚今衡州府桂陽州及廣州府連州連山縣皆漢桂陽縣地水出桂陽縣西北上驛山盧溪為盧溪水明一統志盧溪在肇慶府新興縣源出李峒嶺經盧村遶縣城東門外流至府城入大江東南流逕桂陽縣故城謂之匯水地理志曰匯水出桂陽南至四㑹今屬肇慶府是也匯水又東南流出桂陽南至四㑹是嶠之溪溪水下流厯峽南出是峡謂之真疑作貞下同女峽峽西岸髙巖名真女山貞女山在四㑹縣西南一十里山下際有石如人形髙七尺狀如女子故名貞女峡古來相傳有數女取螺於此遇風雨晝晦忽化為石斯誠巨異難以聞信但啓生石中摯呱空桑斯抑類矣物之變化寧以理求乎隋巢子淮南子並云禹娶塗山氏治鴻水通轘轅山化為熊塗山見之慙而去至嵩髙山化為石禹曰歸我子石破北方而生啟李彤四部云嵩山南有啟母祠郭景純云陽城西有啟母石也吕覽云有侁氏女子採桑得嬰兒於空桑之中命曰伊尹孫子兵書云伊尹名摰溪溪下當有水字又合洭水洭水又東南入陽山縣今屬廣州府右合漣口水源出縣西北一百一十里石塘村村之流水側有豫章木本逕可二丈其株根猶存伐之積載而斧跡若新羽族飛翔不息其傍衆枝飛散逺集鄉亦不測所如惟見一枝獨往含洭水矣洭水在英德縣西南四十里一名洸水下流四十里為羅溪漣水東南流注于洭水又東南流而又與斟水合水導源近出疑作山東巖下穴口若井一日之中十溢十竭信若潮流而注洭水洭水又南逕漏縣名朱本云漢志桂陽郡有含洭縣此疑脱含洭二字縣故城西耆舊傳曰往昔縣長臨縣輒遷擢超級太史逕觀言摯疑譌朱本云當作城勢使然掘斷連罡流血成川城因傾陁遂即傾敗閣下大鼓飛上臨武乃之桂陽追號聖鼓自陽山達乎桂陽之武步驛所至循聖鼓道也其道如塹迄于鼓城矣洭水又逕陽山縣南縣故含洭縣之桃鄉孫皓分立為縣也洭水又南東流也東南過含洭縣應劭曰洭水東北入流瓉注漢書沅在武陵去洭逺又隔湘水不得入沅洭水東南左合翁水翁水源出翁源縣靈地山西南流二百四十里至英徳縣與湞水合流入廣州水出東北利山湖湖水廣圎五里潔踰凡水西南流注于洭謂之翁水口口已下東㟁有聖鼓枝即陽山之鼓枝也横在川側雖衝波所激未嘗移動百鳥翔鳴莫有萃者船人上下以篙撞者輒有瘧疾洭水又東南左合陶水水東出堯山山盤紆數百里有赭嵓迭起冠以青林與雲霞亂采山上有白石英山下有平陵有大堂基耆舊云堯行宫所所下疑有在字陶水西逕縣北右注洭水陶水明一統志作桃溪在英德縣四十里源出堯山下流合洭水洭水又逕含洭縣西王歆之始興記曰縣有白鹿城城南有白鹿罡咸康中郡民張魴為縣有善政白鹿來㳺故城及罡並即名焉南出洭浦闗為桂水闗在中宿縣洭水出闗右合溱水謂之洭口山海經謂之湟水徐廣曰湟水一名洭水出桂陽通四㑹亦曰漼水也漢武帝元鼎元年路博德為伏波將軍征南越出桂陽下湟水即此水矣桂水其别名也深水出桂陽盧聚吕忱曰深水一名䆳水導源盧溪西入營水亂流營波同注湘津許慎云深水出桂陽南平縣也經書桂陽者縣也本𨽻桂陽郡後割屬始興縣有盧溪盧聚山在南平縣之南九疑山東也西北過零陵營道縣南又西北過營浦縣南又西北過泉陵縣西北七十里至燕室邪疑邱入于湘水上有燕室邱亦因為聚名也其下水深不測號曰龍泉鍾水出桂陽南平縣部山北過其縣東又東北過宋渚亭又北過鍾亭與雞水合部山即部龍之嶠也五嶺之第三嶺也鍾水即嶠水也庾仲初曰嶠水南入始興漼水注于海北入桂陽湘水注于江是也雞水即桂水也雞桂聲相近故字隨讀變經仍其非矣桂水出桂陽縣北界山山壁髙聳三面特峻石泉懸注瀑布而下北逕南平縣而東北流屇鍾亭右㑹鍾水通為桂水也故應劭曰桂水出桂陽東北入湘又北過魏寧縣之東又東北入于湘此句原本譌作下段經文今改正魏寧故陽安也晉太康元年改曰晉寧縣在桂陽郡東一百二十里縣南西二面岨帶清溪桂水無出縣東理葢縣邑流移今古不同故也耒水出桂陽郴縣南山耒水發源出汝城縣汝城縣本漢桂陽郡郴縣東晉折置汝城縣宋改為桂陽縣今因之屬郴州耒水在縣境發源耒山西流㑹資興水又西北㑹郴水經衡州耒陽縣界注于湘東烏龍白騎山西北流逕其縣北西流三十里中有十四瀨各數百步濬流奔急竹節相次亦為行旅泝涉之艱難也又西北逕晉寧縣北又西左合清溪水口水出縣東黄皮山西南流厯縣南又西北注於耒水汝縣在郡東三百里餘山又在縣東耒水無出南山理也又北過其縣之西縣有緑水明一統志作醽醁泉在郴州興寧縣東一名酒官水出縣東侯公西北流而南屈注于耒謂之程鄉溪郡置酒官醖於上下名曰程酒獻同酃也酃湖在衡州府城東二十里荆州記長沙郡酃縣有酃湖周迴三里取湖水釀酒酒極甘美湘中記湖水深八尺湛然緑色晉武帝嘗薦酃酒于太廟耒水又西黄水注之水出縣西黄芩山明一統志在郴州城南三十六里郴水所出一名黄廂山即五嶺之一從東第三騎田嶺也山則騎田之嶠五嶺之第二嶺也按五嶺見後漢書呉祐及劉表傳注中俱引裴氏廣川記云大庾始安臨賀桂陽掲陽是為五嶺鄧德明南康記曰大庾一也桂陽甲騎二也九真都龎三也臨賀萌渚四也始安越城五也此云騎田之嶠恐誤黄水東北流按盛𢎞之云衆山水出注於大溪號曰横流溪溪水甚小冬夏不亁俗亦謂之為貪泉飲者輒冒於財賄同於廣州石門貪流矣亷介為二千石則不飲之昔呉隱之挹而不貪亂豈謂能汙其真乎葢亦惡其名也晉書呉隱之傳隆安中隱之為廣州刺史未至州二十里地名石門有水曰貪泉飲者懐無厭之欲隱之既至酌而飲之因賦詩曰古人云此水一㰱懐千金試使夷齊飲終當不易心及在州清操益厲劉澄之謂為一涯溪通四㑹殊為孟浪而不悉也庾仲初云嶠水南入始始下當有興字與溱水注海即黄岑水入武溪者也北水入桂陽湘水注于大江即是水也又側千秋水注之水出西南萬歲山明一統志靈壽山舊名萬歲山在郴州南二十里千秋水發源于此以山名萬歲故水名千秋云山有石室室中有鍾乳山上悉生靈壽木溪下即千秋水也水側民居號萬歲村其水下合黄水黄水又東北逕其縣東右合除泉水水出縣南湘陂村村有圓水廣圓可二百步一邊暖一邊冷冷處極清緑淺則見石深則無底暖處水白且濁𤣥素既殊凉暖亦異厥名除泉其猶江乘之半湯泉也江乘地記云縣東南三十五里有湯泉半冷半温共同一壑謂之半湯泉水盛則瀉黄溪水耗則津徑輒流郴舊縣也桂陽郡治也漢髙帝二年分長沙置地理志曰桂水所出因以名焉地理志無此句不知何所本也今漢志郴縣下云耒山耒水所出無桂水所出之文王莽更名南平縣曰宣風項羽遷義帝所築也縣南有義帝冡内有石虎因呼為白虎郡東觀漢記曰茨充字子何為桂陽太守民惰嬾少鹿譌字履足多剖裂茨教作履今江南知織履皆充之教也齊民要術云茨充為桂陽令俗不種桑無蠶織絲麻之利民惰窳少麄履足多剖裂血岀盛冬皆然燎炙充教民益種桑柘養蠶織履復令種苧麻數年之間大賴其利黄溪東有馬嶺山在郴州城北七里又名蘓僊嶺髙六百餘丈廣圓四十許里漢末有郡民蘇躭栖逰此山桂陽列僊傳云躭郴縣人少孤養母至孝言語虚無時人謂之癡常與衆兒共牧牛更直為帥録牛無散每至躭為帥牛輒徘徊左右不逐自還衆兒曰汝直牛何道不走邪躭曰非汝曹所知即靣辭母云受性應僊當違供養涕泗又說年上當有来字年將疫疫死者略半穿一井飲水可得無恙如是有哭聲甚哀見躭乘白馬還此山中百姓為立壇祠民安歲登民因為馬嶺山按列僊傳有躭既僊去後其母死躭來山頭哭之人不見其形但聞哭聲今節去其母死云云但有如是有哭聲甚哀句似于上下文義末足未審是道元所節抑屬後人刻本譌脱也又洞神傳云躭初去時告其母云明年大疫取庭前井水飲之無恙果如其言闔門元吉母年百餘歲終鄉人共葬之聞山上有人哭聲服除乃止神僊傳云躭母既終葬後州東北牛脾山紫雲葢上有號哭聲知蘇君之神也因見白馬常在嶺上遂改牛脾山為白馬嶺黄水又北流注于耒原本譌来水謂之郴口耒水又西逕華山之隂亦曰華石山孤峰特聳枕帶雙流東則黃溪耒水之交㑹也耒水東流㳂注不得過其縣西也兩㟁連山石泉懸溜行者輒徘徊留念情不極巳也又北過便縣之西今郴州治永興縣縣故惠帝封長沙王子呉淺為侯國呉芮封長沙王淺乃芮子也王莽之便屏也縣界有温泉水在郴縣之西北左右有田數十頃資之以漑常以十二月下種明年三月穀熟度此水冷不能生苗温水所漑年可三登其餘波散流入于耒水也明一統志郴州城北二十里有温泉平地涌出如湯可以愈瘍東流合郴水荆州記云郴縣西北有温泉其下流有田十數畝常于十二月下種來年三月榖登一歲三熟又西北過耒陽縣之東耒陽舊縣也葢因水以制名王莽更名南平亭東傍耒水水東肥南有郡故城縣有漢疑作肥水東出侯計山在今衡州耒陽縣東七十里肥水所出其水清澈冬温夏冷西流謂之肥川川之北右盧塘塘池八頃其深不測有大魚常至五月輒一奮躍水涌數丈波襄四陸細魚奔迸隨水登㟁不可勝計又云大魚將欲鼓作諸魚皆浮聚水側注西北逕蔡洲州西即蔡倫宅傍有蔡子池蔡倫宅在耒陽縣治西南内有蔡子池湘中記池南有石臼即倫舂紙臼唐别駕李懸以臼入貢倫漢黄門郎順帝之世擣故魚網為紙用代簡素自其始也東觀漢記黄門蔡倫作尚方紙所謂蔡侯紙也又北過酃縣東縣有酃湖湖中有洲洲上民居彼人資以給釀酒甚醇美謂之酃酒歲常貢之湖邊尚有酃縣故城治此西北去臨承縣一十五里從省𨽻十三州志曰大别水南出耒陽縣太山北至酃縣入湖也北入于湘耒水西北至臨承縣而右注湘水謂之耒口也洣水出荼陵縣上鄉西北過其縣西今屬長沙府水出江州安城郡廣興縣太平山西北流逕荼陵縣之南漢武帝元朔四年封長沙定王子節侯訢之邑也王莽更名聲鄉矣洣水又屈而過其縣西北流注也地理志謂之泥水者也又西北過攸縣南今屬長沙府攸水出東南安城郡安復縣封侯山西北流逕其縣北縣北帶攸溪葢即溪以名縣也攸水源出江西安福縣封侯山西流逕鳯嶺至攸縣東與洣水合流又至荼陵江口入于湘漢武帝元朔四年封長沙定王子則為攸輿侯即地理志所謂攸縣者也攸水又西南流入荼陵縣入于洣水也又西北過隂山縣南縣本陽山縣也縣東北猶有陽山故城即長沙孝王子宗之邑也言其勢王故塹山堙谷改曰隂山縣縣上有容水自侯曇山下注洣水謂之容口洣水又西北逕其縣東又西逕厯口縣有厯水水有大水容一百石水出于此水因以名曰容水下注洣水謂之厯口洣水又西北與洋湖水㑹水出縣西北樂藪岡下洋湖湖去罡七里湖水下注洣謂之洋湖口洣水東北有峨山縣東北又有武陽龍尾山並僊者羽化之處上有僊人及龍馬跡於其處得遺咏雖神栖白雲屬想芳流藉念泉鄉遺咏在兹覽其餘誦依然息逺匪直邈想霞蹤愛其文咏可念故端牘抽札以詮其咏其畧曰登武陽觀樂藪峨嶺千㽔洋湖口命蜚螭駕白駒臨天水心踟蹰千載後不知如葢勝賞神鄉秀情超拔矣又西北入于湘漉水出醴陵縣今屬長沙府東漉山西過其縣南醴陵縣髙后四年封長沙相侯起為國縣南臨渌水水東出安城鄉翁陵山余謂漉渌聲相近後人藉便以渌為稱雖翁陵名異而即麓是同明一統志渌水在醴陵縣學前其水涌自地脉如絲如霧用白器入水酌而澄之其色深緑可以書字屈從縣西北流至漉浦注入于湘瀏水出臨湘縣東南瀏陽縣今屬長沙府西北過其縣東北與澇溪水合瀏陽水在長沙府城北五里源出大圍山瀏水出縣東江州豫章縣首禆山道源西北流逕其縣南縣慿溪以即名也又西北注于臨湘縣也西入于湘㵋水出豫章艾縣今為南昌府寧縣春秋左氏傳曰呉公子慶忌諫夫差不納居於艾是也王莽更名治翰西過長沙羅縣西羅子自枝江徙此世猶謂之為羅侯㵋水又西流積而為陂謂之町湖也又西逕累石山入于湘水累石山在北亦謂之五木山山方尖如五木狀故俗人藉以名之五木者摴蒲之戯也李翺有五木經山在羅口北㵋水又在羅水南流注于湘謂之東町口者也贛水出豫章南野縣今為贛州信豐縣西北過贛縣東今贛州府治山海經曰贛水出聶都山東北流注于江入彭澤西也班固稱南野縣彭水所發東入湖漢水庾仲初謂大庾嶠水北入豫章注于江者地理志曰豫章水出贛縣西南而北入于江葢控引衆流總成一川雖稱謂有殊言歸一水矣故後漢郡國志曰贛有豫章水雷次宗云似因此水為其地名雖十川均流而此源最逺故獨受名焉按雷次宗豫章記曰十川均流而此源最逺所謂十川者贛廬牽淦旴濁餘鄱僚循為十也此源謂贛水也九水俱入于贛水諸本作北源誤矣贛即豫章湖漢牽即南水濁當作蜀循當作修淦僚則漢志所無道元悉從雷記聶都山在南安府崇義縣西南六十里王象章水所經非所出也劉澄之曰縣東南有章水西有貢水西是為謬也縣治二水之間二水合贛字因以名縣焉劉氏專以字說水而不知逺失其實矣豫章水導源東北流逕南野縣北贛川石岨水急行難傾波委注六十餘里逕贛縣東縣即南康郡治晉太康五年分廬江立豫水右㑹湖漢水水出雩都縣今屬贛州府導源西北流逕金鷄石其石孤竦臨水耆老云時見金雞出於石上故石取名焉湖漢水又西北逕贛縣東西入豫章水也明一統志貢水漢志名胡漢水源出汀州新樂山經瑞金南入㑹昌北㑹雩都寧都諸水至贛州府城北㑹于章水章水漢志名彭水源出南安府聶都山流至府城西環城而北㑹于貢水贛水在府城北貢章二水合而為一故名今按酈元頗非之然近世皆宗其說以豫章為章水湖漢為貢水二水合流自縣起至萬安縣凡十八灘惟黄公灘最險俗譌為惶恐灘又西北過廬陵縣西今江西吉安府治及諸屬縣地故城在吉安府泰和縣闕八十里廬陵縣即王莽之桓亭也十三州志曰稱廬水西出長沙安復縣今吉安府安福縣本漢安平安成二縣地安平屬豫章郡安成屬長沙國後漢改安平曰平都屬廬陵郡呉置安成郡治平都晉改為安復縣武帝元光六年封長沙定王子劉蒼為侯國即王莽之用成也呉寶鼎中立以為安城郡東至廬陵入湖漢水也又東北過石陽縣西今廬陵縣北六十里有石陽故城晉廬陵郡治也漢和帝永平九年分廬陵立漢獻帝初平一作興平二年呉長沙桓王立廬陵郡治此豫章水又逕其郡南城中有井其水色半青半黃黃者如灰汁取作飲粥悉皆金色而甚芬香異物志云廬州城中有一井中有二色水半青半黄黄者如灰汁取作麋粥皆金色土人呼灰汁為金因名為金井又東北過漢平縣南又東北過新淦縣西今屬臨江府牽水西逕宜春縣漢武帝元光六年封長沙定王子劉成為侯國王莽之循曉也按漢志當作修曉牽水又東逕呉平縣晉縣屬豫章郡舊漢平也晉太康元年改為呉平矣牽水又東逕新淦縣即王莽之偶亭而疑譌注于豫章水湖漢及贛並通稱也又淦水出其縣下注于贛水漢志新淦縣下應劭曰淦水所出西入湖漢今臨江府清江縣東六十里有新淦故城又北過南昌縣西今江西省治旴水出南宫縣南宫當作南城漢志南城縣下旴水西北至南昌入湖漢西北流逕南昌縣南西注贛水又有濁水注之濁漢志作蜀建成縣下蜀水東至南昌入湖漢明一統志蜀水在今南昌府城西南六十里一名筠河自瑞州髙安縣東流入南昌境與闕水合合流吉安府亦有蜀水注云在泰和縣東與禾水勢湍急奔瀉如蜀江故名似是兩水非同一源也水出康樂縣故陽樂也濁水又東逕望蔡縣康樂望蔡皆屬漢縣縣因汝南上蔡民萍居此土晉太康元年改為望蔡縣濁水又東逕建成縣今為臨江府治漢武帝元光四年按表當作元朔四年封長沙定王劉拾為侯國王莽更之名曰多聚也縣出然石異物志曰石色黄白而理疎以水灌之便熱以鼎著其上炊足以熟置之則冷灌之則熱如此無窮元康中雷孔章入洛齎石以示張公張公曰此謂然石於是乃知其名濁水又東至南昌縣東流入于贛水贛水又厯白杜西有徐孺子墓呉嘉禾中太守長沙徐熙於墓隧種松太守南陽謝景於墓側立碑永安中太守梁郡夏侯嵩於碑傍立思賢亭松大合抱亭世修治至今謂之聘君亭也贛水又北厯南塘塘之東有孺子宅際湖南小洲上宋曽鞏徐孺子祠堂記章水北逕南昌城西歴白社其西有孺子墓又北厯南塘其東為東湖湖南小洲上有孺子宅號孺子臺呉嘉禾中太守徐熙於孺子墓隧種松太守謝景于墓側立碑晉永安中太守夏侯暠於碑傍立思賢亭世世修治至拓拔魏時謂之聘君亭今亭尚存而湖南小洲世不知其嘗為孺子宅又嘗為臺也予為太守之明年始即其處結茒為堂圖孺子像祀以中牢率州之賓屬拜焉孺子名稚南昌人髙尚不仕太尉黄瓊辟不就桓帝問尚書令陳蕃徐稚袁宏誰為先後蕃答袁生公族不鏤自彫至於徐稚傑出薄俗故宜為先桓帝備禮徵之不至後漢書徐穉傳桓帝問陳蕃曰徐穉袁閎韋著孰為先後蕃對曰閎生出公族聞道漸訓著長於三輔禮義之俗所謂不扶自植不鏤自彫至於徐穉者爰自江南卑薄之域而角立傑出宜當為先太原郭林宗有母憂穉往弔之置生蒭於廬前而去衆不知其故林宗曰必孺子也詩云生蒭一束其人如玉吾無德以堪之年七十二卒贛水又逕谷何氏改句鹿洲舊作大艑處北堂書鈔云豫章城西有䑦􅑳洲去度支步可二里是吕蒙作䑦􅑳大艑處廣雅䑦􅑳船也此作谷鹿未詳贛水又北逕南昌縣城西於春秋屬楚即令尹于蕩師于豫章者也秦以為廬江南部漢髙祖六年始命灌嬰以為豫章郡治此即灌嬰所築也何氏云灌嬰當作陳嬰漢書髙惠功臣表堂邑侯陳嬰定豫章浙江都漸按何氏以意改陳嬰恐非是灌嬰傳亦有定豫章之文則酈注恐不誤也又按通典豫章有灌嬰城亦云灌嬰所築王莽更名縣曰宜善郡曰九江焉劉歆云湖漢等九水入彭蠡故言九江矣陳蕃為太守署徐稚為功曹蕃在郡不接賔客唯穉來特設一榻去則懸之此即懸榻處也建安中更名西安晉又名為豫章城之南門曰松楊門門内有樟樹髙七丈五尺大二十五圍枝葉扶疎垂隂數畝應劭漢官儀曰豫章郡樹生庭中故以名郡矣此樹嘗中枯逮晉永嘉中一旦更茂豐蔚如初咸以為中宗之祥也禮斗威儀曰君政訟平豫章常為生太興中元皇果興大業於南故郭景純南郊賦云弊樟擢秀於祖邑是也以宣王祖為豫章故也晉書宣帝紀曽祖量字公度官豫章太守贛水北出際西北厯度支步是晉度支校尉立府處步即水渚也贛水又逕郡北為津步步有故守要明當作賈萌復漏廟字賈萌廟在今新建縣治北與安成侯張普爭地為普所害即日靈見津渚故民為立廟焉太平御覽引安成記云賈萌為豫章太守與安成侯張普爭境戰于新茨之野為普所害與此正同而謝承漢書則云賈萌為豫章太守王莽簒漢舉兵誅莽不克而死與此異水之西㟁有磐石謂之石頭津步之處也西行二十里曰散原山疊障四周杳邃有趣晉隆安末沙門竺曇顯建精舎於山南僧徒自逺而至者相繼焉西北五六里有洪井飛流懸注其深無底舊說洪崕先生之井也北五六里有風雨池言山髙瀨激激著樹木樹木二字疑譌霏散逺灑若雨西有鸞罡洪崕先生乘鸞所憇泊也罡西有鵠嶺云王子喬控鶴所逕過也有二崕疑當作峯號曰小簫按項本作號曰大簫小簫言簫史所逰萃處也雷次宗云此乃繫風捕影之論據實本所未辨聊記奇聞以廣井魚之聽矣又案謝莊詩莊嘗逰豫章觀井賦詩言鸞罡四周有水謂之鸞陂似非虚論矣東疑漏去字太湖二字疑十里二百二十六步北與城齊南縁迴折至南塘本通大江增減與江水同漢永元中太守張躬築塘以通南路兼遏此水冬夏不増減水至清深魚甚肥美每於夏月江水溢塘而過居民多被水害至宋景平元年太守蔡君西起堤開塘為水門水盛則閉之内多則洩之自是居民少患矣贛水又東北逕王步步側有城云是孫奮為齊王鎮此城之渚呉志孫奮字子揚權仲姬之子也太元二年立為齊王權薨諸葛恪秉政移奮南昌今謂之王步葢齊王之渚步也郡東南二十餘里又有一城號曰齊王城築道相通葢其離宫也贛水又北逕南昌左尉廨西漢帝時九江梅福為南昌尉居此後福一旦捨妻子去九江傳云得僊贛水又北逕龍沙西沙甚潔白髙峻而陁有龍形連亘五里中舊俗九月九日升髙處也昔有人於此沙得故冡刻磚題云西去江七里半筮言其吉卜言其凶而今此冡垂没于水所謂筮短龜長也贛水又逕郴丘城下建安四年孫䇿所築也雷次宗豫章記云建安四年孫䇿破劉勲於潯陽欲謀取豫章太守華歆于郡下流一百四十里臨江築椒丘城以備之江表傳云孫䇿在椒丘遣虞翻華歆即其地也今在南昌府城一百四十里贛水又厯釣圻邸閣下度支校尉治太尉陶侃移置此也舊夏二字疑譌月邸閣前洲沒去浦逺景平元年校尉豫章因運出之力疑作别於渚次聚石為洲長六十餘丈洲裏可容數十舫贛水又北逕鄡陽縣鄡陽漢屬豫章郡晉屬鄱陽郡劉宋時廢故城在今饒州府西一百四十里王莽豫章縣也餘水注之水東出餘汗縣今饒州府餘干樂平等縣王莽名之曰治干也餘水北至鄡陽縣注贛水贛水又與鄱水合水出鄱陽縣東今為饒州府治故城在府城東六十里西逕其縣南武陽鄉也地有黃金可采王葬改曰鄉亭孫權以建安十五年分為鄱陽郡水上當有鄱字水又西流注於贛又有僚水入焉其水導源建昌縣今屬南康府漢元帝永光二年分海昏立僚水東逕新呉縣今為南昌奉新縣漢中平中立僚水又逕海昏縣王莽更名宜生謂之上僚水又謂之海昏江分為二水縣東津上有亭為濟渡之要其水東北逕昌邑而東出豫章大江謂之曰慨漏口字今南康府建昌縣西六十里有昌邑城豫章大江謂潯陽江也昔漢昌邑王之封海昏也每乘流東望輒憤慨而還世因名焉豫章記曰昌邑城東十三里縣列江邊名慨口出豫章大江之口也其一水枝分别注入于循一作修水按修循二字古通用水也又北過彭澤縣西今南康府治及九江府彭澤縣循水出艾縣而東北逕豫章寧縣故西安也晉太康元年更從今名循水又逕疑衍東北逕永循縣今南康府安義縣西南四十里有永修廢縣漢靈帝中平二年立循水又東北注贛水其水總納十川同溱疑譌宋本作凑一瀆俱注於彭蠡也北入于江大江南贛水總納洪流東西四十里而清潭逺漲緑波凝浄而㑹注于江川禹貢錐指以今輿地言之贛水自湖廣郴州宜章縣流入江西崇義縣界厯上猶南康並屬南安府贛縣贛州府治萬安泰和廬陵吉水永豐並屬吉安府峡江新淦清江並屬臨江府豐城至南昌入彭蠡湖並屬南昌府又北厯星子都昌並屬南康府德化湖口並屬九江府注於大江春夏時彭蠡浩蕩無涯及乎霜降水涸則贛川如帶而巳此水自昔有南江之稱鄭康成說三江云右㑹彭蠡為南江南史王僧辨傳陳霸先自嶺南起兵討侯景出南江行至湓口胡三省曰贛水謂之南江唐張九齡都督洪州有望江南入始興郡路詩又有自豫章南還江上作云歸去南江水磷磷見底清豫章水之為南江其来已久非宋人臆說也廬江水出三天子都北過彭澤縣西北入于江山海經三天子都一曰天子鄣王彪之廬山賦叙曰廬山彭澤之山也雖非五嶽之數穹隆嵯峨實峻極之名山也孫放廬山賦曰尋陽郡南有廬山九江之鎮也臨彭蠡之澤按平敞之原山圖曰山四方周四百餘里疊鄣之巖萬仞懐靈抱異包諸僊跡豫章舊志曰廬俗字君孝本姓匡父東野王共鄱陽令呉芮佐漢定天下而亡漢封俗於鄡陽曰越廬君俗兄弟七人皆好道術遂㝢精於洞庭何氏改宫亭之山故世謂之廬山漢武帝南巡覩山以為神靈封俗大明公逺法師廬山記曰殷周之際匡俗先生奚道何氏據後漢書注改受道僊人其逰此山時人謂其所止為神僊之廬因以名山矣又案周景式曰廬山匡俗字子孝本東里子出周武王時生而神靈屢逃徴聘廬於此山時人敬事之俗後化僊空廬尚存弟子覩室悲哀哭之旦暮同烏號世稱廬君故山取號焉斯乃傳聞之談非實證也故豫章記以廬為姓因廬以氏周氏逺師或託廬墓為辭假慿虚以託稱二證旣違三情互爽按山海經創志大禹記録逺矣故海内東經曰廬山出三天子都入江彭澤西是曰廬江之名山水相依互舉殊稱明不因匡俗始正是好事君子强引此類用成章句耳又按張華博物志曹著傳其神自云姓徐受封廬山後呉猛經過山神迎猛猛語曰君王此山近六百年符命巳盡不宜久居非據猛又贈詩云仰矚列僊館俯察王神宅曠載暢幽懐傾葢付三益此乃神道之事亦有換轉理難詳矣呉猛隱山得道者也尋陽記曰廬山上有三石梁長數十丈廣不盈尺杳然無底呉猛將弟子登山過此梁見一翁坐桂樹下以玉盃承甘露漿與猛又至一處見數人為猛設玉膏猛弟子竊一寶欲以來示世人梁即化如指猛使送寶還手牽弟子令閉眼相引而過其山川明淨風澤清曠氣爽節和土沃民逸嘉遁之士繼響窟巖龍潛鳯采之賢往者㤀歸矣秦始皇漢武帝及太史公司馬遷咸升其巖望九江而眺鍾彭焉廬山之北有石門水水出嶺端有雙石髙竦其狀若門因有石門之目焉水導雙石之中懸流飛㴻近三百許步下散漫數十步上望之連天若曵飛練于霄中矣下有磐石可坐數十人冠軍將軍劉敬宣每登陟焉其水厯澗逕龍泉精舎南太元中沙門釋惠逺所建也其水下入江嶺南即彭蠡澤西天子障也峰蹬險峻人跡罕及晉廬山諸道人逰石門詩序云石門在精舎南十餘里一名障山基連大嶺體絶衆阜闢三泉之㑹並立而開流傾巖𤣥映其上蒙形表於自然故因以為名此雍廬山之一隅實斯地之奇觀皆傳之於舊俗而未覩者衆將由懸瀨險峻人獸迹絶逕迴曲阜路阻行艱故罕經焉嶺南有大道順山而下有若畫焉傳云匡先生所通一作逰至江道巖上有宫殿故基者三以次而上最上者極於山峰山下又有神廟號曰宫亭廟故彭湖亦有宫亭之稱焉余按爾雅云大山曰宫何氏云爾雅以大山宫小山為句道元所引誤矣按爾雅釋大山宫小山霍郭注宫圍繞之也宋邢昺疏曰小山在中大山在外圍繞之山形如此者名霍非謂大山名宫小山名霍也據疏則道元所引固誤但酈是北魏時人邢是沛宋時人先後相去㡬五百年焉知不如酈氏作大山曰宫爲句乎豈先引在數百年之前者不可信而疏在數百年之後者反可信乎况景純之注亦僅曰宮圍繞之也初無以大山圍小山之說邢疏近乎穿鑿若果以宫小山為句則霍上當有曰字何之駁亦未允當兩存之可也宫之為名葢起於此不必一疑譌由三宫也山廟甚神能分風擘流住舟遣使行旅之人過必敬祀而後得去故曹毗咏云分風為貳擘流為兩昔呉郡太守張公直自守徵還道逰廬山子女觀祠婢指女戯妃像人其妻夜夢致聘怖而遽發明引中流而船不行合船驚懼曰愛一女而合門受禍公直不忍遂令妻下女於江其妻布席水上以其亡兄女代之而船得進公直方知兄女怒妻曰吾何面於當世也復下巳女於江中將度逕見二女於㟁側傍有一吏立曰吾廬君主簿敬君之義悉還二女故干寶書之於感應篇焉山東有石鏡照水之所出有一圓石懸崖明淨照見人形晨光初曜則延曜入石豪細必察故名石鏡焉又有二泉常懸注若白雲帶山廬山記曰白水在黄龍南即瀑布也水出山腹挂流三四百丈飛湍林表望若懸素注處悉巨井其深不測其水下入江淵廬山之南有上霄石髙壁緬然與霄漢連接秦始皇三十六年嘆斯岳逺遂記為上霄焉上霄之南大禹刻石誌其丈尺里數今猶得刻石之號焉湖中有落星石周迴百餘歩髙五丈上生竹木傳云有星墜此因以名焉又有孤石介立太湖中周迴一里竦立百丈矗然髙峻特為瓌異上生林木而飛禽罕集言其上有玉膏可採所未詳也耆舊云昔禹治洪水至此刻石紀功或言秦始皇所勒然歲月巳乆莫能辨之也水經注集釋訂訛卷三十九
