body:
  text: 水經注集釋訂訛卷二十五歸安沈炳巽撰泗水沂水洙氷泗水出魯卞縣今為兗州府泗水縣北山地理志曰出濟陰乗氏縣又云出卞縣北經言北山皆為非矣山海經曰泗氷岀魯東北余昔因公事沿歴徐沇路逕洙泗因令尋其源流水出卞縣故城東南桃墟西北春秋昭公七年謝息納季孫之言以孟氏成邑與晉而遷于桃杜預曰魯國卞縣東南有桃虛世謂之曰陶墟舜所陶處也井曰舜井皆為非也御覽引此作皆為此也虛有澤澤方一十五里渌水澄渟三丈上下疑有訛字如減澤西際阜俗謂之媯亭山盖有陶墟舜井之言因復有媯亭之名矣阜側有三石穴廣圓三四尺穴有通否水有盈漏數夕之中則傾陂竭澤矣御覽引此作阜側有三石穴廣圓三四尺穴有通否水有盈漏漏則數夕之中傾陂竭澤矣左右民居識其將漏預以木為曲狀約鄣穴口魚鱉暴鱗不可勝載矣自此連岡通阜西北四十許里岡之西際便得泗水之源也博物志曰四出陪尾盖斯阜者矣元和志泗水出泗水縣東陪尾山其源有四四泉俱導因以為名今縣東五十里有陪尾山縣志云陪尾山下有泗水神祠祠前有泉林寺寺之左右皆深林茂樹有大泉十數渟泓澂澈互相灌輸㑹而成溪是為泗水南逕卞城東有橋曰卞橋自卞橋西至縣城復有大泉數十南北交㑹入于泗水以達曲阜大抵縣境數十里内泉如星列皆泗水也石穴吐水五泉俱導泉穴各徑尺餘水源南側有一廟栝柏成林時人謂之原泉祠何氏云今十附㑹子在川上也即是此地盖因源泉之額故非所究也泗水西逕其縣故城南在今泗水縣闕五十里春秋襄公二十九年季武子取卞曰聞守卞者將叛臣率徒以討之是也南有姑薎城春秋隐公元年公及邾儀父盟于蔑者也水出二邑之間西逕郚城北春秋文公七年經書公伐邾三月甲戌取須句遂城郚杜預曰魯邑也卞縣南有郚城備邾難也泗水自汴而㑹于洙水也西南逕魯縣北今曲阜縣治即魯縣故城泗水又西南流逕魯縣分為二流水側為一城為二水之分㑹也北為洙瀆春秋莊公九年經書冬浚洙京相璠曰杜預並言洙水在魯城北浚深之為齊備也南則泗水夫子教於洙泗之間今於城北二水之中即夫子領徒之所也從征記曰洙泗二水交於魯城東北十七里闕里背洙泗牆南北一百二十步東西六十步四門各有石閫北門取洙水百步餘後漢初闕里荆棘自闢從講堂至九里鮑永為相因修饗祠以誅魯賊彭豐等郭縁生言泗水在城南非也余按國語宣公夏濫於泗淵里克斷罟棄之韋昭云泗在魯城北史記冢記王隠地道記咸言葬孔子於魯城北泗水上今泗水南有夫子冢春秋孔演圖曰鳥化為書孔子奉以告天赤爵銜書上化為黄玉刻曰孔提命化應法為赤制說題辭曰孔子卒以所受黄玉葬魯城北即子貢廬墓處也譙周云孔子死後魯人就冢次而居者百有餘家命曰孔里孔子墓在曲阜縣西北八里史記孔子世家孔子葬魯城西北泗上弟子皆服三年三年心喪畢相訣而去子貢廬於冢上凡六年然後去弟子及魯人往從冢而家者百有餘室因命曰孔里孔藂曰夫子墓塋方一里在魯城北六里泗水上諸孔氏封五十餘所人名昭穆不可復識有銘碑三所獸碣具存皇覽曰弟子各以四方竒木來植故多諸異樹不生棘木刺草今則無復遺條矣皇覽原文較此稍詳附録于後孔子冢去城一里冢塋百畝冢南北廣十歩東西十三步髙一丈二尺冢前以瓴甓為祠壇方六尺與地平冢塋中樹以百數皆異種魯人世世無能名其樹者民傳言孔子弟子異國人各持其方樹來種之其樹柞枌雒離女貞五味毚檀之樹孔子塋中不生荆棘及刺人草泗水自城北南逕魯城西南合沂水沂水出魯城東南尼丘山西北山即顔母所祈而生孔子也山東一十里有顔母廟山南數里孔子父𦵏處禮所謂防墓崩者也平地發泉流逕魯縣故城南水北東門外即爰居所止處也國語曰海鳥曰爰居止於魯城東門之外三日臧文仲祭之展禽譏焉故莊子曰海鳥止郊魯侯觴之奏以廣樂具以太牢三日而死此養非所養矣門郭之外亦戎夷死處吕氏春秋曰昔戎夷違齊如魯天大寒而後門與弟子宿於郭門外寒愈甚謂弟子曰子與我衣我活我與子衣子活我國士也為天下惜子不肖人不足愛弟子曰不肖人惡能與國士幷衣哉戎歎曰不濟夫解衣與弟子半夜而死沂水北對稷門昔圉人犖有力能投盖于此門服䖍曰能投千鈞之重過門之上也杜預謂走接屋之桷反覆門上也春秋僖公二十年經書春新作南門左傳曰書不時也杜預曰本名稷門僖公更髙大之今猶不與諸門同故左傳注作改名髙門也其遺基猶在地八丈餘矣亦曰雩門春秋左傳莊公十年公子偃請擊宋師竊從雩門䝉臯比而出者也門南隔水有雩壇壇髙三丈曾㸃所欲風舞處也髙門一里餘道西有道兒君碑是魯相陳君立昔曾參居此梟不入郭縣即曲阜之地少昊之墟有大庭氏之庫在今曲阜縣治東春秋豎牛之所攻也故劉公幹魯都賦曰戢武器於有災之庫朱云有災字誤玉海引此注作有炎是也古史考云大庭氏姜姓以火徳王號曰炎氏放戎馬於巨野之坰周成王封姬旦於曲阜曰魯秦始皇二十三年以為薛郡漢髙后元年為魯國阜上有季氏宅宅有武子臺今雖崩夷猶髙數丈臺西百步有大井廣三丈深十餘丈以石壘之石似磬制春秋宣按左傳當是定公公十二年公山不狃帥費人攻魯公入季氏之宫登武子之臺也臺之西北二里有周公臺髙五丈周五十步臺南四里許則孔廟即夫子之故宅也宅大一頃所居之堂後世以為廟漢髙祖十三年過魯以太牢祀孔子自秦燒詩書經典淪缺漢武帝時魯恭王壞孔子舊宅得尚書春秋論語孝經時人已不復知有古文謂之科斗書漢書疑作世或作時袐之希有見者于時聞堂上有金石絲竹之音乃不壞矣廟屋三間夫子在西門東向徵母朱本作顔母在中間南面夫人隔東一間東向夫子牀前有石硯一枚作甚朴云平生時物也魯人藏孔子所乗車於廟中是顔路所請者也獻帝時廟遇火燒之永平中鍾離意為魯相到官出私錢萬三千文付户曹孔訢治夫子車身入廟拭几席劍履男子張伯除堂下草土中得玉璧七枚伯懷其一以六枚白意意令主簿安置几前孔子寢堂牀首有懸甕意召孔訢問何等甕也對曰夫子甕也背有丹書人勿敢發也意曰夫子聖人所以遺甕欲以懸示後賢耳發之中得素書文曰後世修吾書董仲舒護吾車拭吾履發吾笥㑹稽鍾離意璧有七張伯藏其一意即召問伯果服焉魏黄初二年文帝令郡國修起孔子舊廟置百夫吏卒廟有夫子像列二弟子執卷立侍穆穆有詢仰之容漢魏以來廟列七碑二碑無字栝柏猶茂廟之西北二里有顔母廟廟像猶嚴有修栝五株孔廟東南五百步有雙石闕日知録云水經注孔廟東南有雙石闕故名闕里按春秋定公二年夏五月壬辰雉門及兩觀災冬十月新作雉門及兩觀注雉門公宫之南門兩觀闕也禮記昔者仲尼與于蜡賓事畢出㳺于觀之上史記魯世家煬公築茅闕門盖闕門之下其里即名闕里而夫子之宅在焉亦謂之闕黨魯論有闕黨童子荀子仲尼居於闕黨是也後人有以居為氏者漢書儒林傳有鄒人闕門慶忌注云姓闕門名慶忌即靈光之南闕北百餘步即靈光殿基東西二十四丈南北十二丈髙丈餘東西廊廡别舍中門方七百餘步闕之東北有浴池方四十許步池中有鈞臺方十步池臺悉石也遺基尚整故王延夀賦曰周行數里仰不見日者也是漢景帝程姬子魯恭王之所造也殿之東南即泮宫也在髙門直北道西宫中有臺髙八十尺臺南水東西一百步南北六十步臺西水南北四百步東西六十步臺池咸結石為之詩所謂思樂泮水也沂水又西逕圓丘北丘髙四丈餘沂水又西流昔韓雉射龍於斯水之上尸子曰韓雉見申羊於魯有龍飲於沂韓雉曰吾聞也出見虎搏之見龍射之今弗射是不得行吾聞也遂射之沂水又西右注泗水者也又西過瑕丘縣東今滋陽縣西有瑕丘故城元和志瑕丘縣泗水東自曲阜縣界流入與洙水合屈從縣東南流漷水從東來注之瑕丘魯邑春秋之負瑕矣襄公七年按傳當是哀公七年季康子伐邾囚諸負瑕是也應劭曰瑕丘在縣西南昔衛大夫公叔文子升於瑕丘蘧伯玉從文子曰樂哉斯丘死則我欲葬焉伯玉曰吾子樂之則瑗請前刺其欲害民良田也瑕丘之名盖因斯以表稱矣曾子弔諸負夏鄭元皇甫謐並言衛地魯衛雖殊土則一也漷水出東海合鄉縣漢和帝永寧九年封馬光子復為侯國其水西南流入邾春秋襄公二年按傳當是哀公二年季孫斯伐邾取漷東田及沂西田是也漷水又逕魯國鄒山東南而西南流春秋左傳所謂嶧山也邾文公之所遷今城鄒山之陽依巖岨以墉固故邾婁之國曹姓也叔梁紇之邑也孔子生於此後乃縣之因鄒山之名以氏縣也王莽之鄒亭矣京相璠曰地理志嶧山在鄒縣北繹邑之所依以為名也山東西二十里髙秀獨出積石相臨殆無土壤石間多孔穴洞達相通往往有如數間屋處其俗謂之嶧孔遭亂輒將居人入嶧外冦雖衆無所施害永嘉中太尉郗鑑將鄉曲逃此山胡賊攻守不能得今山南有大嶧名曰郗公嶧山北有絶巖秦始皇觀禮於魯登於嶧山之上命丞相李斯以大篆勒銘山嶺名曰晝門朱曰山東通志作書門詩所謂保有鳬繹者也漷水又西南逕蕃縣故城南今為兗州府滕縣又西逕薛縣故城北在今滕縣四十里地理志曰夏車正奚仲之國也竹書紀年梁惠成王三十一年邳遷于薛改名徐州城南山上有奚仲冢晉太康地記曰奚仲冢在城南二十五里山上百姓謂之神靈也齊封田文於此號孟嘗君有惠喻當作譽即馮瑗焚劵事也今郭側猶有文冢在今滕縣南五十里結石為郭作制嚴固瑩麗可尋行人往還莫不逕觀以為異見矣漷水又西逕仲虺城北晉太康地記曰奚仲遷於邳仲虺居之以為湯左相其侯當周爵稱侯後見侵削霸者所絀為伯任姓也應劭曰邳存薛宋本作邳在薛徐廣史記音義曰楚元王子郢以呂后三年封上邳侯也按史表楚元王子郢客于吕后二年封上邳侯今漏客字二年訛作三年有下故此為上矣晉書地道記曰仲虺城在薛城西三十里漷水又西逕至湖陸縣入于泗故京相璠曰薛縣漷水首受蕃縣西注山陽湖陸是也經言瑕丘東誤耳又南過平陽縣西縣即山陽郡之南平陽縣也竹書紀年曰梁惠成王二十九年齊田盼及宋人伐我東鄙圍平陽者也王莽改之曰黽平矣泗水又南逕故城西平陽故城在今鄒縣西世謂之漆鄉應劭十三州記乃王義仲所著注中屢見此云應劭誤十三州記曰漆鄉邾邑也杜預曰平陽東北有漆鄉漷今見有故城西南方二里所未詳也又南過髙平縣西洸水從北西來流注之泗水南逕髙平山山東西十里南北五里髙四里與衆山相連其山最髙頂上方平故謂之髙平山縣亦取名焉泗水又南逕髙平縣故城西髙平故城在今鄒縣南漢宣帝地節三年封丞相魏相為侯國髙帝七年封將軍陳錯為橐侯地理志曰縣故山陽之橐也史漢表俱作槀侯史表索隠曰漢志屬山陽漢表師古曰槀音公老反但漢志山陽郡有橐縣而無槀縣橐縣下臣瓚曰音拓彼此互異可見傳冩之誤自古而然雖以顔師古尚不及檢地志臣瓚之音漫承二表傳冩之訛而音之曰公老反則讀書者其可不細乎王莽改曰髙平應劭曰章帝改按本志曰王莽更名章帝因之矣所謂洸水者洙水也盖洸洙相入受通稱也又南過方輿縣東漢書晉灼曰音房豫漢哀帝建平四年縣女子田無嗇生子先未生二月兒啼腹中及生不舉葬之陌上三日人過聞啼聲母掘養之荷水從西來注之何氏云菏荷古通荷水即沛當作泲水之所苞注以成湖澤也而東與泗水合於湖陵縣西六十里穀庭城下俗謂之黄水口黄水西北通巨野澤盖以黄水沿注于荷故因以名焉按菏水入泗經言在方輿縣東注云在湖陵縣西必二縣以是水為界非有兩處也今魚臺縣北有方輿故城縣東南有湖陵故城與沛縣接界湖陵秦置後漢章帝改曰湖陸又屈東南過湖陸縣南洧涓水宋本作涓涓水從東北來流注之地理志曰故湖陵縣也菏水在南王莽更曰湖陸應劭曰尚書一名湖陵漢志應劭曰尚書一名湖無陵字章帝封東平王蒼子為湖陵侯更名湖陵也後漢書郡國志云山陽郡湖陸故湖陵章帝更名則此之湖陵當作湖陸泗水又東逕郗鑒所築城北又東逕湖陸城東南昔桓温北入也范懽擒慕容忠於此城東有度尚碑泗水又左㑹南梁水地理志曰水出蕃縣今縣之東北平澤出泉若輪焉發源成川西南流分為二水北水枝西出逕蕃縣北西逕滕城北春秋左傳隠公十一年滕侯薛侯來朝爭長薛侯曰我先封滕侯曰我周之卜正也薛庶姓也我不可以後之公使羽父請薛侯曰君辱在寡人周諺有之曰山有木工則度之賓有禮主則擇之周之宗盟異姓為侯寡人若朝于薛不敢與諸任齒君若辱貺寡人則願以滕君為請薛侯許之乃長滕侯者也漢髙帝封夏侯嬰為侯國號曰滕公鄧晨曰今沛郡公丘也其水又溉公丘焉縣故城在滕西北按地理志即滕也周懿王子錯叔繡文公所封也漢書地理志沛郡公丘縣注云故滕國周懿王子錯叔繡所封三十一世為齊所滅師古曰左氏傳云郜雍曹滕文之昭也系本亦云錯叔繡文王子而此志云懿王子未詳其義耳齊滅之秦以為縣漢武帝元朔三年封魯恭王子劉順為侯國世以此水溉我良田遂及百秭故有兩溝之名焉南梁水自枝渠西南逕魯國蕃縣故城東俗以南隣於漷亦謂之西漷水南梁水又屈逕城南應劭曰縣古小邾邑也地理志曰其水西流注于沛以下沛字何氏俱改泲沛在湖陸西而左注西疑作泗泗沛合流故地記或言沛入泗泗亦言入沛互受通稱故有入沛之文闞駰十三州志曰西至湖陸入泗是也經無南梁之名而有洧原本作涓下同涓之稱疑即是水也戴延之西征記亦言湖陸縣之東南有洧涓水亦無記於南梁謂是呉王所道之瀆也余按湖陸西南止自宋本作有是水延之盖以國語云呉王夫差起師將北㑹黄池掘溝於商魯之間北屬之沂西屬于沛以是言故是水為呉王所掘非也余以水路求之止自泗川耳盖北達沂西北逕於商魯而接於沛呉所浚廣耳非謂起自東北受沂西南注沛也假之有通非呉所趣年載誠𦕈人情厠近以今忖古知延之之不通情理矣泗水又南漷水注之又逕薛之上邳城西漢志魯國薛縣而南注者也又南過沛縣東今屬江南徐州府東元和志沛縣泗水自西北流入去縣五十步昔許由隠於沛澤即是縣也縣盖取澤為名宋滅屬楚在泗水之濱於秦為泗水郡治黄水注之黄水出小黄縣黄鄉黄溝國語曰呉子㑹諸侯於黄池者也黄水東流逕外黄縣故城南在今開封府杞縣東北漢志師古曰左氏傳曰惠公伐宋師于黄杜氏以為外黄縣東有黄城即此地也又魏郡内黄縣注應劭曰春秋呉子晉侯㑹于黄池今黄澤在縣西臣瓚曰國語曰呉子㑹諸侯于黄池掘溝于齊魯之間今陳留外黄有黄溝是也史記曰伐宋取黄池然則不得在魏郡明矣師古曰瓚說是也應說失之張晏曰魏郡有内黄縣故加外也薛瓚曰縣有黄溝故縣氏焉圈稱陳留風俗傳曰縣南有渠水於春秋為宋之曲棘里故宋之别都矣春秋昭公二十五年宋元公卒于曲棘是也杜預曰陳留外黄縣城中有曲棘里宋地宋華元居于稷里宣公十五年楚鄭圍宋晉解揚囚楚致命于此左傳宣公十五年公孫歸父㑹楚子于宋宋人使樂嬰齊告急于晉晉使解揚如宋使無降楚曰晉師悉起將至矣鄭人囚而獻之楚楚子厚賂之使反其言不許三而許之登之樓車使呼宋人而吿之遂致其君命宋人懼使華元乗闉夜入楚師登子反之床曰寡君使元以病告弊邑易子而食析骨以㸑城下之盟所不能也子反退一舍宋楚乃平今城東闉上猶有華元祠祀之不輟城北有華元冢黄溝自城南東逕葵丘下春秋僖公九年齊桓公㑹諸侯于葵丘宰孔曰按傳當作宰孔先歸遇晉侯曰可無㑹也齊侯不務徳云云齊侯不務徳而勤逺畧北伐山戎南伐楚西為此㑹東畧之不知西則否矣其在亂乎君務靖亂無勤於行晉侯乃還即此地也黄溝又東注大澤蒹葭莞葺生焉即世所謂大薺陂也陂水東北流逕定陶縣南又東逕山陽郡今兗州府成武縣之楚丘亭北今屬兗州府黄溝又東逕郜城何氏云當作成北成武縣故城南王莽更之曰成安也黄溝又東北逕郜城北春秋桓公二年經書取郜大鼎于宋戊申納于大廟左傳曰宋督攻孔父而取其妻殺殤公而立公子憑以郜大鼎賂公臧哀伯諫為非禮十三州志曰今成武縣東南有郜城俗謂之北郜者也黄溝又逕東平樂縣故城南又東右合泡水即豐水之上源也水上承大薺陂東逕貫城北又東逕己氏縣故城北王莽之已善也縣有伊尹冢崔駰曰殷帝沃丁之時時衍伊尹卒葬于薄皇覽曰伊尹冢在濟陰己氏平利鄉漢志己氏屬梁國郡國志屬濟陰平利鄉郡國志作平鄉皇甫謐曰伊尹年百餘歳而卒大霧三日沃丁葬以天子之禮親自臨喪以報大徳焉又東逕孟諸澤杜預曰澤在梁國睢陽縣東北逕郜城縣故城南地理志曰山陽縣也王莽更名之曰告城矣故世有南郜北郜之論也又東逕單父故城南今屬兗州府昔密子賤之治也孔子使巫馬期觀政入其境見夜漁者問曰子得魚輒放何也曰小者吾大夫欲長育之故也子聞之曰誠彼形此子賤得之善矣惜哉不齊所治者小也王莽更名斯縣為利善矣何氏云善當作父世祖建武十三年封劉茂為侯國又東逕平樂縣右合泡水漢志作包水下同水上承濰水於下邑縣今為夏邑縣屬歸徳府界東北注一水上承濰水於杼秋縣界故城在徐州府蕭縣西七十里北流世又謂之瓠盧溝水積為渚渚水東北流二渠雙引左合灃水俗謂之二泡也自下灃泡並得通稱矣故地理志曰平樂侯國也泡水所出又逕豐西澤謂之豐水漢書稱髙祖送徒麗山徒多亡到豐西澤有大蛇當徑拔劍斬之此即漢髙祖斬蛇處也又東逕大堰水分為二又東逕豐縣故城南今屬徐州府王莽之吾豐也水側城東北流右合枝水上承豐西大堰𣲖流東北逕豐城北東注灃水灃水又東合黄水時人謂之狂水盖狂黄聲相近俗傳失實也自下黄水又兼通稱矣水上舊有梁謂之泡橋王智深宋史云宋太尉劉義恭於彭城遣軍王朱云舊本作軍王呉本改作軍正並誤當作軍主六朝時每謂將帥為軍主如梁書韋燦令軍主鄭逸逆擊侯景是其例也稽元敬北至城覘候魏軍魏軍於清西望見元敬士衆魏南康侯杜道儁引趣泡橋沛縣民逆燒泡橋又於林中打鼓儁謂宋軍大至爭渡泡水水深酷寒凍溺死者殆半清水即泗水之别名也沈約宋書稱魏軍欲渡清西非也泡水又東逕沛縣故城南秦末兵起蕭何曹㕘迎漢祖於此城髙帝十一年封合陽侯劉仲子為侯國城内有漢髙祖廟廟前有三碑後漢立廟基以青石為之階陛尚存劉備之為徐州也治此袁術遣紀靈攻備備求救吕布布救之屯小沛招靈請備共飲布謂靈曰𤣥徳布弟也布性不喜合鬭但喜解鬭乃植㦸於門布彎弓曰觀布射㦸小支中者當各解兵不中可留決鬭一發中之遂解此即布射㦸攴處也述征記曰城極大四周塹通豐水豐水於城南東注泗即泡水也地理志曰泡水自平樂縣東北至沛漢志作泲入泗者也泗水南逕小沛縣東縣治故城南垞上東岸有泗水亭漢祖為泗水亭長即此亭也元和志泗水亭在沛縣東南一里按寰宇記沛縣東南㣲山下有故沛城尚存後漢書吕布傳注云小沛即沛縣也故亭今有髙廟廟前有碑延熹十年立廟闕崩褫畧無全者水中有故石梁處遺石尚存髙祖之破黥布也過之置酒沛宫酒酣歌舞慷慨傷懷曰逰子思故鄉也泗水又東南逕流廣戚縣故城南在今沛縣東北漢武帝元朔元年封劉澤為侯國史表元朔元年封魯恭王子擇為廣戚侯漢表作劉將今云澤誤王莽更之曰力聚也泗水又逕留縣而南逕垞城東元和志故留城在沛縣東南五十五里故垞城在彭城縣北二十六里兗州人謂實中城曰垞也今徐州北有垞城垞音茶城西南有崇侯虎廟道淪遺愛不知何因而逺有此圖泗水又南逕宋大夫桓魋冢西山抗泗水上而盡石鑿而為冢今人謂之石郭者也郭有二重石作工巧夫子以為不如死之速朽也又東南過彭城縣東北泗水西有華龍寺是沙門釋法顯逺出西域浮海東還持龍華圖首創此制法流中夏自法顯始也其所持天基二石仍在南陸上下疑有訛字東基堪中其石尚光潔可愛泗水又南淮水入焉而南逕彭城縣故城東故城在今徐州東南周顯王四十二年九鼎淪沒泗淵秦始皇時而鼎見於斯水始皇自以徳合三代大喜使數千人投疑作沒水求之不得所謂鼎伏也亦云系而行之未出龍齒齧斷其系故語曰稱樂大早絶鼎系當是孟浪之傳耳泗水又逕龔勝墓南墓碣尚存又經亞父冢東皇覽曰亞父冢在廬江縣郭東今在徐州城南居巢亭中有亞父井吏民親事皆祭亞父於居巢亭上後更造祠於郭東至今祀之按漢書項羽傳歴陽人范增未至彭城而發疽死不言之居巢今彭城南有項羽掠馬臺臺之西南山麓上即其冢也增不慕范蠡之舉而自絶於斯可謂褊矣推考書墓事近於此也又東南過吕縣南吕宋邑也春秋襄公元年晉師伐鄭及陳楚子辛救鄭侵宋吕留是也縣對泗水漢景帝三年有白頸烏與黑烏羣鬭於縣白頸烏不勝墮泗水中死者數千京房易傳曰逆親親厥妖白黑烏鬭時有呉楚之反泗水之上有石梁焉故曰吕梁也昔宋景公以弓工之弓彎弧東射矢集彭城之東飲羽於石梁即斯梁也懸濤漰渀實為泗嶮孔子所謂魚鼈不能逰又云懸水三十仞流沬九十里今則不能也元和志吕梁在彭城縣東南五十七里按今徐州北有吕梁故城州志吕梁山在州東南五十里山下即吕梁洪也有上下二洪相去凡七里巨石齒列波濤洶湧明嘉靖二十三年管河主陳洪範鑿吕梁洪平之自是運道益便盖惟嶽之喻未便極天明矣晉太康地記曰水出磬石書所謂泗濱浮磬者也泗水又東南流丁溪水注之溪水上承泗水於吕縣東南流北帶廣隰山髙而注于泗川泗水冬春淺澀常排沙通道是以行者多從此溪即陸陸下疑有璣字賦所云乗丁水之捷岸排泗川之積汝者也晉太元九年左將軍謝𤣥於吕梁遣督護聞人奭用功九萬擁水立七拖以利運漕者朱云拖當作埭晉書謝𤣥傳用督護聞人奭謀堰吕梁水樹柵立七埭為𣲖擁二岸之流以利運漕又東南過下邳縣西今為淮安府邳州泗水歴縣逕葛嶧山東元和志嶧陽山在下邳縣西六里泗水西自彭城縣界流入即奚仲所遷邳嶧者也泗水又東南逕下邳縣故城西不邳故城在今邳州東三十里東南流沂水流納注焉故東海屬縣也應劭曰奚仲自薛徙居之故曰下邳也漢徙齊王韓信為楚王都之後乃縣焉王莽之澗漢志作閏嶮矣東陽郡治文潁曰秦嘉下疑有脫字東陽郡今下邳是也晉灼曰東陽縣本屬臨淮郡明帝分屬下邳後分屬廣陵故張晏曰東陽郡今廣陵郡也漢明帝置下邳郡矣城有三重其大城中有司馬石苞鎮東將軍胡質司徒王渾監軍石崇四碑南門謂之白門魏武擒陳宫於此處矣中城呂布所守也小城晉中興北中郎將荀羨郄曇所治也昔太山呉伯武少孤與弟文章相失二十餘年遇於縣市文章欲歐伯武心神悲痛因相尋問乃兄弟也風俗通云泰山呉文章少與伯武相失二十年後㑹下邳市爭鬥伯武歐之文章不忍報更相借問乃親兄也文章後官陳留太守縣為沂泗之㑹也又有武原水注之水出彭城武原縣西北㑹注陂南逕其城西王莽之樂亭也縣東有徐廟山山因徐徙以即名之也山上有石室徐廟也武原水又南合武水謂之泇水南逕剛亭城又南至下邳入泗謂之武原水口也又有桐水出西北東海容丘縣東南至下邳入泗泗水東南逕下相縣故城東王莽之從徳也城之西北有漢大尉陳球墓墓前有三碑是弟子管寧華歆等所造初平四年曹操攻徐州破之拔取慮睢夏丘等縣以其父避難被害於此屠其男女十萬泗水為之不流自是數縣人無行跡亦為暴矣泗水又東南得睢水口泗水又逕宿預城之西今宿遷縣東南有宿預故城又逕其城南故下邳之宿留縣也王莽更名之曰康義矣晉元皇之為安東也督運軍儲而為邸閣也魏太和中南徐州治後省為戍梁將張惠紹北入水軍所次憑固斯城更增修郭壍其四面引水環之今城在泗水之中也又東南入于淮泗水又東逕陵柵南西征記曰舊陵縣之治也漢志泗水國有淩縣其故城在今宿遷東南泗水又東南逕淮陽城今桃源縣西北有淮陽故城城北臨泗水昔菑丘訢飲馬斬蛟眇目於此處也韓詩外傳東海有勇士菑丘訢過神泉飲馬馬為蛟所取訢拔劍入水三日三夜殺二蛟而出雷神隨而撃之眇其左目呉越春秋作椒丘云訢為齊王使呉過淮津飲馬于淮水神取其馬訢大怒袒裼持劍入水求神大戰連日乃出眇其一目泗水又東南逕魏陽城北城枕泗川陸機行思賦曰行魏陽之枉渚故無魏陽疑即泗陽縣故城也今在桃源縣東王莽之所謂淮平亭矣盖魏文帝幸廣陵所由或因變之未詳也泗水又東逕角城北角城縣晉義熙中置故城在今清河縣西南而東南流注于淮考諸地說或言泗水於睢陵入淮亦云於下相入淮皆非實録也禹貢錐指曰泗水故道自徐城以南悉為黄河所占而淮不得擅㑹泗之名矣沂水出泰山盖縣艾山盖縣故城在青州府沂水縣西北七十里齊盖邑漢置縣屬泰山郡隋嘗于此置東安縣鄭康成云出沂山亦或云臨樂山水有三源南源所導世謂之柞泉北水所發俗謂之魚窮泉俱東南流合成一川禹貢錐指曰齊乗曰鄭康成云沂水出沂山按今䝉陰縣東北地名南河川小阜之下有曰狗泉此沂源也東南逕馬頭固山有泉東流與之合北望沂山五十里殊無别源疑沂山水源古流今竭耳明萬歴中傅履重著水利論曰沂源出蒙陰魯艾諸山皆涓滴細流自石罅中出經數十里近縣稍大而河形散漫不可灌溉渭按東鎮沂山在今青州府沂水縣北一百十里接臨朐縣界寰宇記云即東泰山也無沂源又雕崖山在縣西北一百七十里南接蒙陰縣界去縣治一百三十里沂水于此發源是謂狗泉盖即康成所謂沂山也黄子鴻云周禮青州鎮曰沂山鄭康成謂沂水所出今沂水實出雕崖山北去東泰山尚五十餘里則古沂山當即指此隋唐時始移沂山之名于東泰山而祀之以為東鎮其實二山不可混也子鴻此言甚覈臨樂艾山雕陰疑即沂山支阜之異名山跨䝉沂二縣之境故縣志各載為沂源耳齊乘之所謂狗泉者即北濟之魚窮泉其出馬頭固山者即南源之柞泉也右㑹洛預水水出洛預山東北流注之沂水東南左合桑預水水北出桑預山東流一作注于沂水沂水又東南螳螂水入焉出魯山東南流右注沂水沂水又東逕盖縣故城南東㑹連綿之水水發連綿山南流逕盖城東而南入沂沂水又東逕浮來之山今在莒州西三十里一名公來又名浮丘春秋經書公及莒人盟于浮來者也即公來山也在邳鄉西故號曰邳來之間也浮來之水注之其水左控三川右㑹甘泉而注于沂沂水又南逕爆山西山有二峯相去一里雙巒齊秀員峙若一沂水又東南逕東苑當作東莞下同漢志東莞縣屬琅邪郡今為沂水縣治縣故城西與沂水合孟康曰縣故鄴邑今鄴亭是也按漢志孟康曰縣故鄆邑今鄆亭是也此云鄴誤今沂水縣北有故鄆城漢武帝元朔二年封城陽共王弟史記作子吉為東苑侯按史漢表俱作東莞侯魏文帝黄初中立為東莞郡按晉書地志云太康元年分琅邪置東莞郡統縣八一曰東莞故魯鄆邑也此云黄初中立未詳東燕録謂之團城劉武帝北伐廣固登之以望王難朱云王難字誤當作五龍廣固有五龍口塞其口則城必陷詳具二十六卷魏南青州治左氏傳曰莒魯爭鄆為日多矣宋本作久矣今城北鄆亭是也京相璠曰琅邪姑幕縣姑幕故城在莒州境内漢縣屬琅邪郡北齊省入東莞南四十里員亭故魯鄆邑世變其字非也郡國志東莞有鄆亭今在團城東北四十里猶謂之故東莞城小沂水出黄孤山西南流逕其城北西南注于沂沂水又南與閭山水合水出閭山東南流右佩二水總歸於沂沂水南逕東安縣故城東在今沂水縣南五十里而南合時密水水出時密山莒地莒人歸共仲于魯及密而死是也密水東流逕東安城南漢封魯孝王子強為東安侯漢志東安縣屬東海郡王子侯表甘露四年封魯共王子彊為東安侯密水又東南流入沂沂水又南桑泉水北出五女山東南流巨圍水注之水出巨圍之山東南注于桑泉水桑泉水又東南堂阜水入焉其水導源堂阜春秋莊公九年管仲請囚鮑叔受之及堂阜而稅之杜預曰東莞蒙陰縣西北有夷吾亭者是也堂阜水又東南注桑泉水桑泉水又東南逕䝉陰縣故城北王莽之䝉恩也又東南與㟬崮水合水有二源雙㑹東導一川俗謂之汶水也東逕䝉陰縣注桑泉水又南東盧川水注之水出鹿嶺山東南流左則二川臻湊右則諸葛泉源斯疑訛奔亂流逕城陽之盧縣故盖縣之盧上里也漢武元朔二年封城陽共王弟劉稀為侯國按漢志城陽國有慮縣而無盧縣王子侯表劉稀封雷侯屬東海郡東海昌慮下云侯國此即稀所封之邑也師古曰音廬若盧則屬之泰山郡詳上文蒙陰下文盖縣句二縣俱屬泰山郡則此之盧縣當是泰山郡之盧縣無疑然又非劉稀所封之邑且慮雷古字通用若東海昌慮城陽之慮縣與雷不通實所不解至道元以城陽之慮縣為劉稀之封邑尢為無據王莽更名之曰著善矣又東南注于桑泉水桑泉水又東南右合䝉陰二水水出䝉陰山東北流昔瑯邪承宫避亂此山立性好仁不與物競人有認其黍者舍之而去東觀漢記承宫將妻子入華盖䝉陰山谷耕種禾黍人有認其黍者亦不與競捨之而去其水東北流入于沂沂水又南逕陽都縣故城東在今沂水縣西南縣故陽國也齊同盟齊利其地而遷之者也漢髙帝六年封將軍丁復為侯國沂水又南與蒙山水合水出䝉山之陰東流逕陽都縣南東注沂沂水又左合温水水上承温泉陂而西南入于沂水者也南過瑯邪臨沂縣東又南過開陽縣東沂水南逕中丘城西春秋隠公七年夏城中丘左傳曰書不時也沂水又南逕臨沂縣故城東城在今沂州北郡國志曰瑯邪有臨沂縣故屬東海郡有治水徳清胡渭曰舊本作洛水當從漢志改作治水下同按漢志泰山郡南武陽冠石山治水所出南至下邳入泗注之外出太山南武陽縣之冠石山地理志曰冠石山治水所出應劭地理風俗志曰武水出焉盖水異名也東流逕䝉山下有蒙祠治水又東南逕顓㬰城北郡國志曰縣有顓㬰城在費縣西北九十里季氏將伐之孔子曰昔者先王以為東䝉主社稷之臣也何以伐為冉有曰今夫顓㬰固而便近於費者也治水又東南流逕費縣故城南今屬兗州府故城在縣西北二十里地理志東海之屬縣也為魯季孫之邑子路將隳之公山弗擾率師襲魯弗克後季氏為陽虎所執弗擾以費畔即是邑也漢髙帝六年封陳賀為侯國王莽更名之曰順從也許慎說文云沂水出東海費縣東西入泗東西字疑有訛誤字典引此作西南入泗從水斤聲吕忱字林亦言是矣斯水東南所注者沂水在西不得言東南趣也皆為謬矣故世俗謂水為小沂水宋慶歴間沂州修城碑云大小二沂環流外轉而小沂尢湍于西北平日波如簞紋清淺可愛及山雨水至如百萬陣馬摩壘而來謂此水也治水又東南逕祊城南春秋𨼆公八年鄭伯請釋太山之祀而祀周公使宛歸泰山之祊而易許田杜預釋地曰祊鄭祀泰山之邑也在瑯邪費縣東南治水又東南流注于沂沂水又南逕開陽縣故城東在今沂州北縣故鄅國也春秋左傳昭公十八年邾人襲鄅盡俘以歸鄅子曰余無歸矣從孥于邾是也後更名開陽矣春秋哀公三年經書季孫斯叔州仇帥師城啟陽者是矣縣故瑯邪郡治也又東過襄賁縣東今沂州東南有襄賁故城賁音肥屈從縣南西流又屈南過郯縣西魯連子稱陸子謂齊湣王曰魯費之衆臣甲舍于襄賁者也王莽更名章信也郯故國也少昊之後春秋昭公十七年郯子朝魯公與之宴昭子叔孫婼問曰少昊鳥名官何也郯子曰吾祖也我知之黄帝炎帝以雲火紀官太皥以龍紀少皥瑞鳳鳥統歴鳥官之司議政斯在孔子從而學焉既而告人曰天子失官學在四夷者也此與左傳稍異竹書紀年晉烈公四年越子末句滅郯以郯子鴣歸竹書紀年作烈公六年於越子朱句滅郯以郯子鵠歸縣故舊魯也東海郡治秦始皇以為郯郡漢髙帝二年更從今名即王莽之沂平者也又南過良城縣西今邳州北有良城縣故城又南過下邳縣西今邳州東三十里有下邳故城南入于泗春秋左傳曰昭公十三年秋晉侯㑹呉子于良呉子辭水道不可以行晉乃還是也地理志曰良城王莽更名承翰矣沂水於下邳縣北西流分為二水一水於城北西南入泗一水逕城東屈從縣南亦注泗謂之小沂水水上有橋徐泗間以為圯昔張子房遇黄石公於圯上即此處也邳州志曰沂河舊在州西一里今其道為黄流淤塞水自郯城入運河建安二年曹操圍吕布於此引沂泗灌城而擒之禹貢錐指曰以今輿地言之沂水出沂水縣歴沂州郯城至邳州合泗水又東南至清河縣入淮洙水出泰山盖縣臨樂山地理志曰臨樂山洙水所出西北至盖入泗水或作池字盖字誤也洙水自山西北逕盖縣漢景帝中元五年封后兄信為侯國又西逕太山東平陽縣春秋宣公八年冬城平陽杜預曰今太山平陽縣是也河東有平陽故此加東矣晉武帝元康九年改為新泰縣也西南至卞縣入于泗洙水西南流盗泉水注之泉出卞城東北卞山之陰尸子曰孔子至於暮矣按尸子作孔子至于勝母暮矣而不宿勝母縣名此漏勝母二字不宿下漏至字而不宿于盜泉渇矣而不飲惡其名也故論撰考讖曰水名盜泉仲尼不潄即斯泉矣西北流注于洙水洙水又西南流于卞城西泗水亂流西南至魯縣東北又分為二水水側有故城兩水之分㑹也洙水西北流逕孔里此是謂洙泗之間矣春秋之浚洙非謂始導矣盖深廣之耳洙水又西南枝津出焉又南逕瑕丘城東而南入石門門右結石為水門跨於水上也西南流世謂之杜武溝洙水又西南逕南平陽縣之顯閭亭西邾邑也春秋襄公二十一年經書邾庶其以漆閭丘來奔者杜預曰平陽北有顯閭亭十三州記曰山陽南平陽縣又有閭丘鄉從征記曰杜謂顯閭丘也今按漆鄉在縣東北十里見有閭丘鄉顯閭非也然則顯閭自是别亭未知孰是又南洸水注之吕忱曰洸水出東平上承汶水於崗縣西闡亭東爾雅曰汶别為闡其曰洛之波矣洸水西南流逕盛鄉城西京相璠曰崗縣西南有盛鄉城者也又南逕太山寧陽縣今屬兗州府故城西漢武帝元朔三年封魯恭王子劉恬按史表當作劉恢為侯國王莽改之曰寧順也又南洙水枝津注之水首受洙西南流逕瑕丘城北又西逕寧陽城南又西南入于洸水洸水又西南逕太山郡乗丘縣故城東趙肅侯二十年韓將舉與齊魏戰于桑丘即此縣也史記趙世家肅侯二十三年韓舉與齊魏戰死于桑丘注曰地理志云泰山有桑丘縣正義曰括地志云桑丘城在易州遂城縣界或云在泰山非也此時齊伐燕桑丘三晉皆來救之不得在泰山有桑丘縣此說甚誤云云炳巽按泰山郡有乗丘縣恐是史誤乗作桑耳漢武帝元朔五年封中山靖王子劉將夜侯國也洸水又東南流注于洙水又上當有洙水字又南至髙平南入于泗水西有茅鄉城東去髙平三十里京相璠曰今髙平縣西三十里有故茅鄉城者也水經注集釋訂訛卷二十五
