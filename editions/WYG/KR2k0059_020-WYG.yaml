部都尉屬蜀郡安帝時以為屬國都尉别領三城分廣漢蠻夷置有白馬水出長松縣西南而疑譌白馬漢疑作溪東北逕長松縣北而東北注白水白水又東逕隂平大城北蓋其渠帥自故城徙居也白水又東偃溪水出西南偃溪東北流逕偃城西胡引作北而東北流入白水白水又東逕偃城北又東北逕橋頭今文縣城東南有橋跨白水上即所謂隂平橋頭也蜀景曜五年姜維在沓中聞有魏師請䕶隂平橋頭以防未然即此沓中在今洮州衞西南昔姜維之将還蜀也雝州刺史諸葛緒邀之於此後期不及故維得保劔閣而鍾㑹不能入也白水又與羌水合自下羌水又得其通稱矣白水又東逕郭公城南昔郭淮之攻廖化於隂平也築之故因名焉白水又東雝川水出西南雝漢疑作溪東北注白水白水又東合空冷水傍溪西南窮谷即川源也白水又東南與南五部水㑹水有二源西源出五部溪東南流東源出郎谷西南合南注白水白水又東南逕建陽郡東而北與一水合二源同注共成三溪西南流入於白水白水又東南逕白水縣故城東城在今昭化縣西北九域志云縣有白水鎮即故縣治也即白水郡治也經云漢水出其西非也白水又東南與西谷水相得水出西溪東流逕白水城南東南入白水白水又南左㑹東流水東入極溪便即水源也白水又南逕疑漏武字興城東又東南左得剌稽水口溪東北出便水源矣白水又東南清水左注之庾仲雝曰清水自邪山宋本作祁山來合白水斯為孟浪也水出於平武郡東北矚累亘下南逕平武城東屈逕其城南又西歴平洛郡東南屈而南逕南陽郡東北又東北宋本作東南逕新巴縣東北又東南逕始平僑郡南又東南逕小劔戍北西去大劔三十里連山絶嶮飛閣涌一作通衢故謂之劔閣也劍閣在保寕府劍州北三十里兩岸峻㧞鑿石架閣而為棧道張載銘曰一人守嶮萬夫趦趄信然故李特至劔閣而嘆曰劉氏有如此地而面縛於人豈不奴才也小劔水西南出劔谷東北流逕其戍下入清水清水又東南注白水白水又東逕於吐費城南即西晉夀之東北也東南流注漢水西晋夀即蜀王弟葭萌所封為苴侯邑故遂城為葭萌矣劉備改曰漢夀太康中又曰晋夀水有津關元和志晋夀故城在利州益昌縣東南五十里本漢葭萌縣也此為西晋夀今在昭化縣界白水即桓水嘉陵江自陜西寕羌州界東南流逕四川廣元縣西又西南迳昭化縣東南又南逕劍州東又東南入倉溪縣界白水関在寕羌州西南九十里接昭化界東北去關城一百八十里段元章善風角弟子歸元章封筒藥授之曰路有急難開之生到葭萌従者與津吏諍打傷其破頭者可以此藥褁之生乃歎服還卒業焉按搜神記生到葭萌與吏争度津吏撾破従者頭生開筒得書言到葭萌與吏闘頭破者以此膏褁之云云如此文義始足此段似有脱文亦亷叔度抱父柩自沈處也後漢書亷范傳范字叔度京兆杜陵人也祖父丹王莽時為大司馬庸部牧范父遭䘮亂客死於蜀范疑流寓西州年十五辭母西迎父䘮歸葭萌載船石破没范抱持棺柩遂俱沉溺衆傷其義鈎求得之療救僅免於死又東南過巴郡閬中縣今屬四川保寕府巴西郡治也劉璋之分三巴此其一焉闞駰曰強水出陰平西北強山一曰強川姜維之還也鄧艾遣天水太守王頎敗宋本敗下尚有之字於強川即是也其水東北逕武都陰平梓潼南安入漢水漢水又東南逕津渠戍東又南逕閬中縣東閬水出閬陽縣而東逕其縣南又東注漢水昔劉璋之攻霍峻於葭萌也自此水上張逹范強害張飛於此縣漢水又東南得東水口水出巴嶺南歴獠中謂之東逰水李夀之時獠自牂牁北入所在諸郡布在山谷其水西南逕宋熈郡東後魏地形志益州有宋熈郡與巴州相比又東南逕平城東又東南逕巴西郡東又東入漢水漢水又東與濩溪水合水出獠中世亦謂之為清水也東南流注漢水漢水又東南逕宕渠縣東又東南合宕渠水水西北出鄭縣南巴嶺與槃余水同源派注南流謂之北水東南流與難水合水出東北巴山西南注之又東南流逕宕渠縣謂之宕渠水又東南入漢錐指引三巴記云閬白二水南流曲折三回如巴字即嘉陵江也自蒼溪縣界東南流逕閬中縣西南又東南逕南部縣東北又東南逕蓬州東又西南逕南充縣東又南入定逺縣界寰宇記云嘉陵水又名閬中水亦曰閬江亦曰渝水華陽國志曰閬中有渝水賨民多居水左右天性勁勇鋭􅂔善舞今所謂巴渝舞也宕渠故城在今渠縣東北七十里宕渠水亦名渠江重慶府志嘉陵江自定逺縣流入合州界又一百九十里合渠江又十里至州城東南合涪江又南四十里入巴縣酈道元以宕渠水為禹貢之潜非是又東南入漢州江津當作州據漢志縣東南入於江涪水注之故仲雍謂涪内水者也以今輿地言之漾水出寕羌州北嶓冡山東北流逕沔縣西南合沔水又東逕沔縣南寕羌在漢中府西北三百八十里沔縣在府西少北九十里又東逕褒城縣南在府西北四十里沔水去縣二十四里又東逕南鄭縣南為漢水去縣三里禹貢所謂嶓冡導漾東流為漢者也漾水考證當與漢水叅看丹水出京兆上洛縣西北冡嶺山上洛縣今為陜西西安府商州商州志秦嶺在州西八十里其地有澗曰息邪澗丹水所出明一統志丹水出商縣竹山東南流入河南界名高猪山也丹水東南流與清池水合水源東北出清池山西南流入於丹水東南過其縣南縣故屬京兆晉分為郡地道記曰郡在洛上故以為名竹書紀年晉烈公三年楚人伐我南鄙至於上洛楚水注之楚水出上洛縣西南楚山㫺四皓隠於楚山即此山也其水两源合舍宋本無舍字於四皓廟東又東逕髙車嶺南太平御覽髙士傳髙専山上有四皓碑及祠皆漢惠帝所立也漢髙后使張良詣商山迎四皓之處因名髙車山翼帶中流北轉入丹嶺宋本作丹水嶺上有四皓廟丹水自倉野又東歴兎和山即春秋所謂左師軍於兎和右師軍於倉野者也左傳哀四年楚人謀北方司馬起豐析以臨上洛左師軍於莵和右師軍於倉野杜預曰上洛縣東有莵和山今商州南百四十里有倉野聚又東南過商縣南又東南至於丹水縣入於汋契始封商魯連子曰在太華之陽皇甫謐闞駰並以為上洛商縣也殷湯之名起於此矣丹水自商縣東南流注歴少習出武關應劭曰秦之南關也通南陽郡春秋左傳哀公四年楚左司馬使謂隂地之命大夫士薎曰晉楚有盟好惡同之不然將通於少習以聴命者也杜預註曰少習商縣武關也将大開武関道以伐晋京相璠曰楚通上洛阸道也漢祖下浙酈攻武關浙當作析漢志析縣屬𢎞農郡今為河南南陽府内郷縣史記髙帝紀髙祖降析酈因襲攻武関破之下浙俱當作析按今商州東有商洛廢縣即漢商縣也商南山陽鎮安三縣亦商縣地武関在州東一百八十里文頴曰武關右疑作在浙縣西一百七十里𢎞農界也丹水又東南流入臼口歴其戍下又東南浙水出浙縣西北𢎞農盧氏縣大蒿山南流逕修陽縣故城北縣即浙之北鄊也又東入浙縣流結成潭謂之龍淵清深神異耆舊傳云漢祖入關逕觀是潭其下若有府舍焉事既非恒難以詳矣其水又東逕其縣故城北蓋春秋之白羽也左傳昭公十八年楚使王子勝遷許於浙是也郭仲産云相承言此城漢髙所築非也余按史楚襄王元年秦出武關斬衆五萬取浙一十五城漢祖入關亦言下浙酈非無城之言循之則可矣浙水又歴其縣東王莽更名縣為古亭也漢志莽曰君亭此云古亭誤而南流入丹水縣注於丹水丹水源出陜西商縣竹山東流至内鄊與浙水合故丹水㑹汋有浙口之稱丹水又東南逕一故城南名曰三戸城在今内鄊縣西南昔漢祖入關王陵起兵丹水以歸漢祖此城疑陵所築也丹水又逕丹水縣故城西南丹水故城在今内鄉縣西南一百二十里縣有密陽鄉古商宻之地昔楚申息之師所戍也春秋之三户矣杜預曰縣北有三户亭竹書紀年曰士寅孫何侵楚入三户郛者是也水出丹魚先夏至十日夜伺之魚疑譌水郛側宋本作魚浮水側御覽引此亦同又按抱朴子云丹水丹魚先夏至十日夜伺之魚皆浮水赤光如火網而取之割其血塗足可以歩行水上與此正同赤光上照如火網而取之割其血以塗足可以歩行水上長居淵中丹水東南流至其縣南黄水出北予山一作北子山黄谷南逕丹水縣南注於丹水黄水北有墨山在内鄊縣北五十里山石悉黒繢彩奮發黝焉若墨故謂之墨山今河南新安縣有石墨山斯其類也丹水南有丹崕山在内郷縣西一百里山悉頳壁霞舉若紅雲秀天二岫更為殊觀矣丹水又南逕南郷縣故城東北城在今南陽府南陽縣西南百里本漢析縣池漢建安中割南陽右壌為南郷郡逮晋封宣帝孫暢為順陽王因為立順陽郡而南郷為縣舊治鄼城永嘉中丹川浸没至永和中徙治南郷故城城南門外舊有郡社柏樹大三十圍蕭欣為郡伐之言有大蛇従樹腹中墜下大􅂾圍長三丈羣小蛇數十隨入南山聲如風雨伐樹之前見夢於欣欣不以厝意及伐之吏孫云疑作更少日果死丹水又東逕南鄉縣北興寕末太守王靡之改築今城城北半據在水中左右夾溪深長及春夏水漲望若孤洲矣城前有晉順陽太守丁穆碑郡民范寗立之丹水逕流两縣之間歷於中之北所謂商於者也裴駰曰有商城在於中故曰商於杜中佑曰今内鄉西七里有於村亦曰於故張儀說楚絶齊許以商於之地六百里謂以此矣呂氏春秋曰堯有丹水之戰以服南蠻即此水也又南合汋水汋音市若切盖均字之譌汮與均同詳見後均水注謂之浙水水經注集釋訂訛卷二十
