body:
  text: 水經注集釋訂訛卷二十歸安沈炳巽撰漾水丹水漾水岀隴西氐道縣嶓塜山在今漢中府沔縣西一百二十里東至武都沮縣今為漢中府畧陽縣為漢水常璩華陽國記曰漢水有二源東源出武都氐道縣漾山為漾水禹貢道漾東流為漢是也西源出隴西嶓塜山會泉華陽國志曰漢有二源西源出隴西嶓塚山會白水經葭萌入漢此作會泉譌以白水二字合作泉字逕葭萌葭萌秦縣入漢始源曰沔漢屬廣漢郡今為廣元縣屬保寧府按沔水出東狼谷逕沮縣入漢漢中記曰嶓塜以東水皆東流嶓塜以西水皆西流即其地勢源流所歸故俗以嶓塜為分水嶺即此推沔水無西入之理劉澄之云有水従沔陽縣南至梓潼今屬四川保寧府漢夀今為廣元縣屬保寧府入大穴暗通罡山郭景純亦言是矣罡山穴小本不容水水成大澤而流與漢合庾仲邕又言漢水自武遂川南入蔓葛谷越野牛逕至開城合西漢水故諸言漢者多言西漢水至葭萌入漢又曰始源曰沔是以經云漾水出氐道縣東至沮縣為漢水東南至廣魏何氏云道元以廣漢為廣魏者元魏故也白水漢書地理志廣漢郡有白水縣應劭曰出徼外北入漢後漢郡國志廣漢郡白水縣注引山海經曰白水出蜀而東南入江郭注曰今在縣東元和志利州景谷縣本漢白水縣屬廣漢郡宋為平興縣隋改曰景谷今四川保寧府昭化縣之白水鎮是也鎮在縣西百里白水在縣北二十里至縣三里合嘉陵江漢巴郡治江州縣其故城在今重慶府巴縣西大江在縣東南嘉陵江至此入大江診其㳂注似與三說相符而未極西漢之源矣然東西兩川俱受沔漢之名者議當作義或在兹矣班固地理志司馬彪袁崧郡國志並言漢有二源東出氐道西出西縣之嶓塜山地理志隴西郡有西縣禹貢嶓塜山西漢所出南入廣漢白水東南至江州入江闞駰云漢或為漾漾水出崐崘西北隅至氐道重源顯發而為漾水又言隴西隴西下當更有西字縣嶓塜山在西西漢水所出南入廣魏白水又云漾水出獂道東至武都入漢許慎呂忱並言漾水出隴西獂道東至武都為漢水不言氐道然獂道在冀之西北又隔諸川無水南入疑出獂道之為謬矣漢志獂道屬天水郡應劭曰獂戎邑也音完其故城在今鞏昌府東二十五里又云漢漾也東為滄浪水山海經曰嶓冡之山漢水出焉而東南流注于江按山海經作東南流注于沔注江夏安陸縣江即沔水然東西兩川俱出嶓冡而同為漢水者也孔安國曰泉始出為漾其猶濛耳而常璩專為漾山漾水當是作者附而為山水之􅌞目矣余按山海經漾水出崐崘西北隅而南流注于配山海經作醜塗之水穆天子傳曰天子自舂山西征至于赤烏氐己卯北征庚辰濟于洋水辛巳入于曹奴之原本漏之字人戲郭注云戲國人名也觴天子于洋水之上當云辛巳入于曹奴曹奴之人戲觴天子于洋水之上今世所行穆天子傳亦漏此二字遂不可句乃獻良馬九百牛羊七千天子使逄固受之天子乃賜之黄金之鹿戲乃膜拜而受余以大和中従髙祖北廵狄人猶有此獻雖古今世殊而所貢不異然川流隠伏卒難詳照地理潛閟變通無方復不可全言闞氏之非也雖津流派别枝渠勢懸原始要終潛流或一故俱受漢漾之名納方土之稱是其有漢川漢陽廣漢漢夀之號或因其始或據其終縦異名互見猶為漢漾矣川共目殊或亦在斯今西縣嶓冡山西漢水所導也然微涓細注若通羃歴津注而已西流與馬池水合寰宇記馬池源出嶓冡山又名龍淵水昔人嘗於此得馬頭骨長三尺水出上邽西南六十餘里謂之龍淵水言神馬出水事同徐吾来淵之異按漢書武帝紀元狩二年馬生余吾水中元鼎四年馬生渥洼水中應劭曰余吾在朔方此云徐吾誤故因名焉開山圖曰隴西神馬山有淵池龍馬所生即是水也其水西流謂之馬池川又西流入西漢水西漢水又西南流左得蘭渠溪水次西有山黎谷水次西有鉄谷水次西有石躭谷水次西有南谷水並出南山揚湍北注右得高望谷水次西得西溪水次西得黄花谷水咸出北山飛波南入西漢水又西南資水注之水北出資川導源四壑南至資峽總為一水出峽西南流注西漢水西漢水又西南得峽石水口水出苑亭曰草里谷宋本作苑亭西艸黒谷三溪西南至峽石口合為一瀆東南流屈而南注西漢水西漢水又西南合楊亷川水水出西谷衆川㵼流合成一川東南流逕西縣故城北秦莊公伐西戎破之周宣王與其大略大丘之地為西垂大夫亦西垂官也大畧大丘誤當作大駱犬丘史記秦本紀大駱生非子以造父之寵皆䝉趙城姓趙氏非子居犬丘為周孝王主馬于汧渭之間馬大蕃息孝王封為附庸邑之秦為秦侯周厲王無道西戎反王室滅犬丘大駱之族周宣王即位乃以秦仲為大夫誅西戎西戎殺秦仲有子五人其長曰荘公王乃與兵五千人使伐西戎破之於是復予大駱地犬丘并有之為西垂大夫王莽之西治矣建武八年世祖至陽河竇融等悉㑹天水震動隗囂將妻子奔西城従楊廣廣死囂愁一作孤窮城守時潁川賊起車駕東歸㽞呉漢岑彭圍囂岑等壅西谷水以縑幔盛土爲堤灌城城未沒丈餘水穿壅不行地中數丈涌出故城不壊請蜀救至漢等退還上邽但廣亷字相狀後人因以人名名之故習譌為楊亷也置楊亷縣焉後魏地形志漢陽郡有楊亷縣言本以楊廣名縣因廣字與亷字相似故譌廣為亷遂習其譌而不改也又東南流右㑹茅川水水水下疑有出字西南戎溪東北流逕戎丘城南吳漢之圍西城王㨗登城向漢軍曰為隗王城守者皆必死無二心願諸将亟罷原本譌罰宋本譌還今従後漢書改正請自殺以明之遂刎頸而死又東北流注西谷水亂流東南入于西漢水西漢水又西南逕始昌峽始昌縣故城西在今鞏昌府西河縣北晉書地道記曰天水始昌縣故城西也亦曰清崖峽西漢水又西南逕巖宋本作宕下同備戍南戍在西河縣東北左則巖備水自東南西北注之右則鹽官水南入焉塩官水在西河縣北自秦州舊天水縣界流入水有鹽官在嶓冡西五十許里相承營煮不輟味與海鹽同故地理志云西縣有鹽官是也其水東南逕巖備戍西東南入漢水漢水又西南合左谷水水出南山窮溪北注漢水又西南蘭軍朱本引謝兆申云蘭軍譌宋本作蘭单而下文又有蘭坑疑作蘭坑水出於西北至交谷宋本作五交谷東南歴祁山軍東南入漢水漢水又西南逕祁山軍南祁山在嶓冡之西七十里今在西河縣北七十里雞水南出一作出南雞谷北逕水南縣西北流注于漢漢水又西建安川水入焉其水導源建威西北山白石戍東南二源水合注東逕建成一作威城南又東與蘭坑水會水出西南近溪東北逕蘭坑城西禹貢錐指作蘭倉城今鞏昌府禮縣東南有蘭昌故城東北流注建安水建安水又東逕蘭坑城北建安城南其地故西縣之歴城也楊定自隴右徙治歴城即此處也去仇池一百二十里後改為建安城其水又東合錯水水出錯水戍東南而東北入建安水建安水又東北有雉尾谷水又東北有太谷水又北有小祁山水並出東溪揚波西注又北左會胡谷水水西出胡谷東逕金盤歴城二軍北軍在水南層山上其水又東注建安水建安水又東北逕塞峽元嘉十九年宋太祖遣龍驤将軍裴方明伐楊難當将妻子北奔安西參将魯尚期追出塞峽即是峽矣左山側有石穴洞人言潜通下辨所未詳也其水出峽西北流注漢水漢水北連山秀舉羅峰兢峙祁山在嶓冢之西七十里罡宋本無罡字山上有城極為巖固昔諸葛亮攻祁山即斯城也漢水逕其南城南三里有亮故壘壘之左右猶豐茂宿草盖亮所植也在上邽西南二百四十里開山圖曰漢陽西南有祁山蹊徑委迤山高巖嶮九州之名岨天下之竒峻今此山於衆阜之中亦非為傑矣漢水又西南與申宋本作甲谷水合水出西南申谷東北流注漢水漢水又西逕南岸宋本作岈下同二岈今在西河縣北中㟁之上下有二城相對左右墳壠低昂亘山被阜古語云南岈北岈萬有餘家諸葛亮表言祁山縣去沮五百朱本作出租五百亦作去沮五百里有民萬户矚其丘墟信為􅇻矣漢水西南逕武植戍南武植戍水發北山二源竒發合于安民戍南又南逕武植戍西而西南流注漢水漢水又西南逕平􅆥戍南又西南􅆥水注之水出北山南逕其戍西南入漢水漢水又西逕蘭倉城南又南右會兩溪俱出西山東流注於漢水張華博物志云温水出鳥鼠山下注漢水疑是此水而非所詳也漢水又南入嘉陵道而為嘉陵水禹貢錐指今鞏昌府禮縣本漢嘉陵道地屬武都郡西漢水至此為嘉陵水傅同叔云嘉陵口出鳯州大散關西南嘉陵谷至興州北境當㑹東漢水而東行安得越東漢而為西漢乎宋人以故道水為嘉陵江大非近志皆承其謬故道水合濁水至槃頭郡入西漢水至今猶然何言㑹東漢而不為西漢耶然世俗名之為階陵水非也漢水又東南名疑衍得北谷水東南得城階水疑作武階又東南得倉谷水右三水並出西溪東流注漢水漢水又東南逕瞿堆西又屈逕瞿堆南瞿堆即仇池山在今成縣西北百里絶壁峭峙孤嶮雲高望之形若覆壺其高二十餘里羊腸蟠道三十六廻開山圖謂之仇夷所謂積石嵯峨嶔岑隠阿者也上有平田百頃煮土成鹽因以百頃為號山上豐水泉所謂清泉湧沸潤氣上流者也漢武帝元鼎六年開以為武都郡天池大澤在西故都為目矣漢志武都郡武都縣東漢水受氐道水一名沔過江夏謂之夏水入江天池大澤在西縣師古曰以有天池大澤故謂之都王莾更名樂平郡縣曰循虜縣常璩范曄云郡居河池一名仇池池方百頃即指此也左右悉白馬氐矣漢獻帝建安中有大水氐疑當作天水氐楊騰者世居隴右為氐大帥子駒勇徤多計略徙居仇池魏拜為百頃氐王魏書氐𫝊氐者西夷之别種三代之際自有君長秦漢以來世居岐隴以南漢川以西自立豪帥漢武帝遣帥滅之以其地為武都郡自汧渭抵于巴蜀種類寔繁各有侯王受中國封拜漢建安中有楊騰者為部落大帥騰勇健多計畧始徙居仇池騰後有名千萬者魏拜為百頃氐王漢水又東合洛谷疑漏水字水有二源合同注一壑於神蛇戍西左右山溪多五色蛇性馴良不為物毒洛谷水又南逕虎馗戍東又南逕仇池郡西瞿堆東西南入漢水漢水又東合洛漢水宋本云當作洛溪下同水北發洛谷南逕威武戍南又西南與龍門水合水出西北龍門谷東流與横水會東北窮溪即水源也又南逕龍門戍東又東南入洛漢水又東南逕上禄縣故城西在今成縣西一百二十里脩源濬導逕引北溪南總兩川單流納漢漢水又東南逕濁水城南亦曰濁水戍在成縣西又東南會平樂水水出武階朱云宋本作水出武源但下文数舉武街則武階當作武街宋本自誤十六國春秋亦作武街東北四十五里更馳南溪導東北源流宋本作道源東北流山側有甘泉涌波飛流下注平洛水又逕甘泉戍南又東逕平洛戍南又東入漢謂之㑹口漢水東南逕脩城道南今略陽縣西北有脩城廢縣漢志作循城屬武都郡與脩水合水總二源東北合漢漢水又東南於槃頭郡南今畧陽縣西北一百里有長舉廢縣後魏於此置槃頭郡與濁水合濁水在今鞏昌府西和縣境従長道縣界穿入大潭舊鎮合清水入階州水出濁城北今成縣有濁水戍亦曰濁水城胡三省云在上禄縣東南武街城西北東流與丁令溪水㑹其水北出丁令谷南逕武街城西東南入濁水濁水又東逕武街城南故下辨縣治也李含李稚以氐王楊敵堅疑衍妻死葬隂平襲武街為氐所殺於此矣華陽國志永嘉初天水氐傁楊茂搜率種人為㓂保據其郡貢獻長安愍帝以胡㓂方盛欲