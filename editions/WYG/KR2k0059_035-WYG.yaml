body:
  text: 水經注集釋訂訛卷三十五歸安沈炳巽撰江水三又東至華容縣西漢之華容今之荆州府監利縣其故城在縣界今之岳州府華容縣本孫呉孱陵縣不可因其名同而遂混為一也夏水出焉漢志南郡華容縣夏水首江東入沔行五百里江水左迤為中夏水右則中郎浦出焉江浦右迤南派曲上下疑有譌字脫文而極水曲之地勢世謂之江曲者也又東南當華容縣南湧疑同下作涌水出焉江水又東涌水注之今在監利縣南水自夏水南通於江謂之涌口春秋所謂閻敖游涌而逸於二水之間者也江水又逕南平郡孱陵縣漢縣同上俱為荆州公安縣之樂鄉城北城在松滋縣東呉陸抗所築後王濬攻之獲呉水軍督陸景於此渚也又東南油水從東南來注之又東右合油水又東逕公安縣北今公安東北五十五里有公安故城本孱陵地漢末劉備為左公居此號公安今屬荆州府劉備之奔江陵使築而鎮之曹公聞孫權以荆州借備臨書落筆杜預尅定江南罷華容置之謂之江安縣南郡治矣以華容之南鄉為南郡晉太康元年改曰南平也縣有油水水東有景口口即武陵郡界景口東有淪口淪水南與景水合又南通澧水及諸陂湖北疑作也是淵也疑作北相接悉是南蠻府屯也故側江有大城相承云倉諸城即邸閣也江水左㑹髙口江浦也對黄州江水又東得故市口水與髙水通也江水又右逕楊歧北山胡氏作山北山抗宋本作枕大江山東有城故華容縣尉舊治也大江又東左合子夏口江水左迤北出通於夏水故曰子夏也當作子夏口大江又東左得侯臺水口江浦也大江右得龍穴水口江浦右迤也北對虎洲又洲北有龍巢地名也昔禹南濟江黄龍夾舟舟人五色無主禹笑曰吾受命於天竭力養民生死命也何憂龍哉於是二龍弭鱗掉尾而去焉故水地取名矣江水自龍巢而東俞口夏水泛盛則有冬無之江水北岸上有小城故監縣尉治也又東得清揚土塢二口江浦也大江右逕石首山北又東逕赭要石首山在今石首縣西北赭要洲名在大江中次北湖洲下江水左得飯筐上口秋夏水通下口間相距三十餘里赭要下即楊子洲在大江中二洲之間常苦蛟害者宋本作昔荆佽飛濟此遇兩蛟斬之自後罕有所患矣吕氏春秋云荆有次飛者懐寳劍涉江至於中流有兩蛟夾繞其船次飛攘臂拔劍赴江刺蛟殺之而復上船舟中之人皆得活荆王聞之仕之執珪江之右岸則溝宋本作清水口口上即錢官也水自牛皮山東北通江北對清水洲洲下接生江洲南即生江口水南通澧浦江水右㑹飯筐上口江浦所入也江水又右得上檀浦江溠也江水又東逕竹畦南宋本作竹町江中有觀詳溠疑有譌脫溠東有大洲洲東分為爵洲洲南對湘江口也又東至長沙下雋縣北今武昌府通城崇陽二縣地澧水沅水資水合東流注之凢此諸水皆注於洞庭之陂是乃湘水非江川也下雋故城在今武昌府通城縣西巴陵亦下雋也洞庭湖在其西南湘水篇云湘水東北流逕長沙下雋縣西㑹資沅微澧四水同注洞庭而北㑹大江名之五渚巴邱山在湘水右岸有巴陵故城西對長洲南湘浦北對大江三水所㑹謂之三江口也湘水從南來注之按北夢瑣言湘江北流至岳陽連蜀江夏潦後蜀江漲遏住湘浦溢為洞庭湖凡數百里而君山宛在水中秋水過此山復居於陸唯一條湘川而已江水右㑹湘水所謂江水㑹者也禹貢錐指云以今輿地言之江水自宜都縣北合夷水又東逕枝江縣北枝江在荆州府西一百七十里百里洲在縣東北六十里嘉靖初為江水衝斷今為上百里洲下百里洲又東逕松滋縣北松滋在府西南一百二十里本漢髙縣地又東逕江陵縣南江陵荆州府治隄防考云大江流入郡境自西而北而東而南勢多紆折南北兩岸俱平衍下隰水易漫流故有決溢之害濵江諸縣皆築隄以為岸衛自松滋至巴陵之城陵磯長亘六百餘里北岸有陽州茅埠隄長亘七百餘里咫尺不堅千里為壑又東逕公安縣北公安在府東南一百二十里本漢孱陵縣有涔陽鎮在公安故城東南又東逕石首縣北石首在府東南一百八十里本漢華陽縣地又東逕監利縣西華容縣北監利在府東南二百里本楚容邑漢置華容縣三國呉析置監利縣其故城在今縣東北章華臺在縣西北六十里夏水篇云夏水東經華容縣南又東逕監利縣南韋昭曰雲夢在華容縣郛景純言東南巴丘湖是也今岳州府亦有華容縣在府西少北一百五十五里本漢孱陵縣地晉分置南安縣隋更名華容非古華容也又東至巴陵縣西北㑹洞庭之水巴陵岳州府治本漢下雋縣地荆江口在縣西北洞庭水入江處亦名西江口又名三江口元和志巴陵城對三江口岷江為西江澧江為中江湘江為南江按三江口北岸有楊林浦一名楊葉洲蓋即水經注所謂巴陵故城西對長洲者此後世大江之經流酈道元所稱北江者也禹之所導則異於是袁中道澧遊記曰酈道元注水經於江陵枚迴洲下有南北江之名南江即江水由澧入洞庭道也陵谷變遷今之大江始獨專其澎湃而南江之跡稍稍湮滅僅為衣帶細流然江水㑹澧故道猶可考云今按小脩此義最為精覈江水又東左得二夏浦夏浦俗謂之西江口又東逕忌置山南山東即隱口浦矣江之右岸有城陵山今巴陵縣北有忌置洲宋書檀道濟等討謝晦至忌置洲列船過江即此其東有城陵磯東北接臨湘縣界磯下為三湘浦元和志云在巴陵縣東北十二里黄潤玉云今江水衝城陵磯而臨江驛至岳陽湖口六十里皆淤沙漲起南環湖北沿江塞隘九江之口其章華臺之水亦淤窄矣山有故城東接㣲落山亦曰暉落􅑑江之南畔名黄金瀨瀨東有黄金浦良父口夏浦也又東逕彭城口水東有彭城􅑑故水受其名即玉潤宋本作澗水出巴邱縣東玉山玉溪北流注於江江水自彭城􅑑東逕如山北北對隱􅑑二􅑑之間大江之中有獨石孤立大江中山東江浦世謂之白馬口彭城􅑑在臨湘縣西江中元和志云在巴陵縣東北九十四里即今臨湘縣也縣東北十里有白馬磯山又有隱磯江水又左逕白螺山南右歴鴨蘭􅑑北江中也東得鴨蘭治浦二口夏浦也江水左逕止疑作上烏林南村居地名也又東逕烏黎口江浦也即中烏林矣又東逕烏林南呉黄蓋敗魏武於烏林即是處也江水又東左得子練口北通練浦又東合練口江浦也南直練洲練名所以生也江之右岸得蒲􅑑口即陸口也水出下雋縣西三山溪其水東逕陸城北又東逕下雋縣南故長沙舊縣王莽之閏雋也宋元嘉十六年割􅈻巴陵郡陸水又屈而西北流又逕其縣北北對金城呉將陸渙所屯也陸水又入蒲圻縣北逕吕䝉城西在今嘉魚縣石頭口昔孫權征長沙零陵所鎮也陸水又逕蒲􅑑山北入大江謂之刀環口蒲磯山在今蒲圻縣南五十里圻與磯通元和志云赤壁山在蒲圻縣西一百二十里北臨大江蓋其時未有嘉魚也今蒲圻臨江之地盡入嘉魚而蒲圻無江水又東逕蒲􅑑山北對蒲圻洲亦曰擎洲又曰南洲洲頭即蒲圻縣治也晉太康元年置洲上有白面洲洲南又有澋口水出豫章又縣又縣當作艾縣屬豫章郡今為南昌府寧縣東入蒲圻縣至沙陽西北魚嶽山入江山在大江中楊子洲南孤峙中洲疑有譌字或作孤峙江中江水左得中陽水口又東得白沙口一名沙屯即麻屯口也本名蔑黙口江浦矣南直蒲圻洲水北八百餘里吳所屯也又逕魚嶽山北下得金梁洲洲東北對淵淵宋本作洲一名淵歩洲江濆從洲頭以上悉壁立無岸歴專政疑有譌字政宋本作岐至白沙方有浦上甚難江中有沙陽洲晉置今為武昌府嘉魚縣沙陽縣治也縣本江夏之沙羡矣晉太康中改曰沙陽縣宋元嘉十六年割𨽻巴陵郡江之右岸有雍口亦謂之流疑譌口東北流之疑譌長洋港東北流逕石子岡岡上有故城即州陵縣之故城也莊辛所言左州侯國矣又東逕州陵新治南王莽之江夏也港水東南流注於江謂之洋口南對龍穴洲沙陽洲之下尾也洲裏有駕部口宋景平二年迎文帝於江陵法駕頓此因以為名文帝車駕發江陵至此黒龍躍出負帝所乗舟左右失色上謂長史王曇首曰乃夏禹所以受天命矣我何徳以堪之故有龍穴之名焉江水東右得聶口江浦也左對聶州江水左逕百人山南百人山在漢陽縣西南八十里右逕赤壁山北昔周瑜與黄蓋詐魏武大軍所起也呉志周瑜傳曹公軍次江北瑜等在南岸瑜部將黄蓋曰今冦衆我寡難以持乆然觀操軍方連船艦首尾相接可燒而走也乃取䝉衝鬬艦數十艘寔以薪草膏油灌其中裹以帷幕上建牙旗先書報曹公欺以欲降又豫備走舸各繋大船後因引次俱前曹公軍吏士皆延頸觀望指言蓋降蓋放諸船同時發火時風盛猛悉沿燒岸山營落頃之煙炎漲天人馬燒溺死者甚衆軍遂敗還保南郡江表傳曰至戰日蓋先取輕利艦十舫載燥荻枯柴積其中灌以魚膏赤幔覆之建旌旗龍幡於艦上時東南風急因以十艦最著前中江舉舧去北軍二里餘同時發火火烈風猛燒盡北船延及岸邊營柴北軍大壊曹公退走江水東逕大軍山南大軍山在漢陽縣西南六十里山東有山屯夏浦江水左迤也江中有石浮出謂之節度石石則疑作側塗水注之出江州武昌郡武昌縣泰山西北流逕汝南僑郡故城南咸和中㓂難南逼戸口南渡因置斯郡治於塗口塗水歴縣西又西北流注於江江水又東逕小軍山南小軍山在漢陽縣西南五十里臨側江津東有小軍浦江水又東逕雞翅山北山東即土城浦也又東北至江夏沙羡縣西北江夏本漢沙羡縣地今為武昌府治沔水從北來注之沌水上承陽縣之白湖東南流為沌水逕陽縣南注於江謂之沌口有陽都尉治晉永嘉六年王敦以陶侃為荆州鎮此晉書陶侃傳周顗為荆州刺史方入境為賊所破王敦表侃為使持節寜逺將軍南蠻校尉荆州刺史鎮於沌口明年徙林鄣江水又東逕歎父山南對歎洲亦曰炭步矣江之右岸當鸚鵡洲南有江水右迤謂之驛渚三月以末水下通樊口水江水又東逕魯山南魯山即大别在漢陽府城東北半里右疑作古翼際山也地說曰漢與江合於衡北翼際山傍者也山上有呉江夏太守陸渙所治城蓋取二水之名地理志曰夏水過郡入江夏也舊治安陸漢髙帝六年置呉乃徙此城中有晉征南將軍荆州刺史胡奮碑又有平南將軍王世將刻石記征杜曽事有劉琦墓及廟也山左即沔水口矣沔左有却月城然亦曰偃月壘戴監軍築故曲陵縣也後乃沙羡縣治也昔魏將黄祖所守遣董襲陸統攻而禽之禰衡亦遇害於此衡恃才倜儻肆狂狷於無妄之世保身不足遇非其死可謂咎悔之深矣江之右岸有船官浦歴黄鵠􅑑西而南矣直鸚鵡洲之下尾江水溠曰疑有譌字項云當作回狀浦是曰黄軍浦昔呉將黄蓋軍師所屯故浦得其名亦商舟之所㑹矣船官浦東即黄鵠山黄鵠山在漢陽府城内西隅聳峙江口與大别對林間甚美譙郡戴仲若野服居之山下謂之黄鵠岸岸下有灣目之為鵠灣鵠山東北對夏口城魏黄初二年孫權所築也夏口故城在今江夏縣西南依山傍江開勢明逺憑墉藉阻髙觀枕流上則遊因一作目流川下則激浪﨑嶇實舟人之所艱也對岸則入沔津故城以夏口為名亦沙羡縣治矣江水左得湖口水通大湖又東合灄口水此下皆疑屬注或疑自上水通大湖一句起上承沔水於安陸縣今為湖廣漢陽府而東逕灄陽縣北今為漢陽縣東南注於江江水又東湖水自北南注謂之嘉呉江右岸頻得二夏浦北對東城洲西浦側有雍伏戍江之左岸東㑹龍驤水口出北山蠻中江之有宋本作右武口水上通安陸之延頭宋元嘉二年衛將軍荆州刺史謝晦阻兵上流為征北檀道濟所敗走奔於此為戌主光順之所執處也宋書謝晦𫝊初晦與徐羡之傅亮謀為自全之計晦鎮荆州而檀道濟鎮廣陵各有强兵以制持朝廷羡之與亮于中秉權可得持久及羡之等既誅太祖詔道濟西討晦聞羡之等死謂道濟必不獨全及聞率衆來上惶懼無計道濟既至與到彦之軍合西人離阻無復鬥心臺軍至忌置洲尾削艦過江晦大軍一時潰散晦夜乗小艇還江陵衆散畧盡乃攜其弟遯兄子世基等七騎北走至安陸延頭為戍主光順之所執南至武城俱入大江南直武洲洲南對楊桂水口江水南出也通金女大文桃班三治呉舊地宋本作屯所在荆州界盡此江水東逕若城南庾仲雍江下當有水字記曰若城至武城口三十里者也南對郭口夏浦而不常泛矣東得苦菜夏浦浦東有苦菜夏江逕其北故浦有苦菜之名焉山上有菜苦可食江水左得廣武口江浦也江之右岸有李姥浦浦中偏無蚊蚋之患矣北對峥嶸洲冠軍將軍劉毅破桓元於此洲元乃挾天子西走江陵矣晉書劉毅𫝊桓𤣥既西走劉裕以毅為冠軍將軍青州刺史與何無忌劉道規躡𤣥𤣥逼帝及瑯琊王西上毅等追及戰於峥嶸洲乗風縱火盡銳争先𤣥衆大潰燒輜重夜走又東過邾縣南今為湖廣黄州府江水東逕白虎􅑑北山臨側江濆又東㑹赤溪夏浦二口江水右迤也又東逕具一作貝􅑑北庾仲雍謂之沛岸矣江右岸有秋口江浦也又東得烏石水出烏石山南流注於江江水右得黎􅑑亦曰黎岸也山東有夏浦又東逕上磧北山名也仲雍謂之大小竹磧也北岸峰火洲即舉洲也北對舉口仲雍作莒字得其音而忘其事非也舉水出龜頭山西北流逕龍戍南梁定州治蠻田超秀為刺史舉水又西流左合垂山之水水北出垂山之陽與戈陽戈疑作弋漢志汝南有弋陽縣渒水同發一山故是水合之水之東有南口戍又南逕方山戍西西流注於舉水又西南逕梁司豫二州東蠻曰疑作田魯生為刺史治湖陂城亦謂之水城也舉水又西南逕顔城南又西南逕齊安郡今黄州府西倒水注之出黄武山南流逕白沙戍西又東南逕梁達城戍西東南合舉水舉水又南東歴赤亭下又謂之赤亭水又分為二水南流注於江謂之舉洲胡氏作口南對舉洲春秋左傳定公四年呉楚陣于伯舉京相璠曰漢東地矣夏有洰水或作舉疑即此也左水東南流入於江滸曰文方口江之右岸有鳯鳴口江浦也浦側有鳯鳴戍江水又東逕邾縣故城南在今黄州府城西北一百二十里漢邾縣今為黄岡黄陂縣地楚宣王滅邾徙居於此故曰邾也漢髙帝三年項羽封呉苪為衡山王都此按史記項羽分封是漢元年今云三年誤晉咸和中庾翼為西陽太守分江夏立四年豫州刺史毛寳西陽太守樊俊共鎮之為石虎將張格度所陷自爾丘墟焉城南對蘆洲在今武昌縣西二十里一名伍洲舊呉時客舍於洲上方便謂所止焉上下疑有譌脫亦謂羅州矣鄂縣北鄂縣上當有江水又東逕字江水二字疑衍右得樊口鄂縣即今武昌縣樊口在縣西北五里樊山在縣西一里庾仲雍江水記云谷里袁口江津南入歴樊山上下三百里通新興馬頭二治樊口之北有灣昔孫權裝大船名之曰長安亦曰大舶載坐直之士三千人與羣臣泛舟江津屬值風起權欲西取蘆州谷不從利乃拔刀急上令取樊口薄舶船至岸而敗按江表𫝊曰權於武昌新裝大船名為長安試泛之釣臺泝時風大盛谷利令拖工取樊口權曰當張頭取羅州利拔刀向拖工曰不取樊口者斬工即轉拖入樊口風遂猛不可行乃還據此蘆當是羅谷不從利當是谷利不從急上當是急止故名其處為敗舶灣因鑿樊山為路以上人即名其處為呉造峴在樊口上一里今厥處尚存江水又左逕赤鼻山南在黄州府城西北漢川門外山臨側江川又東逕西陽郡南郡治即西陽縣也晉書地道記以為弦子國也江之右岸有鄂縣故城舊樊楚也世本稱熊渠封其中子之名某者為鄂王史記楚史家熊渠立其長子康為句亶王中子紅為鄂王少子勢疵為越章王晉太康地記以為東鄂矣九州記曰鄂今武昌也孫權以魏黄初元年中自公安徙此改曰武昌縣鄂縣徙治於袁山東又以其年立為江夏郡分建業之民千家以益之至黄龍元年權遷都建業以陸遜輔太子鎮武昌孫皓亦都之皓還東令滕牧守之晉惠帝永平中始置江州傅綜為刺史治此城後太尉庾亮之所鎮也今武昌郡治城南有袁山即樊山也武昌記曰樊口南有大姥廟孫權常獵於山下依希見一姥問權獵何所得曰正得一豹母曰何不豎豹尾忽然不見太平廣記引武昌記曰孫權獵於武昌樊山下見一老母問權何獲曰只得一豹母曰何不竪其尾忽然不見權稱尊號立廟於山下應劭漢官序曰豹尾過後執金吾罷屯解圍天子鹵簿中後屬車施豹尾於道路豹尾之内為省中後漢書輿服志乗輿大駕寢後一車懸豹尾豹尾以前比省中注引漢官儀曰豹尾過後罷去解圍胡廣曰施於道路豹尾之内為省中故須過後屯圍乃得解皆所以戒不虞也蓋權事應在此故為立廟也又孫皓亦嘗登之使將害常侍王蕃而其首虎上下疑有譌字以争之案江表𫝊云孫皓於殿上斬王蕃出登萊山使親近將蕃首作虎跳狼争咋齧之北背大江江上有釣臺權帝極飲其上曰墮臺醉乃已張昭盡言處呉志孫權於武昌臨釣臺飲酒大醉使人以水洒羣臣曰今日酣飲惟醉墮臺中乃止耳張昭正色不言出外車中坐權呼還問何為怒對曰昔紂為糟邱池長夜之飲當時亦不以為惡也權黙然慙遂以罷酒城西有郊壇權告天即位於此顧謂公卿曰魯子敬嘗言此可謂明於事勢矣城東故城言漢將灌嬰所築也江中有節度石三段廣百步髙五六丈是西陽武昌界分江於斯石也又得東五丈上下疑有譌脫又得次浦江浦也東逕五􅑑北有五山沿次江陰故得是名矣仲雍謂之五圻江水左則巴水注之水出雩婁縣之下靈山即大别也雩婁漢屬廬江郡與決水同出一山故世謂之分水山亦或曰巴山南歴蠻中呉時舊立屯於水側引巴水以溉野又南逕巴水戍南流注於江謂之巴口又東逕較當作􅋴下同漢置屬江夏郡今在九江黄州之間胡云即今黄州府蘄水縣也縣故城南故弦國也春秋僖公五年秋楚滅弦弦子奔黃者也杜預注曰弦國在弋陽􅋴縣東南漢惠帝元年封長沙相利倉為侯國按漢表作􅋴侯黎朱蒼城在山之陽南對五洲也江中有五洲相接故以五洲為名宋孝武帝舉兵江州達牙洲上有紫雲蔭之即是洲也東㑹希水口希水在今蘄水縣南出灊縣今江南安慶府潛山縣霍山西麓山北有灊縣故城地理志曰縣南有天柱山即霍山也有祠南嶽廟音潛二字當注在灊字下恐非正文齊立霍州治此西南流分為二水枝津出焉希水又南積而為湖謂之希湖湖水又南流逕􅋴縣東而南流注於江是曰希水口者也然水流急濬霖雨暴疾漂濫無常行者難之大江右岸有厭里口安樂浦從此至武昌尚方作部諸屯相接枕帶長江又東得桑步歩下有章浦本南陽郡治今悉荒蕪江水左得赤水浦夏浦也江水又東逕南陽山南又曰苟宋本作芍􅑑亦曰南陽􅑑仲雍謂之南陽圻一名洛至圻一名石姥水勢迅急江水又東逕西陵縣故城南今黄州府治故城在蘄州西史記秦昭王遣白起伐楚取西陵者也漢章帝建初二年封陰堂按後漢書當作陰棠為侯國江水東歴孟家㳾一作溠江之右岸有黄石山水逕其北即黄石􅑑也一名石茨圻有疑作在西陵縣也北縣疑作縣北則三洲也山連逕江側東山偏髙謂之西塞東對黄公九􅑑所謂九圻者也黄石􅑑在武昌府大冶縣東北三十里西塞在縣東九十里元和志云在武昌縣東八十五里蓋與大冶分山也於行小難上下疑有譌字兩山之間為闕塞也從此濟於土復土復者北岸地名也又東過蘄春縣南蘄水從北東疑作來注之今黄州府蘄水縣江水右得常宋本作韋口江浦也浦東有葦山江水東逕山北北崖有東湖口江波左迤流結成湖故謂之湖口矣江水又東得空石口江浦在右臨江有空石山南對石穴洲洲上有蘄陽縣治也又東蘄水注之江水又東逕蘄春縣故城南世祖建武三十年封陳俊子浮為侯國也江水又東得銅零口江浦也大江右逕蝦䗫山北而東㑹海口水南通大湖北達於江水左右翼山江水逕其北東合臧口江浦矣江水又左逕長風山南得長風口江浦也江水又東逕積布山南俗謂之積布􅑑又曰積布圻庾仲雍所謂髙山也此即西陽一作南陽尋陽二郡界也蘄春縣即今蘄州水出江夏蘄春縣北山南過其縣西又南至蘄口南入於江右岸有土復口江浦也夾浦有江山山東口有護上下疑有錯文江浦也庾仲雍謂之朝二浦也何氏云疑有誤又東過下雉縣北今武昌府興國州東有下雉故城刋水從東陵西南注之江水東逕琵琶山南山下有琵琶灣也又東逕望夫山南又東得苦菜水口夏浦也江之右岸富水注之水出陽新縣之青湓山西北流逕陽縣故豫章之屬矣地多女鳥元中記曰新陽男子於水次得之遂與共居生二女悉衣羽而去豫章問養兒不露其衣言是鳥落塵於兒衣中則令兒病故亦謂之飛夜遊女矣搜神記豫章新喻縣男子見田中有六七女皆衣毛衣往得一女所解之衣藏之此女不得去男子取以為婦生三女後於積稻下得其毛衣遂飛去本草引𤣥中記云姑獲鳥衣毛為飛鳥脫毛為女又云是産婦死後化作一名隱飛一名夜行遊女鬼神類也又西北逕下雉縣王莽更名之潤兇按漢志當作光矣後併新陽水之左右公私裂溉咸成沃壤舊呉屯所在也江水口疑譌右東得蘭溪水口並江浦也又東左得青林口即水出廬江郡之東陵鄉江夏有西陵縣故是言東矣尚書云江水過九江至於東陵者也西南流水積為湖湖西有青林山宋太始元年明帝遣沈攸之西伐子勣當作勛宋書晉安王子勛謀反伐栅青山覩一童子甚麗問伐者曰取此何為答欲討賊童子曰下旬當平何勞伐此在衆人之中忽不復見故謂之青林湖湖有鯽魚食之肥美辟寒暑湖水西流謂之青林水又西南歴尋陽分為二水一水東流通大雷一水西南流注於江經所為刋水也右對馬頭岸自富口迄此五十餘里岸阻江山行水金鑑云水經注江水自下巂以東所紀山水地名或瑣細難考沔水自石城以東尤多舛錯道元亦自謂未必一得其實今據府州縣志以為之綱而掇取水經注及羣書要語附載於其下江水自巴陵縣西北㑹洞庭湖又東逕其縣北又東逕臨湘縣北臨湘在湖廣岳州府東北七十五里晉以後為巴陵縣宋析置臨湘縣又東逕嘉魚縣西北與沔陽州分水嘉魚在武昌府西南二百五十里漢沙羡縣地隋為蒲圻縣地南唐分置嘉魚縣沔陽在安陸府南少東三百三十里本漢州陵縣又東北逕江夏縣西漢陽縣東又北漢水自北來注之江夏為湖廣武昌府治本漢沙羡縣地漢陽為漢陽府治本春秋之夏汭亦漢沙羡縣地也又北折而東逕武昌縣北其對岸則黄陂縣黄岡縣武昌在武昌府東北一百八十里本漢鄂縣黄陂在黄州府西二百四十里本漢邾縣地黄岡為府治本漢西陽邾西陵三縣今縣西北有邾縣故城又東逕大冶縣北蘄水縣南大冶在興國州西北一百五十里本漢鄂下雉二縣地蘄水在黄州府東少南一百十里本漢􅋴縣又東逕興國縣北蘄州南興國在武昌府東南三百六十里本漢下雉縣兼鄂縣地蘄州在黄州府東少南一百八十里本漢蘄春縣又東逕瑞昌縣北廣濟縣南瑞昌在江西九江府西九十里本漢柴桑縣地廣濟在湖廣蘄州東七十里本漢蘄春尋陽二縣地大江去縣七十里又東逕徳化縣北黄梅縣南徳化九江府治晉永興初於此置尋陽郡隋因改柴桑曰尋陽而江北之名遂移於江南黄梅在蘄州東一百六十里本漢尋陽縣其故城在今縣東北元和志大江在黄梅縣南一百里彭蠡澤在徳化縣東南九十里其水北注於江此導江東迤北㑹於滙之所經也今洞庭遇江漲其水亦為江波所遏而經獨於彭蠡言滙澤者蓋禹時巴陵未有洲渚九江即是江身與彭蠡異故不言滙澤也呉幼清移前東滙澤為彭蠡六字於此東迆北㑹於滙之上其說曰鄂北對漢陽軍大别山漢水自北來入江江水與之㑹合流曰滙故曰東迆北㑹于滙不言㑹于漢者以漢有漾沔滄浪之異名不可指定一名而言故但曰㑹于滙也金吉甫則直以滙為誤字其說曰當作㑹于漢蓋江勢迆北處正受漢口若至彭蠡則東流乆矣滙字必因上文而誤也今按江漢合流入揚州之域㑹彭蠡水始有三江之目若以滙指漢水則北江中江不待過彭蠡而始有其名矣禹貢于荆州言江漢無中江北江之名于揚州始言三江蓋必㑹南江而後可命之曰北曰中也周禮荆州曰其川江漢揚州曰其川三江與禹貢若合符節滙非漢口明矣自宋以來說此經者遇難解處不以為衍文則以為錯簡不以為錯簡則以為誤字真禹貢之一厄也水經注集釋訂訛卷三十五
