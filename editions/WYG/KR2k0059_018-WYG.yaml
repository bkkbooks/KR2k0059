body:
  text: 水經注集釋訂訛卷十八歸安沈炳巽撰渭水中又東逕武功縣北武功今屬西安府故城在郿縣東四十里渭水於縣斜水自南注之水出縣西南衙嶺山北歴斜谷逕五丈原東在今郿縣西三十里諸葛亮與步隲書曰僕前軍在五丈原原在武功西十里餘水出武功縣故亦謂之武功水也是以諸葛亮表云臣遣虎步監孟琰據武功水東司馬懿因水長攻琰營臣作竹橋越水射之橋成馳去其水北流注於渭地理志曰斜水出衙嶺北至郿注渭水又東逕馬冢北諸葛亮與步隲書曰馬冢在武功東十餘里有髙勢攻之不便是以留耳渭水又逕武功縣故城北王莽之新光也地理志曰縣有太一山古文以為終南杜預以為中南也亦曰太白山在武功縣南去長安二百里不知其髙幾何俗云武功太白去天三百山下軍行不得鼔角鼔角則疾風雨至杜彦達曰太白山南連武功山於諸山最為秀傑冬夏積雪望之皓然山上有谷春祠春櫟陽人成帝時病死而尸不寒後忽出櫟南門及光門上而入太白山民為立祠於山嶺春秋来祠中山宋本作止宿焉山下有太白祠民所祀也劉曜之世是山崩長安人劉終於崩此處有脫譌今附錄劉終得玉事十六國春秋前趙錄劉曜光初四年終南山崩長安人劉終於崩所得白玉方一尺有文字曰皇亡皇亡敗趙昌井水竭構五梁咢酉小衰困囂䘮嗚呼嗚呼赤牛奮靷其盡乎羣臣咸賀以為勒滅之徵而左㑹左陽水世名西水北出左陽溪南流逕岐州城西魏置岐州刺史治左陽水又南流注於雍水雍水又與東水合俗名也北出河宋本作俗名之北水出河桃谷南流右㑹南源世謂之返眼泉亂流南逕岐州城東而南合雍水州居二水之中南則兩川之交㑹也世亦名之為淬空水東流鄧公泉注之水出鄧艾祠北故名曰鄧公泉數源俱發於雍縣城南雍縣今為鳯翔府冶縣故秦德公所居也晉書地道記以為西虢地也漢書地理志以為西虢縣太康記曰虢叔之國矣有虢宮平王東遷叔自此之上陽為南虢矣雍有五畤祠以上祠五帝昔秦文公田於汧渭之間史記秦本紀秦之先非子居犬丘周孝王召使主馬於汧渭之間馬大蕃息汧又封禪書文公十六年東獵渭之間夢黄蛇自天屬地其口止於鄜衍以為上帝之神於是作鄜畤祠白帝秦宣公作宻畤於陳倉北坂祀青帝焉靈公又於吳陽作上畤祀炎帝焉獻公作畦畤祀赤帝焉漢髙帝問曰天有五帝今何四也博士莫知其故帝曰我知之矣待我而五遂立北畤祀黒帝焉史記封禪書秦文公夢黄蛇自天下屬地其口止於鄜衍又獲陳寳於陳倉北坂城作鄜畤祭白帝焉秦宣公作密畤於渭南祭青帝秦靈公作吳陽上畤祭黄帝作下畤祭炎帝秦獻公時櫟陽雨金自以為得金瑞故作畦畤而祀白帝漢二年髙祖立黒帝祠命曰北畤應劭曰四面積髙曰雍闞駰曰宜為神明之隩故立羣祠焉又曰鳯臺鳯女祠秦穆公時有簫史者善吹簫能致白鵠孔雀穆公女弄玉好之公為作鳯臺以居之積數十年一旦隨鳯去云雍宮世有簫管之聲焉今臺傾祠毁不復然矣列仙傳蕭史者秦穆公時人也善吹簫能致孔雀白鶴於庭穆公有女字弄玉好之公遂以女妻焉口教弄玉作鳯鳴居數年吹似鳯聲鳯凰来止其屋公為作鳯臺夫婦止其上居不下數年一旦皆隨鳯凰飛去故秦人為作鳯女祠於雍宮中時有簫聲而已鄧泉東流注於雍自下雖㑹他津猶得通稱故禹貢有雍沮㑹同之文矣雍水又東逕邵邵朱本俱俱邰亭南世謂之樹亭川盖邵樹聲相近誤耳亭故邵公之菜邑也京相璠曰亭在周城南五十里後漢郡國志曰郡當作郿今屬鳯翔府縣有邵亭謂此也雍水又東南流與杜水合水出杜陽山其水南流謂之杜陽川東南流左㑹漆水水出杜陽縣之漆溪謂之漆渠故徐廣曰漆水出杜陽之岐山者是也漆渠水南流大欒水注之出西北大道川東南流入漆即故岐水也淮南子曰岐水出石橋山東南流相如封禪書曰牧龜於岐史記相如傳作獲周餘珍收龜於岐漢書作獲周放龜於岐文頴注曰周放畜餘龜於池沼之中至漢得之於岐山之旁此云牧龜誤漢書音義曰岐水名也謂斯水矣二川洋逝俱為一水南與杜水合俗謂之小黄水朱云當作小横水亦或名之米流水逕岐山而又屈逕周城南城在岐山之陽而近西所謂居岐之陽也非直因山致名亦指水取稱矣又歴周原下北則中水鄉成周聚故曰有周也水北即岐山矣昔秦盜食穆公馬處也呂氏春秋秦穆公失其乗馬見野人方將食於岐山之陽公曰食驂馬之肉而不還飲酒者恐傷女也於是徧飲而去岐水又東逕姜氏城南為姜水按世本炎帝姜姓帝王世紀曰炎帝神農氏姜母安登謝云姜母安登宋本作母曰姜姒朱謀㙔云謝引宋本亦誤據世紀當作神農氏姜姓母安登遊華陽感神而生炎帝長於姜水水合而東逕美陽縣之中亭川水也今西安府武功縣西北二十五里有美陽故城今鳯翔府扶風縣是其地也水發杜陽縣大嶺側世謂之赤泥峴㳂波歴澗俗名大横水也疑即杜水矣其水東南流東逕杜陽故城今鳯翔府麟縣乃漢杜陽縣地東西三百步南北二百步世謂之故縣川又故縣有杜陽山山北有杜陽谷有地穴北入亦不知所極在大柱山南故縣取名焉亦指是水而攝目矣即王莽之通杜也故地理志曰縣自杜水東二坑水注之水有二源一水出西北瀆魋水二合而東此句疑有譌脫歴五將山又合鄉谷水水出鄉溪東南流入杜謂之鄉谷川又南莢水注之水出好畤縣梁山大嶺泉南逕梁山宮西故地理志曰好畤有梁山宮秦始皇起水東有好畤縣故城王莽之好邑也世祖建武二年封建威大將軍耿弇為侯國又南逕美陽縣之中亭川注雍水謂之中亭水又南逕美陽縣西永元二年更封鄣雍侯耿秉為侯國後漢書耿弇傳耿秉於章帝章和二年封美陽侯今云和帝永元二年誤且秉亦無鄣雍之封而云更封鄣雍侯者不知何據所未詳也其水又南流注於渭渭水又東逕郿塢南在今郿縣東北十五里漢獻帝傳曰董卓發卒築郿塢髙與長安城等積穀為三十年儲自云事成雄據天下不成守此足以畢老其愚如此渭水之東洛谷之水出其南山洛谷北流逕長城西魏甘露三年蜀遣姜維出洛谷圍長城即斯地也又東􅉭水從南来流注之朱本據宋本補注八十五字今從之􅉭水在今盩厔縣東南芒水出南芒谷北流逕玉女房水際山側有石室世謂之玉女房芒水又北逕盩厔縣之竹圃中分為二水漢冲帝詔曰翟義作亂於東霍鴻負倚盩厔芒竹即此也其水分為二流一水之東北為枝流一水北流注於渭也水經注集釋訂訛卷十八
