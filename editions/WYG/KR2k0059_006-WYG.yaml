body:
  text: 水經注集釋訂訛卷六歸安沈炳巽撰汾水澮水涑水文水原公水洞渦水晉水湛水汾水出太原汾陽縣北管涔山按今靜樂縣在太原府西北二百二十里本漢汾陽縣地地理志汾陽北山汾水所出西南至汾陰入河過郡二行一千三百四十里管涔山一名燕京山淮南子汾岀燕京是也隋志靜樂縣有管涔山元和志云在縣北一百二十里山海經曰北次二經之首在河之東其東按經無東字首枕汾其名曰管涔之山其上無草木按經作其上無木而多草而下多玉汾水出焉西流注于河十三州志曰出武州之燕京山亦管涔之異名也其山重阜修層朱本改巖有草無木泉源道于南􅅢之下盖稚水濛流耳又西南夾岸連山聨峰接勢劉淵族子曜常隠居于管涔之山夜中忽有二童子入跪曰管涔王使小臣奉謁趙皇帝獻劍一口置前再拜而去以燭視之劍長二尺光澤非常背有銘曰神劍服十六國春秋前趙録劉曜𫝊無服字御除衆毒曜遂服之劍隨按傳漏四字時變為五色也後曜遂為胡王矣汾水又南與東西温溪合水出右近溪聲流翼注水上雜樹交陰雲垂烟接自是水流潭漲波襄轉泛又南逕一城東憑墉積石側枕汾水俗謂之代城城疑當作水又南出二城間其城角倚翼枕汾流世謂之侯莫干城盖語出戎方傳呼失實也汾水又南逕汾陽縣故城東城在今太原府陽曲縣北十里川土寛平峘山夷水故地理志汾水出汾陽縣北山西南流者也漢髙帝十一年封靳強為侯國後立屯農積粟在斯謂之羊腸倉山有羊腸坂在晉陽西北石磴縈委若羊腸焉故倉坂取名矣漢永平中治呼沲石臼河按司馬彪後漢郡國志常山南行唐縣有石臼谷蓋咨乗御覽作資承嘑沱之水轉山東之費疑當作漕自都盧按後漢書鄧訓傳作都慮至羊腸倉將憑汾水以漕太原用實秦晉苦役連年轉運所經凡三項本作二百八十九隘死者無算拜鄧訓為謁者監䕶水功訓隠括知其難立朱箋按訓傳云訓考量隠括知大功難立注云隠審量括之也拘木必待隠括蒸揉然後直也具言肅宗肅宗從之全活數千人和熹鄧后之立叔父何校後漢書叔父下增陔字以為訓積善所致也羊腸即此倉也魏土地記曰秀容秀容故城在今太原府忻州西北五十里胡人徙居之立秀容䕶軍治東去㳂疑是汾水六十里南與酸水合水源西出少陽之山東南流注於汾水山海經作東流注于汾水無南字汾水又南出山東南流洛陰水注之水出新興郡西流逕洛陰城北在今太原府東北六十里又西逕盂縣故城南在今太原府東北八十里春秋左傳昭公二十八年分祁氏七縣為大夫之邑以孟丙為盂大夫左傳昭公二十八年魏獻子為政分祁氏之田以為七縣盂其一也水又西逕狼盂按漢志當作孟縣故城南在今太原府北七十里王莽之狼調也左右夾澗幽深南面大壑俗謂之狼馬澗舊斷澗為城有南北門門闉故壁尚在洛陰水又西南逕陽曲城北元和志陽曲故城在太原縣東北四十五里魏土地記曰陽曲胡寄居太原界置陽曲䕶軍治其水西南流注于汾水汾水又南逕陽曲城西南注也東南過晉陽縣東今為山西太原府太原縣晉水從縣南東流注之太原郡治晉陽城秦昭襄王三年立尚書所謂既修太原者也春秋說題辭曰髙平曰太原原端也平而有度廣延當作疋五下切古雅字按古文大小雅爾雅字本作疋曰大鹵太原也釋名曰地不生物曰鹵盧釋名曰鹵罏也如罏火處也穀梁傳曰中國曰太原夷狄曰大鹵尚書大𫝊曰東原底平大而髙平者謂之太原郡取稱焉魏土地記曰城東有汾水南流水東有晉使持節都督幷州諸軍事鎮北將軍太原成王之碑水上舊有梁清洴殞于梁下豫讓死于津側亦襄子解衣之所在也朱箋吕氏春秋云趙襄子逰于囿中至于梁馬却不進使青荓進視則豫讓佯為死人叱青荓曰吾且有事青荓退而自殺史記刺客傳豫讓伏于襄子所過之橋下襄子至橋馬驚襄子曰此必是豫讓也使人問之果豫讓也於是襄子數之豫讓請襄子之衣而擊焉於是襄子大義之使使持衣與豫讓豫讓拔劍三躍而擊之伏劍自殺汾水西逕晉陽城南舊有介子推祠前有碑廟宇傾頽惟單碑獨存矣今文字剝落無可尋也今太原縣南有赤橋舊謂之豫讓橋又南洞渦水從東來注之汾水又南逕梗陽縣故城東故榆次之梗陽縣也魏獻子以邑大夫何云大夫上有闕文魏戌也京相璠曰梗陽晉邑也今太原晉陽縣南四十里榆㳄界有梗陽城汾水又南即洞渦水會者也元和志云梗陽故城在清源縣南一百二十里又南過大陵縣東故城在今文水縣北十三里昔趙武靈王逰大陵夢處女鼓瑟而歌想見其人呉廣進孟姚焉即於此縣也史記趙世家武靈王逰大陵他日王夢見處女鼓琴而歌詩曰美人熒熒兮顔若苕之榮命乎命乎曽無我嬴異日王飲酒樂數言所夢想見其狀呉廣聞之因夫人而内其女嬴孟姚也王莽改曰大寧矣汾水於縣左迤為鄥澤廣雅曰水自汾出為汾陂其陂東西四里南北一十餘里陂南接鄥地理志曰九澤在北幷州藪也吕氏春秋謂之大陸又名之曰漚洟之澤俗謂之鄥城朱箋吕氏春秋九藪呉之具區楚之雲夢秦之陽華晉之大陸梁之囿田孟諸齊之海隅趙之鉅鹿燕之大昭周禮云正北幷州其川虖沱嘔夷註云嘔夷祁夷也許慎說文云漹水出西河中陽縣之西南入河即此水也漹水又會嬰侯之水山海經稱謁戾之山嬰侯之水出于其隂北流注于汜水右出汜山其水殊源共合注于嬰侯之水亂流逕中都縣南俗又謂之中都水侯甲水注之水發源孫云當作原平地理志原平縣屬太原郡縣胡甲山有長坂謂之胡甲嶺即劉歆遂初賦所謂越侯甲而長驅者也蔡邕曰侯甲亦邑名也在祁縣侯甲水又西北歴宜歳郊逕太谷謂之太谷水出谷西北流逕祁縣故城南今屬大原府故城在縣西七里自縣連延西接鄔澤是為祁藪也即爾雅所謂昭餘祁矣賈辛邑也辛貌醜妻不為言與之如臯射雉雙中之則笑也朱箋按春秋左傳昭八二十八年賈辛將見魏獻子魏獻子曰辛來昔叔向適鄭鬷蔑惡欲觀叔向從使之收器者而往立於堂下一言而善叔向將飲酒聞之曰必鬷明也下執其手以上曰昔賈大夫惡娶妻而美三年不言不笑御以如臯射雉獲之其妻始笑而言據此則貌醜者乃賈大夫非賈辛也王莽之􅅘縣也又西逕京陵縣故城在今汾州府平遥縣東七十里北王莽更名曰致城矣於春秋為九原之地也故國語曰趙文子與叔向遊於九原曰死者若可作也吾誰與歸叔向曰其陽子乎文子曰夫陽子行廉直於晉國不免其身智不足稱吾其隨會乎納諫不忘其師矣故其京尚存漢興增陵於其下故曰京陵焉侯甲水又西北逕中都縣故城南在今榆次縣東一百五十里臨城際水湄春秋昭公二年晉侯執陳無宇於中都者也漢文帝為代王都此武帝元封四年上幸中都宫殿上見光赦中都死罪以下侯甲水又西合為嬰侯之水逕鄔縣故城南晉大夫司馬彌牟之邑也謂之鄔水也俗亦曰慮水慮漹疑當作鄔聲相近故因變焉又西北入鄔陂而歸于汾流矣又南過平陶縣東文水從西來流注之元和志文水縣本漢大陵縣地汾水經縣東十五里文水在縣西漢平陶縣城在縣西南二十五里後魏改為平遥汾水又南與石桐水合即綿水也水出界休縣之綿山北流逕石桐寺西即介子推之祠也昔子推逃晉公之賞而隠于綿上之山也晉文公求之不得乃封綿為介子推之田曰以志我過且旌善人因名斯山為介山故袁崧郡國志曰界休縣有介山有綿上聚子推廟王肅襄朱箋當作喪按隋史經籍志有王肅喪服要記一卷服要記曰昔魯哀公祖載其父孔子問曰寧設桂樹乎哀公曰不也桂樹者起于介子推子推晉之人也文公有内難出國之狄子推隨其行割肉以續軍糧後文公復國忽忘子推子推奉唱二字疑誤而歌文公始悟當受爵祿子推奔介山抱木而燒死國人𦵏之恐其神魂賈於地朱云賈於地疑有脱誤或當作貿貿故作桂樹焉吾父生於宫殿死於枕席何用桂樹為余案夫子尚非璵璠送𦵏安能問桂樹為禮乎王肅此證近於誣矣石桐水又西流注于汾水又西南逕界休漢志屬太原郡今沔陽府靈石縣縣故城西王莽更名之曰界美矣城東有郭林宗宋子浚二碑宋冲以有道此下甚多訛誤司徒徵林宗縣漏人字也辟司徒舉太以疾辭按後漢書郭泰傳司徒黄瓊辟太常趙典舉有道或勸林宗仕進者對曰吾夜觀乾象晝察人事天之所廢不可支也遂並不應據傳此頗誤其碑文之疑訛或當作有云將蹈洪崖之遐迹紹巢由之逸按中郎集作絶軌翔區外以舒翼起碑作超天路碑作衢以髙峙稟命不融享年四十有三傳作四十二建寧四年傳作二年正月丁亥卒凡我四方同好之人永懷哀痛乃樹碑表墓昭銘景行云陳留蔡伯喈范陽盧子幹扶風馬日磾等逺來奔喪朋友服心喪朞年者如韓子助宋子浚等二十四人其餘門人著錫衰者千數其碑文此下有脫誤故蔡伯喈謂盧子幹馬日磾曰吾為天下碑文多矣皆有慙容惟郭有道無愧于色矣按傳云建寧二年春卒于家時年四十二四方之士千餘人皆來會葬同志者乃共刻石立碑蔡邕為文既而謂涿郡盧植曰吾為碑銘多矣皆有慚徳惟郭有道無慚色耳較此似明白汾水之右有左部城盖劉淵為晉都尉漏時字所築也又南過冦爵津一作冠汾津名也在介休縣之西南俗謂之雀鼠谷數十里間道隘水左右悉結偏梁閣道累石就路縈帶巖側或去水一丈或高六丈朱云按太平御覽引此云或去水一尺或髙五六尺上戴山阜下臨絶澗俗謂之魯般橋盖通古之津隘矣亦在今之地嶮也元和志雀䑕谷在介休縣西十二里汾水在縣北十二里靈石縣本介休地汾河在縣北十步又南入河東界又南過永安縣西故彘縣也今為平陽府趙城縣周厲王流于彘即此城也王莽更名黄城漢順帝陽嘉三年改曰永安縣霍伯之都也歴唐城東瓚注漢書云堯所都也東去彘十里汾水又東與彘水合水出東北太岳山禹貢所謂岳陽也即霍太山矣在今趙城縣東北四十五里山上有飛㢘朱云漏墓飛廉三字以善走事紂惡來漏以字多力見知周王伐紂兼殺惡來飛㢘先為紂使北方還無所報乃壇于霍太山而致命焉得石棺銘曰帝令處父不與殷亂賜汝石棺以葬死遂以葬於朱云當作焉但作於亦通霍太山有岳廟廟甚靈鳥雀不棲其林猛虎常守其庭又有靈泉以供祭事鼓動則泉流聲絶則水竭湘東陰山縣有侯曇山上有靈壇壇前有石井深數尺疑當作丈居常無水及臨祈禱則甘泉湧出周用而已亦其比也彘水又西流逕觀阜北故百邑也原過之從襄子也受竹書於王澤以告襄子襄子齋三日親自剖竹有朱書曰余霍太山山陽侯天使也三月丙戌余將使汝反滅智氏女亦立我于百邑也襄子拜受山神之命遂滅智氏祠三神于百邑使原過主之世謂其處為觀阜也彘水又西流逕永安縣故城南西南流注于汾水汾水又南逕霍城東唐霍邑縣今為霍州屬平陽府故霍國也昔晉獻公滅霍趙夙為御霍哀公奔齊晉國大旱卜之曰霍太山為祟使趙夙召霍君奉祀晉復穰也盖霍哀公之故居也汾水又逕趙城西南穆王以封造父趙氏自此始也汾水又南霍水入焉水出霍太山發源成潭漲七十步而不測其深西南逕趙城南西流注于汾水又南過楊縣東故城在今平陽府洪洞縣東南一十八里澗水東出穀逺縣西山西南逕楊縣霍山南又西逕故城北晉大夫僚公去安之邑也朱曰郡國志云河東郡楊縣有髙梁亭晉羊舌大夫叔向邑也此云僚公去安誠所未詳炳巽按左傳昭公二十八年晉魏獻子分羊舌氏之田為三縣僚安為楊氏大夫則郡國志所云乃獻子未分時羊舌氏之故邑酈注所引則據既分而言何云未詳惟公去二字似屬衍文耳應劭曰故楊侯國王莽更名有年亭也其水西流入于汾水汾水逕楊城西不於東矣魏土地記曰平陽原本訛作楊郡治楊縣郡西有汾水南流者是也西南過髙梁邑西黑水出黑山西逕楊城南又西與巢山水會明一統志黑山在平陽府浮山縣北四十里黑水出焉亦名澇水西北流入于汾山海經曰牛首之山勞水出焉西流注于潏水疑是水也潏水即巢山之水也水源東南出巢山東谷北逕浮山東又西北流與勞水合亂流西北逕髙梁城北髙梁故城在今稷山縣東南三十里西流入于汾水又南逕髙梁故城西故高梁之墟也春秋僖公二十四年秦穆公納公子重耳於晉害懷公於此竹書紀年晉出公三十年朱云竹書紀年作出公十三年智伯瑶城髙梁漢髙帝十二年以為侯國封恭侯酈介于斯邑也按漢表作共侯酈疥又東過平陽縣東汾水又南逕白馬城西魏刑白馬而築之故世謂之白馬城在今平陽府東北二十里今平陽郡治汾水又南逕平陽縣故城東城在今臨汾縣西南晉大夫趙鼂之故邑也左傳晉分祁氏羊舌氏之田以趙朝為平陽大夫按鼂乃古朝字本通應劭曰縣在平河之陽堯舜並都之也竹書紀年晉烈公元年韓武子都平陽漢昭帝封度遼將軍范明友為侯國按漢書功臣表范明友封平陵侯此云平陽未知孰是王莽之香平也晉立平陽郡即此矣水側有堯廟前有碑魏土地記曰平陽城東十里汾水東原上有小臺臺上有堯神屋石碑永嘉三年劉淵徙漏都字平陽於汾水得白玉印方四寸髙二寸二分十六國春秋作一寸二分龍鈕其文曰有新寶之印王莽所造也淵以為天授改永鳳二年為河瑞元年汾水南與平水合水出平陽西壺口山尚書所謂壺口治梁及岐也其水東逕狐谷亭北春秋時狄侵晉取狐厨者也又東逕平陽城南東入汾俗以為晉水非也汾水又南歴襄陵縣故城西在今襄陵縣東南二十里名曰卻犨城晉大夫郤犨之邑也故其地有犨氏鄉亭矣縣盖即陵以名氏也王莽更名曰幹昌也又南過臨汾縣東今為平陽府治及各屬縣天井水出東陘山西南北有長嶺嶺上東西有通道即銒蹬也穆天子傳曰乙酉天子西絶銒蹬按傳當作隥注云即井銒之山西南至鹽按傳作盬注云盬鹽池也今在河東解縣音古今竟作鹽誤是也其水三泉奇發西北流總成一川西逕堯城南又西流入汾又屈從縣南西流汾水又經絳縣故城北竹書紀年梁武王按竹書紀年當作惠成王二十五年絳中地􅠂西絶於汾汾水西逕虒祁宫北宫地背汾面澮西則兩川之交會也今平陽府絳州南有虒祁宫横水有故梁截汾水中凡有三十柱柱徑五尺裁與水平盖晉平公之故梁也物在水故能持久而不敗也又西逕魏正平郡南今絳州本漢臨汾縣地後魏改曰正平幷置郡故東州治太和中皇都徙洛置州立郡矣又西逕正橋澮水入焉正橋朱云一作王橋何云澮水西至王橋注于汾水經見後竟當作王又西過長修縣南汾水又西與古水合出臨汾縣故城西黄阜下其大若輪西南流故黄溝出焉東注于汾今無水又西南逕魏正平郡北又西逕荀城東古荀國也汲郡古文晉武公滅荀以賜大夫原氏也古水又西南入于汾汾水又西南逕長修縣故城南漢髙帝十一年以為侯國封莊恬也有修水出縣南而西南流入汾汾水又西逕清原城北故清陽亭也城北有清原晉侯蒐清原作三軍處也汾水又逕冀亭南昔臼季使過冀野見郤缺耨其妻饁之相敬如賔言之文公文公命之為卿復與之冀京相璠曰今河東皮氏縣有冀亭古之冀國所都也杜預釋地曰平陽皮氏縣東北有冀亭即此亭也汾水又西與華水合水出北山華谷西南流逕一一作于故城俗謂之梗陽城非也梗陽在榆次在此非一曰非在此按故漢上谷長史侯相碑曰侯氏出自倉頡之後踰殷歴周各以氏分或著楚魏或顯齊秦晉卿士蒍斯其裔也食采華陽蒲坂北亭即是城也其水西南流注于汾汾水又逕稷山北今稷山縣因名為山在水南四十里許山東西二十里南北三十里髙十三里西去介山一十五里山上有稷祠山下稷亭春秋宣公十五年秦桓公治兵于稷以畧狄土是也按左傳宣公十五年秋七月秦桓公伐晉次于輔氏壬午晉侯治兵于稷以畧狄地此云秦桓公治兵于稷恐訛又西過皮氏縣南今河津縣西二里有皮氏故城汾水西逕鄧邱北顧云鄧當作鄈顔師古曰鄈與葵同亦作葵漢舊儀作葵土宋史鎮王元偓傳上登葵丘亭是也從邑癸聲朱箋作邑登亦當作癸故漢氏之方澤也賈逵云漢法三年祭地汾陰方澤澤中有方丘故謂之方澤丘即鄧丘也許慎說文稱從邑登聲河東臨汾地名矣在介山北山即汾山也其山特立周七十里髙三十里文頴言在皮氏東南則可三十里乃非也今準此山可髙十餘里山上有神廟廟側有靈泉祈祭之日周而不耗世亦謂之子推祠揚雄河東賦曰靈輿安步周流容與以覽于介山嗟文公而愍推兮勤大禹於龍門師古曰禹鑿龍門以通河水故勤勞也晉太康記及地道記與永初記並言子推所逃隠于是山即實非也余案介推所隠者綿山也文公環而封之為介推田號其山為介山杜預曰在西河介休縣者是也汾水又西逕耿鄉城北故殷都也帝祖乙自相徙此為河所毁故書叙曰祖乙圯于耿杜預曰平陽皮氏縣東南耿鄉是也盤庚以耿在河北廹近山川乃自耿遷亳後晉獻公滅之以封趙夙後襄子與韓魏分晉韓康子居平陽魏桓子都安邑號為三晉此其一也漢武帝行幸河東濟汾河作秋風辭於斯水之上汾水又西逕皮氏縣南竹書紀年魏襄王十二年秦公孫爰帥師伐我圍按竹書國字衍皮氏翟章帥師救皮氏圍疾西風十三年城皮氏者也漢河東太守潘係穿渠引汾水以溉皮氏縣故渠尚存今無水又西至汾陰縣北西注于河水南有長阜背汾帶河阜長四五里廣二里餘髙十丈汾水歴其陰西入河漢書謂之汾陰脽漢書武帝紀元鼎四年立后土祠于汾陰脽上蘇林云脽音誰如淳云脽者河之東岸特堆掘長四五里廣二里餘髙十餘丈汾陰縣治之上后土祠在縣西汾在脽之北今滎河縣北有汾陰故城唐改汾陰曰寶鼎元和志汾水在寶鼎縣北二十五里舊經后土祠下西注于河明慶隆四年東徙由河津縣葫蘆灘南入河應劭曰脽丘類也汾陰男子公孫祥望氣寶物之精上見祥言之于武帝武帝于水獲寶鼎焉遷于甘泉宫改其年曰元鼎按漢書郊祀志天子東幸汾陰汾陰男子公孫滂洋等見汾旁有光如絳上遂立后土祠于汾陰脽上今云公孫祥訛旁又史記封禪書云汾陰巫錦為民祠魏脽后土營見地如鈎狀掊視得鼎鼎大異于衆鼎文鏤無欵識怪之言吏吏告河東太守勝勝以聞天子使使驗問巫得鼎無姦詐乃以禮祠迎鼎至甘泉云云則得鼎者乃巫錦聞于上者乃河東太守勝與公孫滂洋等見汾旁有光立后土祠自是兩事並非一人且鼎得于祠旁地上亦非武帝于水獲之今以兩事屬之一人似有訛誤即此處禹貢錐指以今輿地言之靜樂陽曲太原清源交城文水祁縣並屬山西太原府平遥汾陽介休孝義並屬汾州府靈石汾西霍州趙城洪洞臨汾襄陵太平絳州曲沃稷山河津滎河並屬平陽府諸州縣界中皆汾水之所經也澮水出河東絳縣東澮交東髙山澮水在今平陽府翼城縣源出縣東烏嶺山西流入于汾澮水東出詳髙山按山西平陽府翼城縣有澮髙山又名翺翔山詳疑當作翔亦曰河南山又曰澮山西逕翼城南按詩譜言晉穆侯遷都于綘異朱本作翼愚謂此屬衍字按竹書紀年云晋遷于絳原無翼字况孝侯乃穆侯之孫竹書云孝侯八年晉侯在翼稱翼侯則穆侯時不當先有翼之名也孫孝侯改絳為翼翼為晉之舊都也後獻公又北廣其城方二里又命之為絳故司馬遷史記年表稱獻公九年始城絳都左傳莊公二十六年晉士蒍城絳以深其宫是也其水又西南合黑水嶺水導源東北黑水谷西南流經翼城北右引北川水出平川南流注之亂流西南入澮水澮水又西南與諸水合謂之澮交竹書紀年曰莊伯十二年翼侯焚曲沃之禾而還作為文公也又有賀水東出近川西南至澮交入澮又有髙泉水出東南近川西北趣澮交注澮又南紫谷水東出白馬山白馬川遁甲開山圖曰絳山東距白馬山謂是山也西逕榮何云當作陘庭城南而西出紫谷與乾河合即敎水之枝川也史記白起傳稱起涉河取韓安邑東至乾河是也其水西與田川水合水出東溪西北至澮交入澮又有女家水出于家谷竹書紀年曰莊伯以曲沃叛伐翼公子萬救翼荀叔軫追之至于家谷有范壁水出于壁下並西北流至翼廣城昔晉軍北入翼廣以築之因即其姓以名之二水合而為西北流至澮交入澮澮水又西南與絳水合俗謂之白水也疑衍非也水出絳山東至寒泉奮湧揚波北注二字疑衍縣流奔壑十一疑當作一十許丈青崖若㸃黛素湍如委練望之極為奇觀矣其水西北流注于澮應劭曰絳水出絳縣西南盖以故絳為言也史記稱智伯率韓魏引水灌晉陽不沒者三版智氏曰吾始不知水可以亡人國今乃知之汾水可以浸平陽絳水可以浸安邑何云平陽安邑俱錯誤當以戰國䇿汾水可以浸安邑絳水可以浸平陽為正通鑑注引此及括地志駁正酈氏疑絳水不可以灌平陽之說頗詳時韓居平陽魏居安邑魏桓子肘韓康子韓康子履魏桓子肘足接於車上而智氏以亡魯定公問一言可以喪邦有諸孔子以為幾乎余覩智氏之談矣汾水灌平陽或亦有之絳水浸安邑未識所由也西過其縣南春秋成公元年晉悼公按竹書當是出公謀去故絳欲居郇瑕魏獻子曰土薄水淺不如新田有汾澮以流其惡遂居新田按左傳晉人謀去故絳乃成公六年不如新田亦韓獻子之言今云元年魏獻子並誤又謂之絳即絳陽也今平陽府絳州即晉故絳與新田之都盖在絳澮之陽漢髙帝六年封越騎將軍華無害為侯國史記功臣表華無害封絳陽侯漢書作絳陵侯縣南對絳山西背二水古文瓚語曰晉平公與齊景公乗至于澮上見乗白驂八駟以來有犬貍身而狐尾隨平公之車公問師曠對首陽之神有犬貍身狐尾其名曰名曰二字一作逢君者飲酒得福則徼之盖于是水之上也朱箋按太平廣記引汲冢瑣語云晉平公至澮上見人乗白驂八駟而來有貍身而狐尾去其車而堕公之車公問師曠師曠曰貍身而狐尾其名曰首陽之神飲酒于霍太山而歸其逢君于澮乎君其有喜較此似明又西南過虒祁宫南宫在今平陽府曲沃縣西南四十九里宫在新田絳縣故城西四十里晉平公之所搆也時有石言於魏榆晉侯以問師曠曠曰石不能言或憑焉臣聞之作事不時怨讟動于民則有非言之物言也今宮室崇侈民力彫盡石言不亦宜乎叔向以為子野之言君子矣其宫也朱作地疑是衍字背汾面澮西則兩川之交會也竹書紀年曰晉出公五年澮絶于梁即是水也又西至王橋注于汾水晉智伯瑶攻趙襄子襄子奔保晋陽原過後至遇三人于此澤自帶以下不見持竹二節與原過曰為我遺無䘏原過受之於是澤所謂王澤也洓水出河東聞喜縣東山黍葭谷聞喜縣今屬平陽府洓水自絳縣徑聞喜夏縣安邑臨晉猗氏縣界至蒲州東南入黄河洓水所出俗謂之華谷至周陽與洮水合水源東出清野山世人以為清襄山也其水東大嶺下西流出此句有訛誤謂之唅口又西合洓水鄭使子產問晉平公疾平公曰卜云臺台為祟史官莫知敢問子產曰髙辛氏有二子長曰閼伯季曰實沈不能相容帝遷閼伯于商丘遷實沈於大夏臺台實沈之後能業其官帝用嘉之國汾川由是觀之臺台汾洮之神也賈逵曰汾洮二水名司馬彪曰洮水出聞喜縣故王莽以縣為洮亭也然則洓水殆亦洮水之兼稱乎又西過周陽邑南其城南臨洓水北倚山原竹書紀年晉獻公二十五年正月翟人伐晉周漏陽字有白兔舞于市即是邑也按竹書紀年獻公元年王如成周周陽白兔舞于市二十五年正月狄人伐晉自是兩事今并為一年疑誤漢景帝以封田勝為侯國也按史記表田勝封周陽侯索隠曰縣名屬上郡但上郡有陽周而無周陽且洓水所行之道俱在河東郡諸縣界中與上郡相隔遼逺必非經行之地若謂河東自有一周陽縣則地理諸書具在無從查核所不解矣洓水又西逕董澤陂南董澤在今聞喜縣東北四十里一名董池陂即古池東西四里南北三里春秋文公六年蒐于董澤即斯澤也洓水又與景水合水出景山北谷山海經曰景山南望鹽販之澤北望少澤其草多藷藇秦椒其陰多赭其陽多玉郭景純曰鹽販之澤即解縣鹽池也按經不言有水今有水焉西北流注于洓水也又西南過其縣南洓水又西逕仲邮北又西逕桐鄉城北竹書紀年曰翼侯伐曲沃大捷武公請城按竹書作成于翼至洞庭朱云當作渦乃返者也按竹書云武公請成于翼至相而還注云相一作桐漢書曰漢武帝元鼎六年將幸緱氏至左邑桐鄉聞南越破以為聞喜縣者也洓水又西與沙渠水合水出東南近川西北流注於洓水洓水又南逕左邑縣故南城當作城南或故下漏城字故曲沃也晉武公自晉陽徙此秦改為左邑縣詩所謂從子于鵠者也春秋傳曰下國有宗廟謂之國在絳曰下國矣即新城也王莽之洮亭也漢志作莽曰兆亭洓水自城西注水流急濬輕津無緩故詩人以為激揚之水言不能流移束薪耳水側即狐突遇申生處也春秋傳曰秋狐突適下國遇太子太子使登僕左傳作使登僕注云忽如夢而相見狐突本為申生御故復使登車為僕曰夷吾無禮吾請帝以畀秦對曰神不歆非類君其圖之君曰諾請七日見我于新城西偏及期而往見于此處故傳曰鬼神所凴有時而信矣按二語乃杜注非傳文注云傳言鬼神所憑有時而信矣改言作曰便似傳文當作言為是洓水又西逕王官城北在南原上春秋左傳成公十三年四月晉侯使吕相絶秦曰康猶不悛入我河曲伐我洓川俘我王官故有河曲之戰是矣今世人猶謂其城曰王城也王官城在今曲沃縣西南二里又西南過安邑縣西安邑今屬平陽府安邑禹都也禹娶塗山氏女思戀本國築臺以望之今城南門臺基猶存余案禮天子諸侯臺門隅阿相降而已未必一如書傳也故晉邑矣春秋時魏絳原本訛作降自魏徙此朱引漢志云魏絳自魏徙安邑至惠玉徙大梁昔文侯縣師經之琴于其門以為言戒也朱引劉向說苑云師經鼓琴魏文侯起舞曰使吾言而無見違師經援琴而撞文侯中旒潰之文侯將烹經經曰堯舜惟恐言之而人不違桀紂惟恐言而人違之臣撞桀紂非撞吾君也文侯令縣琴于城門以為寡人戒武侯二年又城安邑盖增廣之秦始皇使左更白起取安邑置河東郡王莽更名洮陽漢志河東郡莽曰兆陽縣曰河東也有項寧都學道昇仙忽復還此河東號曰升仙朱引王充論衡作項曼都號曰升仙漢世又有閔仲叔隠遁市邑罕有知者後以識瞻而去朱引皇甫謐髙士傳云閔貞字仲叔太原人客居安邑老病家貧不能得肉日買豬肝一片其令聞之令吏常給焉仲叔知而嘆曰我豈以口腹累安邑耶遂去較此似明洓水又西南逕監朱云疑作盬鹽縣故城城南有鹽池水承朱云脱一之字鹽水出東南薄山何校通鑑注作上承鹽水水出東南薄山西北流逕巫咸山北地理志曰山在安邑縣東海外西經曰巫咸在女丑北右手操青蛇左手操赤蛇在登葆山羣巫所從上下也大荒西經曰大荒之中有靈山巫咸按山海經咸下尚有一巫字即巫昐巫彭巫姑巫貞巫孔山海經作巫禮巫抵巫謝巫羅十巫從此升降百藥爰在郭景純曰言羣巫上下靈山採藥往來也盖神巫所逰故山得其名矣谷口嶺上有巫咸祠其水又逕安邑故城南又西流注於鹽池地里志曰鹽池在安邑西南許慎謂之鹽盬長五十一里廣六里周一百一十四里從鹽古聲朱箋今許氏說文解盬字云盬鹽池也在河東袤五十一里廣七里周百十六里從鹽省古聲吕宿曰沈沙煮海謂之鹽河東鹽池謂之解鹽今池水東西七十里南北十七里紫色澄渟渾而不流水出石鹽自然印成朝取夕復終無減損唯水暴雨澍甘何校增澤清二字潦奔迭則鹽池用耗故公私共堨水徑防其淫濫故謂之鹽水亦為堨水也故山海經謂之鹽販之澤也明一統志山西平陽府安邑縣有鹽池生乳塩唐大暦中賜名寳應慶靈也澤南面層山天巖雲秀池一作地谷泉深左右壁立間不容軌原本訛作軏謂之石門路出其中名之曰徑南通上陽北塈鹽澤池西又有一池謂之女鹽澤東西二十五里南北二十里在猗氏故城南春秋成公六年晉謀去故絳大夫曰郇瑕地沃饒近盬左傳作沃饒而近鹽服䖍曰土平有溉曰沃盬鹽也土人鄉俗引水裂疑衍沃麻分灌川野畦水耗竭土自成鹽即所謂鹽鹹也而味苦號曰鹽田鹽盬之名始資是矣本司鹽都尉治領兵一千餘人守之周穆王漢章帝並幸安邑而觀鹽池故杜預曰猗氏有鹽池後罷尉司分猗氏安邑置縣以守之又南過解縣東又西南注于張陽池解縣今為平陽府解州洓水又西逕猗氏縣故城北春秋文公七年晉敗秦于令狐至于刳首先蔑奔秦士會從之闞駰曰令狐即猗氏也刳首在西三十里縣南對澤即猗頓之故居也孔叢子曰猗頓魯窮士也耕則常飢桑則常寒聞朱公富往而問術焉朱公告之曰子欲速富當畜五㹀㹀當是牸孔叢子陳士義子欲速富當畜五牸說苑愚公畜牸牛生子而大賣之而買駒史記平準書天下亭亭有畜牸馬歳課息齊民要術五牸者牛馬猪羊驢俱作牸無作牸者於是乃適西河大言牛羊於猗氏之南十年之間其息不可計貲擬王公馳名天下以興富於猗氏故曰猗頓也明一統志猗頓故居在平陽府猗氏縣境洓水又西逕郇城詩云郇伯勞之盖其故國也杜元凱春秋釋地云今解縣西北有郇城服䖍曰郇國在解縣東郇瑕氏之墟也余按竹書紀年云晉惠公十有五年按史記晉世家秦納重耳乃惠公十四年況惠公于十四年九曰卒豈猶有十五年之理乎縁竹書紀年係之于十五年下故注云爾殊不知此十五年乃周襄王之十五年惠公于襄王二年即位為元年襄之十五年正惠之十四年與史記合注不深考譌作十五年耳秦穆公率師送公子重耳圍令狐桑泉臼衰皆降為朱本作焉秦師狐毛與先軫禦秦至于廬柳董云降為舊本作焉朱本據竹書改作為疑當作於又按晉禦者乃呂甥冀芮非狐毛先軫也何云有脫誤秦師疑作晉使然考之左傳則狐毛亦從重耳者也乃謂二字疑衍秦穆公使公子縶來與師言退舍次于郇盟于軍京相璠曰春秋土地名桑泉臼衰並在解東南不言解明不至解可知春秋之文與竹書不殊今解故城東北二十四里有故城在猗氏故城西北鄉俗名之曰郇城考服䖍之說又與俗符賢于杜氏單文孤證矣洓水又西南逕解縣故城南春秋晉惠公因秦返國許秦以河外王城按左傳僖公十五年賂秦伯以河外列城五東盡虢畧南及華山内及解梁城則王城當作五城内及解梁即斯城也洓川一作水又西南逕瑕城晉大夫詹嘉之故邑也春秋僖公三十年春晋圍鄭鄭伯使燭之武謂秦公曰晉許君焦瑕朝濟而夕設版者也京相璠曰今河東解縣西南五里有故瑕城洓川一作水又西南逕張陽城東竹書紀年齊師逐鄭太子齒奔城張陽今竹書無陽字南鄭者也漢書之所謂東張矣髙祖二年按史記曹相國世家作三年曹參假左丞相别與韓信東攻魏將孫林邀軍東張大破之按史記云東攻魏將孫遫軍東張今孫下多林字遫訛邀蘇林曰屬河東即斯城也洓水又西南屬于陂陂分為二城兩面兩陂左右澤渚東陂世謂之晉興澤東西二十五里南北八里南對鹽道山明一統志作檀道山在解州南五里與中條山連接中有鴦漿泉疑即此山也其西則石壁千尋東則磻溪萬仞方嶺雲迴奇峰霞舉孤標秀出罩絡羣山之表翠柏蔭峰清泉濯頂郭景純云世所謂鴦漿也發于上而潛於下矣厥頂方平有良藥神農本草曰地有固活女疎銅芸紫菀之族也是以緇服思𤣥之士鹿裘念一之夫代往逰焉路出北巘勢多懸絶來去者咸援蘿騰崟朱云疑作􅕑尋葛降深於東則連木乃陟百梯方降巖側縻鎖之跡仍今存焉故亦曰百梯山也水泉山北流五里而伏云潛通澤渚所未詳也西陂即張澤也西北去蒲坂一十五里東西二十里南北四五里冬夏積水亦時有盈耗也文水出大陵縣西山文谷東到其縣屈南到平陶縣東北東入于汾大陵縣今為山西太原府文水縣平陶故城在今文水縣西南二十五里明一統志文水發源石州方山界流入交城縣界歴榆城流入文水縣南入于汾文水逕大陵縣故城西而南流有泌何云疑沁水注之泌水在文水縣北山下東南注文水寰宇記謂之神福泉縣西南山下武氏穿井給養井至幽深後一朝水溢平流東南注文水又南逕平陶縣之故城東西逕其城内南流出郭王莽更曰多穰也文水又南逕縣右會隠泉口水水下疑有出字謁泉山之上頂謝云當作出謁泉山之頂上二按明一統志有隠泉山在文水縣西南十五里山有石窟號隱堂洞去地五十餘丈山壁峭立有泉隠沒而不恒流疑即謁泉山也俗云𤾉雨愆時是謁是禱故山得其名非所詳也其山石岸地嶮朱箋御覽引此作石崖絶險壁立壁立天固崖平疑當作半有一石室去地可五十餘丈爰有層松飾巖列柏綺望唯西側一處得歴級升陟頂上平地一十許頃沙門釋僧光表建二刹泉發於兩寺之門東流瀝石沿注山下又一作入東津渠隠沒而不恒流故有隠泉之名矣雨澤豐澍則通入文水又南逕兹氏縣故城東為文湖東西一十五里南北三十里世謂之西河在縣直東一十里湖之西側臨湖又有一城謂之豬城水澤所聚謂之都亦曰豬盖即水以名城也文湖又東逕中陽縣故城東案晉書地道記太康地記西河中有陽縣舊縣也文水又東南流與勝水合水出西狐岐之山東逕六壁城南魏朝舊置六壁於其下防離石諸胡因為大鎮太和中罷鎮仍置西河郡焉勝水又東合陽泉水出西山陽溪東逕六壁城北又東南流注于勝水勝水又東逕中陽故城南又東合文水文水又東南入于汾水也原公水出兹氏縣西羊頭山東過其縣北兹氏縣今為山西汾州孝義縣羊頭山在州西北一十五里以形似名原公水源出州城西北三十里白彪山一名賀魯水縣故秦置也漢髙帝更封沂陽侯嬰為侯國按史漢表髙帝時從無兹氏侯之封且名嬰者惟夏侯嬰灌嬰陳嬰三人然夏侯封汝陰陳封堂邑灌封潁陰亦無沂陽之封不知此句何所本也王莽之兹同也魏黄初二年西河恭王司馬子盛廟碑文云西河舊處山林漢末擾攘百姓失所魏興更開疆宇分割太原四縣以為邦邑其郡帶山側塞矣王以咸寧四年改命爵土其年十二月喪國疑當作棄國按晉書宗室傳司馬斌初封陳王於咸寧三年改封西河王四年薨疑即此也但傳字子政諡繆咸寧三年改封而此字子勝諡恭咸寧四年封似有不同然舍此又别無封西河王者所未詳也臣太農閻崇離石令宗羣等二百三十四人刋石立碑以述勲徳碑北廟基尚存也又東入于汾水注文湖不至汾也洞渦水出沾縣北山沾縣今為太原府樂平縣西明一統志洞渦水源出樂平縣四十里􅈝泉嶺至平定州合浮化水西流至壽陽縣界合黑水經榆次合涂水又西至徐溝縣入汾水其水西流與南溪水合水出南山西北流注洞渦水又西北黑水西出山三合源舍同歸一川朱箋宋本作合三源同歸一川無舍字東流南屈受陽縣故城東按晉太康地記樂平郡有受陽縣盧諶征艱賦所謂歴受陽而總轡者也其水西南入洞渦水又西蒲水南出蒲谷北流注之于洞渦又西與原過水合近北便水流也水西阜上有原過祠朱箋史記趙世家襄子南幷智氏強于韓魏遂祠三神于百邑使原過主霍泰山祠祀括地志云三神祠今名原過祠在霍山側盖懷道協靈受書天使憂結宿情傳芳後日棟宇雖淪攢木猶茂故層毖水取名焉其水南流注于洞渦水也西過榆次縣南又西到晉陽縣南榆次縣今屬太原府晉陽縣今為太原縣榆次縣故塗水鄉晉大夫智徐吾之邑也春秋昭公八年晉侯築虒祁之宫有石言晉之魏榆左傳昭公八年春石言于晉魏榆晉侯問于師曠曰石何故言對曰石不能言或憑焉不然民聽濫也抑臣又聞之曰作事不時怨讟動于民則有非言之物而言今宫室崇侈民力彫盡怨讟並作莫保其性石言不亦宜乎於是晉侯方築虒祁之宫服䖍曰魏晉邑榆州里名也漢書曰榆次十三州志以為塗陽縣矣王莽之太原亭也縣南側水有鑿臺韓魏殺智伯瑶於其下刳腹絶腸折頭揩頤處也其水又西南流逕武觀城西北盧諶征艱賦曰逕武館之故郛問厥墮之逺近洞渦水又西南為淳湖謂之洞渦津澤而涂水注之明一統志涂水二俱在榆次縣大涂水發源縣東南一百二十里西北流入洞渦水小涂水發源縣東南八十里鷹山西流入大涂水水出陽邑東北大嵰山涂谷西南逕蘿磬一本作磨亭南與蔣谷水合水出縣東南蔣溪魏土地記曰晉陽城東南一百一十里至山有蔣谷大道度軒車嶺通于武鄉水自蔣溪西北流西逕箕城北箕城在太谷縣東三十五里春秋僖公三十三年晉人敗狄于箕杜預釋地曰城在陽邑南水北即陽邑縣故城也竹書紀年曰梁惠成王九年與邯戰榆次陽邑者也按竹書紀年云我與邯鄲榆次陽邑戰字誤王莽之繁穰矣蔣溪又西合涂水亂流西北入洞渦澤也西入于汾出晉水下口者也劉琨之為幷州也劉淵引兵邀擊之合戰于洞渦即是水也晉水出晉陽縣西懸壅山晉水出太原縣西南一十里懸甕山流分三𣲖其北一𣲖即智伯渠次一𣲖東流經晉澤南南𣲖東流並入汾水縣壅山海經作雍注云音甕在太原縣西一十里一名龍山又名結絀山晉水所出因山腹有巨石如甕故名縣故唐國也春秋左傳稱唐叔未生其母邑姜夢帝謂己曰余名而子曰虞將與之唐屬之參及生名之曰虞呂氏春秋曰叔虞與成王居王援桐葉為珪以授之曰吾以此封汝虞以告周公周公請曰天子封虞乎王曰余戲耳公曰天子無戲言時唐滅乃封之于唐縣有晉水後改名為晉故子夏叙詩稱此晉也而謂之唐儉而用禮有堯之遺風也晉書地道記及十三州志並言晉水出龍山一水疑當作名結絀山在縣西北非也山海經曰懸壅之山晉水出焉今在縣之西南昔智伯之遏晉水以灌晉陽其川上溯後人踵其遺蹟畜以為沼沼西際山枕水有唐叔虞祠水側有凉堂朱引御覽作凉臺結飛梁於水上左右雜樹交陰希見曦景至有淫朋密友羇逰宦子莫不尋梁契集用相娯慰于晉川之中㝡為勝處又東過其縣南又東入于汾水湖疑作汾水分為二流北瀆即智氏故渠也昔在戰國襄子保晉陽智氏防山以水之此句疑有訛誤城不沒者三版與韓魏望歎于此故智氏用亡其瀆乗髙東北注入晉陽城以周園溉漢末赤睂之難郡掾劉茂負太守孫福之于謝云宋本作匿于城門西下空穴中其夜奔盂原本訛孟即是處也東南出城流注于汾水也其南瀆于石塘之下伏流逕舊溪東南出逕晉陽城南城在晉水之陽曰晉陽矣經曰晉荀呉帥師敗狄于大鹵杜預曰大鹵晉陽縣也為晉之舊都春秋定公十三年趙鞅以晉陽叛後乃為趙矣其水又東南流入于汾元和志懸甕山一名龍山在晉陽縣西南十二里晉水初泉出處砌石為塘自塘東分為三𣲖其北一𣲖名智伯渠東北流入州城中出城入汾水其次𣲖東流逕晉澤南又東入汾此即酈元所言分為二𣲖者也其南𣲖隋開皇四年開東南流入汾水湛水出河内軹縣西北山軹縣今為河南懷慶府濟源縣其故城在縣南一十三里今名軹村湛水出軹縣南源湛溪俗謂之湛水也是盖聲盡鄰何云疑有脫誤故字讀俱變同于三豕之誤耳其水自溪之南流東過其縣北又東過波縣之北波當作汲説見後朱改皮亦非湛水南逕向城東而南注又東過毋辟邑南源疑作原經所注斯乃汨川之所由非湛水之間闗也是經之誤證耳湛水自向城東南逕湛城東時人謂之湛城亦或謂之隰城矣溪曰隰澗隰城在東言此非矣後漢郡國志曰河陽縣有湛城是也又東南當平陰縣之東北南入于河湛水又東南逕鄧南流注于河故河濟有鄧津之名矣水經注集釋訂訛卷六
