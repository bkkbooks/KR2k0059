body:
  text: 水經注集釋訂訛卷十三歸安沈炳巽撰濕水濕水岀鴈門陰館縣東今為大同府應州及山陰縣北過代郡桑乾縣南濕水岀于濕一作累頭山一曰治水泉發于山側沿波歴澗東北流岀山逕陰館縣故城西縣故樓煩鄉也漢志鴈門郡陰館縣樓煩鄉累頭山治水所出東至泉州入海過郡六行千一百里莽曰富代師古曰累音力追反漢景帝後元三年置王莽更名富臧當作代矣魏天安三年齊平徙其民于縣立平齊郡按後魏顯祖天安止一年明年改元皇興置齊郡乃皇興三年事道元魏人不當有誤濕水又東北流左㑹桑乾水明一統志濕水源出馬邑縣西北洪濤山即桑乾之源也漢書謂之治水水經謂之溹涫水縣西北上下洪源七輪謂之桑乾泉即溹涫水者也耆老云其水潛承太原汾陽縣北燕京山之大池池在山原之上世謂之天池方里餘其水澄渟鏡淨而不流若安定朝那之湫淵也清水流潭皎然冲照池中嘗無斥草及其風澤御覽引此作池中曽無片草及其風籜有淪輒有小鳥翠色投淵衘出若㑹稽之耘鳥也會稽耘鳥詳見四十卷其水陽焊不耗陰霖不濫無能測其淵深也古老相傳言嘗有人乗車于池側忽遇大風飄之于水有人獲其輪於桑乾泉故知二水潛流通注矣池東隔阜又有一石池方可五六十步清深鏡潔不異大宋本作天池池桑乾水自源東南流右㑹馬邑川水水出馬邑西川俗謂之磨川矣盖狄語言訛馬磨聲相近故爾其水東逕馬邑縣馬邑縣今屬大同府及朔州地其故城在朔州東故城南干寳搜神記曰昔秦人築城于武周塞内以備胡城將成而崩數矣有馬走一疑當作于地周旋反覆父老異之因依以築城城乃不崩遂名馬邑或以為代之馬城也諸記紛競未識所是漢以斯邑封韓王信按漢書韓王信傳髙祖六年以太原郡為韓國徙信以備胡信上書請治馬邑上許之初未嘗以馬邑封信不知酈注何據而云漢以斯邑封信也後為匈奴所圍信遂降之王莽更名之曰章昭其水東流漏注字桑乾水桑乾水又東南流水南有故城南宋本作東北臨河又東南右合濕水亂流枝津南分桑乾水又東左合武周塞水地理志作武州在今大同府俗曰合河出武州山西白羊山谿谷中流至府城南十五里東南流注如渾水水出故城東南流出山逕日沒城南日没城在大同府山陰縣北後魏文帝于此築二城俗以日没城為黄昏城早起城為雞鳴城并日中城為三盖夕陽西頽戎車所薄之故城也榮疑訛當作東有日中城城東又有早起城亦曰食時城在黄𤓰阜北曲中其水又東流右注桑乾水桑乾水又東南逕黃𤓰阜曲西又屈逕其堆南徐廣曰猗盧廢嫡子曰利孫于黃𤓰堆者也又東右合枝津枝津上承桑乾河東南流逕桑乾郡北大魏因水以立郡受厥稱焉又東北左合夏屋山水水南出夏屋山之東溪西北流逕故城北所未詳也又西北入桑乾枝水桑乾枝水又東流津委浪通結兩湖東湖西浦淵潭相接水至清深晨鳬夕鴈泛濫其上黛甲素鱗潛躍其下俯仰池潭意深魚鳥所寡惟良木耳俗謂之南池池北對注陶縣之故城南故曰南池也池水又東北注桑乾水為濕水並受通稱矣濕水又東北逕魏亭西盖皇魏天賜三年之所經建也濕水又東北逕白狼堆南魏列祖道武皇帝于是遇白狼之瑞故斯阜納稱焉阜上有故宫廟樓榭基雉尚崇每至鷹隼之秋羽獵之日肆閱清野為昇眺之逸地矣濕水又東流四十九里東逕巨魏亭北又東崞川注之在渾源州東北發源至應州西安鎮折而流注桑乾河水南出崞山縣故城南王莽之崞張也漢志作崞縣無山字今為大同府渾源州縣南面𤣥岳右背崞山處三山之中故以崞張為名矣其水又西出山謂之崞口北流逕繁畤故城東王莽之當要也又北逕巨魏亭又北逕劇陽縣故城西王莽之鄯陽也按十三州志曰在隂館縣東北一百三里其水又東注于濕水濕水又東逕班縣南如渾水注之水出凉城旋鴻縣後魏地形志梁城郡有䄈鴻縣注云一本作祇鴻今云旋鴻未詳西南五十餘里東流逕故城南北俗謂之獨谷孤城水亦即名焉東合旋鴻池水後魏書曰代都有旋鴻池水出旋鴻縣東山下水積成池北引魚水水出魚溪南流注池池水吐納川流以成巨沼東西二里南北四里北對涼州地宋本作池之南池池方五十里俗名乞伏袁池雖隔越山阜鳥道不逺雲霞之間常有下有訛脫西南流逕旋鴻縣南又合如渾水是總二水之名矣如渾水又東南流逕水固縣縣以太和中因山堂之目以氏縣也後魏地形志代郡有永固縣此云水固當是永字之訛右㑹年水孫克家云年水當作羊水水出平城縣平城縣今為大同府治之西苑外武周塞北出東轉逕燕昌城南按燕書建興十年慕容垂自河而還軍敗於參合死者六萬人十一年垂衆北至參合見積骸如山設策弔之按十六國春秋作設祭弔之禮死者父兄皆號泣六軍哀慟垂慚憤嘔血因而寢疾焉輿過平城北四十里疾篤築燕昌城而還即此城也故北俗謂之老公城也羊水又東注于如渾水明一統志如渾水一名街河其水兩源合為一歴大同府城東而南流與武州川水㑹注桑乾河亂流逕方嶺上有文明太皇太后陵陵之東北有髙祖陵二陵之南有氷疑作永固堂堂之四周隅雉列榭階欄檻及扉户梁壁椽瓦悉文石也檐前四柱採洛陽之八風谷黒石為之雕鏤隠起以金銀間雲雉有若錦焉堂之内外四側結兩石扶帳疑作趺張青石屛風以文石為緣並隠起忠孝之容題刻貞順之名廟前鐫石為碑獸碑石至冢冢字訛當從宋本作碑石至佳左右列柏四周迷禽闇日院外西側有思逺靈圖圖之西有齋堂南門表二石闕闕下斬山累結御路下望靈泉宫池皎若圓鏡矣羊水又東注如渾水又南至靈泉池枝津東南注池池東西一百步南北二百步池渚舊名白楊泉泉上出白楊樹因以名焉其猶長楊五柞之流稱矣南面舊京北背方嶺左右山原亭觀繡峙方湖反景若三山之倒水下如渾水又南逕北宫下舊宫人作薄所在四字疑有訛如渾水又南分為二水一水西出南屈入此苑中歴諸池沼又南逕虎圈東魏太平真君五年成之以牢虎也季秋之月聖上觀御圈上勑虎士効力于其下事同奔戎生制猛獸按穆天子傳云有虎在乎葭中七萃之士髙奔戎生捕虎必擒之即詩所謂袒裼暴虎獻于公所也故魏有捍虎圖也又經平城西郭内魏太平七年所成也城周西郭外有郊天壇壇之東側有郊天碑建興四年立其水南又屈逕平城縣故城南史記曰髙帝先至平城史記音義曰在鴈門即此縣矣王莽之平順也魏天興二年遷都于此太和十六年破太華安昌諸殿造太極殿東西堂及朝堂夾建象魏乾元中疑漏立字陽端門東西二掖門雲龍神虎中華諸門皆飾以觀閣東堂東接太和殿殿之東階下有一碑太和中立石是洛陽八風谷之緇石也朱云自此起至盖天也九百十三字諸本俱錯簡在淇水注中今從宋本改正殿之東北接紫宫寺南對承賢門門南即皇信堂堂之四周圖古聖忠臣烈士之容刋題其側是辯章即朱本作郎彭城張僧達樂安蔣少逰于堂南對白臺臺甚髙廣臺基四周列壁閣路自内而升國之圖籙秘籍悉積其下臺西即朱明閣直侍之官出入所由也其水夾御路南流逕蓬臺西魏神瑞三年又毁疑衍建白樓樓甚髙竦加觀榭于其上表裏飾以石粉曜建素赭白綺分宋本作粉故世謂之白樓也後置大鼓于其上晨昏伐以千椎為城里諸門啟閉之候謂之戒晨鼓也又南逕皇舅寺西是太師黎昌憑晉國所造黎昌憑晉國當作昌黎馮晉國按後魏書馮熈字晉國文明太后兄也官定州刺史晉爵昌黎王有五層浮圖其神圖像皆合青石為之加以金銀火齊衆綵之上煒煒有精光又南逕永寧七級浮圖西當從朱本作其制甚妙工在寡雙又南遶出郊郭弱柳蔭街絲楊被浦公私引裂用周園挽宋本作圍繞長塘曲池所在布濩故不可得而論也一水南逕白登山西服䖍曰白登臺名也去平城七里如淳曰平城傍之髙城若丘陵矣今平城東十七里有臺即白登臺也臺南對罡阜即白登山也故漢書稱上遂至平城上白登者也為匈奴所圍處孫暢之述畫曰漢髙祖被圍七日陳平使能畫作美女送與冒頓閼氏恐冒頓勝漢其寵必衰說冒頓解圍於此矣其水又逕寧先宫東獻文帝之為太上皇也所居故宫矣宫之東次下有兩石柱是石虎鄴城東門石橋柱也按柱勒趙建武中造以其石作工妙徙之于此余為尚書祠部與宜都王穆罷同拜北郊親所逕見穆罷當作穆羆逕見當作經見按後魏書穆羆襲兄爵為宜都王尚新平長公主柱側悉鏤雲矩一作炬朱云當作雲烟上作蟠螭甚有形勢信為工巧去子丹碑側逺矣疑作則但子丹碑又不解上既不言而此云去此則逺不知何謂其水又南逕平城縣故城東司州代尹治皇都洛陽以為恒州水左有大道壇廟始光二年少室道士寇謙之所議建也兼諸岳廟碑亦多所署立其廟階五成四周欄檻上階之上以木為員基令干相枝梧以板切宋本作砌其上欄陛承阿上員制如明堂而專室四户室内有神坐坐右列玉磬皇輿親降受籙靈壇號曰天師宣陽道式暫重當時壇之東北舊有靜輪宫魏神䴥四年造抑亦柏梁之流也臺髙廣超出雲間欲令上延霄客下絶囂浮太平真君十一年又毁之物不停固白登亦繼褫矣水右有三層浮圖真容鷲架悉結石也裝製麗質亦盡美善也東郭外太和中閹人宕昌公鉗耳處時按鉗耳雙姓處時名唐時有鉗耳知命為吾郡長興令見縣志立祗洹舍于東睪椽瓦梁棟臺壁櫺陛尊容聖像及牀座軒帳悉青石也圖制可觀所恨惟列壁合石疎而不密庭中有祗洹碑碑題大篆非佳耳然京邑帝里佛法豐盛神圖妙塔桀峙相望法輪東轉兹為上矣其水自北苑南出歴京城内河干兩􅎠太和十年累石結岸夾塘之上雜樹交蔭郭南結兩石橋横水為梁又南逕籍田及藥圃西明堂東明堂上圓下方四周十二户九堂而不為重隅也室外柱内綺井之下施機輪飾縹仰象天狀畫北通之宿鳥上下疑有脫文盖天也朱云當云畫北辰列宿象盖天也每月隨斗所建之辰轉應天道此之異古也加靈臺于其上下則引水為辟雍水側結石為塘事準古制是太和中之所經建也如渾水又南與武周川水㑹水出縣西南山下二源翼導俱發一山東北流合成一川北流逕武周縣故城西王莽之桓周也以上武周字俱當作州桓周亦當作州又東北右合黃山水西出黄阜下重疑作東北流聖山之水注焉水出西山東流注于黃水黃水又東注武周川又東歴故亭北右合火山西溪水水導源火山西北流山上有大井南北六十七步廣減尺許源深不見厎炎勢上升常若微雷發響以草㸑之則煙騰火發東方朔神異傳云南方有火山焉長四十里廣四五里其中皆生不燼之木晝夜火然得雨猛風不滅按神異經云得暴風不猛猛雨不滅火中有鼠重百斤毛長二尺餘細如絲色白時時出火神異經作出外以水逐而沃之則死取其毛績以為布謂之火浣布是山亦其類也但卉物則不能然其山以火從地中出故亦名榮當作熒臺矣朱本引郡國志云連渾府遥火山西有火井炎氣上升常若㣲電以草㸑之烟騰火發故名熒臺炳巽按後漢書郡國志中無所謂連渾府亦無所謂熒臺不知何據云然惟火井事見于蜀郡臨卭縣又似與此不合附録于後博物記曰有火井深二三丈在縣南百里以竹木投取火後人以火燭投井中火即滅絶不復然蜀都賦注曰火井欲出其火先以家火投之須㬰許隆隆如雷聲爛然通天光燿十里以竹筒盛之接其光而無炭也火井東五六尺又東有湯井廣輪與火井相狀勢熱又同以草内之則不然皆沾濡露結故俗以湯井為目井東有火井祠以時祀祭焉井北百餘步有東西谷廣十許步南岸下有風穴厥大容人其深不測而穴中肅肅常有㣲風雖三伏盛暑猶須襲裘寒吹凌人不可暫停而其山出雛烏形類雅烏純黒而姣好音與之同繢彩紺發觜若丹砂性馴良而易附丱童幼子捕而執之曰原本漏赤觜烏亦曰阿雛烏按爾雅純黒反哺謂之慈烏小而腹下白不反哺者謂之雅烏白頭爾雅疏作項而羣飛者謂之燕烏大而白頭者謂之蒼烏爾雅曰鸒斯卑居也孫爻當作炎曰卑居楚鳥犍為舍人以為壁屋朱云壁屋字誤當作卑居說文謂之雅雅楚烏莊子曰雅賈矣馬融亦曰賈烏者也又按瑞應圖有三足烏赤烏白烏之名而無記于此烏故書其異耳自恒山已北並有此矣其水又東北流注武周川水武周川水又東南流水側有石祇洹舍并諸窟室比丘尼所居也其水又東轉逕靈巖南鑿石開山因崖結構其宋本作真容巨壯法世所締山堂水殿烟寺相望林淵錦鏡綴目新眺川水又東南流出山魏土地記曰平城宫西三十里武周塞口者也自山口枝渠東出入苑溉諸園池苑囿宋本作有洛陽殿殿北有宫館一水自枝渠南流東南出火山水注之水發火山東溪東北流出山山有石炭火之熱間宋本作同樵炭也又東注武周川逕平城縣東南流注如渾水又南流逕班氏縣故城東王莽之班副也闞駰十三州志曰班氏縣在郡西南百里北俗謂之去留城也如渾水又東南流注于濕水濕水又東逕北平邑縣故城南趙獻侯十三年城平邑地理志曰屬代王莽所謂平湖按漢志當作胡也十三州志曰城在髙栁南八十里北俗謂之醜寅城濕水又東逕沙陵南魏金田之地也事同曹武鄴中定矣濕水東逕狋氏縣故城北漢志狋氏屬代郡孟康曰狋音權氏音精王莽更名之曰狋聚也十三州志曰縣有疑作在髙栁南百三十里俗謂之苦力干城矣濕水又東逕道人縣故城南地理志曰王莽之道仁也地理風俗記曰初築此城有仙人逰其地故因以為城名矣今城北有淵潭而不注故俗謂之為平湖也十三州志曰道人城在髙栁東北八十里所未詳也濕水又東逕陽原縣故城南地理志代郡之屬縣也北俗謂之北郍州城濕水又東水又東水又東三字疑衍陽水注之水出縣東北澤中北俗謂之太拔迴水水自源東南流注于濕水又東逕東安陽縣故城北趙惠文王三年封長子章為代安陽君此即章封邑王莽之競漢志作竟安也地理風俗記曰五原有西安陽故此加東也濕水東逕昌平縣今順天府昌平縣本漢軍都縣其故城在今縣治西北二十里温水注之水出南墳下三源俱導合而南流東北逕濕水濕水又東逕昌平縣故城北王莽之長昌也昔牽招為魏鮮卑校尉屯此濕水又東北逕桑乾縣故城西又屈逕其城北王莽更名之曰安徳也魏土地記曰代城北九十里有桑乾城城西渡桑乾水去城十里有温湯療疾有騐經言出南非也盖悞證矣魏任城王彰以建安二十三年伐烏丸入涿郡逐北遂至桑乾止於此也水又東流祁夷水注之周禮嘔夷之川鄭注云即祁夷水而酈注云滱水即嘔夷水出平舒縣東逕平舒縣之故城南澤中史記趙孝成王十九年以汾門予燕易平舒徐廣曰平舒在代王莽更名之曰平葆後漢世祖建武七年封陽武将軍馬成為侯國其水控引衆泉以成一川魏土地記曰代城西九十里有平舒城西南五里代水所出東北流言代水非也祁夷水又東北逕蘭亭南又東北逕石門闗北舊道出中山故闗也又東北流水側有故池按魏土地記曰代城西南三十里有代王魚池池西北有代王臺東去代城四十里祁夷水又東北得飛狐谷即廣野君所謂杜飛狐之口也蘇林據酈公之說言在上黨即實非也如淳言在代是矣晉建興中劉琨自代出飛狐口奔于安次即于此道也魏土地記曰代城四十里有飛狐門門兩門字宋本俱作闗水西北流逕南舍亭西又逕句璅亭西西北注祁夷水祁夷水又東北流逕代城西盧植言初築此城板幹一夜自移此故代西南五十里大澤中營城自䕶結葦為九門于是就以為治城圓匝而不方周四十七里開九門更名其故城曰東城搜神記云其城周圍三十五丈為九門故城處呼之以為東城趙滅代漢封孝文為代王梅福上事曰代谷者恒山在其南北塞在其北谷中之地上谷在東代郡在西是其地也王莽更之曰厭狄亭魏土地記曰城内有二泉一源流出城西門一源流出城北門二源皆北注代水祁夷水又東北熱水注之水出綾羅澤澤際有熱水亭其水東北流注祁夷水又東北谷水注之出昌平縣故城南又東北入祁夷祁夷右會逆水水導源將城東西北流逕將城北在代城東北一十五里疑即東代矣而尚傳將城之名盧植曰此城方就而板幹自移應劭曰城徙西南去故代五十里故名代曰東城或傳書倒錯情用疑焉而無以辨之逆水又西注于祁夷之水逆之為名以西流故也祁夷水東北逕青牛淵水自淵東注之耆諺云有潛龍出于兹浦形類青牛焉故淵潭受名矣潭深不測而水周多蓮藕生焉祁夷水又北逕一故城西西去代城五十里又疑是代之東城而非所詳也又逕昌平郡東魏太和中置西南去故城六十里又北連水入焉水出雊瞀縣東西北流逕雊瞀縣故城南又西逕廣昌城南魏土地記曰代南二百里有廣昌城南通大嶺即此非也十三州記曰平舒城東九十里有廣平城疑是城也尋其名狀忖理為非又西逕王莽城南又西到刺山水注之水出到刺山西山甚層峻未有升其巔者魏土地記曰代城東五十里有到刺山山上有佳大黄也其水北流逕一故城東城北有石人故世謂之石人城西北注蓮水又北逕當城縣故城西髙祖十二年周勃定代斬陳狶于當城即此處也應劭曰當桓都山作城故曰當城也又逕故代東而西北流注祁夷水祁夷水西有隨山山上有神廟謂之女郎祠方俗所祠也祁夷水又北逕桑乾故城東而北流注于濕水地理志曰祁夷水出平舒縣北至桑乾入濕是也濕水又東北逕石山水口水出南山北流逕空侯城東魏土地記曰代城東北九十里有空侯城也其水又東北流注濕水濕水又東逕潘城縣北當作潘縣城北東合協陽闗水水出協溪魏土地記曰下洛城西南九十里有協陽闗闗道西通代郡其水東北流歴筓頭山闞駰曰筓頭山在潘城南即是山也又北逕潘縣故城左㑹潘泉故瀆瀆舊上承潘泉于潘城中或云舜所都也魏土地記曰下洛城西南四十里有潘城城西北三里有歴山山上有虞舜廟十三州記曰廣平城東北一百一十里有潘縣地理志曰王莽更名樹武其泉從廣十數步東出城注協陽闗水雨盛則通注𤾉旱則不流惟洴泉而已闗水又東北流注于濕水又東逕雍洛城南魏土地記曰下洛城西二十里有雍洛城桑乾水在城南東流者也濕水又東逕下洛縣故城南王莽之下忠也魏燕州廣甯縣廣甯郡治魏土地記曰去平城五十里城南二百步有堯廟濕水又東逕髙邑亭北又東逕三臺北濕水又東逕無鄉城北地理風俗記曰燕語呼亡為無今改宜鄉也濕水又東温泉水注之水上承温泉于橋山下魏土地記曰下洛城東南四十里有橋山下有温泉泉上有祭堂雕簷華宇被于浦上石池吐泉湯湯其下炎凉代序是水灼焉無改能治百疾是使赴者若流池水北流入于濕水濕水又東左得于延水口水出塞外柔𤣥鎮西長川城南小山山海經曰梁渠之山無草木多金玉循水出焉按山海經作脩水出焉今云循古人通用東南流逕且如縣故城南應劭曰當城西北四十里有且如城故縣也代稱不拘名號變改校其城郭相去逺矣地理志曰東部都尉治于延水出縣北塞外即循水也循水又東南逕馬城縣故城北地理志曰東部都尉治十三州志曰馬城在髙柳東二百四十里俗謂是水為河頭河頭出戎方土俗變名耳又東逕零丁城南右合延鄉水水出縣西山東逕延陵縣故城北地理風俗記曰當城西北有延陵鄉故縣也俗指謂之琦城川又東逕羅亭又東逕馬城南又東注脩水又東南于宋本作流大甯郡北右注鴈門水山海經曰鴈門之水出于鴈門之山鴈出其間在髙柳北髙柳在代中其山重巒疊巘霞舉雲髙連山隠隠東出遼塞其水東南流逕髙柳縣故城北舊代郡治秦始皇二十三年虜趙王遷以國為郡王莽之所謂厭狄也建武十九年世祖封代相堪為侯國昔牽招斬韓忠于此處事見魏志城在平城東南六七十里于伐當作代為西北也鴈門水又東南流屈逕一故城背山面澤北俗謂之叱嶮城鴈門水又東南流屈而東北積而為潭其陂斜長而不方東北可二十餘里廣一十五里蒹葭叢生焉敦水注之其水導源西北少咸之山南麓東流逕參合縣故城南地理風俗記曰道人城北五十里有㕘合鄉故縣也敦水又東􅢘水注之出東阜下西北流逕故城北俗謂之和堆城又北合敦水亂流東北注鴈門水故山海經曰少咸之山敦水出焉東流注于鴈門之水郭景純曰水出鴈門山謂斯水也鴈門水又東北入陽門山謂之羊門水與神泉水出葦壁北水有靈焉及其密雲不雨陽旱愆期多禱請焉水有二流世謂之比連泉一水東北逕一故城東世謂之石虎城而東北流注陽門水又東逕三㑹亭北又東逕西伺道城北又東託台谷水注之水上承神泉於葦壁北東逕陽門山南託台谷謂之託台水汲引泉溪澤上下疑有訛字衍文澤濤東注行者間一十餘渡東逕三會城南又東逕託台亭北又東北逕馬頭亭北東北注鴈門水鴈門水又東逕大甯郡北魏太和中置有脩水注之即山海經所謂脩水東流注于鴈門水也地理志有于延水而無鴈門脩水之名山海經有鴈門之目而無說于延河自下亦通謂之于延水矣水側有桑林故時人亦謂是水為藂桑河也斯乃北土寡桑至此見之因以名焉于延水又東逕罡成南按史記蔡澤燕人也謝病歸相秦號罡成君疑即澤所邑也世名武罡城漏于字延水又東左與寧川水合水出西北東南流逕小寧縣故城西東南流注于延水又東逕小甯縣故城南地理志寧縣也西部都尉治王莽之博康也魏土地記曰大甯城西二十里有小甯城昔邑人班丘仲居水側賣藥于甯百餘年人以為夀後地動宅壞仲與里中數十家皆死民人取仲尸棄于延水中收其藥賣之仲被裘從而詰之北疑作此人大怖叩頭求哀仲曰不恨汝故使人知我耳去矣後為大當作夫餘王驛使來甯北方人謂之謫仙也于延水又東黑城川水注之水有三源出黑土城西北竒源合注總為一川東南逕黑土城西又東南流逕大甯縣西而南入延河延河又東逕大甯縣故城南地理志云廣甯漢志作廣寧也王莽曰廣康矣魏土地記曰下洛西北百三十里有大甯城于延水又東南逕茹縣故城北王莽之穀武也世謂之如口城魏土地記曰城在鳴雞山西十里南通大道西達寧川于延水又東南逕鳴雞山西魏土地記曰下洛城東北三十里有延河東流北有鳴雞山史記曰趙襄子殺代王于夏屋而并其土襄子迎其姊于代其姊代之夫人也至此曰代已亡矣吾將何歸乎遂磨筓于山而自殺代人憐之為立祠焉因名其為磨筓山史記趙世家襄子殺代王于夏屋遂興兵平代地其姊前為代王夫人聞之泣而呼天摩筓自殺代人憐之所死地名之為磨筓之山安磨筓山在今直隸保州西北二十里每夜有野雞羣鳴于祠屋上故亦謂之為鳴雞山魏土地記云代城東南二十五里有馬頭山其側有鍾乳穴趙襄子既害代王迎姊姊代夫人夫人曰以弟慢夫非仁也以夫怨弟非義也磨筓自刺而死使者自殺民憐之為立神屋于山側因名之為磨筓山未詳孰是于延水又南逕且居縣故城南王莽之久居也其水東南流注于濕水地理志曰于延水東至廣寧入治非矣按漢志代郡且如縣下于延水出塞外東至寧入沽師古曰沽音姑今云入治誤廣字亦屬衍文又東過涿鹿縣北今為保安州涿水出涿鹿山在州城西南九十里涿水出焉世謂之張公泉東北流逕涿鹿縣故城南王莽所謂褫陸也黄帝與蚩尢戰于涿鹿之野留其民于涿鹿之河即于是處原本漏也其水又東北與坂泉合其水導源縣之東泉魏土地記曰下洛城東南六十里有涿鹿城城東一里有坂泉泉上有黄帝祠晉太康地理記曰坂泉亦地名也泉水東北流與蚩尤泉會水出蚩尤城城無東一作南面魏土地記稱涿鹿城東南六里有蚩尤城泉水淵而不流霖雨併則流注坂泉亂流東北入涿水涿水又東逕平原郡南魏徙平原之民置此故立僑郡以統流離涿水又東北逕祚亭北而東北入濕水亦云涿水枝分入匈奴者謂之涿耶水地理潛顯難以究昭非所知也濕水又東南左會清夷水亦謂之滄河也水出長亭南西逕北城村故城北又西北平鄉川水注之水出平鄉亭西西北流注清夷水清夷水又西北逕陰莫亭在居庸縣南十里清夷水又西㑹牧牛山魏土地記曰沮陽城東八十里有牧牛山下有九十九泉即滄河之上源也山在縣東北三十里山上有道武皇帝廟耆舊云山下亦有百泉競發有一神牛駮身自山而降下飲泉竭故山得其名今山下導九十九泉積以成川西南流國宋本作谷水與浮圖溝水注之出夷輿縣故城西南王莽以為朔調亭也其水俱西南流注于滄水又西南右合地裂溝古老云晉世地裂分此界間成溝壑有小水俗謂之分界水南流入滄河又西逕居庸縣故城南魏上谷郡治昔劉虞攻公孫瓚不尅北保此城為瓚所擒有粟水入焉水出縣下城西枕水又屈逕其縣南南注滄河又西與右陽溝水合水出縣東北西南流逕居庸縣城北西逕大翮小翮山南髙巒截雲層陵斷霧雙阜共秀競舉羣峯之上郡人王次仲少有異志年及弱冠變蒼頡舊文為今隸書秦始皇時官務煩多以次仲所易文簡便于事要奇而召之三徵而輒不至次仲履真懷道窮數術之美始皇怒其不恭令檻車送之次仲首發于道化為大烏出在車外翻飛而去落二翮于斯山故其峯巒有大翮小翮之名矣魏土地記曰沮陽城東北六十里有大翮小翮山山上神名大翮神山屋東有温湯水口其山在縣西北二十里峯舉四十里上廟則次仲廟也右出温湯療治萬病泉所發之麓俗謂之土亭山此水炎熱倍甚諸湯下足便爛人體療疾者要須别引消息用之耳不得言朱本引謝兆申云不得言三字似衍引孫汝澄云不得言者謂不得聲言其熱耳言之則更灼熱矣此亦臆說終當闕疑為是次翮山東此句疑有訛誤其水東南流左㑹陽溝水亂流南注滄河滄河又左得清夷水口魏土地記曰牧牛泉西流與清夷水合者也自下二水互受通稱矣清夷水又西靈亭城水注之水出馬蘭西澤衆泉㵼流宋本作溜歸于澤澤水所鍾以成溝瀆瀆水又左與馬蘭溪水㑹水導馬蘭城城北負山勢因阿仍溪民居所給惟仗此水水南流出城東南入澤水澤水又南逕靈亭北又屈逕靈亭東落次仲烏翮于此故是亭有靈亭之稱矣其水又南流注于清水清水兩清水並當作清夷水又西得泉溝水會水導源川南平地北注清夷水清夷水又西南得桓公泉盖齊桓公霸世北伐山戎過孤竹西征束馬縣車上卑耳之西極故水受斯名也管子封禪篇桓公曰寡人北伐山戎過孤竹西伐大夏涉流沙束馬懸車上卑耳之山水源出沮陽縣東而西北流入清夷水清夷水又西逕沮陽縣故城北秦始皇上谷郡治此王莽改郡曰朔調縣曰沮陰闞駰曰涿鹿東北至疑漏上字谷城六十里魏土地記曰城北有清夷水西流也其水又屈逕其城西南流注于温水濕水南至馬陘山謂之落馬河又東南出山濕水又南入山瀑布飛梁縣河注壑漰湍十許丈謂之落馬洪抑亦孟門之流也濕水自南出山謂之清泉河俗亦謂之曰干水非也濕水又東南逕良鄉縣之北界歴梁山南髙梁水出焉過廣陽薊縣北廣陽今京師薊縣今宛大二縣濕水又東逕廣陽縣故城北謝承漢書曰世祖與銚期出薊至廣陽欲南行即此城也謂之小廣陽濕水又東北逕薊縣故城南魏氏土地記曰薊城南七里有清泉河而不逕其北盖經誤證矣昔周武王封堯後于薊今城内西北隅有薊丘在今舊薊縣城西北即古薊門也因丘以名邑也猶魯之曲阜齊之營丘矣武王封召公之故國也秦始皇二十三年滅燕以為廣陽郡漢髙帝以封盧綰為燕王更燕國城有萬歳宫光明殿王莽改曰廣公縣曰代成東掖門下舊慕容雋立銅馬象處昔慕容廆有駿馬赭白有奇相逸力至雋光夀元年四十九矣而駿逸不虧雋奇之比鮑氏驄命鑄銅以圖其像親為銘讚鐫頌其傍像成而馬死矣大城東門内道左有魏征南將軍建成鄉景侯劉靖碑征南當作征北靖薨于鎮北將軍假節督河北諸軍事嘉平六年薨追贈征北將軍晉司隸校尉王密表功加于民宜在祀典以元嘉四年九月二十日刋石建碑元嘉疑作元康盖晉無元嘉也後十四卷鮑丘水注已作征北元康則此之誤明矣揚于後葉矣濕水又東與洗馬溝水合水上承薊水西注大湖在今順天府西南二十五里湖有二源水俱出縣西北平地道泉流結西湖在府西北玉泉山下泉水瀦而為湖湖東西二里南北三里盖燕之舊池也淥水澄澹川庭望逺亦為逰矚之勝所也湖水東流為洗馬溝側城南東門注昔銚期啟㦸處也啟㦸傳作奮㦸按後漢書銚期傳云期從光武徇薊時薊中起兵應王郎之檄光武趣駕出百姓聚觀滿道不得行期騎馬奮㦸瞋目大呼衆皆披靡乃得去其水又東入濕水濕水又東逕燕王陵南陵有伏道西北出薊城中景明中造浮圖建利當作刹窮泉掘得此道王府所禁莫有尋者通城西北大陵而是二基趾盤固猶自髙壯竟不知何王陵濕水又東南髙梁之水注焉水出薊城西北平地泉東注逕燕王陵北又東逕薊城北又東南流魏氏土地記曰薊東一十里有髙梁之水者其水又東南入濕水也又東至漁陽雍奴縣西今為順天府武清縣入笥溝漢光武建武二年封潁川太守寇恂為雍奴侯魏遣張郃樂進圍雍奴即此城矣笥溝水之别名也魏氏土地記曰清泉河上承桑乾河東流與潞河合濕水東入漁陽所在枝分故俗諺云髙梁無上源清泉無下尾盖以髙梁㣲涓淺薄裁足津通憑藉涓流方成川甽清泉至潞所在分流更為㣲津散漫難尋故也水經注集釋訂訛卷十三
