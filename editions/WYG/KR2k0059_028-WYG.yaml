body:
  text: 水經注集釋訂訛卷二十八歸安沈炳巽撰沔水中又東過堵陽縣堵陽縣今為河南南陽府裕州故城在今湖廣襄陽府鄖縣及南陽府之裕州界堵水出焉自上粉縣北流注之錐指引作堵水入焉堵水在襄陽竹山縣南源出陜西平利縣界下流過竹山縣東入漢水堵水自建平郡界故亭谷東歴新城郡郡故漢中之房陵縣也世祖建武元年封鄧晨為侯國也按後漢書鄧晨傳光武即位封晨房子侯注云房子今趙州縣漢志房子屬常山郡通典趙州臨城縣注云舊是房子天寳中改曰臨城今屬直𨽻正定府非沔水經行之地房陵今為襄陽府房縣又非鄧晨所封之國奈何以常山之房子譌作漢中之房陵耶所不解矣漢末以為房陵郡魏文帝合房陵上庸西城立以為新城郡以孟達為太守治房陵故縣有粉水縣居其上故曰上粉縣也上粉縣在今房縣境堵水之傍有别溪岸側土色鮮黄乃云可噉有言飲此水者令人無病而夀豈其信乎又有白馬山山石似馬望之逼真側水謂之白馬塞孟達為守登之而歎曰劉封申眈據金城千里而更失之乎為上堵吟音韻哀切有惻人心今水次尚歌之堵水又東北逕上庸郡故庸國也春秋文公十六年楚人秦人巴人滅庸庸小國附楚楚有災不救舉羣蠻以叛故滅之以為縣屬漢中郡漢末又分為上庸郡今石泉竹山二縣地城三面際水堵水又東逕方城亭而東北歴嵾山下而北逕堵陽縣南北流注于漢謂之堵口漢水又東謂之澇灘冬則水淺而下多大石又東為淨灘夏水急盛川多湍洑行旅苦之故諺曰冬澇夏淨斷官使命言二灘阻礙又東過鄖鄉縣南今鄖陽府治漢水又東逕鄖鄉縣南之西山山上有石蝦蟇倉卒看之與真不别漢水又東逕鄖鄉縣故城南謂之鄖鄉灘縣故黎也即長利之鄖鄉矣地理志曰鄖有關李竒以為鄖子國晉太康五年立以為縣鄖郷本漢錫縣唐屬均州元改鄖縣元和志鄖鄉縣漢水西自豐利縣界流入南去縣三里豐利今白河也漢水又東逕琵琶谷口梁益二州分境於此故謂之琵琶界也又東北流又屈東南過武當縣東北今為均州在襄陽府西北三百九十里西去興安州七百里縣西北四十里漢水中有洲名滄浪洲庾仲雝漢記謂之千齡洲非也是世俗語訛音與字變矣地説曰水出荆山東西胡引作南流為滄浪之水是近楚都故漁父歌曰滄浪之水清兮可以濯我纓滄浪之水濁兮可以濯我足余按尚書禹貢言導漾水東流為漢又東為滄浪之水不言過而言為者明非他水決入也葢漢沔水自下有滄浪通稱耳纒絡鄢郢胡引作鄀地連紀郢咸楚都矣漁父歌之不違水地滄浪洲傳朱箋滄浪洲傳宋本作按考洲傳但洲字恐亦譌當作按考經傳差為得耳宜以尚書為正耳自均州以至漢陽皆名滄浪之水故曰是近楚都禹貢錐指曰以今輿地言之漢水自南鄭縣南又東逕城固縣南城固在漢中府東少北七十里水去縣四里舊志云縣東二里有飲馬灘每子午二時潮響如雷又五里為上濤下濤龍亭廢縣在縣東龍亭山下即龍下也又東逕洋縣南洋縣在府東南一百二十里水去縣二里又東逕西鄉縣東北西鄉在府東南二百二十里又東南逕石泉縣南石泉在興安州西二百五十里水去縣五十步又東逕漢隂縣南漢隂在州西少北一百六十里水去縣八十里又東逕紫陽縣南紫陽在州西南一百八十里州志云有怯灘在縣西十五里水陡如鬭又大力灘在縣西八里兩岸夾石左右有兩石觜最為舟楫患又石梁灘在縣西當任河水口中宫灘在縣東南一里極髙險中流有柱石怒濤之聲如雷長灘在縣東四里近汝河灘不甚險商舟停集漁火絡繹皆漢水所經也又東北逕興安州北州志云州境漢江多灘麩灘串灘二郎灘為險而神灘尤甚明成化十三年知州鄭福於沍冬時用火燒石疏鑿以殺其勢舟行利焉州東一里有長春隄成化八年為水衝壊十五年鄭福增築髙堅萬厯二十年復加修築又東逕洵陽縣南旬陽在州東一百二十里水在縣南門外又東逕白河縣北白河在州東南一百七十里又東逕鄖西縣南鄖西在湖廣鄖陽府西一百四十里水去縣五十里又南逕鄖縣南明成化十二年置鄖陽府治鄖縣舊志云漢江自城西遶城南寳葢天馬諸山皆錯列漢濵又東逕均州北均州在襄陽府西北三百九十里水去州四十里經所謂又東為滄浪之水者也漢水又東為很子潭潭中有石磧洲長六十丈廣十八丈世亦以此洲為很子塟父於斯故潭得厥目焉所未詳也漢水又東南逕武當縣故城北世祖封鄧晨子堂按晨傳當作棠為侯國内有一碑文字磨滅不可復識俗相傳言是華君銘亦不詳華君何代之士漢水又東平陽川水注之水出縣北伏親山南歴平陽川逕平陽故城下平陽故城在今均州界又南流注于沔沔水又東南逕縣城東又東曾水注之水導源縣南武當山一曰太和山亦曰嵾上山山形特秀又曰仙室明一統志太和山在均州南一百二十里山有二十七峰三十六岩二十四澗五臺五井三泉三潭初名仙室山又名太嶽山正武奉元君之言遊覽至此改名太和其中一峰最髙者舊為天柱峰亦曰紫霄峰因棲止修煉後人謂非正武不足以當之又更名武當山荆州啚副記曰山形特秀異於衆嶽峰首狀博山香爐亭亭逺出藥食延年者萃焉晉咸和中歴陽謝允捨羅邑宰隠遁斯山故亦曰謝羅山曾水發源山麓逕越山隂東北流注于沔謂之曾口沔水又東逕龍巢山下山在沔水中髙十五丈廣員一里二百三十步山形峻峭其上秀林茂木隆冬不凋又東南逕涉都縣東宋本作城北故鄉名也按郡國志筑陽縣有涉都鄉者也漢武帝元光元年按史表是元封元年封南海守降侯子嘉為侯國均水於縣入沔謂之均何氏云圴當作汋詳汋水下口也涉都城在今穀城縣界均水自南陽府淅川縣流逕均州至榖城入漢今故道已湮又東南過鄼縣之西南縣治故城南臨沔水謂之鄼頭漢髙帝五年封蕭何為侯國也薛瓉曰今南鄉鄼頭是也茂陵書曰在南陽王莽更名南庾者也今光化縣有鄼縣故城又南逕榖城東又南過隂縣之西今榖城縣北有故榖城隂縣故城在今光化縣東北沔水東逕榖城南而不逕其東矣城在榖城山上春秋榖伯綏之邑也墉闉頽毁基塹亦存沔水又東南逕隂縣故城西故下隂也春秋昭公十九年楚工尹赤遷隂于下隂是也縣東有縣令濟南劉熹字德怡魏時宰縣雅好博古學教立碑載生徒百有餘人不終業而夭者因塟其地號曰生墳沔水又東南得洛溪口水出縣西北集池陂東南流逕洛陽城何氏云洛陽疑作筑陽北抗洛溪溪水東南注沔水也又南過筑陽東筑陽廢縣在今榖城縣東四里筑水出自房陵縣東過其縣南流注之沔水又南汎水流注之水出梁州閬陽縣魏遣夏侯淵與張郃下巴西進軍宕渠劉備軍汎口即是水所出也張飛自别道襲張郃於此水郃敗棄馬升山走還漢中汎水又東東下疑冇逕字巴西歴巴渠北新城上庸東逕汎陽縣故城南晉分筑陽立自縣以上山深水急狂渚崩湍水陸徑絶閬陽汎陽未詳所在又東逕學城南梁州大路所由也舊説昔者有人立學都於此值世荒亂生徒㒺依遂共立城以禦難故城得厥名矣汎水又東流注于沔謂之汎口也沔水又南逕闕胡云一作開林山東在穀城縣西北四里本郡陸道之所由山東有二碑其一即記闕林山文曰君國者不躋髙堙下先時或斷山罡宋本作岡以通平道民多病守長冠軍張仲瑜乃與邦人築斷故山道於當是作或當作於此立銘此銘其一郭先生碑先生名輔字甫成有孝友悅學之羙其女為立碑於此葢宋本作並無年號皆不知何代人也沔水又南逕筑陽縣東又南筑水注之杜預以為彭水也水出梁州新城郡魏昌縣界縣以黄初中分房陵立筑水東南流逕筑陽縣水中有孤石挺出其下澄潭時有見此石根如竹根而黄色見者多凶相與號為受疑譌石酉陽雜俎引此事作承受石所未詳也筑水又東逕筑陽縣故城南縣故楚附庸也秦平鄢郢立以為縣王莽更名之曰宜禾也建武元年世祖封吳財為侯國後漢書吳漢傳建武二十八年封漢子旴為筑陽侯今云元年吳財並誤筑水又東流注于沔謂之筑口沔水又南逕髙亭山東山有靈焉士民奉之所請有驗今南陽府榖城縣治即筑陽故城筑水在縣南髙亭山在縣北沔水又東為漆灘新野郡山都縣與順陽筑陽分界於斯灘矣又東過山都縣東北今襄陽縣西北有山都故城沔南有固城城側沔川即新野山都縣治也舊南陽之赤鄉矣秦以為縣漢髙后四年封衛將軍王愪為侯國按史表作王恬漢表作恬啓今云王愪誤沔北有和城即郡國志所謂武當縣之和城聚山都縣舊嘗治此故亦謂是處為故縣灘沔水北岸數里有大石激疑作礉下同名曰五女激或言女父為人所害居固城五女思復父怨故立激以攻城城北今淪於水亦云有人塟沔北墓宅將為水毁其人五女無男皆悉巨富共修此激似今墳宅然激作甚工又云女嫁為隂縣很子家貨萬金而自少小不從父語父臨亡意欲塟山上恐兒不從故命言塟我著渚下石磧上很子曰我由來不奉教今從語遂盡散家財作石塚積土繞之成一洲長數百步元康中始為水所壊今石皆如半榻許數百枚聚在水中佷子是前漢人襄陽太守胡烈有恵化補塞隄決民賴其利景元四年九月百姓刋石銘之樹碑於沔水又東偏淺冬月可涉渡謂之交湖兵戎之交多自此濟晉太康中得鳴石於此水撞之聲聞數里沔水又東逕樂山北今襄陽西北六十里獨樂山是也昔諸葛亮好為梁甫吟每所登遊故俗以樂山為名沔水又東逕隆中今襄陽府西三十里隆中山是也山下有諸葛亮宅宅西有避暑臺三顧門歴孔明舊宅北亮語劉禪云先帝三顧臣於草廬之中咨臣以當世之事即此宅也車騎沛國劉季和之鎮襄陽也與犍為人李安共觀此宅命安作宅銘云天子命我于沔之陽聽鼓鞞而永思庶先哲之遺光後六十餘年永平之五年習鑿齒又為其宅銘焉水經注集釋訂訛卷二十八
