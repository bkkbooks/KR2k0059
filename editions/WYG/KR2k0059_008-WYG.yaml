body:
  text: 水經注集釋訂卷八歸安沈炳巽撰濟水二濟水又東至乘氏縣西分為二乘氏城有二一在鉅野縣西南五十里漢置縣一在曹縣界内後魏以後縣治也春秋左𫝊僖公三十八年按左傳乃三十一年分曹地東傅於濟濟水自是東北流岀巨澤其一水東南流其一水從縣東北流入鉅野澤南為荷水北為濟瀆菏澤在兖州府曹州境内逕乘氏縣與濟渠濮溝合北濟自濟陽縣北東北逕煑棗城南郡國志曰寃胊縣有煑棗城即此也漢高祖十二年封革朱為侯國按史記表作煑棗侯赤索隱曰漢表作革朱革音棘姓葢子成之後也北濟又東北逕寃胊縣故城北又東北逕吕都縣故城南王莽更名之曰祁都也又東北逕定陶縣故城北漢景帝以濟水出其北東注中元六年分梁於定陶置濟隂郡指為濟而定名也又東北與濮水謝云水下當有㑹字濮水在大名府開州東南六十里上承濟水於封丘縣即地理志所謂濮渠水首受濟者也闞駰曰首受别濟即北濟也其故瀆自濟東北流左迤為高梁陂方三里濮水又東逕匡城北在今開封府睢州西三十里又直𨽻大名府長垣西南三十里亦有匡城孔子去衞適陳遇難於匡者也又東北左會别濮水受河於酸棗縣故杜預云濮水出酸棗縣首受河竹書紀年曰魏襄王十年十月大霖雨疾風河水溢酸棗郛漢世塞之故班固云大堙酸棗也今無水其故瀆東北逕南北二棣城間左𫝊襄公五年楚子囊伐陳公會于城棣以救之者也濮渠又東北逕酸棗縣故城南韓國矣圏稱曰昔天子建國名都或以合名朱箋吳本改作姓名玉海引此亦作合名或以山林故豫章以樹氏都酸棗以棘名邦故曰酸棗也漢官儀曰舊河堤謁者居之城西有韓王望氣臺孫子荆故臺賦叙曰酸棗寺門外夾道左右有兩故臺訪之國老云韓王聽訟觀臺高一十五仞雖樓泯滅謝云樓下當有榭字然廣基似於山嶽邵公大賢猶舍甘棠區區小國而臺觀隆崇驕盈於世以鑒來今故作賦曰薎丘陵之邐迤亞五嶽之嵯峨言壯觀也城北韓之市地也聶政為濮陽嚴仲子刺韓相俠累遂披靣而死其姊哭之於此城内後有漢酸棗令酸棗今為開封府延津縣地劉孟陽碑濮水北稱成陂陂方五里號曰同池陂又東逕胙亭東注故胙國也富辰所謂邢茅胙祭周公之𦙍也濮渠又東北逕燕城内故南燕姞姓之國也有北燕故以南氏縣東為陽清湖陂南北五里東西三十里亦曰燕城湖逕桃城南即戰國䇿所謂酸棗虛桃者戰國䇿容説秦王曰王又舉甲兵而攻魏社大梁三門舉河内㧞燕酸棗虛桃人史記秦始皇本紀注索隱曰桃人魏邑燕虛二邑名正義曰燕古田反括地志曰南燕城古燕國也滑州胙城是也者下疑漏也字漢高帝十二年封劉襄為侯國史記表高帝十二年封劉襄為桃侯而東注于濮俗謂之朝平溝濮渠又東北又與酸水故瀆會酸瀆首受河於酸棗縣東逕酸棗城北延津南謂之酸水竹書紀年曰秦蘓胡率師伐鄭韓襄敗秦蘓胡于酸水者也酸瀆水又東北逕燕城北又東逕滑臺城南又東南逕瓦亭南春秋定公八年公會晉師於瓦魯尚執羔左傳定公八年公會晉師于瓦范獻子執羔趙簡子中行文子皆執雁魯于是始尚羔自是會始也又東南會于濮世謂之百尺溝濮渠之側有漆城竹書紀年梁惠成王十六年邯鄲伐衞取漆富兵城之者也謝云當作丘按竹書本作兵或亦謂之菀濮亭春秋寗武子與衛人盟于菀濮杜預曰長垣而南近濮水也京相璠曰衛地也似非闗菀而不知其所竹書紀年梁惠成王五年公子景賈率師伐鄭韓眀戰于陽竹書作韓我師敗逋澤北壇陵亭亦或謂之大陵城非所究也又有桂城竹書紀年梁惠成王十七年齊田期伐我東鄙戰于桂陽我師敗逋亦曰桂陵案史記齊威王使田忌擊魏敗之桂陵齊於是彊自稱為王以令天下濮渠又東逕蒲城北故衛之蒲邑孔子將之衛子路出於蒲者也韓子曰魯以仲夏起長溝子路為蒲宰以私粟饋衆孔子使子貢毁其噐焉余案家語言仲由為蒲宰修溝瀆與之簟食瓢飲夫子令賜止之無魯字又入其境三稱其善身為大夫終死衛難濮渠又東逕韋城南即白馬縣之韋鄉也史遷記曰夏伯豕韋之故國矣城西出而不方城中有六大井皆隧道下俗謂之江井也有馳道自城屬于長垣濮渠東絶東馳道逕長垣縣故城長垣縣今屬直𨽻大名府其故城在今縣西南三十五里北衛地也故首垣矣秦更從今名王莽改為長固縣陳留風俗𫝊曰縣有防垣故縣氏之孝安帝以建光元年封元舅來一作宋俊為侯國縣有祭城濮渠逕其北鄭大夫祭仲之邑也杜預曰陳留長垣縣東北有祭城者也圏稱又言長垣縣有羅亭故長羅縣也長羅縣故城在舊長垣縣西南三十里漢封後將軍常惠為侯國地理志曰王莽更長羅為惠澤後漢省并長垣有長羅澤即吳季英牧猪處也朱箋後漢書吳祐字季英年二十䘮父居無擔石常牧豕長垣澤中後舉孝亷又有長羅罡蘧伯玉罡陳留風俗𫝊曰長垣縣有蘧伯鄉一名新鄉有蘧亭伯玉祠伯玉塚曹大家東征賦曰到長垣之境界兮察農野之居民覩蒲城之丘墟兮生荆棘之蓁蓁蘧氏在城之東南兮民亦嚮一作饗今東征賦作尚其丘墳唯令徳之不朽兮身既沒而名存昔吳季札聘上國至衛觀典府賔亭父疇以衛多君子也朱箋按左傳襄公二十九年吳公子札適衛説蘧瑗史狗史鰌公子荆公子發公子朝曰衛多君子未有患也今云至衛觀典府云云未詳濮渠又東分為二瀆北濮出焉濮渠又東逕須城北衛詩云思須與曹也毛云須衛邑矣鄭云自衛而東逕邑故思濮渠又北逕襄丘亭南竹書紀年曰襄王七年韓明率師伐襄丘十年楚庶章率師來會我次于襄丘者也濮水東逕濮陽縣故城南昔師延為紂作靡靡之樂武王伐紂師延東走自投濮水而死矣後衛靈公將之晉而設舍於濮水之上夜聞新聲召師㳙受之於是水也韓非子十過篇昔者衛靈公將之晉至濮水之上稅車而放馬設舍以宿夜分而聞鼓新聲者而說之使人問左右盡報弗聞乃召師㳙而告之曰有鼓新聲者其狀似鬼神子為聽而寫之師㳙曰諾因靜坐撫琴而寫之明日報曰臣得之矣遂去之晉晉平公觴于施夷之臺酒酣靈公起公曰有新聲願請以示平公曰善乃召師㳙令坐師曠之旁援琴鼔之未終師曠撫止之曰此亡國之聲不可遂也平公曰此道奚出曠曰此師延之所作與紂為靡靡之樂也及武王伐紂師延東走至于濮水而自投故聞此聲者必于濮水之上先聞此聲者其國必削不可遂也平公曰寡人所好者音子其使遂之師㳙鼓究之濮水又東逕泲隂離狐縣故城南王莽之所謂狐瑞也在兖州府曹縣界内漢為縣郡國志曰故屬東郡濮水又東逕葭密縣故城北故城在今曹縣西北三十里竹書紀年幽公十三年竹書作晉幽公三年魯季孫會晉文公文公誤當是幽公於楚丘即葭密遂城之濮水又東北逕鹿城南郡國志曰濟隂乘氏縣有鹿城一作乘鄉春秋僖公二十一年盟于鹿上京杜並謂此亭也濮水又東與勾瀆首受濮水枝渠於句陽縣東南逕勾陽縣故城在曹縣北三十里漢置縣後省南春秋之糓丘也左𫝊以為勾瀆之丘矣縣處其陽故縣氏焉又東入乘氏縣左會濮水與濟同入鉅野故地理志曰濮水自濮陽南入鉅野亦經所謂濟水自乘氏縣兩分東北入於鉅野也濟水故瀆又北右合洪水上承鉅野薛訓渚厯澤西北又北逕闞鄉城西春秋桓公十有一年經書公會宋公于闞郡國志曰東平陸有闞亭皇覽曰蚩尤冢在東郡夀張縣闞鄉城中冢高七尺常十月祠之有赤氣出如絳民名為蚩尤旗十三州志曰夀張有蚩尤祠又北濟濟上當有與字瀆合自渚迄于北口一百二十里名曰洪水桓温以太和四年率衆北入掘渠通濟至義熙十三年劉武帝西入長安又廣其功自洪口已上又謂之桓公瀆濟自是北注也春秋莊公十八年經書夏公追戎於濟西京相璠曰濟水自鉅野至濟北是也又東北過夀張縣西界安民亭南汶水從東北來注之今東平州西南有夀張故城西北去今夀張縣五十里州西南十里有安山鎮即古安民亭濟水又北汶水注之汶水源發泰安州西南流至兖州府經寕陽平隂汶上縣界又西至東平州界注濟河故道東北流經東阿縣界又東北流至濟南府界入海戴延之所謂清口也郭縁生述征記曰清河首受洪水北流濟或謂清則濟也禹貢濟東北㑹于汶今枯渠注巨澤巨澤北則清水清水與汶㑹也禹貢錐指濟水自菏澤東北流絶巨野澤而北合洪水以至安民亭南者禹之舊跡也其後不知何年改從澤西之清水而繞澤北以㑹汶謂之清口其澤中之道自洪口至清口者則無水故水經謂之故瀆述征記謂之枯渠今㑹通河逕鉅野縣東北七十里去故城已逺并清水㑹汶之故道亦湮没而不可考况禹之舊跡乎以今輿地言之汶水自莱蕪歴泰安肥城寧陽至東平入濟合流以注于海此禹迹也迨元人引汶絶濟為㑹通河明永樂中又築戴村壩遏汶水盡出南旺以資運而安山入濟之故道填淤久矣李欽曰汶水出太山萊蕪縣今屬濟陽府西南入濟是也濟水又北逕梁山東括地志云梁山在鄆州夀張縣南二十五里今在東平州西南五十里接汶上縣界梁山濼在今夀張縣東梁山之南汶濟既合東北滙而成濼日知錄云五代史晉開運元年滑州河決浸汴曹濮單鄆五州之境環梁山合于汶水與南旺蜀山湖連瀰漫數百里金史食貨志黄河已移故道梁山濼水退地甚廣遣使安置屯田自此以後鉅野夀張諸邑古時瀦水之地無尺寸不耕而忘其昔日之為川浸矣袁宏北征賦曰背梁山截汶波即此處也劉澄之引是山以證梁父為不近情矣山之西南有吕仲悌墓朱箋晉陽秋曰吕安字仲悌東平人志量開曠有㧞俗風氣與􅄞康為友每一相思千里命駕河東岸有石橋橋本當河河移故側岸也古老言此橋東海吕母起兵所造也山北三里有吕母宅宅東三里即濟水朱箋東觀漢記海曲吕母之子為縣令所殺母破産結諸少年得數百人入海自稱將軍遂破海曲執縣宰斬之以其首祭子塚濟水又北逕須朐城西東平州西南有須朐故城城臨側濟水故須國風姓也春秋僖公二十一年子魚曰任宿須朐顓臾風姓也實司太皥與有濟之祀朱箋按左傳僖公二十一年諸侯㑹宋公于盂子魚曰禍其在此乎君欲已甚其何以堪之於是楚執宋公以伐宋冬㑹于薄以釋之子魚曰禍猶未也未足以懲君子魚之言止此其下任宿須朐云云另是一傳乃是為邾人滅須句張本如何可混作子魚之言下疑有譌脫杜注任宿須句顓臾四國名俱伏羲之後四國封近于濟故世祀之杜預曰須朐在須昌縣西北非也地理志曰壽張縣西北有朐城者是也濟水西有安民亭亭北對安民山東臨濟水水東即無鹽縣界也今為兖州府東平州州西南有須朐故城其故城在州東三十里山西有冀州刺史王紛碑漢中平四年立濟水又逕微鄉東春秋莊公二十八年經書冬築郿京相璠曰公羊傅謂之微在東平壽張縣西北三十里有故微鄉魯邑也杜預曰有微子冢何氏云案左傳注但云郿魯下邑無有微子冢四字葢此處有脫文耳濟水又北分為二水其枝津西北出馬馬下疑有脫字或疑作焉謂之馬頰水者也又北過須昌縣西今東平州西有須昌縣故城京相璠曰須朐一國二城兩名葢遷都須昌朐是其本秦以為縣漢高帝十一年封趙衍為侯國濟水於縣縣下疑有脫字趙溝水注之濟水又北逕魚山東左合馬頰水元和志云魚山在東阿縣東二十里近志云在縣西以宋初縣治東移故也水首受濟西北流歴安民山北又西流趙溝出焉東北注于濟馬頰水又逕桃城東春秋桓公十年經書公會衛侯于桃丘衛地也杜預曰濟北東阿縣今屬兖州府東南有桃即桃丘矣馬頰水又東北流逕山南山即吾山也漢武帝瓠子歌所謂吾山平者也山上有抑舒城魏東阿王曹子建每登之有終焉之志及其終也葬山西西朱云宋本無下西字去東阿城四十里其水又東注于清濟謂之馬頰口也濟水自魚山北逕清亭東春秋隱公四年公及宋公遇于清者也京相璠曰今濟北東阿東北四十里有故清亭即春秋所謂清者也是濟水通得清之目焉亦水色清深用兼厥稱矣是故燕王曰吾聞齊有清濟濁河以為固即此水也按春秋莊公三十年公及齊侯遇于魯濟杜預曰濟水歴齊魯界在齊界為齊濟在魯界為魯濟濟水自清亭又北則為糓城齊地矣濟之為齊為魯當分于此間也又北過榖城縣西今為東阿縣治濟水側岸有尹夘壘南去魚山四十餘里魚山在東阿縣西八里一名吾山是榖城縣界故春秋之小榖城也齊桓公以魯莊公二十三年城之邑管仲焉城内有夷吾井魏土地記曰縣有榖城山在東阿縣東北五里一名黄山山出文石陽榖之地春秋齊侯宋公會于陽榖者也榖有黄山臺黄石公與張子房期處也又有狼水出東南大檻山狼溪西狼溪水源發東阿縣東南二十八里狼山下西北流經縣城内又北流入汶水狼溪西北逕榖城西又北有西流泉出城東近山西北逕榖城北西注狼水以其流西故即名焉又西北入清水城西北三里有項王羽之冢半許毁壞石碣尚存題云項王之墓皇覽云冢去縣十五里謬也今彭城榖陽城西南又有項羽冢非也余按史遷記魯為楚守漢王示羽首魯乃降遂以魯公禮葬羽於榖城寧得言彼也項羽墓今在東阿縣東南一十一里濟水又北逕周首亭西春秋文公十有一年左丘明云襄公二年王子成父獲長狄僑如弟滎如埋其首於周首之北門即是邑也按左傳文公十有一年鄋瞞侵齊遂伐我公使叔孫得臣追之冬十月甲午敗狄于鹹獲長狄僑如富父終甥摏其喉以戈殺之埋其首于子駒之門晉之㓕潞也獲僑如之弟焚如齊襄公之二年鄋瞞伐齊齊王子成父獲其弟滎如埋其首于周首之北門云云則是十一年非十二年襄公上漏去齊字竟似魯襄公二年矣况獲僑如者是魯之叔孫得臣獲滎如者乃齊王子成父今并僑如亦云王子成父所獲烏乎可且僑如之首埋于子駒之門滎如之首埋于周首北門傳文甚明今牽連書之則二首俱埋周首北門矣僑如下當有之字便明今世謂之盧子城濟北郡治也京相璠曰今濟北所治盧子城故齊周首邑也又北過臨邑縣東按通典漢臨邑故城在盧縣東今為東昌府茌平縣地地理志曰縣有濟水祠也王莽之榖城亭也水有石門以石為之故濟水之門也春秋隱公五年齊鄭會于石門鄭車僨濟即於此也朱有箋按左𫝊是隱公三年京相璠曰石門齊地今濟北盧縣故城西南六十里有故石門去水三百歩葢水瀆流移故側岸也濟水又北逕平隂城西平隂本齊地漢為盧縣晉因之隋置榆山縣後為平隂縣今屬兖州府春秋襄公十八年晉侯沈玉原本譌王濟河㑹于魯濟㝷溴渠當作梁之盟同伐齊朱箋左𫝊襄公十八年晉侯伐齊將濟河中行獻子以朱絲係玉二㲄以禱焉沈玉而濟冬十月㑹于魯濟尋溴之言同伐齊齊侯禦諸平隂塹防門而守之廣里注曰平隂城在濟北盧縣東北其城南有防防有門于門外作塹横行廣一里齊侯禦諸平隂者也杜預曰城在盧縣故城東北非也京相璠曰平隂齊地也在濟北盧縣故城西南十里平隂城南有長城東至海西至濟河道所由名防門去平隂三里齊侯塹防門即此也其水引濟故瀆尚存今防門北有光里齊人言廣音與光同即春秋所謂守之廣里者也又云巫山在平隂東北昔齊侯登望晉軍畏衆而歸師曠邢伯聞烏鳥之聲知齊師潛遁人物咸淪地理昭著賢於杜氏東北之證矣今巫山之上有石室世謂之孝子堂濟水右迤過為湄湖方四十餘里濟水又東北至垣苗城西今在濟南府長清縣西南元和志云長清縣濟水在北去縣十里即今大清河也對岸則齊河縣大清橋跨其上為南北通衢故洛當城也伏滔北征記曰濟水又與清河合流至洛當者也宋武帝西征長安令桓遵鎮此故俗人有桓苗之稱河水自泗瀆口東北流而為蒲魏土地記曰盟津河别流十里與清水合亂流而東逕洛當城北黒白異流涇渭殊别而東南流注也又東北過盧縣北今為長清平隂等縣地濟水東北與湄溝合水上承湄湖北流注濟爾雅曰水草交曰湄通谷者微犍為舍人曰水草木交合也朱有箋按爾雅䟽李廵曰水草交會曰湄郭景純曰微水邊通谷也釋名曰湄眉也臨水如眉臨目也濟水又逕盧縣故城北故城在長清縣西南二十里濟北郡治也漢和帝永元二年分泰山置葢以濟水在北故也濟水又逕什城北城際水湄故邸閣也祝阿人孫什將家居之以避時難因謂之什城焉濟水又東北與中川水合水東南出山茌縣山茌縣故城在今長清縣東北之分水縣謝云宋本作嶺溪一源兩分泉流半解亦謂之分流交半水南出太山入汶半水出山茌縣西北流逕東項本作東逕太原郡南郡治山爐固北朱本注孫云太原劉宋僑置山爐當作山茌謝云固北宋本作西北與漢賔谷水合水出南格馬山漢賔溪北逕盧縣故城北陳敦戍南西北流與中川合謂之格馬口其水又北逕盧縣故城東而北流入濟俗謂之為沙溝水濟水又東北右會玉水導源太山朗公谷谷舊名琨瑞溪有沙門笁僧朗少事佛圖澄碩學淵通尤明氣緯隱于此谷因謂之朗公谷故車頻秦書云苻堅時沙門笁僧朗嘗從隱士張巨和遊巨和常宂居而朗居琨瑞山大起殿舍連樓疊閤雖素飾不同並以靜外致稱即此谷也水亦謂之琨瑞水也其水西北流逕玉符山又曰玉水又西北逕獵山東又西北逕祝阿縣故城東柷阿故城亦在長清縣野井亭西春秋昭公二十五年經書齊侯唁公于野井是也春秋襄公十九年諸侯盟于祝阿春秋作柯左𫝊所謂督陽者也漢興改之曰阿矣漢高帝十一年封高色為侯國王莽之安城者也故俗謂是水為祝阿澗水北流注于濟建武五年耿弇東擊張步從朝陽橋濟渡兵即是處也濟水又東北濼水出焉禹貢錐指寰宇記濼水在厯城西南二百步元和志全節縣濟水在縣北四十里按今濟南府治歴城縣東有東平陵故城漢縣唐貞觀中改名全節屬齊州曽鞏齊州二堂記曰泰山之北與齊東南諸谷之水西北合于黒水之灣而至于渴馬之崖葢水之來也衆其北折而西也悍疾尤甚及至于崖下則泊然而止而自崖以北至於厯城之西葢五十里而有泉湧出高或至數尺其旁之人名之曰趵突之泉其注而北則謂之濼水達于清河以入于海舟之通于濟者皆于是乎達也齊多甘泉其顯名者十數而色味皆同以余驗之葢皆濼水之旁出者也齊乘曰今府城西平地泉源觱涌聲如隱雷旁合馬跑金線諸泉周可數畝北出又合密脂五龍衆泉並城北流屈而東至城北水門大明湖水出注也濼水出歴縣故城西南泉源上奮水涌若輪春秋桓公十八年公會齊侯于濼是也俗謂之為娥姜水也以泉源有舜妃娥英廟故也城南對山山上有舜祠山下有大穴謂之舜井今在濟南府城内抑亦茅山禹井之比矣書舜耕厯山亦云在此所未詳也其水北為大明湖明一統志在濟南府城内西北隅源出舜井其大占府城三之一由北水門出與濟水合西即大明寺寺東北兩面側湖此水便成淨池也池上有客亭左右楸桐負日俯仰目對魚島極朱箋疑有脫字或是極望水木明瑟可謂濠梁之性物我無違矣湖水引瀆東入西郭東至歴城西而側城北注湖水上承東城歴祀李云疑作祠下泉源競發其水北流逕歴城東又北引水為流柸池州僚賔燕公私多萃其上分為二水右水北出左水西逕歴城北西北為陂謂之歴水與濼水㑹自水枝津合水首受歴水於歴城東東北逕東城西而北出郭又北注濼水又北聽水出焉濼水又北流注于濟謂之濼口也濟水又東北疑漏逕字華不注山在歴城縣東北十五里單椒秀澤不連湖引陵上有丘字連作縁陵以自高虎牙桀立孤峯特㧞以刺天青崖翠發望同㸃黛山下有華泉故京相璠曰春秋土地名也華泉華不注山下泉水也春秋左𫝊成公二年齊頃公與晉郤克戰于鞌齊師敗績逐之三周華不注逢丑父與公易位將及華泉驂絓於木而止丑父使公下如華泉取飲齊侯以免韓厥獻丑父郄子將戮之呼曰自今無有代其君任患者有一於此將為戮矣郄子曰人不難以死免其君我戮之不祥赦之以勸事君者乃免之即華水也北絶聽瀆二十里注于濟又東北過臺縣北今歴城縣東北有臺縣故城巨合水南出雞山西北巨合水在濟南府城七十里東源曰偷科泉西源曰江水泉北流各五里許合流入小清河北逕巨合故城西耿弇之討張歩也守巨里後漢書注巨里聚名也一名巨合今齊州即此城也三面有城西有深坑坑西即弇所營也與費邑戰斬邑於此巨合水又北合闗盧水闗盧水導源馬耳山北逕博亭城西西北流至平陸城與武原水合水出譚城南平澤中世謂之武原泉北逕譚城東俗謂之有城也又北逕東平陵縣故城西故陵城也後乃加平譚國也齊桓之出過譚譚不禮焉魯莊公九年即位又不朝十年滅之城東門外有樂安任照先碑濟南治也漢文帝十六年置為王國景帝二年為郡王莽更名樂安郡其水又北逕巨合城東漢武帝以封城陽頃王子劉發于為侯國漢表作鉅合侯發無于字其水合闗盧水而出注巨合水西北逕臺縣故城南漢高帝六年封東郡尉戴野為侯國王莽之臺治也其水西北流白野泉水注之出臺城西南白野泉北逕留山西北流而右注巨合水又北聽水注之水上承濼水東流北屈又東北流注于巨合水亂流又北入于濟濟水又東北合芹溝水水出臺縣故城東南西北流逕臺城東又西北入于濟水又東北過管縣南今章丘縣西北有菅縣故城隋改置臨濟唐屬齊州百脉出土鼔縣故城西源方百步百泉俱出西北流注于濟縣元和志臨濟縣濟水在縣南二十里章丘縣濟水在西去縣十七里舊志小清河在章丘縣北三十里濟水東逕縣故城南漢景帝二年封齊悼惠王子罷軍為侯國右納百脉水百脉水出土鼓縣故城西水源方百歩百泉俱出故謂之百脉水其水西北流逕楊丘縣故城中漢孝景帝四年按表是文帝四年封以封齊悼惠王子劉安為楊丘侯世謂之章丘城非也城南有女郎山山上有神祠俗謂之女郎祠左右民祀焉其水西北出城北逕黄中當作巾固葢賊所屯故固得名焉百脉水又東北流注于濟濟水東又有楊渚溝水逕於陵故城西南於陵故城在長山縣長白山北漢置縣晉改曰烏陵後省西北逕土鼓城東又西北逕章丘城東又北逕寗西而北流注于濟水也又東過梁鄒縣北元和志濟陽濟水在縣南長山縣濟水在西北去縣三十五里鄒平縣濟水在北去縣三十五里按梁鄒故城唐置濟陽縣屬淄州今為鄒平縣治其唐之鄒平縣則割入今之齊東縣界金志長山新城二縣西北並有小清河新城本漢高苑其故城在今縣東瀧水南出長城中北流至般陽縣故城西南與般水會水出縣東南龍山俗亦謂之為左阜水西北逕其城南王莽之濟南亭也應邵曰縣在般水之陽縣資名焉其水又南屈西入瀧水北逕其縣西北流至萌水口萌水出西南甲山東北逕萌山西東北入于瀧瀧水又西北至梁鄒東南與魚子溝水合水南出長白山東抑泉口山即陳仲子夫妻之所隱也孟子曰仲子齊國之世家兄戴禄萬鍾仲子非而不食避兄離母家于於陵即此處也其水又逕於陵縣故城西王莽之於陸也世祖建武十五年更封則鄉侯侯覇為侯國其水北流注于瀧水瀧水即古袁水也故京相璠曰濟南梁鄒縣有袁水者也瀧水又西北逕梁鄒縣故城南又北屈逕其城西漢高祖六年封武虎為侯國史記作武儒漢書作武虎其水北注濟其城之東北又有時水西北注焉又東北過臨濟縣南錐指云今高苑城西南有臨濟故城元和志高苑縣濟水在北去縣七十歩縣故狄邑也王莽更名利居漢記安帝永初二年改從今名以臨濟以臨濟三字疑衍錐指引此作漢永初二年改名臨濟故地理風俗記云有樂安太守治晏謨齊記曰有南北二城隔濟南水一作水南城即被陽縣之故城也北枕濟水地理志曰侯國也如淳曰音減罷軍之罷也朱箋按漢志注如淳曰被一作疲音罷軍之罷也咸字疑衍史記建元以來王子侯者年表曰漢武帝元朔四年封齊孝王子敬侯劉燕之國也今渤海僑郡治朱箋史記劉燕封披陽侯漢書作被俱音皮又音皮彼反濟水又東北迤為淵渚謂之平州溼沃側有平安縣故城禹貢錐指註今青州府高苑縣東南十里有麻大泊一名魚龍灣周五六十里葢即古濟所匯之平州也俗謂之會城非也案地理志千乘郡有平安縣侯國也王莽曰鴻睦也應劭曰博昌縣西南三十里有安平亭故縣也世尚存平州之名矣濟水又東北逕高昌縣故城在今博興縣西南屬青州府西案地理志曰千乘郡有高昌縣漢宣帝地節四年封董忠為侯國世謂之馬昌城此也原本作北也從朱本作比濟水又東北逕樂安縣今屬青州府故城南云按此經舊在高昌下今㨿薄姑利縣俱南直臨淄而樂安故城在博昌縣東北則此經當在利縣之後甲下之前伏琛齊記曰博昌城故城在博興縣東二十五里西北五十里有南北二城相去三十里隔時濟二水指此為博昌北城非也樂安與博昌薄姑分水俱同西北薄姑去齊城六十里樂安越水差逺驗非尤明班固曰千乘郡有樂安縣應邵曰取休令之名矣漢武帝元朔五年封李蔡為侯國史記表于五年四月丁未封漢表作四年四月乙已封此從史表城西三里有任光等冢光是縣人不得為博昌明矣濟水又經薄姑城北薄姑城在今博昌縣東北一十五里後漢郡國志曰博昌縣有薄姑城地理書曰吕尚封於齊郡薄姑薄姑故城在臨菑縣西北五十里近濟水史遷曰胡公徙薄姑城内有高臺春秋昭公二十二年左𫝊作二十年齊景公飲于臺上曰古而不死何樂如之晏平仲對曰昔爽鳩氏始居之季萴因之有逢伯陵因之蒲姑氏又因之而後太公又因之臣以為古若不死爽鳩氏之樂非君之樂即於是臺也濟水又東北逕狼牙其地無考固西而東北流也又東北過利縣西今􅀶興縣東南有利縣故城此後應接樂安縣經文地理志曰齊郡有利縣王莽之利治也晏謨曰縣在齊城北五十里又東北過甲下邑入于河濟水東北至甲下邑南東歴琅槐縣故城北地理風俗記曰博昌東北八十里有琅槐鄉故縣也山海經曰濟水絶鉅野注勃海入齊琅槐東北者也又東北河水枝津注之水經以為入河非也斯乃河水注濟非濟入河又東北入海錐指云按渤海在今青州府樂安縣東北一百三十里東接壽光縣界北接利津縣界樂安本漢廣饒鉅定二縣屬齊郡其故城並在今縣東北後漢省琅槐入博昌故杜預郭璞皆言濟水至博昌入海東錐指又云以今輿地言之自東平會汶以下兖州之阿平隂濟南之長清齊河歴城章丘鄒平長山新城青州之高苑博興樂安諸縣界中皆禹貢濟水入海之所經也郭景純曰濟自滎陽至樂安博昌入海今河竭濟水仍流不絶經言入河二說並失然河水於濟漯之北别流注海今所輟流者惟漯水耳郭或以為濟注之事實非也㝷經脉水不如山經之為密矣禹貢錐指曰濟水自東平以下唐人謂之清河按戰國䇿燕王謂蘓伐曰齊有清濟濁河以為固郭緣生曰清河首受洪水北流濟或謂清則濟也酈道元曰濟水通得清之目亦水色清深用兼厥稱矣此清河之名所自來也至宋又有南北清河之名河渠志云熙寧十年河決澶州徙而東南滙于梁山張澤濼分為二派一合南清河入于淮一合北清河入于海南清河即泗水北清河即濟瀆也南渡後北清河又有大小之分葢自劉豫導濼東行始齊乘以大清河為古濟水小清河為豫所創志家皆沿其說黄子鴻非之曰以水經注元和志寰宇記諸書考之濟水最南漯水在中河水最北今者小清所經自歴城以東如章邱鄒平長山新城高苑博興樂安諸縣皆古濟水所行而大清所經自歴城以上至東阿固皆濟水故道而自歴城東北如濟陽齊東青城諸縣則皆古漯水所行蒲臺以北則故河水所經葢宋時河嘗行漯瀆及河去則大清兼行河漯二瀆其小清所行則斷為濟水故道也渭按子鴻此言正三百餘年積𫝊之謬葢清河所行本濟瀆不知何時從歴城東北決而北入濟陽縣界與漯水合而清河之名遂被于漯據水經漯水逕著縣故城南著即今濟陽而縣南有大清河是知大清即漯其水自厯城入濟陽乃近世之所決非唐清河入海之故道也濟陽之流日盛則章邱之流日微故劉豫堰濼水使東以益之齊乘云大清河自齊河縣又北經歴城上濼橋北濼水分響河入焉又東北經華不注山隂又東逕下濼堰濼水舊入濟處堰南即小清河按響河即聼水也此大清河猶是濟之故瀆其所行者實濟水故道而志家反以濟陽之大清河為古濟舛錯殊甚不有子鴻其誰正之然大清自歴城入濟陽及濵州以東入海之道不知決于何年意者宋熙寧時河嘗合北清河入海始開此道其後金明昌五年河復由此入海久而後去流益深廣此大清之所以浩浩而小清之所以屢濬屢塞也與水經叙濟水自滎陽以下原委甚悉杜預春秋釋例曰濟自滎陽卷縣東經陳留至濟隂北經高平東經濟北東北經濟南至樂安博昌縣入海郭璞注山海經略同酈道元依水經以立注出河之濟又加詳焉是由東漢以迄後魏濟未嘗一日絶也唐人則據司馬彪之言以為自王莽後河南不復有濟水太子賢注後漢循吏𫝊曰濟水東流逕温縣入河度河東南入鄭州又東入滑曹鄆濟青等州入海王莽末旱則枯涸但入河内而已杜佑通典曰濟水因王莽末旱渠涸不復截河過今東平濟南淄川北海界中有水流入于海謂之清河實菏澤汶水合流而曰濟河葢因舊名非本濟水也李吉甫元和郡縣志曰濟水自王莽末入河同流于海知河南之地無濟水矣自後所說皆襲舊名如鄆州之須昌濟州之長清盧縣齊州之臨邑豐齊全節臨濟章邱淄州之濟陽長山鄒平高苑青州之博昌諸縣界中並有濟水其後則不經博昌而改從棣州之蒲臺入海是皆襲舊名而實非濟也渭按鴻溝既開河水與滎濟相亂及滎澤塞為平地則河南無涓滴之濟矣水經之所謂濟者皆滎陽下所引之河水也而杜預京相璠郭璞酈道元輩皆莫能辨唐人始知之所見逺過于前但以為河南之濟由王莽末旱枯而絶則非以余考之旱枯之事郡國志繫河内温下酈注亦於温縣濟水故瀆下言之其所云枯後復通津渠勢改者謂濟水自温縣入河不復東至武德耳而滎陽以下絶無一字道及殆與河南之濟無渉詳見前釋例自卷縣博昌而外略舉郡名故與水經不同孔穎達以為水流之道今古或殊杜據當時所見言之與水經乖異非也晉時濟水之道實與漢世不殊文有詳畧非枯後復通津渠勢改也若夫唐之清河自須昌以下所受唯菏汶則又有其故矣葢天寶之後汴水堙廢濟渠亦無所受菏澤以西竟成斷港故元和志言濟自須昌始而通典云濟河實菏汶之合流其所謂菏者即五丈溝之水西自考城來者也迨元人開會通河引汶絶濟以資運道明永樂中又于古四汶口之地築戴村壩遏汶使西南流汶水自是盡出于汶上西南至南旺入漕四分南流出上閘接沂泗六分北流出下閘扺漳衛唯小鹽河一綫洩入清河小鹽河在今東阿縣西南二十里即運河所洩汶水支流也清河賴諸山泉溝澤以成其川并無菏汶之可言矣而志家猶執清河以為禹貢之濟水不亦過乎或又云山左諸泉實皆濟水溢為大小清河濟雖絶而不絶也然此等指為濟水則可以是為滎澤陶丘之遺跡可乎哉東漢後河南無濟水斯為定論紛紛筆舌徒兹來學之惑無為也杜佑之譏水經也曰按後漢郡國志因王莽末旱比渠枯涸濟水但入河而已不復截河而南水經是和帝之後所撰乃云南過滎陽陽武封邱寃朐乘氏等縣並今縣地一依尚書禹貢舊道斯不詳之甚酈道元又從而注之其所纂叙及注解並大紕繆渭按河北之濟因旱而枯旱止則復出河南之濟為濁河所侵空竇盡窒河去不復能上涌故遂絶自東漢以迄唐初凡行濟瀆者皆河水也而猶目之曰濟是鵲巢而鳩居觚名而圜實也故杜氏力詆水經以為不可信然滎濟故道猶可因是而得其十之七八則此書不無補焉黄文叔云濟水雖絶其瀆猶在雖中間經穿鑿變易或斷或續然水之附入於其瀆者猶可㝷求緝之以存禹迹非無理也斯言葢得其平濟瀆之水自周以來凡數變初為濟及導滎為川則滎與濟合鴻溝既開滎瀆為河所亂及滎澤又塞則所行者唯河水矣汴渠不通則鉅野以北所行唯菏汶戴村已築則東阿以下所行唯山泉溝澤之水其號為濟者襲舊名而已濟瀆入海之道自唐以來亦數變初經高苑縣北又東北至博昌縣界今無元和志蒲臺縣下云海在縣東一百四十里海畔有一沙阜俗呼為鬭口淀是濟水入河之處海潮與濟相觸故名葢其時濟水改道從蒲臺東北與河渾濤而入海也宋南渡後劉豫導濼水東行入濟水故道為小清河仍經高苑縣北至樂安縣入海及金皇綂中縣令高通改由縣南長沙溝至博興合時水又東北至樂安由馬車瀆入海瀆在縣東北五十里今為高家港其後小清之上流堙塞鄒平長沙新城界中故瀆皆為漯河所行漯河即楊渚溝水寰宇記所稱獺河者也厯城新志云小清河自明永樂以後漸至堙塞成化九年嘗濬治之嘉靖十二年又塞乃復濬博興以西達於厯城幾三百里久之復淤葢小清唯恃濼水為源堰東有阻則濼水仍自華不注東北入大清河屢濬屢塞職是故也水經所叙瀆同而水異水異故李𢎞憲云河南無濟水瀆同故黄文叔云禹迹賴此而猶存言非一端各有所當今與人論濟水苟以為無則羣指七十二泉大小清河以相難若以為有則又據杜佑之說詆水經不當襲舊名為濟明道謂與公言如扶醉人扶得一邉起又倒却一邊真可笑又可憎也其一水東流者過乘氏縣南朱本無南河水分濟於定陶東北東南右合黄汲疑作黄溝枝流俗謂之界溝也北逕元氏縣故城西又北逕景山東在曹縣東四十里廢楚丘城北衛詩所謂景山與京者也毛公曰景山大山也又北逕楚丘城西在曹縣東南五十里郡國志曰成武縣有楚丘亭杜預云楚丘在成武縣西南衛懿公為狄所滅衛文公東徙渡河野處漕邑齊桓公城楚丘以遷之故春秋稱邢遷如歸衛國忘亡即詩所謂升彼墟矣以望楚矣望楚與堂景山與京故鄭𤣥言觀其傍邑及山川也又東北逕成武城西又東北逕郈城東在沂州東三十六里疑郈徙也所未詳矣又東北逕梁山城西地理志曰昌邑縣有梁丘縣春秋莊公三十二年宋人齊人會于梁丘者也朱箋按左傳作宋公齊侯遇于梁丘杜預曰高平昌邑縣西南有梁丘鄉又東北於乘氏縣西而北注河水河水又東南逕乘氏縣故城南縣即春秋之乘丘也乘丘故城在曹縣界内故地理志風俗記曰濟隂乘氏縣故宋乘丘邑也漢孝景中元五年封梁孝王子買為侯國也地理志曰乘氏縣泗水東南至睢陵入淮郡國志曰乘氏有泗水此乃河濟也尚書有導河濟之說自陶丘北東至於菏水無泗水之文又曰導菏澤被孟豬孟豬在睢陽縣之東北闞駰十三洲記曰不言入而言被者明不常入也水盛方乃覆被矣澤水淼漫俱鍾睢泗故誌有睢陵入淮之言以通苞泗名矣然諸水注泗者多不止此可以終歸泗水便得擅通稱也或更有泗水亦可是水之兼其目所未詳也又東過昌邑縣北菏水又東逕昌邑縣故城北地理志曰縣故梁也漢景帝中元六年分梁為山陽國漢武帝天漢四年更為昌邑國以封昌邑王賀賀廢國除以為山陽郡今為兖州府金鄉縣地王莽之鉅野郡也後更為高平郡後漢沇州縣令王密懷金謁東萊太守楊震震不受是其慎四知處也大城東北有金城城内有沇州刺史河東薛季像碑以郎中拜􅣐令甘露降園熹平四年遷州明年甘露復降殿前樹從事馮巡主簿華探等相與褒樹表勒棠政次西有沇州刺史茂陽楊叔恭碑從事孫光等以建寧四年立西北有東太山成人班孟堅碑建和十年尚書右丞拜沇州刺史從事秦閸何氏校改閏等刋石頌德政碑咸列焉閸當作闉又東過金鄉縣南漢為東緍縣屬山陽郡後漢分置金鄉縣以山為名晉以東緍省入後魏以昌邑省入今屬兖州府郡國志曰山陽有金鄉縣河水逕其故城南世謂之故縣城北有金鄉山也又東過東緡縣北濟水又東逕漢平狄將軍扶溝侯淮陽朱鮪冢墓北有石廟濟水又東逕東緡縣故城北故宋地春秋僖公二十三年齊侯伐宋圍緡十三州記曰山陽有東緡縣鄒衍曰余登緡城以望宋都者也後漢世祖建武十一年封馮異長子璋為侯國也又東過方與縣北今為兖州府魚臺縣為菏水濟水東逕重鄉城南左傳所謂臧文仲宿於重館者也菏水又東逕武棠亭北在今魚臺縣北一十三里杜預以為即魯隱公與我會盟之地公羊以為濟上邑也城有臺高二丈許其下臨水昔魯侯觀魚於棠謂此也在方與縣故城在今魚臺縣北一十三里北十里經所謂菏水也水又東逕泥母亭北春秋左𫝊僖公七年秋盟于寗母謀伐鄭也菏水又東與鉅野黄水合菏濟别名也黄水上承鉅澤諸陂澤有濛澱育一作昔陂黄湖水東流謂之黄水又有薛訓渚水自渚歴薛村前分為二流一水東注黄水一水西北入澤即洪水也黄水東南流水南有漢荆州刺史李剛墓剛字叔毅山陽高車人郡國志山陽郡有高平縣此云車誤熹平元年卒見其碑有石闕祠堂石室三間椽架高丈餘鏤石作椽瓦屋施平天造方井側荷梁柱四壁隱起雕刻為君臣官屬上下疑有脫字龜龍麟鳯之文飛禽走獸之像作制工麗不甚傷毁黄水又東逕鉅野縣北何承夫曰鉅野湖澤廣大南通洙泗北連清濟舊縣故城正在澤中故欲置戌於此城城之所在則鉅野澤也衍東北出為大野矣昔西狩獲麟於是處也今鉅野縣東南五十里有獲麟臺後人所築皇覽曰山陽鉅澤縣有肩髀冢重聚大小與闕史記注引皇覽作闕冢等𫝊言蚩尤與黄帝戰剋之於涿鹿之野身體異處故别葬焉黄水又東逕咸亭北春秋桓公七年經書焚咸丘者也水南有金鄉縣之東界也金鄉數山皆空中穴口謂之隧也戴延之西征記曰焦氏山北數山有漢司𨽻校尉魯恭穿山得白蛇白兎不葬更葬山南鑿而得金故曰金鄉山明一統志金鄉山在今鉅野南五十里山北有石洞曰清涼深十餘丈内鑿閣石作四小閣閣外一堂陛髙三尺堂外内門門外兩大石道長三十丈濶十有六尺世𫝊秦始皇避暑宮也山形峻峭冢前有石祠石祠石廟四壁皆青石隱起自書契以來忠臣孝子貞婦孔子及弟子七十二人形像像邊皆刻石記之文字分明又有石床長八尺磨瑩鮮明叩之聲聞逺近時太尉從事中郎𫝊珍之諮議參軍周安穆折敗石床各取去為魯氏之後所訟二人並免官焦氏山東即金鄉山也有冢謂之秦王陵山上二百歩得冢口塹深十丈兩壁峻峭廣二丈入行七十歩得埏門門外左右皆有空可容五六十人謂之白馬空埏門内二丈得外堂外堂之後又得内堂觀者皆執燭而行雖無他雕鏤然治石甚精或云是漢昌邑哀王冢所未詳也東南有范巨卿冢石柱石柱一本作名件何氏云石柱釋載此作名件側注云范碑至今尚在恐名件二字水經不誤也猶存巨卿名式山陽之金鄉人漢荆州刺史與汝南張劭長沙陳平子石交號為死友矣後漢書獨行𫝊范式字巨卿山陽金鄉人也與汝南張劭元伯為友後元伯寢疾同郡郅君章殷子徴晨夜省視之元伯臨盡歎曰恨不見吾死友子徵曰吾與君章盡心于子是非死友復欲何求元伯曰若二子者吾生友耳山陽范巨卿所謂死友也尋卒式忽夢見元伯元冕垂纓屣履而呼曰巨卿吾以某日死當以爾時葬永歸黄泉子未我忘豈能相及式怳然覺悟悲慟泣下馳徃赴之式未及到而䘮已發引既至壙將窆而柩不肯進其母撫之曰元伯豈有望耶遂停柩移時乃見有素車白馬號泣而來其母望之曰是必范巨卿也巨卿既至叩䘮言曰行矣元伯死生路異永從此辭㑹葬者千人咸為揮涕式因執紼而引柩于是乃前後到京師受業太學時諸生長沙陳平子亦同在學與式未相見而平子被病將亡謂其妻曰吾聞山陽范巨卿烈士也可以託死吾歿後但以尸埋巨卿户前乃裂素為書以遺巨卿既終妻從其言時式出行適還省書見瘞愴然感之向墳揖哭以為死友乃營䕶平子妻兒身自送䘮于臨湘未至四五里乃委素書于柩上哭别而去黄水又東南逕任城郡之亢父縣故城西夏后氏之任國也漢靈帝光和元年按後漢書郡國志章帝元和元年分東平國之任城縣為任城國今云靈帝光和誤别為任城在北王莽之延就亭也縣有詩亭春秋之詩國也左傳襄十三年夏取邿注邿小國也任城亢父縣有邿亭邿音詩今直云詩亭詩國似誤王莽更之曰順父矣地理志東平屬縣也世祖建武二年封劉隆為侯國其中謂之桓公溝南至方與縣入于菏水菏水又東逕秦梁夾岸積石一旦一作里高二丈言秦始皇東巡所造因以名焉菏水又東過湖陸縣南東入於泗水湖陵故城在魚臺縣東六十里按漢書地理志湖陵縣屬山陽郡莽曰湖陸又按後漢書郡國志湖陸故湖陵章帝更名又漢志注應劭曰章帝封東平王蒼子為湖陵侯更名湖陸澤水所鍾也尚書曰浮于淮泗達于河達于河陸氏釋文引說文作菏工可反云水出山陽湖陵南與此正合今引尚書當從說文作菏為是是也東觀漢記曰蘇茂殺淮陽太守得其郡營廣樂大司馬吳漢圍茂茂將其精兵突至湖陵與劉永相會濟隂山陽濟兵於此處也又東南過沛縣東北濟與泗亂故沛納于稱矣東觀漢記安平侯葢延𫝊曰延為虎牙大將軍與戰水軍反走溺水者半後與戰連破之遂平沛楚臨淮悉降延令沛脩高祖廟置嗇夫祝宰樂人因齋戒祠高廟也後漢書葢延𫝊光武即位以延為虎牙將軍南伐劉永永將蘓茂佼彊周建等三萬餘人救永共攻延與戰于沛西大破之永軍亂遁没溺死者大半永棄城走湖陵蘓茂奔廣樂延遂定沛楚臨淮修高祖廟置嗇夫祝宰樂人注曰楚即今彭城縣也臨淮郡名今泗州髙祖廟在今徐州沛縣東故泗水亭中即髙祖為亭長之所也嗇夫主知廟事東觀漢記曰時葢延因齋戒祠高祖廟又東南過留縣北留縣故城在今江南徐州府沛縣東南二十里留縣故城翼佩泗濟宋邑也春秋左𫝊所謂侵宋吕留也故繁休伯避地賦曰朝余發乎泗洲夕余宿于留縣者也張良委身漢祖始自此矣終亦取封焉城内有張良廟也又東過彭城縣北睢水從西來注之彭城縣今為徐州府濟水又南逕彭城縣之故城東北隅不東過也睢水自西注之城北枕水湄濟水又南逕彭城縣故城東不逕其縣北也葢經誤證又東南過徐縣北今為淮安府地地理志曰臨淮郡漢武帝元狩六年置治徐縣王莽更之曰淮平縣曰徐調國也漢志無國字春秋昭公三十年吳子執鍾吾子遂伐徐防山以水之遂滅徐徐子奔楚楚救徐弗及遂城夷以處之張華博物志錄徐偃王之異言徐君宫人娠而生卵以為不祥棄之於水濵孤獨母有犬名曰鵠倉獵於水側得棄卵銜以來歸獨母以為異覆煖之遂成兒生時偃故以為名徐君宫中聞之乃更錄取長而仁智襲君徐國後鵠倉臨死生角而九尾實黄龍也偃王昔之徐界中按博物志云偃王塟之徐梁界内即此是也昔疑當作塟今見有狗壟焉偃王治國仁義著聞欲舟行上國乃道溝陳蔡之間得朱弓矢以已得天瑞遂因名為號自稱徐偃王江淮諸侯服從者三十六國周王聞之遣使至楚令伐之偃王愛民不鬭遂為楚敗北走彭城武原縣東山下百姓隨者萬數因名其山為徐山山上立石室廟有神靈民人請禱焉依文郎事似有符騐但世代綿逺難以詳矣今徐城外有徐君墓昔延陵季子解劔於此所謂不違心許也又東至下邳睢陵縣今為淮安府睢寧縣南入于淮濟水與泗水澤宋本作渾淘東南流至角城同入淮經書睢陵誤耳水經注集釋訂訛巻八
