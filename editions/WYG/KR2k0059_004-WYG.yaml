body:
  text: 水經注集釋訂訛卷四歸安沈炳㢲撰河水四河水又南過河東北屈縣西今吉州北二十里有北屈縣故城河水南逕北屈縣故城西十里有風山上有穴如輪風氣蕭瑟習常不止明統志山西平陽府吉州北三十里有風山當其衝飄也而略無生草葢不定朱箋云事類賦引此作當其衝所略無生草御覽引此作葢常不定衆風之門故也風山西四十里河南孟門山明統志孟門山在吉州西七十里山海經曰孟門之山其上多金玉今本山海經作蒼玉其下多黄堊湼石淮南子曰龍門未闢呂梁未鑿河出孟門之上大溢逆流無有丘陵高阜滅之名曰洪水大禹疎通謂之孟門故穆天子傳曰北登孟門九河之蹬按穆天子傳云北升于盟門九河之隥玉篇曰隥險阪也或作蹬孟門即龍門之上口也實為黄河之巨阢兼孟津之名矣此石經始禹河中潄廣夾岸崇深傾崖返捍巨石臨危若墜復倚古之人有言水非石鑿而能入石信哉其中水流交衝素氣雲浮徃來遙觀者常若霧露沾人窺深悸魂其水尚崩浪萬尋縣流千丈渾洪贔怒鼔若山騰濬波頽疊迄于下口方知愼子下龍門流浮竹非駟馬之追也朱本引愼子云河下龍門其流駚竹箭駟馬追之不及又有燕完水注之異源合舎西流注河河水又南得鯉魚下疑有脫字厯澗東入窮溪首便其源也爾雅曰鱣鮪也出鞏穴三月則上渡龍門得渡為龍矣否則㸃額而還非夫徃還之會何能便有兹稱乎河水又南羊求水入焉東出羊求川西逕北屈縣故城南城則夷吾所奔邑也王莽之朕北也汲郡古文曰翟章救鄭次於南屈應劭曰有南故加北國語曰二五言于獻公曰蒲與二屈君之疆也其水西流注于河河水又南為採桑津春秋僖公八年晉里克敗狄于採桑是也又南過皮民縣西今平陽府河津縣西有皮氏縣故城赤水出西北罷谷川東謂之赤石川東入于河河水又南合蒲水西則兩源並發俱道一山出西河隂山縣王莽之山寧也隂山縣今平陽府界隂山東麓南水東北與長松水合水出西三陽山東東北流左入蒲水蒲水又東北與北溪會同為一川東北注河河水又南逕丹水西南丹陽山東北逕冶東俗謂之丹陽城城之左右猶有遺銅矣何氏云漢書地理志丹楊郡有銅官食貨志注中赤金丹楊銅者即指此道元誤以是山當之耳其水東北會白水口水出丹山東而西北注之丹水又東北入河河水又南黑水朱本此下有注之二字西出丹山東而東北入于河河水又南至崿谷傍東北窮澗水源所𨗳也西南流注于河河水又南洛水自獵山枝分東𣲖東南注于河一作大河昔魏文侯築館洛隂指謂是水也皮氏縣王莽之延平也故城在龍門東南不得延逕皮氏方屆龍門也禹貢錐指曰以今輿地言之河自大積石山東北流逕陜西西寧衛西南塞外至河州西七十里入塞衞在行都司東南七百餘里黄河西自塞外流入經衞之東南與河州分水州在臨洮府西一百八十里西至生畨界七十里有小積石山兩岸如削河流其中西南去大積石山千餘里又東北逕州北合灕水又東北合洮水二水已見上文又東北逕蘭州西南湟水合浩亹水自西來注之州在臨洮府北二百十里黄河去州二里闞駰所謂金城河也湟水自州西一百八十里入河唐書吐蕃傳湟水出䝉谷抵龍泉與河合河之上流由洪濟梁西南行二千里世舉謂西戎地曰河湟又東北逕州北夾河有灘宜播五穀引水灌漑甚為民利又東北逕金縣北縣在蘭州東九十里黄河去縣六十里又東北逕靖逺衞北舊名靖虜屬陜西都司本漢鸇隂縣地後漢建初中趙冲追擊叛羌于鸇隂河即此衞北有韋精山黄河自金縣亂山中來至衛西南百里烏蘭關漢祖厲縣地也唐置烏蘭縣屬會州有黄河堰刺史安敬忠所築以捍河流又東北逕寧夏中衞南衞屬陜西都司黄河去衞十五里地勢稍平河流益盛衛東南一百五十里有鳴沙城西枕黄河人馬行經此沙隨路有聲故號鳴沙又東北逕靈州所北所在寧夏衞少西九十里本漢靈州富平二縣地舊志云黄河千里一曲自澆河至故昫卷縣率東北流至富平始曲而北流亦謂之河曲云折而北逕寧夏衞東南衞屬陜西都司宋為懷逺鎮李德明城此為興州以居景祐中元昊升為興慶府衞西至賀蘭山邊界六十里北至鎮逺關邊界二百里東至榆林衞界三百五十里黄河去衞四十里元和志保靜縣西南至靈州六十里本漢富平縣地賀蘭山在縣西五十三里東望雲山形勢相接迤邐向北經靈武縣又西北經保靜縣西又北逕懷逺縣西又北逕定逺城西又東北抵河其抵河之處亦名乞伏山在黄河西從首至尾有象月形南北約長五百餘里正邊城之巨防山之東河之西有平田數千頃可引水灌溉如盡収地利足以贍給軍儲也顧景范云自寧夏以上民多穿渠溉田而寧夏之利尤博葢上流勢少緩無溢決之患且泥沙未甚故引河為宜也又北逕平羅所東舊名平虜在寧夏衞東北一百二十里河去所十五里賀蘭山在所西六十里鎮逺關在所北六十里又北逕榆林衞西出塞逕廢豐州西衞本漢上郡龜兹縣地金元為米脂縣地名榆林莊明正統二年築榆林城天順七年置榆林衛治焉北至邊墻十里其外皆戰國時雲中九原地也黄河自靈州所横城堡西折而北逕寧夏平羅入衞界廢豐州城在衞西北塞外七百里本漢朔方郡之廣牧縣後魏為懷朔鎮隋始置豐州治九原縣明初廢杜佑曰豐州西至黄河百三十里北至黄河四十里東北至黄河八十里折而東逕三受降城南元和志三受降城景雲三年朔方緫管張仁愿所置也先是朔方軍北與突厥以河為界河北岸有拂雲堆神祠突厥將入冦必先詣祠祭酹求福因牧馬料兵而後渡河時突厥默啜盡衆西擊突騎施婆葛仁愿奏請乘虚奪取漢南地於河北築三受降城首尾相應絶其南冦之路從之六旬而三城俱就以拂雲祠為中城與東西兩城相去各四百餘里遥相應接北拓三百餘里於牛頭牟那山北置烽堠一千八百所自是突厥不得度山放牧朔方無復冦掠减鎮兵數萬人顧景范云中城在廢夏州北八百里西城在廢豐州北八十里東城在廢勝州東二百里今按東城本漢定襄郡之盛樂縣後魏嘗都此唐置振武軍元和六年以韓重華為振武營田和糴水陸運使重華請募人為十五屯屯置百三十人而種百頃令各就髙為堡東起振武轉而西過雲中界極于中受降城出入河山之際六百餘里屯堡相望冦來亦不能為暴人得肆耕其中少可以罷漕輓之費朝廷從其議秋果倍収歲省度支錢千三百萬見韓愈送重華歸所治序折而南逕廢勝州東入塞其東岸則平虜衛廢勝州城在榆林衞東北四百五十里本漢雲中五原二郡地隋置勝州治榆林縣元和志云北近榆林即漢之榆林塞雲中故郡在縣東北四十里東受降城在縣東北八里榆林關在縣闕三十里東北臨河自夏州朔方縣流入又逕河濵縣十五步濶一里不通船楫即河濵關渡處名君子津杜佑曰勝州東至黄河四十里北至黄河五里西北至黄河二十里平虜衞在山西大同府西少南二百四十里明置本漢雁門郡之武州縣隋唐以後為朔州地元和志黄河朔州鄯陽縣西三百里遼自河西移置勝州于此曰東勝州其故城在今衞西北元和志唐徙東受降城于綏逺烽南即今州治也明洪武初改建左右二衞兵民皆耕河套中冦益稀少二十六年城東勝永樂初移就延綏其地遂墟今按自廢豐州東至廢勝州西黄河三面圍繞之地週數千里謂之河套周曰朔方秦曰新秦漢為朔方郡地隋唐為豐勝二州地明為榆林衛北境自其初舍受降而衛東勝已失二面之險其後又撤東勝以就延綏則外險盡失冦來莫禦天順六年元裔摩囉歡阿拉善博囉齊三部始入居河套屢為邉患隆慶中濟囊以諳逹内附亦來款塞因而羈縻之本朝屬理藩院榆林新志曰河套之地南抵邉墻北濵黄河逺者八九百里近者亦一二百里惟黄甫川之南焦家坪及娘娘灘羊圈渡口為最近云又南逕府谷縣東其東岸則河曲縣保德州府谷在陜西葭州東少北三百四十里黄河南流逕黄甫川九里入縣界又南逕縣東去縣百步河曲在山西太原府西北五百二十八里黄河在縣西北府志云自縣東北故東勝州境轉而西南流八十里至縣西北平泉村復轉西流九十里至天橋峽又南流入保德州界偏頭闗在縣東北一百十里東接鴉角山西逼黄河其地東仰西伏因名偏頭保德在府西北五百里黄河在州西北一里迆西逕神木縣南又南逕葭州東其東岸則興縣神木在葭州東北一百二十里黄河去縣十里葭州在延安府東北五百八十里黄河去州一里興縣在太原府岢嵐州西一百五十里黄河在縣西五十里元和志嵐州合河縣黄河在縣西二里按今興縣西北五十里有合河故城舊志云山西自河曲至蒲津千五百里俱鄰陜西河最狹而于神木渡河為尤易又南逕吴堡縣東又南逕綏德州東其東岸則臨縣永寧州寧鄉縣吴堡在葭州南八十里黄河去縣一里綏德在延安府東北三百六十里黄河去州一百二十里無定河在州城東即古奢延水以潰沙急流深淺不定故名臨縣在山西汾州府西北三里黄河在縣西八十里永寧州在府西少北一百二十里寧鄉在州西南五十里黄河並在其西元和志石州平夷縣黄河西去縣一百四十五里定胡縣黄河去縣西二百步按平夷故城即今寧鄉縣治定胡當在永寧州界永寧本石州明隆慶三年更名又南逕清澗縣東又南逕延川縣東又南逕延長縣東其東岸則石樓縣永和縣大寧縣清澗在延安府東北二百里黄河去縣四十五里延長在府東少南百五十里黄河去縣三十五里元和志延州延水縣黄河在縣東八里門山縣黄河去縣三十五里按延水故城在今府東北一百十里門山故城在府東南一百八十里石樓在汾州府西少南二百六十里黄河在縣西九十里永和在山西平陽府隰州西九十里黄河在縣西六十里大寧在州西南九十五里黄河在縣西六十八里孟門山在縣西南八十里與吉州分山又南逕宜川縣東其東岸則吉州鄉寧縣宜川在延安府東南二百八十里黄河去縣八十里元和志丹州汾川縣西南至州七十里黄河在縣北七里河岸頓狹狀如槽形鄉人呼為石槽葢禹治水鑿石𨗳河之處石槽長千步濶三十步懸水奔流黿鼉魚龞所不能遊按汾州故城在今宜川縣東七十里孟門山在縣東南二十里黄河西岸山勢綿延與吉州孟門山參差相接即文城故縣西南三十六里河中之石槽也吉州在平陽府二百四十里黄河在州西六十里壺口山在州西南七十里鄉寧縣在州東南六十里黄河在縣西七十九里又南至韓城縣東北龍門山在焉其東岸則河津縣韓城在西安府同州東北二百里黄河去縣十五里龍門山在縣北五十里河津在平陽府蒲州東北二百里黄河在縣西元和志云去縣二十五里即龍門口三秦記曰河津一名龍門水陸不通魚鼈之屬莫能上江海大魚集龍門下數千不得上上則為龍故曰曝腮龍門水經注曰其魚出鞏縣鞏六每三月則上渡龍門得渡為龍否則㸃額而還此𨗳河積石至于龍門之所經也蔡傳李復云同州韓城北有安國嶺東西四十餘里東臨大河瀕河有禹廟在山斷河出處禹鑿龍門起於唐張仁愿所築東受降城之東自北而南至此山盡兩岸石壁峭立大河盤束於山峽間千數百里至此山開岸濶豁然奔放怒氣噴風聲如萬雷余按舊說禹鑿龍門而不詳其所以鑿誦說相傳但謂因舊修闢去其齟齬以决水勢而已今詳此說則謂受降以東至于龍門皆是禹新開鑿若果如此則禹未鑿時河之故道不知却在何處而李氏之極博不知此說又何所考也德清胡渭曰按安國傳言禹治河或鑿山或穿地以通流此亦有所本鑿山即闢龍門穿地即鑿吕梁也但不當云起自積石耳穎達復為之說曰釋水云河千里一曲一直則河從積石北行又東乃南行至龍門計應三千餘里龍門底柱鑿山也其餘平地穿地也言自龍門以下亦然則其所穿鑿更逺矣李復謂起自東受降城較安國所言為近然計東城至安國嶺亦有千四五百里如必須處處穿鑿豈人力所能及禹勞民亦不應至此而二孔之妄又無論矣總由以𨗳為施㓛遂積誤相承而不覺耳至其所謂鑿山穿地者亦只是因舊修闢非本無水道而始開之蔡氏云云則又疑所不當疑也禹𨗳自積石為中國河其水不復行戎翟之境及三代之季雍州西北二隅每為戎翟所侵秦漢以來屢復屢失大抵河湟之外悉屬羌渾雲中五原盡歸獯鬻河行其間出且入者再唐之中葉吐蕃强盛盜有隴西州縣逺近有司不復傳宰相賈耽乃繪布隴右山南九州具載河所經受為圗曰吐蕃黄河録正元十四年上之其繫之吐蕃者葢本中國河行之地而時為吐蕃所㨿故詳著之非謂河源之在積石外者也宋世亦䧟吐蕃及西夏元乃混一㒺不賓服明仍以河州為入塞之始而天順六年元裔摩囉歡等入居河套羈縻不絶以迄於今漢雲中五原二郡之地遂不登版圖黄河之行其境者世將不知為弼成之所及而州縣舊跡置之不問矣故余解𨗳河於大積石以下黄甫川以上偹考古記叙次特詳遼史龍門山石壁對峙高數百尺望之若門徼外諸河及沙漠潦水皆於此趨海雨則俄頃水逾千仭晴則清淺可渉太平寰宇記龍門山北有河口略似龍門而不能通相傳鯀所鑿績用弗成今名錯開河又南出龍門口汾水從東來注之汾水出太原汾陽縣管涔山西南流至汾隂縣北而西注于河詳後汾水篇昔者大禹𨗳河積石踈决梁山謂斯處也即經所謂龍門矣魏土地記曰梁山北有龍門山大禹所鑿通孟津河口廣八十步巖際鐫跡遺功尚存岸上并有祠廟祠前有石碑三所二碑文字紊滅不可復識一碑是太和中立竹書紀年晉昭公元年河赤于龍門三里按竹書紀年河下尚有一水字梁惠成王四年河水赤于龍門三日京房易妖占曰河水赤下民恨河水又南右合暢谷水水自溪東南流逕夏陽縣西北東南注于河夏陽漢屬左馮翊故少梁惠文王十一年更名即今韓城縣地河水又南逕梁山原東原自朱本作自原山東南出至河晉之望也在馮翊夏陽縣之西臨于河上山崩壅河三日不流晉侯以此問伯宗即是處也春秋穀梁傳曰成五年梁山崩遏河水三日不流召伯尊伯宗伯尊同是一人聲相轉耳遇輦者不避使車右鞭之註凡車將在左御在中有力之人在右所以偹非常也輦者曰所以鞭我者其取道逺矣伯尊因問之輦者曰君親縞素率羣臣哭之斯流矣如其言而河流河水又南崌谷水注之水出縣西北梁山東南流横溪注之水出于三累山其山層宻三成故俗以三累名山按爾雅山三成為崑丘斯山豈亦崑丘乎山下水際有二石室葢隠者之故居矣細水東流至于崌谷側谿山南有石室西面有兩石室北面有二石室皆因阿結牖連扄接闥所謂石室相距也東箱朱本作廂石上猶傳杵臼之跡庭中亦有舊宇處尚髣髴前基北坎室上有微涓石溜豐周瓢飲似是栖遊隱學之所昔子夏教西河疑即此也而無辨之溪水又東南逕夏陽縣故城北故少梁也秦惠文王十一年更從今名矣王莽之冀亭也其水東南流疑脫注字于河昔韓信之襲魏王豹也以木罌自此渡史記淮隂侯傳信乃益為疑兵陳船欲渡臨晋而伏兵從夏陽以木罌缻渡軍襲安邑魏王豹驚引兵迎信信遂虜豹河水又南右合陶渠水水北西北梁山東南流逕漢陽太守殷濟精廬尚謝云宋本作尚在此脫一在字耳吴本改作精廬南似誤炳㢲按上下文氣若作尚在則與上逕字不接作南似較勝俗謂之子夏廟河水又南逕高門南葢層阜墮缺故流東門之稱矣此句疑有譌誤又東南逕華池南池方三百六十步在夏陽城西北四里許故司馬遷碑文云高門華池在兹夏陽西城北漢陽太守殷濟精舍四里所今高門東去華池三里溪水又東南逕夏陽縣故城南服䖍曰夏陽虢邑也朱云春秋僖公二年虞師晉師滅下陽杜元凱云下陽虢邑在河東大陽縣按漢志𢎞農陜縣注故虢國在大陽馮翊夏陽縣注故少梁龍門在北則下陽夏陽自屬兩地而公羊傳下陽作夏陽故服䖍遂因之而誤也在太陽東三十里城南太陽當作大陽按漢志大陽屬河東郡武王封太伯後于此是為虞公在大河之陽故名又厯高陽宮北又東南逕司馬子長墓北墓前有廟廟前有碑永嘉四年漢陽太守殷濟瞻仰遺文大其功德遂建石室立碑樹柏何云柏𨽻釋作垣疑是植字謂樹表也太史公自叙曰遷生于龍門是其墳墟所在矣溪水東南流入河昔魏文侯與吴起浮河而下美山河之固即於此也河水又南徐水注之水出西北梁山東南流逕漢武帝登仙宮東東南流絶疆朱本作彊梁石逕劉仲城北是漢祖兄劉仲之封邑也故徐廣史記音義曰邵陽國名也卲陽當是郃陽按史記髙帝紀代王劉仲棄國亡自歸雒陽廢以為合陽侯按漢志郃陽屬馮翊師古曰音合應邵曰在郃水之陽高祖八年侯劉仲是也是也原本譌作元年其水東南逕子夏陵北東入河河水又南逕子夏石室東南北有二石室臨側河岸即子夏廟室也又南過汾隂縣西今平陽府榮河縣北有汾隂故城河水東際汾隂睢縣睢縣疑當作脽丘葢漢志無脽縣也故城在睢側漢髙帝六年封周昌為侯國魏土地記曰河東郡北八十里有汾隂城北去汾水三里城西北隅曰睢丘上有后土祠封禪書曰元鼎四年始立后土祠於汾隂睢丘是也又有萬歲宮漢宣帝神爵元年辛萬歲宫東濟大河而神魚舞水矣昔趙簡子沈欒激於此曰吾好聲色而是子致之吾好士六年不進一人是過而㸃吾善君子以為能譴矣按吕氏春秋云趙簡子沈鸞徼于河曰吾好聲色矣而鸞徼致之吾嘗好良馬善御矣而鸞徼來之今吾好士六年而鸞未嘗進一人也是長吾過而絀善也云云則欒激當作鸞徼是過而㸃吾善句亦誤河水又逕郃陽城東今西安府郃陽縣東四十里有郃陽故城周威烈王之十七年魏文侯伐秦至鄭還築汾隂郃陽即此城也故有莘邑矣為太姒之國詩云在郃之陽在渭之涘又曰纉女維莘長子維行謂此也城北有北瀵水南去二水各數里其水東逕其城内東入于河又于城南側中有瀵水東南出城注于河城南又有瀵水東流東注于河水南猶有文母廟前有碑去城一十五里水即郃水也縣取名焉故應劭曰在郃水之陽也河水又南瀵水入焉水出汾隂縣南四十里西去河三里平地開源濆泉上湧大幾如輪深則不測俗呼之為瀵魁郭璞爾雅注云河東汾隂縣有水口如車輪許濆沸湧出其深無限名之曰瀵馮翊郃陽縣復有瀵亦如之相去數里而夾河河中渚上又有一瀵瀵源皆潜相通在汾隂者人壅其流以為陂種稻呼其本出為瀵魁古人壅其流以為陂水種稻東西二百步南北一百餘步與郃陽瀵水夾河中渚上又有一瀵水皆相潜通故呂忱曰爾雅異出同流為瀵水其水西南流厯朔朱本孫云當作蒲坂西西流注于河河水又南逕陶城西元和志陶城在臨晉縣北四十里即今平陽府臨晉縣舜陶河濵皇甫士安以為定陶不在此也然陶城在蒲坂城北城即舜所都也南去厯山不逺或耕或陶所在則可何必定陶方得為陶也舜之陶也斯或一焉孟津有陶河之稱葢從此始之南對蒲津關汲冢竹書紀年魏襄王七年秦王來見于蒲坂關四月越王使公師隅來獻乘舟始㒺何云始罔似是舟名及舟三百箭五百萬犀角象齒焉按竹書紀年作越王使公師隅來獻舟三百箭五百萬及犀角象齒無乘舟始罔及五字疑是衍又南過蒲坂縣西今蒲州東南有蒲坂故城地理志曰縣故蒲也王莽更名蒲城應劭曰秦始皇東巡見有長坂故加坂也孟康曰晉文公以賂秦秦人還蒲於魏魏人喜曰蒲反矣故曰蒲反也薛瓉注漢書云秦世家以垣為蒲反然則本非蒲也皇甫謐曰舜所都也或言蒲坂或言平陽及瀵者也今城中有舜廟魏秦州刺史治太平遷都罷州置河東郡郡多流離謂之徒民民有姓劉名墮者宿擅工釀採挹河流醖成芳酎懸食同枯枝之年排於桑落之辰故酒得其名矣朱云懸食二語字有譌脫按洛陽伽藍記云河東人劉白墮善釀酒六月中以甕貯酒曝日中經旬酒味不動飲之香美朝貴千里相餉命曰鶴觴齊民要術云十月桑落初凍則収水醸者為上時春酒正月晦日収水為中時春酒然香醑之色清白若􅎵漿焉别調氛氲不與他同蘭薫麝越自成聲逸方土之貢選最佳酌矣自王公庻友牽拂相招者每云索郎有顧思同旅語索郎反語為桑落也更為籍徵之雋句中書之英談郡南有厯山也謂之厯觀舜所耕處也有舜井媯汭二水出焉南曰媯水北曰汭水迺疑是西逕厯山下上有舜廟周處風土記曰舊說舜𦵏上虞又記云耕於厯山而始寧剡二縣界上舜所耕田於山下多柞樹吴越之間名柞為􅌴故曰厯山余按周處此志為不近情傳疑則可證實非矣安可假木異名附山殊稱彊引大舜即比寧懷朱云寧字誤當作寗括地志云河内郡獲嘉縣有寗城而懷縣亦屬河内又媯州懐戎縣西有舜井路史國名記云陽處父聘衞過寗一作寧則寧懷並地名矣更為失誌記之本體差實録之常經矣厯山媯汭言是則安於彼乖矣尚書所謂釐降二女于媯汭也孔安國曰居媯水之内王肅曰媯汭虞地名皇甫謐曰納二女於媯水之汭馬季長曰水所出曰汭然則汭似非水名而今見有二水異源同歸渾流西注入于河河水又南逕雷首山西山臨大河北去蒲坂三十里尚書所謂壺口雷首者俗亦謂之堯山山上有故城世又曰堯城闞駰曰蒲坂堯都按地理志曰縣有堯山有祠雷首山在南事有似而非非而是千載眇邈非所詳耳又南涑水注之水出河北縣雷首山縣北與蒲坂分山有夷齊廟闞駰十三州志曰山一名獨頭山夷齊所隠也山南有古冢陵柏蔚然攅茂丘阜俗謂之夷齊墓其水也西南流亦曰雷水穆天子傳曰壬戌天子至于雷首犬戎按傳戎下有胡字觴天子按傳子下有于字雷首之阿乃獻良馬四按傳下脫六字天子使孔牙受之于雷水之干是也昔趙盾田首山食祁彌明左傳作提彌明翳桑之下即於此也涑水又西南流注于河春秋左傳謂之涑川者也俗謂之陽安澗水又南至華隂潼關渭水從西來注之華隂縣今屬陜西西安府潼闗在華隂縣東四十里元和志云關西一里有潼水因以名闗汲都當是汲郡或是汲冡竹書紀年曰晉惠公十五年五字誤有說見後涑水篇秦穆公率師送公子重耳涉自河曲春秋左氏僖公二十四年秦伯納之及河子犯以璧授公子曰臣負羈紲從君巡于天下臣之罪多矣臣猶知之而况君乎請由此亡公子曰所不與舅氏同心者有如白水授璧於此授當作投按左傳云有如白水投其璧於河子推哭曰天開公子子犯以為功吾不忍與同位遂逃焉河水厯船司空與渭水會船司空縣名漢地理志屬京兆尹今華隂縣東北五十里有船司空故城漢書地理志曰舊京兆郡之屬縣也左丘明國語云華嶽本一山當河河水過而曲行河神巨靈手盪脚蹋開而為兩今掌足之跡仍存華巖朱箋云按巨靈事在薛綜西京賦注引古語云云非出左氏國語此殆誤記耳開山圖曰有巨靈胡者偏得神元之道能造山川出河所謂巨靈贔首冠靈山者也張華西京賦巨靈贔註贔作力之貌左思吴都賦巨鰲贔負首冠靈山註贔負用力壯貌又類篇贔鰲也一曰雌鰲為贔本草贔大龜好負重或名􅪆􅫔今石碑下龜趺象其形常有好事之人故升華嶽而觀厥跡焉自下廟厯朱本厯下有一列字柏南行十一里東逥三里至中祠又西南出五里至南祠謂之北君祠諸欲升山者至此皆祈請焉從此南入谷七里又屆一祠謂之石養父母石龕木主存焉入疑是又南出一里至天井井裁容人穴空迂逥傾曲而上可高六丈餘山上又有微涓細水流入井中亦不甚沾人上者皆所由涉更無别路欲出井望空視明如在室窺窻也出井東南行二里峻坂斗上斗下降此坂二里許又復東上百丈崖升降皆湏攀繩挽葛而行矣南上四里路到石壁縁傍稍進逕一百餘步自此西南出六里又至一神名曰胡趨寺朱箋云神當作祠按郭縁生述征記西南出六里又至一祠名胡越寺神神像有童子之容從祠厯夹嶺裁廣三尺餘兩廂朱云按宋本廂下有懸字崖數萬仭窺不見底祀祠有感則雲與之平也朱云宋本無也字然後敢度猶湏騎嶺抽身漸以就進故世謂斯嶺為搦嶺矣度此二里便屆山頂上方七里靈泉二所一名蒲池西流注于澗一名太上泉東注澗下上宫神廟近東北隅其中塞實雜物事難詳載自上宫東北出四百五十步有屈嶺東南望巨靈手跡惟見洪崖赤壁而已都無山下上觀之分均矣朱云分均字有譌誤葢言山下上觀似有掌足之跡及至上宫而望掌足處但見洪崖赤壁而已無復分均之跡也唐文粹載王涯仙掌辨曰華嶽首峯有五崖北壑破巖而列自下逺而望之偶為掌形舊俗謂是巨靈之跡余徃觀焉誕哉此說乎河在關内南流潼激關山因謂之潼關灌水注之水出松果之上北流逕通谷世亦謂之通谷水東北注于河述征記所謂潼谷水者也或說因水以名地也河水自潼關東北流水側有長坂謂之黄巷坂傍絶澗涉此坂以升潼關所謂沂黄卷以濟潼矣卷當作巷朱引潘岳西征賦云􅑴黄巷以濟潼厯北出東㟓朱云按西都賦云左㨿函谷二崤之阻則此當作東崤通謂之函谷關也函谷關在今河南靈寳縣南十一里䆳岸天高空谷幽深澗道之峽車不方軌號曰天嶮故西京賦曰巖嶮周固衿帶易守所謂秦得百二并吞諸侯也朱云二語見張載劍閣銘是以王元說隗囂曰請以一丸泥東封函谷關圖王不成其弊足覇矣何云觀此則潼關函谷乃一地異名耳道元北人不應誤也郭緣生記曰漢末之亂魏武征韓遂馬超連兵此地今際河之西有曹公壘道來上下疑有誤字項本改來作東似得原上云李典營義熙十三年王師會㨿此壘西征記曰㳂路逶迤入函道六里舊城城周百餘歩北臨大河南對高山姚氏置關以守峽宋武王入長安檀道濟王鎮惡或㨿山為營或平城結壘十六國春秋作或平地結壘為大小七營十六國春秋作七十營濵帶河嶮姚氏亦保㨿山原阜之上按十六國春秋作泓亦保㨿山原陵阜之上各設營壘則此句原下當有陵字尚傳故迹矣按宋書武帝紀晉安帝義熙十三年正月公以舟師進討姚泓二月冠軍將軍檀道濟等次潼關三月庚辰大軍渡河索虜步騎十萬營㨿河津公命諸軍濟河擊破之公至洛陽七月至陜城龍驤將軍王鎮惡伐木為舟自河浮渭八月扶風太守沈田子大破姚泓扵藍田王鎮惡尅長安生擒泓公至長安執送姚泓斬于建康市與此正同則此之宋武王當作宋公或王字疑衍竟作宋武或王字當是帝字方妥關之直北隔河有層阜巍然獨秀孤峙河陽世謂之風陵戴延之之所謂風塠者也朱箋太平御覽引戴延之西征記云伏羲女媧風姓也此當是女媧之墓九域志云女媧墓在今潼關口河灘上屹然介河有本數株雖暴漲不漂沒也寰宇記云河東縣三里風陵是女媧之墓南則河濵姚氏之營與晉對岸禹貢錐指曰以今輿地言之河自韓城縣龍門山南流與汾水合縣志云河自龍門而南距郃陽不百里河壖多客土遇潦輒潰又南逕郃陽縣東其東岸則榮河縣臨晉縣郃陽在陜西同州東北一百十里黄河去縣四十里榮河在山西蒲州東北一百二十里黄河舊在縣西五里明時漸徙而東正德二年遂至城下今去縣僅七十歩臨晋在州東北七十里黄河在縣西三十里又南逕朝邑縣東又南至華隂縣東北與渭水合其東岸則蒲州朝邑在同州東三十里黄河去縣二十八里有臨晉關華隂在華州東七十里黄河去縣九十里蒲州在平陽府西南四百五十里黄河舊在州西蒲津門外明萬厯八年河決東齧城闉甃石岸以障之今漸徙而西去城十餘里有蒲津關與臨晉關夾河相對又南逕雷首山西至潼關衛北衛在陜西都司東明析華隂地置西至華隂縣界一里黄河在衛北一里潼關故城在衛東南四里左傳所謂桃林之塞元和志云自靈寳縣以西至潼關皆是折而東是為河曲春秋文公十二年秦晉戰于河曲即此地也此河水南至華隂之所經所稱龍門西河者也河水又東北玉澗水注之水南出玉溪北流逕皇天原西周固記開山東首上平博方可里餘三面壁立高千許仭漢世祭天於其上名之為皇天原上有漢武帝思子臺又北逕閿鄉城西郡國志曰𢎞農胡氏有閿鄉世謂之閿鄉水也按後漢郡國志𢎞農郡湖縣有閿鄉則此云胡氏譌當作湖縣為是魏尚書僕射閿鄉侯河東衛伯儒之故邑魏志云衛覬字伯儒文帝時官尚書封陽吉亭侯明帝即位進封閿鄉侯三百户閿音聞其水北流注于河河水又東逕閿鄉侯河孫云當作城南東與全鳩澗水合水出南山北逕皇天原東述征記曰全節地名也朱箋圗經曰全節即漢書全鳩里戾太子死處在閿鄉縣東十里鳩澗西其西名桃原古之桃林周武王克殷休牛之地矣西征賦曰咸徴名於桃園者也晉太康地記曰桃林在閿鄉南谷中其水入北河孫云當是河北葢謂河北縣也注于河又東過河北縣南縣與湖縣分河蓼水出襄山蓼谷西南流於河河北今山西平陽府芮城縣湖縣今河南河南府閿鄉縣河水又東永樂澗水注之水北出於薄山南流逕河北縣故城西故魏國也今芮城縣北有河北故城薄山在縣北一十五里晉獻公滅魏以封畢萬卜偃曰魏大名也萬後其昌乎後乃縣之在河之北故曰河北縣也今城南西二面竝去大河可二十餘里北去首山一十許里處河山之間土地迫隘故魏風著十畆之詩也城内有龍泉南流出城又南斷而不流永樂溪水又南入于河余按中經即渠豬之水也太史公封禪書稱華山以西名山七薄山有疑衍其一焉薄山即襄何校改衰下同山也徐廣曰蒲坂縣有襄山山海經曰蒲山之首曰甘桑之山共水出焉按山海經作甘棗之山括地志云蒲州河東縣雷首山一名中條山一名厯山亦名首陽山亦名蒲山一名襄山亦名甘棗山亦名豬山括地志又云薄山一名衰山正義曰色眉反一名寸棘一名渠山一名雷首一名獨頭一名首陽一名吴山一名條山在陜州芮縣城北十里此山西起雷山東至東吴坂凢十名以州縣分之多在蒲州而西流注于河東則渠豬之山渠豬之水出焉而南流注于河如準封禪書二水無西南流河之理今診蓼水川流所趣與共水相扶永樂溪水𨗳源注于河又與渠豬勢合蒲山統自項本作目總稱亦與襄山不殊故揚雄河東賦曰河靈玃踢掌華蹈襄漢書揚雄傳作河靈矍踢爪華蹈衰蘇靈曰河靈巨靈也華華山也衰衰山也掌㨿之足蹈之也踢音試郎反服䖍曰踢音石㚟反師古曰矍踢驚動之貌矍音钁踢二音並通𤓰古掌字又史記封禪書薄山者襄山也徐廣曰蒲阪縣有襄山或字誤則襄與衰原可通用注云襄山在潼關北十餘里以是推之知襄山在蒲阪蓼水即渠豬之水也河水自河北城南東逕芮城二城之中有叚干木冢干木晉之賢人也魏文侯過其門軾其廬所謂德尊萬古芳越來今矣汲冢竹書紀年曰晉武公元年尚一軍芮人乗京荀人董伯皆叛匪直大荔故芮也此亦有焉紀年又云晉武公七年芮伯萬之母芮姜逐萬萬出奔魏八年周師虢師圖魏今紀年作王師秦師圍魏取芮伯萬而東之九年戎人逆芮伯萬于郟今紀年作郊斯城亦或伯萬之故畫也朱云畫字誤疑是疆字譚元春云畫即界域之意恐非誤壞按今芮城縣北有河北故城唐貞觀十一年河溢陜州河北縣即此河水又會槃澗明統志云槃澗水在陜州廢湖城西二十五里源出泰山北流入于河水出湖縣夸父山北逕漢武帝思子宫歸來望子臺東又北流入于河夸父山在今閿鄉縣東南二十五里河水又東逕湖縣故城北湖縣故城在今閿鄉縣東四十里昔范叔入關遇穰侯於此矣湖水出桃林塞之夸父山廣員三百仭武王伐紂天下既定王及嶽濵朱云當作王巡嶽瀆周頌時邁所謂及河喬嶽是也放馬華陽散牛桃林即此處也其中多野馬造父於此得驊騮緑耳盜驪之乗以獻周穆王使之馭以見西王母湖水又北逕湖縣東而北流入于河魏土地記曰𢎞農湖縣有軒轅黄帝登仙處黄帝採首山之銅鑄鼎於荆山之下有龍垂胡于鼎黄帝登龍從龍者七十人遂昇於天故名其地為鼎湖荆山在馮翊首山在蒲阪與湖縣相連晉書地道記太康記並言胡縣也漢武帝改作湖俗云黄帝自此乗龍上天也地理志曰京兆湖縣有周天子祠二所故曰湖不言黄帝升龍也山海經曰西九十里曰夸父之山其木多㯶柟多竹箭其陽多玉其隂多鐵其北有林焉名曰桃林其中多馬湖水出焉北流注于河故三秦記曰桃林塞在長安東四百里若有軍馬經過好行則牧華山休息林下惡行則決河漫延人馬不得過矣河水又東合柏谷水水出𢎞農縣兩石隄山山下有石隄祠銘云魏甘露四年散騎常侍征南將軍豫州刺史領𢎞農太守南平公之所經建也其水北流逕其亭下晉公子重耳出亡及柏谷卜適齊楚狐偃曰不如之翟漢武帝嘗微行此亭見饋亭長妻故潘岳西征賦曰長徴客於柏谷今西征賦作長傲賔於柏谷妻覩貎而獻餐謂此亭也谷水又北流入於河河水又東右合門水按門水在今河南府靈寳縣西南門水即洛水之枝流者也洛水自上洛縣東北於拒城之西北分為二水枝渠東北出為門水也門水又東北厯陽華之山即華陽山海經所謂陽華之山門水出焉者也又東北厯峽謂之鴻關水東有城即關亭也水西有堡謂之鴻關島世亦謂之劉項裂城處非也余按上洛有鴻臚圍池是水津渠㳂注故謂斯川為鴻臚澗鴻關之名乃起是矣門水又東北厯邑川燭水注之左水出於陽華之陽東北流逕盛牆亭西東北流與右水合右水出陽華之隂東北流逕盛牆亭東北與左水合即山海經所謂緒茹之水出於陽華之隂東北流注于門水者也按山海經陽華之山姑之水出于其隂而東流注于門水音藉則緒茹當作姑又東北燭水注之水有二源左水出於衡嶺世謂之石城山其水東北流逕石城西東北合右水右水出石城山東北逕石城東東北入左水地理志曰燭水出衡嶺下谷開山圖曰衡山在函谷山西南是水亂流東注于緒茹亦當作姑之水二水悉得通稱矣厯澗東北出謂之開方口水側有阜名之方伯堆之字疑衍宋奮武將軍魯方平建武將軍薛安都等與建威將軍栁元景北入軍次方伯堆者也堆上有城即方伯所築也朱箋宋書栁元景傳元嘉二十七年大舉北討遣奮武將軍魯方平建武將軍薛安都略陽太守龎法起入盧氏加元景建威將軍總綂羣帥法起等度鐵嶺山次開方口元景以軍食不足難可曠日持乆乃束馬懸車引軍上百丈崖由温谷以入盧氏法起諸軍進次方伯阜去𢎞農城五里元景引軍度熊耳山安都頓軍𢎞農法起進㨿潼關又東北逕入川城南謝云宋本作逕邑川城南即漢封竇門之故邑川受其名亦曰竇門城在函谷關南七里又東北田渠川水注之出衡山之白石谷東北流逕故丘亭東是薛安都軍所從城也其水又逕鹿蹄山西山石之上有鹿蹄自然成者非人功所刊鹿蹄山在今河南宜陽縣厯田渠川謂之田渠水西北流注于燭水燭水又北入門水水之左右即函谷山也門水又北逕𢎞農縣故城東城即故函谷關校尉舊治處也終軍棄繻於此漢書終軍傳初軍從濟南當詣博士歩入關關吏予軍繻軍問以此何為吏曰為復傳還當以合符軍曰大丈夫西游終不復傳還棄繻而去注曰繻音湏繻符也書帛裂而分之若券契矣復返也謂返時出關更以為傳也燕丹孟嘗亦義動鷄鳴於其下義字疑誤燕丹子曰丹去秦夜到關關門未開丹為鷄鳴衆鷄皆鳴遂得逃歸與孟嘗君事相類可謂深心有感志誠難奪矣昔老子西入關尹喜望氣於此也故趙至與􅄞茂齊書曰李叟入秦及關而嘆亦言與嵇叔夜書及關尹望氣之所異說紛綸並未知所定矣漢武帝元鼎四年徙關於新安縣漢書武帝本紀元鼎三年冬徙函谷關於新安此云四年誤以故關為𢎞農縣𢎞農郡治王莽改為右隊劉桓公為郡虎相隨渡河光武聞而善之後漢書儒林傳劉昆字桓公光武時為𢎞農太守先是崤澠驛道多虎災行旅不通昆為政三年仁化大行虎皆負子渡河帝聞而異之後徵為光禄勲詔問昆曰前在江陵返風滅火後守𢎞農虎北渡河行何德政而致是事昆對曰偶然耳左右皆笑其質訥帝曰此乃長者之言也其水側城北流而注于河河水於此有洹津之名朱云詳下文當作浢津說者咸引漢武微行柏谷遇辱竇門又感其妻深識之饋既返玉階厚賞賚焉賜以河津令其鬻渡今竇津者也故潘岳西征賦酬匹婦其已泰胡厥夫之謬官文選注云漢武帝為微行嘗至柏谷夜宿逆旅翁惡少年十餘人皆持弓矢刀劍令主人嫗出遇客婦謂其翁曰吾觀此丈夫非常人也且有偹不可圖也天寒嫗酌酒多與其夫夫醉嫗自縛其夫諸少年皆走嫗出謝客殺鷄作食平旦上去還宫乃召逆旅夫妻見之賜嫗金千斤擢其夫為羽林郎言酬其婦已過又官其夫則謬矣故曰謬官袁豹之徒並以為然余按河之南岸夾側水瀆有測一作澗或作津謂之浢津河北縣有浢水浢津其水南入於河河水故有浢津之名不從門始葢事類名同故作者是之竹書穆天子傳曰天子自窴軨乃次于浢水之陽丁亥入于南鄭考其㳂厯所鍾路直斯津以是推之知非因門矣俗或謂之偃鄉澗水也河水又在朱本作有左右一水其水三源䟽引俱𨗳薄山南流會成一川其三水之内世謂之閑原言虞芮所爭之田所未詳矣又南注于河河水右會水注之水出南山北逕曹陽亭西陳涉遣周章入秦少府章邯斬之于此魏氏以為好陽晉書地道記曰亭在𢎞農縣東十三里其水西北流入於河河水又東菑水注之明一統志菑水在靈寳縣東十里水出常丞按山海經當作烝下同之山西北逕曲沃城南又屈逕其城西西北入河諸注述者咸言曲沃在北此非也魏司徒崔浩以為曲沃地名也余按春秋文公十三年晉侯使詹嘉守桃林之塞處此以偹秦時以曲沃之官守之故曲沃之名遂為積古之傳矣河水又東得七里澗澗在陜西在陜縣之西今為陜州水為石橋溝在州西南七里七里故因名焉谷水自南山通河亦謂之曹陽坑是以潘岳西征賦曰行於漫瀆之口憇於曹陽之墟桓豹崔浩亦不非其地矣余按漢書昔獻帝東遷逼以冦難李傕郭汜追戰于𢎞農澗天子遂露次曹陽楊奉董承外與傕和内引白波帥李樂等破傕乗輿於是得進復來戰奉等大敗兵相連綴四十餘里方得達陜以是推之似非曹陽然以山海經求之菑曹字相類是或有曹陽之名也元和志曹陽墟俗名七里澗在陜縣西南七里黄河自靈寳界流入後漢獻帝東歸至陜議者欲天子浮河東下太尉楊彪曰從此以東有三十六灘非萬乗所當從也乃止河水東合譙譙水𨗳源常丞之山明一統志譙水在陜州城南三里湧出入河俗呼為三里澗俗謂之于山葢先後之異名也山在陜城南八十里其川流也二源䨇𨗳同注一壑而西北流注于河又東過陜縣北橐水出橐山西北流明一統志橐水在陜州城南一名永定澗水漫流故又名漫澗又有于水出南山北合逕崖峽北流與于山之水會出于山東谷兩川合注于崖水又東北注橐水北流出谷謂之漫澗矣與安陽溪水合水出石崤南西逕安陽城南漢武帝封上官桀為侯國也潘岳所謂我徂安陽也秦縣漢省入蕩隂晉始置安陽縣今為河南彰德府治東合漫澗水北有逆旅亭謂之漫口客舍也又西逕陜縣故城南又合一水謂之瀆谷水南出近溪北流至橐其水又西北逕陜城西西北入于河河北對茅城故茅亭茅戎邑也公羊曰晉敗之大陽者也津亦取名焉春秋文公三年秦伯伐晉自茅津濟封崤尸而還是也東則咸陽澗水注之水出北虞山南至陜津注河河南即陜城也昔周召分伯以此城為東西之别東城即虢邑之上陽也虢仲之所都為南虢三虢此其一焉其大城中有小城故焦國也武王以封神農之後于此王莽更名黄眉矣今河南府陜州治即陜縣故城古焦國也虢山在州西北三里戴延之云城南倚山原北臨黄河懸水百餘仭臨之者咸悚惕焉西北帶河水湧起方數十丈有物居水中父老云銅翁仲所投處又云石虎載經終此沉沒二物並存水所以湧所未詳也或云翁仲頭髻常出水之漲減恒與水齊晉軍當至髻不復出今惟見水異耳嗟嗟有聲聲聞數里按秦始皇二十一按史記當是六年年長狄十二見於臨洮長五丈餘以為善祥鑄金人十二以象之各重二十四萬斤坐之宫門之前謂之金狄皆銘其胸云皇帝二十六年初并天下以為郡縣正法律同度量大人來見臨洮身長五丈足六尺李斯書也故衛恒叙篆曰秦之李斯號為工篆諸山及銅人銘皆斯書也漢自阿房徙之未央疑漏宫字前俗謂之翁仲矣地皇二年王莽夢銅人泣惡之念銅人銘有皇帝初兼天下文使尚方工鐫滅所夢銅人膺文後董卓毁其九為錢其在者三魏明帝欲徙之洛陽重不可勝至霸水停之漢晉春秋曰或言金狄泣故留之石虎取置鄴宫苻堅又徙之長安毁二為錢其一未至而苻堅亂百姓推置陜北河中於是金狄滅除以為鴻河巨瀆故應不為細梗躓湍流長津碩浪無宜以微物屯流斯水之所以濤波者葢史記所云魏文侯二十六年虢山崩壅河所致耳獻帝東遷自夕潜渡墜坑爭舟舟指可掬亦是處矣又東過大陽縣南交澗水出吴山東南流入河河水又東路澗水亦吴山東逕大陽城西西南流注水入于河此條疑有脫誤河水又東逕大陽縣故城南竹書紀年曰晉獻公十有九年獻公會虞師伐虢滅下陽虢公醜奔衛獻公命瑕父吕甥邑於虢都地理志曰北虢也有天子廟王莽更名勤田應劭地理風俗記城南大河之陽也河水又東沙澗水注之北出虞山東南逕傅巖厯傅說隱室前俗名之為聖人窟孔安國傳傅說隱於虞虢之間即此處也傅巖東北十餘里即巔軨坂也春秋左傳所謂入自巔軨者也有東西絶澗左右幽空窮深地壑中則築以成道指南北之路謂之為軨橋也傅說傭隱止息於此高宗求夢得之是矣橋之東北有虞原上道東有虞城堯妻舜以嬪於虞者也周武王以封太伯弟虞仲於此是為虞公太原地記所謂北虞也城東有山世謂之五家冢冢上有虞公廟春秋穀梁傳曰晉獻公將伐虢荀息曰君何不以屈產之乗垂棘之璧假道於虞公曰此晉國之寳也曰是取中府置外府也公從之及取虢滅虞乃牽馬操璧璧則猶故馬齒長矣即宫之奇所以謂虞虢其猶輔車相依脣亡則齒寒虢亡虞亦亡矣其城北對長坂二十許里謂之虞坂戴延之曰自上及下七山相重戰國策曰昔騏驥駕鹽車上於虞坂遷延負轅而不能進此葢其困處也橋水水字疑衍東北山溪中有小水西南流沙澗亂流逕太疑當作大陽城東河北郡治也澗水南流逕注于河河水又東右左一本左下尚有右字上右字疑是衍文當是左右合積石土柱二溪並北發大陽之山南流入於河是山也亦通謂之薄山矣故穆天子傳曰天子自盬按山海經注云盬鹽池今在河東解縣盬音古己丑南登于薄窴軨之隥乃宿于虞是也又東過砥柱間砥柱山名也昔禹治洪水山陵當水者鑿之故破山以通河河水分流包山而過山見水中若柱然故曰砥柱也三穿既决水流踈分指狀表目亦謂之三門矣山在虢城東北太陽城東也太當是大元和志云砥柱山俗名三門山在硤石縣東北五十里黄河中硤石即陜縣地搜神記稱齊景公渡于江沈之河黿銜左驂沒之衆皆惕古冶子於是㧞劍從之邪行五里逆行三里至于砥之下乃黿也左手持黿頭右手挾左驂鷰躍鵠踴而出仰天大呼水為逆流三百歩觀者以為河伯也亦或作江沅字者也若因地而為名則宜在蜀及長沙按春秋此二土並景公之所不至古冶子亦無因而騁其勇矣劉向叙晏子春秋稱古冶子曰吾嘗濟于河黿銜左驂以入砥柱之流當是時也從而殺之視之乃黿也不言江沅矣又考史遷記云景公十二年公見晉平公十八年復見晉昭公旌軒所指路直斯津從黿砥柱事或在兹又云觀者以為河伯賢於江沅之證河伯本非江神又可知也河之右則崤水注之崤水在今河南府永寧縣北六十里出河南盤崤山西北流水上有梁俗謂之鴨橋也厯澗水東北流與石崤水合水出石崤山山有二陵南陵夏后臯之墓也左傳云臯墓在殽南陵而明統志河南府永寧縣崤山有孔甲陵葢誤以帝臯為孔甲也北陵文王所避風雨也秦將襲鄭蹇叔致諫而公辭焉蹇叔哭子曰吾見其出不見其入晉人禦師必于殽矣余収爾骨焉孟明果覆秦師於此崤水又北左右合西水亂流注于河河水又東千崤之水注焉水南𨗳于千崤之山其水北流纒絡二道漢建安中曹公西討巴漢惡南路之嶮故更開北道自後行旅率多從之今山側附路有石銘云晉太康三年𢎞農太守梁抑元和志引此作梁栁按元晏春秋云梁栁是皇甫士安從姑之子也官城陽太守修復舊道太崤以東西崤以西明非一崤也西有二石又南五六十步臨溪有恬漠先生翼神碑葢隱斯山也其水北流注于河河水翼岸夾山巍峯岐舉羣山叠秀重嶺干霄鄭元按禹貢錐指引此作鄭元云地說河水東流貫砥柱觸閼流今世所謂砥柱者葢乃閼流也砥柱當在西河未詳也余按鄭元所說非自當作是西河當無山以礙胡引此作擬之之自砥柱以下五戸以上其間一百二十里河水竦石桀出勢連襄陸葢亦禹鑿以通河疑此閼流也其山雖闢尚梗湍流激石雲洄澴波怒溢合有一十九灘水流迅急勢同三峽破害舟船自古所患漢鴻嘉四年楊焉言從河上下患砥柱隘可鐫廣之上乃令焉鐫之裁沒水中不能復去而令水益湍怒害甚平日魏景初二年二月帝遣都督沙丘部監運諫議大夫冦兹帥衆五千人歲常修治平河岨晉泰始三年正月武帝遣監運太中大夫趙國都匠中郎將河東藥疑是樂世帥衆五千餘人修治河灘事見五户祠銘雖世代加功水流漰渀濤波尚屯及其商舟是次鮮不踟蹰難濟故有衆峽諸灘之言五户灘名也有神祠通謂之五户將軍亦不知所以也宋林之奇云河自西華隂遂折而東流以至底柱亦謂之三門山山在虢城東北大陽城東也案道元謂砥柱是禹之所鑿其說是也至謂破山以通河此則過論河之至砥柱葢舊有可通之道禹嫌其狹於是䟽而廣之故有三門非是先鑿砥柱山以為三門然後𨗳河而過之也漢鴻嘉中楊焉上言砥柱狹隘可鐫廣之夫禹之治水未嘗不為萬世之慮使砥柱尚有可鐫之理則禹鐫之矣禹所不能鐫而焉欲鐫之何其不思之甚也葢河自龍門至於華隂東折以及砥柱夾於兩山之間其勢最為狹隘故古語云龍門之下河水駛于竹箭惟其為高山所束其勢不得不盤還則其漂悍湍激覆溺舟船是乃萬世之患也豈人力之所能勝哉酈元謂水流峻急勢同三峽破壞舟船自古所患此說是也頃歲建劒大興工役鑿治衆灘其費不貲某嘗詢於舟人云灘患不減于昔日以是知天地山川之險葢有出於勢之自然者未易以人力争也砥柱舟船之患雖禹無如之何而况於楊焉軰乎鄭曉古言云河不能决于砥柱之上者河由兩山中行也出砥柱則平原廣野又并受闗東諸山之水水流益多水勢益大地形益卑水勢益急虞夏以前皆都在底柱之上商初都亳亦在諸山中書所謂適於山降凶德是也以後就水利反受其害以故殷數遷都至周之衰井田漸廢侯國爭水利者築隄以包沃饒之利避水患者亦築隄以鄰國為壑隄日多水日束日失其性而致怒決溢之害不小然决而南奪淮而行害郡邑為少決而北則無復九河故道原野被害逺矣以今輿地言之河自潼關衛北折而東逕閿鄉縣北又東逕靈寳縣北其北岸則芮城縣閿鄉在河南陜州西少北一百三十里黄河南去縣七里靈寳在州西六十里黄河南去縣十里芮城在山西觧州西南七十里黄河在縣南二十里芮伯萬之故疆也葢芮城與閿鄉分河俱在河之北岸薄山在縣北十五里又東逕陜州北其北岸則平陸縣又東過砥柱陜州在河南府西三百里平陸在觧州東南九十里底柱在黄河中西去陜州四十里西北去平陸五十里此河水東至砥柱之所經也唐趙冬曦三門賦序曰砥柱山之六峰者皆生河之中流葢夏后之所開鑿其最北有兩柱相對距崖而立即所謂三門也次於其南有孤峰揭起峰頂平濶夏禹之廟在焉西有孤石數丈圎如削成復次其南有三峰東曰金門中曰三堆西曰天柱河水從黄老神前東流湍激蹙於蝦石折流而南潄于三門苞于廟山乃分為四流淙於三峰之下抵以曲隈會流東注加以兩崖夾水盤紆激射天下罕比明都穆曰砥柱在陜州東五十里黄河之中循河至三門集津三門者中曰神門南曰鬼門北曰人門水行其間聲激如雷而鬼門尤為險惡舟筏一入鮮有得脫三門之廣約二十丈其東百五十歩即砥柱崇約三丈周數丈蔡氏書傳以三門為砥柱州志亦謂砥柱即三門山皆未嘗親履其地故謬誤若此德清胡渭曰按此說與趙賦小異要之諸峰在當時總為一巨石禹析之以通河三門亦砥柱也後人强生分别耳又東過平隂縣北又東至鄧清水從西北來注之清水出清㢘山之西嶺世亦謂清營山其水東南流出峽峽左有城葢古關防也清水厯其南東流逕臯落城北服䖍曰赤翟之都也世謂之倚毫當是亳城葢讀聲近傳因失實也春秋左傳所謂晉侯原本譌僕使太子申生伐東山臯落氏者也與倚亳川水合水出北山礦谷東南流注于清清水又東逕清㢘城南又東南流又會南溪溪水出南山而東注清水又東合棗澗水水出左人嶺下南流俗謂之扶蘇水又南厯奸苗北馬頭山亦白水原西南逕垣縣故城北史記魏武侯二年城安邑至垣即是縣也其水西南入清水色白濁初會清流流注朱箋宋本無流注二字乃有元素之異也清水又東南逕陽壺城東即垣縣之壺城東即垣縣之壺丘亭晉遷宋五大夫所居也清水又東南流注於河今垣曲縣西有垣縣故城河水又東與教水合出垣縣北教山南逕輔山高三十許里上有泉不測其深山頂周員五六里少草木山海經曰孟門東南有平山水出于其上水上漏平字潜于其下又是王屋之次疑即平山也其水南流厯鼔鍾上峽懸洪五丈飛注流壑夾岸深高壁立直上經崖秀舉百有餘丈峯次青松巖懸赬石於中厯落有翠柏生焉丹青綺分望若圖繡矣水廣一十許步南流厯鼔鍾川分為二澗一澗西北出一百六十許里山岫逥阻纔通馬步今聞喜縣東北谷口猶有乾河里故溝存焉今無復有水按山海經王屋山東北三百里曰教山教水出焉是水冬乾而夏流實惟乾河注云今河東聞喜縣東北有乾河里但有故溝處無復水即是也一水厯治官西世人謂之鼔鍾城城之左右猶有遺銅及銅錢也城西阜下有大泉西流注澗與教水合伏入石下南至下峽山海經曰鼔鍾之山帝臺之所以觴百神即是山也其水重源䨇發南至西馬頭山東載謝云疑作截坡下又伏流南十餘里復出又謂伏流水南入于河山海經曰教山教水出焉又南流注于河今山海經作西流是水冬乾夏流實惟乾河也今世人猶謂之為乾澗矣河水又與畛水合水出新安縣青要山新安縣今屬河南府青要山在縣西北二十里今謂之彊山山海經曰青要之山畛水朱本有出焉二字北流注于河即是水也河水又東正囬之水入焉水出騩山疆當是彊下同山東阜也東流俗謂之疆川水與石等𤓰川合出西北石澗中東南流注于彊水彊水又東逕彊冶原本譌作疆治從朱本改正鐵官東東北流注于河河水又東合庸庸之水按山海經作滽滽水出河南垣縣宜蘇山俗謂之長泉水山海經曰水多黄貝伊洛門也其水北流分為二水一水北入河一水又東北流注于河河水又東逕平隂縣北地理風俗記曰河南平隂縣故晉隂地隂戎之所居又曰在平城之南故曰平隂也三老董公說高祖處陸機所謂皤皤董叟謨我平隂者也見漢高祖功臣頌魏文帝改曰江隂矣今河南府孟津縣有平隂縣故城河水西會清水一作右㑹水出垣縣王屋西山濝溪夾山東南流逕故城東即濝關也漢光武建武二年遣司空王梁北守濝關天井關擊赤眉别校皆降之獻帝自陜北渡安邑東出濝關即是關也濝水西屈逕關城南厯軹關南逕苗亭西亭故周之苗邑也又東流注于河經書清水井也此句有錯誤朱云宋本作非也是乃濝水耳水經注集釋訂訛卷四
