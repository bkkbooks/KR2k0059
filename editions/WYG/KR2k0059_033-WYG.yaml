body:
  text: 水經注集釋訂訛卷三十三歸安沈炳巽撰江水一岷山在蜀􅇿氐道縣今為四川松潘衛治衛本禹貢梁州之域後為氐羌地漢置湔氐道屬蜀郡唐為嘉域椊州治明置松潘衛屬成都司在成都西北七百六十里大江所出東南過其縣北岷山即瀆山也水曰瀆水矣又謂之汶阜山在徼外江水所導也益州記曰大江泉源即今所聞始發羊膊嶺下縁崖散漫小大百數殆未濫觴矣東南下百餘里至白馬嶺而歴天彭闕亦謂之為天谷也按通典彭州導江縣西有天彭闕兩山相對如闕州名取此導江即今㳺縣西北去松潘衛六百餘里非益州記之所謂天彭闕也秦昭王以李冰為蜀守冰見氐道縣有天彭山兩山相對其形如闕謂之天彭門亦曰天彭闕江水自此已上至微弱所謂發源濫觴者也荀子云江出汶山其始發源可以濫觴及其至江之津不方舟不避風不可涉也漢延平中岷山崩壅江水三日不流按漢書五行志成帝元延三年正月丙寅蜀郡岷山崩壅江江水逆流三日乃通今云延平誤延平乃後漢殤帝年號延平中無岷山崩壅江事揚雄反離騷云自岷山投諸江流以弔屈原名曰反騷也江水自天彭闕東逕汶闗而歴氐道縣北漢武帝元封四年分蜀郡北部置汶山􅇿以統之縣本秦始皇置後為昇遷縣也晉書地理志作升遷縣屬汶山郡益州記曰自白馬嶺回行二千餘里詳下文當作二十餘里至龍涸晉之升遷縣後周置龍涸郡今為四川松潘衛又八十里至西陵縣按漢志西陵縣屬江夏郡今之湖廣黄州府黄岡縣也去蜀甚逺不應遽至且下又云南下六十里至石鏡乃成都府之武都山也又云西百二十里至汶山故郡則上必非西陵明矣或是蠶陵則同為蜀縣未可知耳又南下六十里至石鏡元和志翼水縣北至翼州六十里石鏡山在縣東南九里大江水經縣西二百步又六十餘里而至北部始百許步汶江為蜀郡北部都尉治故謂之北部又西百二十里至汶山故郡乃廣二百餘步漢武帝元鼎六年以冉䮾地置汶山郡治汶江縣地節三年郡廢縣屬蜀郡建安中先主定蜀復分置汶山郡治汶江縣今茂州是也其故城在州北三里晉移郡於緜虒縣改汶江曰廣陽屬焉在今州南二百里故謂漢所置曰汶上故郡即宣帝廢為蜀郡北部者也隋改廣陽曰汶山縣復置汶山郡元和志云汶山即岷山去青城百里又西南百八十里至濕坂江稍大矣元和志濕坂在茂州汶山縣南一百三十七里嶺上樹木森沈常有水滴未嘗暫燥故曰濕坂自大江泉源至江稍大矣皆益州記中語故其精則井絡纒曜江漢昞靈河圖括地象曰岷山之精上為井絡帝以㑹昌神以建福故書曰岷山導江泉流深逺盛為四瀆之首廣雅曰江貢也風俗通曰出珍物可貢獻釋名曰江共也小水流入其中所公共也東北百四十里曰崍山卭崍山在今雅州榮經縣東四十里本名卭笮故卭人笮人界也中江所出東注于大江崍山卭崍山也在漢嘉嚴道縣一曰新道南山有九折坂明一統志九折坂在卭崍山山路險峻囘曲九折乃至山上漢王陽為益州刺史行部至此歎曰奉先人遺體奈數乗此險後以病去及王尊為刺史至此問吏曰此非王陽所畏道耶叱其御曰驅之王陽為孝子王尊為忠臣夏則凝冰冬則毒寒王子陽按轡處也平恒言是中江所出矣郭景純江賦曰流二江于崌崍又東百五十里曰崌山北江所出東注于大江山海經曰崌山江水出焉東注大江其中多怪虵江水又逕汶江道汶出徼外岷山西玉輪坂卞而南行汶水一名玉輪江方輿勝覽云在汶川縣北三里明一統志云汶江在汶川縣治西源出玉壘山入灌縣元和志玉壘山在汶川縣北四里縣北去茂州百里本漢緜虒縣地今為保縣又東注其縣而東注于大江故蘓代告楚曰蜀地之甲浮船于汶乗夏水而下江五日而至郢謂是水也又有湔水入焉湔水在石泉縣治東源出玉壘山東南至江陽縣入江水出綿道亦曰綿夷縣之玉壘山夷當作虒按漢志蜀郡緜虒縣玉壘山湔水所出東南至江陽入江今為灌縣及汶川縣地吕忱云一曰半浣水也下注江江水又東别為沱開明之所鑿也郭景純所謂玉壘作東别之標者也縣即汶山郡治劉備之所置也渡江有笮橋禹貢錐指江沱自古有之華陽國志曰七國時有杜宇稱帝于蜀號望帝其相開明決玉壘山以除水害帝遂禪位于開明此說出揚雄蜀王本紀故漢志云汶江縣有江沱在西南東入江夫既為七國時開明所鑿則非禹之江沱亦不辯而自明矣江水又歴都安縣縣有桃闗漢武帝祠李冰作大堰于此都安本漢緜虒郫江原三縣也蜀漢分置都安縣屬汶陽郡晉徙都安于灌口屬汶山郡宋齊因之後周省都安入鄲縣唐初于灌口置盤龍縣尋改為導江縣孟蜀置灌州宋時廢置不常元初復置灌州明改州為縣本朝因之故城在縣東堰在縣西堰于江作塴有左右口謂之湔塴江入郫江撿江以行舟撿江胡引作檢江益州記曰江至都安堰其右撿其左其正流遂東郫江之右也因山頺水坐致竹木以溉諸郡華陽國志曰李冰壅江作塴穿郫江檢江别支流雙過郡下以行舟船蓋以郫檢為二江檢江即任豫之所謂流江也又有犍尾堰元和志云在導江縣西南二十五里李冰作之以防江決破竹為龍圓徑三尺長十丈以石寳其中累而壅水又羊摩江灌江西于玉女房下此句疑有譌脫作三石人于白沙郵郵在堰官上立水中刻要江神水竭不至足盛不没要是以蜀人阜則藉以為溉阜疑作旱雨則不遏其流故記曰水旱從人不知饑饉沃野千里世號陸海謂之天府也俗謂之都安之堰亦曰湔堰又謂金堤左思蜀都賦云西踰金堤者也諸葛亮北征以此堰農大胡引作本國之所資以征丁千二百人主䕶之有堰官益州刺史皇甫晏至都安屯觀坂從事何旅曰今所安營地名觀上夫在下其徵不祥不從果為牙門張和所殺按華陽國志云今所安營地名觀坂自上觀下反上之象其徴不祥今所引頗誤當從志改正江水又逕臨卭縣王莽之監卭也今為四川卭州及諸縣縣有火井鹽水昏夜之時光興上照火井在卭州西八十里博物記云臨卭火井深二三丈以竹木投取火後人以火燭投井中火即滅絶不復燃又蜀都賦注先以家火投之須叟光熖上騰以竹筒盛之接其光而無炭也取井火還井水一斛水得四五斗鹽家火煮之不過二三斗鹽耳江水又逕江鄉縣王莽更名卭原也按漢志蜀郡江原王莽曰卭原此云江鄉當作原􅗪江水焉江原今為成都府崇慶州漢志江原縣􅗪水水首受江南至武陽入江武陽今眉州及新津仁夀井研三縣地江水又東北逕郫縣下今屬成都府故城在縣北五十步杜宇所都張儀始築城晉時李雄自稱益州牧都郫即此縣民有姚精者為叛夷所殺掠其二女二女見夢其兄當以明日自沈江中後日當至可伺候之果如所夢得二女之尸于水郡縣表異焉江水又東逕成都縣成都故城即今縣治蜀王開明所都也秦置成都縣漢末益州治此晉以後並因之唐宋元明為成都治所本朝因之縣以漢武帝元鼎二年立縣有二江雙流郡下故揚子雲蜀都賦曰兩江其前者也風俗通曰秦昭王使李冰為蜀守開成都兩江溉田萬頃神嵗取童女二人為婦冰以其女與神為婚經至祠前勸神酒酒杯恒澹澹冰厲聲以責之因忽不見良乆有兩牛鬭于江岸傍有間冰還流汗謂官屬曰吾鬪疲極當相助也南向腰中正白者我綬也主簿刺殺北面者江神遂死蜀人慕其氣决凡壯健者因名冰兒也秦惠王二十七年遣張儀與司馬錯等㓕蜀遂置蜀郡焉王莽改之曰導江也儀築成都以象咸陽晉太康中蜀郡為王國更為成都内史益州刺史治地理風俗記曰華陽黒水惟梁州漢武帝元朔二年改梁曰益州以新啓犍為䍧牱今四川馬湖遵義及雲南臨安等府越嶲州今四川寜畨衛及雲南楚雄府定逺等縣地之疆壌益廣故稱益云初治廣漢之雒縣今成都府金堂縣後乃徙此故李固與弟圄書曰固今年五十七鬢髪巳白所謂容身而遊滿腹而去周觀天下獨未見益州耳昔嚴夫子常言經有五涉其四州有九遊其八欲類此子矣初張儀築城取土處去城十里因以養魚今萬頃池是也明一統志作萬嵗池在成都府城北一十里張儀築城取土于此因以成池廣袤數十里溉三鄉田萬頃城北又有龍堤池城東有千秋池西有栁池西北有天井池津流經通冬夏不竭西南兩江有七橋直西門郫江沖里橋華陽國志作沖治橋西南石牛門曰市橋呉漢入蜀自廣都令輕騎先徃焚之橋下謂之石犀淵李冰昔作石犀五頭以厭水精穿石犀渠于南江命之曰犀牛里後轉犀牛二頭在頭中宋本作在府中一頭在市橋一頭沈于淵也明一統志石犀在成都府城南三十五里秦太守李冰作五石犀沈之于江以厭水怪後土人立廟江上以祀冰號曰石犀廟大城南門曰江橋橋南曰萬里橋在成都府中和門外寰宇記云昔諸葛亮送費褘聘吳至此曰萬里之行始于此矣又唐史明皇狩蜀過此問橋名左右對以萬里帝歎曰開元末僧一行謂更二十年國有難朕當逺遊至萬里之外此是也遂駐蹕成都西上曰夷橋華陽國志作夷里橋下曰笮橋在成都府城西四里南岸道東有文學始文翁為蜀守立講堂作石室於南城永年年字譌華陽國志作永初後學堂遇火後守更増二石室華陽國志漢孝文末年以廬江文翁為蜀守翁乃立學選吏子弟就學遣雋士張叔等十八人東詣博士授七經還以教授學徒鱗萃蜀學比於齊魯巴漢亦立文學孝景帝嘉之今天下郡國皆立文學因翁倡其教蜀為之始也永初後堂遇火太守陳留髙眣更修立又増造二石室後州奪郡學移夷里道西故錦官也言錦工織錦則濯之江流而錦至鮮明濯以他江則錦色弱矣遂命之為錦里也蜀有迴復水江神嘗溺殺人文翁為守祠之勸酒不盡㧞劍擊之遂不為害江水東逕廣都縣今為成都府雙流縣其故城在今成都縣東南新津縣東北漢武帝元朔二年置王莽之就都亭也李冰識察水脈穿縣鹽井江西有望穿鑿山渡水結諸陂池故盛養生之饒按華陽國志云冰識齊水脈穿廣都鹽井諸陂池蜀于是盛有養生之饒焉又云廣都縣有鹽井漁田之饒江西有安稻田穿山崖過水二十里今所引乃合二處言之頗有譌誤即南江也又從沖里志作治橋北志作西折曰長升橋城北十里曰升遷華陽國志兩江有七橋直西門郫江中沖治橋西南石牛門曰市橋城南曰江橋南渡流曰萬里橋西上曰夷里橋下曰笮橋從沖治橋西出折曰長昇橋郫江上西有永平橋城北十里有昇仙橋有送客觀司馬相如將入長安題其門曰不乗髙車駟馬不過汝下也後入卭蜀果如志焉李冰沿水造橋上應七宿故世祖謂呉漢曰安軍宜在七橋連星間華陽國志作安軍宜在七星間漢自廣都乗勝進逼成都與其副劉尚南北相望夾江為營浮橋相對公孫述使謝豐揚軍市橋出漢後襲破漢墜馬落水縁馬尾得出入壁命將夜潛渡江就尚擊豐斬之於是水之陰江北則左對繁田繁田繁縣之田今為新繁也文翁又穿湔㳛以溉灌繁田一千七百頃江水又東絶胡引作逕綿洛逕五城界至廣都北岸南入於江謂之五城水口斯為北江水又東至南安為壁疑作璧胡作碧玉津故左思云東越玉津也又東南過犍為武陽縣青衣水沫水從西南來合而注之禹貢錐指引經文武陽縣下有與􅗪江合四字其犍為郡有南安縣今嘉定州及夾江犍為等縣皆地縣故大夜郎國漢武帝開道置以為縣太初四年益州刺史任安城武陽建元六年置王莽更名西順縣曰戢成武陽縣今成都府仁夀縣及井研縣嘉定州睂州峩睂等州縣皆其故地光武謂之士大夫郡華陽國志更始時犍為逺修貢職及公孫述有蜀郡拒守述伐之郡功曹朱遵逆戰死之而任君業閉户費貽素隱光武嘉之曰士大夫之郡也有􅗪江入焉出江原縣首受大江東南流至武陽縣注于江縣下注疑作江上舊有大橋廣一里半謂之安漢橋華陽國志作漢安橋水盛嵗壊民苦治功後太守李嚴鑿大社山華陽國志作天社山按明一統志天社山在新津縣南三里枕大江今作大誤尋江通道此橋遂廢縣有赤水下注江建安二十九年有黄龍見此水九日方去此縣藉江為大堰開六水門用灌郡下北山昔者王喬所升之山也華陽國志曰犍為東接江陽南接朱提北接蜀郡西接廣漢王喬升其北山彭祖家其彭䝉江水又與文井江㑹李冰所導也自筰道與濛溪分水至蜀郡臨卭縣與布僕水合水出徼外成都西沈黎郡今黎州土司地漢武元封四年以蜀都卭筰卭理旄牛道天漢四年置都尉主外羌在卭崍山表後漢書郡國志蜀郡屬國旄牛縣下引華陽國志曰旄地也在卭崍山表卭人自蜀入度此山甚艱難南人毒之故名自蜀西度卭筰其至險有弄棟八渡之難楊母闗路之岨漢志益州郡有弄棟縣原本譌作揀郡國志引華陽國志云其道至險有長嶺若棟八渡之難楊母闗之峻昔楊氏創造作閣故名水從縣西布僕來分為二流一水逕其道又東逕臨卭入文井水文井水又東逕江都縣余兄東甫曰江都縣漢志屬廣陵國今為楊州府治蜀中諸郡無名江都者疑是譌字恐當作江原或作江陽炳巽按華陽國志江原縣郡西渡大江濵文井江去郡一百二十里有青城山據此則當作江原明矣蓋此注原引志中語也縣濱文井江江上有長堤堤跨四十里有朱原本譌未亭亭南有青城山山上有嘉穀山下有蹲鴟即芋也所謂下有蹲鴟至老不饑卓氏之所以樂逺徙也文井江又東至武陽縣天社山下入江其一水南逕越雋卭都縣西東南至雲南都當作郡之青蛉縣今為雲南姚安府大姚縣地郡本雲山華陽國志作雲川地也蜀建興三年置僕水又南逕永昌郡邪龍縣而與貪水合水出青蛉縣上承青蛉水明一統志青蛉河舊名三窠戍江源出三窠山流至姚安府南四十里瀦為石池周廣二百餘畝分為二溪至府城北復合流至大姚縣南東入金沙江逕葉榆縣今雲南大理府治及諸縣地又東至邪龍入于僕布僕水在四川卭州西八十里發源自獠界即古之濮也僕水又逕寧州建寧縣今介休縣又雲南府建寜縣州故庲降都督屯故南人謂之屯下劉禪建興三年分益州郡置歴雙栢縣即水入焉水出秦藏漢志作秦臧屬益州郡牛蘭山南流至雙栢縣東注僕水又東至來維縣入勞水水出徼外東逕其縣與僕水合僕水東至交州交阯郡麊泠縣漢志注孟康曰音螟蛉師古曰音麋零南流入于海江水自武陽東至彭亡聚昔岑彭與吳漢􅑴流入蜀軍次是地知而惡之㑹日暮不移遂為刺客所害亦謂之平謨水曰外水此地有彭冢言彭祖冢焉江水又東逕南安縣西今為嘉定州夾江縣有熊耳峽連山競險接嶺争髙漢河平中山崩地震江水逆流懸溉有灘名壘坻亦曰鹽溉李冰所平也華陽國志南安縣郡東四百里治青衣江㑹縣溉有名灘一曰雷垣二曰鹽溉李冰所平也此引頗誤縣治青衣江㑹衿帶二水矣即蜀王開明故治也來敏本蜀論曰荆人鄨令死其尸隨水上荆人求之不得鄨令至汶山下邑復生起見望帝望帝者杜宇也從天下女子朱利自江源出為宇妻遂王於蜀號曰望帝望帝立以為相時巫山峽西蜀水不流帝使鄨令鑿巫峽通水蜀得陸處望帝自以徳不若遂以國禪號曰開明華陽國志所載與此小異附録於後蜀王杜宇教民務農一號杜主時朱提有梁氏女利遊江源宇說之納以為妃移治郫邑或治瞿上七國稱王杜宇稱帝號曰望帝更名蒲卑自以功徳髙諸王乃以褒斜為前門熊耳靈闗為後户玉壘峨睂為城郭江潛綿洛為池澤以汶山為畜牧南中為園囿㑹有水災其相開明决玉壘山以除水害帝遂委以政事法堯舜禪授之義遂禪位於開明帝升西山以隱焉縣南有峨睂山有蒙水即大渡水也明一統志大渡河源出雋州流逕舊羅目縣南東入龍游縣界水發䝉漢當作䝉溪漢志蜀郡青衣下禹貢蒙山溪大渡水東南至南安入渽東南流與涐水合水出徼外逕汶江道吕忱曰涐水出蜀許慎以為涐水也從水涐聲漢志曰渽水說文曰涐水字雖異實同一水也說見下注南至南安入大渡水大渡水又東入江禹貢錐指云經曰和夷底績傳曰和夷之地致功可藝正義曰和夷蘓氏曰和夷西南夷名也按水經引鄭說云和夷和上夷所居之地和水即涐水和涐聲相近字從而變地理志云青水縣禹貢䝉山溪大渡水東南至南安入渽渽水出汶江縣徼外南至南安東入江過郡二行三千四十里按汶江今為成都府茂州南安今為嘉定州自茂州至嘉定不應有三千四十里之逺又按杜氏通典茂州南至濛陽郡三百七十里自濛陽南至蜀郡一百五里自蜀郡南至仁夀郡二百里自仁壽西南南至犍為郡一百九十里犍為郡唐之嘉州今之嘉定州也自茂州至嘉州通典止八百六十里而漢志乃云三千四十里此必無之理定有譌誤之字渽乃涐字之誤說文涐水出蜀汶江徼外東南入江從水我聲徐鉉音我何切故知渽當作涐和夷者涐水南之夷也汶江今茂州南安今嘉定州水經江水東南過犍為武陽縣青衣水沫水從西南來注之此即二水㑹涐水入江處也酈注云江水自武陽東至彭亡聚曰外水又東南逕南安縣西有熊耳峽縣南有峩眉山有濛水即大渡水也與涐水合大渡水又東入江班固謂大渡入涐道元謂涐入大渡然涐水源長當以漢志為正道元叙涐水甚畧自漢志誤涐作渽而師古曰音哉世遂不知有涐水且不知渽水之所在徒以其下流與南安之沫水號為大渡者合而入江因目涐水曰大渡河元和志云黎州西至廓清城一百八十里其城西臨大渡河河西生羌蠻界黎州本漢沈黎郡旄牛縣地唐置黎州治漢源縣今黎大所南三十里漢源廢縣是也又云通望縣北至黎州九十里大渡水逕其北二百步通望本漢旄牛縣隋為大渡戍尋置陽山縣唐改曰通望今黎所東南通望故城是也李膺益州記云羊膊嶺水分二派一南流為大江一西流為大渡河一名羊山江源出羊膊嶺大渡河即涐水羊膊即汶江徼外之山涐水所出以今輿地言之涐水自茂州徼外南流逕黎大所西舊有黎州所大渡所屬本朝并為一曰黎大所附雅州折而東經所南又東逕建昌衛越雋營北又東逕峩睂縣南又東至嘉定州南合青衣沫水東入大江此水之南蓋即禹貢所謂和夷也故山海經曰濛水出漢陽西入江灄陽四按山海經當作西又東南過僰道縣北僰蒲北切音匐原本俱譌作僰僰道今為四州叙州府宜賔縣若水淹水合從西來注之又東注水北流注此句疑有譌脫若水出蜀郡旄牛徼外東南流至越雋㑹無縣合淹水又東北至又朱提縣西為瀘江水又東北至僰道縣入江縣本僰人居之地理風俗記曰夷中最仁有人道故字施當從朱本作故字從人而秦紀謂僰童之富者也其邑髙后六年城之漢武帝感相如之言使縣令南通僰道費功無成唐䝉南入斬之乃鑿石開閣以通南中迄於建寧二千餘里山道廣丈餘深三四丈其鏨朱本作塹之迹猶存王莽更曰僰治也漢書西南夷傳建元六年畨陽令唐蒙上書請開西南夷上許之乃拜䝉以郎中將將千人食重萬餘人從巴筰闗入遂見夜郎侯多同厚賜諭以威徳約為置吏使其子為令夜郎旁小邑皆貪漢繒帛以為漢道道險終不能有也乃且聴䝉約還報迺以為犍為郡發巴蜀卒治道自僰道指䍧牱江蜀人司馬相如亦言西南卭笮可置郡使相如以中郎將往諭皆如南夷為置一都尉十餘縣屬蜀當是時巴蜀四郡通西南夷道載轉相醸數載不通士卒餓餧離暑濕死者甚衆耗費無功上患之乃罷西夷獨置南夷兩縣一都尉稍今犍為自保就山多猶猢似猴而短足好遊巖樹一騰百步或三百丈順往倒返乗空若飛縣有蜀玉岳蘭華陽國志僰道有蜀王兵闌李冰燒之後漢書郡國志引作玉岳蘭故酈元據之然恐非是其神作大難華陽國志作灘江中崖峻岨險不可穿鑿李冰乃積薪燒之故其處懸巖猶有赤白𤣥黄五色焉赤白照水𤣥黄從焚來至此而止言畏崖嶼不更上也華陽國志崖有赤白五色映水𤣥黄魚從楚來至此而止畏崖映水也此脫魚字又譌楚為焚遂不可讀益州耆舊傳曰張貞妻黄氏女也名帛華陽國志作僰道黄帛張貞妻也貞乗船覆没求尸不得帛至没處灘頭仰天而嘆遂自沈淵積十四日帛持貞手于灘下出時人為說曰符有光洛焚道有張帛者也華陽國志符縣吏先尼和於永建元年十二月奉縣長遣徃蜀過成瑞灘死子賢求尸不得女絡年二十五乃分金珠作二錦囊繋兒頭下至曰二年二月十五日至父没所哀哭自沈見夢告賢至二十一日當與父屍俱出至日父子浮出人為語曰符有先絡僰道有張帛求其人天下無有其偶者矣此注譌先絡作光洛譌僰道作焚道江水又與符里當作黒漢志南廣下汾闗山符黒水所出北至僰道縣入江水合水出寧州南廣郡南廣縣今為叙州府慶符南溪等縣縣故犍為之屬縣也漢武帝太初元年置劉禪延熙中分以為郡導源汾闗山北水水字疑在下句出字上南北流有大步水注之按漢志南廣下有大涉水北至符入江則此大步當作大涉出南廣縣北流注符黒水又北逕僰道入江謂之南廣口渚水則未聞也此句疑是錯簡又東過江陽縣南洛水從三危山東過廣魏洛縣南東南注之廣魏洛陽當作廣漢雒縣廣漢郡今為潼川府各縣及成都府等地雒縣今成都府漢州及金堂縣等地洛水出雒縣漳山胡引作章山按漢志雒縣下音山雒水所出南至新都入湔此云漳未詳孰是亦言出梓潼縣栢山山海經曰三危在燉煌南與岷山相接山南帶黒水又山海經不言雒水所導經曰出三危山所未詳常璩云李冰導雒通山水流發暴口逕什方縣華陽國志作導洛通山洛水或出瀑口逕什方縣㑹新都大渡漢髙帝六年封雍齒為侯國王莽更名曰美信縣也雒水又南逕雒縣故城南廣漢郡治也漢髙帝之為漢王也發巴渝之士北定三秦六年乃分巴蜀置廣漢郡于乗鄉王莽之就信縣曰吾雒也按漢志廣漢郡莽曰就都廣漢縣莽曰廣信今云就信是合郡縣言之疑誤雒縣莽曰吾雒漢安帝永初二年移治涪城後雒縣此句有譌脫當從華陽國志作移涪後治雒城先是雒縣城南每陰雨常有哭聲聞于府中積數十年沛國陳寵為守以亂世多死亡暴骸不塟故也乃悉收塟之哭聲遂絶劉備自將攻雒蜀志先主克涪進圍雒縣龎士元率衆攻城為流矢所中卒龎士元中流矢死於此益州舊以蜀郡犍為廣漢為三蜀土地沃美人士儁乂為一州稱望縣有沈鄉去江七里江士遊之所居沈鄉華陽國志作汎鄉江士遊後漢書作姜士遊華陽國志作姜詩字士遊詩至孝母好飲水嗜魚膾常以雞鳴遡流汲江坐取水溺死婦恐姑知稱詩遊學冬夏衣服實投江流於是至孝上通洞泉泉出其舍側而有江之甘焉詩有田濵江澤齒朱云據史記當作潟鹵謂鹹地也盡為沃野又湧泉之中旦旦常出鯉魚一雙以膳原本譌繕焉可謂孝悌發于方寸徽美著于無窮者也後漢書列女傳廣漢姜詩妻者同郡龎盛之女也詩事母至孝妻奉順尤篤舎側湧泉味如江水每旦出雙鯉以供母洛水又南逕新都縣今屬成都府蜀有三都謂成都廣都此其一焉與綿水合水西出綿竹縣今屬成都府綿水出紫巖山東至新都縣北入洛水又與湔水合亦謂郫江也又言是沼水宋本作涪水朱云當作洛水吕忱曰一曰湔然此二水俱與洛㑹矣又逕犍為合牛鞞水昔羅尚乗牛鞞水東征李雄謂此水也按十六國春秋蜀録云李雄急攻尚尚粮運不繼軍士無食乃委城由牛鞞水夜遁也縣以漢武帝元封二年置又東逕資中縣今為成都府資縣反内江縣等地又逕安漢縣今為順慶府廣安州謂之綿水也自上諸縣咸以灌溉故語曰綿洛為浸沃也綿水至江陽縣方山下入江謂之綿水口曰中江原本譌水江陽縣枕帶雙流據江洛㑹也按江陽屬犍為郡今叙州府富順縣及瀘州納溪江安皆其地漢志廣漢郡雒縣音山雒水所出南至新都北入湔緜竹縣紫岩山緜水所出東至新都北入洛緜洛㑹湔以湔為主故緜虒下云湔水東南至江陽入江過都三行千八百九十里也酈注言湔水至廣都北岸入江蓋特其枝津相通耳正流則固合緜雒至江陽入江也湔水與郫江通波故曰緜雒與湔水合亦謂之郫江也漢景帝六年封趙相蘓喜為侯國按史表景帝六年封蘓嘉為江陽侯漢表作蘓息今云蘓喜似誤江中有大門小門焉季秋之月則黄鱗魚死漚也此句有譌誤按華陽國志云江陽江中有大闕小闕季春黄龍堆没闕即平然亦不可解說也昔世祖㣲時過江陽縣有一子望氣者言江陽有貴兒象王莽求之而撩煞之後世祖怨衍字為子立祠於縣謫其民罰布數世華陽國志世祖㣲時過江陽有一子望氣者曰江陽有貴兒氣王莽求之縣人殺之後世祖為子立祠謫江陽民不使冠帶者數世揚雄琴清英曰尹吉甫子伯竒至孝後母譛之自投江中衣苔帶藻忽夢見水仙賜其美藥惟養親揚聲悲歌船人聞而學之吉甫聞船人之聲疑似伯竒援琴作子安之操江水逕漢安縣北晉書地理志漢安縣屬江陽郡蜀置今為順慶府廣安州地禹貢錐指明一統志俱作安漢故城在府城北三十五里縣雖迫山川土地特美蠶魚鹽家有焉江陽郡治也故犍為岐江都尉建安十八年劉璋立江水東逕樊石灘又逕大附灘頻歴二險也又東過符縣北邪東南邪下疑有譌脱朱本云漢志益州郡有邪龍縣此疑漏龍縣二字鰼部水從符關東北注之符縣今為四川瀘州合江縣縣故巴夷之地也漢武帝建初六年漢武帝無建初年號按漢志符縣屬犍為郡武帝建元六年開西南夷傳唐䝉入蜀亦是建元六年當作建元為是以唐䝉為中郎將從萬人出巴符闗者也按漢書西南夷傳作將萬人從巴筰闗入漢武元鼎二年立漢志犍為郡建元六年開今云元鼎從華陽志也王莽之符信矣縣治安樂水㑹水源南通寧州平夷郡鄨縣平夷郡今為雲南曲靖府陸凉州等地鄨縣見前北逕安縣界之東漢志無安縣犍為郡有南安縣符縣此疑漏南字又逕符縣下北入江縣長趙祉遣吏光尼和華陽國志作先尼和下十一月作十二月成濡灘作成瑞灘女終作女絡俱與此異以永建元年十一月詣巴郡没死成濡灘子賢求䘮不得女終年二十五歳有二子五嵗以還至二年二月十五日尚不得喪終乃乗小船至父没處哀哭自沈見夢告賢曰至二十一日與父俱出至日父子果浮出江上郡縣上言為之立碑以旌孝誠也其鰼部之水所未聞矣或是水之殊目非所究也又東北至巴郡江州縣東强水涪水漢水白水宕渠水五原本漏水合南流注之江州今為巴縣漢志涪水出徼外南至墊江入漢墊江今合州也漢水即嘉陵水巴水一名北水其下流為宕渠水酈注云即潛水此宕渠之潛非漢夀之潛也强水即羌水也宕渠水即潛水渝水矣巴水出晉昌郡宣漢縣巴嶺山晉昌郡今為陜西漢中府石泉縣郡𨽻梁州晉太康中立治漢中縣今漢中府治南去郡八百餘里故屬巴西南流歴巴中逕巴郡故城南李嚴所築大城北西南入江庾仲雍所謂江州縣對二水口右則涪内水左則蜀外水即是水也江州縣故巴子之都也春秋桓公九年巴子使韓服告楚請與鄧好是也及七國稱王巴亦王焉秦惠王遣張儀救苴侯于巴儀貪巴苴之富因執其王以歸以置巴郡焉巴治江州漢獻帝初平元年分巴為三郡於江州則永寧郡治也劉璋納蹇𦙍原本作騫淯今從華陽國志改之訟復為巴郡華陽國志漢獻帝初平元年征東中郎將趙穎建議分巴為二郡穎欲得巴舊名故白益州牧劉璋以墊江以上為巴郡江南龎羲為太守治安漢以江州至臨江為永寧郡胸忍至魚復為固陵郡巴遂分矣建安六年魚復蹇𦙍白璋争巴名璋乃改永寧為巴郡以固陵為巴東徙羲為巴西太守是為三巴譙周巴記曰初平六年趙穎分巴為二郡欲得巴舊名故郡以墊江為治安漢以下為永寧郡建安六年劉綽分巴以永寧為巴東郡墊江為巴西郡云云據此二書則初平時止分巴為二郡至建安六年劉璋始分巴為三郡今云初平元年分似誤且所引不詳故備録之以嚴顔為守顔見先主入蜀歎曰獨坐窮山放虎自衛此即􅶈心處巴漢世郡治江州巴水北北府城是也華陽國志作巴水北有相橘官今北府城是也漏去五字遂不可解後乃徙南城劉備初以江夏費觀為太守領江州都督後都䕶李嚴更城周一十六里造蒼龍白玉門華陽國志作白虎門求以五郡為巴州治丞相諸葛亮不許華陽國志劉先主初以江夏費瓘為太守領江州都督後都䕶李嚴更城大城周圍十六里欲穿城後山自汶江通水入巴江使城為州求以五都置巴州丞相諸葛亮不許亮將北征召嚴漢中以故嚴穿山不逮然造蒼龍白虎門云云較此注似明顯竟不果地勢側險皆重屋累居數有火害又不相容結舫水居者五百餘家承三江之㑹夏水増盛壊散顛没死者無數縣有官橘官荔枝園夏至則熟二千石常設厨膳命士大夫共㑹樹下食之縣北有稻田出御米也縣下又有清水穴巴人以此水為粉則皜曜鮮芳貢粉京師因名粉水故世謂之為江州墮林粉粉水亦謂之為立水矣江水北㟁有塗山南有夏禹廟塗君祠廟銘存焉常璩仲雍並言禹娶于此余按羣書咸言禹娶在壽春當塗不於此也江水又東至枳縣西延江從䍧牱郡北流西屈注之東逕陽闗巴子梁江之兩㟁猶有梁處巴之三闗斯為一也延熙中蜀車騎將軍鄧芝為江州都督治此江水又東右逕黄葛峽山髙險今無人居江水又左逕明月峽東至梨鄉歴鷄鳴峽江之南㟁有枳縣治華陽記曰枳縣在江州巴郡東四百里治涪陵水㑹庾仲雍所謂有别江出武陵者也水乃延江之枝津分水北注逕涪陵入江故亦云涪陵水也陽闗在今巴縣東漢枳縣屬巴郡今重慶府之涪州及長夀酆都二縣皆其地涪陵亦屬巴郡今黔州彭水武隆三縣是也其水南逕武陵郡今常徳府及各屬縣昔司馬錯泝舟此水取楚黔中地延熙中鄧芝伐徐巨射𤣥猨于是縣猨自㧞矢卷木葉塞射瘡芝歎曰傷物之生吾其死矣華陽國志芝征涪陵徐巨見𤣥猿縁山芝性好弩手自射猿中之猿援其箭卷木葉塞其瘡芝曰嘻吾違物之性其將死矣一曰芝見猿抱子在樹上引弩射之中猿母其子為拔箭以木葉塞瘡芝乃嘆息投弩水中自知當死江水又東逕涪陵故郡北後乃并巴郡遂罷省江水又東逕文陽灘灘險難上江水又東逕漢平二百餘里左自涪陵東出百餘里而届於積石東為銅柱灘又逕東望峽東歴平都郡國志引巴記曰和帝柝枳縣置平都縣屬巴郡今重慶府酆都縣峽對豐民洲舊巴子别都也華陽記曰巴子雖都江平州又治平都即此處也有平都縣為巴郡之𨽻邑矣縣有天師治兼建佛寺甚清靈縣有市肆四日一㑹江水又逕虎鬚灘忠州西二里有石梁亘三十餘丈横絶江中俗呼為倒鬚灘即此灘也灘水廣大夏斷行旅江水又東逕臨江縣南今為忠州治及墊江縣王莽之鹽江縣也漢志作莽曰監江華陽記曰縣在枳東四百里東接朐忍縣有鹽官自縣北入鹽井溪有鹽井營户㳂注溪井水此句疑有譌誤朱本云當作注鹽井溪水江水又東得黄華水口江浦也左逕石城南庾仲雍曰臨江至石城黄華口一百里又東至平洲洲上多居民又東逕壤塗而歴和灘又東逕界壇是地巴東之西界益州之東界故得是名也又東過魚復縣南今為䕫州府奉節縣夷水出焉江水又東右得將龜溪口華陽記曰朐忍縣出靈龜咸熙元年獻龜於相府言出自此溪也江水又東南㑹北集渠按注有二溪水則此當作江水又東㑹南北集渠二溪水出涪陵縣界謂之于陽溪北流逕巴東郡之南浦僑縣西巴東郡今夔州府治及諸屬縣南浦今䕫州府萬縣溪夾側鹽井三口相去各數十步以木為桶徑五尺修煮不絶水北北流注于江水字上當有溪字下北字衍文謂之南集渠口亦曰于陽溪口北水出新浦縣北髙梁山新浦縣劉宋時置唐屬開州宋省入開江縣今為開縣故城在縣境髙梁山在今梁山縣北二十里分溪南水一作流逕其縣西又南一百里入朐忍縣南入于江謂之北集渠口别名班口又曰分水口朐忍尉治此江水又右逕池溪口蓋江汜決入也江水又東逕右龍右龍字疑誤按明一統志䕫州府有龍􅆃灘在府城東三里江中有石長數百丈若龍􅆃故名此右字疑當作石水至博陽二村之間有盤石廣四百丈長六里而復殆于此句疑有譌脫遂不可讀岨塞江川夏没冬出基亘通渚又東逕羊腸虎臂灘楊亮為益州至此舟覆懲其波瀾蜀人至今猶名之為使君灘益州下疑漏刺史二字使君灘在今夷陵州西一百一十里江水又東彭水注之水出巴渠羣獠中東南流逕漢豐縣東今開縣乃漢豐縣地漢末析朐忍縣置屬巴東郡清水注之水導源出西北巴渠縣東北巴嶺南獠中即巴渠水也今䕫州府達縣東有巴渠廢縣本魏石鼓縣唐時柝置非漢之巴渠也漢之巴渠乃今保寧府及諸縣地西南流至其縣又西入峽檀井溪水出焉又西過山至漢豐縣東而西注彭溪謂之清水口彭溪又入逕朐忍縣西六十里南流注于江謂之彭溪口江水又東右逕朐忍縣故城南漢朐忍縣屬巴郡今䕫州府雲陽萬縣是也故城在雲陽縣西六十里常璩曰縣在巴東郡西二百九十里縣治故城跨其山阪南臨大江之南岸有方山山形方陗枕側江濆江水又東逕瞿巫灘即下瞿灘也又謂之博望灘左則湯溪水注之水源出縣北六百餘里上庸界南流歴其縣翼帶鹽井一百所巴川資以自給粒大者方寸中央隆起形如張傘故因名之曰傘子鹽有不成者形亦必方異于常鹽矣王隱晉書地道記曰入湯口四十三里有石煮以為鹽石大者如升小者如拳煮之水竭鹽成蓋蜀火井之倫水火相得乃佳矣湯溪下與檀溪水合上承巴渠水巴渠南歴檀井溪之檀井水下入湯水湯水又南入于江名曰湯口江水又逕東陽灘禹貢錐指引作東逕陽灘但玩酈注引常璩云云則當從原本為是江上有破石故亦謂之破石灘苟延光没處也朱謀㙔曰茍延光未詳呉本改作荀恐亦無據常璩曰水道有東陽下瞿數灘山有大小石城靈壽木及橘圃也故地理志曰縣有橘官有民市漢志朐忍縣下有橘官鹽官今云有民市未詳江水又逕魚復縣之故陵胡引又下有東字漢志魚復屬巴郡今為奉節縣故陵在縣西接雲陽縣界舊郡治故陵溪西二里故陵村溪即永谷也地多木𤓰樹有子大如甒白黄實甚芬香爾雅之所謂楙也江水又東為落牛灘逕故陵北江側有六大墳庾仲雍曰楚都丹陽所塟亦猶枳之巴陵矣故以故陵為名也有魚復尉戍此江之左岸有巴鄉村村人善醸故俗稱巴鄉清郡出名酒村側有溪溪中多靈夀木中有魚其頭似羊豐肉少骨美于餘魚溪水伏流逕平頭山内通南浦故縣陂湖其地平曠有湖澤中有菱芡鯽雁不異外江凡此等物皆入峽所無地宻蠻惡不可輕至江水又右逕夜清而東歴朝陽道口有縣治治下有市十日一㑹江水又東左逕新市里南常璩曰巴舊立市於江上今新市里是也江水又東右合陽元水口水口出陽縣陽縣上疑脫一字西南髙陽山東東北流逕其縣南東北流丙水注之水發縣東栢枝山山下有丙穴穴方數丈中有嘉魚常以春末遊渚冬初入穴抑亦褒漢丙穴之類也明一統志栢枝山在䕫州府梁山縣南一十里下有丙穴出嘉魚北蜀都賦嘉魚出於丙穴注云丙穴在漢中沔陽縣有魚穴二所常以三月取之任豫益州記云嘉魚之鱗似鱒蜀人謂之拙魚從石孔隨泉出大者五六尺明一統志漢中府有丙水在沔縣北八十里源出褒城縣西北牛頭山經丙穴而過有嘉魚穴又䕫州府丙穴在達縣東北凡十穴皆有嘉魚春社前魚即出穴秋社即歸其出也止于巴渠龍􅆃灘首有黒㸃謂照應星象相感而成長身細鱗肉白如玉其味鹹食鹽泉也其水北流入髙陽溪溪水又東北流注于江謂之陽元水口江水又東逕南鄉峽在今䕫州府城西五十里東逕永安宫永安縣即今䕫州府治奉節縣宫在卧龍山下劉備終於此諸葛亮受遺處也其間平地可二十許里江山逈濶入峽所無城周十餘里背山面江頽墉四毁荆棘成林左右民多墾其中白帝城在府治東公孫述據蜀自稱白帝更號魚復曰白帝城蜀先主為陸遜所敗還至白帝改魚復曰永安宫居之明年寢疾而崩江水又東逕諸葛亮圖壘南石磧平曠望兼川陸有亮所造八陣圖東跨故壘皆累細石為之自壘西去聚石八行行間相去二丈因曰八陣既成自今行師庶不覆敗皆圖兵勢行藏之權自後深識者所不能了今夏水漂蕩嵗月消損髙處可二三尺下處磨滅殆盡明一統志八陣圖在䕫州府城南其陣聚細石為之各髙五尺皆布列相當中間相去九尺正中間南北巷悉方廣五尺各六十四聚或為人散亂及為夏水所没水退復如故方成都圖經云武侯之八陣有三在䕫者六十有四陣法也嘉話録王武子曽為䕫州之西市俯臨江岸沙石下看諸葛公八陣圖箕張翼舒鵞形鶴勢象石分布宛然尚存峽水大時巴蜀雪消之際大樹十圍枯槎百丈破磑巨石隨波塞川而下水與岸齊雷奔山裂聚石為堆者斷可知也及乎水落川平萬物皆失故態惟陣圖小石之堆不標聚行列依然如是者垂六七百年陶灑推激迨今動劉禹錫曰是諸葛公誠明一心為先主効死况此法出六韜是太公上智之材所搆自有此法惟孔明行之所以神明保持一定而不可改也桓温征蜀過此布常山蛇陣遂勒銘曰望古識其真臨源愛往迹恐君遺事節聊下南山石杜子美八陣圖詩曰功蓋三分國名成八陣圖江流石不轉遺恨失吞呉江水又東逕赤岬西赤岬一名赤甲在䕫州府城東七里不生樹木土石皆赤如人袒臂故曰赤甲或云漢人常取巴人為赤甲軍因名是公孫述所造因山據勢周迴七里一百四十步東髙二百丈西北髙一千丈南連基白帝山甚髙大不生樹木其石悉赤土人云如人袒胛故謂之赤岬山淮南子曰傍偟于山岬之旁注曰岬山脅也郭仲産曰斯名將因此而興矣江水又東逕魚復縣故城南魚復故城在今奉節縣北三里赤甲城是也白帝山在縣元和志云即州城所據與赤甲山相接故魚國也春秋左𫝊文公十六年庸與羣蠻叛楚莊王伐之七遇皆北惟禆鯈魚人逐之是也地理志江闗都尉治公孫述名之為白帝取其王巴蜀章武二年劉偹為呉所破改白帝為永安巴東郡治也漢獻帝初平元年分巴為三郡說見前以魚復為固陵郡趙𦙍當作蹇𦙍見華陽國志訴劉璋改為巴東郡治白帝山城周回二百八十步北縁馬嶺接赤甲山其間平處南北相去八十五丈東西十七丈又東傍東瀼溪即以為隍西南臨大江闞之眩目方輿勝覽大瀼水在奉節縣入蜀記曰土人謂山間之流通江者曰瀼寰宇記䕫州大昌縣西有千頃池水分三道一道南流為奉節縣西瀼水明一統志大瀼水在䕫州府城東自達縣萬頃池發源經此流入大江東瀼水在府城東一十里公孫述於東濱墾田號東屯惟馬嶺小差委迤猶斬為路羊腸數四然後得上益州刺史鮑陋鎮此為譙道福所圍城裏無泉乃南開水門鑿石為函道上施木天公直下至江中有似猨臂相牽引汲然後得水水門之西江中有孤石為淫預石冬出水二十餘丈夏則没亦有裁處矣胡引作裁出矣寰宇記灔澦堆周圍二十丈在州西南二百步蜀江中心瞿塘峽口李膺益州記云灔澦堆夏水漲没數十丈其狀如馬舟人不敢進又曰猶豫言舟子取途不決故猶預也樂府作淫豫其歌曰淫豫大如馬瞿塘不可下明一統志灔澦堆在瞿塘峽口江心突兀而出諺云灔澦大如象瞿塘不可上灔澦大如馬瞿塘不可下峽人以此為水候縣有夷溪即很山清江也經所謂夷水出焉江水又東逕廣溪峽斯乃三峽之首也其間三十里頽巖倚木厥勢殆交北岸山上有神淵淵北有白鹽崖髙可千餘丈俯臨神淵土人見其髙白故因名之寰宇記白鹽山在州城澗東山半有龍池方輿勝覽在城東七十里崖壁五十餘里其色炳燿狀若白鹽荆州記曰三峽之首北岸有白鹽峯峯下有黄龍灘水最急沿溯所忌明一統志白鹽山在䕫州府城東十七里崖壁髙峻色白若銀禹貢錐指白鹽山在奉節縣東隔江十里又東有黄龍灘虎鬚灘天旱燃木崖上推其灰燼下穢淵中尋則降雨常璩曰縣有山此下原本譌以三十一卷淯水注并㶏水注三百六十六字錯簡於此今從朱本改正澤水神旱時鳴鼓請雨則必應嘉澤蜀都賦所謂應鳴鼓而興雨也峽中有瞿塘黄龕胡引作龍二灘夏水迴復沿泝所忌瞿塘灘上有神廟尤至靈騐刺史二千石逕過皆不得鳴角伐鼓商旅上水恐觸石有聲乃以布褁篙足今則不能爾猶饗薦不輟寰宇記瞿塘在䕫州東一里古西陵峽也連崖千丈奔流電激舟人為之恐懼方輿勝覽瞿塘乃三峽之門兩崖對峙中貫長江望之如門灔澦灘當其口三峽者巫峽歸峽西陵峽也此峽多猿猿不生北岸非唯一處或有取之放著北山中初不聞聲將同狢獸渡汶而不生矣周禮考工記曰橘逾淮而化枳鸜鵒不逾濟貉逾汶則死此地氣然也其峽蓋自昔禹鑿以通江郭景純所謂巴東之峽夏后疏鑿者又東出江闗入南郡界江闗舊在赤甲城後移在江南岸對白帝城今在魚復縣南江水自闗東逕弱闗扞闗扞闗在今長揚縣南扞闗廪君浮夷水所置也後漢書南蠻𫝊巴郡南郡蠻本有五姓曰巴氏樊氏曋氏相氏鄭氏皆出於武落鍾離山其山有赤黒二穴巴氏子生於赤穴四姓之子皆生黒穴未有君長俱事鬼神乃共擲劍于石穴約能中者奉以為君巴氏子務相獨中之又令各乗土船約能浮者當以為君餘姓悉沈惟務相獨浮因共立立之是為廩君乃乗土船從夷水至鹽陽鹽水有神女謂廩君曰此地廣大魚鹽所出願留共居廩君不許鹽神暮輙來取宿旦即化化為蟲與諸蟲羣飛掩敝日光天地晦㝠積十餘日廩君思其便因射殺之天乃開明廩君於是君乎夷城四姓皆臣之弱闗在建平歸界歸今為荆州府歸州昔巴楚數相攻伐藉險置闗以相防捍秦兼天下置立南郡自巫山皆其城也當作域南郡今為荆州府又東過巫縣南今為荆州府巴東縣及䕫州府巫山大昌等縣其故城在巫山縣東北名巫子城鹽水從縣東南流注之江水又東烏飛水注之水出天門郡漊中縣界天門郡呉置今為湖廣澧州及石門縣北流逕建平郡沙渠縣南又北流逕巫縣南西北歴山道三百七十里注于江謂之烏飛口水經注集釋訂訛卷三十三
