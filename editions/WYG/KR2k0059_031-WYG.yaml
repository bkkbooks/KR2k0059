body:
  text: 水經注集釋訂訛卷三十一歸安沈炳巽撰滍水淯水㶏水灈水瀙水潕水溳水滍音峙又音雉水南陽魯陽縣今為南陽府魯山縣西之堯山滍水源出魯山流至葉縣入沙河堯之末孫劉累以龍食帝孔甲孔甲又求之不得累懼而遷于魯縣立堯祠於西山謂之堯山史記夏本紀陶唐既衰其後有劉累學擾龍于豢龍氏事孔甲孔甲賜之姓曰御龍氏受豕韋之後龍一雌死以食夏后夏后使求懼而逃去故張衡南都賦曰奉先帝而追孝立唐祠於堯山堯山在太和川太和城東北今在魯山縣西滍水出焉張衡南都賦曰其川瀆則􅘷澧􅖐濜發源巖穴布濩漫汗漭沆洋溢朱本作括緫激急趣箭馳風疾者也􅘷水又厯太和川東逕小和川又東温泉水注之水出北山七泉奇發炎熱特甚闞駰曰縣有湯水可以療疾矣湯側又有寒泉焉地勢不殊而炎凉異致雖隆火盛日肅若氷谷矣渾流同溪南流注􅘷水又東逕胡木山東流又㑹温泉口水出北山阜炎勢竒毒痾疾之徒無能澡其衡當作衝漂救養白氏六帖引作癢者咸去湯十許步别池然後可入湯側有石銘云皇女湯可以療萬疾者也故杜彥達云然如沸湯可以熟米飯疑作飲之愈百病道士清身沐浴一日三飯多少自在四十日後身中萬病愈三蟲死學道遭難逢危終無悔心可以牢神存志即南都賦所謂湯谷湧其後者也然宛縣今南陽府治南陽縣有紫山山東有一水東西十五里南北二百步湛然冲滿無所通㑹冬夏常温世亦謂之湯谷也盛𢎞之荆州記南陽郡城北有紫山紫山東有一水無所㑹通冬夏常温因名湯谷非魯陽及南陽之縣故也張平子廣言土地所苞明非此矣􅘷水又東房陽川水注之水出南陽雉縣西雉縣故城在南陽府城北八十里房陽川北流注于􅘷滍水之北有積石焉世謂女靈山其山平地介立不連岡以成髙峻石孤峙不託勢以自逺四靣壁絶極能靈舉逺望亭亭狀若單楹挿霄矣北面有如頽落劣疑訛得道疑是通字步好事者時有扳陟耳􅘷水又與波水合水出霍陽西川大嶺東谷俗謂之歇馬嶺川曰廣陽川非也即應劭所謂孤山波水所出也馬融廣成頌曰浸以波溠其水又南逕蠻城下葢蠻别邑也俗謂之麻城非也波水又南分三川于白亭東而俱南入滍水滍水自下兼波水之通稱也是故闞駰有東北至定陵入汝之文滍水又東逕魯陽縣故城南城即劉累之故邑也有魯縣居其陽故因名焉王莽之魯山也昔在于楚文子守之與韓搆難戰有返景之誠淮南子魯陽子與韓搆難戰酣日暮援戈而麾之日為之返三舍内有南陽都鄉正衛為牌疑訛朱本作碑􅘷水右合魯陽闗水水出魯陽闗外分頭山横嶺下夾谷東北出入􅘷􅘷水又東北合牛蘭水水發縣北牛蘭山東南逕魯陽城東水側有漢陽侯焦立碑牛蘭水又東南與柏樹溪水合水出魯山北硤谷中東南流逕魯山西明一統志魯山在魯山縣東一百八十里一名露山髙出羣山為一邑巨鎮因以名縣而南合牛蘭水又東南逕魯山南闞駰曰魯陽縣今其地魯山是也水南注于滍􅘷水東逕應城南故應鄉也應侯之國詩所謂應侯順德者也彭水注之俗謂之小􅘷水水出魯陽縣南彭山蟻塢東麓北流逕彭山西下有彭山廟廟前有彭山碑漢桓帝元嘉三年杜仲長立彭水逕其西北漢安邑長尹儉墓東冢西有石廟廟前有両石闕闕東有碑闕南有二師子相對南有石碣二枚石柱西南有両石羊中平四年立彭水又東北流直應城南而入􅘷􅘷水又左合橋水水出魯陽縣北恃東疑訛宋本作北恃山東南逕應山北又南逕應城西地理志曰故文城縣之應鄉也周武王封其弟為侯國應劭曰韓詩外傳稱周成王與弟以桐葉為圭曰吾以封汝周公曰天子無戯言王乃應時而對故曰應侯鄉亦曰應鄉按吕氏春秋云成王以桐葉為圭以封叔虞非應侯也汲郡古文殷時已有應國非成王矣戰國范睢所封邑也謂之應水􅘷水又東逕犨縣故城北左傳昭公元年冬楚公子圍使伯州犁城犨是也出于魚齒山下春秋襄公十八年楚伐鄭次于魚陵渉于魚齒之下甚雨楚師多凍徒役幾盡晉人聞有楚師師曠曰不害吾驟歌北風又歌南風南風不兢多死聲楚必無功矣所渉即􅘷水也水南有漢中常侍長樂太僕吉侯苞冢冢前有碑基疑作墓西枕罡城開四門門有両石獸墳傾墓毁碑獸淪移人有掘出一獸猶全不破甚髙壯頭去地減一丈許作制甚工左膊上刻作辟邪字門表壍上疑作土起石橋即時不毁其碑云六帝四后是諮是諏葢仕自安帝沒于桓后于時閽閹擅權五侯暴世割剥公私以事生死夫封者表有德碑者頌有功自非此徒何用許為石至千春不若速朽苞墓萬古秪彰誚辱嗚呼愚亦甚矣滍水又東犨水注之俗謂之秋水非也水有二源東源出其縣西南踐犢山東崖下水方五十許歩不測其深東北流逕犨縣南又東北屈逕其縣東而北合西流水西源出縣西南頗山北阜下東北逕犨城西在今魯山縣東南又屈逕其縣北東合二水亂流北注于滍漢髙祖入闗破南陽太守吕齮于犨東即于是地滍水之陰也􅘷水又東南逕昆陽縣故城昆陽城在葉縣西南北昔漢光武與王尋王邑戰于昆陽敗之走者相騰踐奔殪百餘里㑹大雨如注􅘷川盛溢虎豹皆股戰士卒爭赴溺死者以萬數水為不流王邑嚴尤陳茂輕騎皆乗尸而渡矣東北過潁川定陵縣西北又東過堰縣南東入于汝滍水東逕西不羮亭南亭北背汝水于定陵城北東入汝堰縣在南不得過按漢志潁川有郾縣此云堰誤鄢縣今屬開封府許州淯水出𢎞農盧氏縣今屬河南府攻離山東南過南陽西鄂縣西北又東過宛縣南淯水在南陽府城東三里俗名曰白河其源自嵩縣雙鷄嶺東南流經南陽新野㑹梅溪洱灌湍諸水留山黄渠栗鴉泗潦刁等河與泌水合流南至襄陽入漢江淯水𨗳源東流逕酈縣故城北郭仲產曰酈縣故城南在今内鄉縣東有南酈北酈二城在攻離山東酈舊縣也三倉曰樊鄧酈酈有二城北酈也漢祖入闗下淅酈即此縣也淯水又東南流雉縣之雉衡山東逕百章郭北又東魯陽闗水注之水出魯陽縣南分水嶺南水自嶺南流北水從嶺北注故世俗謂此嶺為分頭也其水南流逕魯陽闗左右連山挿漢秀木干雲是以張景陽詩云朝登魯陽闗峽路峭且深亦司馬芝與母遇賊處也魏志司馬芝字子華河内温人也避亂荆州于魯陽山遇賊同行者皆棄老弱走芝獨坐守老母賊至以刃臨之芝叩頭曰母老惟在諸君賊曰此孝子也殺之不義遂得免關水厯雉衡山西南逕皇后城西建武元年世祖遣侍中傅俊持節迎光烈皇后于淯陽俊發兵三百餘人宿衛皇后道路歸京師葢稅舍所在故城得其名矣山有石室甚飾潔相傳名皇后浴室又所幸也闗水又西南逕雉縣故城南昔秦文公之世有陽伯者逢二童下有訛脱曰舀曰彼両童二雉也得雌者覇雄者王二童飜飛化為雙雉光武獲雉于此山以為中興之祥故置縣以名焉按晉太康地志云秦文公時陳倉人獵得獸若彘不知名牽以獻之逢二童子童子曰此名為媦常在地中食死人腦即欲殺之拍捶其首媦亦語曰二童子名陳寳得雄者王得雌者覇陳倉人舍媦逐二童子化為雉雌上陳倉北陂為石秦祠之名陳寳秦欲表其符故以名縣又搜神記云其雄者飛至南陽其後光武起于南陽皆如其言也據此則雉縣置于秦時非光武以為中興之祥故置縣也况前漢地理志南陽郡已有雉縣則非始于光武明矣闗水又屈而東南流注于淯淯水又東南流逕博望縣西北故城東在今南陽府東北七十里郭仲産曰郡東北一百二里漢武帝置校尉張騫隨大將軍衛青西征為軍前𨗳相望水草得以不乏元光六年封騫為侯國地理志曰南陽有博望縣王莽改之曰宜樂也淯水又東南逕西鄂故城東應劭曰江夏有鄂故加西也昔劉表之攻杜子緒于西鄂也功曹伯孝長聞戰鼓之音懼而閉户蒙被自覆漸登城而觀言勇可習也九州春秋劉表攻西州州長杜子緒守拒時柏季長在城中聞兵勢恐入室牽被覆頭攻半日稍出面明日側立而聽一日出問消息三四日負楯親鬥謂子緒曰勇可習者也淯水又南洱水注之水出𢎞農郡盧氏縣之熊耳山東南逕酈縣北東南逕方陽城北漢哀帝四年封南陽太守孫寵為侯國俗謂之房陽川又逕西鄂縣南水北有張平子墓在今南陽縣界東北石橋堡崔瑗碑㫁石猶存墓之東側墳有平子碑文字悉是古文篆額是崔瑗之辭盛𢎞之郭仲產並云夏侯孝若為郡薄其文復刋碑陰為銘然碑隂二名乃是崔子玊及陳翕耳而非孝若悉是𨽻字二首並存甞無毀壊又言墓次有二碑今唯見一碑或是余夏逕驛途疲而莫究矣水南道側有二石樓相去六七丈雙跱齊竦髙可丈七八柱圎圍二丈有餘石質青緑光可以鑒上鑾櫨承拱雕簷四柱窮巧綺刻妙絶人工題言蜀郡太守姓王字子雅南陽西鄂人有三女無男而家累千金父沒當𦵏女自相謂曰先君生我姊妹無男兄弟今當安神𤣥宅翳靈后土㝠㝠絶後何以彰吾君之德各出錢五百萬一女築墓二女建樓以表孝思銘云墓樓下有脱誤東平林不近墳墓而不能測其處所矣洱水又東南流注于淯水世謂之肄水肄洱聲相近非也地理志曰熊耳之山出三水洱水其一焉東南至魯陽入沔是也淯水又南逕預山東山上有神廟俗名之為獨山也山南有魏車騎将軍黄權夫妻二塜地道潛通其冢前有四碑其二魏明帝立二是其子及臣吏所樹者也淯水又西南逕史定伯碑南又西為𤓰里津水上有三梁謂之𤓰里渡自宛道途東出堵陽而道方城建武三年世祖自堵陽西入破虜将軍劉奉按後漢書當作鄧奉怨漢掠新野拒瓜里上親搏戰追至夕陽聚遂斬奉按後漢書郡國志南陽郡有夕陽聚註云賈復從擊鄧奉追至夕陽聚郡國志所謂宛有瓜里野津夕陽聚者也阻橋即桓温故壘處温以昇平五年與范汪衆軍北討所營淯水朱曰按晋書穆帝本紀桓温遣諸将討河北在永和五年而范汪傳云桓温北伐令汪率文武出梁國以失期免為庶人卒于家本紀范汪之廢則在升平三年與此注互異又西南逕晋蜀郡太守鄧義山墓南又南逕宛城東其地故申伯之郡楚文王滅申以為縣也秦昭襄王使白起為将伐楚取郢即以此地為南陽郡改縣曰宛王莽更名郡曰前隊縣曰南陽劉善曰在中國之南而居陽地故以為名大城西南隅即古宛城也荆州刺史治故亦謂之荆州城今南陽郡治大城其東城城内有舊殿基周二百歩髙八尺陛階皆砌以青石大城西北隅有基周一百步髙五丈葢更始所起也地疑作城西三里有古䑓髙三丈餘魏文帝黄初中南廵行所築也淯水又屈而逕其縣南故南都賦所言淯水蕩其胸者也王莽地皇二年朱鮪等共于城南㑹諸将設壇燔燎立聖公為天子于斯水上世語曰張繡反公于疑作與戰敗子昂不能騎進馬于公而昂遇害魏書曰公征至宛臨淯水祀亡将士歔欷流涕衆皆哀慟淯水又南梅溪水注之水出縣北紫山南逕百里奚故宅奚宛人也于秦為賢大夫所謂迷虞智秦者也梅溪又逕宛西吕城東史記曰吕尚先祖為四岳佐禹治水有功虞夏之際受封于吕故因氏為吕尚也徐廣史記音義曰吕在宛縣髙后四年封昆弟子吕恕為吕城侯疑即此也按史記吕后紀四年封吕忿為吕城侯此云恕誤又按新蔡縣有大吕小吕亭而未知所是也梅溪又南逕杜衍縣東故城在西漢髙帝七年封郎中王翳為侯國王莽更之曰閏衍矣土地墊下湍溪是注古人于安衆堨之令逰水是瀦謂之安衆港世祖建武三年上自宛遣潁陽侯祭遵西擊鄧奉弟衆按後漢書祭遵傳云南撃鄧奉弟終于杜衍破之今云衆恐誤破之于杜衍進兵湼陽者也梅溪又南謂之石橋水又謂之汝溪之疑訛流而左注淯水淯水之南又有南就聚郡國志所謂南陽宛縣有南就聚者也郭仲産言宛城南三十里有一城甚卑小相承名三公城漢時鄧禹等歸鄉餞離處也盛𢎞之著荆州記以為三公置余按淯水左右舊有二澨所謂南澨北澨者水側之濆聚在淯陽之東北考古推地則近矣城側有范蠡祠蠡宛人祠即故宅也後漢末有范曾字子閔為大将軍司馬討黄巾賊至此祠為蠡立碑文勒可尋夏侯湛之為南陽又為立廟焉城東有大将軍何進故宅城西有孔嵩舊居嵩字仲山宛人與山陽范式有㫁金契貧無養親賃為阿阿下脱里字街卒遣迎式式下車把臂曰子懐道卒伍不亦痛乎嵩曰侯嬴賤役晨門卑下之位古人所不恥何痛之有故其讃曰仲山通達卷舒無方屈身厮役挺秀含芳後漢書獨行傳南陽孔嵩與范式友善家貧親老乃變姓名傭為新野阿街里卒式為荆州刺史行部至新野而嵩為𨗳騎迎式式見而識之呼嵩把臂謂曰子非孔仲山邪對之嘆息語及平生曰昔與子俱曳長裾逰息帝學吾䝉國恩致位牧伯而子懐道隐身處于卒伍不亦惜乎嵩曰侯嬴長守于賤業晨門肆志于抱闗子欲居九夷不患其陋貧者士之宜豈為鄙哉較此稍詳故偹録之又屈南過淯陽縣東淯水又南入縣逕小長安司馬彪郡國志曰縣有小長安聚謝沈漢書稱光武攻淯陽不下引兵欲攻宛至小長安與甄阜戰敗于此淯水又西南逕其縣故城南桓帝延熹七年封鄧康為侯國按後漢書后紀桓帝鄧皇后永康中進入掖庭為采女封兄鄧演為南頓侯演卒子康嗣延熹二年立為皇后四年封后母宣為昆陽更封康為泚陽侯宣卒以康弟統襲封昆陽侯又封統弟秉為淯陽侯今云康封淯陽誤縣故南陽典農治後以為淯陽郡省郡復縣避晋簡文諱更名云陽焉淯水又逕安樂郡北漢桓帝建和六年按廣本傳是建和元年封封司徒胡廣為淯陽縣安樂鄉侯今於其國立樂宅戍郭仲産襄陽記曰南陽城南九十里有晉尚書今樂廣故宅廣字彦輔也善清言見重當時成都王廣女壻長沙王猜之廣曰寜以一女而易五男猶疑之終以憂殞其故居今置戍因以為名晋書樂廣傳云成都王頴廣之壻也又南過新野縣西原本訛以此後經文西過鄧縣東及㶏水經文一叚錯簡于此今刪去淯水又南入新野縣今屬南陽府枝津分泒東南出苞隰衍注右積為陂東西九里南北一十五里陂水所溉咸為良沃淯水又南與湍水㑹又南逕新野縣故城西世祖之敗小長安也姊元遇害上即位感悼姊沒追諡元為新野節義長公主即此邑也晋咸寜二年封大司馬扶風武王少子歆為新野郡公割南陽五屬棘陽蔡陽穰鄧山都封為王晋書新野王歆傳歆字𢎞舒武帝太康中封新野縣公惠帝永寕元年趙王倫簒帝位齊王冏舉義兵歆率所領𨗳冏以勲進封新野郡王據傳則歆之封新野公在太康中非咸寕二年其進封為王乃逆倫既誅之後今注云云似于封公之後即進封為王矣故偹録傳文以證之文舒王昶之字見魏志更立中隔西即郡治東則民居城西傍淯水淯水又東與朝水合水出西北赤石山而東南逕冠軍縣界故城在今鄧州界地名沙渠又東南逕穰縣故城南穰縣今為南陽府鄧州治故城在州東南二里楚别邑也秦拔鄢郢即以為縣秦昭王封相魏冉為侯邑王莽更名曰豐穰也按漢志作莽曰農穰魏荆州刺史治朝水又東南分為二水一水枝分東北為樊氏陂陂東西十里南北五里俗謂之凡亭陂陂東有樊氏故宅樊氏既滅庾氏取其陂故喭曰陂汪汪下田良樊子失業庾公昌昔在晋世杜預繼信臣之業復六門之陂遏六門之水下結二十九陂諸陂散流咸入朝水事見六門碑六門既陂諸陂遂㫁朝水又東逕朝陽縣故城北而東南注于淯水淯水又東南與棘水合水上承赭水按前漢地理志後漢郡國志南陽郡堵陽縣俱作堵無作赭者又光武本紀建武二年征南大将軍岑彭率八將軍討鄧奉于堵鄉又朱祐傳建武三年更封堵陽侯亦俱是堵則此注之赭俱當作堵赭水出棘陽縣北數源並發南流逕小赭鄉謂之小赭水世祖建武二年成安侯臧宫從撃上赭也東源方七八歩騰湧若沸故世名之騰沸水南流逕于赭鄉謂之赭水建武二年祭遵引兵南擊董訴于赭鄉以水氏鄉故有赭陽之名也地理志曰縣有赭水王莽曰陽城也漢哀帝改為順陽建武二年按傳是建武三年封更封安陽侯朱祐為赭陽侯赭水縣堨以為陂東西夾岡水相去五六里古今㫁罔上下疑有訛字両舌都何氏云都字不誤史記夏本紀大野既都孔安國曰水所停曰都水潭漲朱本引孫汝澄云古今㫁罔両舌當作左右㫁岡両舌都水當作瀦水岡外下垂陂陀而出者謂之舌葢削陂陀之土接水連岡築堨止水以成潭漲也云云似屬牽强亦不足憑南北一十餘里水㳏南潰下注為灣灣分為二西為赭水東為滎源赭水參差流結兩湖故有東陂西陂之名二陂所𨗳俱水枝分東南至㑹口入泚是以地理志云泚水赭水皆言入蔡互受通稱故也二湖流注合為黄水謂所受焉逕棘陽縣之黄淳聚又謂之為黄淳水者也故謝沈漢書甄阜等敗光武于小長安東乗勝南渡黄淳水前營皆阻両川謂臨泚水絶後橋示無還心漢兵擊之二軍潰溺死黃淳水者二萬人又南逕棘陽縣故城西應劭曰縣在棘水之陽是知斯水為棘水也漢髙帝七年封莊得臣為侯國按史記年表棘陽莊侯杜得臣此云莊得臣誤後漢兵超疑訛脱當是起字擊唐子鄉一作卿殺湖陽尉進拔棘陽鄧晨将賔客㑹光武于此縣也棘水又南逕新野縣厯黄郵聚世祖建武三年傅俊岑彭進擊秦豐先拔黄郵者也謂之黄郵水大司馬吴漢破秦豐于斯水之上其聚落悉為蠻居猶名之為黄郵蠻棘水自新野縣東而南流入于淯水謂之為力口也棘力聲相近當為棘口也又是方俗之音故字從讀變若世以棘子木為力子之木此下二十餘行錯簡在三十三卷江水篇内今據宋本改正也淯水又東南逕士林東戍名也戍有邸閣水左有豫章大陂下灌良疇三千許頃也西過鄧縣東南入于沔縣故鄧侯吾離之國也楚文王滅之秦以為縣清疑作淯水右合濁水俗謂之弱溝水上承白水于朝陽縣東南流逕鄧縣故城南習鑿齒襄陽記曰楚王至鄧之濁水去襄陽二十里即此水也濁水又東逕鄧塞者即鄧城東南小山也先後名之為鄧塞昔孫文臺破黄祖于其下濁水東流注于淯淯水又南逕鄧塞東又逕鄾城今鄧州地東古鄾子國也葢鄧之南鄙也昔巴子請楚與鄧為好鄾人奪其幣即是邑也司馬彪以為鄧之鄾聚矣㶏水出㶏強縣今河南開封汝南地南澤中東入潁㶏水出潁川陽城縣故城在今汝南府界少室山東流注于潁水而亂流東南逕臨頴縣今同屬開封府西北小㶏水出焉東逕臨潁縣故城北㶏水又東逕㶏陽城北又東逕㶏强縣故城南建武元年按本傳是建武二年封世祖封揚化将軍堅鐔為侯國㶏水東為陶樞陂余案㶏陽城在㶏水南然則此城正應為㶏陰城而有㶏陽之名者明在南猶有㶏水故此城以陽為名矣潁水之南有二瀆其南瀆東南流行厯臨潁亭西東南入汝今無水也疑即㶏水之故瀆矣汝水于竒􅋕城兵朱本作西别東派時人謂以上二十餘行原本訛在三十三卷今改正之㶏水東北流枝瀆右出世謂之死汝也别汝又東北逕召陵城北在今開封府郾縣東四十里練溝出焉别汝又東汾溝出焉别汝又東逕征羌城北水南有汾陂俗音糞汾水自别汝東注而為此陂水積征羌城北四五里方三十里許瀆左合小㶏水水上承狼陂南流名曰鞏水清陵陂水自陂東注之東廻又謂之小㶏水而南流注于大㶏水大㶏水取稱葢藉㶏汾注而縂受巨目矣又東逕西華縣今屬開封府陳州故城南又東逕汝陽縣故城北東注于潁灈水出汝南吳房縣今為汝寜府遂平縣西北興山東過其縣北入于汝縣西北有堂溪城故房子國春秋定公五年吳王闔閭弟夫概奔楚封之于堂溪故曰吳房也漢髙帝八年封荘侯楊武為侯國建武中世祖封泗水王歙子軍為堂溪侯按後漢書宗室四王傳泗水王歙少子煇封堂溪侯今云軍誤山溪有白羊淵淵水舊出山羊漢武帝元封二年白羊出北淵畜牧者禱祀之俗禁拍手甞有羊出水野母驚抃一作仆自此絶焉淵水下合灈水灈水東逕灈陽縣故城西東流入瀙水亂流逕其縣南世祖建武元年封吳漢孫且為侯國後漢書吳漢傳建武二年封廣平侯子成嗣二十八年分漢封為三國成子旦為濯陽侯旦弟旴為筑陽侯成弟國為新蔡侯今云吳且誤元年亦誤其水又東入于汝水瀙水出潕陰縣漢志作舞陰今南陽府泌陽縣東上界山山海經謂之瀙水也郭景純言或曰視冝為瀙出箴山許慎云出中陽山漢志作中陰山皆山之殊目也而東與此水合水出潕陰縣草山宋本作旱山東北流注瀙瀙水又東北殺水出西南大熟一作孰之山東北流入于瀙瀙水又東淪水注之水出宣山南東流注瀙水山海經作出宣山東南流注瀙水瀙水又東得奥水口水西出奥山東入于瀙水也東過吳房縣南又東過灈陽縣南應劭曰灈水出吳房縣東入瀙縣之西北即兩川之交㑹也又東過上蔡縣南東入汝潕水出潕陰縣西北扶予山東過其縣南山海經曰朝歌之山潕水出焉東流于滎按山海經當作東南流注于滎經書扶予者其山之異名乎滎水上承赭水東流左與西遼水合又東東遼水注之俱𨗳北山而南流注于滎滎水又東北于潕陰縣北左㑹潕水之道稍西不出其縣南其故城在山之陽漢光武建武中封岑彭為侯國漢以為陽山縣魏武與張繡戰于宛馬名絶景為流矢所中公傷右臂引還潕陰即是地也城之東有馬仁陂郭仲産曰陂在泚陽縣縣下當有脱文五十里葢地百頃其所周溉田萬頃隨年變種境無儉歳陂水三周其隍故瀆自隍西南而㑹于泚潕水不得復逕其南也且邑號潕陰故無出南之理出南則為陽也非直不究又不思矣潕水又東北河水注之按漢書地理志南陽郡雉縣注云衡山澧水所出東至􅪧入汝此河水誤當作澧水水出雉衡東山南逕建城東建當為卷字讀誤耳郡國志云葉縣有卷城其水又東流入于潕潕水東北逕于東山西西流入潕潕水之左即黄城山也水出黄城山東北逕方城郡國志曰葉縣有方城郭仲産曰苦萊于東疑有訛脱之間有小城名方城東臨溪水尋此城致號之由當因山以表名地疑訛或作也當連上苦萊即黄城也按明一統志河南南陽府黄城山注云一名苦華此云苦萊未知孰是及于東通為方城矣世謂之方城山水東流注潕水故地理志曰南陽葉方城邑西有黄城山是長沮桀溺耦耕之所有東流水則子路問津處尸子曰楚狂接輿耕于方城葢于此也盛𢎞之云葉東界有故城始犨縣東至瀙水達泚陽界南北聮絡數百里號為方城一謂之長城云酈縣有故城一面未詳里數號為長城即此城之西隅其間相去六里御覽及宋本俱作六百里若南北雖無基築皆連山相接而漢水流其南故屈完答齊桓公云楚國方城以為城漢水以為池郡國志曰葉縣有長城曰方城指此城也潕水又東北厯舞陽縣故城南漢髙祖元年按表當是六年封樊噲為侯國也又東過西平縣北今屬汝寜府縣故栢國也春秋左傳所謂江黄道栢方睦于齊也漢曰西平其西吕墟即西陵亭也西陵平夷故曰西平漢宣帝甘露三年封丞相于定國為侯國王莽更之曰新亭晋太康地理志曰縣有龍泉水可以砥礪刀劔特堅利故有堅白之論矣是以龍泉之劒為楚寳也縣出名金古有鐵官又東過郾縣南郾縣故城去此逺矣不得過又東過定頴縣北東入于汝漢安帝永初二年分汝南郡之上蔡縣置定潁縣延光中以陽翟郭鎮之為尚書令封定潁侯即此邑也按後漢書郭躬傳躬弟子鎮延光中為尚書及中黄門孫程誅中常侍江京等而立濟隂王鎮率羽林士擊殺衛尉閻景以成大功遷尚書令封定潁侯則鎮之封乃順帝既立之後非安帝延光中也今云延光中為尚書令封定潁侯誤溳水出蔡陽縣今為湖廣襄陽府棗陽縣明一統志溳水在德安府西北源出陪尾山石巖下遶城西南隅東流入漢江俗稱府河溳水出縣東南大洪山山在隋郡之西南竟陵之東北槃基所跨廣圎一百餘里峯曰懸鈎處平懸疑作原衆阜之中為諸嶺之秀山下有石門夾鄣層峻巖髙皆數百許仭入石門又得鍾乳穴穴上素崖壁立非人跡所及穴中多鍾乳凝膏下垂望齊氷雪微津細液滴瀝不㫁幽穴潜逺行者不極窮深而穴内常有風勢疑訛一作亦疑訛火無能以經乆故也溳水出于其陰初流淺狹逺乃寛廣可以浮舟栰巨川矣時人以溳水所𨗳故亦謂之為溳山矣溳水東北流合石水石水出大洪山明一統志大洪山在德安府隨州城西一百二十里相傳為慈忍盧尊者道塲其山崛起一方巉然雲間四面陡險絶頂有大湖湖旁有龍鬥岩又有明聖泉流黄池仙女洞佛光殿諸勝東北流注于溳謂之小溳水而亂流東北逕上唐縣故城南本蔡陽之上唐鄉舊唐侯國春秋定公三年唐成公如楚有兩肅霜馬子常欲之不與止之三年唐人竊馬而獻原本訛壓之子常歸唐侯是也溳水又東均水注之水出洪山東北流逕土山北山上上下疑有訛字土山又東北流入于溳水溳水又屈而東南流東南逕隋縣西今為德安府隋州及應山等縣地縣故隋國矣春秋左傳所謂漢東之國隋為大者也楚滅之以為縣晋武太康中立為郡有溠水出縣西北黄山南逕㵐西縣西又東南㵐水入焉在隋州西北流入溳水㵐水出桐柏山之陽吕忱曰水在義陽㵐水東南逕㵐西縣西又東南流于溠溠水又東南逕隋縣故城西春秋魯荘公四年楚武王伐隋令鬪左傳作令尹祁莫敖屈重除道梁溠軍臨于隋謂此水也在隋州東南水側有㫁蛇丘隋侯出而見大蛇中㫁因舉而藥之故謂之㫁蛇丘後蛇銜明珠報德世謂之隋侯珠亦曰靈虵原本訛地珠髙誘淮南子注云隋侯見六蛇傷㫁以藥傅而塗之後蛇以大江中銜珠以報因曰隋侯之珠邱南有隋季良左傳作梁大夫池其水又南與義井水合水出隋城東南井泉甞湧溢而津注冬夏不異相承謂之義井下流合溠溠水又南流注于溳溳水又㑹于支水水源亦出大洪山而東流注于溳溳水又逕隋縣南隋城山北而東南注又南過江夏安陸縣西今屬德安府隋水出隋郡永陽縣東石龍山西北流南廻逕永陽縣西厯横尾山即禹貢之陪尾山也遼水又西南至安陸縣故城西故鄖城也因岡為墉峻不假築溳水又南逕石巖山北昔張昌作亂于其下籠綵鳯以惑衆晋太安二年鎮南将軍劉𢎞遣牙門皮初與張昌戰於清水昌敗追斬于江夏晋書劉𢎞傳太安中張昌作亂以𢎞為南蠻校尉荆州刺史率前将軍趙驤等討昌自方城至宛新野所向皆平遣牙門将皮初為督戰帥進㩀襄陽累戰破昌前後斬首數萬級昌懼而逃竄于下儁山𢎞遣軍討斬之即春秋左傳定公四年吳敗楚于柏舉從之及于清發葢疑訛當有脱溳水又東南流而右㑹富水水出竟陵郡新市縣東北大陽山水有二源也大富水出山之陽南流而左合小富水小富水出山之東而南逕三王城東前漢末王匡王鳯王常所屯故謂之三王城城中有故碑文字闕落不可復識其水屈而西南流右合大富水俗謂之大泌水也又西南流逕杜城西漢志江夏郡有雲杜縣疑漏雲字新市縣治也郡國志以為新市也中山有新市故此加南分安陸立縣又王匡中興初舉兵于縣號曰新市兵也富水又東南流于安陸界左合土山水世謂之章水水出土山南逕隨郡平林縣故城西俗謂之将陂城與新市接界故中興之始兵有新市平林之號又南流右入富水富水又東入于溳溳水又逕新城南永和五年晉大司馬桓温築溳水又㑹温水温水出竟陵之新陽縣東澤中口徑二丈五尺垠岸重沙端淨可愛靖以察之則淵泉如鏡聞人聲則揚湯奮發無所復見矣其􅉯可以燖雞洪瀏百餘歩冷若寒泉東南流注于溳水又右得潼水水出江夏郡之曲陵縣按漢志江夏郡有西陵無曲陵恐當作西陵為是西陵今為德安府雲夢縣西北潼山東南流逕其縣南縣治石潼故城城圓而不方東入安陸注于溳水又東南入于夏溳水又南分為二水東通灄水西入于沔謂之溳口也水經注集釋訂訛卷三十一
