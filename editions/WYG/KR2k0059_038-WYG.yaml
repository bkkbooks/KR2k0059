body:
  text: 水經注集釋訂訛卷三十八歸安沈炳巽撰資水漣水湘水灕水溱水資水岀零陵都梁縣路山都梁縣今為湖廣寶慶府武剛州資水在府城北源出州綏寧縣北合邵水資水出武陵郡無陽縣界唐糺山葢路山之别名也謂之大溪水東北逕邵陵郡武罡縣南縣分都梁之所置也縣左右二罡對峙重岨齊秀間可二里舊傳後漢伐五溪蠻蠻保此罡故曰武罡縣即其稱焉大溪逕建興縣南又逕都梁南漢武帝元朔五年為長沙定王子敬侯定之邑也縣西有小山山上有淳水宋本作渟水既清且淺其中悉生蘭草緑葉紫莖芳風藻川蘭馨逺馥俗謂蘭為都梁山因以號縣受名焉東北過夫夷縣今為武岡州及新寧縣其故城在州東北二百四十里夫水出縣西南零陵縣界少延山東北流逕扶陽縣南本零陵之夫夷縣也明一統志夫夷水在新寧縣南源出廣西全州界過此至邵陽㑹資水漢武帝元朔五年以封長沙定王子敬侯義之邑也夫水又東注邵陵水謂之邵陵浦口水也當作浦水口東北過邵陵縣之北今為寶慶府治縣治郡下南臨大溪水逕其北謂之邵陵水明一統志邵水在寳慶府城北源出邵陽縣龍山徑馬鞍山諸葛孔明廟下號相公潭深不可測流合資水魏咸熙二年呉寶鼎元年孫皓分零陵北部立邵陵郡於邵陵縣縣故邵陵也溪又東得髙平水口水出武陵郡沅陵縣首望山西南流髙平縣南又東入邵陵縣界南入於邵水邵水又東㑹雲泉水水出零陵永昌縣雲泉山西北流逕邵陵南縣故昭陽也漢志長沙國有昭陵縣此當作昭陵雲泉水又北注邵陵水謂之邵陽疑作陵水口自下東北出益陽縣其間逕流山峽名之為茱萸江葢水變名也又東北過益陽縣北今寶慶府新化縣及長沙府之益陽安化等縣常徳府之流江縣皆漢益陽縣地縣有闗羽瀨所謂闗侯灘也南對甘寧故壘昔闗羽屯軍水北孫權令魯肅甘寧拒之於是水寧謂肅曰羽聞吾咳唾之聲不敢渡也渡則成擒矣羽夜聞寧處分曰興霸聲也遂不渡茱萸江明一統志茱萸江在寶慶府城北四十里水勢險惡昔人置銅柱于岸側以固牽挽俗謂五十三灘四十八灘此其首也又東逕益陽縣北又謂之資疑譌當作益水應劭曰縣在益水之陽今無益水亦或資水之殊目矣然此縣之左右處䖏有深潭漁者或輕舟委浪謠詠相和羅君章所謂其聲綿邈者也水南十里有井數百口淺者四五尺深者或三五丈亦不測其深古老相傳昔人以杖撞地輒便成井或云古人採金沙處莫詳其實也又東與沅水合於湖中東北入於江也湖即洞庭湖也所入之處謂之益陽江口漣水出連道縣西資水之别明一統志漣水在長沙府湘鄉縣東南有二源一出寶慶府邵陽縣界龍山一出安化縣界珍漣山水出邵陵縣界南逕連道縣縣故城在湘鄉縣今屬長沙府西一百六十里控引衆流合成一溪東入衡陽湘鄉縣厯石魚山下多𤣥石髙八十餘丈廣十里石色黒而理若雲母開發一重輒有魚形鱗鬐首尾宛若刻畫長數寸魚形備足燒之作魚膏腥因以名之漣水又逕湘鄉縣南臨漣水本屬零陵長沙定王子昌邑漢表哀帝建平四年封長沙子昌為湘鄉侯疑非定王子漣水又屈逕其縣東而入湘南縣也東北過湘南縣南今為長沙湘潭湘鄉二縣又東北至臨湘縣西南今為瀏陽醴陵二縣東入于湘漣水自湘南縣東流至衡陽湘西縣晉置界入於湘水也於臨湘縣為西南者矣湘水出零陵始安縣陽海山始安縣今為廣西桂林府治及所轄各縣湘水源出廣西桂林府興安山陽海山流逕湖廣永州府界至湘口與瀟水合水至清雖十丈見底即陽朔山也應劭曰湘出零陵山何氏云漢書臨湘縣注中無陵字葢山之殊名也山在始安縣北縣故零陵之南部也魏咸熙二年孫皓之甘露元年立始安郡湘灕同源分為二水南為灕水北則湘川明一統志湘灕二水源出陽海山流五里分為二南為灕水又名桂江行二百里合癸水至桂林府城下合相思江入梧州界北為湘水合越城嶠水至全州又合洮灌二水入永州界東北流羅君章湖中記曰湘水之出於陽朔則觴為之舟至洞庭日月若出入於其中也東北過零陵縣東越城嵪水南出越城之嶠嶠即五嶺之西嶺也秦置五嶺之戍是其一焉北至零陵縣下注湘水湘水又逕零陵縣南又東北逕觀陽陽下當有縣字觀陽縣本漢零陵縣呉析置今作灌陽縣屬桂林府灌水在縣南九十里流逕全州入于湘水與觀水合水出臨賀郡之謝沭縣界西北逕觀陽縣西縣葢即水為名也又西北流注於湘川謂之觀口也又東北過洮陽縣東今為桂林府全州洮水在州北五十里源出文山下流入湘水洮水出縣西南大山明一統志作文山東北逕其縣南即洮水以立稱矣漢武元朔五年封長沙定王子節侯拘為侯國按史表作洮陽靖侯劉狗彘漢表作洮梁靖侯守燕此云節侯拘誤但狗彘何可命名恐是史表之誤當從漢表為是王莽更名之曰洮治也其水東流注於湘水又東北過泉陵縣西今永州府治及諸屬縣營水出營陽泠道縣今永州府道州寧逺縣南流疑當作營山明一統志營山在道州西四十五里營水在焉水在州西東流與沲池水合至宜陽鄉與舜源水瀟水合又轉至單江至永州府入湘西流入九疑山下磐基蒼梧之野峯秀數郡之間羅巖九舉各導一溪岫壑負岨異嶺同勢遊者疑焉故曰九疑山明一統志九疑山在寧逺縣南六十里郭璞云其山九谿皆相似或云九峯參差互相隱映望而疑之故名峯各有一水四水流灌于南海五水北注于洞庭九峯曰朱明石城石樓娥皇舜源女英蕭韶桂林杞林大舜窆其陽商均葬其隂山南有舜廟前有石碑文字缺落不可復識自廟仰山極髙直上可百餘里古老相傳言未有登其峰者山之東北泠道縣界又有舜廟縣南有舜碑碑是零陵太守徐儉立營水又西逕營道縣今道州及寧逺縣馮水注之水出臨賀郡馮乘縣臨賀郡呉置本漢臨賀縣呉以縣置郡自唐宋俱曰賀州今為賀縣屬平樂府馮乘縣今為永州府江華縣東北馮罡其水導源西北流縣馮溪以託名焉馮水帶約衆流渾成一川謂之北渚厯縣北西至闗下闗下地名也是商州疑作舟改裝之始馮水又左合萌渚之水水南出于萌渚之嶠五嶺之第四嶺也萌渚嶠今曰臨賀嶺在賀縣境廣州記云大庾姑安臨賀桂陽掲陽是為五嶺其山多錫亦謂之錫方矣渚水北逕馮乘縣西而北注馮水馮水又逕營道縣而右㑹營水營水又西北屈而逕營道縣西王莽之九疑亭也營水又東北逕營浦縣南今永州府永明縣營陽郡治也魏咸熙二年呉孫皓分零陵置在營水之陽故以名郡以疑衍營水又北都溪水注之水出舂陵縣北二十里仰山南逕其縣西縣本泠道縣舂陵鄉葢因舂溪為名矣明一統志舂陵故城在寧逺縣北五十里漢泠道縣有舂陵鄉晉以後有舂陵縣隋省入營道按漢志南陽郡亦有舂陵縣此葢因長沙定王曾孫孝侯仁請改封故移其名于此非即此舂陵也漢記云元朔五年以零陵冷道之舂陵鄉封長沙王子買為舂陵侯至戴侯仁以舂陵地形下濕上書徙南陽元帝許之以蔡陽白水鄉徙仁為舂陵侯立舂陵縣屬南陽郡又按漢表買子戴侯熊渠熊渠子孝侯仁今漢記云戴侯仁是并兩世為一世矣疑誤漢長沙定王分以為縣武帝元朔五年封王中子買為舂陵節侯縣故城東又有一城東西相對各方百步古老相傳言漢家舊城漢稱猶存知是節侯故邑也城東角有一碑文字缺落不可復識東南二十里尚有節侯廟都溪水又南逕新縣東縣東傍都溪溪水又西逕縣南左與五溪俱㑹縣有五山山有一溪五水㑹于溪門初學記引此作縣門故曰都溪也都溪水自縣又西北流逕泠道縣北與泠水合水南出九疑山北流逕其縣西南縣指泠溪以即名王莽之泠陵縣也泠水又北流注于都溪水又西北入於營水溪水又北流注于營陽峽又北至觀陽縣而出于峽矣大小二峡之間為沿泝之極艱矣營水又西北逕泉陵縣西漢武元朔五年以封長沙定王子節侯賢之邑也王莽名之曰溥潤漢志作溥閏零陵郡治故楚矣漢武帝元鼎六年分桂陽置太史公曰舜𦵏九疑實惟零陵或作零郡郡取名焉王莽之九疑郡也下邳陳球為零陵太守桂陽賊胡蘭攻零陵激流灌城球輒于内因地勢反㳏水淹賊相拒不能下後漢書陳球傳球字伯真下邳淮浦人也官侍御史時桂陽賊李研等作亂羣聚冦鈔陸梁荆部以球為零陵太守球到設方畧賊虜消散而州兵朱葢等與桂陽賊胡蘭數萬人轉攻零陵零陵下濕編木為城不可守備郡中惶恐球率吏人老弱與共城守弦大木為弓羽矛為矢引機發之逺射千餘步多所殺傷賊復激灌城球輒于内因地勢反决水淹賊相拒不能下㑹救兵至因其破斬朱葢等賜錢五十萬拜子一人為郎縣有白土鄉零陵先賢傳曰鄭産字景載泉陵人也為白土晉夫宋本作嗇夫漢末多事國用不足産子一歲輒出口錢民多不舉子産乃勑民勿得殺子口錢當自代出産言其郡縣為表上言錢得除更名白土為更生鄉也晉書地道志曰縣有香茅氣甚芬香言貢之以縮酒也營水又北流注于湘水湘水又東北與應水合水出邵陵縣晉志邵陵縣屬邵陵郡厯山崖嶝嶮岨峻崿萬尋澄淵湛于上疑作下應水涌於上東南流逕應陽縣南晉分觀陽縣立葢即應水為名也應水又東南流逕有鼻墟南在今零陵縣宋類苑云道州永州之間有地名鼻亭窮崖絶徼非人跡可厯去兩州各二百餘里舜封象于有庳蓋此也王隱曰應陽縣本泉陽之北部東五里有鼻墟言象所封也山下有象廟言甚有靈能興雲雨余所聞也聖人之神曰靈賢人之精氣為鬼象生不惠死靈何寄乎明一統志象祠故址在道州城北六十里相傳象封于此後人祠祀之唐道州刺史薛伯髙毁其祠栁宗元作斥鼻亭神記其畧曰薛公由刑部郎中刺道州考民風披地圖得其祠駭曰象之道以為子則傲以為弟則賊君有鼻而天子之吏實理以惡徳而專世祀殆非化吾人之意哉命亟去之于是撤其屋其地沈其主于江應水又東南流而注于湘水湘水又東北得口水出永昌縣晉置廢縣在今祁陽縣八十里隋省入零陵縣北羅山東南流逕石鷰山東其山有石紺而狀鷰因以名山其石或大或小若母子焉及其雷風相薄則石鷰羣飛頡頏如真鷰矣羅君章云今鷰不必復飛也其水又東南逕永昌縣南又東流注于湘水又上當有湘水字又東北逕祁陽縣南今屬永州府又有餘溪水注之水出西北邵陵郡邵陵縣東南流注于湘其水濁揚清汎濁水色兩分湘水又北與宜溪水合水出湘東郡之新寧縣西南新平故縣東新寧新平二縣今為衡州府常寧縣新平疑作寧故新平也湘東郡呉置故屬長沙晉因之七縣新寧新平皆其所屬宋孝武時省新平入新寧又省郵縣故止五縣衆川瀉浪共成一津西北流東㟁山下有龍穴宜水逕其下天旱則擁水注之便有雨降冝水又西北注于湘湘水又西北得舂水口水上承營陽舂陵縣西北潭山又北逕新寧縣東又西北流注于湘水也又東北過重安縣東重安縣本漢承陽縣地師古曰音烝後漢改曰烝陽呉析烝陽􅻜二縣地置臨烝縣屬湘東郡晉宋齊梁因之陳析置新城縣隋省臨烝新城重安三縣入衡山縣唐開元中改曰衡陽即今衡州府治也其故城在府城西一百七十里又東北過􅻜當作酃下同承水從東南來注之承水承水明一統志作蒸水在衡州府城北水氣如蒸源出寶慶邵陽縣耶薑山東北流至衡陽縣界㑹清陽水又東北經府城北㑹于湘出衡陽重安縣西邵陵縣界邪薑山東北流至重安縣逕舜廟下廟在承水之隂又東合略塘相傳云此塘中有銅神今猶時聞銅聲于水水輒渌作銅腥魚為之死承水又東北逕重安縣南漢長沙頃王子度邑也漢表作鍾武節侯度按漢志零陵郡鍾縣應劭曰今重安故零陵之鍾武縣王莽更名曰鍾桓也武水入焉武水源出臨武縣西山下地名鸕鷀石經縣前東流入郴州宜章縣境㑹大小章水入廣東界水出鍾武縣西南表山東流至鍾武縣故城南而東北流至重安縣注于承水至湘東臨承縣北東注于湘謂之承口臨承即故􅻜縣也縣即湘東郡治也郡舊治在湘水東故以名郡魏正元二年呉主孫亮分長沙東部立縣有石鼓髙六尺湘水所逕皷鳴則土有兵革之事羅君章云扣之聲聞數十里此皷今無復聲觀陽縣東有裴巖其下有石皷形如覆船扣之清響逺徹其類也湘水北又厯印石石在衡水縣南江水又疑作中有磐石或大或小臨水而石悉有跡其方如印累然行列無文字如此可二里許因名為印石也湘水又北逕衡山縣東山在西南有三峰一名紫葢一名容峰按盛𢎞之荆州記曰衡山有三峰極秀一名芙蓉峯最為竦傑峯上有泉飛派如一幅絹分映青林直注山下此云容峯盖漏芙字耳容峰最為竦傑自逺望之蒼蒼隱天故羅含云望若陣雲非清霽素朝不見其峰丹水涌其左澧泉流其右山經謂之岣嶁山為南岳也山下有舜廟南有祝融冡楚靈王之世山崩毁其墳得營邱九頭圖治洪水血馬疑有脱譌祭山得金簡玉字之書容峰之東有僊人石室學者經過往往聞諷誦之音矣衡山東南二面臨映湘川自長沙至此江湘七百里中有九向九背禹貢錐指引作九向九背按羅含湘中記云衡山九疑皆有舜祠遥望衡山如陣雲沿湘千里九向九背故漁者歌曰帆隨湘轉望衡九面山上有飛泉下注下映青林直注山下望之若幅練在山矣湘水又東北逕湘南縣東又厯湘西縣南分湘南置也衡陽郡治魏正元二年呉孫亮分長沙西部立治湘南太守何承天徙郡湘西矣十三州志曰日華水出桂陽郴縣華山西至湘南縣入湘地理志曰郴縣有來水出來山西至湘南入湘漢志郴縣耒山耒水所出西至湘南入湖郴縣今為廣西郴州治及桂陽州耒水源發桂陽縣耒山西流㑹資興水又西北㑹郴水經衡州府耒陽衡陽縣界注于湘湘水又北逕麓山東其山東臨湘川西傍原隰息心之士多所萃焉又東北過隂山縣西洣水從東南來注之又北過澧陵縣今屬長沙府漉水從東注之明一統志洣泉在酃縣東其水合雲秋水北流入長沙府茶陵縣境續漢書五行志曰建安八年長沙醴陵縣有大山常鳴如牛吼聲積數十年後豫章賊攻没縣亭殺掠吏民因以為候湘水又北逕建寧縣而傍湘水縣北有空冷峽驚浪雷奔濬同三峡湘水又北逕建寧縣故城下晉太始中立又北過臨湘縣西今長沙府治及諸屬縣瀏水從縣西北流注之縣南有石潭山湘水逕其西山有石室石牀臨對清流水上當有湘字水又北逕昭山西昭山在湘潭東四十里昭王南征至此不復因名昭潭在昭山下潭水澄湛如墨深不可測山下有旋泉深不測故言昭潭無底也亦謂之曰湘州潭湘水又北逕南津城西西對橘洲橘洲在善化縣西四里湘江中有四洲曰橘洲直洲誓洲白小洲夏月水泛惟橘洲不没諺云昭潭無㡳橘洲浮或作吉字為南津洲尾水西有橘子洲戍故郭尚存湘水又北左㑹瓦官水口湘浦也又逕船官西湘洲商舟之所次也北對長沙郡郡在水東州城南舊治在城中後乃移此湘水左逕麓山東上有故城山北有白露水口湘浦也又右逕臨湘縣故城西縣治湘水濵臨川側故即名焉王莽改號撫睦故南境之地也秦滅楚以為長沙郡即青陽之地也秦始皇二十六年荆王獻青陽以西漢書鄒陽傳曰越水長沙還舟青陽注張晏曰青陽地名也蘇林曰青陽長沙縣也漢髙祖五年以封呉芮為長沙王都是城即芮築也漢景帝二年封唐姬子發為王都此王莽之鎭蠻郡也於禹貢則荆州之域晉懐帝以永嘉元年分荆州湘中諸郡立湘州治此城之内郡廨西陶侃廟云舊是賈誼宅在長沙府城濯錦坊舊有太傅井并廟尚存地中有一井是賈誼所鑿極小而深上歛下大其狀似壺傍有一脚石牀纔容一人坐形流俗相承云誼宿所坐牀又有大甘樹亦云誼所植也城之西北有故市北對臨湘縣之新治縣治西北有北津城縣北有呉芮冡在長沙縣治西北廣踰六十八丈登臨寫目為㕓郭之佳憇郭頒世語云魏黃初末呉人發芮冡取木於縣立孫堅廟見芮尸容貎衣服並如故呉平後預發冡人於壽春見南蠻校尉呉綱曰君形貎何類長沙王呉芮乎但君微短耳綱瞿然曰是先祖也自芮卒至冡發四百年至見綱又四十餘年矣湘水左合誓口又北得石廓口並湘浦也右合麻溪水口湘浦也湘水又北逕三石山東山枕側湘川北即三石水口湘浦也水北有三石戍戍城為二水之㑹也湘水右逕瀏口戍西北對瀏水又北溈水從西南來注之明一統志溈水在長沙府城北二十里源出安化縣青羊山在寧鄉縣西一百四十里溈水出焉溈水出益陽縣馬頭山東逕新陽縣南晉太康元年改曰新康矣溈水又東入臨湘縣厯溈口戍東南注湘水湘水又北合斷口又北則下營口湘浦也湘水又宋本作之左岸有髙口水出益陽縣西北逕髙口戍南又西北上鼻水自鼻洲上口受湘西入焉謂之上鼻浦髙水西北與下鼻浦合水自鼻洲下口首受湘川西通高水謂之下鼻口髙水又西北又屈為陵子潭東北流注湘為陵子口湘水自髙口戍東又北右㑹鼻洲左合上鼻口又北右對下鼻口又北得陵子口湘水右㟁銅官浦出焉湘水又北逕銅官山西臨湘水山土紫色内含雲母故亦謂之雲母山也雲母山在長沙府城西北九十里又北過羅縣西今為岳州府平江縣㵋水從東來流注之湘水又北逕錫口戍東又北左派謂之錫水西北流逕錫口戍北又西北流屈而東北注玉水焉水出西北玉池東南流注于錫浦謂之玉池口錫水又東北東湖水注之水上承玉池之東湖也南流于錫謂之三陽陽字疑譌下有三津逕或亦疑作津逕水南有三戍又東北注于湘湘水自錫口北出又得望屯浦湘浦也湘水又北枝津北北下疑有出字謂之門逕也湘水紆流西北東北合門水謂之門逕口又北得三溪水口水東承太疑當作大下同湖西通湘浦三水之㑹故得三溪之目耳又北東㑹大對水口西接三津逕湘水又北逕黄陵亭西右合黃陵水口其水上承太湖湖水西流逕二妃廟南世謂之黄陵廟也在瀟湘之尾洞庭之口言大舜之陟方也二妃從征溺於湘江神逰洞庭之淵出入瀟湘之浦瀟者水清深也湘中記曰湘川清照五六丈下見底石如樗蒲矣五色鮮明白沙如霜雪赤崖若朝霞是納瀟湘之石疑作名矣故民為立祠於水側焉荆州牧劉表刋石立碑樹之於廟以旌不朽之傳矣黄水又西流入于湘謂之黄陵口昔王子山有異才年二十而得惡夢作夢賦二十一溺死于湘浦即斯川矣張華博物志王子山與父叔師到泰山從鮑子真學筭到魯賦靈光殿歸渡湘水溺死王文考名延壽一字子山南郡宜城人因有異夢意惡之乃作夢賦其詞具古文苑中湘水又北逕白沙戍西又北右㑹東町口㵋水也湘水又左合決湖口水出西陂東通湘渚湘水又北汨水注之水東出豫章文縣漢志豫章郡有艾縣今云文縣誤艾縣今為南昌府寧縣桓山西南逕呉昌縣北與純水合水源出其縣東南純山西北流又東逕其縣南又北逕其縣故城下縣是呉主孫權立純水又右㑹汨水汨又西逕羅縣北本羅子國也故在襄陽宜城縣西楚王王移之於此秦長沙立郡因以為郡朱本云疑作縣謂之羅水汨羅江在湘隂縣北七十里源出豫章流逕湘隂縣分二水一南流曰汨水一經古羅城曰羅水至屈潭復合故曰汨羅西流入湘汨水又逕玉笥山羅含湘中記云屈潭之左有玉笥山道士遺言此福地也在湘潭縣北七十里隋于此置玉州一曰地脚山汨水又西為屈潭即羅淵也屈原懐沙自沈於此故淵潭以屈為名昔賈誼史遷皆嘗逕此弭檝江波投弔於淵淵北有屈原廟廟前有碑又有漢南太守程堅碑寄在原廟汨水又西逕汨羅戍南西流注于湘春秋之羅汭矣世為汨羅口湘水又北枝分北出逕汨羅戍西又北逕壘石山東又北逕壘石戍西謂之茍導徑矣而北合湘水自汨口而一作西北逕壘石山西而北對青草湖亦或謂之青草山也西對懸城口湘水又北得九口並湘浦也湘水又東北為青草湖右合茍導逕北口與勞口合又北得同拌口皆湘浦右迤者也又北過下巂縣西微水從東來流注之湘水左㑹水青口資水也世謂之益陽江湘水左逕鹿角山東右逕謹亭戍西又北合查浦又北得萬浦咸湘浦也側湘浦北有萬石戍湘水左側沅水注之謂之横房口東對微湖世或謂之麋湖口也右屬微水即經所謂微水經下巂者也西流注于江謂之麋湖口也湘水又北逕金浦戍北帶金浦水湖溠也湘水左側澧水注之世謂之武陵江凡此四水同注洞庭北北㑹大江名之五渚戰國䇿曰秦與荆戰大破之取洞庭五渚也湖水廣圎五百餘里日月若出沒於其中山海經云洞庭之山帝之二女居焉沅澧之風交湘之浦出入多飄風暴雨山海經洞庭之山帝之二女居之是常逰于江淵澧沅之風交瀟湘之淵是在九江之間出入必以飄風暴雨湖中有君山編山君山有石穴潛通呉之苞山郭景純所謂巴陵地道者也是山湘君之所逰處故曰君山矣昔秦始皇遭風於此而問其故博士曰湘君出入則多風秦王乃赭其山漢武帝亦登之射蛟于是山東北對編山山多篪竹兩山相次去數十里迴峙相望孤影若浮湖之右岸有山世謂之笛烏頭石石北右㑹翁湖口水上承翁湖左合洞浦所謂三苗之國左洞庭者也又北至巴邱山入于江山在湘水右㟁山有巴陵故城本呉之巴邱邸閣城也晉太康元年立巴陵縣於此後置建昌郡宋元嘉十六年立巴陵郡今岳州府城跨崗嶺濵沮三江巴陵西對長洲其洲南湘浦北屇大江故曰三江也三水所㑹亦或謂之三江口矣夾山列闗謂之射獵又北對養口咸湘浦也水色青黒東北入于大江有清濁之别謂之江㑹也灕水亦出陽海山灕水發源見前湘水注灕水與湘水出一山而分源也湘灕之間陸地廣百餘步謂之始安嶠嶠即越成嶠也嶠水自嶠之陽南流注灕名曰始安水故庾仲初之賦揚都云判五嶺而分流者也灕水又南與溈水合水出西北邵陵縣界而東南流至零陵縣西南逕越城西建安十六年交州刺史賴恭自廣信合兵小疑譌或當作出零陵越城迎步隲即是地也溈水又東南流注于灕水漢書所謂出零陵下灕水者也灕水又南合彈丸溪水出于彈丸山在桂林府城東二里山有涌泉奔流衝激山崕原本譌堪及溪中有石若丸自然珠圎狀彈丸矣故山水即名焉溪水東流注于灕水灕水又南逕始興縣東魏文帝咸熙二年呉孫皓分零陵南部立始興縣灕水又南右㑹洛溪溪水出永豐縣西北洛溪山東流逕其縣北縣本蒼梧之北鄉孫皓割以為縣洛溪水又東南逕始安縣而東注灕水灕水又東南流入熙平縣逕羊瀨山山臨水石間有色一作石類羊又東南逕鷄瀨山山帶灕水山石色狀鷄故二山以物象受名矣灕水又南得熙平水口水源出縣東龍山西南流逕其縣南又西與北鄉溪水合水出縣東北北鄉山西流逕其縣北又西流南轉逕其縣西縣本始安之扶鄉也孫皓割以為縣溪水又南注熙平水熙平水又西注於灕水縣南又疑作有朝夕塘水出東山西有塘水從山下注塘一日再增再減盈縮以時未嘗愆期同於潮水因名此塘為朝夕塘矣灕水又西逕平樂縣界左合平樂溪口水出臨賀郡之謝沭縣南厯山西北流逕謝沭縣西南西南流至平平下當有樂字縣東南左㑹謝沭衆溪𣲖流凑合西逕平樂南孫皓割蒼梧之境立以為縣北𨽻始安溪水又西南流注于灕水謂之平水南過蒼梧荔浦縣今屬桂林府瀨水出縣西北魯山之東逕其縣西與濡水合水出永豐縣西北濡山東南逕其縣西又東南流入於荔浦縣注于瀨溪又注於灕水之上有灕水闗灕水又南左合靈溪水口水出臨賀富川縣北符靈罡南流逕其縣東又南注于灕水也又南至廣信縣今肇慶府封川縣等入于鬱水溱水出桂陽臨武縣南今為衡州府繞城西北屈東流按漢書地理志桂陽郡臨武縣下云秦水東南至滇陽入滙此云溱水豈即志之秦水耶溱水導源縣西南北流逕縣西而北與武溪合山海經曰肆水凡肆水俱當作肄水説見下文出臨武西南而東南注于海入番禺西肆水按山海經海内東經作肄水出臨晉西南而東南注于海入番禺西别無肆水恐當作肄為是但臨晉屬左馮翊今西安府之朝邑縣也去南海之番禺甚逺似當從志作臨武為是葢溱水之别名也武溪水出臨武縣西北桐柏山東南流右合溱水亂流東南逕臨武縣西謂之武溪縣臨側溪東因曰臨武縣王莽更名大武也溪水東南流左㑹黄泠溪水溪水出郴縣黄泠山西南流右合武溪武水又南入里山山名藍豪廣圎五百里悉曲江縣界崖上當有脱文崖峻岨巖嶺干天交柯雲蔚霾天晦景謂之瀧中懸湍迴注崩浪震山名之瀧水東至曲江縣今韶州府各縣安聶邑東屈西南流瀧水又南出峡謂之瀧口瀧水在韶州府樂昌縣南六十里源出湖南莽山西岸有任將軍城任囂城在樂昌縣五十里南海都尉任囂所築也囂死尉佗自龍州當作龍川漢志南海郡有龍川縣始居之東岸有任將軍廟瀧水又南合泠水泠水東出泠君山山羣峰之孤秀也泠水明一統志作靈水在樂昌縣東北五十里源出靈君山下與武水合流溉田百餘頃水味極甘飲者多壽鄉人取以釀酒晉太元十八年崩千何氏云疑作十餘丈於是懸澗瀑挂傾流注壑頽波所入灌於瀧水瀧水又合林水林水出縣東北洹山王歆始興記曰林水源裏有室室前盤石上列羅十瓮中悉是餅銀采伐遇之不得取取必迷悶晉太元初民封驅之家僕宻竊三餅歸發看有大􅉬螫之而死湘州記曰其夜驅之夢神語曰君奴不謹盜銀三餅即日顯戮以銀相備視則奴死銀在矣林水自源西流于瀧水又與雲水合水出縣北湯泉泉源沸涌浩氣雲浮以腥物投之俄傾即熟其中時有細魚游之不為灼也明一統志湯泉在韶州府東南五十里能熟生物泉中時有赤魚游泳人不能獲西北合瀧水又有籍水上承滄海水有島嶼焉其水吐納衆流西北注于瀧水瀧水又南歴靈鷲山山本名虎郡疑作羣山亦曰虎市山在韶州府城南三十里以虎多暴故也晉義熙中沙門釋僧律葺宇巖阿猛虎逺跡葢律仁感所至因改曰靈鷲山瀧水又南逕曲江縣東又云縣昔號曲紅何氏云江紅二字疑古通用如曽子固跋桂陽周府君碑隂曲江字皆作曲紅而蒼江字亦作蒼紅則酈注之昔號曲紅亦是一證不必改作江也曲山名也東連岡是瀧中有碑文曰疑有脱誤或曰字是衍文或在地理志下按地理志曲江舊縣也王莽以為除虜始興郡治魏文帝咸熙二年孫皓分桂陽南部立縣東傍瀧溪號曰北瀧水水左即東溪口也水出始興東江州南康縣界石門水西流而與漣水合水出南康縣凉熱山連溪山即大庾嶺也五嶺之最東矣故曰東嶠山斯則改裝之次其下船路名漣溪漣水南流注于東溪謂之漣漣下當有脱文庾仲初謂之大庾嶠水也東溪亦名東江又曰始興水又西邪階水注之水出縣東南邪階山水有别源曰巢頭重嶺衿瀧湍奔相屬祖源雙注合為一川水水側有鼻天子城鼻天子所未聞也幽明録始興郡有鼻天子冢又有鼻天子城晉書泉陵縣有鼻墟象所封也路史謂鼻天子即象也邪偕水又西北注於東江江水又西逕始興縣南又西入曲江縣邸水注之水出浮岳山山躡一處則百餘步動若在水因名浮岳山在韶州府東北二十里南流注于東江東江又西與利水合水出縣之韶石北山在韶州府東北八十里南流逕韶石下其髙百仞廣圓五里兩石對峙相去一里小大略均似雙闕名曰韶石古老言昔有二僊分而憩之自爾年豐彌厯一紀利水又南逕靈石下靈石一名逃石在韶州府境髙三十丈廣圓五百丈耆舊傳言石本桂陽武城縣漢志桂陽郡有臨武而無武城疑誤若作武城則晉地志屬桂林郡陽字當作林因夜迅雷之變忽然遷此彼人來見歎曰石乃逃來因名逃石以其有靈運徙又曰靈石其傑處臨江壁立霞駮有若繢焉水石驚瀨傳響不絶商舟淹留聆翫不已利水南注東江東江又西注于北江謂之東江口溱水自此有始興大江之名而南入滇陽縣也過滇陽縣出淮浦闗與桂水合漢志桂陽郡有湞陽縣應劭注曰滇水出南海龍川西入秦湞陽今為韶州府英徳縣溱水南逕滇陽縣西舊益縣也王莽之基武矣縣東有滇石山廣圓三十里挺崿大江之北盤阯長川之際其陽有石室漁叟所憩昔欲於山北開達郡之路輒有大虵斷道不果是以今者朱本從呉本作今行者必於石室前㲹舟而濟也溱水又西南厯臯口太尉二山之間是曰滇陽峽兩岸傑秀壁立虧天昔嘗鑿石架閣令兩岸相接以拒徐道覆晉書曰盧循徐道覆聞劉裕北伐循自始興冦長沙道覆冦南康廬陵豫章皆䧟之進逼建康劉裕遣將軍孫處沈田子自海道襲畨禺抜之裕及循戰及大雷大破之循南走畨禺道覆走保始興裕遣將軍劉藩克始興誅道覆循亦自殺溱水出峡左則滇水注之湞水在韶州府城東源出大庾嶺南流合武水為曲江水出南海龍川縣西逕滇陽縣南右注溱水故應劭曰滇水西入溱是也溱水又西南㳝何氏改洭水入焉按漢志桂陽郡含淮縣洭水所出又南海郡中宿縣有洭浦此㳝水疑當作洭水或從山海經作潢水山海經所謂㳝水出桂陽西北東南注肆入郭浦西者也按山海經海内東經云潢水出桂陽西北山東南注肆水入敦浦西此云㳝水及注肆入郭浦皆疑誤溱水又西南逕中宿縣㑹一里水其處隘名之為觀岐連山交枕絶岸壁竦下有神廟背阿面流壇宇虚肅廟渚攅石巉巖亂峙中川時水洊至鼓怒沸騰流木淪沒必無出者世人以為河伯下材晉中朝時縣人有使者至洛使訖將還忽有一人寄其書云吾家在觀前石間懸藤即其處也但扣藤自當有人取之使者謹依其言果有二人出外取書并延入水府衣不霑濡言此似不近情然造化之中無所不有穆滿西遊與河宗論寶以此推之亦為類矣溱水又西南逕中宿縣南呉孫皓分四㑹之北鄉立焉南入于海溱水又南注于鬱而入于海水經注集釋訂訛卷三十八
