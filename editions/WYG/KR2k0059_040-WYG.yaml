body:
  text: 水經注集釋訂訛卷四十歸安沈炳巽撰漸江水斤江水漸江水出三天子都山海經謂之㳺江也地理志云水出丹陽黝縣今屬徽州府及祁門縣南蠻中北逕其縣南有博山山上有石特起十丈上峰若劒杪時有靈鼓潛發官長臨縣以山鼓為候一鳴官長一年若長雷發聲則官長不反㳺江又北厯黝山縣居山之陽故縣氏之漢成帝鴻嘉二年以為廣德國封孫雲客主於此漢書成帝紀鴻嘉二年六月立中山憲王孫雲客為廣德王晉太康中以為廣德縣今為江南廣德州分𨽻宣城郡㑹稽陳業潔身清行遁跡此山孔曄㑹稽志云陳業上虞人為㑹稽太守潔身修行志懐霜雪貞亮之信同操抑下遭漢中微委官棄禄遁跡黟歙以求其志浙江又北逕翕縣東今徽州府治與一小溪合水出縣東北翁山西逕故城南又西南入浙江又東逕遂安縣晉縣屬新安郡本漢歙縣南境今屬浙江嚴州府南溪廣二百步上立杭以相通水甚清深潭不掩鱗故名新安分歙縣立之晉太康中又改從今名浙江又左合絶溪溪水出始新縣西本漢歙縣地呉置始新縣今為嚴州府淳安縣東逕縣故城南為東西長溪溪有四十七瀨濬流驚急奔波聒天孫權使賀齊討黟歙山賊賊固黟之林厯山在黟縣西南一十里山甚峻絶又工禁五兵齊以鐵杙琢山升出不意人以白棓繫之氣禁不行遂用奇功平賊呉志賀齊傳齊字公苗㑹稽山隂人也為威武中郎將討丹陽黟歙賊黟賊陳僕祖山等屯林厯山山四面壁立髙數十丈徑路危狭不容刀楯賊臨髙下石不可得攻軍住經日軍吏患之齊身出周行觀視行便隂募輕㨗士為作鐵戈密于隱險賊所不備處以戈拓斬山為縁道夜令潛上乃多懸布以援下人聞得上百數人四面流布俱鳴鼓角齊勒兵待之賊夜鼔聲四合謂大軍悉巳得上驚懼惑亂不知所為守路備險者皆走還依衆大軍因是得上大破僕等餘皆降交抱朴子曰昔賀將軍討山賊賊中有善禁者每當戰官軍刀劍不得抜弓弩射矢皆還自向輒致不利賀曰吾聞金有刃者可禁蟲有毒者可禁其無刃之物無毒之蟲則不可禁乃多作勁木白棓選精卒五千人為先登盡捉棓賊恃其冇善禁者了不嚴備于是官軍以白棓擊之禁者果不復行所擊殺者萬計於是立始新之尉於歙之華鄉令齊守之按齊傳云齊表分歙為新定黎陽休陽并黟歙凡六縣權遂割為新都郡齊為太守立府於始新據傳則尉似宜作府字宋本作都尉亦恐非是後移出新亭晉太康元年改曰新安郡溪水東注浙江浙江又東北逕建德縣南今為嚴州府治縣北有鳥山山下有廟廟在縣東七里廟渚有大石髙十丈五尺圍宋本作五十圍水瀨濬激而能致雲雨浙江又東逕壽昌縣南自建德至此八十里中有十二瀨瀨皆峻險行旅所難縣南有孝子夏先墓先少喪二親負土成墓數年不勝卒浙江水又北逕新城縣今屬杭州府桐溪注之水出呉興郡晉立於潛縣今屬杭州府北天目山山極髙峻崕嶺竦疊西臨後澗山上有霜木皆是數百年樹謂之翔鳯林東面有瀑布下注數畝深沼名曰蛟龍池池水南逕流縣西為縣之西溪在武林山西溪水又東南與紫溪合水出縣西百丈山即潛山也山擬作出水東南流名為紫溪明一統志在於潛縣南三十里源出天目山龍湫過昌化栁源兩溪合流入分水縣界溉田四千餘頃有石在溪南屹立其聲清越名響石中道挟水有紫色磐石石長百餘丈望之如朝霞又名此水為赤瀨葢以倒影在水故也紫溪又東南流逕白山之隂山甚峻極北臨紫溪又東南連山挾水兩峰峙交反頂對石往往相捍十餘里中積石磊阿相挾而上澗下白沙細石狀若霜雪水木相映泉石爭暉名曰樓林紫溪東南流逕桐廬縣東今屬嚴州府桐江在縣北三里亦名桐溪為桐溪孫權籍溪之名以為縣目割富春之地立桐廬縣自縣至於潛凡十有六瀨第二是嚴陵瀨瀨帶山山下有石室漢光武時嚴子陵之所居也故山及瀨皆即人姓名之山下有磐石周􅂞十數丈交枕潭際葢陵所㳺也嚴陵山在桐廬縣西三十里一名富春山前臨大江上有東西二釣臺桐廬溪又北逕新城縣入浙江縣故富春也孫權省并桐廬咸和元年復立為縣浙江又東北入富陽縣今屬杭州府故富春也晉后名春改曰富陽也晉書宣穆張皇后諱春華生景帝文帝故諱春字曰陽春秋曰陽秋富春曰富陽也東分為湖浦浙江又東北逕富春縣南縣故王莽之誅歲也江南有山孫武皇之先所葬也漢末墓上有光如雲氣屬天黄武四年呉志作五年孫權以富春為東安郡分置諸縣以討士宗呉志呉主傳黄武五年分三郡惡地十縣置東安郡以全琮為太守平討山越此云以討士宗葢誤以全為士以琮為宗又脱為太守以下數字故難解耳浙江又東北逕亭山西山上有孫權父冡北過餘杭今屬杭州府東入于海浙江逕縣左合餘干擬作杭大溪江北即臨安縣界水北對郭文宅宅傍山面溪宅東有郭文墓晉建武元年驃騎王導迎文置之西園文逃此而終臨安令改葬之晉書隱逸傳郭文字文舉河内軹人少愛山水尚嘉遯鹿表葛巾區種菽麥王導聞其名迎至西園七年未嘗出入亘逃歸臨安結廬舎于山中後以病卒臨安令萬寵葬之於所居之處而祭哭之建安十六年縣民郎雅亂賀齊討之孫權分餘杭立臨水縣晉改曰臨安縣因崗為城南門尤髙謝安蒞郡㳺縣逕此門以為難為亭長浙江又東逕餘杭故縣南新縣北秦始皇南逰㑹稽途出是地因立為縣王王莽之晉睦也漢志莽曰進睦漢末原本譌未陳渾移築南城縣後溪南大塘即渾立以防水也縣南有三碑是顧颺范甯等碑縣南有大壁山按圖經餘杭有大滌山在縣南十八里此云大壁當即大滌也郭文自陸渾遷居也浙江又東逕烏傷縣北今為金華府治及東陽等縣王莽改曰烏孝郡國志謂之烏傷呉苑曰東陽顔烏以淳孝著聞後有羣烏銜鼓集顔烏所居之村烏口皆傷一境以為顔烏至孝故致兹烏一本兹作慈疑譌疑烏字或作鼓字欲令孝聲逺聞又名其縣曰烏傷矣異苑云羣烏銜鼓集顔所居村烏口皆傷一境以為顔至孝故致慈烏來萃銜鼓之故令襲者逺聞即以鼓處立縣名烏傷王莽改曰烏孝以章其行迹云浙江又東北流至錢塘縣今杭州府治穀水入焉水源西出太末縣漢志大末縣穀水東北至錢唐入江漢太末縣今為衢州府治及諸屬縣榖水在今龍㳺縣北五里縣是越之西部姑蔑之地也秦以為縣王莽之末理也漢志作末治此作理唐時避諱也呉寶鼎中分㑹稽𨽻東陽郡穀水東逕獨松故塜下塜為水毁其磚文筮言吉龜言凶百年墮水中今則同龜繇矣穀水又東逕長山縣南今為金華府治金華縣與永康水合縣西東陽郡治也縣漢原本譌滿獻帝分烏傷立郡呉寶鼎中分㑹稽置城居山之陽或謂之長僊縣也言赤松採藥此山因而居之故以為名後傳呼乖謬字亦因改溪水南出永康縣今屬金華府縣赤烏中分烏傷上浦立劉敬叔異苑曰孫權時永康縣有人入山遇一大龜即束之以歸龜便言曰㳺不量時為君所得擔者怪載出欲上呉王夜宿越里纜船於大桑樹宵中樹忽呼龜曰元緒奚事爾也龜曰行不擇日今方見烹雖雖下當有然字盡南山之樵不能潰我樹曰諸葛元遜識性淵長必致相困令求如我之徒計將安泊龜曰子明無多辭既至建業權將煑之燒柴萬車語猶如故諸葛恪曰然以老桑乃熟獻人仍疑作乃說龜言權使伐桑取煮之即爛故野呼龜曰元緒其水飛湍北注至縣南門入穀水穀水又東定陽溪水注之上承信安縣之蘇姥布疑作泉縣本新安縣晉武帝太康三年改曰信安今為嚴州府淳安縣水懸百餘丈瀨勢飛注狀如瀑布瀨邊有如石床床上有石牒長三尺許有似雜綵帖也東陽記云信安縣有縣室坂晉中朝時有民王質伐木至石室中見童子四人彈琴而歌質因留倚柯聽之童子以一物如棗核與質質含之便不復饑俄傾童子曰其歸承聲而去斧柯漼然爛盡既歸質去家巳數十年親情凋落無復向時比矣其水分納衆流混波東逝逕定陽縣夾㟁縁溪悉生支竹及芳枳木連雜以霜菊金橙白沙細石狀若凝雪石溜湍波浮響無輟山水之趣尤深人情縣漢獻帝分信安立溪亦取名焉溪水又東逕長山縣北北對髙山山下水際是赤松羽化之處也炎帝少女追之亦俱僊矣列僊廟赤松子神農時雨師也服水玉以教神農能入火不燒常止王母石室中隨風雨上下炎帝少女追之亦得僊俱去後人立廟於山下溪水又東入于穀水又東逕烏傷縣之雲黃山山下臨溪水水際石壁傑立髙一百許丈又與呉寧溪水合水出呉寧縣下逕烏傷縣入穀謂之烏傷溪水閩中有徐登者女子化為丈夫與東陽趙昞並善越方越方即封禪書所謂越巫越祝者也時遭兵亂相遇於溪各示所能登先禁溪水為之不流昞次禁枯栁栁為生荑二人相視而笑登年長昞師事之後登身故昞東入章安百姓未知昞乃升茅屋支鼎而㸑主人驚怪昞笑而不應屋亦不損又嘗臨水求渡船人不許昞乃張葢坐中長嘯呼風亂流而濟於是百姓神服從者如歸章安令惡而殺之民立祠於永寧而蚊蚋不能入昞秉道懐術而不能全身避害事同萇𢎞宋元之龜詳左傳及史記龜䇿傳厄運之來故難救矣穀水又東入錢塘縣而左入浙江故地理志曰穀水自太末東北至錢塘入浙江是也浙江又東逕靈隱山山在四山之中有髙崕洞穴左右有石室三所又有孤石壁立大三十圍其上開散狀似蓮花昔有道士歸朱本作長往不歸或因以稽留為山號山下有錢塘故縣浙江逕其南王莽更名之曰泉亭地理志曰㑹稽西部都尉治錢塘記曰防海大塘在縣東一里許郡議曹華信家議立此塘以防海水始開募有能致一斛土者即與錢一千旬月之間來者雲集塘未成而不復取於是載土石者皆棄而去塘以之成故改名錢塘焉縣南江側有明聖湖父老傳言湖有金牛古見之神化不測湖取名焉縣有武林山武林水所出也闞駰云山出錢水東入海呉地記言縣唯浙江今無此水縣東有定巳疑作包諸山皆西臨浙江水流於兩山之間江川急濬兼濤水晝夜再來來應時刻常以月晦及望尤大至二月八月最髙峨峨二丈有餘呉越春秋以為子胥文種之神也昔子胥死於呉而浮尸于江呉人憐之立祠於江上名曰胥山呉録曰胥山在太湖邊去江不百里故曰江上文種成疑譌於越而伏劍于山隂越人哀之葬於重山文種既𦵏一年子胥從海上負種俱去㳺夫江海故潮水之前揚波者伍子胥後重水者大夫種是以枚乘曰何氏云元人以七發之曲江為浙江葢因此書引枚生語也濤無記焉然海水上潮江水逆流似神而非於是處焉秦始皇三十七年將逰㑹稽至錢塘臨浙江所不能渡故道餘杭之西津也浙江北合詔息湖湖本名阼湖因秦始皇帝巡狩所憇故有詔息之名也浙江又東合臨平湖異苑曰晉武時呉郡臨平㟁崩出一石鼓打之無聲以問張華華曰可取蜀中桐材刻作魚形扣之則鳴矣於是如言聲聞數十里劉道民宋孝武帝小字詩曰事有逺而合蜀桐鳴呉石傳言此湖草穢壅塞天下亂是湖開天下平孫皓天璽元年呉郡上言臨平湖自漢末穢塞今更開通又於湖邊得石圅函中有小石青白色長四寸廣二寸餘刻作皇帝字於是改天冊為天璽元年孫武以為元皇中興之符徵五湖之石瑞也錢塘記曰桓元之難湖水色赤如丹湖水上通浦陽江下注浙江名曰東江行旅所從以出浙江也又逕㑹稽山隂縣有苦竹里里有舊城言勾踐封范蠡子之邑也浙江又東與蘭溪合湖南有天柱山湖口有亭號曰蘭亭亦曰蘭上里太守王羲之謝萬兄弟數往造焉呉郡太守謝朂封蘭亭侯葢取此亭以為封號也太守王廙之移亭在水中晉司空何無忌之臨郡也越亭於山椒極髙盡眺矣亭宇雖壊基陛尚存浙江又逕越王允常冡北冡在木客村耆彦云勾踐使工人伐榮楯欲以獻呉久不得歸工人憂思作木客吟後人因以名地勾踐都琅琊欲移允常冡冡中生分分呉越春秋作標風飛沙射人人不得近勾踐謂不欲遂止浙江又東北得長湖口湖廣五里東西百三十里沿湖開水門六十九所下漑田萬頃比瀉長江湖南有覆㪷山周五百里北連鼓吹山山西枕長谿谿水下注長湖山之西嶺有賀臺越入呉還而成之故號曰賀臺又有秦望山在州城正南為衆峰之傑陟境便見史記云秦始皇登之以望南海自平地以取山頂七里縣嶝孤危峭路險絶記云扳蘿捫葛然後能升山上無髙木當由地逈多風所致山南有嶕峴峴裏有大城越王無餘之舊都也故呉越春秋云勾踐語范蠡曰先君無餘國在南山之陽社禝宗廟在湖之南又有㑹稽之山古防山也亦謂之為茅山又曰棟山越絶云棟猶鎮也葢周禮所謂揚州之鎮矣山形四方上多金玉下多玦石山海經曰夕水出焉南流注于湖按山海經作㑹稽之山其上多金玉下多玦石勺水出焉而南流注于溴與此不同呉越春秋稱山覆釡之中有金􅂤玉字之書黄帝之遺䜟也山下有禹廟廟有聖姑像禮樂緯云禹治水旱天賜神女聖姑即其像也山上有禹冡昔大禹即位十年東巡狩崩于㑹稽因而葬之有鳥來為之耘春拔草根秋啄其穢是以縣官禁民不得妄害此鳥犯則刑無赦山東有硎去廟七里深不見底謂之禹井云東㳺者多探其穴也秦始皇登稽山刻石紀功尚存山側孫暢之述征書云丞相李斯所篆也又有石山石形似御覽引此作石匱山山形似匱上有金􅂤玉字之書夏禹發之得百川理也又有射的山逺望山的狀若射侯故謂射的射的之西有石室名之為射堂年登否常占射的以為貴賤之准的明則米賤的闇則米貴故諺云射的白斛米百射的𤣥斛米千北則石㠶山山東北有孤石髙二十餘丈廣八丈望之如帆因以為名北臨大湖水深不測傳與海通何次道作郡常於此水中得烏賊魚南對精廬上䕃水水下瞰寒泉西連稽山皆一山也東帶若耶溪呉越春秋所謂歐冶錮何氏云若耶之谿涸而出銅見越絶書此錮字當作涸以成五劍溪水上承嶕峴麻溪溪之下孤潭周數畝甚清深有孤石臨潭垂崖俯視猨狖驚心寒木被潭森沈駭觀上有一櫟樹謝靈運與從弟惠連嘗逰之作連句題刻樹側麻潭下注若邪溪水至清照衆山倒影窺之如畫漢世劉寵作郡有政績將解任去治此溪父老人持百錢出送寵各受一文然山棲遁逸之士谷隱不覉之民有道則見物以感逺為貴荷泉致意故受者以一錢為榮豈藉費也義重故耳溪水下注大湖若耶溪之東又有寒溪溪之北又有鄭公泉泉方數丈冬温夏凉漢太尉鄭宏宿居潭側因以名泉𢎞少以苦節自居恒躬采伐用貿糧膳每出入谿津常感神風送之雖憑舟自運無杖檝之勞村人貪藉風勢常依隨往還有淹留者徒輩相謂汝不欲及鄭風邪其感致如此湖水自東亦注江通海水側有白鹿山山北湖塘上舊有亭呉黄門郎楊哀明居於𢎞訓里太守張景數往造焉使開瀆作埭疑更有一埭字之西作亭亭埭皆以楊為名孫恩作賊從海來楊亭被燒後復修立厥名猶在東有銅牛山山有銅穴三十許丈穴中有大樹神廟山上有冶官山北湖下有練塘里呉越春秋云勾踐鍊冶銅錫之處採炭于南山故其間有炭瀆勾踐臣呉呉王封勾踐於越百里之地東至炭瀆是也縣南九里有侯山山孤立長湖中晉車騎將軍孔敬康少時遁世栖迹此山孔曄㑹稽志云孔恂字敬康以論議中正為王導所銜出為㑹稽内史在郡三年乃營山隂湖南侯山下數畝地為宅草屋數間便棄官居之湖北有三小山謂之鹿野山在縣南六里按呉越春秋越之麋苑也山有石室言越王所㳺息處矣縣湖北有陳音山楚之善射者曰陳音越王問以射道又善其說乃使簡士習射北郊之外按呉越春秋音死葬於國西山上今陳音山乃在國南五里湖北有射堂及諸邸舎連衍相屬又於湖中築塘直指南山北即大越之國秦改為山隂縣㑹稽郡治也太史公曰禹㑹諸侯計於此命曰㑹稽者㑹計也始以山名因為地號夏后少康封少子杼以奉禹祠為越世厯殷周至于允常列於春秋允常卒勾踐稱王都于㑹稽呉越春秋所謂越王都埤中在諸暨北界山隂康樂里有地名邑中者是越事呉處故北其門以東為右西為左故雙闕在北門外闕北百步有雷門門樓兩層勾踐所造時有越之舊木矣州郡館宇屋之大瓦亦多是越之故物勾踐霸世徙都瑯琊後為楚伐始還浙東城東郭外有靈汜下水甚深舊傳下有地道通於震澤又有勾踐所立宗廟在城東明里中甘滂南又有王笥竹林雲門天柱精舎並疏山創基架林裁宇上下疑有脱文澗延流盡泉石之好水流逕通浙江又北逕山隂縣西西門外百餘步有怪山本瑯琊郡之東武縣山也飛來徙此壓殺數百家呉越春秋稱怪山者康武海中山也一名自來山百姓怪之號曰怪山亦云越王無疆為楚所伐去瑯琊止東武人隨居山下逺望此山其形似龜故亦有龜山之稱也越起靈臺於此上又作三層樓以望雲物川土明秀亦為勝地故王逸少云從山隂道上猶如鏡中行也浙江之上又有大呉王小呉王村並是闔閭夫差伐越所舎處也今悉民居然猶存故目昔越王為呉所敗以五千餘衆栖于稽山卑身待士施必及下吕氏春秋曰越王之栖於㑹稽也有酒投江民飲其流而戰氣自倍所投即浙江也許慎晉灼並言江水至山隂為浙江江之西岸有朱室堤勾踐百里之封西至朱室為此也浙江又東北逕重山西大夫文種之所葬也山上有白樓亭亭本山下縣令殷朗移置今處沛國桓儼避地㑹稽聞陳業履行髙潔往候不見儼後浮海南入交州臨去遺書與業不因行李繫白樓亭柱而去升陟逺望山湖滿目也永建中陽羡周嘉上書以縣逺赴㑹之難求得分置遂以浙江西為呉以東為㑹稽漢髙帝十一年亦呉也後分為三世號三呉呉興呉郡㑹稽其一焉浙江又東逕禦兒原本譌而鄉萬善厯曰呉黄武六年正月獲彭綺是歲由拳西鄉有産兒隨便能語云天明河欲清脚折金乃生是因詔為語兒鄉非也禦兒之名逺也葢無智之徒因藉地名生情穿鑿耳國語曰勾踐之地北至禦兒是也安得引黄武證地哉常昭曰越北鄙在嘉興浙江又東逕柴辟南舊呉楚之戰地矣備候於此故謂之辟塞是以越絶稱呉越絶呉下有古字故從由拳辟塞渡㑹夷湊山隂是也浙江又逕固陵城北昔范蠡築城於浙江之濵言可以固守謂之固陵今之西陵也浙江又東逕祖塘謂之祖瀆昔太守王朗拒孫䇿數戰不利孫静果說䇿曰朗負門守難可卒拔祖瀆祖瀆當作柤瀆案呉書作查瀆此作祖傳寫之誤古人書多作柤音祖加反去此數十里是要道也若從此出攻其不備破之必也䇿從之破朗於固陵有西陵湖亦為之西城湖湖西有湖城山東有夏架山湖水上承妖臯溪而下注浙江又逕永興縣南今為蕭山縣縣在㑹稽東北一百二十里也闔閭弟夫槩之故邑也王莽之餘衍也漢末童謡云天子當興東南三餘之間故孫權改曰元興縣濵浙江又東合浦陽江江水之導源烏傷縣今為金華府東陽義烏等縣又東逕諸暨縣與洩溪合溪廣數丈中道有兩髙山夾溪造雲壁立凡有三洩洩縣三十餘丈廣十丈中二洩不可得至登山望逺乃得見之下洩縣百餘丈水勢髙急聲震水外上洩懸二百餘丈望若雲垂此是瀑布土人號為洩也江水又東逕諸暨縣南縣臨對江流江南有射堂縣北帶烏山故越地也夫槩王之故邑先名上諸暨亦曰勾無矣故國語曰勾踐之地南至勾無王莽之疎虜也夾水多浦浦中有大湖春夏多水秋冬涸淺江水又東南逕剡縣與白石山水㑹山上布當作有瀑布懸水三十丈下注浦陽江浦陽江水又東流南屈又東迴北轉逕剡縣東王莽之盡忠也縣開東門向江江廣二百餘步自昔耆舊傳縣不得開南門開南門則有賊盜江水翼縣轉注故有東渡西渡焉東南二渡通臨海並汎單船為浮航西渡通東陽併二十五船為橋航江邊有查浦浦東行二百餘里與句章接界浦裏有六里有五百家並夾浦居列門向水甚有良田有清溪餘洪溪大發溪小發溪江上有溪疑衍六溪列漑有脱文散入江夾溪上下崩崖若傾東有簟山㑹稽志云簟山在嵊縣東三十一里孔曄曰山遥望之如鋪簟也南有黄山與白石三山為縣之秀峰山下衆流前導湍石激波浮嶮四注浦陽江又東逕石橋廣八丈髙四丈下有石井口徑七尺橋上有方石長七尺廣一丈二尺橋頭有磐石可容二十人坐溪水兩傍悉髙山山有石壁二十許丈溪中相攻贔響外發未至橋數里便聞其聲江水北逕嵊山山下有亭亭帶山臨江松嶺森蔚沙渚平淨浦陽江又東北逕始寧縣􅖣山之成工嶠嶠壁立臨江欹路峻狹不得併行行者牽木梢進不敢俯視嶠西有山孤峯特上飛禽罕至嘗有採藥者沿山見疑有譌字通溪尋上於山頂樹下有十二方石地甚方潔㑹稽志作地甚光潔還復更尋遂迷前路言諸山之所醮讌故以壇讌名山嶠北有􅖣浦浦口有廟廟甚靈騐行人及樵伐者皆先敬焉若相侵竊必為虵虎所傷北則􅖣山與嵊山相接二山雖曰異縣而峰嶺相連其間傾澗懐烟泉溪引霧吹畦風馨觸岫延賞是以王元琳謂之神明境事備謝康樂山居記浦陽江自􅖣山東北逕太康湖車騎將軍謝𤣥田居所在㑹稽志引此作舊居所在右濵長江左傍連山平陵修通澄湖逺鏡於江曲起樓樓側悉是桐梓森聳可愛民居號為桐亭樓樓兩面臨江盡升眺之趣蘆人漁子汎濫滿焉湖中築路東出趣山路甚平直山中有三精舎髙甍凌虚垂簷帶空俯眺平林烟杳在下㑹稽志引此作俯眺平烟杳然在下水陸寧晏足為避地之鄉矣江有琵琶圻圻有古塜隨水甓有隱起字云筮吉龜凶八百年落江中謝靈運取甓詣京咸傳觀焉乃如龜繇故知冡巳八百年矣浦陽江又東北逕始寧縣西本上虞之南鄉也漢順帝永建四年陽羡周嘉上書始分之舊治水西常有波湖之患晉中興之初治今處縣下有小江源出山謂之浦逕縣下西流注于浦陽茠山下注此浦浦西通山隂浦而達於江廣一百朱箋謝兆申云宋本江廣百丈黄本作江廣一百固誤呉本作百里亦非狹處二百步髙山帶江重䕃被水江閲漁商川交樵隱故桂棹蘭栧望景爭途江南有故城太尉劉牢之討孫恩所築也江水東逕上虞縣南疑衍至王莽之㑹稽也本司鹽都尉治也地名虞賔晉太康地記曰舜避丹朱於此故以名縣百官從之故縣北有百官橋亦云禹與諸侯㑹事訖因相虞樂故曰上虞二說不同未詳孰是縣南有蘭風山山少木多石驛路帶山傍江路邊皆作欄杆山有三嶺枕帶長江苕苕孤危望之若傾縁山之路下臨大川皆作飛閣䦨干乗之而渡謂此三嶺為三石頭丹陽葛洪遁世居之井基存焉琅瑘王方平性好山水又愛澤原本作爰宅蘭風義亦可通他本爰作愛者恐譌字也但以為爰宅則又字似難通耳蘭風風下疑有脱文垂釣於此以詠疑作永終朝行者過之不識問曰賣魚師得魚賣否方平答曰釣亦不得得復不賣亦謂是水為上虞江縣之東郭外有漁浦湖中有大獨小獨二山又有覆舟山覆舟山下有漁浦王廟廟今移入裏山北三山孤立水中湖外有青山黄山澤蘭山重岫疊嶺參差入雲澤蘭山頭有深潭山影臨水水色青緑山中有諸塢有石楗所右臨白馬潭潭之深無底傳云創湖之始邊塘屢崩百姓以白馬祭之因以名水湖之南即江津也江南有上塘陽中三里隔在湖南常有水患太守孔靈符遏峯山前湖以為埭埭下開瀆直指南津又作水揵二所以舎此江得無淹潰之害縣東有龍頭山山崖之間有石井冬夏常冽清泉南帶長江東連上陂江之道南有曹娥碑娥父旴迎濤溺死娥時年十四哀父尸不測疑作得乃號踴江介因解衣投水呪曰若值父尸衣當沈若不值衣當浮裁落便沈娥遂於沈處赴水而死縣令度尚使外甥邯鄲子禮為碑文以彰孝烈江濵有馬目山洪濤一疑作直上波隱是山勢淪嵊亭間厯數縣行者難之縣東北上亦有孝子楊威母墓威少失父事母至孝常與母入山採薪為虎所逼自計不能禦於是抱母且號且行虎見其情遂弭耳而去自非誠貫精微孰能理感於英獸矣又有呉瀆破山導源注于胥江上虞江東逕周市而注永興地理志曰縣有仇亭柯水東入海仇亭在縣之東北一十里江北柯水疑即江也又東北逕永興東與浙江合謂之浦陽江地理志又云縣有蕭山潘水所出東入海又疑是浦陽江之别名也自外無水以應之浙江又東注于海故山海經曰浙江在其東在閩西北入海韋昭以松江浙江浦陽江為三江斤江水出交阯龍編縣東北至鬱林領方縣東注于鬱地理志云逕臨塵縣至領方縣注於鬱容容夜湛乘牛渚湏無無濡營進皇無地零侵黎侵黎水出廣州晉興郡郡以太康中分鬱林置得至臨塵入鬱無㑹重瀨夫省無變由蒲王都融勇外此皆出日南郡西東東入于海漢地理志日南郡有小水十六并行三千二百八十里屬交州此無㑹諸水葢十六水之名也容容水在南垂名之以次轉北也右三十水從江巳南至日南郡也嵩髙為中岳在頴川陽城縣西北春秋說題辭曰隂含陽故石凝為山國語曰禹封九山山土之聚也爾雅曰山大而髙曰崧合而言之為崧髙分而名之為二室西南為少室東北為太室嵩髙山記曰山下巖中有一石室云有自然經書自然飲食又云山有玉女臺言漢武帝見因以名臺紀異志嵩山有玉女擣帛石立秋前一日中夜常聞杵聲泰山為東岳在泰山博縣西北岱宗也王者封禪于其山示増髙也有金䇿玉檢之事焉霍山為南岳在廬江􅈞縣西南天柱山也爾雅云大山宫小山曰霍開山圖曰其山上侵神氣下固窮泉華山為西岳在𢎞農華隂縣西南古文之惇物山也禹貢云終南惇物至於鳥鼠按禹叙雍州不言華山故以惇物當之然西傾朱圉鳥鼠至於太華已記之矣漢書云惇物山垂山也豈垂華字相亂耶禹貢云云乃朱本所箋何氏駁之云若垂華相亂則漢書不當于京兆華地陰下云大華山在南扶風武功下復云垂山矣况其相去甚逺直酈氏之誤耳括地志仍之盖未尋繹禹貢叙惇物于終南之下鳥鼠之上乃自東而西也雷首山在河東蒲阪縣東南砥柱在河東大陽縣東河中王屋山在河東垣曲縣東北也昔黄帝受丹訣於是山也太行山在河内野王縣西北王烈得石髓處也神僊傳王烈字長林邯鄲人嘗之太行山見山破石裂數百丈兩畔皆青石石中有一穴有青泥流出如髓烈取泥試丸之湏史成石嚼之氣如粳米飯用擕少許示嵇叔夜恒山為北岳在中山上曲陽縣西北碣石山在遼西臨榆縣南水中也大禹鑿其石右夾而納河秦始皇漢武帝皆嘗登之海水西侵歲月逾甚而苞其山故言水中矣析城山在河東濩澤縣西南太岳山在河東永安縣壺口山在河東北屈縣東南龍門山在河東皮氏縣西梁山在馮翊夏陽縣西北河上荆山在馮翊懐德縣南岐山在扶風美陽縣西北闗山在扶風汧縣之西也禹貢無闗山漢志扶風汧縣有呉山在西古文以為汧山周禮雍州之鎮曰岳山鄭云呉岳也隴山終南山惇物山在扶風武功縣西南也頃山在隴西臨洮縣西南頃讀曰傾舊作須據漢志改禹貢中條山也禹貢西傾因桓是來馬融王肅禹貢説云岍為北條西傾中條嶓冡南條凡三條也嶓冢在隴西氐道縣之南南條山也鳥鼠同穴山在隴西首陽縣西南鄭𤣥曰鳥鼠之山有鳥焉與鼠飛行而處之又有止而同穴之山焉是二山也鳥名為鵌似鵽而黄黒色鼠如家鼠而短尾穿地而共處鼠内而鳥外孔安國曰共為雌雄杜彦達曰同穴止宿養子互相哺食長大乃止張晏言不相為牝牡故因以名山沈約宋書沙州甘谷嶺北有雀鼠同穴或在山嶺或在平地雀色白鼠色黄地生黄紫花草便有雀鼠穴此雖非本注存之以廣異聞積石在隴西河闗縣西南山海經云山在鄧林東河所入也都野澤在武威縣東北縣在姑臧城北三百里東北即休屠澤也古文以為豬野也其水上承姑臧武始澤澤水二源東北流為一水姑臧縣故城西東北流水側有靈源池宋本作靈淵池王隱晉書曰漢末博士燉煌侯瑾善内學語弟子曰凉州城西泉水當竭有䨥闕其上至魏嘉平中武威太守條茂起學舎築闕于此泉太守填水造起門樓與學闕相望泉源徙發重導於斯故有靈淵之名也澤水又東北流逕馬城東城即休屠縣之故城也本匈奴休屠王都謂之馬城河又東北與横水合水出姑臧城下武威郡凉州治地理風俗記曰漢武帝元朔三年改雍曰凉州以其金行土地寒凉故也遷於冀晉徙治此王隱晉書曰凉州有龍形故曰卧龍城南北七里東西三里本匈奴所築也乃張氏之世居也又増築四城箱各千步東城殖園果命曰講武場北城殖園果命曰𤣥武圃皆有宫殿中城内作四時宫隨節㳺幸并舊城為五街衢相通二十二門大繕宫殿觀閣采綺妝飭凝中夏也其水側城北流注馬城河河水又東北清澗水入焉俗亦謂之為五澗水也水出姑臧城東而西北流注馬城河河水又與長泉水合水出姑臧東楈次縣王莽之播德也按漢地理志楈次縣屬武威郡孟康云楈音子如反次音咨舊本作楫誤西北厯黄沙阜而東北流注馬城河又東北逕宣威縣故城南又東北逕平澤晏然二亭東又東北逕武威縣故城東漢武帝太初四年匈奴渾邪王殺休屠王以其衆置武威縣武威郡王莽更名張掖地理志曰谷水出姑臧南山北至武威入海屆此水流兩分一水北入休屠澤俗謂之為西海一水又東逕一百五十里入豬野世謂之東海通謂之都野矣合離山在酒泉會水縣東北合黎山也流沙地在張掖居延縣東北居延澤在其縣故城東尚書所謂流沙者也形如月生五日也弱水入流沙流沙與水流行也亦言出鍾山西行極崦嵫之山在西海郡北山有石赤白色以兩石相打則水潤打之不已潤盡則火出山石皆然炎起數丈逕日不滅有大黒風自流沙出奄之乃滅其石如初言動火之事發疾經年故不敢輕近耳流沙又逕浮渚厯壑市之國又逕於鳥山之東朝雲國西厯崑山西南出於過瀛之山大荒西經云西南海之外流沙出焉逕夏后開開上三嬪于天得九辯與九歌焉又厯貟丘不死之西入於南海據宋本補六字三危山在燉煌縣南山海經曰三危之山三青鳥居之是山也廣圓百里在鳥鼠山西即尚書所謂竄三苗於三危也春秋傳曰允姓之姦居於𤓰州𤓰州地名也杜林曰燉煌古𤓰州也州之貢物地出好𤓰民因氏之𤓰州之戎并於月氐者也漢武帝後元分酒泉置南七里有鳴沙山故亦曰沙州也朱圉山在天水北冀縣南即冀縣山有石鼓開山圖謂之天鼓山九州害起則鳴有常應又云石鼓山有石鼓於星為河鼔星動則石鼓鳴石鼓鳴則秦土有殃鳴淺殃萬物鳴深則殃君王矣岷山在蜀郡湔氐道西漢書以為瀆山者也嶓冢山在𢎞農盧氏縣南是山也穀水出其北林也荆山在南郡臨沮縣東北東條山也漢地理志云禹貢北條荆山在馮翊懐德縣南其南條荆山在南郡臨沮縣東北此云東條所未詳也卞和得玉璞於是山楚王不理懐璧哭於其下後玉人理之所謂和氏之玉焉内方山在江夏竟陵縣東北禹貢注章山也大别山在廬江安豐縣西南禹貢内方至於大别孔傳云二山在荆州漢所經也荆州大别山在江夏郡此廬江大别疑非一山外方山崧髙是也桐柏山在南陽平氏縣東南陪尾山在江夏安陸縣東北衡山在長沙湘南縣南禹治洪水血馬祭衡山於是得金簡玉字之書按省玉字得通水理也九江地在長沙夏嶲縣西北雲夢澤在南郡華容縣之東東陵地在廬江金蘭縣西北前後漢志廬江郡無金蘭縣按漢志廬江郡注云金蘭西北有東陵鄉水經三十二卷注中有金蘭縣敷淺原地在豫章厯陵縣西彭蠡澤在豫章彭澤縣北尚書所謂彭蠡既渚陽鳥攸居也中江在丹陽蕪湖縣南東至㑹稽陽羡縣入於海震澤在呉縣南五十里北江在毗陵北界東入於海嶧陽山在下邳縣之西羽山在東海祝其縣南也縣即王莽之猶亭也尚書殛鯀於羽山謂是山也山西有羽淵禹父之所化其神為黄能以入淵矣故山海經曰洪水滔天鯀竊帝之息壤以堙水不待帝命帝令祝融殺鯀於羽郊者也陶丘在濟隂定陶縣之西南陶丘丘再成也荷澤在定陶縣東雷澤在濟隂成陽縣西北荷水在山陽湖陸縣南蒙山在太山䝉隂縣西南大野澤在山陽鉅野縣東北大邳在河南成臯縣北爾雅曰山一成謂之邳然則大邳山名非地之名也禹貢東過洛汭至于大伾鄭𤣥注云大岯山在修武武德之界張楫云成臯縣山也臣瓉漢書注云修武武德無此山而成臯又不一成今黎陽縣山臨河是大岯也明都澤在梁郡睢陽縣東北益州沲水在蜀郡汶江縣西南其一在郫縣西南皆還入江荆州沲水在南郡枝江縣三澨地之南在卭縣之北沲當作沱漢志蜀郡汶江縣注江沱在西南東入江南郡枝江縣注江沱出西東入江卭縣誤漢志南郡有邔縣疑轉寫譌也尚書曰導漢水過三澨地說曰沔水東行過三澨合流觸大别山陂故馬融鄭元王肅孔安國等咸以為三澨水名也許慎言澨者埤増水邊土人所止也按春秋左傳曰文公十有六年楚軍次於勾澨以伐諸庸宣公四年楚令尹子越師於漳澨定公四年左司馬戍敗呉師於雍澨昭公二十三年司馬薳越縊於蓬澨左傳作薳澨何氏云薳澨或是左傳因上薳越而誤本作蓬也服䖍或謂之邑又謂之地京相璠曰杜預亦云水際及邊地名也今南陽淯陽二縣之間淯水之濵有南澨北澨矣而諸儒之論水陸相半又無山源出處之所津途闗路唯鄭𤣥及劉澂之言在竟陵縣界經云卭縣北池然池流多矣池當作沱而論者疑焉而不能辨其所在右禹貢山水澤地所在凡六十水經注集釋訂訛卷四十
