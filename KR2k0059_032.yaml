body:
  text: 水經注集釋訂訛卷三十二歸安沈炳巽撰漻水蘄水決水泚水泄水肥水施水沮水漳水夏水羌水涪水潼水涔水漻水出江夏平春縣西明一統志漻水源出江夏廢平春縣南過安陸入于溳漻水北出大義山南至厲鄉西賜水入焉水源東出大紫山分為二水一水西徑厲鄉南水南有重山即烈山也烈山明一統志作厲山在德安府隨州城北一百八十里禮祭法云厲山氏之有天下也其子曰農能植百榖注云厲山氏炎帝也起于厲山漢志南陽郡隨故厲國也皇甫謐云今隨之厲鄉荆州記云山有二冗云是神農氏生處遂即于其地為神農社常年祀之山下有一穴父老相傳云是神農所生處也故禮謂之烈山氏水北有九井子書所謂神農既誕九井自穿謂斯水也又言汲一井則衆水動井今堙塞遺迹髣佛存焉亦云鄉故賴國也有神農社賜水西南流入于漻即厲水也賜厲聲相近宜為厲水矣一水出義鄉西南入隋又注漻漻水又南徑隋縣注安陸也南過安陸入于溳蘄水出江夏蘄春縣今為湖廣黃州府蘄水縣北山山即近宋本作蘄桞也水首受希水枝津西南流厯蘄山出蠻中故以此蠻為五水蠻水即謂巴水也又赤亭水西歸水蠻左馮居岨藉山川世為抄暴宋世沈慶之于西陽上下誅伐蠻夷即五水蠻也按宋書蠻夷傳西陽有巴水蘄水希水赤亭水西歸水謂之五水蠻所在並深岨種落熾盛厯卋為盜賊北接淮汝南極江漢地方數千里云云即此注所引今蠻左馮居以下似有訛脫故句難讀耳南過其縣西晉改為蘄陽縣縣從江州置大陽戌後齊安郡移治于此也又南至蘄口南入于江蘄水南對蘄陽洲入于大江謂蘄口洲上有蘄陽縣徙疑訛或有脫文決水出廬江雩婁縣廢雩婁縣在今鳯陽府霍丘縣西南八十里南大别山在霍丘縣西南八十里接河南固始縣界此另是一大别山非漢陽之大别山也俗名之為檀山峴蓋大别之異名也其水厯山委注而絡其縣也北過其縣東縣故吳也春秋左傳襄公二十年按左傳是襄公二十六年今云二十年誤楚子秦人侵吳及雩婁聞吳有偹而還是也晉書地道記云在安豐縣之西南即其界也故地理志曰決水出雩婁又北過安豐縣東今鳯陽府霍丘縣是其故地廢縣在夀州南六十里漢屬六安國今為安豐鄉決水自雩婁縣北徑雞備亭春秋昭公二十三年吳敗諸侯之師于雞父者也杜預注曰雞父楚地安豐縣南有雞備亭安豐縣故城今邉城郡治也王莽之美豐也漢志作美豐原本作美風世祖建武八年封大將軍涼州牧竇融為侯國晉立安豐郡決水自縣西北流徑蓼縣故城東在今夀州南安豐鄉又徑其北漢髙帝六年封為孔侯國也也字疑衍按漢書功臣表封孔藂為蓼侯則此脫藂字亦當作封孔藂為侯國世謂之決水也決水又西北灌水注之其水𨗳源廬江金蘭縣西北東陵鄉太蘇山即灌水也許慎曰出雩婁縣俗謂之澮水也禇先生所謂神龜出于江灌之間嘉休之中蓋謂此水也按史記龜策傳作江淮之間灌水東北徑蓼縣故城西而北注決水也故地理志曰決水北至蓼入灌漢志作入淮灌水于蓼亦入決春秋宣公八年冬楚公子滅舒蓼臧文仲聞之曰臯陶庭堅不祀忽諸德之不逮民之無援哀哉按左傳文公五年冬楚公子燮滅蓼臧文仲聞之有臯陶庭堅不祀之嘆又宣公八年夏楚人滅舒蓼自是兩事今混為一事似誤決水又北右會陽泉水水受決水東北流徑陽泉縣故城東故陽泉鄉也漢靈帝中封太尉黃琬為侯國又西北流左入決水謂之陽泉口也又北入于淮俗謂之決口非也斯決灌之口矣余往因公至于淮津舟車所屆次于決水訪其民宰與古名全違脈水尋經方知決水宋本作口蓋灌澮聲相倫習俗害真耳沘水原作泚今從胡氏引漢志俱改作沘出廬江灊縣故城在今廬江縣南二里西南霍山東北爾雅云大山宫小山曰霍郭注云宫謂圍繞之灊者山水名也開山圖灊當作小山圍繞大山為霍山郭景純曰灊水出焉縣即其稱矣春秋昭公二十七年吳因楚喪圍灊是也地理志曰沘水出沘山不言霍山沘字或作渒沘水又東北徑博安縣泄水出焉明一統志淠河在六安州西一名白沙河本沘水出霍山北迤邐流從安豐界入于淮東北過六縣東今為廬州府六安州淠水東北右會踏鼓川水水出東南踏川西北流左注淠水淠水又西北徑馬享城西又西北徑六安縣故城西廢六安縣在今州治東今即其趾為州治縣故咎陶國也夏禹封其少子奉其祀今縣都陂中有大冢民傳曰公琴者即臯陶冢也楚人謂冢為琴矣漢髙帝元年别為衡山國五年屬淮南文帝十六年復為衡山國武帝元狩二年别為六安國王莽之安風也漢書所謂以舒屠六晉太康三年廬江郡治淠水又西北分為二水出焉又北徑五門亭西西北流徑安豐縣故城西晉書地道記安豐郡之屬縣也俗名之曰安城矣又北會濡水亂流西北注之北入于淮水之決會謂之沘口也泄水出博安縣博安縣地理志之博鄉縣也王莽以為揚陸矣通鑑作都陸胡三省注引水經注作揚陸云意者都陸即揚陸歟泄水自縣上承沘水于麻步川西北厯山疑訛濡溪謂之濡水也北過芍陂西與沘水合泄水自濡溪口安豐縣北流注于淠一謂之荷濡口西北入于淮亂流同國也國宋本作歸肥水出九江成德縣廣陽鄉西吕忱字林曰肥水出良餘山俗謂之連枷山亦或以為獨山也北流分為二水施水出焉肥水又北徑獲城東又北徑荻江東又宋本作右會施水枝津首受施水于合肥縣今廬州府治城東西流徑成德縣注于肥水也肥水别北過其縣西北入芍陂肥水自荻邱北徑成德縣故城西王莽更之曰平阿也又北徑芍陂東又北徑死馬塘東芍陂瀆上承井門與芍陂更相通注故經言入芍陂矣肥水東北又合閻潤水宋本作肥水又北右合閻潤縣上承施水于合肥縣北流徑復道縣西水積為陽湖陽湖水自塘西北徑死雩亭南夾橫塘西注宋大始初豫州司馬劉順帥衆八千據其城地以拒劉勔杜叔寶以精兵五千送糧死雩劉勔破之此塘宋書殷琰傳晉安王子勛反以琰為建武將軍豫州刺史長史龎道隆司馬劉順參軍杜叔寶等泣勸琰同逆琰素無部曲門義不過數人無以自立受制于叔寶等太宗遣輔國將軍劉勔進討順等率馬步八千人東據宛唐去夀陽三百里勔率衆軍並進去順數里立營會順糧盡報叔寶送糧叔寶乃發車千五百乘載米餉順自以五千精兵防送之勔用軍副吕安國計遣精兵間路出順後于橫塘抄之力戰大破之伏尸遍野叔寶去米車奔走安國復夜燒米車驅牛二千頭而還水分為澗二洛澗出焉閻漿水注之水受芍陂陂水上承澗水于五門亭南别為斷神水又東北流徑五門亭東亭為衆朱本作衆宋本作二水之會也斷神水又東北徑神迹亭東又北謂之豪水雖廣異名事實一水又東北徑白芍亭東積而為湖謂之芍陂陂周一百二十許里在夀春縣南八十里言楚相孫叔敖所造魏太尉王陵與吳將張休交戰于芍陂即此處也王陵當作王淩魏志王淩傳正始初為征東將軍假節都督揚州諸軍事二年吳大將全琮數萬衆冦芍陂淩率諸軍逆討與賊爭塘力戰連日賊退走進封南鄉侯是時淩尚未拜太尉及司馬宣王誅曹爽始進淩為太尉假節鉞則所云魏太尉王陵皆誤陂有五門吐納川流西北為香門陂水北徑孫叔敖祠下謂之芍陂瀆又北分為二水一水東注黎漿漿水東徑黎漿亭南文欽之叛吳軍北入諸葛緒拒之於黎漿即此水也魏志諸葛誕傳誕以王淩毋丘儉等纍見夷滅懼不自安甘露二年徴為司空遂舉兵反遣長史吳綱將少子靚至吳請救吳人大喜遣將全懌等率衆三萬密與文欽俱來應誕吳將朱異再以大衆來迎誕等渡黎漿水云云今云諸葛緒拒之于黎漿所未詳也疑當作諸葛誕之叛吳軍北入進屯黎漿水也東注肥水謂之黎漿水口又北過夀春縣東肥水自黎漿北徑夀春縣故城東為長瀨津津側有謝堂北亭迎送所薄水陸舟車是焉萃止又西北左合東溪溪水引瀆北山西南流徑𨗳公寺西寺側因溪建剎五層屋宇間敞崇虛携覺疑訛當作嶕嶢也又西南流注于肥肥水又西徑東臺下臺即夀春外郭東北隅阿之榭也東側有一湖三春九夏紅荷覆水引瀆城隍水積成潭謂之東臺湖亦肥南播也肥水西徑夀春縣城北右合北溪水𨗳北山泉源下注潄石頽隍水上長林插天髙柯負日出于山林精舍右山淵寺左道俗嬉逰多萃其下內外引汲泉同七淨溪水沿注西南徑陸道士解疑是廨南精廬臨側川溪大不為廣小足間居亦勝境也溪水流注于肥水北入于淮肥水又西分為二水右即肥之故瀆遏為船官湖以置舟艦也肥水左瀆又西西下疑有徑字石橋門北亦曰草市門外有石梁渡此洲宋本作北洲洲上有西昌寺寺三靣阻水佛堂設三像真容竗相相服精煒項本作偉是蕭武帝所立也寺西即船官坊倉光都水朱曰史記齊世家云蒼兕蒼兕揔爾舟楫王充論衡作蒼光云是水中獸也是營是作湖北對八公山山無樹木唯童阜耳山上有淮南王劉安廟劉安是漢髙帝之孫厲王長子也析當作折節下士篤好儒學養方術之徒數十人皆為俊異焉多神仙祕法鴻寶之道忽有八公皆鬚眉皓素詣門希見門者曰吾王好長生今先生無住衰之術未敢相聞八公咸變成童王甚敬之八士並能鍊金化丹出入無間乃與安登山埋金于地白日升天餘藥在器雞犬舐之者俱得上升其所升之處踐石皆陷人馬迹存焉故山即以八公為目余登其上人馬之迹無聞矣唯廟像存焉廟中圗安及八士像皆坐床帳如平生被服􅊏麗咸羽扇裙帔巾壺枕物一如常居廟前有碑齊永明十年所建也山有隱室石井即崔琰所謂余下夀春登北嶺淮南之道室八公石井在焉亦云左吳與王春傳生等尋安同詣玄洲還為著記號曰八公記都不列其雞犬升空之事矣按漢書安反伏誅葛洪明其得道事僃抱朴子及神仙傳肥水又左納芍陂瀆瀆水自黎漿分水引瀆夀春北徑芍陂門右北入城昔巨鹿時苗為縣長是其留犢處也魏略云時苗為夀春令始至乘兩黃特後歲餘牛生犢及去任留特與主簿曰是淮土所生也瀆東有東都街街之左道北有宋司空劉勔廟宋元徽二年建于東鄉孝義里廟前有碑時年碑功方創齊永明元年方立沈約宋書言太始元年豫州刺史殷琰反明帝假勔輔國將軍討之琰降不犯秋毫百姓來蘇生為立碑文過其實建元四年故吏顔幼明為其廟銘故佐龎埏為廟讚夏侯敬友為廟頌並附刋于碑側瀆水又北徑相國城東劉武帝伐長安所築也堂宇廳館仍故以相國為名又北出城注肥水又西徑金城北又西左合羊頭溪水水受芍陂西北厯羊頭溪謂之羊頭澗水北徑尉尉下疑有斗字湖左會烽水瀆瀆受淮于烽村南下注羊頭溪側徑夀春城西又北厯象門自沙門北出金城西門逍遙樓下北注肥瀆肥水北注舊瀆之橫塘為元康南路馳道左通船官坊也肥水徑元康城西北流水北出際有曲水堂亦嬉遊所集也又西北流昔在晉世謝元北禦苻堅祈疑是於八公山及置陳于肥水之濵堅望山上草木咸為人狀此即故戰敗處非八公之靈有助蓋苻氏將亡之惑也肥水又西北注于淮是曰肥治疑當作口也施水亦從廣陽鄉東南入于湖施水受肥于廣陽鄉東南流徑合肥縣應劭曰夏水出城父東南至此與肥合故曰合肥按漢志九江郡合肥下應劭云夏水出父城東南至此與淮合故曰合肥闞駰亦言出沛國城父東至此合為肥余案川亡派别無沿注之理方知應闞二説非實證也蓋夏水暴長施合于肥故曰合肥也非謂夏水自城父何氏云下有脫文東徑合肥縣城南居四水中東又有逍遙津水上舊有梁孫權之攻合肥也張遼敗之於津北橋不撤者兩板權與甘寧蹴馬趨津谷利自後著鞭助勢遂得渡梁凌統被鎧落水後到追及流涕津渚吳志吳主孫權傳權征合肥未下徹軍還兵皆就路權與凌統甘寧等在津北為魏將張遼所襲統等以死扞權權乘駿馬越津橋得去江表傳曰權乘駿馬上津橋橋南已見撤丈餘無版谷利在馬後使權持鞍緩鞚利于後著鞭以助馬勢遂得超度權既得免即拜利為都亭侯凌統傳統率親近三百人陷圍扶扞權出復還戰左右盡死統被甲潛行及權痛親近無返者悲不自勝施水又東分為二水枝水北出焉下注陽淵施水又東徑東口戍東注巢湖謂之施口也沮水出漢中房陵縣今為湖廣鄖陽府房縣淮水東南過臨沮縣界今為襄陽府南漳縣故城在縣境沮水出東汶陽何氏云汶陽未詳郡沮陽縣西北景山在今房縣西南一百里一名雁山一名馬塞山即荆山首也漢志南郡臨沮縣下云禹貢南條荆山在東北漳水所出通典云臨沮故城在當陽縣北而南漳亦臨沮之地按魏志西魏析臨沮置重陽縣後周改曰思安隋開皇十八年改曰南漳有荆山今南漳縣西少北八十里之荆山是也左傳昭四年司馬侯曰荆山九州之險十二年右尹子革曰昔我先王熊繹辟在荆山後漢志臨沮縣有荆山劉昭曰荆州記云西北三十里有清溪溪北即荆山首曰景山即卞和抱璞之處元和志荆山在南漳縣西北八十里三面險絶惟東南一隅才通人徑寰宇記云南漳縣荆山頂上有池喬松翠柏列繞其傍此後沮水漳水篇即言出荆山即此也髙峰霞舉峻竦層雲山海經云金玊是出亦沮水之所𨗳故淮南子曰沮出荆山髙誘云荆山在左馮翊懷德縣蓋以洛水有漆沮之名故也斯謬證耳杜預云水出新城郡之西南發阿山蓋山異名也沮水東南流徑沮陽縣東南縣有潼水東徑其縣南下入沮水沮水又東南徑汶陽郡北即髙安縣界郡治錫城縣居郡下城故新城之下邑義熙初分新城立西表悉重山也沮水南徑臨沮縣西青溪水注之水出縣西青山山之東有濫泉即青溪之源也口徑數丈其深不測其泉甚靈潔至於炎陽有亢陰雨無時以穢物投之輒能暴雨其水𨗳源東流以源出青山故以青溪為名尋源浮溪上下疑有脫訛竒為深峭盛𢎞之云稠木傍生凌空交合危樓傾嶽疑是阜恆有落勢風泉傳響于青林之下巖猿流聲于白雲之上逰者常若疑作苦目不周玩情不給賞是以林徒栖託雲客宅心泉側多結道士精廬焉青溪又東流入于沮水沮水又屈徑其縣南晉咸和中為沮陽郡治也沮水又東南徑當陽縣北今屬荆州府荆門州縣城因岡為阻北抗沮川其故城在東一百四十里謂之東城在緑林長坂南在當陽縣北一百里長坂即張翼德橫矛處也沮水又東南徑驢城西磨城東在當陽東四十里東有驢城又南徑麥城西在當陽縣東六十里昔關雲長詐降處自此遂叛傳云子胥造驢磨二城以攻麥邑沮水又南徑楚昭王墓東對麥城故王仲宣之賦登樓云西接昭丘是也沮水又南與漳水合焉又東南過枝江縣今屬荆州府東南入于江沮水又東南徑長城東又東南流注于江謂之沮口也漳水出臨沮縣東荆山東南過蓼亭又東過章鄉南荆山在景山東一百餘里新城沛鄉何氏引晉書地理志作沶鄉縣界雖羣峰競舉而荆山獨秀漳水東南流又屈西南徑編縣南今荆門州地縣舊城東北一百四十里髙陽城西南在今歸州境移治許茂故城城南臨漳水漳水又南厯臨沮縣之漳鄉南昔關羽保麥城詐降而遁潘璋斬之于此漳水又南徑當陽縣又南徑于麥城東王仲宣登其東南隅臨漳水而賦之曰夾清漳之通浦倚曲沮之長洲是也漳水又南洈水注之山海經曰洈水出東北宜諸之山而南流注于漳水又南至枝江縣北烏疑有訛脫扶邑入于沮地理志曰禹貢東按志作南禹貢無東條之山此云東誤條荆山在臨沮縣之東北漳水所出東至江陵入楊按志作陽水注于沔非也今漳水於當陽縣之東南一百里餘而右會沮水也夏水出江流于江陵縣東南江津豫章口東有中夏口是夏水之首江之汜也屈原所謂過夏首而西浮顧龍門而不見也龍門即郢城之東門也又東過華容縣南今屬嶽州府縣故容城矣春秋魯定公四年許遷于容城是也北臨中夏水自縣東北徑成都郡故城南晉永嘉中西蜀阻亂割華容諸城為穎王都夏水又徑交址太守胡寵墓北漢太傅廣身疑有訛脫陪陵而此墓側有廣碑故世謂廣冢非也其文言是蔡伯喈之辭厯范西戎墓南王隱晉書地道記曰陶朱冢在華容縣樹碑云是越之范蠡晉太原地記盛𢎞之荆州記劉澄之記並言在縣之西南郭仲産言在縣東十里檢其碑題云故西戎令范君之墓碑文缺落不詳其人稱蠡是其先也碑是永嘉二年立觀其所述最為究悉似親徑其地故違衆説從而正之夏水又東徑監利縣南今屬荆州府晉武帝太康五年立縣土卑下澤多陂池西南自州陵東界徑于雲杜沌陽為雲夢之藪矣韋昭曰雲夢在華容縣按春秋魯昭公三年鄭伯如楚子産備田具以田江南之夢郭景純言華容縣東南巴丘湖是也杜預云枝江縣安陸縣有雲夢蓋跨川亘隰兼苞勢廣矣夏水又東夏楊水注之水上承楊水于竟陵縣之柘口東南流與中夏水合謂之夏楊水又東北徑江夏惠懷縣北而東北注又東至江夏雲杜縣入于沔應劭十三州記曰江别入沔為夏水源夫夏之為名始于分江冬竭夏流故納厥稱既有中夏之目亦苞大夏之名矣當其決水之所出謂之堵口焉鄭元注尚書滄浪之水言今謂之夏水來同故世變名焉劉澄之著永初山川記云夏水古文以為滄浪漁父所歌也因此言之水應由沔今按夏水是江流沔非沔入夏假使沔注夏其勢西南非尚書又東之文余亦以為非也自堵口下沔水通兼夏目而會于江謂之夏汭也故春秋左傳稱吳伐楚沈尹射奔命夏汭也杜預曰漢江曲入江即夏口矣羌水出羌中參糧按漢志羌道縣下師古引水經云羌水出羌中參谷彼俗謂之天池白水矣地理志曰出隴西羌道東南流徑宕昌城東西北去天池五百餘里水又東南徑宕昌婆川城東南北注羌水昔薑維之冦隴右也聞鍾會入漢中引還知雍州刺史諸葛緒屯橋頭從此谷將出北道按魏志鄧艾傳作從函谷入北道緒邀之此路繼更從此疑作北道渡橋頭入劒閣在今保寧府劍州北三十里緒追之不及羌水又東南陽部水注之水發東北陽部溪西南徑安民戍又西南注羌水羌水又東南徑武階城西南又東南徑葭蘆城西羊湯水入焉水出西北陰平北界湯溪東南徑北部城北又東南徑三部城南東南右妾下合字疑在右下妾一作接水合傍西南出即水源所發也羌水又徑葭蘆城南徑餘城南又東南左會五會水水有二源出南北五部溪西南流合為一水屈而東南注羌水羌水又東南流至橋頭合白水東南去白水縣故城九十里又東南至廣漢白水縣與漢水合又東南過巴郡閬中縣又南至墊江縣東南入于江涪水出廣漢涪縣西北涪水出廣漢屬國剛氐逰當作氐道徼外東南流徑涪水西漢志廣漢郡剛氐道下云涪水出徼外南至墊江入漢涪縣下應劭曰涪水出廣漢南入漢今云氐逰誤涪水當作涪縣王莽之統睦臧宫進破涪城斬公孫恢于涪自此水上縣有潺水出潺山水源有金銀礦洗取火合之以成金銀潺水厯潺亭而下注涪水涪水又東南徑綿竹縣北臧宫溯涪至平陽公孫述將王元降遂拔綿竹按後漢書臧宫傳云從涪水上平曲後云軍至平陽鄉蜀將王元率衆降則平陽下當有鄉字涪水又東南與建始水合水發平洛郡西溪西南流屈而東西流入于涪涪水又東南徑江油江油縣今屬保寧府戍北鄧艾自隂平景谷步道陰平道在今江油縣懸兵束馬入蜀徑江油廣漢者也魏志鄧艾傳艾自隂平道行無人之地七百餘里鑿山通道造作橋閣山髙谷深至為艱險艾以氈自裹推轉而下將士皆攀木緣崖魚貫而進先登至江油涪水又東南徑南安郡南又南與金堂水會水出廣漢新都縣東南流入涪涪水又南枝枝下疑有脫文出焉西徑廣漢五城縣為五城水又西至成都入于江南至小廣漢與梓潼潼下疑有水字合小廣漢即廣漢縣地王莽更名曰廣信也梓潼水出其縣北界西南入于涪梓潼縣今屬保寧府故廣漢郡也公孫述改為梓潼郡劉備嘉霍峻守葭萌之功葭萌縣今為保寧府廣元等縣又分廣漢以北别為梓潼郡以峻為守縣有五女蜀王遣五丁迎之至此見大蛇入山穴五丁引之山崩壓五丁及五女因因下疑有名字是山為五婦山在今梓潼縣北一十五里又曰五婦候華陽國志秦惠王遺蜀王美女五人蜀遣五丁迎女還到梓潼見一大蛇入穴中一人攬其尾五人相助大呼抴蛇山崩時壓殺五人及秦五女并將從而山分為五嶺蜀王痛傷因命曰五婦冢山川平石上為望婦堠馳水所出一曰五婦水亦曰潼水也其水𨗳源南徑梓潼縣王莽改曰子同矣自縣西徑涪城東又南入于涪水謂之五婦水口也又西南至小廣漢南入于墊江亦言涪水至北入漢水亦謂之內水北入墊江昔岑彭與臧宫自江州從涪水上公孫述令延岑盛兵于沉水按後漢書臧宫傳公孫述將延岑盛兵于沅水此云沉水恐誤宫左步右騎夾船而進勢一作聲動山谷大破岑軍斬首溺水者萬餘人水為濁流沉水出廣漢縣今為潼川府鹽亭縣下入涪水也涔水出漢中南縣南縣當作南鄭東南旱山北至沔陽縣南入于沔涔水即黃水也東北流徑城固漢志作成固南城北城在山上或言韓信始立或言張良創築未知定所制矣城固縣今仍屬漢中府及洋縣西鄂縣等地義熙九年索遐為果州刺史自城固治此故謂之南城城周七里襟澗帶谷絶壁百尋北谷口造城東門傍山尋澗五里有餘槃道登陟方得城治城北水舊有桁北渡涔水水北有趙軍城城北又有桁渡沔取北城城即大成固縣治也黃水右岸有恱歸館涔水厯其北北至沔陽左沔為三水口也水經注集釋訂訛卷三十二
