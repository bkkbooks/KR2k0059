body:
  text: 水經注集釋訂訛卷二十一歸安沈炳巽撰汝水汝水出河南梁縣勉鄉西天息山梁縣今為南陽府汝州地理志曰出高陵山即猛山也亦言出南陽魯陽縣之大孟山孟當作盂下同明一統志大盂山在魯山縣西南七十里山頂低窪四圍若城俗呼為大圍城小圍城山又言出𢎞農盧氏縣還歸山博物志曰汝出燕泉山並異名也余以永平中䝉除魯陽太守會上臺下列山川圖以方志參差遂令尋其源流此等既非學徒難以取悉既在遘見不容不述今汝水西出魯陽縣之大盂山黃柏谷巖鄣深高山岫邃密石徑﨑嶇人跡裁交西即盧氏界也其水東北流徑太和城西又東流徑其城北左右深松列植筠柏交䕃尹公度之所栖神處也神仙傳尹軌字公度博學五經尤明天文星氣河洛䜟緯晚乃學道常服黃精日三合許年數百嵗腰佩漆竹筒十數枚中皆有藥言可辟兵疫又能銷鉛為銀銷錫為金後到太和山中仙去又東届堯山西嶺下水流兩分一水東徑堯山南為滍水也即經所言滍水出堯山矣一水東北出為汝水歷䝉柏谷何氏云以下文觀之則上文之黃亦當作蒙左右岫壑爭深山阜競高夾水層松茂柏傾山䕃渚故世人以名也津流不已北歷長白沙口狐白溪水注之夾岸沙漲若雪因以取名其水南山當作出狐白川北流注汝水又東北趣狼臯山者也狼臯山一名鳴臯山在汝州西南六十里東南過其縣北汝水自狼臯山東出峽謂之汝厄也東厯麻解城北故鄤鄉城也謂之蠻中左傳所謂單浮餘圍蠻氏蠻氏潰者也杜預曰城在河南新城縣之東南伊洛之戎陸渾蠻氏城也俗以為麻解城非也蓋蠻麻讀聲近故也汝水又徑周平城南京相璠曰霍陽山在周平城東南者也汝水又東與三屯谷水合水出南山北流徑石碣東柱側刋云河南界又有一碣題言洛陽南界碑柱相對既無年月竟不知何代所表也其水又北流注於汝水汝水又東與廣成澤水合水出狼臯山北澤中安帝永初元年以廣成遊獵地假與貧民元初二年鄧太后臨朝鄧隲兄弟輔政世士以為文德可興武功宜廢寢搜狩之禮息戰陳之法於時馬融以按融傳漏為字文武之道聖賢不墜五才之用無或可廢後漢書馬融傳注云五才金木水火土也左𫝊曰宋子罕曰天生五材人並用之廢一不可誰能去兵也作廣成頌云大漢之初基也揆厥靈囿營於南郊右矕三塗左枕嵩嶽面據衡隂箕背王屋浸以波溠演以滎洛金山石林殷起乎其中神泉側出丹水涅池怪石浮磬耀焜於其陂桓帝延熹元年校獵廣成遂幸函谷關其水自澤東南流徑溫泉南與溫泉水合溫水殷一作數源揚波於川左泉上華宇連䕃茨甍交池石沼錯落其間順宋本作頥道者多歸之其水東南流注廣成澤水澤水又東南入於汝水汝水又東得魯公水口水上承陽人城東魯公陂城古梁之陽人聚也秦滅東周徙其君於此陂水東南流合乎宋本作于澗水水出北山南流注之又亂流注於汝水汝水之右有霍陽聚汝水徑其北東合霍陽山水水出南山杜預曰河南梁縣有霍山者也其水東北流徑霍陽聚東世謂之華浮城非也春秋左傳哀公四年楚侵左傳作襲梁及霍服䖍曰梁霍周南鄙也建武二年世祖遣征虜將軍祭遵攻蠻中山賊張滿時厭新柏華餘賊合攻得霍陽聚即此後漢書祭遵傳建武二年拜征虜將軍入箕關南擊厭新柏華蠻中賊東觀漢記曰柏華聚也時新城山賊張滿據險隘遵攻之絶其糧道滿數挑戰遵堅壁不出而厭新柏華餘賊復與滿合遂攻得霍陽聚遵乃分兵擊破降之水水上疑漏霍字又徑梁城西按春秋周小邑也於戰國為南梁矣故經云汝水徑其縣北俗謂之治城非也以北有注城故也今置治城縣治霍陽山水又東北流注於汝水汝水又右合三里水水北出梁縣西北而東南流徑其縣故城廢梁縣在今汝州子城東在隋承休縣又有梁縣在西南四十五里西故單孤聚也單孤當作􅓆狐史記周本紀秦遷西周公於􅓆狐徐廣曰􅓆音憚􅓆狐與陽人聚相近在洛陽南百五十里梁新成之間明一統志在河南府城外五十里地理志云秦滅西周徙其君於此因乃縣之杜預曰河南縣西南有梁城即是縣也水又東南徑注城南司馬彪曰河南梁縣有注城史記魏文侯三十二年敗秦於注者也又與一水合水發注城東坂下東南流注三里水三里水又亂流入於汝汝水又東徑成安縣故城北按地理志潁川郡有成安縣侯國也史記建元以來功臣侯者年表曰漢武帝元朔五年校尉韓千秋擊南越死封其子韓延年為成安侯即此邑矣世謂之白泉城非也俗謬耳汝水又東為周公渡藉承休之徽號而有周公之嘉稱也汝水又東黃水注之水出梁山東南徑周承休縣故城東為承休水縣故子南國也漢武帝元鼎四年幸雒陽巡省豫州觀於周室邈而無祀詢問耆老乃得孽子嘉封為周子南君以奉周祀漢書恩澤侯表武帝元鼎四年封姬嘉為周子南君再傳以罪棄市其弟延年紹封元帝初元五年更封為周承休侯按汲冢古文謂衛將軍文子為子南彌矣矣當作牟檀弓衛將軍文子名彌牟其後有子南徑紀年徑紀年徑三字史記注中無朝於魏後惠成王如衛命子南為侯秦并六國衛最後滅疑嘉是衛後故氏子南而稱君也自按汲冢以下至稱君也止係史記周本紀周子南君臣瓉注中語初元五年為周承休邑周承休故城在今汝州東隋曰承休縣唐又改為梁縣地理志曰侯國也元帝置元始二年更曰鄭公王莽之嘉荑按漢志作莽曰嘉美也故汝渡有周公之名蓋籍邑以納稱也謂之黃城水曰黃水皆非也其水又東南徑白茅臺東又南徑梁瞿鄉西世謂之期城非也括地志云周承休城一名梁崔塢在汝州梁縣東北二十五里按漢書世祖自潁川在梁瞿鄉馮魴先詣行所即是邑也水積為陂世謂之黃陂東轉徑其城南東流右合汝水又東南潁川郟縣南今屬南陽府汝水又東與張磨泉合水發北阜春夏水盛則南注汝水汝水又東分為西長湖湖水南北五十餘步東西三百步汝水又東扈澗水北出大劉山南徑水蓼堆東郟城西南流入於汝汝水又右迤為湖湖水南北八九十步東西四五百步俗謂之東長湖湖水下入汝古養水也水出魯陽縣今為南陽府魯山縣北將孤山北長岡下數泉俱發東厯永仁三堆南又東徑沙川世謂之沙水明一統志沙河源出魯山縣吳大嶺流徑舞陽縣㑹澧水灰綿封等河東逹黃河厯山符壘北又東徑沙亭南故養隂里也司馬彪郡國志曰襄城有養隂里京相璠曰在襄城郟縣西南養水名也俗以是水為沙水故亦名之為沙城非也又城處水之陽而以隂為稱更用惑焉但流雜間居溉平移一作築溉頻移宋本作裂溉互移致今川渠異容津途改狀故物望疑焉又右㑹董溝水宋本作董清水水出沛公壘西六十許步沛公壘在汝州東北大劉山南漢高帝入關駐此世祖西征亦駐此故山有大劉小劉之稱蓋漢祖入關往征一作往往是由故地擅斯目矣其水東北注養養水又東北入東長迪一本無迪字湖亂注注上疑有流字汝水縣宋本作也汝水又徑郟縣故城南春秋昭公十九年楚令尹子瑕之所城也滶水注之水出魯陽縣之將孤山東南流許慎云水出南魯陽入父城在今汝州東南父城堡本殷時應國左傳楚成父城即此漢置縣屬潁川郡從水敖聲呂忱字林亦言在魯陽滶水東入父城縣與柏水宋本作桓水下同㑹柏水出魯陽北山水有二源奇疑作岐導二字疑有訛誤於賈復城在汝州東南一百餘里一名通鴉城合為一瀆徑賈復城北復南擊郾所築也後漢書賈復傳時更始郾王尹尊及諸大將在南方未降者尚多帝召諸將議兵事未有言沈吟允之乃以檄投地曰郾最強宛為次誰當擊之復率然對曰臣請擊郾帝笑曰執金吾擊郾吾復何憂遂連破之月餘尹尊降盡定其地俗語訛謬謂之寡婦城水曰寡婦水北瀆水有窮通故有枯渠之稱焉其水東北流至父城縣北右注滶水亂流又東北至郟入汝汝水東南左合藍水水出陽翟縣重嶺山東南流徑紀氏城西有增臺記紀氏臺在今汝州東百餘里續漢書曰世祖車駕西征盜賊羣起郟令馮魴為賊延裒所坎力屈上詣紀氏羣賊自降即是處後漢馮魴傳魴有方略建武三年拜虞令以威信稱遷郟令潁川盜賊羣起郟賊延褒等衆三千餘人攻圍縣舍魴率吏士七十餘人力戰連日弩矢盡城陷魴乃遁去帝至潁川魴詣行在所帝知魴力乃嘉之曰此健令也在郟城東北十餘里其水又東南流徑黃阜東而南入汝水汝水又東南流又與白溝水合水出亭城西而南徑夏亭城西又南徑龍城西城西北即摩陂也縱廣可一十五里魏青龍元年有龍見於郟之摩陂明帝幸陂觀龍於是改摩陂曰龍陂其城曰龍城其水又南入於汝水又東又東上當有汝水字南與龍山水㑹水出龍山龍溪北流際父城縣故城東昔楚平王大城城父以居太子建故杜預曰即襄城之城父縣也朱本云按漢志潁川有父城縣而沛郡有城父縣此注自說潁川之父城乃忽引楚平城父事故并舉說苑襄城君與黃帝襄城問塗以實杜注豈父城與城父本為一耶馮異據之以降世祖用報巾車之恩也後漢書馮異傳異字公孫潁川父城人漢兵起異以郡掾監五縣與父城長苗萌共城守為王莽拒漢光武略地潁川攻父城不下屯兵巾車鄉異間出行屬縣為漢兵所執光武召見異曰異一夫之用不足為強弱有老母在城中願歸據五城以效功報德光武曰善其水又東北流與二水合俱出龍山北流注之又東北入於汝水汝水又東南徑襄城縣故城南王隱晉書地道記曰楚靈王築劉向說苑曰襄城君始封之日服翠衣帶玉佩徙倚於流水之上即是水也楚大夫莊辛所說處說苑云襄成君衣翠衣帶王劍履縞寫立于逰水之上楚大夫莊辛過而說之遂拜謁曰臣願把君之手其可乎襄成君忿而不言莊辛曰君獨不聞鄂君子晢有感于越人之歌乎襄城君乃奉手而進之後乃縣之吕后元年立孝惠後宫子𢎞為侯國按史記高后元年封孝惠子義為襄成侯今云𢎞誤王莽更名相成也黃帝嘗遇牧童於其野莊子云黃帝將見大隗乎具茨之山至於襄城之野七聖皆迷無所問途適遇牧馬童子問塗焉故嵇叔夜讚曰竒矣難測襄城小童倦逰六合來憩兹邦也其城南對泛城周襄王出鄭居泛即是此城也春秋襄公二十六年楚伐鄭涉泛而歸杜預曰涉汝水於泛城下也晉襄城郡治京相璠曰周襄王居之故曰襄城也今置關於其下汝水又東南流徑西不羮城南春秋左傳昭公十二年楚靈王曰昔諸侯逺我而畏晉今我大城陳蔡不羮音郎賦皆千乘諸侯其畏我乎東觀漢記曰車騎馬防以前參藥勤勞省闥增封侯國襄城羮亭千二百按傳作三百五十户即此亭也汝水又東南徑繁丘城南而東南出也又東南過定陵縣北湛水出犨縣北今魯山縣東南有犨城廢縣漢縣屬南陽郡隋曰犨城縣屬襄城郡魚齒山西北在汝州東南五十里東南流歷魚齒山下為湛浦方五十餘步春秋襄公十六年晉伐楚報揚梁之役楚公子格及晉師戰於湛阪杜預曰襄城昆陽縣北有湛水東入汝楚師敗績遂侵方城之外今水北悉枕翼山阜於父城東南湛水之北山有長阪蓋即湛水以名阪故有湛阪之名也湛水又東南徑蒲城北京相璠曰昆陽縣北有蒲城蒲城北有湛水者是也漢疑作湛水又東於汝水九曲北東入汝杜預亦以是水為湛水矣周禮荆州其浸潁湛鄭𤣥云未聞蓋偶有不照也今考地則不乖其土言水則有符經文矣汝水又東南徑定陵縣故城北漢成帝元延三年封侍中衛尉淳於長為侯國王莽更之定城矣東觀漢記曰光武擊王莽二公還到汝水上於涯以手飲水澡頰塵垢謂傅俊曰今日疲倦諸君寧憊也當作耶即是水也水右則滍水左入焉左則百尺溝出矣溝水夾岸層崇亦謂之為百尺堤也自定陵城北通潁水於襄城縣潁盛則南播汝佚則北注溝之東有澄潭號曰龍淵在汝北四里許南北百步東西二百步水至清深嘗不耗竭佳饒魚筍湖溢則東注漷水矣汝水又東南昆水注之水出魯陽縣唐山東南流徑昆陽縣故城西在今葉縣南更始元年王莽徴天下能為兵法者選練武衛招募猛士旌旗輜重千里不絶又驅諸獷獸虎豹犀象之屬以助威武自秦漢出師之盛未嘗有也世祖以數千兵激之陽闕按後漢書光武紀當作徼之於陽關注聚名也諸將見尋邑兵盛反走入昆陽世祖乃使成國上公王鳯廷尉大將軍王常留守夜與十三騎出城南門收兵於郾尋邑圍城數千重本紀作數十重雲車十餘丈瞰臨城積弩亂發矢下如雨城中人負户而汲王鳯請降不許世祖帥營部俱進頻破之乘勝以敗死三千人徑衝尋邑兵敗其中堅於是水之上遂殺王尋城中亦鼓譟而出中外合勢震呼動天地會大雷風屋瓦皆飛莽兵大潰昆水又屈徑其城南世祖建武中封侍中傅俊為侯國故後漢郡國志有昆陽縣蓋藉水以氏縣也昆水又東徑定陵城南又東注汝水汝水又東南徑竒雒一作額城西北今南潁川郡治也濆水出焉世亦謂之大㶏水爾雅曰河有雍汝有濆然則濆者汝别也故其下夾水之邑猶流汝陽之名是或濆㶏之聲相近矣亦或下合㶏潁兼統厥稱耳又東南過郾縣北汝水徑竒額城西東南流其城襟帶兩水側背雙流汝汝下當有水字又東南流徑郾城西東南流其城襟帶兩水自城西以下十一字已見上文此應節去縣故城北故魏下邑也史記楚昭陽伐魏取郾是也汝水又東得醴班志雉縣作澧水口水出南陽雉山亦云導源雉衡山即山海經云衡山也郭景純以為南嶽非也馬融廣成頌曰面據衡隂指謂是山在雉縣按漢志雉縣下引太康地志云即陳倉人所逐二童子名寶雞者雄止陳倉為石雉止此縣故名雉縣界故世謂之雉衡山依山海經不言有水焉然醴水東流厯唐山下即高鳯所隱之山也後漢書逸民傳高鳯字文通南陽葉人教授業於西唐山中年老執志不倦隱身漁釣於家明一統志唐子山一名西唐山在唐縣南一百里漢高鳯隱居處唐因此山置唐州醴水又東南與臯水合水發臯山郭景純或作章山東流注于醴水醴水又東南徑唐城北南入城而西流出城城蓋因山以即稱矣醴水又屈而東南流徑葉縣故城北今屬南陽府春秋昭公十五年許遷於葉者也楚盛周衰控霸南土欲爭強中國多築列城於北方以逼華夏故號此城為万城或作方字唐勒奏土論曰我是楚也世霸南土自越以至葉垂𢎞境萬里故號曰万城余按春秋屈完之在邵陵對齊侯曰楚國方城以為城杜預曰方城山名也在葉南未詳孰是楚惠王以封諸梁子號曰葉公城即子高之故邑也葉公好龍神龍下之河東王喬之為葉令也每月望常自詣朝堂後漢書作詣臺朝帝帝怪其來數而不見車騎顯宗密令太史伺望之言其臨至輒有雙鳬從東南飛來於是候鳬至舉羅張之但得一隻舄乃詔尚方診視則四年中所賜尚書官屬履也每當朝時禁門下鼓不擊自鳴聞於京師後天下玉棺於堂前吏民推排終不搖動喬曰天帝獨欲召我耶乃沐浴服飾寢其中蓋便立覆宿昔葬於城東土自成墳其夕縣中牛皆流汗喘乏而人無知者百姓為立廟號葉君祠牧守每班録皆先謁拜之吏民祈禱無不如應若有違犯亦立能為祟帝乃迎取其鼓置都亭下略無復聲焉或云即古仙人王喬也是以干氏書之於神化王喬事具見後漢書方術傳本出干寶搜神記神化篇醴水又徑其城東與燒車水合水西出苦菜山東流側葉城南而下注醴水朱本作澧下同醴水又東徑葉公廟北廟前有公子高諸梁碑皇覽云葉縣西北去城三里葉公諸梁冡近縣祠之曰葉公丘舊秦漢之世廟道有雙闕几筵黃巾之亂殘毁頽闕魏大和景初中令長修飾舊宇後長汝南陳晞以正始元年立碑碑字破落遺文殆存事見其碑醴水又東與葉西陂水會縣南方城山屈完所謂楚以一作國方城以為城者也山有湧泉北流畜之以為陂故塘方二里陂水散流又東徑葉城南而東北注醴水醴水又東注葉陂陂東西十里南北七里二陂並諸梁之所堨也陂水又東徑潕漢志作舞陽縣故城北舞陽縣今屬南陽府其故城在今唐縣東北又東徑定陵城南東與芹溝合其水導源葉縣東徑潕陽城北又東徑定陵縣南入疑作又東南流注醴其水徑流昆醴之間纒絡四縣之中疑即吕忱所謂涀水也今於定陵更無别水唯是水可當之澧水東徑郾縣故城南左入汝山海經曰澧水東流注於涀水也按山海經曰雅山澧水出東流注於視水針山視水出焉注云或曰冝為瀙水瀙水今在南陽也汝水又東南流徑鄧城西春秋左傳桓公二年蔡侯鄭伯㑹於鄧者也汝水又東南流潕水注之山海經朝歌之山潕水出焉注云音武今在南陽舞陽縣又東南過汝南上蔡縣西上蔡縣今屬河南汝寧府汝南郡楚之别也漢高帝四年置王莽改郡曰汝濆漢志作莽曰汝汾縣故蔡國周武王剋殷封其弟叔度於蔡世本曰上蔡也九江有下蔡故稱上竹書紀年曰魏章率師及鄭師伐楚取上蔡者也建安元年安帝封鄧隲為侯國建安乃獻帝年號非安帝按後漢書鄧禹傳安帝永初元年封鄧隲為上蔡侯汝水又東徑𤣥瓠宋本作縣瓠下同今汝寧府北門外有懸瓠池城北王智深云汝南太守周矜起義於𤣥瓠者是矣今豫州刺史汝南郡治城之西北汝水枝别左出西北流又屈西東轉又西南㑹汝形若垂瓠耆彥云城北名焉上下疑有訛字灣中有地數頃上有栗園栗小殊不並固安之實也魏都賦云信都之棗故安之栗注云故安屬范陽出御栗然歲貢三百石以充天府水渚即栗州疑作洲也樹木高茂望若屯雲積氣矣林中有栗堂射埻甚閒敞牧宰及英彥多所遊薄其城上西北隅高祖以太和中幸懸瓠平南王肅起高臺於小城建層樓於隅阿下際水堨一作湄降栗渚左右列榭四周參差競峙竒為嘉觀也又東南過平輿縣南按漢志平輿縣屬汝南郡故城在今汝寧府東汝水南溱水出浮石嶺北青衣山亦謂之表疑作青衣水也明一統志溱水源出開封府密縣東南徑朗陵縣故城西故城在汝寧府羅山縣西南三十里應劭曰西南有朗陵山縣以氏焉世祖建武中封城門校尉城宫當作臧宫後漢書臧宫傳建武十五年封朗陵侯為侯國也溱水又南屈徑其縣南又東北徑北宜春縣故城北漢志汝南郡有冝春縣後漢郡國志作北冝春故城在今汝寧府西南王莽更名之為宣孱也豫章有宜春故加北矣永元三年安帝封后父侍中閻暢為侯國永元乃和帝年號非安帝按後漢書皇后紀安帝元初三年封后父閻暢為北冝春侯溱水又東北徑馬香城北又東北入汝汝水又東南徑平輿縣南安成縣故城北在今汝寧府城東南王莽更名至成也漢武帝元光六年封長沙定王子劉倉為侯國矣汝水又東南汶孫云當作陂水注之水首受愼水於愼何氏云愼當作滇漢志愼陽下注云闞駰曰永平五年失印更刻遂誤水為心陽縣故城在今汝寧府城南八十里南陂陂水兩分一水自陂北徑宋本作繞愼陽城四固一作圍城塹潁川荀淑遇縣人黃叔度於逆旅與語移日原本訛曰曰子吾師表也范曄論曰黃憲言論風㫖無所傳聞原本訛文然士君子見之者靡不深服後漢書作服深逺去疵吝將以道周性全無得而稱乎塹水又自瀆東北流注七陂一水自陂東北流積為同陂陂水又東北又結而為陂世謂之窖陂陂水上承愼陽縣北陂東北流積而為土陂陂水又東為窖陂陂水又東南流注壁陂陂水又東北為太陂陂水又東入汝汝水又東南徑平陵亭北又東南徑陽遂鄉北汝水又東徑樂亭北春秋之棘櫟也杜預曰汝隂新蔡縣東北有櫟亭今城在新蔡故城西今屬汝寧府北半淪水汝水城疑訛北宋本作故城西北城北半淪水汝水又東南又東南徑新蔡縣故城南昔管蔡間王室放蔡叔而遷之其子胡能率德易行周公舉之為魯宋本無魯字卿士以見於王王命之以蔡中吕二字未詳地也以奉叔度祀是為蔡仲矣宋忠曰故名其地為新蔡王莽所謂新遷者也世祖建武元年封吳國為侯國按後漢書吳漢傳漢於建武二十年薨子成嗣二十八年分漢封為三國成子旦為濯陽侯旦弟旴為筑陽侯成弟國為新蔡侯則吳國新蔡之封乃二十八年今云元年誤汝南先賢傳曰新蔡鄭敬字次都為郡功曹都尉高懿聽事前有槐樹白露類甘露者懿問掾屬皆言是甘露敬獨曰明府政未能致甘露但樹汁耳懿不恱託疾而去汝水又東南左㑹澺水水上承汝水别流於竒額城東東南流為練溝徑邵陵縣西東南流注至上蔡西岡北為黃陵陂陂東流於上蔡岡東為蔡塘又東徑平輿縣故城南為澺水縣舊沈國也有沈亭春秋定公四年蔡滅沈以沈子嘉歸後以為縣史記曰秦將李信攻平輿敗之者也建武三十年世祖封銚統為侯國按後漢書銚期傳期卒諡忠侯子丹嗣復封丹弟統為建平侯似非平輿或别有據也於宋本作本汝南郡治昔費長房為市吏見王壺公懸壺郡市長房從之因而自逺同入此壺隱淪仙路骨謝懷靈無㑹而返雖能役使鬼神而終同物化費長房事具見後漢書方術傳城南里餘有神廟世謂之張明府祠水旱之不節則禱之廟前有石碑文字紊碎不可復尋碑側有小石函按桂陽先賢畫讚臨武張熹字季智為平輿令時天下大旱熹躬雲東獲熹應此句有訛誤朱本引宋本作熹躬雩未獲嘉應乃積柴自焚主簿崇小史張化從熹焚焉火既燎天靈感應即澍雨此熹自焚處也澺水又東南左迤為葛陂陂方數十里水物含靈多所苞育昔費長房投杖於陂而龍變所在也又劾東海君於是陂矣後漢書方術傳費長房辭壺公歸翁與一竹杖曰騎此任所之則自至既至可以杖投葛陂中也長房乘杖須叟來歸投杖于陂顧視則龍也後東海君來謁葛陂君因淫其夫人長房劾繫之三年而東海大旱長房至海上見其人請雨乃謂之曰東海君吾前繫之葛陂今方出之使作雨也於是雨立注陂水東出為鮦水今在新蔡縣漢因此水置鮦陽縣其故城亦在新蔡縣界俗謂之三丈陂亦曰三嚴水水徑鮦陽縣故城南應劭曰縣在鮦水之陽漢明帝永平中封衛尉隂與當作興後漢書隂識傳識弟興卒封興子慶為鮦陽侯子慶為侯國也縣有葛陵城建武十五年更名封經侯銚丹為侯國後漢書銚期傳期子丹嗣封安成侯後徙封葛陵侯今云經侯未詳城之東北有楚武王冢民謂之楚王瑟城瑟城當作琴城按三十二卷注云楚人謂冢為琴六安縣都陂中有大冢民傳曰公琴即臯陶冢也城北祝社里下土中得銅鼎銘曰楚武王是知武王隧也鮦陂東注為富水水積之處謂之陂塘津渠交絡枝布川隰矣澺水自葛陂東南徑新蔡縣故城東而東南流注於汝水又東南徑下桑里左迤為橫塘陂又東北為清陂者也汝水又東南徑壺丘城北故陳也春秋左傳文公九年楚侵陳尅壺丘以其服於晉是也汝水又東與清陂合水上承慎水於慎陽縣之上慎陂右溝北注馬城陂陂西有黃丘亭陂水於疑作又東徑新息亭北又東為綢陂一作綱阪陂水又東徑新息縣今為汝寧府息縣結為墻陂陂水又東徑遂鄉東南而為壁陂又東為青陂陂東對大吕亭春秋外傳曰當成周者南有荆蠻中吕姜姓矣鄭語史伯語鄭桓公當成周者南有荆蠻申吕應鄧陳蔡隨唐蔡平侯始封也西南有小吕亭故此稱大也側陂南有青陂廟廟前有陂漢靈帝建寧三年新蔡長河南緱氏李言上請修復青陂司徒臣訓尚書臣襲奏可於洛陽宫青陂東塘南樹碑碑稱青陂在縣坤地源起桐柏淮川别流入於潺湲徑新息墻坡宋本作阪衍入褒信界灌溉五百餘頃陂水又東分為二水一水南入淮一水東南徑白亭北又東徑吳城南史記楚惠王二年子西召太子建之子勝於吳勝入居之故曰吳城也又東北屈徑壺丘東而北流注於汝水世謂之薄溪水汝水又東徑裒信縣故城北而東注矣今息縣東北有褒信廢縣又東至原鹿縣汝水又東南徑縣故城西杜預所釋地曰汝隂有原鹿縣也南入於淮所謂汝口水側有汝口戍淮汝之交㑹也水經注集釋訂訛卷二十一
