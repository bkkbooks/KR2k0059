body:
  text: 水經注集釋訂訛卷十七歸安沈炳巽撰渭水上渭水出隴西首陽縣今陜西臨洮府渭源縣渭谷亭南鳥鼠山尚書傳曰鳥䑕共為雌雄同穴處此山遂名山曰鳥鼠渭水出焉尚書正義曰釋鳥云鳥鼠同穴其鳥為䳜其鼠為鼵李廵曰䳜鼵鳥鼠之名共處一穴天性然也郭璞曰䑕如人家鼠而短尾䳜如鵽而示黄黒色穴入地三四尺鼠在内鳥在外今隴西首陽縣有鳥䑕同穴山渭水出首陽縣首陽山渭首亭南谷山在鳥鼠山西北此縣有髙城嶺嶺上有城號渭源城渭水出焉三川宋本作源合注東北流逕首陽縣西與别源合水出南鳥鼠山渭水出谷尚書禹貢所謂渭出鳥鼠者也地說曰鳥鼠山同穴之枝幹也渭水出其中東北過同穴枝間既言其過明非一水也又東北流而㑹於殊原也渭水東南流逕首陽縣南右得封湲水次南得廣相溪水次東得共谷水左則天馬溪水次南得伯陽谷水並參差翼注亂流東南出矣又北過襄武縣北襄武故城在今隴西縣東南五里元和志渭州襄武縣渭水北自渭源縣界流入廣陽水出西山二源合注成一川東北流注於渭渭水又東南逕襄武縣東北荆頭川水入焉水出襄武西南鳥鼠山荆谷東北逕襄武縣故城北王莽更名相桓漢䕶羗校尉温序行部為隗囂部荀宇所拘衘鬚自刎處也後漢書獨行傳温序字次房太原祁人也建武六年拜䕶羗校尉行部至襄武為隗囂别將荀宇所拘序怒以節撾殺數人乃衘鬚于口回顧左右曰既為賊所迫無令汙鬚上遂伏劍而死其水東北流注於渭渭水常若東南不東北也又東枲水注之水出西南雀富谷東北經襄武縣南東北流入於渭魏志稱咸熈二年襄武上言大人見身長三丈餘跡長三尺一寸魏志作二寸白髮著黄單衣巾柱杖按魏志當作黄巾拄杖呼民王始語云今當太平十二月天祿永終厯數在晉遂遷魏而事晉又東過獂道縣南右則岑溪水次則同水俱左則過水右注之源一作渭水東南逕獂道縣故城西獂道廢縣在今鞏昌府東二十五里昔秦孝公斬西戎之獂王宋本王下尚有於此二字應劭曰獂戎邑也漢靈帝五年郡國志云中平五年分置南安郡此漏中平二字别為南安郡赤亭水出東山赤谷西流逕城北南入渭水渭水又逕城南得粟水水出西南安都谷東北流注於渭渭水又東新興川水出西南鳥鼠山二源合注東北流與彰川合水出西南溪下東北至彰縣南今為漳縣屬平凉府其故城在今縣南五里後魏地形志渭川廣寧郡有彰縣新興縣後漢郡國志作彰縣屬隴西郡水屬道故侯尉治當作本屬故道都尉冶漢志武都郡有故道縣後漢縣之永元元年和帝封耿秉為侯國也按後漢書耿秉傳章和二年拜耿秉為征西將軍封美陽侯與此不同所未詳也萬年川水出南山東北流注之又東北注新興川又東北逕新興縣北晉書地道記南安之屬縣也其水又東北與南川水合出西南山下東北合北疑漏川字水又東北注于渭水渭水又東逕武城縣西新興武城今並在隴西縣界武城川水入焉津源所道出鹿部西山兩源合注東北流逕鹿部南亦謂之鹿部水又東北昌丘水出西南邱下東北注武城水亂流東北注渭水渭水又東入武陽川又有關城川水出安城谷水出北丘川參差注渭水渭水又東與疑當作逕落門西山東流三府谷水注之三川統一東北流注於渭水有落門聚在今伏羗縣西十里伏羗本漢冀縣昔馮異攻落門未拔而薨建武十年来歙又攻之擒隗囂子純隴右平渭水自落門東至黒水峽左右六水夾注左則武陽溪水東得土門谷水俱出北山南流入渭左宋本作右則有温谷次東有故城溪水次東有閭里溪水亦名習溪水次東有黒水並出南山北流入渭水又東出黒水歴冀川又東過冀縣北今為鞏昌府伏羗縣故城在縣東元和志渭水逕伏羗縣北去縣一里渭水自黒水峽至崟峽南北一十水注之北則温谷水注之其水道平襄縣今為鞏昌府秦州南山温溪東北流逕平襄縣南城故襄戎邑也王莽所謂平襄漢志作相縣矣其水東南流歴三堆南又東流而南屈入黄槐川梗津渠冬則輟流春夏水盛則通川注渭次則午谷水南入渭水南有長壍谷水次東有安蒲溪水次東有衣谷水並南出朱圉山山在梧中聚有石鼓不擊自鳴鳴則兵起漢成帝鴻嘉三年天水冀南山有大石自鳴師古曰天水郡之冀縣南山也聲隱隱漢書五行志作隆隆如雷有頃止聞於平襄二百四十里野雞皆鳴石長丈三尺廣厚略等在崕脇漢志作旁著岸脇去地百餘丈漢志作二百餘丈民俗名曰石鼓石鼔鳴則有兵是歲廣漢黜漢志作鉗子攻死囚盜庫兵略吏民衣繡衣自號為仙漢志作山君黨與漫廣漢志作浸廣明年冬伏誅自歸者三千餘人信而有徵其水北逕冀縣城北秦武公十年伐冀戎縣之故天水郡治王莽更名鎮戎漢志作填戎縣曰冀治漢明帝永平十七年改曰漢陽郡城即隗囂稱西伯所居也後馬超之圍冀也凉州别駕閻伯儉潛出水中將告急夏侯淵為超所擒令告城無救伯儉曰大軍方至咸稱萬嵗超怒數之伯儉曰卿欲令長者出不義之言乎遂殺之魏志閻温傳温字伯儉天水西城人也以凉州别駕守上邽令馬超圍凉州所治冀城甚急温夜從水中潛出將告急於夏侯淵為超所擒超解其縛令反謂城中無救温偽許之至城下大呼曰大軍不過三日至城中皆泣稱萬嵗超怒數之温曰夫事君有死無二乃欲令長者出不義之言吾豈苟生者乎超遂殺之渭水又東合冀水水出冀谷次東濁谷水次東有當里谿水次東有託里水次東有渠谷水次東黄土川水俱出南山北逕冀城東而北流注於渭渭水又東出崟峽入新陽川逕新陽下城南溪谷赤蒿二水並出南山東北入渭水渭水又東與新陽崖水合即隴水也東北出隴山隴山在今隴州西北六十里清水縣東北九十里其水西流逕隴右瓦亭南隗囂聞略陽䧟使牛邯守瓦亭即此亭也其水亦出隴山東南流歴瓦亭北又西南合為一水謂之瓦亭川在今秦州境西南流逕清賔溪北又西南與黒水合水出黒城北西南逕黒城西西南流莫吾南川水注之水東北出隴垂西南流歴黒城南注黒水黒水西南出懸鏡峽又西南入瓦亭川又有水自西東㑹世謂之鹿角口又南逕阿陽縣故城東中平元年北地羗胡與邊章侵隴右漢陽長吏盖勲屯阿陽以拒賊即此城也其水又南與燕無水合水源延發東山西注瓦亭水瓦亭水又南左㑹方城川西注瓦亭水瓦亭水又南逕成紀縣東歴長離川謂之長離水右與成紀水合源導西北當亭川東流出破石峽津流遂斷故瀆東逕成紀縣明一統志成紀廢縣在秦州漢置縣屬天水郡晉以後皆因之今省入秦州故帝太皥庖犧所生之處也漢氏以為天水縣王莽之阿陽郡治也又東潛源隱發通之成紀水東南入瓦亭川川水又東南與受渠水相㑹水東出大隴山西逕受渠亭北又西南入瓦亭川川水又西南流歴僵人峽路側巖上有死人僵尸巒穴故岫壑取名焉釋鞍就穴直上可百餘仭石路逶迤劣通劣薄也僅僅不足之辭宋書劉懐貞傳劣通車軸單步僵尸倚窟枯骨尚全唯無膚髪而已訪其川居之士云其鄉中父老作童兒時已聞其長舊傳此當是數百年骸矣其水又西南與略陽川水合水出隴山香谷西西流右則單溪西注左則閣水入焉其水又西歴蒲池郊石魯水出東南石魯溪西北注之其水又西入略陽川西得破社谷水次西得平相谷水又西得金里谷水又西得南室水又西得蹄谷水並出南山北流於略陽城東揚波北注川水又西逕略陽道故城北今陜西漢中府有畧陽縣乃漢沮縣屬武都郡恐非此略陽也此當在鞏昌府界中渥渠水出南山北逕埿峽北入城建武八年中郎將来歙與祭遵所部䕶軍王忠右輔將軍朱寵將二千人皆持鹵刀斧從番須圍中伐樹木開山道至略陽夜襲擊囂拒守將軍金梁等皆殺之因保其城隗囂聞略陽䧟悉衆以攻歙激水灌城光武親將囂走西城世祖與来歙㑹於此後漢書来歙傳建武八年春歙與征虜將軍祭遵襲畧陽遵道病分精兵隨歙合二千餘人伐山開道從番須圍中徑至略陽斬囂守將金梁因保其城囂大驚曰何其神也乃悉兵圍之斬山築隄激水灌城歙與將士固死堅守囂盡鋭攻之自春至秋士卒疲弊帝乃大發關東兵自將上隴囂衆潰走圍解於是置酒髙㑹勞賜歙班坐絶席位諸將之右注曰番須圍中皆地名其水自城北注川一水二川盖囂所堨以灌略陽也川水西得白陽泉又西得蒲谷水西得蒲谷西川又西得龍尾溪水與渭何氏云疑作蒲谷水合俱出南山飛清疑作流北入川水又西南得水洛口水源東導隴山西逕水洛亭西南流又得犢奴水口水出隴山西逕犢奴川又西逕水洛亭南西北注之亂流西南逕石門峽謂之石門水西南注略陽川略陽川水又西北流入瓦亭水瓦亭水又西南出顯親峽石岩水注之水出北山山上有女媧祠庖犧之後有帝女媧焉與神農為三皇矣其水南流注瓦亭水瓦亭水又西南逕顯親縣故城東南在今秦州東南漢封大鴻臚竇固為侯國自石岩次得蝦䗫溪水得金黒水又得宜都溪水咸出左右參差相入瓦亭水又東南合安夷川口水源東出更胡谷西北流歴夷水川與東陽川水㑹謂之取陽交又西得何岩川水又西得羅漢水並自東北西南注夷水夷水又西逕顯親縣南西注瓦亭水瓦亭水又東南得大華谷水又東南得折里溪水又東得六合水皆出近溪湍峽注瓦亭水又東南出新陽峽崖岫壁立水出其間謂之新陽崖水又東南流於渭是也又東過上邽縣渭水東歴縣北封當作邽元和志云渭水在秦州上邽縣北十三里西自伏羗縣界流入按今秦州西南有上邽故城封山本邽山後魏避其主珪嫌名改上邽曰上封山亦随而變山之隂逕固嶺北東南流蘭渠川水出自北山帶佩衆溪南流注於渭渭水東南與神澗水合開山圗所謂靈泉池也俗名之為萬石灣淵深不測實為靈異先後漫遊者多罹其斃渭水又東南得歴泉水北歴泉溪東南流注於渭渭水又東南出橋西亭西又南得藉水口水出西山百澗羣流摠成一川東歴當亭川即當亭縣治也左則當亭水注之右則曾席水又東與大弁州當作川水出西山此處疑有譌脫或當作又東與大弁川水合水出西山二源合注東歴大弁川東南流注於籍水在今秦州南藉水又東南流與竹嶺水合水出南山竹嶺二源同瀉東北入藉水藉水又次東北入上邽縣左佩五水東㑹占溪水次東有大魯溪水次東得小魯谷水次東有楊反谷水咸自北山注離注藉水宋本無離注二字藉水右帶五水竹嶺東得亂石溪水次東得水門谷水次東得羅城溪水次東得山谷水皆導源南山北流入藉水藉水又東黄瓜水注之其水發源黄瓜西谷東流逕黄瓜縣北又東清溪白水左右夾注又東北大旱谷水南出旱溪歴澗北流泉溪委漾同注黄瓜水黄瓜水又東北歴赤谷咸歸於藉藉水又東宋本有合字毛泉谷水又東逕上邽城南又得覈泉水並出南山北流注於藉藉水即洋水也北有濛水注焉水出縣西北邽山翼帶衆流積以成溪東溪宋本作東流南屈逕上邽縣故城西側城南出上邽故邽戎國也秦武公十年伐邽縣之舊天水郡治五城相接北城中有湖水今名天水湖在秦州南七里其水冬夏無增減有白龍出是湖風雨隨之故漢武帝元鼎三年改為天水郡其鄉居悉以板盖屋詩所謂西戎板屋也濛水又南注藉水山海經曰邽山濛水出焉而南流注於洋謂是水也藉水又東得陽谷水又得宕谷水並自南山北入於藉藉水又東合叚溪水出西南馬門溪東北流合藉水藉水又東入於渭渭水又歴橋亭南而入綿諸縣東今西和縣東北五十里有綿諸故城與東亭水合亦謂之為橋水也清水又或為通稱矣水源東發小隴山衆川瀉浪一本作衆川瀉注統成一水西入東亭川為東亭水與小祗大祗二水合又西北得南神谷水三川並出東南差池瀉注又有埋蒲水翼帶二川與延水並西南注東亭水東亭水又西右則暵溝水次西得麴谷水水側出東南二溪西北流注東亭川水右則温谷水出小隴山又西谷水出南北溪西南注東亭川水東亭川水又西得清水口清水導源東北隴山一宋本作二源俱發西南出龍口一作谷合成一水西南流磨細野峽逕清池谷又逕清水縣故城東清水縣今屬鞏昌府王莽之識睦縣矣其水西南合東亭川謂之清水又逕清水城南又西與秦水合水出東北大隴山秦谷二源雙導歴三泉合成一水而歴秦川川有育故亭秦仲所封也秦之為號始自是矣秦水西逕降隴縣故城南按漢志隴縣屬天水郡無所謂降隴縣者降字疑衍又西南自亥松多上下疑有脫文譌字二水出隴山合而西南流逕降隴城北又西南注秦水秦水又西南歴隴川逕六槃口過清水城西南注清清宋本兩清字下俱有水字上下咸謂之秦川又西羗水注焉水北出羗谷引納衆流合以成溪􅢘水星㑹句有譌誤謂之小羗水西南流左長谷水西南注之右則東部水東南入焉羗水南入清水清水又西南得綿諸水口其導源西北諸溪東南與長思水疑漏合字北出思溪南入綿諸水又東南歴綿諸故道北東南入清水清水東南注渭渭水又東南合涇谷水水出西南涇谷之山東北流與横水合水出東南横谷西北逕横水壙上下有譌脫入西北涇谷水亂流西北出注谷峽又西北軒轅谷水注之水出南山軒轅溪南安姚瞻以為黄帝生於天水在上邽原本譌郢城東七十里軒轅谷皇甫謐云生壽邱邱在魯東門北未知孰是也其水北流注涇谷水又西北白城谷溪東北流白娥泉水出其西東注白城水白城水又東北入涇谷水谷水又東北歴董亭下楊難當使兄子保宗鎮董亭即是亭也其水東北流注於渭山海經曰涇谷之山涇水出焉東南流注於渭是也渭水又東伯陽谷水入焉水出刑馬之山伯陽谷北流白水出東南白溪水西北注伯陽水伯陽水又西北歴谷引控羣流北注渭水又東歴大利又東南流猫當作苗地道記云有三危三苗所處故曰苗谷谷水注之涇谷伯陽谷苗谷並在今清水縣界水出南疑當作南出刑馬山北歴平作西疑譌北逕苗谷屈而東逕伯陽城南謂之伯陽川盖李耳西入往逕所由故山原畎谷往往播其名焉渭水東南流衆川瀉浪邊次鳴注左則伯陽東溪水注之次東得望松水次東得毛六溪水次東得皮周谷水次東得黄杜東溪水並出北山南入渭水其右則胡谷水東得丠谷水次東得丠谷東溪水次東有銅岩谷水並出南山東北注渭渭水又東南出石門度小隴山逕南由縣南東與楚水合世所謂長蛇水水出刑項本作汧縣之數歴山也南流逕長蛇戍東魏和平三年築徙諸流民以遏隴冦楚水又南流注於渭闞駰以是水為沂水言宋本作焉又東汧汙二水入焉余按漢地志沂水出汧縣西北元和志秦州清水縣有小隴山一名隴坻又隴州南由縣渭水在縣南四十里按今鳯翔府隴州東南百二十里有南由故城本漢汧縣後魏析置闞駰十三州志與此同復以汧水為龍魚水盖以其津流逕通而更攝其通稱矣水東入散關抱朴子神仙傳曰老子西出關關令尹喜候氣知真人將有西遊者遇老子彊令之著書耳不得已為著道德二經謂之老子書也有老子廟于寳搜神記云老子將西入關關令尹喜好道之士覩真人當西乃要之途也皇甫士安髙士傳云老子為周柱下史及周衰乃以官隱為周守藏室史積八十餘年好無名接何氏云好無名接難解而世莫知其真人也至周景王十年孔子年十七遂適周見老聃此㨿孔子世家而言索隱曰莊子云孔子年五十一南見老耼盖系家亦依此為說而不究其㫖遂俱誤也何者孔子適周豈訪禮之時即在十七耶且孔子見老耼云甚矣道之難行也此非十七之人語乃既仕之後言耳然幽王失其道平王東遷關以捍移人以職徙尹喜候氣非此明矣而往逕所由兹焉或可渭水又東逕西武功北俗以散關城宋本作名非也禇先生乃曰武功扶風西界小邑也蜀口棧道近山無他豪易髙者是也渭水又與其扞水合水疑漏出字周道谷北逕武都故道縣之故城西王莽更名曰善治也故道縣有怒特祠列異傳曰武都故道縣有怒特祠云神本南山大梓也昔秦文公二十七年伐之樹瘡隨合秦文公乃遣四十人持斧斫之猶不斷疲士一人傷足不能去卧樹下聞鬼相與言曰勞攻戰乎其一曰足為勞矣又曰秦公必特一作持不休答曰其如我何又曰赤灰跋於子何如乃黙無言卧者以告令士皆赤衣隨所斫以灰跋樹斷化為牛入水故秦為立祠史記秦本紀文公二十七年伐南山大梓豐大特徐廣曰今武都故道有怒特祠圖大牛上生樹本有牛從木中出後見於灃水之中正義曰括地志云大梓樹在岐州陳倉縣南十里倉山上錄異傳云秦文公時雍南山有大梓樹文公伐之輙有大風雨樹生合不斷時有一人病夜往山中聞鬼語曰秦若使人被髮以朱絲縛樹伐汝汝得不困耶樹神無言明日語聞公如其言伐樹斷有一青牛出走入豐水中其後牛出豐水中使騎擊之不勝有騎墮地復上髪解牛畏之不出故置髦頭漢魏晉因之武都郡立怒特祠是大梓牛神也按今俗畫青牛障是其水又東北歴大散關在今寳雞縣南五十二里通褒斜大路而入渭水也渭水又東而又合南山五溪水諸澗流注之也又東過陳倉縣西今為鞏昌府寳雞縣其故城在縣東二十里有二城相連上城秦文公築下城魏將郝昭築縣有陳倉山山上有寳雞鳴祠昔秦文公咸伯上下疑有譌脫朱云當作文公感伯道之言然此事見于晉太康地志及搜神記而二書中俱無所謂伯道其人不知朱本何據云然之言遊獵於陳倉遇之於此坂得若石焉其色如肝城如上下疑有譌脫朱云一作歸而寳祠之故曰陳寳其来也自東南暉聲若雷野雞皆鳴故曰雞鳴神也史記秦本紀文公十九年得陳寳索隱曰按漢書郊祀志云文公獲若石云於陳倉北坂城祠之其神来若雄雉其聲殷殷云野雞夜鳴以一牢祀之號曰陳寳又臣瓉云陳倉縣有寳夫人祠嵗與葉君神㑹也蘓林云寳如石似肝云語辭里正義曰括地志云寳雞神在岐州陳倉縣東二十故陳倉城中晉太康地志云秦文公時陳倉人獵得獸若彘不知名牽以獻之逄二童子童子曰此名為媦常在地中食死人腦即欲殺之拍捶其首媦亦語曰二童子名陳寳得雄者王得雌者霸陳倉人乃逐二童子化為雉雌上陳倉北坂為石秦祀之搜神記云其雄者飛至南陽其後光武起於南陽皆如其言也地理志曰有上公明星黄帝孫舜妻育冢有羽陽宮秦武王起按漢志右扶風陳倉有上公明星黄帝孫舜妻育冢有羽陽宮秦武王起也應劭曰縣氏陳山姚睦曰黄帝都陳言在此榮氏開山圖注曰伏犧生成起當從宋本作紀下同起徙治陳倉也帝王世紀曰庖犧生於成紀今天水郡有成紀縣魏明帝遣將軍太原郝昭營宋本作築陳倉城成諸葛亮圍之亮使昭鄉人靳詳說之不下亮以數萬攻昭千餘人以雲梯衝車地道逼射昭昭以火射連石拒之亮不利而還今灄水對亮城是與昭相禦處也陳倉水出於陳倉山下東南流注於渭水渭水又東與陽溪合其水上承斜水水自斜谷分注綏陽溪北屇陳倉入渭故諸葛亮與兄瑾書曰有綏陽小谷雖山崕絶重溪水縱横難用行軍者邏候往来要道通人今使前軍斫治此道以向陳倉足以扳連賊勢使不得分兵東行者也渭水又東逕郁夷縣故城南郁夷故城在隴州西五十里地理志曰有汧水祠王莽更之曰郁平也東觀漢記曰隗囂圍来歙於略陽世祖詔曰桃花水出舩槃皆至郁夷陳倉分部而進者也汧水入焉汧水今名汧河在隴州治西南源出汧山流逕汧陽縣至寳雞縣東入渭水出汧縣之蒲谷鄉弦中谷決為弦蒲藪爾雅曰水決之澤為汧汧之為名實兼斯舉水有二源一水出縣西山世謂之小隴山在今隴州西巖嶂髙嶮不通軌轍故張衡四愁詩曰我所思兮在漢陽欲往從之隴坂長其水東北流歴澗注以成淵潭深不測出五色魚俗以為靈而莫敢操宋本作採捕因謂是水為龍魚水自下亦通謂之龍魚川川水東逕汧縣故城北汧縣今為鞏昌府隴州史記秦文公東獵汧田因遂都其地是也史記秦本紀文公三年東獵四年至汧渭之㑹曰昔周邑我先秦嬴於此後卒獲為諸侯乃卜居之占曰吉即營邑之又東歴澤亂為一右曰龍泉泉逕五尺源流舊一作奮通淪漪四泄東北流注於汧汧水又東㑹一水發南山西側俗以此山為吳山三峰霞舉疊秀雲天崩巒傾返山頂相捍望之恒有落勢地理志曰吳山在縣西古之汧山也國語所謂虞矣山下石穴廣四尺髙七尺水溢石空一作穴懸波側注漰漰上疑有脫字漭盪發源穴宋本作成川北流注於汧自水㑹上下咸謂之龍魚川汧水又東南逕隃麋縣故城南在今汧陽縣三十里王莽之扶亭也昔郭歙恥王莽之徵而遁跡於斯建武四年光武封耿沉為侯國矣後漢書耿弇父况為上谷太守與彭寵同擊王郎封隃糜侯此云耿沉誤汧水東南歴慈山東南逕郁夷縣逕平陽故城南史記秦寧公二年徙平陽徐廣曰故郁之平陽亭也城北有漢邠州刺史趙融碑靈帝建安元年立汧水又東流於渭水渭水之右磻溪水在今寳雞縣東南八十里注之水出南山兹谷乗髙激流注於溪中溪中有泉謂之兹泉泉水潭積自成淵渚即呂氏春秋所謂太公釣兹泉也今人謂之几谷石壁深髙幽隍邃宻林障秀阻人迹罕交東南隅有石室盖太公所居也水流次平石釣處即太公垂釣之所也其投竿跽餌兩膝遺跡猶存是有磻溪之稱也其水清泠神異北流十二里注於渭北去維堆城七十里渭水又東逕石源即北原也青龍二年諸葛亮出斜谷與司馬懿屯渭南雍州郭淮䇿亮必爭北原而屯遂先據之亮至渭水又逕五丈原北魏志郭淮傳青龍二年諸葛亮出斜谷並田於蘭坑是時司馬宣王屯渭南淮䇿亮必爭北原宜先據之宣王善之遂屯北原壁壘未成蜀兵大至據此當云亮兵果大至今但云亮至疑有脫譌魏春秋曰諸葛亮據渭水南原司馬懿謂諸將曰亮若出武功依山東轉者是其勇也若西上五丈原諸君無事矣石源五丈原並在郿縣西亮果屯此原與懿相禦渭水又東逕郿縣故城南郿縣故城在今縣東北十五里地理志曰右輔都尉治魏春秋諸葛亮冦郿司馬懿㨿郿拒亮即此縣也水經注集釋訂訛卷十七
