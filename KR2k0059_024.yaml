body:
  text: 水經注集釋訂訛卷二十四歸安沈炳巽撰睢水睢水出梁郡鄢縣睢水出陳留縣西蒗蕩渠東北流地理志曰睢水首受陳留浚儀蒗蕩水也經言出鄢非矣又東徑髙陽故亭北俗謂之陳留北城非也蘇林曰髙陽者陳留北縣也按在留使鄉聚名也有漢廣野君廟碑延熹六年十二月雍丘令董生何氏校隸釋作董之董非氏乃董督之董萇隸釋作長仰餘徽於千載遵茂美於絶代命縣人萇照為文用章不朽之德其略云輟洗分餐咨謀帝猷陳鄭有涿鹿之功海岱無牧野之戰大康華夏綏靜黎物生民以來功盛莫崇今故字當作宇或作事無聞而單碑介立矣陳留風俗傳曰酈氏居於髙陽沛公攻陳留縣酈食其有功封髙陽侯按史漢表及傳酈食其從無髙陽侯之封惟其子疥封髙梁侯豈因此而誤耶有酈俊字文山官至公府掾大將軍商有功食邑于涿故自陳留縣此下有訛誤有鉼亭鉼鄉建武二年世祖封王常為侯國也按後漢書王常傳常于建武二年封山桑侯似與上文無涉詎此句係他處注錯簡于此耶雎水又東徑雍丘縣故城北縣舊杞國也殷湯周武以封夏后繼禹之嗣楚滅杞秦以為縣圈稱曰縣有五陵之名故以氏縣矣城內有夏侯祠昔在二代享祀不輟秦始皇圖築其表為大城而以縣焉睢水又東水積成湖俗謂之白羊陂陂方四十里右則姦梁陂水注之其水上承陂水東北徑雍丘城北又東分為兩瀆謂之雙溝俱入白羊陂陂之東合洛架水口水上承汳水謂之洛架水東南流入于睢水雎水又東徑襄邑縣今歸德府睢州故城北又東徑雍丘城北睢水又東徑寧陵縣故城南故葛伯國也王莽改曰康善矣歷鄢縣北二城南北相去五十里故經有出鄢之文城東七里水次有單父令楊彥尚書郎楊禪字文節兄弟二碑漢光和中立也又東過睢陽縣南今為歸德府睢水又東徑橫城北春秋左傳昭公二十一年樂大心豐愆華牼禦華向於橫杜預曰梁國睢陽縣南有橫亭今在睢陽縣西南世謂之光城蓋光橫聲相近習傳之非也睢水又徑新城北即宋之新城亭也春秋左傳文公十四年公會宋公陳侯衛侯鄭伯許男曹伯晉趙盾盟于新城者也睢水又東徑髙鄉亭北又東徑亳城北南亳也即湯所都矣明一統志亳城在歸德府城東南四十里契父帝嚳都亳湯自商丘遷焉鄭康成云亳今河南偃師縣漢書音義曰濟陰亳縣杜預曰梁國蒙縣皇甫謐曰孟子稱湯居亳與葛為鄰葛即今寧陵縣葛鄉亳乃今穀熟縣也蒙為北亳即昊亳湯受命之地穀熟為南亳湯所都偃師為西亳即盤庚所徙書立政所謂三亳是也古書亡滅未知孰得其真睢水又東徑睢陽縣故城南周武王封微子啓于宋以嗣殷後為宋都也昔宋元君夢江使乘輜車被繡衣而謁于元君元君感衛平之言而求之于泉陽男子余且獻神龜于此矣秦始皇二十二年以為碭郡漢髙祖嘗以沛公為碭郡長天下既定五年為梁國文帝十二年封少子武為梁王太后之愛子景帝寵弟也是以警衛貂飾同天子藏珍積上下疑有脫文按漢書梁孝王傳當作珠玉寶器多于京師多擬京師招延豪傑士咸歸之長卿之徒免官來逰廣睢陽城七十里大治宫觀臺苑屏榭勢並皇居其所經構也役夫流唱必曰睢陽創創疑當作曲按後漢書郡國志睢陽縣注引地道記曰梁孝王築城十二里小鼓唱節杵下而和之稱睢陽曲傳曰朱云當作由此始也城西門即寇先鼓琴處也先好釣居睢水傍宋景公問道不告殺之後十年止此門鼓琴而去宋人家家奉祀之南門曰盧門也春秋華氏居盧門里叛杜預曰盧門宋城南門也司馬彪郡國志曰睢陽縣有盧門亭城內有髙臺甚秀廣巍然介立超焉獨上謂之蠡臺亦曰升臺焉當昔全盛之時故與雲霞競逺矣續述征記曰回道似蠡故謂之蠡臺非也余按闕子漢書藝文志縱橫家有闕子一篇注所引用即是書也稱宋景公使工人為弓九年乃成公曰何其遲也對曰臣不復見君矣臣之精盡于弓矣獻弓而歸三日而死景公登虎圈之臺援弓東面而射之矢踰于西霜之山集于彭城之東餘勢逸徑猶飲羽于石梁然則蠡臺即是虎圈臺也蓋宋世虎牢所在矣晉大和中大司馬桓溫入河命豫州刺史袁真開石門鮮卑垂戍此臺真頓甲堅城之下不果而還晉書桓溫傳太和四年以溫領平北將軍率步騎北伐進次金鄉時亢旱水道不通乃鑿巨野三百餘里以通舟運遂至枋頭先使西中郎袁真伐譙郡開石門以通運譙郡皆平而不能開石軍糧竭盡為慕容垂所追遂致敗績蠡南如南如二字誤疑當作臺之西又有一臺俗謂之女郎臺臺之西北城中有涼馬臺臺東有曲池池北列兩釣臺水周六七百步蠡臺直東又有一臺世謂之雀臺也城內東西道北有晉梁王妃王氏陵表並列二碑碑云妃諱粲字女儀東萊曲城人也齊北海府君之孫司空東武景侯之季女咸熙元年嬪于司馬氏泰始二年妃于國太康五年薨營陵于新蒙之疑有脫文太康九年立碑東即梁王之吹宫疑作臺也基陛階礎尚在今建追明寺故宫東即安梁之舊地也廣周五六百步水列釣臺池東又有一臺世謂之清泠臺北城憑隅又結一池臺晉灼曰或説平臺在城中東北角亦或言兔園在平臺側如淳曰平臺離宫所在今城東二十里有臺寬廣而不甚極髙俗謂之平臺余按漢書梁孝王傳稱王以功親為大國築東苑方三百里廣睢陽城七十里大治宫室為復道自宫連屬於平臺三十餘里復道自宫東出揚州之門左疑當作東出陽門之左陽門即睢陽東門也連屬於平臺則近矣屬之城隅則不能是知平臺不在城中也梁王與鄒枚司馬相如之徒極逰於其上故齊隨郡王山居序所謂西園多士平臺盛賓鄒馬之客咸在伐木之歌屢陳是用追芳昔娛神逰千古故亦一時之盛事謝氏賦雪亦曰梁王不恱逰於兔園今也歌堂淪宇律管埋音孤墓宋本作基塊立無復曩日之望矣城北五六里便得漢太尉橋玄墓冢東有廟即曹氏孟德親酹處操本素微嘗候於玄玄曰天下將亂能安之者其在君乎操感知己後徑玄墓祭云操以頑質見納君子士死知己懷此無忘又承約言徂殁之後路有經由不以斗酒隻雞過相沃酹車過三步腹痛勿怨雖臨時戲言非至親篤好胡肯為此辭哉悽愴致祭以申宿懷冢列數碑一是漢朝羣儒英才哲士感橋氏德行之美乃共刊石立碑以示後世一碑是故吏司徒博陵崔列廷尉河南吳整等以為至德在已揚之由人茍不驕述夫何舍焉蔡中郎集載此碑作荀不皎述夫何考焉乃共勒嘉石昭明芳烈一碑是隴西枹此句上下疑有訛脫罕北次陌碭守長隲為左尉漢陽獂道趙馮孝髙以橋公嘗牧涼州感三綱之義慕將順之節以為公之勳美宜宣舊邦乃樹碑頌以昭令德光和元年主記掾李反宋本作友字仲遼字仲遼作碑文碑陰有石疑作右鼎文建寧三年拜司空又有中鼎文建寧四年拜司徒又有左鼎文光和元年拜太尉鼎銘文曰故臣門人相與述公之行咨度體則文德銘于三鼎武功勒于征鉞書于碑陰以昭光懿又有鉞文稱是用鏤石假象作兹征鉞軍鼓陳之于東階亦以昭公之文武之勳焉廟南列二石柱柱東有二石羊羊北有二石虎廟前東北有石駝駝西北有二石馬皆髙大亦不甚雕飾惟惟字下疑有毁字廟頽構粗傳遺墉石鼓仍存鉞今不知所在睢水於城之陽積而為逢洪陂御覽引此作蓬洪陂陂之西南有陂又東合明水水上承城南大池池周千步南流會睢謂之明水絶睢注渙睢水又東南流歷于竹圃水次緑竹蔭渚菁菁實望世人言梁王竹園也睢水又東徑穀熟縣故城北睢水又東蘄水出焉睢水又東徑粟縣故城北按漢志沛郡有粟縣莽曰成富此云粟縣似是地理志曰侯國也王莽曰成富睢水又東徑太丘縣故城北地理志曰故敬丘也漢武帝元朔三年封魯恭王子節侯劉政為侯國按漢書王子侯表魯恭王子政封瑕丘侯不封敬丘侯按地志瑕丘屬山陽郡敬丘屬沛郡注似誤引漢明帝更從今名列仙傳曰仙人文賓邑人賣鞾履為業矣列仙傳曰文賓太丘人賣草履為業數取嫗數十年輒去之後時故嫗年九十餘續見賓年更壯拜賓問道賓令其至正月朔會鄉亭西社教令服菊花地膚桑寄生松子嫗亦更壯睢水又東徑芒縣故城北太丘及芒縣今俱為歸德府永城縣漢髙帝六年封耐跖為侯國史記表作耐昭徐廣曰一作起漢表作跖王莽之傳治世祖改曰臨睢城西二里水南有豫州從事皇育碑殞身州牧陰君之罪時年二十五臨睢長平輿平輿屬汝南郡李君二千石丞輪氏輪氏縣名屬潁川郡夏文則髙其行而悼其殞州國咨嗟旌閭表墓昭敘令德式示後人城內有臨睢長左馮翊王君碑善有治功纍遷廣漢屬國都尉吏民思德縣人公府掾陳盛孫郎中兒定興劉伯鄜等共立石表政以刊逺績縣北與碭縣分水有碭山芒碭縣之間山澤深固多懷神智有仙者涓子主柱並隱碭山得道涓子主柱二仙名按列仙傳云涓子齊人也餌术接食其精至三百年乃見于齊隱于碭山能致風雨受伯陽九仙法主柱者與道士共上碭山餌丹砂三年得神砂飛雪服之五年能飛行漢髙祖隱之吕后望氣知之即於是處也京房易候曰何以知賢人隱師曰視四方常有大雲五色具而不雨其下賢人隱矣又東過相縣南屈從城北東流當蕭縣南入于睢相縣故宋地也秦始皇二十三年以為泗水郡漢髙帝四年改曰沛郡治此漢武帝元狩六年封南越桂林監居翁索隱曰監官也居姓翁字為侯國曰湘成也按史記表索隱曰漢表在堵陽漢書功臣表亦云在堵陽按堵陽縣屬南陽郡則湘成乃堵陽之鄉名恐非沛郡之相縣也注似誤引王莽更名郡曰吾符縣曰吾符亭也睢水東徑石馬亭亭西有漢故伏波將軍馬援墓睢水又東徑相縣故城南宋恭公之所都也國府園中猶有伯姬黃堂基堂夜被火左右曰夫人少避伯姬曰婦人之義保傅不具夜不下堂遂遇火而死斯堂即伯姬燌死處也城西有伯姬冢昔鄭渾為沛郡太守於蕭相二縣興陂堰民賴其利刻石頌之號曰鄭陂睢水又左合白瀆水水上承梧桐陂陂側有梧桐山陂水西南流徑相城東而南流注于睢睢盛則北流入于陂陂隘則西北注于睢出入回環更相通注故經有入睢之文睢水又東徑彭城郡之靈壁東東南流漢書項羽敗漢王于靈壁東即此處也又云東逼穀泗服虔曰水名也在沛國相界又詳睢水徑穀熟兩分而睢水為蘄水故二水所在枝分通為兼稱穀水之名蓋因地變然則穀水即睢水也又云漢軍之敗也睢水為之不流睢水又東南徑竹縣故城南地理志曰王莽之篤亭也李奇曰今竹邑縣也睢水又東與滭湖水合水上承災丘縣之渒陂南北百餘里東西四十里東至朝解亭西屆彭城災丘縣之故城東王莽更名之曰善丘矣其水自陂南系于睢水睢水又東南八丈故溝水注之水上承蘄水而北會睢水又東徑符離縣故城北漢武帝元光四年按史記表是元狩四年封路博德為侯國王莽之符合也睢水東徑臨淮郡之取慮故城北昔汝南步逰張少失其母及為縣令遇母於此乃使良馬踟蹰輕軒罔進顧訪病姬乃其母也誠願宿憑而冥感昭徵矣睢水又東合烏慈水水出縣西南烏慈渚潭漲東北流與長直故瀆合溝舊上承蘄水北流八十五里注烏慈水烏慈水又東徑取慮縣南又東屈徑其城東而北流注于睢睢水又東徑睢陵縣故城北漢武帝元朔元年封江都易王子劉楚為侯國史漢表俱作劉定國江都易王子亦無名楚者此云劉楚誤王莽之睢陵也按漢志當作睢睦睢水又東與潼水故瀆會舊疑作水上承潼縣西南潼陂東北流徑潼縣按漢志臨淮郡有僮縣無潼縣此云潼未詳故城北又東北徑睢陵縣下會睢睢水又東南流徑下相縣故城南髙祖十三年髙祖無十三年當是十二年封莊侯冷耳為侯國應劭曰下相水出沛國相縣故此加下也然則下相又是睢水之别名也東南流入于泗謂之睢口經止蕭縣非也所謂得其一而亡其二矣瓠子河出東郡濮陽縣北河今山東東昌府濮州治縣北十里即瓠河口也尚書禹貢雷夏既澤雍沮會同爾雅曰水自河出為雍許慎曰雍者河雍水也暨漢元光之年河水南決漂害民居武帝元封二年上使汲仁郭昌發卒數萬人塞瓠子決河於是上自萬里沙還臨決河沈白馬玉璧令羣臣將軍以下皆負薪填決河上悼功之不成乃作歌曰瓠子決兮將奈何殫為河兮地不寧功無已時兮吾山平吾山平兮巨野溢魚沸鬱兮柏冬日正史記作延道施兮離常流蛟龍騁兮放史記作方逺逰歸舊川兮神哉沛不封禪兮安知外皇史記作為謂河公史記作伯兮何不仁泛濫不止兮愁苦史記作吾人齧桑浮兮淮泗滿久不反兮水唯緩一曰河湯湯兮激潺湲北渡回史記作迃兮迅流難搴長旌史記作茭兮湛美玉隤林竹兮楗石葘宣防塞兮萬福來於是卒塞瓠子口築宫於其上名曰宣房宫水宋本作故亦謂瓠子堰為宣房堰而水亦以瓠子受名焉平帝已後未及修理河水東浸日月彌廣永平十二年顯宗詔樂浪人王景治渠築堤起自滎陽東至千乘一千餘里景乃防遏衝要疏決壅積瓠子之水絶而不通唯溝瀆存焉河水舊東河徑濮陽城東北故衛也帝顓頊之墟昔顓頊自窮桑徙此號曰商丘或謂之帝丘本陶唐氏火正閼伯之所居亦夏伯昆吾之都殷之相相下疑有土字又都之故春秋傳曰閼伯居商丘相土因之是也衛成公自楚丘遷此秦始皇徙衛君角於野王置東郡治濮陽縣濮水徑其南故曰濮陽也沛公守濮陽環之以水張晏曰依河水自固春秋僖公十三年夏會于鹹杜預曰東郡濮陽縣東按左傳杜注東下有南字有咸杜注作鹹城者也是瓠子故瀆又東徑桃城南春秋傳曰分曹地自洮盡曹地也今甄城西南五十里有桃城或謂之洮也瓠瀆又東南徑清丘北春秋宣公十二年經書楚滅蕭晉人宋衛曹同盟于清丘京相璠曰在今東郡濮陽縣東南三十里魏都尉治東至濟隂句陽縣為新溝句陽縣故城在今兗州府曹縣北三十里漢志濟陰郡句陽縣應劭曰左氏傳句瀆之丘也師古曰音鈎瓠河故瀆又東徑句陽之小成陽城北宋本無此二字城北側瀆帝王世紀曰堯葬濟陰成陽西北四十里是為穀林墨子以為堯堂髙三尺土階三等北教八狄道死葬蛩山之陰山海經曰堯葬狄山之陽一名崇山二説各殊以為成陽近是堯冢也余按小成陽在成陽西北一作南半里許實牛疑作中俗唁以為囚堯城汲冢瑣語舜放堯于平陽續述征記云小成陽在陽城西南半里許俗云囚堯城括地志引竹書云昔堯末年德衰為舜所囚故濮州鄄城縣東北十五里有囚堯城士安蓋以是為堯冢也漢志成陽縣有堯冢瓠子北有都關縣故城縣有羊里亭瓠河徑其南為羊里水蓋資城地而變名由經有新溝之異稱矣黃初中賈逵為豫州刺史與諸將征吳於洞浦有功魏封逵為羊里亭侯魏志賈逵傳逵征吳破吕範于洞浦進封陽里亭侯今云羊里未詳邑四百户即斯亭也俗名之羊子城非也蓋韻近字轉耳又東右原本訛石會濮水之津水上承濮渠東徑鉏丘城南京相璠曰今濮陽城西南十五里有沮兵城以下疑有訛誤六國時沮楚同以為楚丘非也又東徑浚城南而北去濮陽三十五里城側有寒泉岡即詩所謂爰有寒泉在浚之下世謂之髙平渠非也京相璠曰濮水故道在濮陽南者也又東徑句陽縣西句瀆出焉濮水枝渠又東北徑句陽縣之小成陽縣故下疑有城字東垂亭西而北入瓠河地理志曰濮水首受泲於封丘縣東北至都關入羊里水者也又按地理志山陽郡有都關縣今其城在廩丘城西考地志山陽廩丘俱屬濟陰則都關無隸山陽理又按地理志郕都亦是山陽之屬縣矣而東杜疑有訛字朱云當作京相考地驗城又並言在廩丘城南推此而論似地志之悮矣或亦疆理參差所未詳瓠瀆又東徑垂亭北春秋隱公八年宋公衛侯遇于犬丘經書垂也京相璠曰今濟陰句陽縣小城陽東五里有故垂亭者也又東北過廩丘縣為濮水廩丘故城在今東昌府范縣義東堡瓠河又左徑雷澤北其澤藪在大成陽縣故城西北一十餘里昔華胥履大迹處也其陂東西二十餘里南北一十五里即舜所漁也澤之東南即成陽縣故下疑有城字史記曰武王封弟季載於成應劭曰其後乃遷于成之陽故曰成陽也地理志曰成陽有堯冢靈臺今成陽城西二里有堯陵堯陵在今兗州府東平州東北三十里陵南一里有堯母慶都陵於城為西南稱曰靈都何氏校隸釋作臺鄉曰崇仁邑號修義皆立廟四周列水潭而不流水澤通泉泉不耗竭至豐魚筍不敢採捕前並列數碑枯疑作枯柏數株檀馬朱云檀馬字訛或謂檀與駮馬也詩疏云駮馬梓榆也諺曰斫檀不諦得繫迷繫迷尚可得駮馬言三木相似也按此説似屬支離恐不可從成林二陵南北列馳道徑通皆以磚砌之尚修整堯陵東城西五十餘步中山夫人祠堯妃也石壁階墀仍舊南西北三面長櫟聫蔭扶疏里餘中山夫人祠南有仲山甫冢仲山甫墓在今東昌府廢雷縣西北冢西有石廟羊虎傾低破碎略盡於城為西南在靈臺之東北按郭緣生述征記自漢迄晉二千石及丞尉多刊石述敘堯即位至永嘉三年二千七百二十有一載記于堯妃見漢建寧四年五月成陽令管遵所立碑文云堯陵北山甫墓南二冢間伍員祠晉大安中立一碑是永興中建今碑祠並無處所又言堯陵在城南九里中山夫人祠在城南二里東南六里堯母慶都冢堯陵北二里有仲山甫墓考地驗狀咸為疏僻蓋聞疑書疑耳雷澤西南十許里有小山孤立峻上亭亭嵥峙謂之歷山山北有小阜南屬池澤之東北有陶墟明一統志作姚墟在濮州東南九十里緣生言舜耕陶所在墟阜聨屬瀆帶宋本作濱帶瓠河也鄭元曰歷山在河東今有舜井皇甫謐或言今濟陰歷山是也與雷澤相比余謂鄭元之言為然故揚雄河東賦曰登歷觀而徑望兮聊浮遊于河之巖今雷首山西枕大河校之圖緯於事為允士安又云定陶西南陶丘舜也疑訛不言在此緣生為失瓠河之北即廩丘縣也王隱晉書地道記曰廩丘者春秋之所謂齊邑矣實表東海者也竹書紀年晉烈公十一年田悼子卒田布殺其大夫公孫今竹書作公孫孫下同公孫以廩丘叛于趙田布圍廩丘翟角趙孔屑韓師竹書作氏救廩丘及田布戰于龍澤田師敗遁竹書作逋是也瓠河與濮水俱東流經所謂過廩丘為濮水者也縣南瓠北有羊角城在今兗州府范縣義東堡春秋傳曰烏餘取晉羊角遂襲我髙魚天大雨自竇入介其庫登其城尅而取之者也京相璠曰衛邑也今東郡廩丘縣南有羊角城今魯邑也今廩丘東北有故髙魚城俗謂之交魚城謂羊角為角逐城皆非也瓠河又徑陽晉城南史記蘇秦説齊曰過衛陽晉之道徑于亢父之嶮者也今陽晉城在廩丘城東南一十餘里與都關為左右也張儀曰秦下甲攻衛陽晉大關天下之胸徐廣史記音義云關一作開東之亢父則其道矣瓠河之北又有郕都城故城在兗州府汶上縣北二十里春秋隱公三年郕侵衛京相璠曰東都廩丘縣南三十里有故郕都地理志曰山陽鄉也禇先生曰漢封金安上為侯國按史表金安上封都成侯索隱曰屬潁川此注敘郕都按志屬山陽郡似非金安上所封不詳所謂王莽更名之曰城穀者也瓠河又東徑黎縣故城南王莽改曰黎治矣孟康曰今黎陽也薛瓚言按黎陽在魏郡非此黎陽也世謂黎侯城昔黎侯陽寓于衛詩所謂胡為乎泥中毛云泥中邑名疑此城也土城汙下城居小阜魏濮陽郡治也瓠河又東徑秺縣故城南地理志曰濟陰之屬縣也禇先生曰漢武帝封金日磾為侯國王莽之萬歲矣世猶謂之為萬歲亭也瓠河又東徑鄆城南春秋左傳成公十六年公自沙隨還待于鄆京相璠曰公羊作運字今東都廩丘縣東八十里有故運城即此城也今鄆城縣屬兗州又北過東郡范縣今屬東昌府東北為濟渠與將渠合瓠河自運城東北徑范縣與濟濮枝渠合故渠上承濟瀆於乘氏縣北徑范縣左納瓠瀆故經有濟渠之稱又北與將渠受河於范縣西北東南徑秦亭南杜預釋地東平范縣西北有秦亭也又東南徑范縣故城南王莽更名建陸漢志作睦也漢興平中靳允為范令曹太祖東征陶謙於徐州張邈迎吕布郡縣響應程昱説允曰君必固范我守東阿田單之功可立即斯邑也將渠又東會濟渠自下通謂之將渠北徑范城東俗又謂之趙溝非也又東北過東阿縣東今屬兖州府東平州瓠河故瀆又東北左合將渠枝瀆上承將渠於范縣東北徑范縣北又東北徑東阿城南而東入瓠河故瀆又北徑東阿縣故城東春秋經書冬及齊侯盟于柯左傳曰冬盟于柯始及齊平杜預曰東阿即柯邑也按國語曹沫挾匕首劫齊桓公返遂邑于此矣又東北過臨邑縣西今屬濟南府又東北過荏平縣今屬東昌府東為鄧里渠自宣防即宣房防房古通已下將渠已上無復有水將渠下水首受河自北為鄧里渠又東北過祝阿縣今為濟南府齊河縣及禹城縣為濟渠河水自泗口出為濟水濟水二瀆合而東注于祝阿也又東北至梁鄒縣西分為二脈水尋梁鄒濟無二流蓋經之誤其東北者為濟河其東者為時水又東北至濟西濟河東北入于海時水東至臨淄縣西屈南過太山華縣東又南至費縣今屬兗州府東入于沂時即耐水也音而春秋襄公三年齊晉盟于耐者也京相璠曰今臨淄唯有澅水西北入泲即地理志曰如水矣耐如聲相似然則澅水即耐水也蓋以澅與時合得通稱矣時水自西安城西南分為二水枝津别出西流德會水注之水出昌國縣黃山西北流徑昌國縣故城南昔樂毅攻齊有功燕昭王以是縣封之為昌國君德會水又西北五里泉水注之水出縣南黃阜北流徑城西北入德會又西北世謂之蒼浪溝又北流注時水地理志曰德會水出昌國西北至西安入洳是也時水又西徑東髙苑城中而西注也俗人遏令側城南注又屈其城南史記漢文帝十五年分齊為膠西王國都髙邑徐廣音義曰樂安有髙苑城故俗謂之東苑也其水又北注故瀆又西蓋野溝水注之源導延鄉城東北平地出泉西北徑延鄉城北地理志曰千乘有延鄉縣世人謂故城為從城延從字相似讀隨字改所未詳也西北流世謂之蓋野溝又西北流徑髙苑縣漢志作髙宛今屬青州府北注時水時水又西徑西髙苑縣故城南漢髙帝六年封丙猜為侯國史記表作丙倩王莽之常鄉也其水側城西注京相璠曰今樂安博昌縣今為青州府博興縣南界有時水西通濟其上源出盤陽北至髙苑下有死時中無水杜預亦云時水於樂安枝流旱則竭涸為春秋之乾時也左傳莊公九年齊魯戰地魯師敗處也時水西北至梁鄒城入于泲非泲入時蓋時來注泲若泲分東流明不得以時為名尋時泲更無别流南延華費之所斯為謬矣汶水出太山萊蕪縣今屬濟南府原山西南嬴縣南萊蕪縣在齊城西南原山又在縣西南六十許里地理志汶水與淄水俱出原山西南入泲故不得過其縣南也原山在今萊蕪縣東北七十里東接益都西接章丘北接淄川縣界髙聳出羣山之上亦名馬耳山魏收志嬴縣有馬耳山汶水所出則馬耳即原山矣今又名嶽陽山從征記曰汶水出縣西南流又言自入萊蕪谷夾路連山百數里水隍多行石澗中出草藥饒松柏林藿綿濛崖壁相望或傾岑阻徑或回巖絶谷清風鳴條山壑俱響凌髙降深兼惴栗之懼危溪絶徑過懸度之艱未出谷十餘里有别谷在孤山谷有清泉泉上數丈有石穴二口容人行入穴丈餘髙九尺許廣四五丈言是昔人居山之處薪㸑煙墨猶存谷中林木緻密行人鮮有能至矣又有少許山田引灌之蹤尚存出谷有平丘面山傍水土人悉以種麥云此丘不宜殖稷黍而宜麥齊人相承以殖之意謂麥丘所栖愚公谷也何其深沉幽翳可以託業怡生如此也余時徑此為之踟蹰為之屢眷矣余按麥丘愚公在齊川谷猶傳其名不在魯蓋志者之謬耳汶水又西南徑嬴縣故城南城今在萊蕪縣西北春秋左傳桓公三年云會齊侯于嬴博婚于齊也按左傳云會齊侯于嬴成昏于齊也無博字今云會于嬴博似誤又東南過奉髙縣北今泰安府東有奉髙廢縣奉髙縣漢武帝元封元年立以奉太山郡治也縣北有吳季札子墓在汶水南曲中季札之聘上國也喪子於嬴博之間即此處也從征記曰嬴縣西六十里有季札兒冢冢圓其髙可隱也前有石銘一所漢末奉髙令所立無所述敘標志而已自昔恆蠲民户灑掃之今不能然碑石糜碎靡有遺矣故惟趺存焉屈從縣西南流汶出牟縣故城西南阜下俗謂之胡盧堆今萊蕪縣東有牟縣故城牟汶水在縣南門外西流至泰安州東入汶淮南子曰汶出弗其髙誘曰山名也或斯阜也牟縣故城在東北古牟國也春秋時牟人朝魯故應劭曰魯附庸也俗謂是水為牟汶也又西南徑奉髙縣故城而西南流注于汶汶水又南右合北汶今泰安州南有泮水出泰山分水嶺考其源流蓋即北汶也水出分水溪源與中川分水東南流徑太山東合天門下溪水水出太山天門下谷東流古者帝王升封咸憩此水水上往往有石竅存焉蓋古設舍所跨處也馬第伯書云光武封太山第伯從登山去平地二十里南向極望無不覩其為髙也如視浮雲其峻石壁窅條仰視巖石松樹鬱鬱蒼蒼如在雲中俯視溪谷碌碌不可丈尺直上七十里天門仰視天門如從六中視天矣朱云今封禪儀記曰不可丈尺遂至天門之下仰視天門窔遼如從穴中視天直上七里賴其羊腸逶迤名曰環道往往有絙索可得而登也應劭漢官儀云太山東南山頂名曰日觀者雞一鳴時見日始欲出長三丈許故以名焉其水自溪而東濬波注壑東南流龜陰之田龜山在博縣北一十五里昔夫子傷政道之陵遲故望山而懷操故琴操有龜山操焉山北即龜陰之田也春秋定公十年齊人來歸龜陰之田是也又合環水水出太山南溪南流歷中階兩廟間從征記曰太山有下中上三廟墻闕嚴整廟中柏樹夾兩階大二十餘圍蓋漢武所植也赤眉嘗斫一樹見血而止今斧創猶存門閣三重樓榭四所三層壇一所髙丈餘廣八尺樹前有大井極香冷異於凡水不知何代所掘不嘗浚泄而水旱不減庫中有漢時故樂器及神車木偶皆靡密巧麗又有石虎建武十三年永貴侯張余上金馬一匹髙二尺餘形制甚精中廟去下廟五里屋宇又崇麗於下廟廟東西夾澗上廟在山頂即封禪處也共疑作其水又屈而東流入于汶水上疑有汶字水又東南流徑南明堂下漢武帝元封元年封太山降坐明堂於山之東北址武帝以古處嶮狹而不顯也按封禪書云天子封太山太山東北趾古時有明堂處處險不敞上欲治明堂奉髙傍未曉其制度云云較此似明欲治明堂於奉髙傍而未曉其制濟南人公玉帶上黃帝時明堂圖圖中有一殿四面無壁以茅蓋之通水圜宫垣為復道上有樓從西南入名曰崑崙天子從之入以拜祀上帝焉於是上令奉髙作明堂於汶水如帶圖也右引水為璧雍處基瀆存焉世謂此水為石汶山海經曰環水出泰山東流注于江郭注云一作海即此水也環水又左入于汶水汶水又西南流徑徂徠山西在泰安府東南四十里山多松柏詩所謂徂徠之松也廣雅曰道梓松也抱朴子稱玉策記曰千歲之松中有物或如青牛或如青犬或如人皆夀萬歲又稱天陵有偃蓋之松也所謂樓松也魯連子曰松樅髙千仞而無枝非憂正一作王實疑訛宋本作室之無柱也爾雅曰松葉柏身曰樅鄒山記曰徂崍山在梁甫奉髙博三縣界猶有美松亦曰尤崍之山也赤眉渠帥樊崇所堡也故崇自號尤崍三老矣山東巢父廟山髙十里山上有陂水方百許步三道流注一水東北沿溪而下屈徑縣南西北流入于于下疑有汶字一水北流歷澗西流入于汶一水南流徑陽關亭南春秋襄公十七年逆臧紇自陽關者也又西流入于汶水也過博縣西北汶水南徑博縣故城東城在泰安府東南漢置唐改曰乾封春秋哀公十年會吳伐博者也灌嬰破田橫於城下屈從其城南西流不在西北也汶水又西南徑龍鄉故城南春秋成公二年齊侯圍龍龍囚頃公嬖人盧蒲就按左傳當有魁字殺而膞諸城上齊侯親鼓取龍者也漢髙帝八年封謁者陳署為侯國汶水又西南徑亭亭山東在泰安府南五十里郡國志巨平縣有亭禪山注云即古所禪亭亭者也黃帝所禪也山有神廟水上有石門舊分水下溉處也汶水又西南徑陽關故城西本有平縣之陽關亭矣有平當作巨平郡國志巨平縣有陽關亭春秋襄公十七年逆臧紇自陽關者也陽虎據之以叛伐之虎焚萊門而奔齊者也汶水又南左會淄水水出太山巢父縣東巢父當作梁父漢志泰山郡有梁父縣西南流徑菟裘城北春秋隱公十一年營之公謂羽父曰吾將歸老焉故郡國志曰梁父有菟裘聚淄水又徑梁父縣故城南縣北有梁人山開山圖曰太山在左亢父在右亢父知疑作主生梁父主死王者封太山禪梁甫故縣取名焉淄水又西南徑柴縣故城北地理志曰太山之屬縣也世謂之柴汶矣淄水又徑郕北錐指引此作又徑成邑北漢髙帝六年封董泄為侯國史表董泄亦封成侯本郕省作成也今汶上縣二十里有郕國城春秋齊師圍郕郕人伐齊飲馬於斯水也昔孔子行於郕之野遇榮啓期於是衣鹿裘被髮鼓琴歌三樂之歡夫子善其能寬矣列子榮啓期曰萬物惟人為貴吾得為人一樂也男女之别男尊女卑吾得為男二樂也人生有不見日月不免襁褓者吾行年九十餘是三樂也淄水又西徑陽關城南西流注於汶水今按泰安府南有廢柴縣及梁父故城西南有陽關城柴汶水在府東三十里俗名司馬河汶水又南徑巨平縣故城東城在泰安府西南而西南流城東有魯道詩所謂魯道有蕩齊子由歸者也今汶上夾水有文薑臺汶水又西南流詩云汶水滔滔矣淮南子曰貉渡汶則死天地之性倚伏難尋固不可以情理窮也汶水又西南徑魯國汶陽縣北王莽之汶亭也縣北有曲水池亭春秋桓公十二年經書公會杞侯莒子于曲池左傳曰平杞莒也故杜預曰魯國汶陽縣北有曲水亭漢章帝元和三年東巡太山立行宫於汶陽後漢書章帝紀元和二年二月辛未幸泰山柴告岱宗壬申宗祀五帝于汶上明堂注曰上作明堂于汶上如公玉帶之圖焉今云三年誤執金吾耿恭恭衍屯城門于汶上基塹存焉世謂之闕陵城也汶水又西徑汶陽縣故城北城在今寧陽縣東北而注下疑有脫字又西南過蛇丘縣南今肥城縣南有蛇丘故城本魯蛇淵囿漢置縣汶水又西洗水出焉朱云洗水當作洸水見二十五卷出當作注又西徑蛇丘縣南縣治鑄鄉故城春秋左傳宣叔娶于鑄是也杜預曰濟北蛇丘縣所治鑄鄉城者也又西南過岡縣北在今寧陽縣境漢志作剛屬泰山郡又定陶縣東北亦有剛城見明一統志地理志鄉故闡也王莽更之曰柔也應劭曰春秋經書齊人取歡及闡亭是也杜預春秋釋地曰闡在岡縣北岡城東有一小亭今岡縣治俗人又謂之關亭京相璠曰岡縣西四十里有闡亭未知孰是汶水又西蛇水注之水出縣東北太山西南流徑汶陽之田齊所侵也自汶之北平暢極目僖公以賜季友蛇水又西南徑鑄城西左傳所謂蛇淵囿也故京相璠曰今濟北有蛇丘城城下有水魯囿也俗謂之濁須水非矣蛇水又西南徑夏暉城南經書公會齊侯于下歡是也今俗謂之夏暉城蓋春秋左傳桓公三年公子翬如齊齊侯送薑氏于下歡非禮是也世有夏暉之名矣蛇水又西南入汶汶水又西溝水注之水出東北馬山西南流徑棘亭南春秋成公三年經書秋叔孫僑如帥師圍棘左傳曰取汶陽之田棘不服圍之南去汶水八十里又西南徑遂城東地理志曰蛇丘遂鄉按志作隧故遂國也春秋莊公十三年齊滅遂而戍之者也京相璠曰遂在蛇丘東北十里杜預亦以為然然縣東北無城以礙之今城在蛇丘西北蓋杜預傳疑之非也又西徑下歡城西而入汶水汶水又西徑春亭北考古無春名唯平陸縣有崇陽亭然是東去岡城四十里進一作推璠所注則符並所未詳也又西南過平章縣南今東平州東有章縣故城漢志東平國有章縣而無平章縣疑當作東平章縣南地理志曰東平國故梁也景帝中和六年景帝時未有年號何得云中和當是中六年别為濟東國武帝元鼎元年為大河郡宣帝甘露二年為東平國王莽之有鹽也按世本章縣任姓之國也齊人降章者也故在無鹽城東北五十里汶水又西南有泌水注之水出肥縣東北自源西南流徑肥城縣故城南樂正子春謂其弟子曰子適齊過肥肥有君子焉左徑句窳亭北章帝元和二年鳳皇集肥城句窳亭復其租而巡太山即是亭也泌水又西南徑富城縣故城西王莽之城當作成富也其水又西南流注于汶汶水又西南徑桃鄉縣故城西城在今汶上縣東北四十里王莽之鄣亭也世以此為鄣城非蓋因巨新之故目耳又西南過無鹽縣南又西南過夀張縣北又西南至安民亭入于濟汶水自桃鄉四分當其𣲖别之處謂之四汶口其左二水雙流西南至無鹽縣之郈鄉城南故城在今沂州東三十六里魯叔孫昭伯之故邑也禍及何氏云及字疑鬭雞矣左傳昭公二十五年季郈之雞鬭季氏芥其雞郈氏為之金距平子怒益宫于郈氏且讓之故郈昭伯亦怨平子春秋左傳定公十二年叔孫氏墮郈今其城無南面汶水又西南徑其當作東漢志東平國有東平陸縣平陸縣故城北應劭曰古厥也今有厥亭汶水又西徑危山南世謂之龍山也漢書五行志按此事見漢書東平王傳非出五行志報山作瓠山師古曰瓠山謂其形似瓠耳曰哀帝時無鹽危山土自起覆草如馳道狀又報山石轉立晉灼曰漢注作報山山脅石一丈轉側起立髙九尺六寸旁行一丈髙四尺東平王雲及后謁自之石所祭治石象報山立石束倍草并祠之建平三年息夫躬告之王自殺后謁棄市國除漢書石立宣帝起之表也汶水又西合為一水西南入茂都澱澱陂水之異名也澱水西南出謂之巨野溝又西南徑致密城南郡國志曰須昌縣又致密城古中都也即夫子所宰之邑矣制養生送死之節長幼男女之禮路不拾遺器不雕偽矣巨野溝又西南入桓公河北水西出澱謂之巨良水西南徑致密城北西南流注洪瀆次一汶西徑郈亭北又西至夀張故城東遂為澤渚初平三年曹公擊黃巾於夀張東鮑信戰死於此其右一汶西流徑無鹽縣之故地南城在今東平州東三十里舊宿國也齊宣后之故邑所謂無鹽醜女也漢武帝元朔四年封城陽恭王子劉慶為東平侯即此邑也王莽更名之曰有鹽亭汶水又西徑洽鄉城南地理志曰所謂無鹽有洽鄉者也汶水西南流徑夀張縣故城北城在今東平州西南春秋之良縣也縣有夀聚漢曰夀良應劭曰世祖叔母名良故光武改曰夀張也建武十五年世祖封樊宏為侯國汶水又西南長直溝水注之水出須昌城東北穀陽山南徑須昌城東又南漆溝水注焉水出無鹽城東北五里阜山下西徑無鹽縣故城北水側有東平憲王蒼冢碑闕存焉元和三年按章帝紀是二年章帝幸東平祀以太牢親拜祠坐賜御劍於陵前其水又西流注長直溝溝水竒分為二一水西徑須昌城南入浦一水南流注于汶汶水又西流入浦故淮南子曰汶出弗其西流合浦按淮南子作汶出弗其流合于濟髙誘曰弗其山名在朱虛縣東余按誘説是乃東汶非經所謂入沛當作泲者也蓋其誤證耳禹貢錐指以今輿地言之汶水自萊蕪歷泰安肥城寧陽至東平入濟合流以注于海此禹迹也逮元人引汶絶濟為會通河明永樂中又築戴村壩遏汶水盡出南望以資運而安山又濟之故道填淤久矣元和志乾封縣界有五汶源别而流同五汶者曰北汶嬴汶柴汶牟汶其一則經流也四汶口乃下流岐分處不在五汶之數按酈注無嬴汶嬴在今萊蕪縣南三十里源出宫山之陰流合牟汶宫山者新甫之别名也山在新泰縣西北泮水源出泰山分水嶺即北汶州志謂之塹汶在今泰安州南五汶之外有小汶在州東南七十里源出宫山流徑徂徠山南又西入汶水謂之大汶口也嬴汶流合牟汶故酈注不言五汶以小易嬴斯為當矣又有水出萊蕪縣寨子村流合牟汶者近志指為浯汶據漢志琅琊靈門縣有髙柘山浯水所出東北入濰説文云水出靈門山世謂之浯汶浯水合東汶入汶故有此名在今莒州界與萊蕪無涉志妄言耳東汶出朱虛縣小太山北流至淳于縣入濰在今臨朐安丘界淮南子曰汶出弗其西流入濟髙誘云弗其山名在朱虛縣東即入濰之東汶言入濟者淮南之誤水經注集釋訂訛卷二十四
