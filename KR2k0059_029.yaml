body:
  text: 水經注集釋訂訛卷二十九歸安沈炳巽撰沔水下潛水湍水均水粉水白水泚水沔水又東過襄陽縣北沔水又東徑方山北方山一名萬山元和志云萬山一名漢臯山在襄陽縣西十一里與南陽鄧縣分界明一統志萬山在襄陽府城西十里襄沔記以紫蓋山萬山峴山為三峴山上有鄒恢碑按晉書郗鑒傳鍳之孫恢嘗鎮襄陽甚得關隴之和降附者動以千計此碑必郗恢所立誤作鄒恢耳魯宗之所立也山下潭中有杜元凱碑元凱好尚後名作兩碑並述已功一碑沉之峴山水中一碑下之於此潭曰百年之後何知不深谷為陵也晉書杜預傳預好為身後名刻石為二碑紀其勳績一沉萬山之下一立峴山之上曰馬知此後不為陵谷乎今云二碑俱沉水中恐誤山下水曲之隈云漢女昔遊處也故張衡南都賦曰遊女弄珠於漢臯之曲漢臯即方山之異名也沔水又東合檀溪水明一統志檀溪在襄陽府城西四里漢昭烈乘的盧西走至此溪一躍而過今已涸水出縣西柳子山下東為鴨湖湖在馬鞍山東北武陵王愛其峯秀改曰望楚山明一統志望楚山在襄陽府城西南八里舊有三名曰楚山曰馬鞍山曰策山圖經云秦與齊韓魏攻楚方城秦軍登山以望楚因名一云宋武陵王駿屢登陟以望鄢城改今名溪水自湖兩分北渠即溪水所導也北徑漢陰臺西臨流望逺按眺農圃情邈灌蔬意寄漢陰故因名臺矣莊子子貢南遊於楚反於晉過漢陰見一丈人方為圃畦鑿隧而入井抱甕而出灌子貢教之鑿木為橰挈水若抽為圃者笑曰有篾械者必有襪事吾非不知羞而不為也又北徑檀溪上下疑有脫文謂之檀溪宋本溪下有水字側有沙門釋道安寺即溪之名以表寺目也溪之陽有徐元直崔州平故宅悉人居故習鑿齒與謝安書云每省家舅司檀溪當從宋本作縱目檀溪念崔徐之友宋本作文未嘗不撫膺躊蹰惆悵終日矣溪水傍城北注昔劉備為景升所謀乘的盧馬西走墜於斯溪世語曰備屯樊城劉表禮焉憚其為人不甚信用曾請備宴㑹欲因㑹取備備覺之僞如厠潛遁出所乘馬名的盧騎的盧走渡襄陽城西檀溪水中溺不得出備急曰的盧今日厄矣可努力的盧乃一躍三丈遂得過乘桴渡河中流而追者至以表意謝之曰何去之速乎變孫盛曰此不然之言備時羈旅客主勢殊若有此豈敢晏然終表之世而無釁故乎此皆世俗妄說非事實也西去城里餘北流注於沔一水東南出應劭曰城在襄水之陽故曰襄陽也是水當即襄水也城北枕沔水即襄陽縣之故城也今襄陽縣治即襄陽故城謂之壘城在郡治之西王莽之相陽矣楚之北津戍也今大城西壘是也其上古鄢都盧羅之地秦滅楚置南郡號此為北部焉建安十三年魏武平荆州分南郡立為襄陽郡荆州刺史治邑居隱賑朱本云當作殷賑薛綜西京賦注云殷賑謂富饒也冠蓋相望一都之㑹也城南門道東有三碑一碑是晉太傅羊祜碑一碑是鎮南將軍杜預碑一碑是安南將軍劉儼碑並是學生所立城東門外二百步劉表墓太康中為人所發見表夫妻其尸儼然顔色不異猶如平生墓中香氣逺聞三四里中經月不歇今墳冢及祠堂猶髙顯整頓城北枕沔水水中常苦蛟害襄陽太守鄧遐負其氣果拔劍入水蛟繞其足遐揮劍斬蛟流血丹水自後患除無復蛟難矣昔張公遇害亦亡劍於是水後雷氏為建安從事徑踐瀨溪所留之劍忽於其懷躍出洛水初由是劍後變為龍雷次宗豫章記云雷孔章為豐城令於縣掘得二劍一以進司空張華後華遇害此劍飛入襄城水中孔章臨亡戒其子恆以所留之劍自隨後其子為建安從事經淺瀨其劍忽於腰間躍出遂見一龍相隨而去故吳均劍騎詩云劍是兩蛟龍何氏云道元與吳均同時安得引用其詩疑此書後人之附益者多矣張華之言不孤為驗矣沔水又徑平魯城南城魯宗之所築也故城得厥名矣東對樊顧氏云當作東對樊城此漏城字仲山甫所封也漢晉春秋稱桓帝幸樊城百姓莫不觀有一老父獨耕不輟議郎張溫使問焉父嘯而不答溫因與之言問其姓名不告而去城周四里南半淪水建安中關羽圍于禁於此城㑹沔水泛溢三丈有餘城陷禁降龐德奮劍乘舟投命於東岡魏武曰吾知于禁三十餘載至臨危授命更不如龎德矣城西南有曹仁記水碑杜元凱重刋其後書伐吳之事也樊城在縣北三里舊志隄防至切者在襄樊二城蓋二城並峙中流如峽口且唐鄧之水從白河南注橫截漢流以故波濤激射城堤為害最切又從縣東屈西南淯水從北來注之襄陽城東有東白沙白沙北有三洲東北有宛口即淯水所入也淯水入漢處名三洲口在襄陽縣東北沔水中有魚梁洲龎德公所居士元居漢之陰在南白沙故世謂是地為白沙曲矣司馬德操宅洲之陽望衡對宇歡情自接泛舟褰裳率爾休暢豈待還桂拖於千里貢寸心於永思哉水南有層臺號曰景升臺蓋劉表治襄陽之所築也言表盛遊於此常所止憩表性好鷹嘗登此臺歌野應來曲其聲韻似孟達上堵吟矣景升臺今名呼鷹臺在府城北二十里宋蘇軾詩莫上呼鷹臺平生笑劉表李豸詩呼鷹復何用臥龍獨不顧沔水又徑桃林亭東明一統志襄陽府南六里有桃林晉桓冲北伐屯軍於此是時食桃至春其核萌生遂成茂林但桑欽漢人不當先有此名恐另是一桃林也錐指曰桃林亭在襄陽縣東南又徑峴山東山上有桓宣所築城孫堅死於此又有桓宣碑羊祜之鎮襄陽也與鄒潤甫嘗登之及祜死後人立碑於故處望者悲感杜元凱謂之墮淚碑峴山在襄陽府南七里晉書羊祜傳祜樂山水每風景必造峴山置酒言詠終日不倦常慨然嘆息顧謂從事鄒湛等曰自有宇宙便有此山由來賢逹勝士登此逺望如我與卿者多矣皆湮滅無聞使人悲傷如百歲後有知魂魄猶應登此也湛曰公德冠四海道嗣前哲令聞令望必與此山俱傳至若湛輩乃當如公言耳及祜薨襄人感其德立祠刻碑其上歲時饗祭望其碑者莫不流涕杜預因名為墮淚碑山上又有征南將軍胡罷碑又有征西將軍周訪碑山下水中杜元凱碑處沔水又東南徑蔡洲在府城東北漢水中漢長水校尉蔡瑁居之故名蔡洲襄陽耆舊傳蔡瑁字德圭性豪自喜為魏武所親家在蔡洲上屋宇甚好四牆皆以青石結角婢妾數百人别業四五十處洲大岸西有洄湖停水數十畝長數里廣減百步水色常渌楊儀居上洄楊顒居下洄襄陽耆舊傳楊儀字威公為蜀相諸葛亮長史亮出軍儀常規晝分部籌度糧穀不稽思慮須臾便了楊顒字子昭為丞相亮主簿亮自校簿書顒諫曰坐而論道謂之三公今明公親校簿不亦勞乎及顒死亮泣三日曰掾曹非楊顒於朝中多損益矣與蔡洲相對在峴山南廣昌里又與襄陽湖水合水上承鴨湖東南流徑峴山西又東南流注白馬陂水又東入侍中襄陽侯習郁魚池郁依范蠡養魚法作大陂陂長六十步廣四十步池中起釣臺池北亭郁墓所在也列植松篁於池側沔水上郁所居也又作石伏逗引大池水於宅北作小魚池池長七十步廣十二步西枕大道東北二邊限以髙堤楸竹夾植蓮芡覆水是遊宴之名處也山季倫之鎮襄陽每臨此池未嘗不大醉而還恆言此是我髙陽池故時人為之歌曰山公出何去往至髙陽池日暮倒載歸酩酊無所知習家池在襄陽府城南八里後漢習郁嘗穿此池依范蠡養魚法中築釣臺臨殁謂其子曰必葬我近魚池後山簡鎮襄陽每出遊多之池上置酒輒醉名之曰髙陽池宋曽子固詩未脫迂疏笑山簡更須同上習池遊王荆公詩遙想習池寒月夜幾人談笑伴詩翁其水下入沔沔水西又有孝子墓河南秦氏性至孝事親無倦親沒之後負土成墳常泣血墓側人有咏蓼莪者氏為泣涕悲不自勝於墓所得病不能食虎常乳之百餘日卒今林木幽茂號曰孝子墓也其南有蔡瑁冢冢前刻石為大鹿狀甚大頭髙九尺制作甚工沔水又東南徑邑城北習郁襄陽侯之封邑也故曰邑城矣襄陽耆舊傳習郁字文通為黃門侍郎封襄陽公沔水又東合洞口水出安昌縣故城東北大父山西南流謂之白水又南徑安昌故城東屈徑其縣南縣故蔡陽之白水鄉也漢元帝以長沙卑濕分白水上唐二鄉為舂陵縣漢志南陽郡舂陵故蔡陽白水鄉上唐鄉師古曰漢買記云元朔五年以零陵泠道之舂陵鄉封長沙王子為舂陵侯至戴侯仁以舂陵地形下濕上書徙南陽元帝許之以蔡陽白水鄉徙仁為舂陵侯光武即帝位改為章陵縣置園廟焉後漢書郡國志章陵故舂陵世祖更名古今注曰建武十八年使中郎將耿遵築城魏黃初二年更從今名故義陽郡治也白水又西南流而左㑹昆水水導源城東南小山西流徑今山北又西南流徑縣南西流注於白水水北有白水陂其陽有漢光武故宅基址存焉所謂白水鄉也漢光武故宅在棗陽縣東南光武本紀建武三年十月幸舂陵祠園廟置酒舊宅大㑹故人父老注曰光武舊宅在今隨州棗陽縣東南宅南二里有泉焉張衡所謂龍飛泉也蘇伯河望氣處也一作蘇伯阿欎蘇伯阿望見舂陵城唶曰氣佳哉欎葱葱及光武即位改曰章陵光武之征秦豐幸舊邑置酒極歡張平子以為真人南巡觀舊里焉東觀漢記曰明帝幸南陽祀舊宅召校官子弟作雅樂奏鹿鳴上自御塤箎和之以娛賔客又於此宅矣白水又西合濜水水出於襄鄉縣東北陽中山西徑襄鄉縣之故城北按郡國志是南陽之屬縣也濜水又西徑蔡陽縣故城東西南流注於白水又西徑其城南建武十六年按後漢書宗室四王傳是建武十三年封世祖封城陽王祉世子本為侯國應劭曰蔡水出蔡陽東入淮今於此城南更無别水唯是水可以當之川流宋本作川水西流苦其不東且淮源岨礙山河無相入之理蓋應氏之誤耳洞水又西南流注於沔水又東過中盧縣東淮水自房陵縣淮山東流注之今南漳縣東有中盧故城縣即春秋廬戎之國也縣故城南有水出西山山有石穴出馬謂之馬穴山今名馬窟山在光化縣東五里漢時有數百匹馬出其中馬形小似巴滇馬三國時陸遜攻襄陽於此穴又得馬數十匹送建業蜀使至有家在滇池者識其馬毛色云其父所乘馬對之流涕其水東流一百四十里徑城南名曰浴馬港言初得此馬洗之於此因以名之亦云乘出沔次浴之又曰洗馬既渡沔宿處名之曰騎亭然侯水諸蠻北遏是水南壅淮川以周田溉下流入沔沔水又東南流徑黎丘故城西黎丘城在今宜城縣東郡國志南郡印縣有犁丘城即此其城下對繕州秦豐居之故更名秦洲王莽之敗也秦豐阻兵於黎丘黎丘城在觀城西二里建武三年光武遣征南岑彭擊豐四年朱祐自觀城瀹按光武紀建武四年十一月建義大將軍朱祐率二將軍圍秦豐於黎丘此瀹字當作圍豐於黎丘是也沔水又南與疏水合水出中廬縣西南東流至即縣北界漢志南郡有邔縣此之即縣乃邔字之訛觀下經文可見東入沔水謂疏口也水中有物如三四歲小兒鱗甲如鮮鯉射之不可入七八月中好在磧上自曝膝頭似虎掌爪常沒水中出膝頭小兒不知欲取弄戲便煞人或曰人有生得者摘其臯厭可以小使名為水唐者也後漢書郡國志引荆州記云中廬縣南十五里有陵水東流注沔水中有物如馬甲如鮮鯉不可入七八月中好在磧上自暴膝頭如虎掌爪小兒不知欲取弄戲便殺人或曰生得者摘其鼻厭可小小使名曰水盧十道志引襄沔記作水虎或云鼻厭者水虎之勢也可為媚藥又南過邔音忌一作印縣東北元和志本漢邔縣城東臨漢江古諺邔無東言東逼漢江其地短促也沔水之左有騎城周回二里餘高一丈六尺即騎亭也縣故楚邑也秦以為縣漢髙帝十一年封黃極忠為侯國史表黃極忠封邔侯縣南有黃家墓墓前有雙石闕雕制甚工俗謂之黃公闕黃公名尚為漢司徒沔水又東徑猪蘭橋橋本名荻蘭宋本作木蘭橋橋之左右豐蒿荻於橋東劉季和大養猪襄陽太守曰此中作猪屎臭可易名猪蘭橋百姓遂以為名矣於橋東下有訛誤疑當作襄陽太守劉季和於橋東大養猪朱云劉季和名洪沛國相見襄陽耆舊傳橋北有習郁宅宅側有魚池池不假功自然通洫長六七十步廣十丈常出名魚沔水又南得木里水㑹楚時於宜城東穿渠上口去城三里漢南郡太守王寵又鑿之引蠻水灌田謂之木里溝徑宜城東而東北入於沔謂之木里水口也又南過宜城縣東夷水出自房陵縣東流注之蠻水發源自房陵縣界經南漳入宜城西南六十里入漢江夷水蠻水也桓溫父名夷改曰蠻水桓溫父名彛此云夷蓋嫌音之同也夷水導源中廬縣界康狼山山與荆山相鄰其水東南流歷宜城西上謂之夷溪又東南徑羅川城故羅國也又謂之鄢水春秋所謂楚人伐羅渡鄢者也夷人又東南流與零水合零水即汴一作汒疑作沵水也上通梁州沒陽縣之默城山司馬懿出沮之所由其水東徑新城縣之沵鄉縣縣分房陵邱謂之沵水又東歷軨鄉謂之軨水晉武帝平吳割臨沮之北鄉中廬之南鄉立上黃縣治軨鄉沵水又東歷宜城西山謂之沵溪東流合於夷水謂之沵口也與夷水亂流東出謂之淇水徑蠻城城南疑當作南城在宜城南三十里春秋若敖自羅敗退及鄢亂次以濟淇水是也夷水又東注於沔昔白起攻楚引西山谷水即是水者也舊堨去城一百許里水從城西灌城東入注為淵今尉斗陂是也在荆州府當陽縣東北八十里水潰城東北角百姓隨水流死於城東者數十萬城東皆臭因名其陂為臭池後人因其渠流以結陂田城西陂謂之新陂覆地數十頃西北又為土門陂從平路渠以北木蘭橋以南西極土門山東跨大道水流周通其水自新陂東入城城故鄢郢之舊都秦以為縣漢惠帝三年改曰宜城其水歷大城中徑漢南陽太守秦頡墓北墓前有二碑頡郡人也以江夏都尉出為南陽太守徑宜城中見一冢疑當作家東向頡住車視之曰此居處可作冢後卒於南陽喪還至昔住車處車不肯進故吏為市此宅葬之孤墳尚整冢前有二碑城南有宋玉宅在荆州府歸州舊治東五里玉邑人雋才辨給善屬文而識音也其水又徑金城前縣南門有古碑猶存其水又東出城東注臭池臭池溉田陂水散流又入朱湖陂朱湖陂亦下灌諸田餘水又下入木里溝木里溝是漢南郡太守王寵所鑿故渠引鄢原本訛􅋣水也灌田七百頃白起渠溉三千頃膏良肥美更為沃壤也縣有太山山下有廟漢末多士其中何氏改名士居其中刺史二千石卿長數十人朱軒華蓋同㑹於廟下荆州刺史行部見之雅嘆其盛號為冠蓋里而刻石銘之此碑於永嘉中始為人所毁其餘文尚有可傳者其辭曰峨峨南嶽烈烈離明實敷俊又君子以生惟此君子作漢之英德為龍光聲化鶴鳴此山以建安三年崩聲聞五六十里雉皆屋雊縣人惡之以聞侍中龎季云山崩川竭國土將亡之占也十三年魏武平荆州沔南雕散沔水又徑鄀縣故城南故城在今宜城縣東南古鄀子之國也秦楚之間自商密遷此為楚附庸楚滅之以為邑縣南臨沔津津南有石山上有古烽火臺縣北有大城即楚昭王為吳所迫自郢徙都之所謂鄢郡疑是鄀盧羅之地也左傳云吳人敗楚舟師楚國大惕于是乎遷鄀而改紀其政秦以為縣沔水又東敖水注之敖水在竹山縣西一十里水出新市縣東北新市縣今為京山縣境其故城在縣南三十里又西南南下疑有徑字太陽山西南流徑新市縣北又西南而右合枝水水出大洪山而西南流徑襄陽郡疑是鄀縣界西南徑秋疑是狄城東南左注敖水敖水又西南流注於沔實胡氏作是曰滶口沔水又南胡氏作東徑石城西石城即今陸安府治漢水自宜城南流一百七十里至府濁流齧決最為可虞城因山為固晉太傅羊祜鎮荆州立晉惠帝元康九年分江夏西部置竟陵郡治此沔水又東南與臼水合臼水在京山縣北一十里水出竟陵縣竟陵縣即今景陵縣故城在今安陸府南東北耶屈山明一統志作聊屈山在京山縣東三十里一名盧屈山西流注於沔魯定公四年吳師入郢昭王奔隨濟於成臼謂是水者也又東過荆城東沔水自荆東南流徑當陽縣今屬荆州府之章山東山上有故城太尉陶侃伐杜曽所築也禹貢所謂內方山至於大别者也既濱帶沔流實㑹尚書之文矣沔水又東右㑹權口水出章山東南流徑權城北今荆門州東南有權城古之權國也春秋魯莊公十八年楚武王克權權叛圍而殺之遷權於那處是也按左傳楚武㠪克權使鬭緡尹之以叛圍而殺之遷權於那處則叛者乃緡也道元所引似失本意且事亦不在此時乃十八年傳中追述之耳東南有那口城杜預曰權國名南郡當陽縣東南有權城那處楚地南郡編縣東南有那口城權水又東入於沔沔水又東南與陽口合陽水即楊水漢志漳水東至江陵入陽水陽水入沔是為陽口古之漳澨也水上承江陵縣赤湖明一統志在今荆州府西北一十里相傳晉桓元挾帝西幸劉毅等追襲敗元於此血流水赤故名江陵西北有紀南城明一統志紀南城在荆州府北一十里史記注楚都於郢今江陵縣北紀南城是至平王更城郢在江陵東北故郢城是荆州記昭㠪十年吳通漳水灌紀南入赤湖進灌郢城則郢與紀南為二城矣楚文王自丹陽徙此平王城之班固言楚之郢都也城西南有赤坂罡罡下有瀆水東北流入城名曰子胥瀆蓋吳師入郢所開也謂之西京湖又東北出城西南注於龍陂陂古天井水也廣圓二百餘步在靈溪東江堤內水至淵深有龍見於其中故曰龍陂陂北有楚莊王釣臺在江陵縣西南龍陂北高三丈四尺南北六丈東西九丈陂水又徑郢城南東北流謂之楊水又東北路曰湖水注之當作東北流白湖水注之湖在大港北巷疑作港南曰中湖南堤下曰昏官湖三湖合為一水東通荒谷荒谷東岸有冶父城春秋傳曰莫敖縊於荒谷群帥囚於冶父謂此處也春秋水盛則南通大江否則南迄江堤北徑方城西方城即南蠻府也又北與三湖㑹故盛𢎞之曰南蠻府東有三湖源同一水蓋徙治西府也宋元嘉中通路自湖下注楊水以廣運漕楊水以東歷天井北井在方城北里餘廣員二里其深不測井有潛室見輒兵兵下疑有脫文西岸有天井臺因基舊堤臨際水湄遊憩之佳處也楊水又東北流得東赤湖水口湖周五十里城下陂池皆來㑹同湖東北有大置疑衍臺高六丈餘縱廣八丈一名清暑臺秀宇層明通望周博遊者登之以暢逺情楊水又東入華容縣有靈港水西通赤湖水口地多下湖周五十里城下陂池皆來㑹同又有子胥瀆蓋入郢所開也水東入離湖湖在縣東七十五里國語所謂楚靈王闕為石郭陂漢以象帝舜者也今國語無此石郭象舜語湖側有章華臺臺高十丈基廣十五丈左丘明曰楚築臺於章華之上韋昭以為章華亦地名也王與伍舉登之舉曰臺高不過望國之氛祥大不過容宴之俎豆蓋譏其奢而諫其失也明一統志章華臺有二一在荆州府城外沙市一在監利縣東北皆傳以為楚靈王所築其在監利者又名三休臺按曰翟王使使之楚楚王誇之饗於章華之臺三休乃至臺名三休疑取之此言此瀆靈王立臺之日漕運所由也其水北流注於楊水楊水又東北與祥溪水合水出江陵縣北蓋諸池散流咸所㑹合積以成川東流徑魯宗之壘南當驛路水上有大橋隆安三年桓元襲殷仲湛於江陵仲湛北奔縊於此橋祥溪又東注船宫湖湖水又東北入女觀湖湖水又東入於楊水楊水又北徑竟陵縣西又北納巾吐柘柘水即下楊水也巾水出縣東一百九十里西徑巾城下城下置巾水戍晉元熙二年竟陵郡上巾水戍山得銅鐘七口言之上府巾水又西徑竟陵縣北西徑楊水謂之巾口水西有古竟陵大城古鄖國也鄖公辛所冶所謂鄖鄉矣昔白起拔郢東至竟陵即此也秦以為縣王莽之守平矣世祖建武十三年更封劉隆為侯國城傍有甘魚陂左傳昭公十三年公子黑肱為令尹次於魚陂者也楊水又北注於沔謂之楊口中夏口也曹太祖之追劉備於當陽也張飛按矛於長坂備得與數騎邪趣漢津遂濟夏口是也沔水又東得滻口其水承大滻馬骨諸湖水周三四百里及其夏水來同浩胡氏引作渺若滄海洪潭疑是濤巨浪縈連江沔故郭景純江賦云其傍則有朱滻丹漅是也又東南徑江夏雲杜縣東中夏水從西來注之雲杜縣今安陸府治即堵口也禹貢錐指云通典復州沔陽縣冇漢雲杜縣故城在縣西北有夏水沔水今沔陽州南長夏河即夏水自監利縣流徑州南四十里與潛江縣分水又東北至於漢堵口今失其處蓋為水所湮也漢水在州北一百里自潛江流入與景陵分水又東入漢川縣界為中夏水縣故䢵亭左傳所謂若敖娶於䢵是也禹貢所謂雲土夢作又故縣取名焉縣有雲夢城城東北沔水又東徑左桑昔周昭王南征船人膠舟以進之昭王渡沔中流而沒死於是水齊楚之㑹齊侯曰昭王南征之不復寡人是問屈完曰君其問諸水濵庾仲雍言杜老云百姓佐昭王喪事於此成禮而行故曰佐喪左桑字失體耳沔水又東合區一作巨亮水口水北承亮湖南達於沔沔水又東得合驛口庾仲雍言須導杜耆舊云朝廷驛使合王喪於是因以名焉今須導村正有大斂口言昭王於是殯斂矣沔水又東謂之橫桑言得昭王喪處也沔水又東謂之鄭潭言鄭武公與王同溺水於是今謂世數既懸為不近情矣斯乃楚之鄭鄉守邑大夫讚公言故世以為鄭公潭耳沔水又東得死沔何氏云死沔當是河之祐瀆言昭王濟自是死沔故有死沔之稱王尸豈逆流乎但千古芒昧難以昭知推其事類似是而非矣沔水又東與力口合力口在今景陵縣東南有溾水出竟陵郡新陽縣西南河疑有訛字地山東流徑新陽縣南縣治雲杜故城分雲杜立溾水又東南流注宵城縣南大湖又南入於沔水是曰力口沔水又東南溳水入焉元和志安陸縣溳水故清發水也西北自隨縣流入注於沔今在漢陽縣西北沔水又東徑沌水口水南通縣之大白湖湖水東南通江又謂之沌口沔水又東徑沌陽縣北沌陽廢縣在今漢陽府西六十里臨嶂山下晉置後廢處沌水之陽也沔水又東徑林鄣故城林鄣故城在臨嶂山上北晉建興二年太尉陶侃為荆州鎮此也又南至江夏沙羡縣北今為武昌府治及詣屬縣南入於江庾仲雍曰夏口一曰沔口矣尚書禹貢云漢水南至大别入江春秋左傳定公四年吳師伐郢楚子常濟漢而陳自小别至於大别京相璠春秋土地名曰大别漢東山名也大别山在漢陽府城東北漢江右三國南北之際恆為必爭之地一名翼際山一名魯山舊有魯肅祠因名在安豐縣南杜預釋地曰二别近漢之名無緣乃在安豐也禹貢錐指曰大别山在漢陽府城東北半里漢水西岸左傳小别至於大别杜預云禹貢漢水至大别南入江然則此二别在江夏界水經注江水東徑魯山南古翼際山也地說曰漢與江合於衡北翼際山傍者也山上有吳江夏太守陸渙所治城蓋取二水之名地理志曰夏水過郡入江故曰江夏也舊治安陸吳乃徙此山左即沔口矣沔左有却月城故曲陵縣後乃沙羡音夷縣治也元和志魯山一名大别山在漢陽縣東北一百步其山前枕蜀江北帶漢水山上有吳將魯肅神祠渭按禹貢大别山杜元凱已知在江夏不在安豐酈氏亦主杜說而終不能指魯山為大别至唐人始能言之左傳定公四年吳子伐楚舍舟於淮汭自豫章與楚夾漢史皇謂子常必速戰乃濟漢而陳自小别至於大别三戰子常知不可欲奔史皇止之十一月庚辰陳於柏舉吳師大敗楚師子常奔鄭孔疏云小别當在大别之東何則子常從小别與吳戰退而至大别明自東而漸西也今按豫章杜注云漢東江北地自豫章與楚夾漢謂吳軍漢東楚軍漢西也子常濟漢而陳自小别至於大别言其師衆為長陳自西及東若此其逺兩軍合戰則自大别以東尋傳文無從小别與吳戰退而至大别之事也小别當在大别之西孔說正相反今漢川縣東南有甑山即小别山元和志云小别山在㲼川東南五十里唐㲼川縣在今漢川縣北三十里故里數有不同耳索隱云大别山土人謂之甑山蓋承孔疏之誤二别相去一百二十餘里案地說言漢水東行觸大别之陂南與江合則與尚書杜預相符但今不知所是矣禹貢錐指云以今輿地言之漢水自均州北又東南徑光化縣西南光化襄陽府西北一百八十里水去縣十五里又東南徑榖城縣東北榖城在府西北一百二十里水去縣二十五里又東南徑襄陽縣北縣為襄陽府治東南三十里漢水中有龍尾洲縣志云漢水重濁與大河相似襄陽實當其衝為害最劇自唐以來皆築隄繞城以防潰決又東南徑宜城縣東宜城府東南一百二十里水去縣四里又南徑鍾祥縣西鍾祥為安陸府冶又南徑荆門州東荆門府西九十里水去州一百二十里又東南徑京山縣西南京山府東一百五十里又東徑潛江縣北潛江府南少東二百卜里水去縣二十里又東徑景陵縣南景陵府東南二百十里水去縣五十里又東徑沔陽州北沔陽府西少東三百三十里水去縣一百里州志云漢水由荆門州界折而東大小羣川咸滙焉勢盛流濁浸淫蕩決為患無已而潜江地居汙下遂為衆水之壑一望瀰漫無復涯際漢水經其間重湖浩渺經流支川不可辨也蓋漢水為湖北之害而襄郢二州為甚潜江又承襄郢之委流當漢江曲折回合之處瀦為大澤勢不能免矣而景陵沔陽又潜江之委流也今沔陽四境唯湖陂連亘幾數百里皆為漢水所滙蓋漢水性曲往往十里九灣語曰徑莫如濟曲莫如漢郢沔之間波流回蕩自必瀦為藪澤小民見填淤之利復從而隄防之為民牧者人不講於節宣之宜疏瀹之理歲月之間茍辛無事大水時至則委之洪濤中耳童承叙曰漢水至濁與江湖水合其流必澄故常填淤而沮澤之區因成沃壤民漸芟剔墾為阡陌又因其地之髙下修隄防以障之大者廣輪數十里小者十餘里謂之曰垸其不可隄者悉棄為萊蕪昔時垸必有長統丁夫主修葺其後法久弊滋修不以時垸愈多水愈迫客隄愈髙主堤愈卑故水至不得寬緩湍怒迅激勢必衝齧主堤先受其害客堤隨之泛濫洶湧悉為巨浸矣又東徑漢陽縣北縣為漢陽府治水去縣三里又東至大别山折而南是為漢口經所謂過三澨至大别南入於江者也隄防考云舊時漢水從黃金口入排沙口東北折抱牯牛洲至鵝公口又西南轉北至郭師口對岸曰襄河口約長四十里漢水徑從此下而故道遂淤今魚利略存不通舟楫俗呼為襄河以上流自襄陽來也按漢水本東行觸大别之陂而南回入江今則自郭師口以上決而東徑大别山後入江非復古之夏汭矣漢志云東漢水一名沔過江夏謂之夏水入江又云沮水南至沙羡南入江過郡五武都漢中南陽南郡江夏行四千里蓋曲莫如漢故其所行有若是之逺也沔水與江合流又東過彭蠡澤尚書禹貢滙澤原本訛釋也鄭元曰滙回也漢與江鬭轉東成其澤矣尚書古文解曰彭蠡今鄱陽湖也納江西饒信州諸水自南康軍星子縣東北至湖口縣入江朱子全書曰彭蠡之為澤實在大江之南然以地勢北髙而南下故其入於江也反為江水所遏而不得遂因却而自瀦以為是瀰漫數十百里之大澤尚書解曰江漢之水相合而其流浸大於是東流於彭蠡大澤水既鍾於彭蠡則有所回旋曲折不至於泛濫漂悍以衝突下流之勢故東為北江入於海也蓋先為之滙而後為之歸也黃潤玉書解曰叙漢江皆言東者主岷嶓居西而云非指曲折為文也禹貢集解曰三江相㑹而南不能以敵中北西來之勢故中北遏南而南相與回旋而為一大澤者其來久矣今禹本其所由有澤之因故歸之於漾而為之言曰東滙澤為彭蠡而於江亦曰㑹於滙耳其實彭蠡一澤三江之水為之也說者未有發明之義王充耘讀書管見曰江漢二水勢圴力敵皆能自達於海者也故禹貢雖紀其合流仍各見其首尾紀其合流故於漢水言南入於江江漢朝宗於海各見其首尾故於漢水言東滙澤為彭蠡東為北江入於海於江水則言東迤北㑹為滙東為中江入於海彭蠡固江漢之所滙者也今春月江水暴漲則滙而入湖蓋江流浩渺而其下束以小孤山水道狹甚其勢不得不逆流而入此澤故有發舟湖口無風而一夕達鄱陽之安仁者問其故乃舟乘逆流行甚迅速猶隨潮而上者也故江水之滙衆所共知今乃疑之顧弗深考耳且謂漢自大别入江合流已七百餘里安能復識其滙澤者為漢水邪亦可謂膠固之甚者矣夫單叙漢水源流則其勢不得不以漢為主但既云南入江則東滙澤為彭蠡即江漢共滙可知矣不成曰南入於江東與江共滙澤為彭蠡然後為明白邪又謂彭蠡在大江之南當曰南滙不當曰東滙滙既在南則當曰北為北江不當曰東為北江其論南北反戾幾為可笑蓋江漢兩水皆發源西蜀而東流入海獨漢水到大别入江則析而南流與江相合仍舊東流而滙為彭蠡又東流為北江以入海其東西南北以天下大勢論不主一江南北而言也今若欲改云南滙彭蠡則是南流入江之後又南滙彭蠡則漢水當逆流向洞庭矣滙澤之後不云東為北江而云北為北江則漢又當決破安慶橫入淮河矣又東北出居巢縣南秦置居巢縣即今廬州府無為州之巢縣界也古巢國也湯伐桀桀奔南巢即巢澤也尚書周有巢伯來朝春秋文公十二年夏楚人圍巢巢羣舒國也舒叛故圍之永平元年漢明帝更封菑邱侯劉般為侯國也江水自濡須口在巢縣治南一名天河水俗呼為馬尾溝源出巢湖東流經亞父山又東北注於江又東左㑹栅口水遵巢湖巢湖在今無為州巢縣西一十五里一名焦湖周圍四百餘里港漢大小三百六十占合肥舒城盧江巢四邑之境東徑烏上城北又東徑南譙僑郡城南又東絶塘徑附農山北又東左㑹清溪水水出東北馬子硯疑訛當是峴之清溪也東徑清溪城南屈而西南流歷山西南流注栅水謂之清溪口在六安州東六十里栅水又東左㑹白石山水水發白石山西徑李鵲城南西南注栅水栅水又東南積而為竇湖中有洲湖東有韓縱山山上有城山北湖水東出為後塘北湖湖南即塘也塘上有潁川僑郡故城也湖疑衍竇湖水東出謂之湖竇口湖水東出徑刺史山北歷韓縱山南徑流二山之間出王武子北城城在刺史山上湖水又東徑右塘穴北為中塘塘右四水中水出格虎山北山上有虎山有郭僧坎城水北有趙祖悅城並故東關城也昔諸葛恪帥師作東興堤以遏巢湖傍山築城使將軍全端留略等各以千人守之魏遣司馬昭督鎮東諸葛誕率衆攻東關三城將毁堤遏諸軍作浮梁陳於堤上分兵攻城恪遣冠軍丁奉等登塘鼓譟奮擊朱異等以水軍攻浮梁魏征東胡遵軍士爭渡梁壞投水而死者數千塘即東興堤城亦關城也栅水又東南徑髙江産城南胡景城北又東南徑張祖禧城南東南流屈而北徑鄭衛尉城西魏事已漏久字難用取悉推舊取新略究如此又北委折蒲浦出焉栅水又東南流注於大江謂之栅口水又東過牛渚縣南又東至石城縣漢置石城縣今江南池州府貴池縣是也經所謂石城縣者即宣城郡之石城縣也石城漢志屬丹陽郡晉以後屬宣城郡牛渚在姑熟烏江兩縣界中也姑熟今太平府當塗縣烏江在今和州蓋江水先經無為州然後至和州境也於石城東北減五百許里安得徑牛渚而方界石城也蓋經之謬誤也胡云水經此後一往多誤分為二其一東北流其一又過毗陵縣北為北江地理志曰毗陵縣今為常州府治舊㑹稽之屬縣丹徒縣也北二百步有故城本毗陵郡治也舊去江三里岸稍毁遂至城下城北有揚州刺史劉繇墓淪於江江即北江也經書在北江則可又言東至餘姚則非考其徑流知經之誤矣地理志曰江水自石城東出徑吳國南為南江江水自石城東入為貴口東徑石城縣北晉太康元年𨽻宣城郡東合天溪溪水首受江北徑其縣故城東又北入南江按漢志以分江水繫石城南江繫吳縣至道元始貫穿為一條南江又東與貴長池水合水出縣南郎山北流為貴長池池水又北注於南江南江又南東徑宣城之臨城縣南又東合注涇水按吳分漢陵陽德二縣地置臨城縣其廢址在今青陽縣南韋昭云涇水出蕪湖南江又東與桐水合按桐水出廣德州西南白石山西北流徑建平縣南蓋即舊入南江之處左傳所謂桐汭也晉時南江已湮故杜預曰入丹陽湖今桐水自建平界又西北入髙淳界注丹陽湖也又東徑安吳縣安吳故城在今寧國府旌德縣西十五里俗稱為沙城本晉縣屬宣城郡隋省安吳南陽二縣入涇縣號曰安吳溪又東旋溪水注之水出陵陽山陵陽山在寧國府城內岡巒盤屈孤峯秀拔為一郡之鎮下徑陵陽縣西為旋溪水昔縣人陽子明釣得白龍處後三年龍迎子明上陵陽山山去地千餘丈後百餘年呼山下人上山半與語溪中子安問子明釣車所在後二十年子安死山下有黃鶴栖其冢樹鳴常呼子安故縣取名焉子明事具列仙傳晉咸康四年改曰廣陽縣漢水又北合東溪水水出南里山北徑其縣東桑欽曰淮水出縣之東南北入大江其水又北歷蜀由山又北左合旋溪北徑安吳縣東晉太康元年分宛陵立縣南有落星山山有懸水五十餘丈下為深潭潭水東北流左入旋溪而同注南江之北即宛陵縣界也今屬寧國府治南江又東徑寧國縣南今屬寧國府晉太康元年分宛陵置南江又東徑故彰縣南安吉縣北光和之末天下大亂此保險守節漢朝嘉之中平二年分故彰之南鄉以為安吉縣故彰今為江南廣德州安吉漢分故彰南鄉置今為州屬浙江湖州府縣南有釣頭泉懸湧一仞乃流於川川水下合南江南江又東北為長瀆歷河口南江東注於具區謂之五湖口五湖謂長塘湖太湖射貴湖漏上湖二字滆湖也郭景純江賦曰注五湖以漫漭蓋言江水經緯五湖而包注太湖也是以左丘明述國語曰越伐吳而戰於五湖是也又云范蠡滅吳返至五湖而辭越斯乃太湖之攝通稱也虞翻曰是湖有五道故曰五湖韋昭曰五湖今太湖也尚書謂之震澤爾雅以為具區方圓五百里湖有苞山春秋謂之夫椒山有洞室入地潛行北通琅琊東武縣俗謂之洞庭旁有青山一名夏架山山有洞穴潛通庭庭上疑有洞字山上有石鼓長丈餘鳴則有兵故吳記曰太湖有苞山在國西百餘里居者數百家山弓弩材旁有小山山有石穴南通洞庭深逺莫知所極三苗之國左洞庭右彭蠡今宫亭湖也以太湖之洞庭對彭蠡則左右可知也余按二湖俱以洞庭為目者亦分為左右也但以趣矚為方耳既據三苗宜以湘江為正是故郭景純之江賦云爰有苞山洞庭巴陵地道潛達傍通幽岫窈窕山海經曰浮玉之山北望具區苕水出於其隂北流注於具區謝康樂云山海經云浮玉之山在句餘東五里便是句餘縣之東山乃應入海具區今在餘姚鳥道山北何由北望具區也以為郭於地理甚昧矣言疑訛洞庭南口有羅浮山高三千六百丈羅浮山東石樓下有兩石數扣之清越所謂神鉦者也事備羅浮山記㑹稽山宜直湖南又有山隂溪水入焉山隂縣西四十里有二溪東溪廣一丈九尺冬暖夏冷西溪廣三丈五尺冬冷夏暖二溪北出行三里至徐村合成一溪廣五丈餘而溫涼又雜蓋山海經所謂苕水也北徑羅浮山而下注於太湖故言出其隂入於具區也湖中有大雷小雷三山亦謂之三山湖又謂之洞庭湖楊修五湖賦曰頭首無錫足蹄松江負烏程於背上懷大吳以當胸岞嶺按五湖賦作岞㠋山名下同崔嵬穹窿紆曲大雷小雷湍波相逐用言湖之苞極也太湖之東吳國西十八里有岞嶺山俗說此本在太湖中禹治水移進近東又西南何氏從續圖經校改禹治水移進近吳又東及西南有兩小山皆有石如卷笮云禹所用牽山也太湖中有淺地長老云是笮嶺山跖自此以求圖經作以東差深言是牽山之溝此山去太湖三十餘里東則松江出焉上承太湖更徑笠澤在吳南松江左右也國語曰越伐吳吳禦之笠澤越軍江南吳軍江北者也虞氏曰松江北去吳國五十里江側有丞胥二山山各有廟國南五十里魯哀公十三年越使二大夫疇無餘謳陽等伐吳吳人敗之獲二大夫大夫死故立廟於山上號曰丞胥二王也胥山上今有壇石長老云胥神所治也下有九折路南出太湖闔閭造以遊胥胥上疑有姑字之臺以望太湖也松江自湖東北流徑七十里江水岐分謂之三江口何氏從朱長吳郡圖經續記校江水岐分二句乃酈注非經文吳越春秋稱范蠡去越乘舟出江之口入五湖之中者也此亦别為三江五湖雖稱相亂不與職方同庾仲初揚都賦注曰今太湖東注為松江下七十里有水口分流東北入海為婁江東南入海為東江與松江而三也何氏云而三也下圖經續記冇非禹貢之三江六字疑亦酈氏原文吳記曰一江東南行七十里入小湖為次溪自湖東南出謂之為谷水吳記曰谷水出吳小湖徑由卷縣故城下今為嘉興府治神異傳曰卷縣秦時長水縣也始皇時縣有童謡曰城門當有血城陷沒為湖有老嫗聞之憂懼日往窺城門門侍欲縛之嫗言其故嫗去後門侍煞犬以血塗門嫗又往見血走去不敢顧忽有大水長欲沒縣主簿令幹入白令令見幹曰何忽作魚幹又曰明府亦作魚遂乃淪陷為谷矣因目長水城水曰谷水也吳記曰谷中有城故由卷縣治也即吳之柴辟亭故就李鄉檇李之地秦始皇惡其勢王令囚徒十餘萬人汙其土表以汙惡名改曰囚卷亦曰由卷也吳黃龍四年有嘉禾生卷縣改曰禾興後太子諱和改為嘉興春秋之檇李城也谷水又東南徑嘉興縣城西谷水又東南徑鹽官縣故城南舊吳海昌都尉治晉太康中分嘉興治太康地道記吳有鹽官縣樂資九州志曰縣有秦徑山秦始皇徑此美人死葬於山上山下有美人廟谷水之右有馬睪城故司鹽都尉城吳王濞煮海為鹽於此縣也是以漢書地理志曰縣有鹽官東出五十里有武原鄉故越地也秦於其地置海鹽縣今屬嘉興府地理志曰縣故武原鄉也後縣淪為柘湖又徙治武原鄉改曰武原縣王莽名之辰武按漢志作展武漢安帝帝下疑有時字武原之地又淪為湖今之當湖也後乃移此縣南有秦望山秦始皇所登以望東海故山得其名焉谷水於縣出為散一作敢浦以通巨海光熙元年有毛民三人集於縣蓋汜於風也又東至㑹稽餘姚今屬紹興府東入於海謝靈運云具區在餘姚然則餘暨是餘姚之别名也今餘暨之南餘姚西北浙江與浦陽江同㑹歸海但水名已殊非班固所謂南江也郭景純曰三江者岷江松江浙江也然浙江出南蠻中不與岷江同作者述志多言江水至山陰今屬紹興府為浙江今南江枝分歷烏程縣今屬湖州府南通餘杭縣今屬杭州府胡云當作餘姚則與浙江合故闞駰十三州志曰江水至㑹稽與浙江合錐指云班志所謂南江者實松江也闞駰之所謂江水至㑹稽與浙江合者即分江水水經謂之南江者也或以為北江大謬酈元篤信班固故不能無疑於此浙江自臨平湖南通浦陽江又於餘暨東合浦陽江自秦望分𣲖東餘姚縣又為江也東與車箱水合水出車箱山乘髙瀑布四十餘丈雖有水旱而㴻無增減禹貢錐指云正義曰地理志云㑹稽吳縣故周泰伯所封國也具區在西古文以為震澤蘇氏曰豫章江入彭蠡而東至海為南江岷江江之經流㑹彭蠡以入海為中江漢自北入江㑹彭蠡為北江三江入海則吳越始有可宅之土而水所鍾者獨震澤而已曽氏曰具區之水多震而難定故謂之震澤震即三川震之震若今湖翻砥定者言砥於定而不震蕩也易氏曰三江自入於海不通震澤而經何以言震澤砥定蓋江湖在今日雖無相通之勢而當時洪水實有橫流之理想其際震澤與江水莽為一壑自大禹疏導而三江入海震澤乃砥於定自然之勢也見王天與尚書纂傳渭按蘇氏三江之說人或疑之及閲徐堅初學記引鄭康成書注以證三江曰左合漢為北江右㑹彭蠡為南江岷江居其中則為中江故書稱東為中江者明岷江至彭蠡與南北合始得稱中也始知蘇氏所說東漢時固已有之馬中錫云斯言也百世以俟聖人可也金吉甫云大江之南西偏莫大於彭蠡東偏莫大於震澤二患既平則揚之土田皆治矣故特舉二澤以見揚之告成若其南偏率是山險浙亦山溪計不勞施功故餘不書也禹貢三江之不明誤自班固始漢志㑹稽吳縣下云南江在南東入海毗陵縣下云北江在北東入海今本漢書脫上一北字此據宋本增入後漢志亦云北江丹陽蕪湖縣下云中江出西南東至陽羡入海皆揚州川也蓋北江為經流至江都入海中江由吳松入海南江合浙江入海皆北江之枝瀆也𨗳水明言漢自彭蠡東為北江江自彭蠡東為中江誠如班氏所言則蕪湖之中江何以知為江水之所分毗陵之北江何以定為漢水之所獨乎以此當禹貢三江之二雖愚者亦知其非矣孔傳於本經云言三江已入致定為震澤𨗳漾傳云自彭蠡江分為三入震澤遂為北江而入海正義曰言三江共入震澤出澤復分為三此水遂為北江而入於海鄭元以為三江既入入於海不入震澤也𨗳江傳又云有北有中南可知正義引漢志三江以證之渭按班固所說南北中之名雖同而實非禹貢之三江孔傳說與之合又欲諱其所自出掩抑摧藏半吞半吐其為僞撰無疑或曰傳果出魏晉間手曷不用鄭注曰此說起自東漢代棘下生作傳不得入東漢語并不得全録班志君當亮彼苦心也漢志丹陽石城縣下云分江水首受江東至餘姚入海過郡二行千二百里石城縣故城在今池州府貴池縣西七十里此即南江之源委過郡二謂丹陽㑹稽也其在吳縣南者即吳松江乃中江之下流班氏不知分江水至餘姚入海者即古之南江遂誤以松江當之耳江水又東徑黃橋下臨江有漢蜀郡太守黃昌宅橋本昌創建也昌為州書佐妻遇賊相失後㑹於蜀復修舊好江水又東徑緒山南虞翻嘗登此山四望示子孫可居江北世有祿位居江南則不昌也然住江北者相繼代興時有江南者輒多淪替仲翔之言為有此下漏徴矣江水又徑六字當從朱本增入官倉倉即日南太守虞國舊宅號曰西虞以其兄光居縣東故也是地即其雙鴈送故處孔曄㑹稽記云昔虞翻嘗登此山望四郭誡子孫曰可留江北居後世祿位當過於我聲名不及耳然相繼代興居江南必不昌又曰虞為日南太守有惠政出則雙雁隨軒及還㑹稽雁亦隨馬其卒也猶棲於墓不去江水又東徑餘姚縣故城南縣城是吳將朱然所築也南臨江津北背巨海夫子所謂滄海浩浩萬里之淵也縣西北㑹稽一百四十里因其句餘山宋本作句章山以名縣山在餘姚之南句章之北也江水又東徑穴湖塘湖水沃其一縣並為良疇矣江水又東注於海是所謂三江者也故子胥曰吳越之國三江環之民無所移矣但東南地卑萬流所湊濤湖泛決觸地成川枝津交渠世家分夥故川舊瀆難以取悉雖粗依縣地緝綜所纒亦未必一得其實也潛水出巴郡宕渠縣潛水蓋漢水枝分潛出故受其稱耳今受朱云當作爰有大穴潛水入焉通罡山下西南潛出謂之伏水或以為古之潛水鄭元曰漢别為潛其穴本小水積成澤流與漢合大禹自廣漢疏通即為西漢水也故書曰沱潛既道劉澄之稱白水入潛然白水與羌水合入漢是猶漢水也縣以咸熙中分已疑作巴立宕渠郡蓋古賨國也今有賨城縣有渝水夾水上下皆賨民所居漢祖入關從定三秦其人勇健好歌儛髙祖愛習之今巴渝舞是也縣西北有不曹漢志巴郡宕渠縣注作徐曹水南徑其縣下注潛水縣有車騎將軍馮緄桂陽太守李溫冢二子之靈常以三月還鄉水暴長郡縣吏民莫不於水上祭今所謂馮李也又南入於江庾仲雍云墊江有别江出晉夀縣即潛水也其南源取巴西是西漢水也湍水出酈縣北芬山南流過其縣東又南過冠軍縣東漢志酈縣冠軍俱屬南陽郡酈縣故城在今南陽府內鄉縣東冠軍故城在今鄧州北湍水在州城北三里湍水出𢎞農畍翼望山水甚清徹東南流徑南酈縣故城東史記所謂下酈也漢武帝元朔元年封左將軍同按史表元封元年封左將黃同為下酈侯今云元朔誤左將軍同亦誤按索隱曰西南夷傳甌駱將左黃同則左是姓恐誤漢表云左將黃同則左將是官不疑湍水又南菊水注之水出西北石澗山芳菊溪亦言出祈谷漢志作析谷蓋溪澗之異名也漢志𢎞農郡析縣黃水出黃谷鞠水出析谷俱東至酈入湍水師古曰鞠水即今所謂菊潭也明一統志菊潭在內鄉縣西北源出析谷東石澗山其水重於諸水傍生甘菊水極草馨有數十家惟飲此水夀多至百嵗之上源傍悉生菊草潭澗滋液極成甘美云此谷之水土餐挹長年司空王暢太傅袁隗太尉胡廣並汲飲此水以自綏養是以君子留心甘其臭尚矣菊水東南流入於湍湍水又徑其縣東南歷冠軍縣西北有楚堨當從石傍髙下相承八重周十里方塘蓄水澤潤不窮湍水又徑冠軍縣故城東縣本穰縣之盧陽鄉宛之臨駣聚漢武帝以霍去病功冠諸軍故立冠軍縣以封之水西有漢太尉長史邑人張敏碑碑之西有魏征南軍司馬張詹墓墓有碑碑背刋云白楸之棺易朽之裳銅鐵不入凡器不藏嗟矣後人幸勿我傷自後古墳舊冢莫不夷毁而是墓至元嘉初尚不見發六年大水蠻飢始被發掘說者言初開金銀銅錫之器朱漆雕刻之飾爛然有二朱漆棺棺前垂竹簾隱以金釘墓不甚髙而內極寬大虛設白楸之言空負黃金之實雖意固當作錮蓋用張釋之語南山寧同夀乎湍水又徑穰縣為六門陂漢孝成之世南陽太守邵信臣以建昭五年斷湍水立穰西石碣至元始五年更開三門為六石門故號六門碣也溉穰新野昆陽三縣五千何氏云五千疑作五萬餘頃漢末毁廢遂不修理晉太康三年鎮南將軍杜預復更開廣利加於民今廢不修矣六門側猶有六門碑是部曲主安陽亭侯鄧逺等以太康五年立湍水又徑穰縣故城北又東南徑魏武故城之西南是建安三年曹公攻張繡之所築也又東過白牛邑南湍水自白牛邑南建武中世祖封劉嵩為侯國湍水又東南徑安衆縣故城南縣本宛之西鄉漢長沙定王子康侯丹之邑也湍水東南流涅水注之水出涅陽縣西北岐棘山東南徑涅陽縣故城西在鄧州東六十里漢武帝元朔四年封路最為侯國王莽之所謂前亭也應劭曰在涅水之陽矣縣南有二碑碑字紊滅不可復識云是左伯豪碑按後漢書左雄傳雄字伯豪南郡涅陽人涅水又東南徑安衆縣遏而為陂謂之安衆港魏太祖破張繡於是處與荀彧書曰繡遏吾歸師迫我死地蓋於二水之間以為㳂涉之艱岨也涅水又東南流注於湍水又東南至新野縣今仍屬南陽府東入於淯湍水至縣西北東分為鄧氏陂漢太傅鄧禹故宅其奉朝請西亭侯鄧晨故宅隔陂鄧揚上下疑有訛字雍州記云鄧禹宅與鄧晨宅隔陂相望雖牆垣已平基塹可識為晨宅略存焉均水出浙縣北山明一統志均水在今襄陽府均州南流過其縣之東均水發源𢎞農郡之盧氏縣熊耳山山南即修陽葛陽二縣界也雙峰齊秀望若熊耳因以為名齊桓公邵陵之㑹西望熊耳即此山也太史公司馬遷皆嘗登之縣即淅縣之北鄉故言出淅縣北也前漢地理志𢎞農郡有淅縣後漢郡國志析縣改屬南陽郡均水又東南流注徑其縣下南越南鄉縣又南流與丹水合又南當涉都縣邑北南入於沔均水南徑順陽縣西漢哀帝更為博山縣明帝復曰順陽應劭曰縣在順水之陽今於是縣則無聞於順水矣章帝建初四年封衛尉馬康為侯國按後漢書馬援傳援子廖以父任為郎顯宗崩受遺詔典掌門禁衛尉肅宗甚尊重之建初四年封順陽侯此云馬康誤當作馬廖為是晉太康中立為順陽縣西有石山南臨汋水汋水又南流注於沔水謂之汋口者也禹貢錐指云圴口在今穀城縣界鈞均同或從水作汮韻㑹汮字下云隋置汋州取汮水名之是汮即均也史承水經之誤曰汋口晉桓溫伐秦水軍自襄陽入汋口至南鄉是也或又曰汋均口齊陳顯達攻魏馬軍入汋均口是也李子田析蹟云水經注順陽縣西有石山南臨汋水汋水又南流注於沔謂之沔口與水實一水故謂之汋均山故地理志謂之㳙水言熊耳之山㳙水出焉又東南至順陽入於沔粉水出房陵縣東流過郢邑南明一統志粉水源出房山經榖城縣南入漢江粉水𨗳源東流注上粉縣取此水以潰粉則皓耀鮮潔有異衆流故縣水皆取名焉明一統志引雍州記云蕭何夫人於此漬粉鮮潔異於諸水俗呼為粉漬汇此說誕妄不足信又東過榖邑南東入於沔粉水至筑陽縣西而下注於沔水謂之粉水粉水下有脫字有文將軍冢墓隧前有石虎石柱甚修麗閭邱羡之為南陽陽下疑有脫文葬婦墓側將平其域夕忽原本訛患夢文諫止羡之不從後羡之為楊佺期所害論者以為文將軍之祟也白水出朝陽縣西東流過其縣南白河在襄陽府城東北源出南陽州界下入漢江王莽更之曰朝陽也為屬信縣漢志朝陽縣屬南陽郡莽曰厲信今云屬信誤又王莽更之曰朝陽句亦誤疑當作王莽更之曰厲信縣朝陽也為四字似屬衍文應劭曰縣在朝水之陽今朝水徑其北而不出其南也蓋邑郭淪移川渠狀改故名舊傳遺稱在今也又東至新野縣西東入於㳙考淯水篇淯水亦徑新野縣西則白水東入疑是淯水㳙字訛疑從淯為是泚水出泚陽東北太胡山按漢志南陽郡比陽下應劭曰比水所出東入蔡後漢書光武紀漢軍與甄阜梁邱賜戰於沘水西注沘水在今唐州沘陽縣南通典唐州理比陽縣而此作泚陽泚水彼此互異又山海經石者之山泚水出焉西流注於河東始之山泚水出焉東北注於海亦作泚泚與比似可通稱也東南流徑其縣南泄水從南來注之太胡山在泚陽北如東三十餘里廣員五六十里張衡賦南都所謂天封太胡者也天封山在今南陽府唐縣境一名太胡山應劭曰泚水出泚陽縣東入蔡經云泄水從南來注之然泚陽無泄水蓋誤引之之字當在夀春下說見後泚水篇夀春泚泄耳余以延昌四年䝉除東荆州刺史州治泚陽縣故城城南有蔡水出南盤石山故亦曰盤石川西北流注於泚非泄水也吕氏春秋曰齊令章子與韓魏攻荆荆使唐薎應之夾泚而軍欲視水之淺深荆人射之而莫知也有菡一作芻者曰兵盛則水淺矣章子夜襲之斬薎於是水之上也泚水又西澳水注之水北出茈邱山東流屈而南轉又南入於泚水按山海經云澳水又北入視不注泚水山海經云奧水出奧山東流注於視水余按吕忱字林及難字爾雅並言􅖐水在泚陽脉其川流所謂診其水土津注宜是􅖐水音藥也泚水又西南歷長岡月城北舊舊上當有脫文或衍泚水右㑹馬仁陂水水出潕陰北山泉流競湊水積成湖蓋地百頃謂之馬仁陂陂水歷其縣下西南遏之以溉田疇公私引列水流遂斷故瀆尚存泚水又南徑㑹口與諸水枝津合泚水又南與澧水㑹澧水源出於桐柏山與淮同源而别流西注故亦謂是水為派水澧水西北流徑平氏縣故城東北王莽更名其縣曰平善城內有南陽都鄉正衛顧氏云衛當從集古録作街何氏云𨽻釋作衛彈勸碑澧水又西北合溲水水出湖陽北山西流北屈徑平氏城西為疑當是而字北入澧水澧水又西注泚水泚水自下亦通謂之為派水昔漢光武破甄阜梁邱賜於泚水西斬之斯水也泚水又南趙醴二渠出焉泚水又西南流謝水注之水出謝城北二源微小至城漸大城周回側水詩所謂申伯畨畨既入於謝者也世祖建武十三年封樊重少子丹為謝陽侯即其國也然則是水即謝水也按後漢書樊宏傳宏弟丹封射陽侯此云謝陽恐誤但既引毛詩為證又似無誤豈古木漢書作謝而今本訛作射耶岸下深浚流流上疑有脫文徐平時人目之為渟瀯水城成一作戍又以渟瀯為目非也其西城之舊棘陽縣治故亦謂之棘陽城也謝水又東南徑新都縣左注泚水泚水又西南流徑新都縣故城西王莽更之曰新林郡國志曰以為新野之東鄉故新都者也又西至新野縣今屬南陽府南入於淯泚水於岡南西南流戍在岡上泚水又西南與南長坂門二水合其水東北出湖陽東隆出疑衍當是山字山之西側有漢日南太守胡著碑子珍騎都尉尚湖陽長公主即光武之伯姊也廟堂皆以青石為階陛廟北有石堂珍之𤣥孫桂陽太守瑒以延熹四年遭母憂於墓次立石祠勒銘於梁石宇傾頽而梁字無毁盛𢎞之以為樊重之母畏雷室蓋傳疑之謬也隆山南有一小山山圾一作坂有兩石虎相對夾隧道雖處蠻荒全無破毁作制甚工信為妙矣世人因謂之為石虎山其水西南流徑湖陽縣故城南今在南陽府唐縣南地理志曰故蓼國也竹書紀年曰楚王㑹宋平於湖陽者矣東城中有二碑似是樊重碑悉載故吏人名司馬彪曰仲山甫封於樊因氏國焉爰自宅陽徙居湖陽朱云漢志南陽郡有比陽縣湖陽縣此宅陽乃比陽之誤按樊宏傳樊氏仲山甫之後南陽湖陽人也能治田殖至三百頃起廬舍髙樓連閣波陂灌注竹木成林六畜放牧魚羸梨果檀棘桑麻閉門成市兵弩器械資至百萬其興工造作為無窮之巧不可言言上疑有脫文富擬封君世祖之少數歸外氏及之長安受業齎送甚至世祖即位追爵敬侯詔湖陽為重立廟置吏奉祠巡祠章陵常幸重墓其水四周城溉城之東南有若令樊萌中常侍樊安碑城南有數碑無字又有石廟數間依於墓側棟宇崩毁惟石壁而已亦不知誰之胄族矣其水南入大湖湖陽之名縣藉兹而納稱也湖水西南流又與湖陽諸陂散水合謂之板橋水又西南與醴渠合又有趙渠注之二水上承派水南徑新都縣故城東兩瀆雙引南合板橋水板橋水又西南與長水㑹水上承唐子襄鄉諸陂散流也唐子陂在唐子山西南有唐子亭漢光武自新野屠唐子鄉殺湖陽尉於是地陂水清深光武後以為神淵西南流入新野縣與板橋水合西南注於泚水又西南流注於淯水也水經注集釋訂訛卷二十九
