body:
  text: 水經注集釋訂訛卷十一歸安沈炳巽撰易水滱水易水出涿郡故安縣閻鄉西山涿郡今直𨽻順天府涿州故安今為保定府易州易水出西山寬中谷東徑五大夫城南五公城在今保定府滿城縣昔北平侯王談不同王莽之政子興生五子並避時亂隱居此山故其舊居世以為五大夫城即此按漢表王談封平阿侯且卒于成帝鴻嘉四年是時莽尚未封侯烏得云不同王莽之政也所謂北平侯者尤不可信矣又按元后傳談子仁仁子術亦無所謂興者惟后傳有云平阿侯仁素剛直莽內憚之令大臣奏以罪過迫令自殺則不從莽者仁也非談也豈興為仁子因避莽而隱居此山乎所未詳也嶽讃云五王在中龎葛建績宋本作龎葛連續者也易水東左與子莊溪水合水北出子莊關南流徑五公城西屈徑其城南五公猶疑作即王興之五子也光武即帝位封為五侯按五侯之封史無明文顧氏日知録云此係後人追撰妄説不足取信東漢人二名者絶少又滱水篇􅋤水東徑安喜縣南注云縣故安喜也漢章帝改曰安喜則安喜改于章帝豈光武時先有安喜之名其為妄撰無疑元才北平侯益才安喜侯按河北記作安嘉侯顯才蒲隂侯仲才新市侯河北記作新安侯季才為唐侯所謂中山之五王也俗又以五公名居矣二館之城朱云二館謂樊於期館荆軻館二館並有城澗曲泉清山髙林茂風煙披薄觸目栖情方外之士尚憑依舊居取暢林木其水東南入于易水易水又右會女思谷水水出西南女思澗東北流注于易謂之三會口易水又東屆關門城西南即燕之長城門也與樊石山水合水源西出廣昌鄉縣之樊石山東流徑覆釡山下東流注于易水易水又東歷燕之長城又東徑漸離城南蓋太子丹館髙漸離館也易水又東徑武陽南武陽城在今易州城南蓋易自寬中歷武夫關東出是兼武水之稱故燕之下都擅武陽之名左得濡水枝津故瀆武陽大城東南小城即固一作故下同安縣之故城也漢文帝封丞相申屠嘉為侯國城東西二里南北一里半髙誘云易水徑固安城南外東流即斯水也誘是涿人事明經證今水破城東南隅世又謂易水為固安河武陽蓋燕昭王之所城也東西二十里南北十七里故傅逮述遊賦曰出北薊歷良鄉登金臺觀武陽兩城遼廓舊迹冥芒蓋謂是處也易水東流而出於范陽東過范陽縣南今為順天府房山縣地故城在易州東南六十里又東過容城縣南容城縣今屬保定府易水徑出范陽縣故城秦末張耳陳餘為陳勝略地燕趙命蒯通説之范陽先下是也漢景帝中元三年封胸奴降王代為侯國巨莽之通順也漢志作莽曰順隂易水又東與濡水合出故安縣西北窮獨山南谷東流與源泉水合水發北溪東西流注濡水濡水又東南徑樊於期館西是其授首於荆軻處也濡水又東南流徑荆軻館北荆軻城在今易州城西七里昔燕丹納田生之言尊軻上卿館之於此二城並廣一里許俱在罡阜之上邪上而下方濡水又東徑范陽城西北舊堨濡水枝流南入城徑相冢西冢垣城側耶疑作即水塘也四周塋域深廣有若城焉其水側有數陵墳髙壯望若青丘詢之古老訪之史籍並無文證以私情求之當是燕都之前故墳也或言燕之墳塋斯不然矣其水之故瀆南出屈而東轉又分為二瀆一水東注金臺陂一水徑故安城西側城南注易水夾塘崇峻邃岸髙深左右百步一釣臺參差交跱迢遞相望更為佳觀矣其一水東出金臺陂東西六七十里南有金二字疑衍北五十步側陂西北有釣臺髙丈餘方可四十步陂北十餘步有金臺臺上東西八十許步南北加減髙十餘丈昔慕容垂之為范陽也戍之即斯臺北有蘭馬臺並悉髙數丈秀峙相對翼臺左右水流經通長廡廣宇周施浦渚棟堵咸淪柱礎尚存是其基構可得而尋意欲圖還上京阻于行旅造次不獲遂心訪諸耆舊咸言昭王禮賔廣延方士至如郭隗樂毅之徒鄒衍劇辛之儔宦遊歷説之民自逺而屆者多矣不欲令諸侯之客伺隙燕邦故修建下都館之南垂言燕昭創之於前子丹踵之於後故雕牆敗館尚傳鐫刻之名雖無紀可憑察其古迹似符傳矣濡水自堰又東徑紫池堡西屈而北流又有渾塘溝水注之水出酋縣西按漢志涿郡有遒縣師古曰古遒字此云酋誤今為保定府淶水縣故城在縣治北白馬山南溪中東南流入濡水明一統志濡水源出易州窮獨山東南流至易州支分入城近東方四里許淵而不流號聖女水濡水又東至塞口古纍石堰水處也濡水舊枝分南入城東大陂陂方四里今無水陂內有泉淵而不流際池北側俗謂聖女泉濡水又東得白楊水口出遒縣之西山白楊嶺下東南流入濡水時人謂之虎眼泉也濡水東合檀山水水出遒縣西北檀山西南南流與石泉水會水出石泉固東南隅水廣二十許步深三丈固在衆山之內平川之中四周絶澗阻水八丈有餘石髙五丈石上赤土又髙一丈四壁立直立上廣四十五步水之不周者路不容軌僅通人焉謂之石泉固固上宿有白楊寺是白楊山神也寺側林木交蔭叢柯隱景沙門釋法澄建剎於其上更為思亥疑作玄之勝處也其水南流注于檀水故俗有并溝之稱焉其水又東南流歷固一作故下同安縣北而南注濡水又東南流於容城縣西北大利亭東南合易水而注巨馬水也明一統志拒馬水源出山西代郡淶山流經淶水縣北又東南經定興縣治西與白澗河合晉劉琨守此以拒石勒故名又東至新城縣界一名白溝河故地理志曰固安縣閻原本訛門鄉易水所出至范陽入濡水闞駰亦言是矣又曰濡水合渠許慎曰濡水入深深渠按許氏説文云濡水出涿郡故安東入漆洓深深二字當作漆洓二號即巨馬之異名然二易俱出一鄉同入濡水南濡北易至涿郡范陽縣會北濡又並亂流入沫一作淶是則易水與諸水互攝通稱東徑容城縣故城北渾濤東注至勃海平舒縣與易水合闞駰曰涿郡西界代之易水而是水出代郡廣昌縣東南郎山東北燕王仙臺東臺有三峯甚為崇峻騰雲冠峯髙霞翼嶺岫壑沖深合疑作含煙罩霧耆舊言燕昭王求仙處其東謂之石虎罡范曄漢書云中山簡王焉之窆也厚其葬採涿郡山石以樹墳塋後漢書中山簡王焉立五十二年薨詔重其禮大為修冢塋開神道平夷吏人冢墓以千數作者萬餘人發常山巨鹿涿郡柏黃腸雜木三郡不能備復調餘州郡工徒及送致者數千人凡徴徭動六州十八郡制度餘國莫及陵隧碑狩並出此山謂之石虎山山有所遺二石虎後人因以名罡疑脫岡字之東麓即泉源所𨗳也經所謂閻鄉曲朱云詳經文曲字當作西山二字其水東流有毖水南會渾波同注俗謂之為雹河司馬彪郡國志曰雹水出固安縣世祖令耿况擊故安西山賊吳耐蠡符雹上十餘營皆破之即是水者也易水又東徑孔山北今在易州城西南五十里山下有鍾乳穴穴出佳乳採者煹火尋炒朱本云一作沙沙者以其雜土石而言也出穴而去土與石即為乳矣入穴里許渡一水潛通流注其深可涉於中衆穴竒分令出入者疑迷不知所趣每於疑路必有歷記返者乃尋孔以自達矣上又有大孔壑達洞開故以孔山為名也其水又東徑西固安城其所上下疑有訛字脫文宋本作南即閻鄉城也歷送荆陘北耆舊云燕丹餞荆軻於此因而名焉世代已逺非所詳也遺名舊傳不容不詮庶廣後人傳聞之聽易水又東流屈徑長城西又東流南過武遂縣南今為正定府武強縣新城縣北今屬保定府史記曰趙將李牧伐燕取武遂方城是也俗又謂水為武遂津津北對長城門謂之分門史記趙世家云孝成十九年趙與燕易按史記易下漏土字以龍兊汾門與燕燕以葛城武陽與趙即此也亦曰分門朱云分門疑有脫誤據郡國志云涿郡北新城有汾水門恐當從此門又謂之梁門矣易水東分為梁門陂易水又東梁門陂水注之水上承易水於梁門東入長城東北入陂陂水北接范陽陂陂在范陽城西十里方一十五里俗亦謂之為鹽臺陂陂水南通梁門淀方三里淀水東南流出長注易長字疑衍易下疑漏水字謂之范水易水自下有范水通目又東徑范陽縣故城南即應劭所謂范水之陽也易水又徑樊與當作輿下同縣故城北今為保定府治故城在府城東南三十里漢武帝元朔五年封中山靖王子劉條為侯國王莽更名握符矣地理風俗記曰北新城縣東二十里有衍樊樊與當作輿亭故縣也易水東徑容城縣故城南今屬保定府漢髙帝六年封趙將夜於深澤景帝中元三年以封胸奴降王唯徐盧於容城漢書作携徐盧皆為侯國王莽更名深澤易水又東渥水注之其水上承二陂於容城縣東南謂之大渥澱小渥澱水南流注易水謂之渥同口水側有渾渥城易水徑其南東合滱水故桑欽曰易水出北新城西北東入滱自下滱易互受通稱矣易水又東徑易京南漢末公孫瓉害劉虞於薊下時童謡云燕南垂趙北際唯有此中可避世瓉以易地當之故自薊徙臨易水謂之易京城在今保定府雄縣在易城西四五里趙建武四年石虎自遼西南達易京以京鄣至固令二萬人廢壞之今者地壁夷平其樓基尚存猶髙一匹餘漢書食貨志布帛廣二尺二寸為幅長四丈為匹小爾雅倍兩謂之匹基上有井世名易京樓即瓉所堡也故瓉所與子書云袁氏之攻狀若鬼神衝梯舞于樓上鼓角鳴于地中即此樓也易水又東徑易縣故城南今為保定府雄縣故城有二一在雄縣漢置一在舊故安城西北隅隋置即易州附郭今省入易州昔燕文公徙易即此城也闞駰稱燕太子丹遣荆軻刺秦王與賓客知謀者祖道於易水上皆素衣冠送之于易水之上荆歌疑作軻起為夀歌曰風蕭蕭兮易水寒壯士一去兮不復還漸離擊築宋如意和之按國策史記俱無宋如意事唯陶淵明詠荆軻詩云漸離擊悲築宋意唱髙聲用之為壯聲士髮皆衝冠為哀聲士皆流涕疑於此也余按遺傳舊迹多在武陽似不餞此也漢景帝中和三年封胸奴降王僕䵣史表作黥為侯國也又東過安次縣南今為順天府東安縣其故城在縣西北易水徑縣南鄭縣故城北按漢志涿郡有鄭縣而無鄭縣此鄭字當作鄚今為河間府任邱縣其故城在縣北三十里今曰莫州城東至文安縣今屬順天府與雩池合史記蘇秦曰燕長城以北易水以南正謂此水也是以班固闞駰之徒咸以斯水謂之南易又東過泉州縣南東入于海今為順天府寶坻縣其故城在武清縣東南四十里經書水之所歷沿次注海也滱水出代郡靈邱縣髙氏山山海經作髙是山靈邱縣今屬山西大同府髙是山在蔚州西北七十里即溫嘔夷之水也出縣西北髙氏山嘔夷河今在蔚州境周禮職方氏曰并州之川曰滹沱嘔夷漢書地理志曰代郡靈邱縣滱河東至文安入大河過郡五行九百四十里并州川也鄭司農曰嘔夷即祈夷水出平舒縣元和志蔚州靈邱縣嘔夷水一名滱水出縣西北髙是山今按渾源州在山西大同府東南一百二十里本漢髙繁峙崞二縣屬雁門郡州志云州南七里有翠屏山千餘丈周十里滱水出其東蓋即髙是山之别名東南接靈邱界者也山海經曰髙氏之山滱水出焉東流經于河者也其水東南流山上有石銘題言冀州北界故世謂之石銘陘也在今靈邱縣其水又南徑曰候候塘川名也朱云當作又南徑候塘候塘川名也又東合溫泉水水出西北暄谷其水溫熱若湯能愈百疾故世謂之溫泉焉東南流徑興豆亭北亭在南原上欹傾而不正故世以欹城目之東流注于滱水又東泉水注之水𨗳源莎泉南流水側有莎泉亭東南入于滱水又東徑靈丘縣故城南在今渾源州西南一百三十里西北去大同二百七十里水中何氏云下疑有脫文自源南注滱水應劭曰趙武靈王葬其東南二十里今在靈丘縣東南三十里故縣氏之縣古屬代漢靈帝光和元年中山相藏昊當作昶上請别屬也地理志曰靈丘之號在武靈王之前矣又按司馬遷趙敬侯二年敗齊於靈丘史記六國表作敬侯九年伐齊至靈丘與趙世家異按史記注云此靈丘齊地非代郡之靈丘則又安知不因靈王也酈注恐不可從宜依應説為是則名不因靈王事如漢志滱水自縣南流入峽謂之隘門設隘於峽以譏禁行旅歷南山髙峯隱天深溪埒谷其水沿澗西轉徑御射臺南臺在北阜上臺南有御射石碑南則秀鄣分霄層崖刺天積石之峻壁立直上車駕沿革二字疑衍每出所遊幸焉滱水西流又南轉東屈徑北海王詳之石碣南御所屆疑訛石柱北而南流者也東過廣昌縣南今屬大名府蔚州滱水東徑嘉牙川川疑當作又有一水南來注之水出恆山北麓雖川三合徑嘉牙亭東疑有訛誤而北流注于滱水水之北山行即廣昌縣界滱水又東徑倒馬關在廣昌縣南七十里關山險隘是為深峭勢均詩人髙罡當作岡之病良馬上下疑有脫文傳嶮之行軒故關受其名焉關水出西南長溪下東北歷關注滱滱水南山上起御坐於松園建祇洹東圃北二面以上有訛脫岫鄣髙深霞峯隱日水望澄明淵無潛甲行李所徑鮮不徘徊忘返矣又東南過中山上曲陽縣北今屬正定府恆水從西來注之按曲陽縣隋為恆陽縣地理志云有恆陽溪即恆水源也曲陽縣志滱水在縣東北滱水自倒馬關南流與大嶺水合水出山西南大嶺下東北流出峽峽右山則有祗洹精廬飛陸陵山丹盤虹梁長津泛瀾縈帶其下東北流注于滱滱水又屈而東合兩嶺溪水水出恆山北阜東北流歷兩嶺間北嶺雖層陵雲舉猶不若南巒削秀自水南步逺峯石磴逶迤沿途九曲歷睇諸山咸為劣矣抑亦羊腸卭來之類者也髙誘吕覽注曰羊腸山盤紆如羊腸在太原晉陽北又淮南子注云羊腸坂是太行孟門之限也華陽國志曰卭崍山本名卭筰其岩阻峻回曲九折乃至山上凝冰夏結冬則劇與齊宋通和路出其間其水東北流注于滱水又東左合懸水水出山原此下疑有訛脫岫盤谷輕湍濬下分石飛懸水一匹有餘直灌山際白波奮流自成潭渚其水東南流揚湍注于滱滱水又東流歷山世謂是處為鴻頭疑即晉書地道記所謂鴻上關者也關尉治北平而畫塞於上都東北云當從宋本作去北平不逺兼縣上所拯也􅋤水於是左納鴻上水水出西北近溪東南流注于滱水也又東過唐縣南今屬保定府滱水又東徑左人城南應劭曰中人城西北四十里亦或謂之為唐水也水出中山城之西北城內有小山在城西側山鋭上若委粟焉疑即地道記所云望都縣有委粟關也俗以山在邑中故亦謂之中山城在今唐縣西北十三里以城中有山之木疑作目因復謂之為廣唐城也故中山記以為中人城又以為鼓聚殊為乖謬矣言城中有山故曰中人山也中山郡治京相璠曰今中山望都里里字當作西北左傳注云望都縣西北有中人城二十里有故中人城望都城東有一城名堯始城本無中人之傳璠或以為中人所未詳也中山記所言中人者城東去望都故城一十餘里望都縣今為保定府慶都縣二十里則減但苦其不東觀矣此句疑有訛誤異説咸為爽矣今此城於盧奴城北如西六十里城之西北泉源所𨗳西徑狼山北郎唐音讀近實兼唐水之傳西流歷左人亭注滱水又東左會一水水出中山城北郎中阜下亦謂之唐水也然於城非西在疑作北又名之謂雹水又兼二名焉西南流入滱並所未詳蓋傳疑耳滱水又東恆水從西來注之自下滱水兼納恆川之通稱焉即禹貢所謂恆衛既從也滱水又東右苞馬溺水水出上曲陽城東北馬溺水東北流徑伏亭晉書地道記曰望都縣有馬溺關中山記曰八渡馬溺是山曲要害之地一一關勢帶接疑斯城即是關尉宿治異目之來非所詳矣馬溺水又東流注于滱滱水又東徑中人亭南在今唐縣界春秋左傳昭公十三年晉荀吳率師侵鮮虞及中人大獲而歸者也滱水又東徑京邱北世謂之京京字上下疑有脫文南對漢項王陵滱水北對君子津津上有哀王子憲王陵坎下有泉源積水亦曰泉上岸滱水又東徑白土北南即靖王子康王陵三墳並列者是矣原本漏滱水又東徑樂羊城北史記稱魏文侯漏使字樂羊滅中山蓋其故城中山所造也故城得其名滱水又東徑唐縣故城南此二城俱在滱水之陽故曰滱水徑其東城西又有一水𨗳源盧奴縣之西北是城西平城之地泉湧而出俗亦謂之為唐水也東流至唐城西北隅堨而為湖俗謂之唐池蓮荷被水勝遊多萃其上信為嬉處也其水南入小溝下注滱水自上歷下通禪疑作擅唐川之兼稱焉應劭地理風俗記曰唐縣西四十里得中人亭今於此城取中人鄉則四十里也後漢書郡國志唐縣有中人亭注引博物記曰唐關在中人西北百里中人在縣西四十里唐水在西北入滱與應符合又言堯山者在南則無山以擬之為非也闞駰十三州志曰山治盧奴唐縣故域疑作城在國北七十五里駰所説此則非也史記曰帝嚳氏沒帝堯氏作始封於唐望都縣在南今此城南對盧奴故城自外無城以應之考古今知疑作知今事義全違俗名望都故城則八十許里距中山城則七十里驗途推邑宜為唐城城北去山五里與七十五里之説相符然則俗謂之都香山即是堯山在唐東北望都界皇甫謐曰堯山一名豆山按皇甫謐帝王世紀曰堯封唐堯山在北唐水西入河南有望都山即堯母慶都所居相去五十里都山一名豆山今山於城北而如東嶄絶孤峙唐牙桀立朱云唐牙當作虎牙山南有堯廟是即堯所登之山者也地理志曰堯山在南今考此城之南又無山以應之是故先後論者咸以地理之説為失又即俗説以唐城為望都城者自此無城以擬之假復有之途程紆疑漏逺字山河之狀全乖古證傳為踈罔是城西北豆山西足有一泉源東北流徑豆山下合蘇水亂流轉注東入滱是豈唐水乎所未詳也又於是城之南如東一十餘里有一城俗謂之髙昌縣城或望都之故城也故縣目曰望都縣在髙南昌皇甫謐曰相去五十里稽諸城地猶十五里蓋書誤耳此城之東有山孤峙世以山不連陵名之曰孤山孤都聲相近疑即所謂都山也帝王世記曰堯母慶都所居張晏曰堯山在北堯母慶都山在南登堯山見都山故望都縣以為名也唐亦中山城也為武公之國周同姓其後桓公不恤國政周王問太史餘曰今之諸侯孰先亡乎對曰天生民而令有别所以異禽獸也今中山淫昏荒樂逞欲無度其先亡矣後二年果滅魏文侯以封太子擊也漢髙祖立中山郡景帝三年為侯國王莽之常山也魏皇始二年破中山立安州天興三年改曰定州治水南疑漏盧字奴縣之故城周之衰也國有赤狄之難齊桓霸諸侯疆理邑土遣管仲攘戎狄築城以固之地理志曰盧水出北平疑為踈濶闞駰應劭之徒咸亦言是矣余按盧奴城內西北隅有水淵而不流南北一百步東西百餘步水色正黑俗名曰黑水池或云黑水曰盧不流曰奴故城北疑作亦藉水以取名矣池水東北際水有漢王故宫處臺殿觀榭皆上國之制簡王疑訛尊貴壯麗有加始築兩宫開四門穿城北一作北城纍石竇通涿疑訛唐水流于城中造魚池釣臺戲馬之觀歲久頽毁遺基尚存今悉加土為剎利靈圖三字疑有訛誤池之四周民居駢比填遍穢陋而泉源不絶暨趙石建武七年遣北中郎將始築小城興起北榭立宫造殿後燕因其故宫建都中山小城之南更築隔城興復宫觀今府榭猶傳故制昔耿伯昭歸世祖於此處也後漢書耿弇傳弇字伯昭扶風茂陵人也聞光武在盧奴馳北上謁滱水之右盧水注之上承城內盧水池自漠疑作漢及燕涿滱水徑石竇石竇既毁池道亦絶水潛流出城潭積澄漲渭渭字疑當作涓水東北注于滱滱水又東徑漢哀王陵北冢有二墳故世謂之兩女陵非也哀王是靖王之孫康王之子也滱水又東右會長星溝溝在上曲陽縣西北長星渚渚水東流又合洛光水水出洛光涓涓疑訛或漏流字東入長星水亂流東徑恆山下廟北漢末喪亂山道不通此舊有下階疑有脫誤神殿中世以來歲書法族焉晉魏改有東西二廟廟前有碑闕壇場相列焉其水東徑上曲陽縣故城北本嶽牧朝宿之邑也古者天子巡狩常以歲十一月至于北嶽侯伯皆有湯沐邑以自齋潔周昭王南征不還巡狩禮廢邑郭仍存秦罷井田因以立縣縣在山曲之陽是曰曲陽有下故此為上矣王莽之常山亭也又東南流胡泉水注之受疑訛或作又胡泉徑上曲陽縣南又東徑平樂亭北左會長星川東南徑盧奴城南又東北川渠之左有張氏墓冢有漢上谷太守議郎張平仲碑光和中立川渠又東北合滱水水有窮通不常津注又東徑安喜縣南今為定州屬正定府其故城在州東三十里縣故安險也其地臨嶮有井塗之難漢武帝元朔五年封中山靖王子劉應為侯國王莽更名寧嶮漢章帝改曰安喜中山記曰縣在唐水之西山髙岸嶮故曰安嶮邑豐民安改曰安喜秦氏建元中建元前秦苻堅偽號唐水泛漲髙岸崩頽城角之下有大積木交橫如梁柱焉後燕之初此木尚在未知所從余考記稽疑蓋城池當初山木渀蕩漂淪巨筏阜積於斯沙息壤加以城池板築既興物固能久耳滱水又東徑鄉城北有舊盧奴之鄉也中山記曰盧奴有三鄉斯其一焉後𨽻安喜城郭南有漢朝時孝子王立碑何氏據𨽻釋改朝作明帝又東過安國縣北今為祁州屬保定府滱水歷縣東分為二水一水枝分東南流徑解瀆亭南漢順帝陽嘉元年封河間孝王子淑於解瀆亭為侯國孫宏即靈帝也又東南徑仕邱城南又東南徑安郭亭南漢武帝元封按史表當作元朔五年封中山靖王子劉博為侯國其水又東南流入于平池宋本作滹沱滱水又東北流徑解瀆亭北而東北注之矣又東過博陵縣南今為正定府饒陽縣定州地滱水東北徑蠡吾縣故城南今在保定府博野縣西南地理風俗記曰縣故饒陽之下鄉者也自河間分屬博陵漢安帝永元初七年河間王開子翼為都鄉侯順帝永建五年更為侯國也後漢書章八王傳河間孝王子蠡吾侯翼元初六年鄧太后徴河間王諸子詣京師歲餘太后崩安帝乳母王聖與中常侍冮京等譛翼謀圖不軌窺覦神器貶都鄉侯遣歸河間永建五年父開上書願分蠡吾縣以封翼順帝從之又徑博陵縣故城南即古陸城漢武帝元朔二年封中山靖王子劉貞為侯國者也按史記表元朔二年封中山靖王子貞為陘城侯漢表作陸城屬中山郡地理風俗記曰博陵縣史記蠡吾故縣矣漢質帝本初元年疑漏孝桓二字繼孝質為帝追尊父翼陵曰博陵因以為縣又置郡焉後漢書桓帝紀帝肅宗曽孫蠡吾侯翼子本初元年質帝崩太后命梁冀持節迎帝入宫即皇帝位追尊皇考為孝崇皇皇母匽氏為孝崇博陵園貴人注曰帝既追尊其父為孝崇皇其陵曰博陵置園廟焉故曰博園漢末罷還安平晉太始年復為郡今謂是城為野城滱水又東北徑侯世縣故南城當作城南故城在今保定府蠡縣東北又東北徑陵陽亭東又北左會博水水出望都縣東南流徑其縣故城南王莽更名曰順調矣又東南潛入地下博水又東南南下疑有脫文於瀆重源湧發東南徑三梁亭南疑即古勺梁也竹書紀年曰燕人伐趙圍濁鹿趙靈王及代人救濁鹿敗燕師于勺梁者也今廣昌東嶺之東有山俗名之曰濁鹿羅地地上下疑有脫文不逺土勢相鄰以此推之或近是矣所未詳也博水又東南徑榖梁亭南又東徑陽城縣散為澤渚渚水濖張宋本作瀦漲方數里匪直蒲筍是豐實亦偏饒菱藕至若孌童丱下疑漏角字及弱年女子楊慎曰弱年女子女原作崽子改切楚人謂子曰崽今本妄改作女非是或單舟採菱或疊舸折芰長歌陽春愛深渌水掇拾者不言疲謡詠者自自下疑有脫文朱云疑漏相和二字于時行旅過矚亦有慰於羈望矣世謂之為陽城澱也陽城縣故城近在西北故陂得其名焉郡國志曰蒲隂縣有陽城者也今城在縣東南三十里其水又伏流循瀆屆清梁亭西北重源又發博水又東徑自堤亭南又東徑廣望縣故城北漢武帝元朔二年封中山靖王子劉忠為侯國漢書表元朔二年封中山靖王子忠為廣望侯史表作望廣侯劉安中又東合堀一作崛溝溝上承清梁陂又北徑清源城東即將梁也漢武帝元朔二年封中山靖王子劉朝平為侯國史漢表劉朝平封將梁侯其水東北入博水博水又東北左則濡水注之水出蒲隂縣西昌安郭南中山記曰郭東有舜氏甘泉有舜及二妃祠稽諸傳記無聞此處世代久逺異説之來於是乎在矣其水自源東徑其縣故城南枉渚回湍率多曲復亦謂之為曲逆水也張晏曰湍水於城北曲而西流是受此名故縣亦因水名而氏曲逆矣春秋左傳哀公四年齊國夏伐晉取曲逆是也左傳哀公四年十二月國夏伐晉取邢任欒鄗逆畤隂人盂壺口漢髙帝擊韓王信自代過曲逆上其城望室宇甚多曰壯哉吾行天下唯雒陽與是耳詔以封陳平為曲逆侯王莽更名順平濡水又東與蘇水合水出縣西南近山東北流徑堯始亭南又東徑其縣入湍湍水又東得蒲水口水出西北蒲陽山西南流積水成淵東西一百步南北百餘步深而不測其水又東南流水側有古神祠世謂之為百祠亦曰蒲上祠所未詳也又南徑安陽亭東晉書地道記曰蒲隂縣有安陽關蓋安陽關都尉治世俗名斯川為安陽壙蒲水又東南歷壙徑安陽關下名關睪為唐頭坂出關北流又東流徑夏屋故城實中嶮絶竹書紀年曰魏殷臣趙公孫裒伐燕還取夏屋城曲逆者也其城東側因河仍墉築一城世謂之寡婦城賈復從光武追銅馬五幡於北平所作也世俗音轉故有是名矣其水又東南流徑蒲隂縣故城北地理志曰城在蒲水之隂漢章帝章和二年行巡北嶽以曲逆名不善因山水之名改曰蒲隂焉水右合漁水水出北平縣西南魚山山石善巨焉上下疑有訛字水發其下故世俗以物色名川又東流注于蒲水又東入濡故地理志曰蒲水蘇水並從縣東入濡水又東北徑樂城南又東入博水自下博水亦兼濡水通稱矣春秋昭公七年齊與燕會于濡水杜預曰濡水出髙陽縣東北至河間鄚縣入易水是濡水與雽池滱易互舉通稱矣地理志曰博水東至髙陽入河博水又東北徐水注之水西出廣昌縣東南大嶺下世謂之廣昌嶺嶺髙四十餘里二十里中委折五回方得達其上嶺故嶺有五回之名下望層山盛疑作盤一作咸若蟻蛭實兼孤山之稱亦峻崠也疑作峻崍徐水三源竒發齊寫一澗東流北轉徑東山下水西有御射碑徐水又北流西屈徑南巖下水隂又有一碑徐水又隨山南轉徑東崖下水際又有一碑凡此三銘皆翼對層巖巖鄣深髙壁立霞峙石文云皇帝以太延元年十二月車駕東巡徑五回之嶮途覽崇岸之竦峙乃停駕路側援弓而射之飛矢踰于巖山刋石用讃元功夾碑並有層臺三所即御射處也碑隂皆列樹碑官名徐水屈東北徑郎山又屈徑其山南岑疑衍山岑競舉若竪鳥翅立石嶄巖亦如劍杪極地噞之崇峭漢武之世戾太子以巫蠱出奔其子逺遁斯山故世有郎山之名山內有郎山碑事具文一作事具于文徐水又徑郎山君子中觸鋒將軍廣疑漏廟字南廟前有碑晉惠帝永康元年八月十四日壬寅發詔錫君父子法祠其碑劉曜光初七年前頴丘太守郎宣北平太守陽平邑振等共修舊碑刻石樹頌焉徐水又徑北平縣縣界有漢熹平四年幽冀二州以戊子此句有訛脫蓋是二州爭境事聞于朝故詔書遣官令之立石標記耳詔書遣翼當作冀州從事王球幽州從事張朗郡縣分境立石標界具揭石文矣徐州當作水或作川又東南流歷石門中世俗謂之龍門也其山上合下開開處髙六丈飛水歷其間南出垂崖傾瀾㵼注七丈有餘渀蕩之音竒為壯猛觸石成井水深不測素波白激濤襄四陸闞之者驚神臨之者駭魄矣東南出山徑其城中有故碑是太白君碑郎山君之元子也其水又東流漢光武追銅馬五幡於北平破之順水北乘勝追北為其所敗短兵相接光武自投崖下遇突騎王豐於是授馬進保范陽順水蓋徐水之别名也徐水又東徑蒲城北又東徑清苑城又東南與沈水出蒲西俗謂之泉頭水也地理志曰北平縣有沈水東入河即是水也東徑其城又東南左入徐水地理志曰東至髙陽入河今不能也徐水又東左合會曹水出西北水也寧縣宋本作水出西北朔寧縣曹河澤東南流左合岐山之水水出岐山東徑邢安城北又東南入曹河曹水又東南徑北新城縣故城南河南又徑新城故城北此王莽之朔寧縣也曹水又東入于徐水水又東南徑故城北俗謂之祭過城所未詳也徐水又東流入博水地理志曰徐水出北平東至髙陽入于河一作博又東入滱地理志曰博水自望都東至髙陽入于河又東北入于易滱水又東北徑依城北世謂之依城河今安州北有依城河他説無依城之名即古葛城也郡國志曰髙陽有葛城燕以與趙者也滱水又東北徑阿陵縣故城東寰宇記阿陵故城在莫州任丘縣東北二十里滱水枯瀆在縣西一里王莽之阿陸也建武二年更封左將軍任光為侯國滱水東北至長城注于易水者也長城在今順天府文安縣界易水有北易中易南易此中易受北易而合流者寰宇記南易水自容城縣南流入瀛州髙陽縣與滱水合南易一名雹水禹貢錐指曰以今輿地言之渾源靈丘廣昌並屬山西大同府唐縣定州慶都祁州博野蠡縣髙陽安州新安並屬直𨽻保定府曲陽屬正定府任丘屬河間府文安屬順天府諸州縣界中皆古滱水之所行也宋初猶未改自咸平中何承矩興塘濼以限契丹戎馬之足於是始引水歸北而文安之瀆遂空其後滱水仍自蠡縣改流經肅寧河間雄縣任丘以至文安而不復北行明時則又自雄縣改流入霸州保安界為玉帶河不復入文安矣此恆水下流變徙之大略也水經注集釋訂訛卷十一
