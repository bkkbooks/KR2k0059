body:
  text: 水經注集釋訂訛卷十二歸安沈炳巽撰聖水巨馬水聖水出上谷漢上谷郡今為直𨽻順天保定等府明一統志聖水即今琉璃河在良鄉縣南四十里金史作劉李河自房山縣龍泉峪流至霸州入巨馬河故燕也秦始皇二十三年置上谷郡王隱晉書地道志曰郡在谷之頭故因以上谷名焉王莽改名朔調也水出郡之西南聖水谷東南流徑大防嶺之東首山下有石穴東北洞開髙廣四五丈入穴轉更崇深穴中有水耆舊傳言昔有沙門釋惠彌者好精物隱嘗火尋之傍水入穴三里有餘穴分為二一穴殊小西北出不知趣詣一穴西南出入水徑五六日方還又不測窮深其水夏冷冬溫春秋有白魚出穴數日而返人有採捕食者美珍常味蓋亦丙穴嘉魚之流類也是水東北流入聖水聖水又東徑玉石山謂之玉石口山多珉玉燕石故以玉石名之其水伏流里餘潛源東出又東頽波㵼澗一丈有餘屈而流也東過良鄉縣南今屬順天府聖水南流歷縣西轉又南徑良鄉縣故城西王莽之廣陽也有防水注之水出縣西北大防山南而東南流徑羊頭阜下俗謂之羊頭溪其水又東南流至縣東入聖水聖水又南與樂水合水出縣西北大防南山東南流歷縣西而東南流注聖水又東過其縣故城南又東徑聚聖南蓋藉水而懷稱也又東與挾明一統志挾河在房山縣東南源出中浣谷流至涿州與湖良河合即琉璃河也河合水出良鄉縣西甘泉原東谷東徑西鄉縣故城北在今涿州西北又名都鄉城王莽之移風也世謂之都鄉城按地理志涿郡有西鄉縣而無都鄉城蓋世傳之非也又東徑良鄉城南又東北注聖水世謂之扷活河宋本作挾沽河又名之曰非漯之溝也又東過長鄉縣北長鄉晉縣本漢陽鄉縣齊以後省入涿郡今為涿州地故城在順天府西南聖水自涿縣東與桃水合首受淶水於徐城東南良鄉西分洹水世謂之南涉溝即杭水也東徑逎縣北朱本云洹水當作垣水下同杭水當作范水涿之為范陽蓋亦取于此又東徑涿縣故城下與涿水合世以為涿水又亦謂之桃水出涿縣故城西南竒溝東八里大坎下數泉同發東徑桃仁墟北或曰因水以名墟則是桃水也或曰終仁之故居非桃水也余按地理志桃水上承淶水此水所發不與志同謂終為是又東北與樂堆泉合水出堆東東南流注于涿水涿水又東北徑涿縣故城西流注于桃應劭曰涿郡故燕漢髙帝六年置其南有涿水蓋氏焉闞駰亦言是矣今於涿城南無水以應之所有唯西南有是水矣應劭又云涿水出上谷涿鹿縣余按涿水自涿鹿東注濕水濕水東南徑廣陽郡與涿郡分水漢髙祖六年分燕置涿郡涿之為名當受涿水通稱矣故郡縣氏之但物理潛通所在分發故在上谷為涿耶水十三卷注內涿水枝分入胸奴者謂之涿耶水山川阻濶並無㳂注之理所在受名者皆是經隱顯相關遙情受用以此推之事或近矣而非所安也桃水又東徑涿縣故城北王莽更名垣翰晉太始元年改曰范陽郡今郡理涿縣故城城內東北角有晉康王碑城東有范陽王司馬虓廟碑桃水又東北與洹水㑹水上分淶水於良鄉縣之桃水世謂之北涉溝南北兩涉溝俱在良鄉縣故應劭曰洹水出良鄉東徑垣縣故城北史記音義曰河間有武垣縣涿有垣縣漢景帝中元三年封胸奴降王賜為侯國王莽之垣翰亭矣按漢書地理志垣縣屬河東郡武垣縣屬涿郡莽曰垣翰亭今云河間有武垣縣涿郡有垣縣恐誤後查後漢書郡國志曰河間原有武垣縣則史記音義從郡國志而言耳但涿郡之垣縣終誤况胸奴降王賜所封垣侯索隱曰縣名屬河東則非涿郡之武垣可知如何可以將河東之垣縣作涿郡之武垣耶世謂之頃城非也又東徑頃亦地名也故有頃上言此句有訛脫字世名之頃前河又東洛水注之水上承鳴澤渚渚方一十五里漢武帝元封四年行幸鳴澤者也服䖍曰澤名在逎縣北界即此澤矣西則獨樹水注之出出上疑有水字逎縣北山東入渚北有甘泉水注之出良鄉西山東南徑西鄉城西而南注澤渚水又東徑西鄉城南又東徑垣縣而南入垣水垣水又東徑涿縣北東流注于桃故應劭曰垣水東入桃闞駰曰至陽鄉注之今按經脈而不能届也桃水東入陽鄉東注聖水聖水又東廣陽水注之水出小廣陽西山東徑廣陽縣故城北在今良鄉縣東漢舊縣齊省入薊縣今為大興宛平兩縣地又東福祿水注焉水出西山東南徑廣陽縣故城南東入廣陽水亂流東南至陽鄉縣右注聖水聖水又東南徑陽鄉城西不徑其北矣縣故涿之陽亭也地理風俗志曰涿縣東五十里有陽鄉亭後分為縣王莽時更名章武即長鄉縣也按太康地記涿有長鄉而無陽鄉矣聖水又東徑長興疑當作鄉城南又東徑方城縣故城下疑漏南北等字方城今為固安縣李牧伐燕取方城是也魏封劉放為侯國聖水又東左㑹白祀溝溝水出廣陽縣之婁城東東南流左合婁城水水出平地𨗳泉東南流右注白祀水亂流東南徑常道城西在今東安縣西北故鄉亭也西去長鄉城四十里魏少帝璜按魏志三少帝紀燕王宇子髙貴鄉公奐于甘露三年封常道鄉公今云璜未詳甘露三年所封也又東南入聖水聖水又東南徑韓城東詩韓奕章曰溥彼韓城燕師所完王錫韓侯其追其貊奄受北國鄭𤣥曰周封韓侯居韓城為侯伯言為獫夷所逼稍稍東遷也王肅曰今涿郡方城縣有韓侯城世謂寒號非也聖水又東南流右㑹清淀水水發西淀東流注聖水謂之劉公口也又東過安次縣南今為順天府東安縣故城在縣西北東入于海聖水又東徑勃海安次縣故城南中平二年桓帝封荆州刺史王敏為侯國中平乃靈帝年號今云桓帝誤又東南流注于巨馬河而不達于海也巨馬河出代郡廣昌縣淶山今屬山西大同府明一統志淶水發源廣昌縣東南流入保定府易州一名巨馬河即淶水也有二源俱發淶山東徑廣昌縣故城南王莽之廣屏魏封樂進為侯國矣淶水又東北徑西射魚城東南而東北流又徑東射魚城南又屈徑其城東竹書紀年曰荀瑶伐中山取窮魚之邱窮射字相類疑即此城也所未詳矣淶水又徑三女亭西又徑樓亭北左屬白澗溪水有二源合注一川川石皓然望同積雪故以物色受名其水又東北流謂之石曹水伏流地下溺疑作溢則通津委注謂之白澗口淶水又東北桑谷水注之水南發溪北注淶水淶水又北徑小黌東又東徑大黌南蓋霍原隱疑漏居字教授處也徐廣云原隱居廣陽山教授數千人為王浚所召雖千古世懸猶表二黌之稱既無碑頌竟不知定誰居也晉書隱逸傳霍原字休明燕國廣陽人也山居積年門徒百數元康末以賢良徴纍下州郡以禮發遣皆不到後王浚稱制謀僭使人問之原不答浚心銜之時有謡曰天子在何許近在豆田中浚以豆為霍收原斬之淶水又東北歷紫石溪口與紫水合水北出聖人城北大亘下東南流左㑹壘砢溪水蓋山崩委澗積石淪隍故溪澗受其名矣水出東北西南流注紫石溪水紫石溪水又徑聖人城東又東南右㑹檐車水水出檐車硎東南流徑聖人城東南南流注紫石水又南注于淶水淶水又東南徑榆城南又屈徑其城東謂之榆城河淶水又南徑藏刀山下層巖壁立直上干霄逺望崖側有若積刀鐶鐶相比咸悉西首淶水東徑徐城北出焉世謂之沙溝水又東督亢溝出焉一水東南流即督亢溝也一水西南出即淶之故瀆矣水盛則長津𢎞注水耗則通波潜伏重源顯於逎縣舊則川矣東過逎縣北今為淶水縣屬保定府淶水上承故瀆於縣北垂重源再發結為長潭潭廣百許步長數百步左右翼帶涓流控引疑漏其字水自成淵渚長川漫下十一許步東南流徑縣故城東漢景帝中元三年以封胸奴降王隆强為侯國王莽更名逎屏也謂之巨馬河亦曰渠水也又東南流又下四字疑衍袁本初遣别將崔臣一作巨業攻固安不下退還公孫瓉追擊之於巨馬水死者六七千人即此水也又東南徑范陽縣故城北易水注之又東南過容城縣北今屬新安縣巨馬水又東酈亭溝水注之水上承督亢溝水於逎縣東東南流歷紫淵東余六世祖樂浪府君自涿之先賢鄉爰宅其隂西帶巨川東翼兹水枝流津通纒絡墟圃匪直田魚之贍可懷信為遊神之勝處也其水東南流又名之為酈亭溝其水又西南轉歷大利亭南入巨馬水又東徑容城縣故城北又東督亢溝水注之水上承淶水於淶谷引之則長津委注過之則微川輟流水德含和變通在我東南流徑逎縣北又東徑涿縣酈亭樓桑里南即劉備之舊里也又東徑督亢澤澤苞方城縣縣故屬廣陽後𨽻於涿郡國志曰縣有督亢亭孫暢之述畫有督亢地圖言燕太子丹使荆軻齎入秦秦王殺軻圖亦絶滅地理書上古聖賢塜地記曰督亢地在涿郡今故安縣南有督亢陌幽州南界也風俗通曰沆漭也言乎淫淫漭漭無崖際也沆澤之無水斥鹵之謂也其水自澤枝分東徑涿縣故城南又東徑漢侍中盧植墓南又東散為澤渚督亢澤也北屈滙于桃水督亢水又南謂之白溝水南徑廣陽亭西而合南枝溝溝水西受巨馬河東出為枝溝又東注白溝白溝又南入于巨馬河巨馬河又東南徑益昌縣濩澱水右注之水上承護陂於臨鄉縣故城西東南徑臨鄉南漢封廣陽王子須按漢表元帝初元元年封廣陽頃王子雲為臨鄉侯今云須誤為侯國地理風俗記曰方城南十里有臨鄉城故縣也城南十里四字疑屬衍文淀水又東南徑益昌縣故城西南入巨馬水巨馬水東徑益昌縣故城南漢封廣陽頃王子嬰為侯國王莽之有秩也地理風俗記曰方城縣東八十里有益昌城故縣也又東八丈溝水注之水出安次縣東北平地泉東南徑安次城東東南徑泉州縣故城西在武清縣東南四十里又南右合雽池河枯溝溝自安次西北東徑常道城東安次縣故城西晉司空劉琨所守以拒石勒也又東南至泉州縣西南今為寶坻縣闕縣等地東入八丈溝又南入巨馬河亂流東注也又東過勃海東平舒縣北今為順天府大城縣東入于海地理志曰淶水東南至容城入于河即濡水也蓋升宋本作互以明㑹矣巨馬水於平舒北南入于雽池而同歸於海也水經注集釋訂訛卷十二
