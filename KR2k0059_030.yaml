body:
  text: 水經注集釋訂訛卷三十歸安沈炳巽撰淮水淮水出南陽平氏縣胎簮山東北過桐柏山禹貢曰導淮自桐柏傳曰桐柏山在南陽之東地理志曰桐柏山在南陽平氏縣東南淮水所出水經云出胎簮山東北過桐柏山胎簮蓋桐柏之旁小山也傅氏曰胎簮即桐柏也後世又别名之耳禹貢𨗳淮自桐柏不應桐柏非淮所出今其山在唐州桐柏縣胡渭曰桐柏見𨗳山今河南南山陽府桐柏縣西北四十里有平氏故城漢縣也胎簮寰宇記云在桐柏西北三十里山海經曰淮出餘山在朝陽東義鄉西尚書𨗳淮自桐柏地理志曰南陽平氏縣王莽之平善也風俗通曰南陽平氏縣桐柏大復山在東南淮水所出也淮均也春秋説題辭曰淮者均其勢也釋名曰淮韋也韋繞揚州北界東至于海也爾雅曰淮為滸然淮水與醴水同源俱𨗳西流為醴東流為淮自潛流地下三十許里東出桐柏之大復山南謂之陽口水南即復陽縣也闞駰言復陽縣胡陽之樂鄉也元帝元延二年置在桐柏大復山之陽故曰復陽也禹貢錐指云今河南南陽府新野縣西有朝陽故城桐柏縣東有復陽故城漢並屬南陽郡醴水西流徑平氏故城東北又西至唐縣界而入沘水以今輿地言之淮水出桐柏縣西北桐柏山東南流徑其縣南禹貢所謂導淮自桐柏者也東觀漢記曰朱祜少孤歸外家復陽劉氏山南有淮源廟前有碑是南陽郭苞立又二碑並是漢延熹中守令所造文辭鄙拙殆不可觀故經云東北過桐柏也淮水又東徑義陽縣今為河南汝寧府信陽州縣南對固成山山有水注流數丈洪濤灌山遂成巨井謂之石泉水北流注于淮淮水又徑義陽縣故城南義陽郡治也世謂白茅城其城圎而不方闞駰言此下原本訛以東徑安陽縣故城南注江國也起至北徑青山止接此今從朱本改正晉太始中割南陽東鄙之安昌平林平氏義陽四縣置義陽郡于安昌城在今信陽州西北七十里又太康記晉書地道記並有義陽郡以南陽屬縣為名漢武帝元光四年按史記表當作元狩四年封北地都尉衛山為侯國也有九渡水注之水出雞翅山明一統志雞翅山在汝寧府信陽縣南九十里一名雞頭山山有九渡水磎澗瀯委沿遡九渡矣其猶零陽之九渡水故亦謂之為九渡焉於溪之東山有一水發自山椒下數丈素湍直注頽波委壑可數百丈望之若霏幅練矣下注九渡水九渡水又北流注于淮東過江夏平春縣北今信陽州東南有平陽故城本後漢平春縣淮水又東油水注之水出縣西南油溪東北流徑平春縣故城南漢和帝建初四年封子全為王國淮水又東曲岸北有一土穴徑尺泉流下注沿流波三丈入于油水亂流南屈又東北注于淮淮水又東北徑城陽縣故城南漢髙帝十二年封定侯奚竟為侯國史表髙帝十二年封奚意為成陽侯今云奚竟誤王莽之利新也魏城陽郡治按漢志汝南郡有成陽縣淮水又東北與大木水合水西出大木山山即晉車騎將軍祖逖自陳留將家避難所居也其水東徑城陽縣北而東入于淮淮水又東北流左會湖水傍川西南出窮溪得其源也淮水又東徑安陽縣故城南江國也此注原本訛在前今從朱本改正嬴姓矣今其地有江亭春秋文公四年楚人滅江秦伯降服出次曰同盟滅雖不能救敢不矜乎地理志曰漢乃縣之吕后八年封淮南厲王子劉勃為侯國按史漢表是文帝八年今云吕后誤王莽之均夏也淮水又東得溮口水溮水在信陽縣治南源自隨州界流入大江源南出大潰山東北流翼帶三川亂流北注溮水又北徑賢首山西又北出東南屈徑仁順城南故義陽郡治分南陽置也晉太始初以封安平獻王孚長子望晉書宗室傳司馬望魏封順城侯武帝受禪進封義陽王本治在石城山上因粱希侵逼徙治此城齊司州刺史馬鮮卑何氏云馬鮮卑南史作仙琕為司州在梁時不守魏置郢州也昔帝宋本帝作常常珍竒本宋司州刺史降魏為豫州刺史復叛魏謀南奔為魏將元石所破事具魏書珍奇自懸瓠遣三千騎援義陽行事龎定光屯于溮水者也溮水東南流厯金山北山無樹木峻峭層峙溮水又東徑義陽故城北城在山上因倚陵嶺周回三里是郡昔所舊治城城南一十五步對門有天井周一百餘步深一丈東徑鍾武故城南本江夏之屬縣也王莽之當利縣矣又東徑石城山北山甚髙峻史記曰魏攻冥厄音義曰冥厄或言在鄳縣葙山也按吕氏春秋九塞其一也溮水徑鄳縣故城南鄳縣故城在今汝寧府羅山縣西南百二十里黃峴關外建武中世祖封鄧邯後漢書鄧彪傳鄧邯禹之宗彪之父為鄳縣侯按蘇林曰音育按漢志江夏郡鄳縣蘇林音肓師古曰音萌又音莫耿反今云音育誤溮水又東徑七井岡南又東北注于淮淮水又東至谷口谷水南出鮮金山北流至疑訛至瑟水注之水出西南具山東北徑光淹城東而北徑青山東羅山西東北流注于谷水谷水東北入于淮又東徑新息縣南今屬汝寧府淮水東徑故息城在今新息縣北三十里南春秋左傳隱公十一年鄭息有違言息侯伐鄭鄭伯敗之者也淮水又東徑浮光山北在今汝寧府光山縣北八十里亦曰扶光山即弋山也徑新息縣故城南應劭曰息後徙東故加新也王莽之新德也光武十九年封馬援為侯國外城北門內有新息長賈彪廟廟前有碑面南又有魏汝南太守程堯碑魏太和中蠻田益宗效域立東豫州以益宗為刺史淮水又東合慎縣水水出慎陽縣西而東徑慎陽縣故城南縣取名焉慎陽故城在今汝寧府真陽縣北四十里漢志慎陽下應劭曰慎水出東北入海師古曰慎字本作滇音真後誤為慎耳今猶有真邱真陽縣字並從單作真知此音不改也闞駰云永平五年失印更刻遂誤以水為心漢帝當作髙帝十一年封欒説為侯國潁隂劉陶為縣長政化大行道不拾遺以病去官童謠歌曰悒然不樂思我劉君何時復來安此下民見思如此應劭曰慎水所出東北入淮慎水又東流積為燋陂陂水又東南流為上慎陂又東為中慎陂又東南為下慎陂皆與鴻郗胡引作郤陂水散流鴻卻陂又名鴻池陂宋秦觀曰鴻池陂非特灌溉之利菱芡蒲魚之饒實一郡瀦水處也陂既廢水無歸宿汝水所以散漫為害矣其陂首受淮川左結鴻陂漢成帝時翟方進奏毀之建武中汝南太守鄧晨欲修復之知許偉君曉知水脈召與議之偉君言成帝用方進言毁之尋而夢上天天帝怒曰何故敗我濯子淵是後民失其利時有童謡曰敗我陂翟子威及子覆陂當復明府興復廢業童謡之言將有徴矣後漢書鄧晨傳晨為汝南太守興鴻郤陂數千頃田汝土以殷魚稻之饒流衍他郡注曰鴻卻陂今豫州汝陽縣東成帝時關東水波溢為害翟方進為丞相奏罷之又漢書翟方進傳汝南舊有鴻隙大陂郡以為饒成帝時關東數水陂溢為害方進為相與御史大夫孔光共遣掾行視以為決去陂水其地肥美省隄防費而無水憂遂奏罷之及翟氏滅鄉里歸惡言方進請陂下良田不得遂奏罷陂云王莽時常枯旱郡中追怨方進童謡曰壞陂誰翟子威飯我豆食羮芋魁反乎覆陂當復誰云者兩黃鵠遂署都水掾起塘四百餘里百姓得其利陂水散流下合慎水而東南徑息城北又東徑南入淮謂之慎口淮水又東與申陂水合水上承申陂于新息縣北東南流分為二水一水徑深丘西又屈徑其南南派為蓮湖水南流注于淮淮水又左迤流結兩湖謂之東西蓮湖矣淮水又東右合壑水水出白沙山東北徑柴亭西俗謂之柴水又東北流與潭溪水合水發潭谷東北流右會柴水柴水又東徑黃城在今光州西十二里西故弋陽縣也城內有二城西即黃城也柴水又東北入於淮謂之柴口也淮水又東北申陂枝水注之水首受陂水于深丘北東徑釣臺南臺在水曲之中臺北有琴臺又東徑陽亭南東南合淮淮水又東徑淮隂亭北又東徑白城南在今息縣東楚白公勝之邑也又東北去白亭一十里淮水又東徑長陵戍南又東青陂水注之今息縣東北八十里有長陵城疑即長陵戍也新蔡縣西南有青陂分青陂東瀆東南徑白亭西又南於長陂戍東東南入于淮淮水又東北合黃水水出黃武山東北流木胡引作穆陵關水注之木陵關今在光山縣水導木陵山西北流注于黃水黃水又東徑晉西陽城南又東徑南光城南光郡治又東北徑髙城南故弦髙國也又東北徑弋陽郡弋陽郡今為光州東有虞丘郭南有子相廟黃水又東北入于淮謂之黃口淮水又東北徑褒信縣故城南褒信故城在今息縣東北本漢郾縣地而東注流之者也又東過期思縣北今固始縣北七十里有期思故城縣故蔣國周公之後也春秋文公十年楚王田于孟諸期思公復遂為右司馬楚滅之以為縣漢髙帝十二年以封賁赫為侯國城之西北隅有楚相孫叔敖廟廟前有碑淮水又東北渒胡引作淠水注之一作泳永旱里固始縣南五十有淠水水出弋陽縣南垂山西北流厯隂山關徑二城間舊有賊難軍所謂疑衍頓防西北出山又東北流徑新城戍東又東北得詔虞水口西北去弋陽虞丘郭二十五里水出南山東北流徑詔虞亭東而北入渒水又東北注淮俗曰白鷺水東過原鹿縣南原鹿縣故城在今江南潁州南汝水篇云汝水出魯陽縣之大盂山東南流徑原鹿縣故城西而南入于淮所謂汝口汝水從西北來注之縣即春秋之鹿上也左傳僖公二十一年宋人為鹿上之盟以求諸侯于楚建武十五年世祖更封侍中執金吾陰鄉侯陰識為侯國者也又東過廬江安豐縣東北決水從北來注之按今江南鳯陽府霍丘縣西南有安豐故城決水在縣西八十里與河南固始縣分界廬江故淮南也漢文帝十六年别以為國應劭曰故廬子國也決水自舒蓼北注不於北來也安豐東北注淮者窮水矣又非決水皆誤耳淮水又東谷水入焉水上承富水東南流世謂之谷水也東徑原鹿縣故城北城側水南谷水又東徑富陂縣故城北俗謂之城閭亭非也地理志曰汝南郡有富陂縣建武二年世祖改封平鄉侯王霸為富陂侯按漢志汝南郡作富波後漢書郡國志及王霸傳亦俱作富波陂與波古字通用如史記貨殖傳木居千石魚陂又灌夫傳陂池田園漢書俱作波此一證也十三洲志曰漢和帝永元九年分汝陰置多陂塘以溉稻故曰富陂縣也谷水又東于汝陰今頴州治城東南注注下當有淮字淮水又東北左會潤水水首受富陂東南流為髙塘陂又東積而為陂水東注焦陵陂陂水北出為鮦陂陂水潭漲引瀆北注汝隂四周隍塹下注潁水焦湖東注謂之潤水徑汝隂縣東徑荆亭北而東入下當有于淮字淮水又東北窮水入焉今霍丘西有窮水水出六安國安豐縣窮谷春秋左傳楚救灊司馬沈尹戌與吳師遇于窮谷者也川流泄注于決水之右北灌安豐之左世謂之安豐水亦曰窮水音戎並聲相近字隨讀轉流結為陂謂之窮陂塘堰雖淪猶用不輟陂水四分農事用康北流注于淮京相璠曰今安豐有窮水北入淮淮水又東為安豐津水南有城故安豐都尉治後立霍邱戍淮淮中有洲俗號關洲蓋津關所在故斯洲納稱焉魏書國志有曰司馬景王征毌丘儉使鎮西將軍豫州刺史諸葛誕從安豐津先至夀春儉敗與小弟秀藏水草中安豐津都尉部民張屬斬之傳首京都即斯津也又東北至九江夀春縣西泚水洪水合北注之又東潁水從西北來流注之潁水篇云潁水出潁川陽城縣西北少室山東南流徑蜩蟟郭東俗謂之鄭城又東南入于淮春秋昭公十二年楚子狩于州來次于潁尾蓋潁水之會淮也按鄭城即頴上故城在今潁上縣南淮水又東左合泚口禹貢錐指云按漢志灊縣沘山沘水所出北至夀春入芍陂師古曰沘音比又音布几反水經誤作泚冝改正炳巽按此二字似可互用説見前二十九卷又東徑中陽亭北為中陽渡水流淺磧可以厲也淮水又東流與潁口會東南徑倉陵北又東北流徑夀春縣故城西夀春故城即今鳯陽府夀州治縣即楚考烈王自陳徙此秦始皇立九江郡治此兼得廬江豫章之地故以九江名郡漢髙帝四年為淮南國孝武元狩六年復為九江焉文潁曰史記貨殖傳曰淮以北沛陳汝南南郡為西楚彭城以東東海吳廣陵為東楚衡山九江江南豫章長沙為南楚是為三楚者也淮水又北左合椒水水上承淮水東北流徑蛇地南又厯其城東亦謂之清水東北流注于淮水謂之清水口者左合椒水焉又東過夀春縣北肥水從縣東北流注之淮水於夀陽縣西北肥水從城而北入于淮謂之肥口肥水在今夀州東北十里自合肥來注于淮州志謂之東肥河淮水又北夏肥水注之夏肥水在夀州西北州志謂之西肥河東流至下蔡故城西南十里入淮水上承沙水於城父縣右出東南流徑城父縣故城南王莽之思善也縣故焦夷之地春秋左傳昭公九年楚公子棄疾遷許于夷實城父矣取州來淮北之田以益之伍舉授許夷田杜預曰此時改城父為夷故傳實之者也言夷田在濮水西者也然則濮水即沙水之兼稱得夏肥之通目矣漢桓帝永夀元年封大將軍梁冀孫桃為侯國者也按梁統傳永興二年封桃為城父侯夏肥水自縣又東徑思善縣之故城南漢章帝章和三年分城父立夏肥水又東為髙陂又東為天淙陂水出分為二流南為肥水北為雞陂夏肥東流左合雞水水出雞陂東為黃陂又東南流積為茅陂又東為雞水吕氏春秋曰宋人有取道者其馬不進投之雞水是也雞水又會肥水而亂流東注俱入于淮淮水又北徑山硤中謂之硤石按硤石山在夀州西北夾淮為險在西岸者屬下蔡在東岸者屬夀春明省下蔡入夀州故一統志云在州西北二十五里對岸山上結二城以防津要西岸山上有馬迹世傳淮南王乘馬升仙所在也今山之東南石上有大小馬迹一十餘所今仍存焉淮水又北徑下蔡縣故城東本州來之城也吳季札始封延陵後邑州來故曰延州來矣春秋襄公二年蔡成公自新蔡遷于州來謂之下蔡也按左傳蔡遷州來是哀公二年今云襄公誤傳云吳泄庸如蔡納聘稍納師師畢入衆知之蔡侯告大夫殺公子駟以説哭而遷墓冬蔡遷于州來又史記管蔡世家蔡昭侯二十六年楚昭王伐蔡蔡告急于吳吳為蔡逺約遷以自近易以相救昭侯私許不與大夫計吳人來救蔡因遷蔡于州來二十八年昭侯將朝于吳大夫恐其復遷乃令賊利殺昭侯而立昭侯子朔是為成侯則遷州來者乃昭侯非成侯且蔡無稱公者今云成公亦誤淮之東岸又有一城下蔡新城也二城對據翼帶淮濆淮水東徑八公山北八公山在夀州北少東淮水之南寰宇記云一名肥陵山淮南王安與其賔客八公俱登此山學仙今山有安時故臺及石上有人馬迹山上有老子廟淮水厯潘城南置潘溪戍戍東側潘溪吐川納淮更相引注又東徑梁城臨側淮川川左有湄城淮水左迤為湄湖淮水又右納洛川於西曲陽縣北水分閻溪北絶橫塘北徑蕭亭東又北鵲甫溪水入焉水出東鵲甫谷西北流徑鵲甫亭南西北流注于洛水北徑西曲陽縣故城東西曲陽城在夀州東北八十三里王莽之延平亭也應劭曰縣在淮曲之陽下邳有曲陽故是加西也洛澗北厯秦墟下注淮謂之洛口經所謂淮水徑夀春縣北肥水從縣東北注者也蓋經之謬矣考川定土即實為非是曰洛澗非肥水也淮水又北徑莫耶山西今鳳陽府西南有莫邪山山南有隂陵縣故城在定逺縣西北六十里漢髙祖五年項羽自垓下從數百騎夜馳渡淮至陰陵迷失道左陷大澤漢今騎將灌嬰以五千騎追及之于斯縣者也按地理志王莽之陰陸也後漢九江郡治時多虎災百姓苦之南陽朱均為守退貪殘進忠良虎悉東渡江後漢書宋均傳均為九江太守郡多虎暴數為害均退姦貪進忠善虎相與東遊渡江今云朱均固誤而朱謀㙔引趙明誠金石録及謝承漢書云當作宗尤為妄誕豈正史不可信而反信他書耶又東過當塗縣北過胡引作濄水從西北來注之淮水自莫耶山東北徑馬頭城北魏馬頭郡治也故當塗縣之故城也當塗故城在今鳳陽府懷逺縣東南塗山在縣東南八里淮河東岸渦水在縣北一里渦與濄同吕氏春秋曰禹娶塗山氏女不以私害公自辛至甲四日復往治水故江淮之俗以辛壬癸甲為嫁娶日也禹娶在山西南縣即其地也地理志當塗侯國也魏不害以宰守尉捕淮陽反者公孫勇等漢以封之按史表魏不害以圉守尉捕淮陽反者公孫勇等封當塗侯此云宰守尉誤當從表作圉按地志圉縣屬淮陽國王莽更名山聚也淮水又東北濠水注之在今懷逺縣南謂之西濠水水出莫耶山東北之溪溪水西北引瀆徑禹墟北又西流注于淮淮水又北沙水注之按沙水在懷逺縣南渠水篇云沙音蔡許慎正作沙音言水散石也漢志沛郡有義成縣其故城在懷逺縣東北十五里今名拖城魏收志云汴水在大梁城東分為蔡渠即今祥符縣東南首受汴之蔡河蔡與沙字異而音近當讀如二百里蔡之蔡經所謂蒗蕩渠也淮之西有平阿縣故城王莽之平寧也建武十三年世祖更封耿阜為侯國按耿阜乃耿純之子按純本傳純卒阜嗣侯但純初封耿鄉侯世祖即位更封髙陽侯後定封東光侯從無平阿之封阜嗣侯之後徙封莒鄉侯亦不封平阿不知此句何所本也郡國志曰平阿縣有當塗山淮出于荆山之左當塗之右奔流二山之間西楊胡引作而揚濤北注之春秋左傳哀公十年按左傳是七年今云十年誤大夫對孟孫曰禹會諸侯于塗山執玉帛者萬國杜預曰塗山在夀春東北非也余按國語曰吳伐楚隳會稽獲骨焉節專車吳子使來聘且問之客執骨而問之敢問骨何為大仲尼曰丘聞之昔禹致羣神于會稽之山防風氏後至禹殺之其骨專車此為大也蓋丘明親承聖旨録為實證矣又按劉向説苑辨物王肅之敘孔子宋本孔子下有草二兩字世孫孔猛所出先人書家語並出此事故塗山有會稽之名考校羣書及方士一作土之目疑非此矣蓋周穆之所會矣淮水于荆山北過水自南注之又東北徑沛郡義城縣東司馬彪曰後𨽻九江也又東過鍾離縣北明一統志鍾離城在鳯陽舊府城東六里晉縣屬淮南郡錐指注云今臨淮縣有鍾離故城濠水在縣西元和志謂之東濠水世本曰鍾離嬴姓也應劭曰縣故鍾離子國也楚滅之以為縣春秋左傳所謂吳公子光伐楚拔鍾離者也王莽之蠺富也濠水出陰陵縣之陽亭北小屈有石穴不測所窮言穴出鍾乳所未詳也濠水東北流徑其縣西又屈而南轉東徑其城南又北厯其城東徑小城而北流注于淮淮水又東徑夏邱縣南今為鳯陽府虹縣又東渙水西入九里注之渙水又東南流徑雍丘縣今為開封府杞縣故城南又東徑承匡城又東徑襄邑縣故城南今為歸德府睢州故宋之承匡襄牛之地宋襄公之所築故子疑當作號襄陵矣漢志襄邑下師古引圈稱曰襄邑宋地本承匡襄陵鄉也宋襄公所葬故曰襄陵秦始皇以承匡卑濕故徙縣于襄陵謂之襄邑縣西三十里有承匡城竹書紀年梁惠成王十七年宋景公竹書作鼓衛孫公竹書作公孫倉會齊竹書無齊字師圍我襄陵十八年惠成王以韓師諸侯師竹書作帥于襄陵縣齊侯使楚景舍來求成公會齊宋之圍即于此也西有承匡城春秋會于承匡者也秦始皇以承匡卑濕徙縣于襄陵更為襄邑也王莽以為襄平也漢桓帝建和元年封梁冀子胡狗為侯國後漢書梁統傳建和元年封冀子胤襄邑侯今云胡狗豈即胤耶陳留風俗傳曰縣南有渙水按渙水今謂之澮河故傳曰睢渙之間出文章天子郊廟御服出焉尚書所謂厥篚織文者也渙水又東南徑已吾縣故城南在今開封府寧陵縣西南三十里又東徑鄫城北春秋襄公元年經書晉韓厥帥師伐鄭魯仲孫蔑會齊曹邾杞次于鄫杜預曰陳留襄邑縣東南有鄫城渙水又東南徑鄙城北新城南又東南左合明溝溝水自蓬洪陂東南流謂之明溝下入渙水又徑亳城北在歸德府城東南四十里帝王世記曰榖熟為南亳即湯都也十三洲志曰漢武帝分榖熟置春秋莊公十二年宋公子御説奔亳者也渙水東徑榖熟城南漢光武建武二年封更始子歆為侯國又東徑楊亭北春秋左氏傳襄公十二年楚子囊秦世長無地伐宋師于楊梁以報晉之取鄭也京相璠曰宋地矣今睢陽東南三十里有故楊梁今曰陽亭也俗名之曰緣城非矣西北去梁國八十里渙水又東徑沛郡之建平縣故城南漢昭帝元年當作元鳳元年封社延年為侯國王莽之曰當是田平也又東徑鄼縣故城南春秋襄公十年公會諸侯及齊世子光于酃按左傳皆作會柤無會于酃之文查漢書地理志沛郡有鄼縣注云本作􅫃音嵯王莽改曰贊治故遂以䣜為鄼又柤字古文作䣜則此當作䣜明矣今其地酃聚是也王莽之贊治矣渙水又東南徑費亭南漢建和元年封中常侍沛國曹騰為侯國騰字季興譙人也永初中定桓帝策封亭侯此城即其所食之邑也渙水又東徑銍縣故城南昔吳廣之起兵也使葛嬰下之渙水又東苞水注之出譙城北自疑訛汀陂陂水東流徑鄼縣南故城在今永城縣西南又東徑鄲縣故城南漢景帝中元年封周應為侯國按表是周緤子周昌弟王莽更之曰留漢志作單城也音多按漢書周緤傳景帝中元元年封緤子應為鄲侯蘇林注音多寒反史記緤傳索隱引蘇林注竟云音多至兩表則并蘇林亦不引直曰音多遂至漢志沛郡鄲縣下孟康亦曰音多逮至宋世丁度集韻竟妄造一當何反後之字書無不因之愚意志表傳皆是多寒反緣唐以前尚無刋本傳寫時漏去寒反二字後之刻者不復考校竟承其誤所幸者蘇林之原注尚存索隱之引蘇林可證若果音多何以彼此互異其為遺漏無疑獨怪道元去蘇林未逺何以水經注亦但曰音多豈漢志在元魏時已漏去寒反二字道元據之而不及檢漢傳耶又東徑嵇山北嵇氏故居嵇本姓奚會稽人也先人自會稽遷于譙之銍縣故為嵇氏取稽字之上以為姓蓋志本也嵇氏譜曰譙有嵇山家于其側遂以為氏縣魏黃初中文帝以鄼城父山桑銍置譙郡故𨽻譙焉苞水東流入渙渙水又東南徑蘄縣故城南漢志作鄿屬沛郡蘄鄿古通用地理志曰故垂鄉也漢髙帝破黥布於此縣舊都尉治王莽之蘄城也水上有古石梁處遺基尚存渙水又東徑榖陽縣右會八丈故瀆瀆上承洨水南流注于渙渙水又東徑榖陽戍南又東南徑榖陽故城東北右與解水會水上承縣西南解塘東北流徑榖陽城南即榖水也應劭曰城在榖水之陽又東北流注于渙水渙水又東南徑白石戍南徑蚿胡引作虹城南洨水注之水首受蘄水于蘄縣東南流徑榖陽縣八丈故瀆出焉又東合長直故溝溝上蘄水南會于洨洨水又東南流于洨縣故城北縣有垓下聚漢髙祖破項羽所在也王莽更名其縣曰育城應劭曰洨水所出音絞經之絞也洨水又東南入于淮故應劭曰洨水南入淮淮水又東至巉石山巉石山在鳯陽府五湖縣東與泗水接界潼水注之水首受潼漢志作僮縣西南潼陂潼漢志作僮今虹縣東北有僮縣故城縣故臨淮郡之屬縣王莽改曰成信矣南徑沛國夏丘縣今鳯陽府虹縣絶蘄徑夏丘縣故城西王莽改曰歸思也又東南流徑臨潼戍西又東南至巉石西南入淮淮水又東徑浮山在今旴𣅿縣西山北對巉石山梁氏天監中立堰于二山之間逆天地之心乖民神之望自然水潰淮矣梁書康絢傳魏降人王足陳計求堰淮水以灌夀春曰荆山為上格浮山為下格髙祖然之發徐揚人率二十戶取五丁以築之假絢節都淮上諸軍事并護堰作人及戰士有衆二十萬于鍾離南起浮山北抵巉石依岸以築土合脊于中流天監十四年堰將合淮水漂疾復決潰用鐵數十萬斤沉于堰所伐樹為井幹填以巨石加土其上士卒死者十七八明年四月堰乃成其長九里下濶百四十丈天監十五年九月淮堰壞死者十餘萬口元和志浮山堰在招義縣西北六十里與荆山堰同築淮水又東徑徐縣南厯澗水注之徐縣故城在今泗州西北三十里古徐國𨗳徐城西北徐陂陂水南流絶蘄水徑厯澗水西東南流注于淮淮水又東池水注之水出東城縣東城今為定逺縣東北流徑東城縣故城南今定逺東南有東城故城漢以數千騎追羽帥二十八騎引東城因西隤山斬將而去即此處也史記孝惠八年封淮南厲王子劉賜為國按史記表孝惠八年封淮南厲王子賜為陽周侯良為東城侯此云賜誤當作良地理志王莽更名之曰武城也池水又東北流厯二山間東北入于淮謂之池口也淮水又東蘄水注之水受睢水於榖熟城東北東徑建城縣故城北漢武帝元朔四年封長沙定王子劉拾為侯國王莽之多聚蘄水又東南徑蘄縣縣有大澤鄉陳涉起兵于此火為狐鳴處也南則洨水出焉蘄水又東南北八丈八字疑衍故溝疑作瀆出焉又東流南疑作東南流北疑衍長直故瀆出焉又東入夏丘縣東絶潼水徑夏丘縣故城北又東南徑僮縣南又東流入徐縣東絶厯澗又東徑徐縣故城南又東流注于淮淮水又東厯客山徑旴𣅿縣故城西胡氏作南有今旴𣅿縣東南旴𣅿故城舊志云在旴山之麓淮水之濵旴山蓋即古之客山也地理志曰都封疑作都尉治漢武帝元朔元年封江都易王子劉蒙之為侯國王莽更名之曰武匡淮水又東徑廣陵厯淮陽城淮陽城在今清河縣西南屬淮安府寰宇記云在徐城縣東北百五十里西臨淮水徐城舊泗州治也北臨泗水岨于二水之間述征記淮陽太守治自後置戍縣亦有時廢興也又東北至下邳淮陰縣西泗水從西北來流注之淮泗之會即角城也左右兩川翼夾二水決入之所所謂泗口也泗口亦名清口𨗳淮東會于泗沂即是處也今清河縣東南五里有淮陰故城角城縣故城在清河縣西南去故淮陽城十八里又東過淮陰縣北中瀆水出白馬湖東北注之淮水右岸即淮陰地城西二里有公路浦昔袁術向九江將東奔袁談路出斯浦因以為名焉又東徑淮陰縣故城北北臨淮水漢髙帝六年封韓信為侯國王莽之嘉信也昔韓信去下鄉而釣于此處也城東有兩冡西者即漂母冡也周廽數百步髙十餘丈昔漂母食信于淮陰信王下邳蓋投金增陵以報母矣東一冡即信母冡也縣有中瀆水首受江于廣陵郡之江都縣今屬揚州府縣城臨江應劭地理風俗記曰縣為一都之會故曰江都也縣有江水祠俗謂之伍相廟也子胥但配食耳歲三祭與五嶽同舊水道也昔吳將伐齊北霸中國自廣陵城東南築𨝍城城下掘深溝謂之韓江亦曰𨝍原本訛刋溟溝自江東北通射陽湖射陽故城在今淮安府山陽縣東南縣西有山陽瀆即古𨝍溝縣北五里有北神堰即古末口也地理志所謂築水也地理志江都有渠水此云築誤而胡氏作西北至末口胡引口下有入字淮自永和中江都水斷其水上承歐陽疑訛引江入埭六十里至廣陵城廣陵今為揚州府治楚漢之間為東陽郡髙祖六年為荆國十一年為吳城即吳王濞所築也景帝四年更名江都武帝元狩三年更曰廣陵王莽郡曰江平縣曰定安漢志作安定城東水上有梁謂之洛橋中瀆水自廣陵北出武廣湖東陸陽湖西二湖東西相直五里水出其間下注樊梁湖舊道東北出至博芝射陽二湖西北出夾耶乃至山陽矣至永和中患湖道多風陳敏因穿樊梁湖北口下注津湖徑渡渡十二里方達北口直至夾耶興寧中復以津湖多風又自湖之南北口沿東岸二十里穿渠入北口自後行者不復由湖故蔣濟三州論曰淮湖紆逺水陸異路山陽不通陳陳下疑有敏字穿溝更鑿馬瀨百里渡湖者也自廣陸胡氏引自工有舊道二字陸當作陵出山陽白馬湖徑山陽城西即射陽縣之故城也應劭曰在射水之陽漢髙祖六年封楚左令尹項纒為侯國也漢表射陽侯劉纒師古曰即項伯也降漢封賜姓劉氏王莽更之曰監淮亭世祖建武十五年封子荆為山陽公治此十七年為王國城本北中郎將庾希所鎮中瀆又東謂之山陽浦又東入淮謂之山陽口者也又東兩小水流注之淮水左徑泗水國南故東海郡也徐廣史記音義曰泗水國名漢武帝元鼎三年漢志作四年初置都郯四年漢表作二年常上當有封字常山憲王子思王商為國地理志曰王莽更泗水郡為順水漢志作水順淩縣為生夌淩水注之水出淩縣淩縣故城今在宿遷縣東南東流徑其縣故城東而東南流注于淮實曰疑訛口也應劭曰淩水出縣西南入淮即經所謂之疑衍小水者也又東至廣陵淮浦縣入于海禹貢錐指按今淮安府安東縣治或云即淮浦故城淮浦舊屬臨淮郡晉改屬廣陵漢志平氏縣下云淮水東南至淮陵入海蓋陰字之誤淮陰去海尚一百四五十里而志云淮陰入海者亦猶江都去海甚逺而湔氐道下云江水東南至江都入海不言海陵也淮陵作淮陰無疑安東即淮浦亦無疑應劭曰浦岸也蓋側淮濆故受此名淮水出縣故城王莽更名之曰淮敬淮水於縣枝分北為遊水厯朐縣與沐合又匡又下當有徑字或匡字是徑字胊山西山側有朐縣故城秦始皇三十五年於朐縣立石海上以為秦之東門崔琰述初賦曰倚髙艫以周盻兮觀秦門之將將者也東北海中有大洲謂之郁洲山海經所謂都山在海中者也言是山自蒼梧徙此云山上猶有南方草木今郁州治故崔季原本訛李圭之敘述初賦言郁州者故蒼梧之山也心恱而怪之聞其上有仙士石室也乃枉當是往觀所所字衍見一道人獨處休休然不談不對顧非已及也即其賦所云吾夕曰疑衍濟于郁州者也遊水又北徑東海利城漢志作成縣故城之東故利鄉也漢武帝元朔四年封城陽共王子嬰為侯國史表嬰封利鄉侯王莽更之曰流泉遊水又北厯羽山西地理志曰羽山在柷其縣東南尚書曰堯時曰四嶽得舜進十六族殛鯀于羽山是為檮杌與歡兜三苖共工同其罪故世謂之四凶鯀既死其神化為黃龍黃龍當作黃能見晉語韋昭注云能似熊宋庠音釋云乃來反入于羽淵是為夏郊三代祀之故連山易曰有崇伯鯀伏于羽山之野者是也遊水又北徑祝其縣故城西在今淮安府贑榆縣西五里春秋經書夏公會齊侯于夾谷左傳定公十年公及齊平會于祝其實夾谷也服虔曰地二名王莽更之曰猶亭縣之東有夾口浦遊水左徑琅琊即丘縣故城之西地理志曰莒子始起于此後徙莒有鹽官故世謂之南莒也遊水又東北徑贑榆縣北今屬淮安府東側巨海有秦始皇碑在山上去海一百五十步潮水至加其上三丈去則三尺所見東北傾石長一丈八尺廣五尺厚三尺八寸一行一十二字遊水又東北徑紀鄣故城南在今贑榆縣北七十五里春秋昭公十年齊伐莒莒子奔紀鄣莒之婦人怒莒子之害其夫老而託訪當作紡焉取其纑而夜縋縋絶鼓譟城上人亦譟莒共公懼啓西門而出齊遂入紀故紀子帛之國榖梁傳曰吾伯姬歸于紀者也杜預曰紀鄣地二名東海贑榆縣東北有故紀城即此水也遊水東北入海舊吳之燕岱常泛巨海憚其濤嶮更沿溯是瀆是由上下疑有脫文項本作由是出地理志曰遊水自淮浦北入海爾雅曰淮别為滸遊水亦枝稱者也德清胡渭曰以今輿地言之淮水自桐柏縣南東徑信陽州北信陽在汝寧府西南二百七十里水去州四十五里又東徑羅山縣北真陽縣南羅山在州東一百二十里水去縣二十里真陽在府南一百二十里水去縣八十里淮水舊自確山縣南流入二縣界元和志云淮水在朗山縣南一百二十里是也今不入其界又東徑息縣南息縣在光州西北九十里春秋息國地水去縣五里又東徑光山縣北光山在州西四十五里本春秋弦國水去縣八十里又東徑光州北光州在汝寧東南二百七十里本春秋黃國水去州六十七里又東徑固始縣北固始在州東北一百二十里水去縣七十里縣東南四十里有茹城後漢末揚州刺史劉馥所築為耕屯之利其後鄧艾等常修治之今故址尚存又東北徑潁州南潁州在江南鳯陽府西四百二十里水去州一百二十里又東十餘里合汝水南岸即霍丘縣界又東徑霍丘縣北霍丘在夀州南一百二十里水去縣四十五里其渡處曰安風津又東徑潁上縣南潁上在潁州東一百二十里水去縣二十五里西南與霍丘分界又東三十五里與夀州分界潁水在縣南門外亦曰沙河東南流至正陽鎮入淮謂之潁口即春秋之潁尾也鎮在縣東南七十五里淮水之西又東徑夀州西北夀州在鳯陽府少西南一百里水去州二十五里芍陂在州南亦曰期思陂淮南子曰孫叔敖決期思之水灌雩婁之野即此又東徑懷逺縣南懷逺在府西北七十里水去縣一里流至城東稍折而北渦水夾注之謂之渦口又東徑鳯陽縣北縣為鳯陽府治水去城十里又東徑臨淮縣北臨淮在府北少東二十里水去縣一里又東北徑五河縣五河在府東北九十里本漢􅧾縣音貢後漢為虹縣淮水在縣東南二里有澮沱漴潼四水與淮會為五河口縣取名焉北炳巽按明一統志鳯陽府五河縣注縣在府東一百一十里有涇澮沱漴淮五河故以名縣又東泗州南旴𣅿縣北泗州在府東少北二百十里水去州一里有浮橋為南北要道潘季馴曰淮挾汝潁肥濠等處七十二溪之水至泗州下流龜山橫截河中故至泗則湧譬咽喉間湯飲驟下吞吐不及一時厄塞其勢然也明萬厯十九年泗州大水淮流泛溢髙于城溺人無算浸及祖陵季馴上言水性不可拂河堤不可弛地形不可強治理不可鑿人欲棄舊以為新而臣謂故道必不可失人欲支分以殺勢臣謂濁流必不可分霖淫水漲久當自消也旴𣅿在州南五里水去縣二里有長沙洲長二里淮水泛漲賴以捍禦縣西南一里有上龜山縣東北三十里有下龜山為龜山鎮其下有運河一名新河川瀆異同曰泗州與旴𣅿兩城相距凡七里自昔為淮流襟束之處汴河自河南界流經州城東而合于淮謂之汴口宋時以此為漕運要衝今惟涓流可辨耳由州城而東三十里龜山峙焉淮流至此乃益折而北又二十餘里而洪澤冨陵泥墩萬家等湖環匯于淮之東岸淮水泛溢恆在于此州逼淮而地下故也按古汴水東流徑彭城縣北而東入于泗唐貞元中韓愈佐徐州幕有詩云汴水交流郡城角是其時汴水猶于州城東北隅合泗入淮也不知何年改流從夏邑永城宿州靈璧虹縣至泗州兩城間而入于淮宋時東南之漕率由此以逹京師南渡後漸湮元泰定初河行故汴渠仍于徐州合泗水至清口入淮而泗州之汴河遂廢又徑清河縣與泗水合謂之清口清河在淮安府西少北五十里淮水去縣五里洪澤河在縣南六十里洪澤鎮西長八十里接盱眙縣界新志謂之冨陵湖又東北徑山陽縣北山陽淮安府治射陽湖古射陂也在縣東南八十里與鹽城寶應分水髙家堰在縣西南四十里後漢建安中太守陳登防淮此其故址也明永樂初平江伯陳瑄始為築治長六十里清江浦在縣閼即新運河也舊名沙河宋志楚州北有山陽灣淮流浸急每致沉溺雍熙中漕臣劉蟠議開沙河避淮水之險自楚至淮隂開𨗳凡六十里舟行便之其後淤塞明永樂中陳瑄修治運河乃鑿清江浦引水由管家湖至鴨陳口達海又東北徑安東縣南又東北入于海安東在府東北六十里本漢淮浦縣水去縣二里海在縣東五十五里自鹽城縣東北經山陽縣東折而西北為淮水入海之口其北岸則安東也縣志云自縣西三十里顔家渡直下過縣南東流五十里又東北過雲梯折而入海此𨗳淮會泗沂東入海之故道也自元時河奪汴泗以入淮而兩瀆并為一瀆清口以東淮悉成河矣水經注集釋訂訛卷三十
