body:
  text: 水經注集釋訂訛卷十歸安沈炳巽撰濁漳水清漳水濁漳水在今山西潞安府南二十里出上黨長子縣今屬潞安府西發鳩山在今潞安府長子縣西五十里之漳水焉四字疑衍出鹿谷與發鳩連麓而在南淮南子謂之發苞山故異名互見也左則陽泉水注之右則散蓋水入焉三源同出一山但以南北為别耳散蓋今縣志作傘蓋東過其縣南今山西潞安府長子縣西有長子故城又東堯水自西山東北流徑堯廟北又東徑長子縣故城南周史辛甲所封邑也朱箋引劉向别録曰辛甲事紂七十五諫而不聽去之周文王以為公卿封之長子春秋襄公十八年晉人執衛行人石買於長子即是縣也秦置上黨郡治此也其水東北流入漳水漳水東會于梁水梁水出南梁山北流至長子縣故城南竹書紀年曰梁惠成王十二年鄭取屯留尚子沮朱謀㙔云疑作則尚子即長子之異名也梁水又北入漳水屈從縣東北流注疑有訛脫當云屈從縣東北流陶水注之陶水南出南陶北流至長子城東西轉徑其城北東注于漳水又東過壺關縣北壺關屯留二縣俱屬潞安府今長治縣東南有壺關故城今屯留縣東南十三里有屯留故城漳水東徑屯留縣南又屈徑其城東東北流有絳水注之絳水西出榖逺縣今為山西沁州沁源縣東發鳩之谷發鳩谷一名盤秀嶺又名方山鹿瀆山盤石山説見後謂之濫水屯宋本作也東徑屯留縣故城南故留子國也潞氏之屬春秋襄公十八年晉人執孫蒯於純杜注純屯也留是也其水東北流入于漳故桑欽云絳水疑漏徑字屯留西南東入漳後魏地形志藍水出寄氏縣盤秀嶺南北流入濁漳元和志絳水出屯留縣西南方山去縣八十四里寰宇記引冀州圖謂之鹿瀆山屯留新志盤秀山在縣西南九十里一名盤石山按漢志上黨有榖逺縣在今屯留縣界寄氏故城在縣西南七十里藍水即濫水絳水之上源也漳水又東陳水注之水出西發鳩山東徑余吾縣故城南漢光武建武六年封景丹子尚為侯國按後漢書景丹傳丹薨子尚嗣徙封余吾侯注云縣名屬上黨郡今潞州陳水又東徑屯留縣故城北竹書紀年梁惠成王元年韓共侯趙成侯遷晉桓子按竹書作桓公屯留史記趙肅侯奪晉君端氏而徙居之此矣史記趙世家成侯十六年與韓魏分晉封晉君于端氏肅侯元年奪晉君端氏徙處屯留其水又東流注于漳故許慎曰水出發鳩山入關從水章聲也漳水徑壺關縣故城西又屈徑其城北故黎國也有黎亭縣有壺口關故曰壺關矣壺口關在今黎城城縣北太行山吕后元年立孝惠後宫子武為侯國漢有壺關三老公乘興上書訟衛太子即邑人也縣在屯留東不得先壺關而後屯留也漳水歷鹿臺山在潞安府襄垣縣南二十里濁漳水在縣南二十一里襄垣故城在今壺關縣北與鞮上當有銅字鞮水合水出銅鞮縣銅鞮故城在今山西沁州城南西北石磴山東流與專池水合出八持山朱云八持當作八特潘尼西道賦云羊羔八特成臯黃馬是也東北流入銅鞮水銅鞮水又東南徑女諫水西北好松山東南流北則葦池水與公主水合而右注之南則榆交水與皇后水合而左入焉亂流東南注于銅鞮銅鞮水宋本水下有東徑二字李喜墓疑漏墓字前有碑碑石破碎故李氏以太和元年立之晉書李喜傳喜字季和上黨銅鞮人少有髙行位特進光祿大夫以年老遜位詔褒賜有加喜自歷仕雖清非異衆而家無儲積親舊故人乃至分衣共食未嘗私以王官及卒追贈太保諡曰成子其水又東徑故城北城在山阜之上下臨岫壑東西北三面岨袤二里世謂之斷梁城即故縣之上虒亭也在今襄垣縣西北五十里今為虒亭鎮銅鞮水又東徑銅鞮縣故城北城在水南山中晉大夫羊舌赤銅鞮伯華之邑也漢髙祖破韓王信於此縣也銅鞮水又東南流徑頃一作項後魏地形志作傾城西即縣之下虒聚也地理志曰縣有上虒亭下虒聚者也銅鞮疑漏水字又南徑胡邑西又東屈徑其城南又東徑襄垣縣今屬潞安府入于漳漳水又東北流徑襄垣縣故城南王莽之上黨亭又東北過屯留縣三字疑衍潞縣北潞縣今為潞安府潞城縣其故城在縣西縣故赤翟潞子國也其相豐舒有俊才而不以茂德晉伯宗數其五罪使荀林父滅之闞駰曰有潞水為冀州浸即漳水也余按燕書王猛與慕容評相遇於潞川也鄣固山泉鬻水與軍入絹匹水二石十六國春秋前燕録王猛入晉陽慕容評畏猛不敢進屯于潞川評為人貪鄙鄣固山泉鬻水與軍入絹一匹得水二石積錢帛如山士卒怨憤莫有鬬志他大川可以為侵疑訛所有巨浪長湍唯潭朱本作漳水耳故世人亦謂濁漳為潞水矣縣北對故壁臺漳水徑其南本潞子所立也世名之為臺壁也慕容垂伐慕容永於長子軍次潞川永率精兵拒戰阻河自固垂陳壁臺當從十六國春秋作臺壁為是一戰破之即是處也漳水於是左疑訛或是合右黃須水口水出壁臺亦當作臺壁西張諱巖下世傳巖赤則土離當作罹兵害故惡其變化無常恆以石粉汙之令白是以俗目之為張諱巖其水南流徑臺壁西又南入于漳漳水又東北歷望夫山在今黎城縣東北元和志清漳水在黎城縣東五十里濁漳水在縣西北五十六里山之南有石人佇於山上狀有懷於雲表因以名焉有涅水西出覆甑山而東流與西湯溪水合水出涅縣今省入山西沁州武鄉縣西山湯谷五泉俱會謂之五會之泉交疑作又東南流謂之西湯水又東南流注涅水又東徑涅縣故城南縣氏漢志涅氏涅水也縣字當作涅涅水也東與白雞雞下疑有水合二字水出縣之西山東徑其縣北東南流入涅水涅水又東南與武鄉水會焉水源出武山西南徑武鄉縣今屬山西沁州故城西而南出得清谷口水源出東北長山清谷西南與鞸鞳白壁二水合南入武鄉水又南得黃水口黃水三源同注一壑東南流與隱室水合水流西北出隱室山東南注潢水疑作涅水又東入武鄉水武鄉水又東南注于涅水涅水又東南流注于漳水漳水又東徑磻陽城北倉石水入焉水出林慮縣今為河南彰德府林縣倉石水在縣西北四十里之倉石溪東北徑魯班門西闕昂藏昂藏軒露侈大之貌石壁霞舉左右結石修坊崇基仍存北徑偏橋東即林慮之嶠嶺抱犢固也石磴西陛陟踵修上五里餘崿路中斷四五丈中以木為偏橋劣得道行亦言故有偏橋之名矣自上猶須攀蘿捫葛方乃自津山項即庾衮眩墜處也倉石溪水以上疑有訛誤不可句讀又北合白水溪溪水出壺關縣東白木川東徑百畝城北蓋同仇池百頃之稱矣又東徑林慮縣之石門谷又注于蒼溪水蒼溪水又北徑磻陽城在今林縣北八十里東而北流注于漳水漳水又東徑葛公亭北而東去矣又東過武安縣今屬河南彰德府其故城在縣西南漳水宋本水下有徑字於縣東清禹貢錐指引此下有漳字水自涉縣東南來注流之世謂決入之所為交漳口也涉縣今屬彰德府其故城在縣西北元和志清漳水亦名涉河在涉縣南一里又東出山過鄴縣西今彰德府臨漳縣西南有鄴縣故城西接林縣界有太行林慮倚陽天平諸山皆漳水之所經也漳水又東徑三户峽為三户津張晏曰三户地名也三户津在故鄴城西四十里在梁期西南孟康曰津峽名也在鄴西四十里又東汗宋本作沂水注之水出武安縣山東南流徑于城北昔項羽與蒲將軍英布濟自三户破章邯於是水汗水東注于漳水漳水又東徑武城南世謂之梁期城梁期在鄴北俗亦謂之兩期城皆為非也司馬彪郡國志曰鄴縣有武城武城即期城矣漳水又東北徑西門豹祠前祠東側有碑隱起為字祠堂東頭石柱勒銘曰趙建武中所修也魏文帝述征賦曰羡西門之嘉迹忽遙睇其靈宇漳水右與枝水合其水上承漳水於邯會西而東别與邯水合水發源邯山東北徑邯會縣故城西北注漳水故曰邯會也張晏曰漳水之别自城西南與邯山之水會今城旁猶有溝渠存焉漢武帝元朔二年封趙敬肅王子劉仁為侯國其水又東北入于漳昔魏文侯以西門豹為鄴令也引漳以溉鄴民賴其用其後至魏襄王以史起為鄴令又堰漳水以溉鄴田咸成沃壤百姓歌之魏武王又堨漳水回流東注號天井堰里中作十二墱墱相去三百步令互相灌注一源分為十二流皆懸水門陸氏鄴中記云水所溉之處名曰晏陂澤故左思之賦魏都也謂墱流十二同源異口者也魏武之攻鄴也引漳水以圍之獻帝春秋曰司空鄴城圍周四十里初淺而狹如或可越審配不出爭利望而笑之司空一夜增修廣深二丈引漳水以注之遂拔鄴後漢書袁紹傳袁尚使審配守鄴曹操進攻鄴配將馮札為內應開突門內操兵三百餘人配覺之從城上以大石擊門入者皆死操乃鑿塹圍城周回四十里初令淺示若可越配望見笑而不出爭利操一夜濬之廣深二丈引漳水以灌之遂拔鄴云云較所引似明暢本齊桓公所置也故管子曰築五鹿中牟鄴以衛諸夏也後屬晉魏文侯七年始封地此句疑有訛誤宋本作始封此地然恐亦非是蓋魏之封豈始于文侯耶惟史記魏世家有云文侯六年城少梁或當作始城此地為是故曰魏也漢髙帝十二年置魏郡治鄴縣王莽更名魏城後分魏郡置東西部都尉故曰三魏魏武又以郡國之舊引漳流自城西東入徑銅雀臺下伏流入城東注謂之長明溝也渠水又南徑止車門下魏武封於鄴為北宫宫有文昌殿溝水南北夾道枝流引灌所在通溉東出石竇下注之湟水故魏武登臺賦曰引長明灌街里謂此渠也石氏於文昌故殿處造東西太武二殿於濟北榖城之山採文石為基一基下五百武直宿衛屈疑作屋柱趺瓦悉鑄銅為之金漆圖飾焉又徙長安雒陽銅人置諸宫前以華國也城之西北有三臺皆因城之之字衍為基巍然崇舉其髙若山十六國春秋後趙録石虎建武元年大起宫殿于都遂于鄴西文昌故殿處造東西太武二殿採榖城山文石為基一基下五百武直宿衛屈柱趺瓦悉鑄銅為之金漆圖飾焉又徙長安雒陽銅人置諸宫前以華其國城之西北有三臺皆因城為基巍然崇舉其髙若山建安十五年魏武所起平坦略盡春秋古地云葵邱地名今鄴西臺是也謂臺已平或更有見意所未詳其中曰銅雀臺髙十丈有屋百餘間臺成命諸子登之並使為賦陳思王下筆成章美捷當時亦魏武望奉常王叔治之處也昔嚴才與其屬攻掖門修聞變車馬未至便將官屬步至宫門魏志王修傳曰修徙奉常其後嚴才反修聞變召車馬未至便將官屬步至宫門云云嚴才下漏反字聞變下漏召字太祖在銅雀臺望見之曰彼來者必王叔治也相國鍾繇曰舊京城有變九卿各居其府卿何來也修曰食其祿焉避其難居府雖舊非赴難之義時人以為美談矣石虎更增二丈立一屋連棟接簷彌覆其上盤回隔之名曰命子窟又於屋上起五層樓髙十五丈去地二十七丈又作銅雀於樓巔舒翼若飛南則金雀臺髙八丈有屋一百九間北曰冰井臺十六國春秋作井冰臺亦髙八丈有屋一百四十間上有冰室室有數井井深十五丈藏冰及石墨焉石墨可書又然之難盡亦謂之石炭又有粟窖及監疑當作鹽以備不虞今窖上猶有石銘存焉左思魏都賦曰三臺列峙而峥嶸者也城有七門南曰鳳陽門中曰中陽門次曰廣陽門東曰達春一作建春門北曰廣德門次曰廄門西曰金明門一曰白門鳳陽門三臺洞開髙三十五丈石氏作層觀架其上置銅鳳頭髙一丈六尺東城上石氏立東明觀觀上加金博山謂之鏘天北城上有齊午樓超出羣榭孤髙特立其城東西七里南北五里飾表以磚百步一樓凡諸宫殿門臺隅雉皆加觀榭層甍及後趙録作疊宇飛簷拂雲圖以丹青色以輕素當其全盛之時去鄴六七十里逺望苕何氏云疑作岧亭巍若仙居魏因漢祚復都洛陽以譙之疑訛宋本作譙為先人本國許昌為漢之所居長安為西京之遺迹鄴為王業之本基故號五都也今相州刺史及魏郡治漳水自西門豹祠北徑趙閲馬臺西基髙五丈列觀其上石虎每講武於其下升觀以望之虎自於臺上放鳴鏑之矢以為軍騎出入之節矣漳水又北徑祭陌西戰國之世俗巫為河伯取婦祭於此陌魏文侯時西門豹為鄴令約諸三老曰為河伯取婦卒來告知史記作幸來告語吾欲送女皆曰諾至時三老廷掾賦斂百姓取錢百萬巫覡行里中有好女者呪當為河伯婦呪疑誤史記作是當為河伯婦以錢三萬聘女沐浴脂粉如嫁狀豹往會之三老巫掾與民咸集赴觀巫嫗年七十從十女弟子豹呼婦視之以為非妙令巫嫗入報河伯投巫於河中有頃曰何久也又令三弟子及三老入白並投於河豹磬折曰三老不來奈何復欲使廷掾豪長趣之皆叩頭流血乞不為河伯取婦淫祀雖斷地留祭陌之稱焉又慕容俊投石虎尸處也田融以為紫陌也趙建武十一年造紫陌浮橋於水上為佛圖澄先造生墓於紫陌建武十五年卒按後趙録佛圖澄傳澄于建武十四年十二月八日卒今云十五年誤十二月葬焉即此處也漳水又對趙氏臨漳宫宫在桑梓苑多桑木故苑有其名三月三日及始蠶之月虎帥皇后及夫人採桑於此今地有遺桑墉無尺雉矣漳水又北溢水入焉漳水又東徑梁期城南地理風俗記曰鄴北五十里有梁期城故縣也漢武帝元鼎五年封任破胡為侯國晉惠帝永興元年驃騎王浚遣烏丸渴末徑至梁期候騎到鄴成都王頴遣將軍石超討末為末所敗於此也徑平陽城北竹書紀年曰梁惠成王元年鄴師邯鄲師於平陽者也按竹書紀年無此文且句中亦有訛誤司馬彪郡國志曰鄴有平陽城即此地也又東過列人縣南列人故城在今廣平府肥鄉縣北漳水又東右徑斥丘縣北即裴縣故城南王莽更名之曰即是也元和志成安縣濁漳水西自滏陽縣界流入斥丘故城在縣東南三十里斥丘裴縣並在東昌府丘縣地理風俗記曰列人縣西南六十里即裴城故縣也漳水又東北徑列人縣故城南王莽更名之為列治也竹書紀年曰梁惠成王八年惠成王伐邯鄲取列人者也於縣右合白渠故瀆白渠水水疑衍出魏郡武安縣欽口山東南流徑邯鄲縣南又東與拘潤水合水導源武始東山白渠北俗猶為是水為拘河也白渠水又東又有牛首水入焉水出邯鄲縣西堵山東流分為二水洪湍雙逝澄映兩川漢景帝時七國悖逆命曲周侯酈寄攻趙圍邯鄲相捍七日引牛首拘水灌城城壞王自殺其水東入邯鄲城徑溫明殿南漢世祖擒王郎幸邯鄲晝卧處也其水又東徑叢臺南六國時趙王之臺也叢臺在今廣平府邯鄲縣北史記趙武靈王所築因其叢雜而名郡國志曰邯鄲有叢臺故劉邵趙都賦曰結雲閣於南宇立叢臺於少陽者也今遺基舊墉尚在其水又東歷邯鄲阜張晏所謂邯山在東城下者也曰單盡也城郭從邑故加邑邯鄲之名蓋指此以立稱矣故趙郡治也長沙耆舊傳稱桓楷為趙郡太守嘗有遺囊粟於路者行人挂囊粟於樹莫敢取之即於是處也其水又東流出城又合成一川也又東澄而為渚沁水東南涓一作流注拘潤水又東入白渠又東故瀆出焉一水東為澤渚曲梁縣之雞澤也曲梁縣今為廣平府治永平縣漢屬廣平國國語所謂雞邱矣東北通登宋本作澄湖白渠故瀆南出所在枝分右出即邯溝也歷邯溝縣故城東蓋因溝以名宋本作氏縣也地理風俗記曰即裴城西北二十里有邯溝城故縣也邯溝故城在今廣平府肥鄉縣西北十里又東徑肥鄉縣故城北故城在今縣西二十二里竹書紀年曰惠成王八年伐邯鄲取肥者也晉書地道記曰太康中立以𨽻廣平也渠道交徑互相纒縻與白渠同歸徑列人右會漳津今無水地理志曰白渠東至列人入漳是也又東北過斥漳縣南斥漳縣今為廣平府威縣漢志作斥章屬廣平國今曲周縣東有斥漳故城應劭曰其國斥鹵故曰斥漳漢獻帝建安十八年魏太祖鑿渠引漳水東入清洹以通河漕名曰利漕渠漳津故瀆水舊斷溪東北出涓流濗廣韻濗莫狄切淺水也注而已尚書所謂覃懷底績至于衡漳者也孔安國曰衡橫也言覃漳水橫流也又東北徑平恩縣故城西故城在今廣平府曲周縣平恩鎮應劭曰縣故館陶之别鄉漢元帝元康三年置按元康乃宣帝年號今云元帝誤又按史漢表平恩侯許廣漢以地節三年封今云元康亦誤以封后父許伯為侯國王莽更曰延平也又東北過曲周縣東又東北過巨鹿縣東曲周今屬廣平府巨鹿今屬河間府衡漳故瀆東北徑南曲縣故城西南曲縣故城在今東昌府邱縣西北地理志廣平有曲周縣應劭曰平恩縣北四十里有南曲亭故縣也又徑曲周縣故城東在今縣東北漳水故瀆在縣東志云漳水舊自縣東北入威縣其後自魏縣東出經流遂為枯瀆地理志曰漢武帝建元四年置王莽更名直周余按史記大將軍酈商以髙祖六年封曲周縣為侯國又考史記二字疑誤當作漢書同是知曲周舊縣非始孝武蓋商冀州人在縣市補履數年人竒其不老求其術而不能得也何氏云蓋商以下二十四字疑是錯簡蓋姓非酈商也衡漳又北徑巨橋祗疑當作邸閣西舊有大梁橫水故有巨橋之稱昔武王伐紂發巨橋之粟以賑殷之飢民服虔曰巨橋倉名巨鹿水之大橋也今臨側水湄左右方一二里中狀若邱墟蓋遺囤故窖處也衡水又北徑巨鹿縣故城東巨鹿今順德府治其故城即今平鄉縣魏收志云平鄉縣治巨鹿城是也史記項羽救巨鹿軍漳南括地志曰今俗名栁河在平鄉縣南元和志云濁漳水在縣西南十里明成化十八年漳河東決入順德府廣宗縣界是為新漳而舊漳遂涸應劭曰鹿者林之大也尚書曰堯將禪舜納之大麓之野烈風雷雨不迷致之以昭華之玉而縣取目焉路溫舒縣之東里人父為里監門使溫舒牧羊澤中取蒲牒用寫書即此澤也巨鹿郡治秦始皇二十五年滅趙以為巨鹿郡漢景帝中元年為廣平郡武帝征和三年以封趙敬肅王子為廣平侯國按武帝紀征和二年九月立趙敬肅王子偃為平干王漢志廣平國下云武帝征和二年置為平干國則此之廣平侯國當作平干王國世祖中興更為巨鹿也鄭玄注尚書引地説云大河東北流過絳水千里至大陸為地腹如志之言大陸在巨鹿地理志曰水在安平信都巨鹿與信都相去不容此數也水土之名變易世失其處見降水則以為絳水故依而廢讀或作絳字非也今河內共北山淇水共水二字疑衍出焉按漢志河內郡共縣注云故國北山淇水所出東至黎陽入河據此當作河內共北山淇水出焉為是今云北共山誤共水二字疑衍東至魏郡黎陽入河近所謂降水也降讀當如郕降于齊師之降蓋周時國於地者惡言降故改之共耳又今河所從去大陸逺矣館陶北屯氏河其故道與余按鄭玄據尚書有東過洛汭至于大伾北過降水至于大陸推次言之故以淇水為降水共城為降城所未詳也稽之羣書共縣故本共和之故國是有共名不惡降而更稱禹著山經淇出沮洳淇澳衛詩列目又逺當非改絳為今號但是水導源共山北玄欲因成降議故以淇水為降水耳即如玄引他説黎陽巨鹿非千里之徑直信都於大陸者也唯屯氏北出館陶事近之矣按地理志云絳水發源屯留下亂漳津是乃與漳俱得通稱故水流間關所在著目信都復見絳名而東入于海尋其川脈無他殊瀆而衡漳舊道與屯相亂乃書有過降之疑有脫文地説與千里之志即之途致與書相鄰河之過降當應此矣下至大陸不異經説自寧迄于巨鹿出于東北皆為大陸語之纒絡厥勢眇矣九河既播八牧何氏云牧疑作枝代絶遺迹故稱往往時存故鬲般列於東北徒駭瀆聨漳絳同逆之狀粗分陂障之會猶在案經考瀆自安故目矣禹貢錐指宋張洎云降水即濁漳也字或作絳地理志屯留縣下云桑欽言絳水出西南東入海酈道元引此文作入漳云絳水發源屯留下亂漳津與漳俱得通稱通典云漳水橫流而入河在今廣平郡肥鄉縣界大陸地名見冀州河渠書云禹道河至于大伾以為河所從來者髙水湍悍難以行平地數為敗乃厮二渠以引其河北載之髙地過降水至于大陸二渠其一為漯川自黎陽大伾山南東北流至千乘入海其一則河之經流自大伾山西南折而北為宿胥口又東北經鄴縣東至列人斥漳縣界合漳水是為北過降水溝洫志王橫曰禹之行河水本隨西山下東北去周譜云定王五年河徙則今所行非禹之所穿冝更開空使緣西山足乘髙地而北入海即此道也水經所敘漳水自平恩以下皆禹之故道河自斥漳又東北徑平恩曲周以至巨鹿其西畔為大陸也漢巨鹿縣唐為平鄉巨鹿二縣屬邢州今屬順德巨鹿故城即今平鄉縣治錐指又云正義曰地理志降水在信都縣按漢書以襄國為信都在大陸之西或降水發源在此下尾至今之信都故得先過降水乃至大陸鄭以降讀為下江反聲轉為共河內共縣淇水出焉東至魏郡黎陽縣入河此近降水周時國于此地者惡言降故謂之共此鄭胸臆不可從也按襄國今為邢臺縣縣界絶無降源孔説非是酈注濁漳引鄭尚書注言降水字不當作絳是也而讀降為郕降于齊之降以淇水為降水共城為降城則謬又曰今何所從去大陸逺矣館陶北屯氏河其故道與酈以為近是今考地理志館陶縣下云河水别出為屯氏河東北至章武入海今館陶臨清清平髙唐景州南皮滄州鹽山界中並有古屯氏河則屯河行清河之東大河故瀆之西為禹貢故道理或有之然鄴縣故大河在東北入海地志有明文禹河既自宿胥口北行至鄴豈復東行至館陶而與屯氏相接哉其非禹迹明矣漳水又歷經縣故城西水有故津謂之薄落津昔袁本初還自易京上已屆此率其賔從褉飲於斯津矣經縣故城在今順德府廣宗縣東二十里本後漢經縣地後魏折置二縣此為西經漳水自平鄉流入縣界即古薄落水也戰國策趙武靈王曰吾國東有河薄落之水後漢初平四年袁紹擊公孫瓉于薄落津衡漳又徑沙邱臺東紂所成也在巨鹿故城東北七十里趙武靈王與秦始皇並死於此矣按通典平鄉縣有沙邱臺在今廣宗縣界廣宗唐平鄉地也又徑銅馬祠東漢光武廟更始三年秋光武追銅馬於館陶大破之遂降之賊不自安世祖令其歸營乃輕騎行其壘賊乃相謂曰蕭王推赤心置人腹中安得不投死乎遂將降人分配諸將衆數十萬人故關西號世祖曰銅馬帝也祠取名焉廟側有碑述河內修武縣張𨗳字景明以建和三年為巨鹿太守漳津泛濫土不稼穡𨗳披按地圖與丞彭參掾馬道嵩等原其逆順揆其表裏修防排通疑漏以字正水路功績有成民用嘉賴題云漳河神壇碑而俗老耆儒猶謂斯廟為銅馬劉神寺是碑頃因震裂餘半不可復識矣寰宇記銅馬寺在巨鹿縣北七里漳水舊在縣東唐巨鹿縣故城在縣南宋北流決入漳水大觀元年邢州言河決陷巨鹿縣詔遷縣于髙地即今治其後河復南出漳亦隨之故道多塞又徑南宫縣故城西漢惠帝元年以封張越人子買為侯國按史漢表是髙后元年今云惠帝元年誤王莽之序中也其水與隅醴通為衡津又有長蘆淫水之名絳水之稱矣今漳水既斷絳水非復纒絡矣又北絳瀆出焉今無水故瀆東南徑九門城南城在今正定府藁城縣西北二十五里又東南徑南宫城北南宫縣今屬正定府元和志絳水故瀆在南宫縣東南六里又東南徑繚城縣故城北繚城在今南宫縣東南經城在今廣平府威縣北十三州志曰經縣東五十里有繚城故縣也左徑安城南故信都之安鄉也城在今正定府冀州東南故信都之安城鄉也更始二年和城太守邳彤與上會信都南安城鄉上大悅即此處也故瀆又東北徑辟陽亭今冀州東南二十里有辟陽故城漢髙帝六年封審食其為侯國王莽之樂信也地理風俗記曰廣川西南六十里有辟陽亭故縣也今冀州東南二十里有辟陽故城絳瀆又北徑信都城東散入澤渚信都城即今冀州治西至于信都城東連于廣川縣之張甲故瀆同歸于海今棗強縣東三十里有廣川故城河水注云張甲河右瀆自廣川縣東北徑其故城西又東北至修縣東會清河入漳故地理志曰禹貢絳水在信都東入於海也禹貢錐指漢志雜採古記故漳絳二水並存實一川也漳絳本入河及河徙之後漳絳循河故道而下故酈道元云水流間關所在著目信都復見絳名而東入于海也然漢志信都之絳水則又有别志云故漳河在北東入海禹貢絳水亦入海蓋縣北故漳即禹河之故道而絳水出其南則漳水之徙流酈元所謂絳瀆者也蓋漢時信都之漳水徙從其縣南故地志以此為絳水而目縣北之瀆曰故絳河其後漳復北道故水經敘漳水仍自信都縣西東北過下博縣而酈元云絳瀆今無水唐人遂謂之枯絳杜佑通典云清河郡經城縣界有枯絳渠北入信都郡界者是也殊不知此渠乃漳水一時之徙流而漢書地志乃以為禹貢之絳水豈不大謬而杜佑復據之以分冀兖之界自後説經者動稱枯絳以證𨗳河之所過皆班氏禹貢二字有以誤之也又北過堂陽縣西衡水自堰分為二水其一水北出徑縣故城西世祖自信都以四千人先攻堂陽降水者也水上有梁謂之旅津渡商旅所濟故也其右水東北注出石門門石崩裭餘基殆在謂之長蘆水蓋變引葭之名也元和志堂陽縣長蘆水亦謂之堂水在縣南二百步因取名按堂陽今為新河縣其故城在南宫縣西北衡水即漳水長蘆水更徑堂陽縣故城南應劭曰縣在堂水之陽榖梁傳曰水北為陽也今於故縣城南更無别水唯是水東出可以當之斯水蓋包堂水之兼稱矣長蘆水又東徑九門波宋本作坡一作城故縣也又東徑扶栁縣故城南漢志扶栁縣屬信都國今冀州西南有扶栁故城此云扶都誤世祖建武三十年封冦恂子楫後漢書冦恂傳恂卒子損嗣後徙損為扶栁侯今云楫誤為侯國又東屈北徑信都縣故城西信都郡治也漢髙帝六年置景帝二年為廣川惠王越國漢志信都國景帝二年為廣川國漢表景帝中二年封子越為廣川王王莽更為新傳縣曰新傳亭漢志信都國莽曰新博今云傳誤光武自薊至信都是也明帝永平十五年更名樂成漢志應劭曰明帝更名樂安今云樂成誤安帝延光中改曰安平城內有漢冀州從事安平趙徴碑又有魏冀州刺史陳留丁紹碑青龍三年立城南有獻帝南巡碑其水側城北注又北徑安陽城東又北徑武陽城東十三州志曰扶栁縣東北有武陽城故縣也又北為博廣池池多名蟹佳蝦歲貢王朝以充膳府又北徑下博縣故城東而北流注于衡水也又東北過扶栁縣北又東北過信都縣西扶栁縣故城在信都城西扶栁縣故城在今冀州西南信都縣即正定府冀州昌城縣故城在冀州西北衡水徑其西縣有扶澤澤中多栁故曰扶栁也衡水又北徑昌城縣故城西今在冀州西北地理志曰信都有昌城縣漢志作昌成漢武帝以封城陽頃王子劉羌史表城陽傾王子劉差封昌侯今云羌誤為侯國闞駰曰昌城本名阜城矣應劭曰堂陽縣北三十里有昌城故縣也世祖之下堂陽昌城人劉植率宗親子弟據邑以奉世祖是也又徑西梁縣故城東西梁縣故城在扶栁故城西北五十里地理風俗記曰扶栁縣西北五十里有梁城故縣也世以為五梁城蓋字狀致謬耳元和志信都縣衡水亦曰長蘆水即濁漳水之下流也西北去縣六十二里寰宇記長蘆枯溝在州西二里漳水在州西北百二十里衡漳又東北徑桃縣故城北桃縣今為正定府衡水縣故城在冀州西北四十五里漢髙祖十二年封劉襄為侯國王莽改之曰桓分也合斯洨故瀆斯洨水首受大白渠大白渠首受綿蔓水明一統志綿蔓水在正定府井陘縣南門外源發山西平定州流至縣界與甘陶河合綿蔓水上承桃水水出樂平郡之上艾縣東流世謂之曰桃水東徑靖陽亭南故關城也及北流至井陘關下注澤發水亂流東北徑常山蒲吾縣西而桃水出焉南徑蒲吾縣故城西蒲吾縣今為正定府平山縣又東南流徑桑中縣故城北世謂之石勒城蓋趙氏增成之故擅其目又謂之髙功城也地理志曰侯國也桃水又東南流徑綿蔓縣故城北王莽之綿延也世祖建武二年封郭况為侯國自下通謂之綿蔓水綿蔓水又東流徑樂陽縣故城西右合井陘山水水出井陘山世謂之鹿泉水也明一統志鹿泉在正定府獲鹿縣海螺山下漢韓信伐趙下井陘師患無水于此獲二白鹿跑地得泉因名東北流屈徑陳餘壘而俗謂之故壁城昔在楚漢韓信東入餘拒之於此不納左車之計悉衆西戰信遣竒兵自間道出立幟於其壘師奔失據遂死泜上其水又屈徑其壘南又南徑城西東注綿蔓水綿蔓水又屈從城南俗名曰臨清城非也地理志曰侯國矣王莽更之曰申苗者也漢志樂陽縣屬常山郡莽曰陽苗今云申苗誤東觀漢記曰光武使鄧禹發房子兵二千人以銚原本訛姚期為偏將軍别攻真定宋子餘賊援樂陽稟肥壘者也後漢書鄧期傳期為禆將屬鄉禹徇正定宋子攻拔樂陽稿肥壘注曰樂陽縣名肥壘故肥子國今藁城縣此云援當作稟當作藁綿蔓水又東徑烏子堰枝津出焉又東謂之大白渠地理志所謂首受綿蔓水者也白渠水又東南徑開縣故城北地理志曰常山之屬縣也又東為成郎河水上有大梁謂之成郎橋又東徑耿鄉南世祖封前將軍耿純為侯國世謂之宜安城又東徑宋漢志宋子縣屬巨鹿郡子縣故城北宋子故城在今正定府趙州東北二十里又謂之宋子河漢髙帝八年封許厥按史表當作瘈為侯國王莽更名宜子昔漸離擊築傳工自此入秦史記刺客傳髙漸離變姓名為人庸保匿作于宋子宋子傳客之聞于秦始皇徐廣曰傳客互以為客也此云傳工疑當作傳客或當作庸工又東徑敬武縣故城北按地理志曰巨鹿之屬縣也漢元帝封女敬武公主為湯沐邑闞駰十三州記曰楊氏縣北四十里有武亭故縣也今其城實中小邑耳故俗名之曰敬武壘即古邑也白渠又東謂之斯洨水地理志曰大白渠東至曲陽入洨河者也明一統志洨河在正定府欒城縣西一十二里來自平山縣流徑縣境至趙州南入大陸澤東分為二水枝津右出焉東南流謂之百尺溝又東南徑和城北世謂之初邱城非也漢髙帝十一年封郎中公孫耳為侯國按史記表作禾成又東南徑育城西漢髙帝六年封吕博為侯國按史漢表無吕博封育侯之事且漢志無育縣不知何據云然考志巨鹿郡有貰縣史記表有貰侯吕係髙祖六年封漢表作貰侯合傳胡害功封嗣侯皆同此云吕博或即合史漢表而互異之訛貰為育訛傳為博耳然而所未詳也百尺溝東南散流徑歷鄉東而南入泜湖東注衡水也斯洨水自枝津東徑育城北又東積而為陂謂之陽縻淵淵水左納白渠枝水俗謂之祇水疑作汦水水承白渠於藁縣之烏子堰又東徑肥纍縣之故城南藁城縣今屬正定府肥壘故城在縣西南占肥子國又東徑陳臺南臺甚寬廣今上陽臺屯居之又東徑新豐城北按地理志云巨鹿有新市縣侯國也王莽更之曰樂市而無新豐之目所未詳矣新市故城在今正定縣西北其水又東徑昔陽城南世謂之曰直陽城非也本鼓聚矣春秋左傳昭公十五年晉荀吳帥師伐鮮虞圍鼓杜預注鼓白狄之别巨鹿曲陽下有鼓聚三月鼓人請降穆子曰猶有食色不許軍吏曰獲城而弗取勤民而頓兵何以事君穆子曰獲一邑而教民怠將焉用邑邑以賈怠不如完舊賈怠無卒棄舊不祥鼓人能事其君我亦能事吾君率義不爽好惡不愆城可獲而民知義所有死義義左傳作命而無二心不亦可乎鼓人告食竭力盡而後取之克鼓而返不戮一人以鼓子鳶鞮歸既獻而返之鼓子又叛荀吳略東陽使師偽糴負甲怠於門襲而滅之以鼓子鳶鞮歸使涉他守之者也左傳昭公二十二年鼓子又叛于鮮虞荀吳略東陽使師偽糴者負甲以息于昔陽之門外遂襲鼓滅之以鼓子鳶鞮歸使涉他守之十三州志曰今其城昔陽亭是矣京相璠曰白狄之别也下曲陽有鼓聚故鼓子國也白渠泜水又東徑曲陽城北又徑安鄉縣故城南原本漏故城在無極縣南六里地理志曰侯國也又東徑育縣入斯洨水斯洨水又東徑西梁城南又東北徑樂信縣城南地理志曰巨鹿縣侯國也又東入衡水衡水又北為袁談渡蓋談自鄴往還所由故濟得厥名又東北過下博縣之西今為正定府深州衡水又北徑塢當作鄡下同按漢志作縣故城東鄡縣故城在今保定保束鹿縣東接深州界元和志衡漳水在鹿城縣南竹書紀年梁惠成王三十年秦封衛鞅于塢改名曰商今竹書作尚即此是也故王莽改曰秦聚也地理風俗記曰縣北有塢阜蓋縣氏之又右徑下博縣故城西王莽改曰閏博應劭曰太山有博故此加下漢光武自滹沱南出至此失道不知所以遇白衣老父曰信都長長安守去此八十里世祖赴之任光開門納焉漢氏中興始基之矣尋求父老不得議者以為神後漢書光武紀光武至滹沱河遑惑不知所之育白衣老父在道旁指曰努力信都郡為長安守去此八十里光武即馳赴之信都太守任光開門出迎衡漳又東北歷下博城西逶迤東北注謂之九爭西徑樂鄉縣故城南王莽更之曰樂邱也又東引葭水注也樂鄉故城在今深州東北引葭即長蘆水也自此以下衡漳與長蘆互受通稱又東北過阜城縣北此阜城當在今武邑縣界又東北至昌亭與雩池一作滹沱下並同河會經敘阜城於下博之下昌亭之上考地非比於事為同勃海阜城又在東昌之東故知非也漳水又東北徑武邑郡南魏所置也武邑縣今屬正定府元和志武邑縣長蘆水北去縣三十二里又東徑武強縣北今屬正定府元和志武強故城在武強縣西南二十五里按今縣南有武強故城二一魏置一西晉置寰宇記衡漳在武強縣南五里又東北徑武隧縣故城南武隧縣今省入武強縣元和志武隧故城在武強東三十一里按史記秦破趙將扈輒於武隧斬首十萬即於此處也王莽更名桓隧矣白馬河注之水上承雩池東徑樂鄉縣北饒陽縣今屬正定府南又東南徑武邑郡北晉分武邑武隧觀津為武邑治此當在今武邑縣界縣志云漳河在縣西北二十里而東入衡水謂之交津口衡漳又東徑武邑縣故城北王莽之順桓也晉武帝封子於縣以為王國晉書武帝紀司馬承初封南宫王太康十年改封武邑王後分武邑武隧觀津為武邑郡治此衡漳又東北右合張平口故溝上承武強淵淵之西南之側有武強縣故治故淵得其名焉東觀漢記曰光武拜王梁為大司空以為侯國耆宿云邑人有行於途者見一小蛇疑其有靈持而養之名曰擔生長而吞噬人里中患之遂捕繫獄擔生負而奔邑淪為湖縣長及吏咸為魚矣今縣治東北半宋本半下有里字許落水淵水又東南結而為湖又謂之郎君淵耆宿又言縣淪之日其子東奔又陷於此故淵得郎君之目矣淵水北通謂之石虎口又東北為張平澤澤水所泛北決堤口謂之張刀溝北注衡河謂之張平口亦曰張平溝水溢則南注水耗則輟流衡漳又徑東昌縣故城北今武邑縣東有東昌廢縣經所謂昌亭也王莽之田昌也俗名之曰東相蓋相昌聲韻合故致兹誤矣西有昌城故目是城為東昌矣衡漳又東北左會雩池故瀆謂之合口衡漳又東北分為二川當其水泆處名之曰李聰渙又東北至樂成陵縣别出北按漢志樂成縣屬河間國故城在今河間府獻縣東南漢志無陵縣玩注此陵字疑衍衡漳於縣無别出之瀆縣北者乃雩池别水分雩池故瀆之所纒絡也衡漳又東分為二水左出為向氏口溝水自此決入也衡漳又東徑弓髙縣故城北錐指云弓髙故城在今河間府阜城縣西南明一統志云在景州東北四十里漢景帝封韓信兄子韓隤當為侯國史表文帝十六年封韓王信孽子頽當為弓髙侯今為景帝及韓信兄子並誤韓王信傳作十四年封頽漢表作隤王莽之樂成亭也衡漳又東北右合柏梁溠水上承李聰渙東北為柏梁溠東徑扶領縣故城南漢武帝元朔三年封廣川王子劉嘉為侯國史記表劉嘉封蒲領侯地理風俗記曰修縣西北八十里有蒲領鄉故縣也明一統志蒲領城去阜城縣三里漢縣後省入修縣又有城在滄州魯城縣北六十里亦名蒲領蓋東漢末黃巾之亂有蒲領人流寓于此因立此城非漢縣也又東北會桑杜宋本作桑社下同枝津又東北徑弓髙城北又東注衡漳謂之柏梁口衡漳又東北右會桑杜溝溝上承從陂世盧達上下疑有訛字闕文從薄亦謂之訶摩河東南通清河西北達衡水春秋雨泛漳澤津渚今觀津城北方二十里盡為澤藪蓋水所鍾也其瀆徑觀津縣故城北在景州西北與武邑縣連界明一統志云在武邑縣東南三十里樂毅自燕降趙封之於此邑號望諸君王莽之朔定亭也又南屈東徑竇氏青山南側堤東出青山即漢文帝竇后父少翁冡也翁即是縣人遭秦之亂魚釣隱身墜淵而死景帝立后遣使者填以葬父起大墳於觀津城東南故民號曰青山也又東徑董仲舒廟南明一統志董子祠在景州治東南崇基上舊有祠在西南廣川鎮仲舒廣川人也世猶謂之董府君祠春秋禱祭不輟舊溝又東徑修市縣故城北漢宣帝本始四年封清河綱史表作剛王子劉寅為侯國王莽更之曰居寧也俗謂之溫城非也地理風俗記曰循何氏云此循字亦修字傳寫之誤漢志修屬信都國下同縣西北二十里有修市城故縣也又東會從陂陂水南北十里東西六十步子午潭漲淵而不流亦謂之桑杜淵從陂南出夾堤東𣲖徑循縣故城北東合清漳漳泛則北注澤盛則南播津流上下互相徑道從陂北出東北分為二川北徑弓髙城西而北注柏梁溠一川東徑弓髙城南又東北陽津清宋本作溝水出焉左瀆北入衡漳謂之陽決口衡水東徑阜城縣故城北樂城縣故城南河間郡治地理志曰故趙也漢文帝二年别為國應劭曰在兩河之間也景帝九年按表是景帝二年封封子德為河間王是為獻王王莽更名郡曰朔定縣曰陸信禇先生曰漢宣帝地節三年漢表作地節二年封大將軍霍光兄子山為侯國也漢表作樂平漢章帝封子開於此漢桓帝追尊祖父孝王開為孝穆王以其邑奉山陵故加陵曰樂陵也今城中有故池方八十步舊引衡水北入城注池池北對層臺基隍荒蕪示存古意也又東北過成平縣南衡漳又東徑建成縣故城南按地理志故屬渤海郡禇先生曰漢昭帝元鳳三年按漢表作宣帝五鳳三年黃霸傳亦云代丙吉為丞相封建成侯此云昭帝元鳳誤封丞相黃霸為侯國也成平縣故城在北漢表作平城按二城並在交河縣界漢武帝元朔三年封河間獻王子劉禮為侯國王莽之澤亭也城南北相直衡漳又東右會楊津溝水自枝水東徑阜城南地理志勃海有阜城縣王莽更名吾成者非經所謂阜成也建武十五年世祖更封大司馬王梁為侯國陽津溝水又東北徑建成縣左入衡水謂之陽津口衡漳又東左會雩池别河故瀆漢志成平縣有呼沱河民曰徒駭河又樂成縣呼沱别水首受呼沱河東至東光入呼沱河此呼沱河即漳水古之徒駭也滹沱别河故瀆即呼沱别水自樂成來者志云至東光入呼沱河蓋與成平接界處也又東北入清河謂之合口河水篇曰大河故瀆東北至東光縣故城西而北與漳水合是也縣界清河本西漢大河之經流王莽時河徙清河由此北會漳水故酈元云清漳二瀆河之舊道也合口在今青縣南二里接滄州界又徑南皮縣之北皮亭而東北徑浮陽縣西東北注之又東北過章武縣西又東北過平舒縣南東入海清漳自章武縣故城西故城在今河間府鹽山縣西北故濊邑也枝瀆出焉謂之濊水按青縣宋為乾寧軍本漢參户縣兼得章武地縣南有參户故城即酈注所謂參户亭也元和志云一名木門城在長蘆縣西北四十里青縣新志云濊水東北流徑天津鎮東南十里為大直沽地勢平衍羣流漲溢茫無涯涘故得厥稱長蘆縣即今衛南七十里衛河西南之長蘆鎮也東北徑參户亭分為二瀆應劭曰平舒縣西南五十里有參户亭故縣也世謂之平虜城枝水又東注謂之蔡伏溝又東積而為淀一水徑亭北又徑東平舒縣故城南在今順天府大城縣界代郡有平舒城故加東地理志曰勃海之屬縣也魏土地記曰章武郡治故世以為章武故城非也又東北分為二水一疑漏水字右出為澱一水北注呼池謂之濊水清漳亂流而東注于海章武漢屬勃海郡唐為魯城縣在滄州北一百里東平舒故城在今大城縣界淇水篇云清河自濊邑北又東北至泉州縣北入滹沱又東徑漂榆邑故城南入于海按今靜海縣本漢章武平舒二縣地縣北有漂榆城清漳合流經此入海寰宇記云御河自乾寧軍東北九十里入潮河合流向東七十里於獨流口入海潮河即界河也縣東北九十里有小直沽天津衛設焉本漢章武縣地元為靜海縣之海濵鎮明永樂二年築城置衛有本朝改衛為鎮小直沽即古沽水後魏志章武縣沽水水經云沽水東南至泉州縣與清河合東入于海是也泉州今為寶坻漷縣地小直沽受南北諸水東徑天津城北又東南合大直沽而東注于海漢志所云河水東北至章武入海者也海即勃海元和志云在魯城縣東九十里今在靜海縣東北一百五十里南接滄州折而東北接寶坻縣界禹貢之逆河後世則為勃海亦謂之海也清漳水出上黨沾縣西北少山大黽谷南過縣西又從縣南屈沾縣今為山西遼州和順縣及太原府平定州樂平縣明一統志云清漳水源出樂平縣之沾嶺北流折而西南入和順縣又自涉縣西入河南境東至林縣合濁漳水經臨漳館陶縣界入衛河淮南子曰清漳出揭戾山髙誘云山在沾縣今清漳出沾縣故城東北俗謂之漳山漢分沾縣為樂平郡治沾縣水出樂平郡沾縣界故晉太康地記曰樂平縣舊名清漳縣漢之故名其山亦曰鹿一作谷吉山水出大要何氏云經作黽而注作要蓋因古文要作與黽相似故訛作要耳谷南流徑沾縣故城東不歷其西也又南徑昔陽城左傳昭公十二年晉荀吳偽會齊師者假道於鮮魚遂入昔陽杜預曰樂平沾縣東有昔陽城者是也其水又南得梁榆水口水出梁榆城西大嵰山水有二源北水東南流徑其城東南注南水南水亦出西山東徑文當城北又東北徑梁榆城南即閼與故城也秦伐趙閼與惠文王使趙奢攻一作救一作敵之奢納許歷之説破秦於閼與謂此也司馬彪袁松郡國志並言涅縣有閼與聚盧諶征艱賦曰訪梁榆之虗郭弔閼與之舊平桓亦云朱謀㙔云桓字似誤疑當作松謂袁松也閼與今梁榆城是也漢髙帝八年封馮解敢為閼氏侯國其水右合北水北水又東南入于清漳清漳又東南與轑水相得轑水出轑河縣西北轑山南流徑轑河縣故城西南東流至粟城注于清漳也東過涉縣西屈從縣南按地理志云魏郡之屬縣也漳水於此有涉之稱名因地變也涉縣今屬河南彰德府明一統志云本漢沙縣地屬魏郡後因漳水人民徒涉故遂名涉縣東至武安縣南黍窖邑入于濁漳朱云此下疑闕注文水經注集釋訂訛卷十
