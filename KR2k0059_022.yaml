body:
  text: 水經注集釋訂訛卷二十二歸安沈炳巽撰潁水洧水潧水潩水潁水出潁川陽城縣西北少室山陽城縣今為河南府登封縣秦始皇十七年滅韓以其地為潁川郡蓋因水以著稱者也漢高帝二年以為韓國王莽之左隊也山海經曰潁水出少室山地理志曰出陽城縣陽乾山明一統志陽乾山在登封縣東二十五里今潁水有三源竒發右水出陽乾山之潁谷春秋潁考叔為其封人其水東北流中水導源少室通阜東南流徑負黍亭東春秋定公六年鄭伐馮滑負黍者也馮敬道顯志賦曰求善卷之所在遇許由於負黍京相璠曰負黍在潁川陽城縣西南二十七里世謂之黃城也亦或謂是水為㶏水東與右水合左水出少室南溪東合潁水故作者乃舉二三言水所發也吕氏春秋曰卞隨恥受湯讓自投此水而死張顯逸民傳嵇叔夜高士傳並言投泂水而死未知其孰是也朱謀㙔曰吕覽云卞隨自投於潁水而死莊子云自投於稠水而死司馬注本作泂水云泂水在潁陽㙔按潁泂古字通用故禮顈衣一作絅是其例也稠泂二字皆誤耳又東南過其縣南潁水又東五渡水注之其水𨗳源崇一作嵩按漢志潁川郡有崈高縣武帝置以奉太室山是為中嶽師古曰崈古崇字今為登封縣地高縣東北太室東溪縣漢武帝置以奉太室山俗謂之嵩陽城及春夏雨泛水自山頂而迭相灌澍崿流相承為二十八浦也陽旱輟津而石潭不耗道俗遊憩者唯得餐飲而已無敢澡盥其中苟不如法必數日不豫是以行者憚之山下大澤周數里而清深肅潔水中有立石高十餘丈廣二十許步上甚平整緇素之士多泛舟升陟取暢幽情其水東流南陽城西石溜縈委溯者五涉故亦謂之五渡水東南流入潁水潁水徑其縣故城南昔舜禪禹禹避商均伯益避啓並於此也亦周公以土圭測日景處漢成帝永始元年封趙臨為侯國也按漢書外戚恩澤侯表趙臨以皇后父封成陽侯不封陽城侯且成陽屬汝南郡陽城屬潁川郡今潁水所歷自在潁川境內恐與汝南無涉縣南對箕山山上有許由冢原本訛䝉堯所封也故太史公曰余登箕山之上有許由墓焉山下有牽牛墟側潁水有犢泉是巢父牽牛處也石上犢跡存焉高士傳云許由隱於潁水之陽箕山之下堯召為九州長由洗耳於潁水濱其友巢父牽犢欲飲之見由洗耳問之知其故曰子若處髙岸深谷人道不通誰能見子乃浮遊求其名譽污吾犢口牽犢上流而飲之又有許由廟碑關朱本作闕尚存是漢潁川太守朱寵所立潁水徑其北東與龍淵水合其水𨗳源龍淵東南流徑陽城北又東南入於潁潁水又東平洛溪水注之水發玉女臺下平洛澗世謂之平洛水吕忱所謂汋水出陽城山蓋斯水也又東南注於潁潁水又東出陽城關歷亭東南宋本作歷康城南魏明帝封尚書右僕射衛臻為康鄉侯此即臻封邑也又東南過陽翟縣北陽翟縣今為開封府鈞州潁水東南流徑陽關聚聚夾水相對俗謂之東西二土城也潁水又徑上棘城西又屈徑其城南春秋左傳襄公十八年楚師伐鄭城上棘以涉潁者也縣西有故堰堰石崩禠頽基尚存舊遏潁水枝流所出也其故瀆東南徑三封山今無水渠中又有泉流出焉時人謂之嵎水東徑三封山東東南歷大陵西連山亦曰啓筮亭啓享神於大陵之上即鈞臺也在今鈞州城北門外春秋左傳曰夏啓有鈞臺之饗是也杜預曰河南陽翟縣南有鈞臺其水又東南流水積為陂陂方十里俗謂之臺陂蓋指鈞臺取名也又西南流徑夏亭城西又屈而東南為郟之靡陂潁水自堨東徑陽翟縣故城北夏禹始封於此為夏國故武王至周曰吾其有夏之居乎遂營洛邑徐廣曰河南陽城陽翟則夏地也春秋經書秋鄭伯突入於櫟左傳桓公十五年突殺檀伯而居之服䖍曰檀伯鄭守櫟大夫櫟鄭之大都宋忠曰今陽翟也周未韓景侯自新鄭徙都之王隱曰翟本櫟也故潁川郡治也城西有郭奉孝碑水側有九山祠碑叢柏猶茂北枕川流也又東南過潁陽縣西故城在今登封縣西南八十里又東南過潁陰縣西南應劭曰縣在潁水之陽故邑氏之按東觀漢記漢封車騎將軍馮防為侯國防城門校尉位在九卿上絶席後漢馬援𫝊援次子防貴寵最盛與九卿絶席封潁陽侯今云馮防誤潁水又南徑潁鄉城西潁隂縣故城在東北舊許昌典農都尉治也後改為縣魏明帝封侍中辛毗為侯國也魏志辛毗封潁鄉侯潁水又東南徑柏祠曲東歷罡臺北陂陂水南流積為江陂南徑愼城西側城南流入於潁潁水又徑愼縣故城南縣故楚邑白公所居以拒吳春秋左傳哀公十六年吳人伐愼白公敗之王莽之愼治也世祖建武中封劉賜為侯國潁水又東南徑蜩蟟郭東俗謂之鄭城矣又東南入於淮春秋昭公十二年楚子狩于州來次子潁尾蓋潁水之㑹淮也又東南至愼縣東南入於淮愼縣故城在今鳯陽府潁州潁上縣西北潁水東南流左合上吳百尺二水俱承次塘細陂南流注於潁水潁水又東南江宋本作流陂水注之水受大漴朱本作崇丘城南故汾丘城也春秋左傳襄公十八年楚子庚治兵於汾司馬彪曰襄城縣有汾丘杜預曰在襄城縣之東北也襄城縣今屬開封府徑繁昌故縣北原本訛此繁昌城在今開封府臨潁縣城北曲蠡之繁陽亭也魏書國志曰文帝以漢獻帝延康元年行至曲蠡登按獻帝傳曰辛未魏王登壇受禪此漏壇受二字禪於此地改元黃初其年以潁隂之繁陽亭為繁昌縣城內有三臺時人謂之繁昌臺壇前有二碑昔魏文帝禪於此自壇而降曰舜禹之事吾知之矣故其石銘曰遂於繁昌築靈壇也於後其碑六字生金論者以為司馬金行故曹氏六世遷魏而事晉也魏志繁昌縣受禪石碑中生金表送上羣臣盡賀潁水又東南流徑青陵亭城北北對青陵陂陂縱廣二十里潁水徑其北枝入為陂陂西則漷水注之水出褒城縣疑作襄城縣若作褒城則屬陜西漢中府恐非潁水所徑之地也之邑城下東流注於陂陂水又東入臨潁縣之狼陂潁水又東南流而歷臨潁縣也臨潁縣今屬開封府又東南過臨潁縣南又東南徑汝南㶏強縣北洧水從河南密縣今屬開封府東流注之臨潁舊縣也潁水自縣西小㶏水出爾雅曰潁别為沙郭景純曰皆大水溢出别為小水之名也亦猶江别為沱也潁水又東南徑澤城北即古城臯亭矣春秋經書公及諸侯盟於臯鼬者也臯澤字相似名與字乖耳潁水又東徑㶏陽城南竹書紀年曰孫何取㶏陽㶏強城在東北潁水不得徑其北也潁水又東南潩水入焉非洧水也又東過西華縣北今屬開封府王莽更名之曰華望縣也有東故言西矣世祖光武皇帝建武中封鄧晨為侯國漢濟北戴封字平仲為西華令遇天旱慨治功無感乃積柴坐其上以自焚火起而天雨暴至逺近歡伏永元十三年徴太常也縣北有習陽城潁水徑其南也經所謂洧水流注之也又南過汝陽何氏云地理志作女縣北今屬開封府縣故城南有汝水枝流故縣得厥稱矣闞駰曰本汝水别流其後枯竭號曰死女水故其字無水余按汝女乃方俗之音故字隨讀改未必一如闞氏之說以窮通損字也潁水又東大㶏水注之又東南徑博陽縣城東城在南頓縣北四十里漢宣帝封邴吉為侯國王莽更名樂嘉又東南過南頓縣北今屬開封府項城縣㶏水從西來流注之㶏水於樂嘉縣入潁不至於頓頓故頓子國也周之同姓春秋僖公二十五年楚伐陳納頓子於頓是也俗謂之潁隂城非也潁水又東南徑陳縣南今為河南陳州又東南左㑹交口者也又東南至新陽縣北蒗蕩渠水從西北來注之經云蒗蕩渠者百尺溝之别名也南合交口新溝自是東出潁上有堰謂之新陽堰俗謂之山陽堨非也新溝自潁北東出縣在水北故應劭曰縣在新水之陽今縣故城在東明潁水不出其北蓋經誤耳潁水自東堰南流徑項縣故城北今為項城縣屬開封府春秋僖公十七年魯滅項是矣潁水又東右合谷水水上承平鄉諸陂東北徑南頓縣故城南側城東注春秋左傳所謂頓迫于陳而奔楚自頓徙南故曰南頓也今其城在頓南三十餘里又東徑項城中楚襄王所郭疑訛以為别都都內西南小城項縣故城也舊潁州治谷水徑小城北又東徑刺史賈逵祠北王隱言祠在城北非也廟在小城東昔王凌為宣王司馬懿所執届廟而嘆曰賈梁道王凌魏之忠臣唯汝有靈知之遂仰鴆而死魏志王凌進位太尉假節鉞謂齊王不任天位欲迎立楚王彪遣將軍楊𢎞以廢立事告兖州刺史黃華華私以白司馬宣王宣王將兵討之凌勢窮乘船自縛出迎宣王承詔送至京師凌至項飲藥死又干寶晉紀曰凌到項見賈逵祠呼曰賈梁道王凌固忠于魏之社稷者唯汝有神知之其年八月宣王有疾夢凌逵為癘遂薨廟前有碑碑石金生于寶曰黃金可採為晉中興之瑞王隱晉書云永嘉元年陳國項縣賈逵廟石碑生金人盜鑿取賣賣已復生此江東中興之瑞也谷水又東流出城東注潁潁水東側有公路城公路城有二一在鳯陽城東一在旴𣅿縣袁術所築也故世因以術字名城矣潁水又東徑監潁城北城臨水闕南面又東徑雲陽二城間南北翼水並非所具又東徑丘頭丘頭南枕水魏書郡國志曰宣王軍次邱頭按宣王討王凌文王討諸葛誕俱至丘頭然改丘頭為武丘乃文王時事今屬之宣王則以兩事并為一事矣事見魏志王淩傳及高貴鄉公紀王凌靣縛水次故號武邱矣潁水又東南流於故城北細水注之水上承陽都陵宋本作阪陂水枝分東南出為細水東徑新陽縣故城北又東南徑宋公縣故城北縣郪丘者也秦伐魏取郪丘謂是邑矣郪丘去潁州治八里漢置新郪縣屬汝南郡今呼為潁陽城漢成帝綏和元年詔封殷後於沛以存三統平帝元始四年改曰宋公章帝建初四年徙邑於此故號新郪為宋公國也王莽之新延矣細水又南徑細陽縣今潁州太和縣新溝注之新溝首受交口東北徑新陽縣故城南漢高帝六年封吕清為侯國王莽更名曰新明也故應劭曰縣在新水之陽今無水故渠舊道而已東入澤渚而散流入細細水又東南徑細陽故城南在今潁州西北四十里王莽更之曰樂慶也世祖建武中封岑彭子遵為侯國細水之宋本作又東南積而為陂謂之次塘公私列宋本作𢎞裂以供田溉又東南流屈而西南入潁地理志曰細水出細陽縣東南入潁潁水又東南流徑胡城東故胡子國也春秋定公十五年楚滅胡以胡子豹歸是也杜預釋地曰汝隂縣西地有胡城也在今潁州城西北二里潁水又東南汝水枝津注之水上承汝水别瀆於竒額城東三十里世謂之大㶏水也東南徑召陵縣故城南春秋左傳僖公四年齊桓公師于召陵責楚貢不入即此處也城內有大井徑數丈水至清深闞駰曰召者高也其地邱墟井深數丈故以名焉又東南徑征羌縣故召陵縣之安陵鄉安陵亭也世祖建武十一年以封中郎將來歙歙以征定西羌功故更名征羌也闞駰引戰國䇿以為秦昭王欲易地謂此也汝水别瀆又東徑公路臺此下原本錯在又東南過潁陽縣注中今從朱本改正臨水方百步袁術所築也汝水别溝又東徑西門城即南利也漢書宣帝封廣陵厲王子劉昌為侯國也縣北三十里有孰疑訛城號曰北利故瀆出於二利之間關疑訛女陽之縣世名之死汝縣取水名故曰汝陽也又東徑南頓縣故城疑漏北字又東南徑鮦陽城北在今汝寧府新蔡縣界又東徑邸鄉城北又東徑固始縣今屬汝寧府故城北地理志縣故寖也寖丘在南故藉丘名縣矣王莽更名之曰治按漢志莽曰開治此漏開字孫叔敖以土浸薄取而為封故能綿嗣城北猶有叔敖碑建武二年司空李通又慕叔敖受邑故光武以嘉之更名固始别汝又東徑蔡岡北岡上有平陽侯相蔡昭冡昭字叔明周后稷之胄冡有石闕闕前有二碑碑字淪碎不可復識羊虎傾低殆存而已枝汝又東北流徑胡城南而東歷汝隂縣故城西北東入潁水潁水又東徑汝隂縣故城北史記高祖功臣侯者年表曰高祖六年封夏侯嬰為侯國王莽更名之曰汝墳也縣在汝水之隂故以汝水納稱城西有一城故陶丘鄉也汝隂何氏云隂疑作南郡汝疑作治城外東北隅有舊臺翼城若丘俗謂之女郎臺雖經頽毁猶自廣崇上有一井疑故陶丘鄉所未詳洧水出河南密縣今屬開封府均州西南馬領山明一統志洧水源出密縣東至新鄭縣㑹溱水為雙泊河至西華縣入黃河水出山下亦言出潁川陽城山山在陽城縣之東北蓋馬領之統目焉清水東南流徑一故臺南俗謂之陽子臺又東徑馬領塢北在山上塢下泉流北注亦謂洧别源也而入于洧水洧水東注綏水㑹焉水出方山綏溪即山海經所謂浮戲之山也東南流徑漢𢎞農太守張伯雅墓塋四周壘石為垣隅阿相降列於綏水之隂庚門表二石闕夾對石獸於闕下冡前有石廟列植三碑碑云德字伯雅河內密人也碑側樹兩石人有數石柱及諸石數疑訛當作獸矣舊引綏水南入塋域而為池沼沼在丑地皆蟾蜍吐水石湟承溜池之南又建石樓石廟前又翼列諸獸但物謝時淪凋毁殆盡矣富而非義北當作比之浮雲况復此乎王孫士安斯為逹矣漢書楊王孫傳王孫家業千金厚自奉養及病且終先令其子曰吾欲羸葬以反吾真必亡易吾意死則以布囊盛尸入地七尺既下從足引脫其囊以身親土晋書皇甫謐傳謐字士安自為葬送之制氣絶之後以蘧蒢褁尸麻約兩頭穿坑而葬不用棺槨綏水又東南流徑上郭亭南東南注洧洧水又東襄荷水注之水出北山子節溪亦謂之子節水東南流于洧洧水又東㑹瀝滴泉水出深溪之側泉流丈餘懸水散注故世士以瀝滴稱南流入洧水也又東南過其縣南洧水又東流南與承雲二水合俱出承雲山二源雙𨗳東南流注於洧世謂之東西承雲水洧水又東微水注之水出微山東北流入於洧洧水又東徑密縣故城南春秋謂之新城左傳僖公六年㑹諸侯伐鄭圍新密以鄭不時城也今縣城東門南側有漢密令卓茂祠茂字子康南陽苑人溫仁寬雅恭而有禮人有認其馬者茂與之曰若非公馬幸至丞相府歸我遂挽車而去後馬主得馬謝而還之任漢黃門郎遷密令舉善而徴宋本作教口無惡言教化大行道不拾遺蝗不入境百姓為之立祠享祀不輟矣洧水又左㑹璅泉水水出王亭西北流注於洧水洧水又東南與馬關水合水出王亭下東北流歷馬關謂之馬關水又東北注於洧洧水又東合武定水水出北武定岡西南流又屈而東南流徑零鳥塢西側塢東南流塢側有水懸流赴壑一匹有餘直注澗下淪積成淵嬉遊者矚望竒為佳觀俗人覩此水挂於塢側遂目之為零鳥水東南流入於洧洧水又東與虎牘山水合水發南山虎牘溪東北流入洧洧水又東南赤澗水注之水出武定岡東南流徑皇臺岡下又歷岡東東南流注於洧洧水又東南流潧水注之洧水又東南徑鄶城南世本曰陸終娶於鬼方氏之妹謂之女漬朱云今世本作陸終娶鬼方氏之妹謂之女嬇生子六人大戴禮帝繫篇作女隤宋本水經注作女潰是生六子孕三年啓其左脅三人出焉破其右脅三人出焉其四曰求言是謂之鄶鄶人者鄭是也鄭桓公問於史伯曰王室多難豫安逃死乎史伯曰虢鄶公之民遷之可也鄭氏東遷虢鄶獻十邑焉史記鄭世家桓公問太史伯曰王室多故豫安逃死乎太史伯對曰獨雒之東土河濟之南可居公曰何以對曰地近虢鄶虢鄶之君貪而好利百姓不附今公為司徒民皆愛公公誠請居之虢鄶之君見公方用事輕分公地公誠居之虢鄶之民皆公之民也桓公曰善于是卒言王東徙其民雒東而虢鄶果獻十邑劉􅐃云鄶在豫州外方之北北鄰於虢鄶熒朱本作滎之南左濟右洛居陽鄭兩水之間食溱洧焉徐廣曰鄶在密縣妘姓矣不得在外方之北也洧水又東徑隂坂北水有梁焉俗謂是濟為參辰口左傳襄公九年晉伐鄭濟于隂阪次于隂口而還是也杜預曰隂坂洧津也服䖍曰登南曰隂口者水口也參隂聲相近蓋傳呼之謬耳又晉居商參之分實沈之土鄭處辰火之野閼伯之地軍師所次故濟得其名也又東過鄭縣南鄫當作潧即鄭詩溱與洧之溱水從西北來注之明一統志溱水源出密縣一名潧水東北至新鄭縣與洧水合洧水又東徑新鄭故城中左傳襄公元年晉韓厥荀偃帥諸侯伐鄭入其郛敗其徒兵於洧上是也竹書紀年晉文侯二年同惠王子多父伐鄶克之按竹書紀年周幽王二年晉文侯同王子多父伐鄫克之注云晉文侯元年則二年乃幽王之二年非文侯二年也亦無惠字鄶作鄫乃居鄭父之丘名之曰鄭是曰桓公皇甫士安帝王世紀云或言縣故有態氏之墟黃帝之所都也鄭氏徙居之故曰新鄭矣城內有貴一作遺祠名曰章乘是也洧水又東為洧淵水春秋傳曰龍鬭于時門之外洧淵則此潭也今洧水自鄭城西北入而東南流徑鄭城南城之南門內舊外蛇與內蛇鬬內蛇死六年大夫傅瑕殺鄭子入厲公自是徴也原本訛微事在左傳莊十四年水南有鄭莊公望母臺莊姜惡公寤生與段京居段不弟姜氏無訓莊公居夫人於城潁誓曰不及黃泉無相見也故成臺以望母用伸在心之思感考叔之言欣大隧之賦泄泄之慈有嘉融融之孝得常矣洧水又東與黃水合經所謂潧水非也黃水出太山南黃泉東南流經華城西史伯謂鄭桓公曰華君之土也韋昭曰華國名矣史記秦昭王三十三年白起攻魏拔華陽走芒卯斬首十五萬司馬彪曰華陽亭名在密縣嵇叔夜常採藥於山澤學琴於古人即此亭也靈異志嵇中散嘗西南去洛數十里有亭名華陽投宿一更中操琴聞空中稱善中散呼與相見乃出見形以手持其頭共論音聲因授以廣陵散黃水東南流又與上水合水出兩塘中一源兩分泉流𣲖别東為七虎澗水西流即是水也其水西南流注於黃水黃即春秋之所謂黃崕也故杜預云苑陵縣西有黃水者也又東南流水側有二臺也謂之積粟臺臺東即二水之㑹也捕章山水注之水出東捕章山西流注於黃水黃水又南至鄭城北東轉於城之東北與黃溝合水出捕章山東南流至鄭城東北入黃水黃水又東南徑龍淵泉東南七里溝水注之水出隟侯亭東南平地東注又屈而南流徑升城東又其南歷燭城西即鄭大夫燭之武邑也又南流注于洧水也又東南過長社縣北洧水東南流南濮北濮二水入焉洧入又東南與龍淵水合水出長社縣西北有故溝上承洧水水盛則通注龍淵水減則津渠輟流其瀆中􅢘泉南注東轉為淵淥水平潭清潔澄深俯視游魚類若乘空矣所謂淵無潛鱗也又東徑長社縣故城北鄭之長葛邑也春秋隱公五年宋人伐鄭圍長葛是也後社樹暴長故曰長社魏潁川郡治也余以景明中出宰兹邑於南城西側修立客館版築既興於土下得一樹根甚壯大疑是故社怪長暴茂者也稽之故說縣無龍淵水名蓋出近世矣京相璠春秋土地名曰長社北界有禀水但是水𨗳於隍塹之中非北界之所謂又按京社地名並云長社縣北有長葛鄉斯乃縣徙于南矣然則是水即稟水也其水又東南徑棘城北左傳所謂楚子伐鄭救齊次于棘澤者也禀水又東左注洧水洧水又東南分為二水也其枝水東北流注沙一水東徑許昌縣故許南疑作男國也姜姓四嶽之後矣穆天子傳所謂天子見許男於洧上者也漢章帝建初四年更封馬光為侯國後漢書馬援傳建初四年封馬防潁陽侯馬光許昌侯春秋佐助期曰漢以許昌失天下及魏承漢厯遂改名許昌也城內有景福殿基魏明帝太和中造准價八百餘萬洧水又東入汶倉城內俗以是水為汶水故有汶倉之名非也蓋洧水之邸閣耳洧水又東徑傿陵縣故城南今屬開封府按漢志潁川郡傿陵縣莽曰左亭李竒曰六國為安陵李竒曰六國為安陵也昔秦求易地唐且受使於此戰國策秦王使人謂安陵君曰寡人欲以五百里之地易安陵安陵君使唐睢使于秦曰安陵君受地于先王而守之雖千里不敢易也秦王怒曰公亦嘗聞天子之怒乎伏尸百萬流血千里睢曰大王嘗聞布衣之怒乎夫專諸之刺王僚也彗星襲月聶政之刺韓傀也白虹貫日若士必怒伏尸二人流血五步天下縞素今日是也挺劍而起秦王色撓長跽而謝之漢高帝十二年封都尉朱濞為侯國王莽更名左亭洧水又東傿陵陂水注之水出傿陵南陂東西南流注於洧水也又東南過新汲縣東北洧水自傿陵東徑桐邱南俗謂之天井陵又曰岡非也洧水又屈而南流水上有梁謂之桐門橋蓋藉桐邱以取稱亦言取桐門亭而目焉然不知亭之所在未之詳也洧水又東南徑桐丘城春秋左傳莊公二十八年楚伐鄭鄭人將奔桐丘即此城也杜預春秋釋地曰潁川許昌城東北京相璠曰鄭地也今圖疑訛無而城見存西南去許昌故城可三十五里俗名之曰堤其城南即長堤因疑訛或當作固洧水之北防也西靣桐丘其城邪長而不方蓋慿丘之稱即城之名矣洧水又東徑新汲縣故城北漢宣帝神雀二年漢志作三年置於許之汲鄉曲洧城以河內有汲縣故加新也漢宣帝建初四年封執金吾馬光為侯國漢宣帝以下十六字疑屬衍文蓋馬光無新汲之封况已見前不應重出城在洧水南堤上又東洧水右迤為濩陂洧水又徑匡城南匡城在睢州城西三十里扶溝之匡亭也又東洧水左迤為鴨子陂也疑衍謂之大穴口也又東南過茅城邑之東北洧水自穴口東南徑洧陽城西南徑茅城東北又南左合庾溝溝水上承洧水於大穴口東北枝分東徑洧陽故城南俗謂之復陽城非也蓋洧復字類音讀變漢建安中封司空祭酒郭奉孝為侯國其水又東南為鴨子陂陂廣一十五里餘陂南入甲庾溝西注又朱云當作洧東北㵼沙洧水又南徑一故城西世謂之思鄉城西去洧十五里洧水又右合濩陂水上承洧水新汲縣南徑新汲故城東又南積而為陂陂之西北即長舍城陂水東翼洧堤西靣茅邑自城北門列築昆道迄於此岡世尚謂之茅岡即經所謂茅邑地也陂水北出東入洧津上下疑有訛西納北異流又東過習陽城西折入於潁洧水又東南徑辰亭東俗謂之田城非也蓋田辰聲相近城亭音韻聨故也經書魯宣公十一年楚子陳侯鄭伯盟于辰陵也京相璠曰潁川長平有故辰亭杜預曰長平縣東南有辰亭今此城在長平城西北長平城在東南城今在西華縣東北或杜氏之謬傳書之誤耳長平東南淋陂北畔有一阜東西减里南北五十許步俗謂之新亭臺又疑是杜氏所謂辰亭而未之詳也洧水又南徑長平縣故城西王莽之長正也洧水又南分為二水枝水東出謂之五梁溝徑習陽城北又東徑赭邱南丘上有故城郡國志曰長平故屬汝南縣有赭丘城即此城也又東徑長平城南東注潦陂洧水南出謂之雞籠水故水會有籠口之名矣洧水又東徑習陽城西西南折入潁地理志曰洧水東南至長平縣入潁者也潩水出河南密縣大騩山明一統志潩水源出大騩山名魯固河一名清流河東南徑長葛縣西又東至臨潁縣入潁水大騩即具茨山也黃帝登具茨之山升於洪堤上受神芝圗於黃蓋童子即是山也抱朴子云黃帝東到青丘見紫府先生受三皇內文以敕召萬神西見中黃子受九加之方北到洪堤上具茨見大騩君黃蓋童子受神芝圗還陟王屋得神丹金訣溪水疑作潩水出其阿而流為陂俗謂之玉女池東徑陘山北史記魏襄王六年敗楚於陘山者也山上有鄭祭仲冡冡西有子産墓纍石為方墳墳東有廟並東北向鄭城杜元凱言不忘本際廟舊有一枯柏樹其塵根故枝之上多生雉疑作稚柏列秀青青望之竒可嘉矣潩水又東南徑長社林疑訛當作故城西北南濮北濮二水出焉劉澄之著永初記云水經濮水源出大騩山東北流注泗衛靈聞音於水上殊為乖矣韓非子云衛靈公至濮聞新聲使師涓寫之至晉而奏之師曠曰此紂時所謂靡靡之樂乃亡國之聲也余按水經為潩水不為濮也是水首受溪水疑作潩水川渠雙引俱東注洧與之過沙枝流脉亂互得通稱是以春秋昭公九年遷城父人於陳以夷濮西田益之京相璠云以夷之濮西田益也杜預亦言以夷田在濮水西者與城父人服䖍曰濮水名也且字類音同津瀾邈别不得為北濮上源師氏傳音於其上矣潩水又南徑鍾亭西又南徑皇臺又東南徑關亭西又東南徑宛亭西鄭大夫宛射犬之故邑也潩水又南分二水一水南出徑胡城東故潁隂縣之狐人亭也其水南結為陂謂之胡城陂潩水自枝渠東徑曲強東皇陂水注之水出西北皇臺七女岡北皇陂即古長社縣之濁澤史記魏惠王元年韓懿侯與趙成侯合軍伐魏戰於濁澤是也其陂水北對雞鳴城即是是字訛應作長社縣之濁城也陂水東南流徑胡泉城北故潁隂縣之狐宗鄉也又東合狐城陂水水上承陂水而東南流注于黃水謂之合作口而東徑曲強城北東流入潩水時人謂之勑水非也勑潩音相類故字從聲變耳渭當作潩水又東徑武亭間兩城相對疑是古之岑門史遷所謂走犀首于岑門者也徐廣曰潁隂有岑亭未知是否後漢郡國志潁隂有岸亭史記魏世家哀王五年走犀首岸門徐廣曰潁隂有岸亭正義曰括地志云岸門在長社縣西北十八里今名西武亭此云岑門岑亭皆誤潩水又南徑射犬城東即鄭公孫射犬城也蓋俗謬耳潩水又南徑潁隂縣故城西魏明帝封司空陳羣為侯國潩水又東徑許昌城南又東南與宣帝陂按下文當作宣梁陂水合陂上承狼陂於潁隂城西南陂南北二十里東西十里春秋左傳曰楚子伐鄭師于狼是也其水東南入許昌縣徑巨陵城北鄭地也春秋左傳莊公十四年鄭厲公獲𫝊瑕於大陵京相璠曰潁川臨潁縣東北二十五里有故巨陵亭古大陵也其水又東積而為陂謂之宣梁陂也陂水又東南入潩水潩水又西南流徑陶城西又東南徑陶陂東東南入于潁此句原本另行作經文今改作此節注潧水出鄭縣西北平地潧水出潧城西北雞絡塢下東南流徑賈復城西今南陽府汝州東南一百里有賈復城但與鄭縣相去甚逺恐非此城東南流左右疑作合􅢘水水出賈復城東南流注于潧潧水又南左㑹承雲山水水出西北承雲山東南厯渾于江宋本作渾子岡東注世謂岡宋本作峽為五鳴口東南流注于潧潧水又東南流厯下田川徑鄶城西謂之為桞泉水也故史伯答桓公曰君以成周之衆奉辭伐罪若剋虢鄶君之土也如前華後河右洛左濟王丕騩而食潧洧鄭語作主芣騩而食溱洧韋昭云芣騩山名在密縣循典刑以守之可以少固即謂此矣潧水又南懸流奔壑崩注丈餘其下積水成潭廣四十許步淵深難測又南注于洧詩所謂溱與洧者也世所謂之為潧水也東過其縣北又東南過其縣東又南入于洧水自鄶潧東南更無别瀆不得徑新鄭而㑹洧也鄭城東入洧者黃崕水也蓋經誤證耳渠出榮陽北河東南過中牟縣之北今屬開封府風俗通曰渠者水所居也渠水自河與泲亂流東滎疑訛澤北東南分泲歷中牟縣之圃田澤北與陽武分水澤多麻黃草故述征記曰踐縣境便覩斯卉窮則知踰界今雖不能然諒亦非謬詩所謂東有圃草也皇武子曰鄭之有原圃猶秦之有具囿澤在中牟縣西西限長城東極官渡北佩渠水東西四十許里南北二百許里中有沙岡上下二十四浦津流徑通淵潭相接各有名焉有大斬小斬大灰小灰義魯練秋大白楊小白楊散嚇禹中牟圈大鵠龍澤鬯罷大哀小哀大長小長大縮小縮伯丘大蓋牛眠等浦上云二十四浦而浦名僅二十三按太平御覽引此注大鵠下尚有小鵠此遺去故止二十三耳又大斬小斬作大漸小漸禹中作禺中鬯罷作密罷牛眠作牛眼俱與此異水盛則北注渠溢則南播故竹書紀年梁惠成王十年入河水于甫田又為大溝而引圃水者也又有一瀆自酸棗受河道自漢瀆歷酸棗徑陽武縣南出世謂之十字溝而屬於渠或謂是瀆為梁惠王十年所開而不能詳也斯浦乃水澤之所鍾為鄭隰之淵藪矣渠右合五池溝上承澤水下流渠謂之五池口魏嘉平二年司馬懿帥中軍討太尉王凌於夀春自彼而還帝使侍中韋誕勞軍于五池者也今其地為五池鄉矣渠又東不家溝宋本作十家溝水注之出京縣東南梅山北溪春秋襄公十八年蒍子馮公子格率鋭師侵費右回梅山杜預曰在密東北即是山也其水自溪東北流徑管城西故管國也周武以封管叔矣成王幼弱周公攝政管叔流言曰公將不利於孺子公賦鴟梟以伐之即東山之詩是也左傳宣公十二年晉師救鄭楚次管以待之杜預曰京縣東北有管城者是也俗又謂之為管水東北分為二水一水東北流注黃雀溝謂之黃淵淵周一百步其一水東越長城東北流水積為淵南北二里東西百步謂之百尺水北入圃田澤分為二水一水東北徑東武強城北漢書曹參傳擊羽嬰於昆陽追至業按傳當作葉注葉南陽縣也音式陟反還攻武強因至滎陽薛瓉云按武強城在陽武縣即斯城也漢高帝六年封騎將莊不識為侯國又東北流左注于渠為不宋本作十下同家水口也一水東流又屈而南轉東南注白溝也渠又東清池水注之清池水出清陽亭西南平地東北流徑清陽亭南東流即故清人城也詩所謂清人在彭彭為高尅邑也故杜預春秋釋地云中牟縣西有清陽亭是也清水又屈而北流至清口澤七虎澗水注之水出畢城南岡一源兩派津川趣别西入黃崕溝東為七虎溪亦謂之為華水也又東北流紫光溝水注之水出華陽城東北而東流俗名曰紫光澗又東北注華水華水又東徑棐城北即北林亭也春秋文公與鄭伯宴于棐林子家賦鴻鴈者也春秋宣公元年諸侯㑹于棐林以伐鄭楚救鄭遇於北林服䖍曰北林鄭南地也京相璠曰今滎陽宛陵縣有故林鄉在新鄭北故曰北林也余按林鄉故城在新鄭東北七十許里菀陵故城在東南五十許里不得在新鄭北也考京服之說並為踈矣杜預云滎陽中牟縣西南有林亭在鄭北今是亭南去新鄭故城四十許里蓋以南有林鄉亭故杜預據是為北林最為密矣又以林鄉為棐亦或疑焉諸侯㑹棐楚遇于此寧得知不在是而更指他處也稽古之傳事或不謬矣又東北徑鹿臺南岡北出為七虎澗東流期水注之水出期城西南平地世號龍淵水東北流又北徑期城西又北與七虎澗合謂之虎溪水亂流東注徑期城北東㑹清口水司馬彪郡國志曰中牟有清口水即是水也清水又東北白溝水注之水有二源北水出密之梅山東南而東徑靖城南與南水合水南出合太山宋本作南水屈合太水西北流至靖城南左注北水即承水也山海經曰承水出太山之隂東北流注于沒水者也世所謂之靖澗水也又東北流太水注之水出太山東平地山海經曰太水出于太山之陽而東南流注于沒水世謂之澧水也東北徑武陵城西東北流注于承水又東北入黃瓮澗北徑中陽城西城內有舊臺甚秀臺側有陂池池水清深澗水又東屈徑其城北竹書紀年梁惠成王十七年鄭釐侯來朝中陽者也其水東北流為白溝又北東徑伯禽城北蓋伯禽之魯往徑所由也屈而南流東注于清水即潘嶽都碑所謂自中牟故縣以西西至于清溝指是水也亂流東徑中牟宰魯恭祠南漢和帝時右扶風魯恭字仲康以太尉掾遷中牟令政專德化不任刑罰吏民敬信蝗不入境河南尹袁安疑不實使部掾肥親按行之恭隨親行阡陌坐桑樹下雉止其傍有小兒親曰兒何不擊雉曰將雛親起曰蟲不入境一異化及鳥獸二異竪子懷仁三異久留非優賢請還是年嘉禾生縣庭安美其治以狀上之徴博士侍中車駕每出恭常陪乘上顧問民政無所隱諱故能遺愛自古祠饗來今矣清溝水又東北徑沈清疑即博浪亭也博浪城在今開封府城北三十里一名博浪沙亭服䖍曰博浪陽武二水沙名也今有亭所未詳也歷博浪澤昔張良為韓報仇於秦以金椎擊秦始皇不中中其副車於此又北分為二水枝津東注沒水清水自枝流北注渠謂之清溝口渠又左徑陽武縣故城南東為官渡水又徑曹太祖壘北有高臺謂之官渡臺渡在中牟故世又謂中牟臺建安五年太祖營官渡袁紹保陽武紹連營稍前依沙堆為屯東西數十里公亦分營相禦合戰不利紹進臨官渡起土山地道以逼壘公亦起高臺以捍之即中牟臺也今臺北土山猶在山之東悉紹舊營遺壘並存水又東徑田豐祠北袁夲初慙不納其言害之時人嘉其誠謀無辜見戮故立祠於是用表袁氏覆滅之宜矣又東役水注之水出菀原本訛苑陵縣西隟侯按郡國志河南菀陵縣有瑣侯亭左傳襄十一年諸侯之師次于瑣杜預曰縣西有瑣侯亭此云隟侯疑誤蓋隟乃古文隙字與瑣不通惟韵㑹云瑣或作璅則隟或璅之訛但下文云隙郤聲相近則原作隙字用與左傳注及郡國志俱不合實所末解亭東世謂此亭為却城非也蓋隟却疑作郤上同聲相近耳中平陂世名之埿泉也即古役水矣山海經曰役山役水所出北流注于河疑是水也東北流徑菀陵縣故城北東流北徑焦城東陽邱亭西也謂之焦溝水竹書紀年梁惠成王十六年秦公孫壯武按竹書當作伐鄭圍焦城不剋即此城也俗謂之驛城非也役水自陽邱亭東流徑山氏城北為高榆淵竹書紀年梁惠成王十六年秦公孫壯率師城上枳安陵山氏按竹書當作民者也又東北為酢溝又東北魯溝水出焉役水又東北埿溝水出焉又東北為八丈溝又東清水枝津注之水自沈城東派注于役水又東徑曹公壘南東與沫水合山海經云沫水所出北流注于役山海經作末山末水出焉北流注于沒郭注云水經注作沫今是水出中牟城西南疑即沫水也東北流徑中牟縣故城昔趙獻侯自耿都此班固云趙自邯鄲徙焉趙襄子時佛肸以中牟叛置鼎於庭不與己者烹之田英將蹇裳赴鼎處也說苑云佛肸以中牟畔曰與我者受邑不與我者烹之城北餘子田基獨後至曰義者軒冕在前非義弗乘祛衣將入鼎佛肸屢起而生之趙簡子屠中牟諭有功者用田基為首基曰亷士不恥人我如受功則中牟之士終身慚矣負其母南徙于楚新序作田卑此作田英未知孰是薛瓉注漢書云中牟在春秋之時為鄭之堰也及三卿分晉則在魏之邦土趙自漳北不及此也春秋傳曰衛侯如晉過中牟非衛適晉之次也汲郡古文曰齊師伐趙東鄙圍中牟此中牟不在趙之東也按中牟當在濕水之上矣按春秋齊伐晉夷儀晉車千乘在中牟衛侯過中牟中牟人欲伐之衛禇師固亡在中牟曰衛雖小其君在未可勝也齊師尅城而驕遇之必敗乃敗齊師服䖍不列中牟所在杜預曰今滎陽有中牟回逺疑為非也然地理參差土無常域隨其強弱自相吞并疆理留移寧可一也兵車所指徑紆難知自魏徙大梁趙以中牟易魏故趙之南界極于浮水匪直專漳朱本作張也趙自西取後止中牟齊師伐其東鄙於宜無嫌而瓉徑濕水空言中牟所在非論證也漢高帝十一年按史表是十二年封封單父聖為侯國沫水又東北注于役水昔魏太祖之背董卓也間行出中牟為亭長所録魏志董卓廢帝京都大亂卓表太祖為驍騎校尉太祖乃變易姓名間行東歸過中牟為亭長所執詣縣邑中或竊識之為請得解郭長公世語為縣所拘功曹請釋焉役水又東北徑中牟澤即鄭太叔攻萑蒲之盜於是澤也左傳昭二十一年鄭太叔為政不忍猛而寬鄭國多盜取人于萑苻之澤太叔悔之興徒兵以攻萑苻之盜盡殺之其水東流北屈注渠水征績記朱云征當作伍伍績之有述征記所謂自醬魁城到酢溝十里者渠水又東流而左㑹淵流其水上承聖女陂陂周二百餘步水無耗竭湛然清滿而南流注于渠渠水又東南而注大梁也又東至浚儀縣今為開封府祥符縣河南布政司治水東南徑西赤城北戴延之所謂西北有大梁亭非也竹書紀年梁惠成王二十八年穰庇率師及鄭孔夜戰于梁赫鄭師敗逋即此城也左則故瀆出焉秦始皇二十年王賁斷故渠引水東南出以灌大梁謂之梁溝又東徑大梁城南本春秋之陽武高陽鄉也於戰國為大梁周梁伯之居也梁伯好土功大其城號曰新里民疲而潰秦遂取焉後魏惠王自安邑徙都之故曰梁耳竹書紀年梁惠成王六年四月甲寅徙邦于大梁是也秦滅魏以為縣漢文帝封孝王於梁孝王以土地下濕東都睢陽又改曰梁自是置縣以大梁城廣居其東城夷門之東夷門即侯嬴抱關處也續述征記曰以此城為師曠城言郭緣生曽逰此邑踐夷門升吹臺終古之跡緬焉盡在余謂此乃梁氏之臺門魏惠之朝居疑當作所居非吹臺也當是誤證耳西征記論儀封人即此縣又非也竹書紀年梁惠成王三十一年三月為大溝於北郛以行圃田之水陳留風俗傳曰縣北有浚水像而儀之故曰俊儀余謂故汴涉疑當作汴沙隂溝矣浚之故曰浚其猶春秋之浚洙漢氏之儀水又東北徑中牟縣南又東北徑中牟澤與淵水合水出中牟縣城北城有層臺按郭頒何氏校當作郭長公世語及干寶晉紀並言中牟縣故魏任城王臺下池中有漢時鐵錐長六尺入地三尺頭西南指不可動止疑有訛脫一作至月朔自正以為晉氏中興之瑞而今不知所在或言在中陽城池臺未知焉是淵水自池西出屈徑其城西而東南流注于汜泛水又東徑大梁亭南又東徑梁臺南東注渠渠水又東南流徑開封縣睢渙二水出焉右則新溝注之其水出逢池蓬池在今開封府城北本春秋時蓬澤左傳宋景公使人告左師曰蓬澤有介麋焉吾與之田若何徐廣曰蓬澤即蓬池也又晉阮籍詩云徘徊蓬池上還望顧大梁唐明皇帝改為福源池禁樵採池上承役水于菀陵縣别為魯溝水東南流徑開封縣故城北漢高帝十一年封劉舍為侯國也按史表高帝十一年封陶舍為開封侯今云劉舍誤陳留志稱阮蘭字茂𢎞為開封令縣側有劫賊外白甚急數阮方圍棊長嘯吏云劫急阮曰局上有劫亦甚急其耽樂如是故語林曰王中郎以圍棊為坐隱或亦謂之為手談又謂之為棊聖魯溝南際富城東南入百尺陂即古之逢澤也徐廣史記音義云秦孝公㑹諸侯于逢澤陂陂汲郡墓按史記秦本紀孝公二十年使公子少官率師㑹諸侯于蓬澤徐廣曰開封東北有蓬澤秦孝公句乃史記原文非徐廣音義且增一陂字又陂汲郡墓四字亦與上文不接疑有訛誤竹書紀年作逢澤斯其處也故應德璉西征賦曰鸞衡東指弭節逢澤其水東北流為新溝新溝又東北流徑牛首鄉北謂之牛建城又東北注梁一作渠即沙水也音蔡許愼正作沙音言水散石也從水少水沙見矣楚東有沙水謂此水也無他也皆變名矣其國多池沼時池中出神劍到今其民像而作之號大梁氏之劍也渠又北屈分為二水續述征記曰汴沙到浚儀而分也汴東注沙南流其水更南流徑梁王吹臺東陳留風俗傳曰縣有倉頡師曠城上有列仙之吹臺北有牧澤中出蘭蒲土多俊髦襟𢃄牧澤方一十五里俗謂之蒲關澤即謂此矣梁王增築以為吹臺城隍夷滅略存故跡今層臺孤立於牧澤之右矣其臺方一百許步即阮嗣宗詠懷詩所謂駕言發魏都南向望吹臺簫管有遺音梁主安在哉晉世喪亂乞活慿居削墮故基遂成二層上基猶方四五十步高一丈餘世謂之乞活臺又謂之婆臺城梁水於此有隂溝洪溝之稱焉項羽與漢高分王指是水以為東西之别故蘇秦說魏襄王曰大王之地南有鴻溝是也故尉氏縣有波鄉亭波亭鴻溝鄉鴻溝亭皆藉水以立稱也今蕭縣原本訛作簫縣今為江南徐州治西亦有鴻溝亭梁國睢陽縣今為歸德府治東有鴻口亭先後談者亦指此以為楚漢之分王非也蓋春秋之所謂紅澤者矣渠口與汜水合其水上承役水於菀陵縣縣故鄭都也王莽之左亭縣也役水枝津東派為汜水者也而世俗謂之泥溝水也朱本作汜溝水春秋左傳僖公三十年晉侯秦伯圍鄭晉軍函陵秦軍汜南所謂東汜者也又屈南至扶溝縣北今屬開封府及通許縣洧川縣地沙水又東南徑牛首鄉東南魯渠水出焉亦謂之宋溝也又徑陳留縣故城南孟康曰留鄭邑也後為陳并故曰陳留矣魯溝又東南徑圉縣故城北縣苦楚難修其干戈以圉其患故曰圉也或曰邊陲之號矣歷萬人散王莽之篡也東郡太守翟義興兵討莽莽遣奮威將軍孫建擊之於圉北義師大敗尸積萬數血流溢道號其處為萬人散百姓哀而祠之又厯魯溝亭又東南至陽夏縣故城西漢高祖六年封陳豨為侯國魯溝又南入渦今無水也沙水又東南徑斗城西左傳襄公三十年子産殯伯有尸其臣葬之於是城也左傳襄公三十年鄭伯有耆酒為窟室而夜飲酒擊鐘焉朝至未已朝者曰公焉在其人曰吾公在壑谷皆自朝布路而罷子晢以駟氏之甲伐而焚之伯有奔雍梁醒而後知之遂奔許已而自墓門之瀆入因馬師頡介于襄庫以伐舊北門駟帶率國人以伐之伯有死于羊肆子産禭之枕之股而哭諸斂而殯諸伯有之臣在市側者既而葬之斗城沙水又東南徑牛首亭東左傳桓公十四年宋人與諸侯伐鄭東郊取牛首者也俗謂之車牛城矣沙水又東南八里溝出焉又東南徑陳留縣今屬開封府裘氏鄉裘氏亭西又徑淡臺子羽冢東與八里溝合按陳留風俗傳曰陳留縣裘氏鄉有淡臺子羽冢又有子羽祠祈禱焉京相璠曰今泰山南武城縣有淡臺子羽冢縣人也未知孰是因其方志所叙就記纒絡焉溝水上承沙河而西南流徑牛首亭南與百尺陂水合其水自陂南徑開封城東三里岡左屈而西流南轉注八里溝又南得野兔水口水上承西南兔氏亭北野兔陂鄭地也春秋傳云鄭伯勞屈生于兔氏也陂水東北入八里溝八里溝水又南徑右倉城西又南徑兔氏亭東又南徑邵亭西東入沙水沙水南徑扶溝縣故城東縣即潁川之數宋本作穀平鄉也有扶亭又有洧水溝故縣有扶溝之名焉建武元年漢光武封平狄將軍朱鮪為侯國沙水又東與康溝水合水首受洧水於長社縣東東北徑向岡西即鄭之向鄉也後人遏其上口今水盛則北注水耗則輟流又有長明溝水注之水出菀陵縣故城西北縣有二城此則西城也二城以東悉多陂澤即古制澤也京相璠曰鄭地杜預曰澤即滎陽菀陵縣東即春秋之制田也故城西北平地出泉謂之龍淵泉淵水流徑陵丘亭西又西重泉水注之水出西城北平地泉湧南流徑陵丘亭西西南注龍淵水龍淵水又東南徑凡陽亭西而南入白鴈陂陂在長社東北東西七里南北十里在林鄉之西南司馬彪郡國志曰菀陵有林鄉亭白鴈陂又引瀆南流謂之長明溝東轉北屈又東徑向城北城側向岡左傳襄公十一年諸侯伐鄭師于向者也又東右迤為染二陂朱云染二疑作染工宋本作染澤而東注于蔡澤陂長明溝又東徑尉氏縣今屬開封府故城南圈稱云尉氏鄭國之東鄙弊獄官名也鄭大夫尉氏之邑朱云弊獄謂斷獄也見周禮秋官注應劭曰古獄官曰尉氏鄭之别獄也故欒盈曰盈將歸死于尉氏也溝瀆自是三分北分為康溝東徑平陸縣故城北高后元年按史記表是景帝元年封封楚元王子禮為侯國建武元年以戶不滿三千罷為尉氏縣之陵樹鄉又有陵樹亭漢建安中封尚書荀攸為陵樹鄉侯按魏志荀攸傳作陵樹亭侯故陳留風俗傳曰陵樹鄉故平陸縣也北有天當作大澤名曰長樂厩康溝又東徑扶溝縣之白亭北陳留風俗𫝊曰扶溝縣有帛鄉帛亭名在七鄉十二亭中康溝又東徑少曲亭陳留風俗傳曰尉氏縣有少世疑作曲亭俗謂之為小城也又東南徑扶溝縣故城東而東南注沙水沙水又南㑹南水其水南流又分為二水一水南合關亭東又東南流與左水合其水自枝瀆南徑召陵亭西疑即扶溝之亭也而東南合石水世以是水與傿陵陂水雙𨗳亦謂之雙溝又東南入沙水沙水南與蔡澤陂水合水出􅋣陵前漢地志作傿陵後漢郡國志作􅋣陵春秋成公十六年晉楚相遇于􅋣陵吕錡射中共王目王召養由基使射殺之亦子反醉酒自斃處也陂東西五里南北十里陂水東徑匡城北城在新汲縣之東北即扶溝縣之巨疑作匡亭也亭在匡城郭朱本作郭宋本作鄉春秋文公元年諸侯朝晉衛成公不朝使孔逹侵鄭伐綿訾及匡即此邑也今陳留長垣縣今屬開州南有匡城即平邱之匡亭也襄邑又有承匡城然匡居陳衛之間亦往往有異邑矣陂水又東南至扶洛宋本作扶溝城北又東南入沙水沙水又南徑小扶城西而流也城即扶溝縣之平周亭東漢順帝永平中永平乃明帝年號非順帝也封陳敬王孫子恭為侯國按後漢書明帝八王傳陳敬王美永平三年封廣平王立三十七年薨子鈎嗣立二十一年薨子竦嗣立二年薨無子立絶安帝永初七年封敬王孫安國為耕亭侯傳所載止此則敬王之孫無名子恭者不知此何據耶沙水又東南徑大扶城西城即扶鄉故縣也城北二里有袁梁碑云梁陳扶樂人後漢世祖建武十七年更封劉隆為扶樂侯即此城也渦水於是分焉不得在扶溝北便分為二水也其一者東南過陳縣也疑作北沙水又東南徑東華城西又東西宋本作南沙水枝瀆西南逹洧謂之甲更溝宋本作甲庚溝今無水沙水又南與廣漕渠合上承龐官陂云鄧艾所開也雖水流廢興溝瀆尚夥昔賈逵為魏豫州刺史通運渠二百里餘亦所謂賈侯渠也而川渠徑復交錯畛陌無以辨之沙水又東徑長平縣今省入西華縣故城北又東南徑陳城北故陳國也伏羲神農並都之城東北三十許里猶有羲神實中此句疑有訛誤舜後媯滿為周陶正武王賴其器用妻以元女大姬而封諸陳以備三恪大姫好祭祀故詩所謂坎其擊鼓宛丘之下也宛丘在陳城南道東王隱云漸欲平今不知所在矣楚討陳殺夏徴舒於栗門以為夏州後城之東門內有池池水東西七十步南北八十許步水至清潔而不耗竭不生魚草水中有故臺處詩所謂東門之池也城內有漢相王君造四縣邸碑文字剝缺不可悉識其略曰唯兹陳國故曰淮陽郡云云王清惠著聞為百姓畏愛求賢養士千有餘人賜與田宅更舍自損奉錢助之成邸五官掾西華陳騏等二百五人以延熹二年云云故其頌曰修德立功四縣回附一作向附一作內附今碑之左右遺墉尚存基礎猶在時人不復尋其碑證云孔子廟學非也後楚襄王為秦所滅徙都於此文潁曰西楚矣三楚斯其一焉城南郭裏又有一城名曰淮陽城子産所置也漢髙帝十一年以為淮陽國王莽更名新平縣曰陵陳漢志作陳陵故豫州治王隱晉書地道記云城北有故沙名之為死沙而今水流津通漕運所由矣沙水又東而南屈徑陳城東謂之百尺溝又南分為二水沙水出焉溝水東南流谷水注之水源上承潦陂陂在陳城西北南暨華城皆為陂矣陂水東流謂之谷水東徑潦城北王隱曰犖北有谷水是也犖即柳矣經書公㑹齊宋于柳者也杜預曰柳即犖也在陳縣今為陳州屬開封府西北為非柳小城也在陳郡西南谷水又東流徑陳城南又東流入于沙沙水又東南流注于潁謂之交口水次有大堰即古百尺堰也魏書國志曰司馬宣王討太尉王凌大軍至百尺堨即此堨也今俗呼之為山陽堰非也蓋斯水首受潁於百尺溝王莽名郡為新平故堰兼有新陽之名也以是推之悟故俗謂之非也又東南至汝南新陽縣北沙水自百尺溝東徑寧平縣之故城南晉陽秋稱晉太傅東海王越之東奔也石勒追之憤疑訛當作燌即焚字尸於此數十萬衆斂手受害勒縱騎圍射尸積如山王夷甫死焉余謂俊者所以知勝羣情辨者所以文身祛惑夷甫雖體荷雋令口擅雌黃汙辱君親獲罪羯勒史官方之舉正諒為褒矣沙水又東積而為陂謂之陽都明水注之水上承沙水之津東出徑汝南郡之冝祿縣故城北王莽之賞都亭也明水又東流北注于陂陂水東南流謂之細水又東徑新陽縣北又東高被水東出焉沙水又東分為二水即春秋所謂夷夷濮之水也枝津北徑譙縣故城南今為鳯陽府亳州側城入渦沙水東南徑城父縣西南枝津出焉俗謂之章水也一水東注即注水也俗謂之缺水也東徑城父縣之故城南在今鳯陽府亳縣東南七十里又東南過山桑縣北今鳯陽府䝉城縣山桑故城在渦水北沙水不得徑其北明矣經言過北誤也又東南過龍亢縣南今鳯陽府懷逺縣西北八十里有龍亢故城又河南歸德府亦有龍亢故城沙水故城北又東南徑白鹿城北而東注也又東南過義城縣西廢義成縣在今鳯陽府霍邱縣北四十里南入于淮義成縣故屬沛後𨽻九江沙水東流注于淮謂之沙汭京相璠曰楚東地也春秋左傳昭公二十七年楚令尹子常以舟師及沙汭而還杜預曰沙水名也水經注集釋訂訛卷二十二
