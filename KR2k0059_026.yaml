body:
  text: 水經注集釋訂訛卷二十六歸安沈炳巽撰沭水巨洋水淄水汶水濰水膠水沭水出琅耶東莞縣西北山漢志作術水琅邪郡東莞縣術水南至下邳入泗過郡三行七百一十里青州寖師古曰術水即沭水也明一統志沭水源出沂山流經沂水縣東北達莒州界入沂州大棄山當作大辨山明一統志大辨山在沂水縣西北一百九十里與小太山連麓而異名也引控衆流積以成川東南流徑邳鄉南南去縣八十許里城有三靣而不周於南故俗謂之半城沭水又東南流左右疑作合峴水水出大峴山在臨朐縣東南一百五里劉宋武帝伐南燕渡大峴即此東南流徑邳鄉東東南流注原本訛汪于沭水也東南過其縣東沭水左與箕山之水合水出東疑衍諸縣今為諸城縣屬青州西箕山劉澄之以為許由之所隱也更為巨謬矣其水西南流注于沭水也又東南過莒縣東今為莒州屬青州府地理志曰莒子之國盈姓也少昊後列女傳曰齊人杞梁殖襲莒戰死其妻將赴之道逢齊莊公公將弔之杞梁妻曰如殖有罪君何辱命焉如殖無罪有先人之弊廬在下妾不敢與郊弔公旋車弔諸室妻乃哭於城下七日而城崩列女傳云齊莊公襲莒杞梁殖戰而死莊公歸遇其妻使弔于路杞梁妻曰有先人之敝廬在莊公乃還車詣其室成禮然後去故琴操云殖死妻援琴作歌曰樂莫樂兮新相知悲莫悲兮生别離哀感皇天城為之墜即是城也其城三重並悉崇峻唯南開一門內城方十二里郭周四十許里尸子曰莒君好鬼巫而國亡無知之難小白奔焉樂毅攻齊守嶮全國秦始皇縣之漢興以為城陽國封朱虛侯章治莒王莽之莒陵也光武合城陽國為琅耶國以封皇子京雅好宮室窮極伎巧壁帶飭以金銀明帝時京不安莒移治閭陽矣後漢書作章帝時又云移治開陽沭水又南表公水朱本云當作袁公水東出清山尋坤維而注沭沭水又南潯水注之水出於巨公之山西南流舊堨以溉渚田東西二十里南北十五里潯水又西南流入沭沭水原本漏又南與葛陂水會水發三注何氏云注疑作柱山西南流徑辟城南世謂之辟陽城史記建元以來王子侯者年表曰漢武帝元符二年漢無元符當作元朔漢表元朔二年封城陽共王子壯為壁侯諡曰節封城陽共王子節侯劉壯為侯國也其水於邑積以為陂謂之辟陽湖西南流注于沭水也又南過陽都縣東入于沂沂水縣西南有陽都故城齊乘曰水出沂山東麓傅履重水利論曰沇水泛濫奔潰淤沙彌望竭力修築隨復淤塞沭水自陽都縣又南會武陽溝水水東出倉山山上有故城世謂之監官城非也即古有利城矣漢武帝元朔四年封城陽共王子劉釘為侯國也其城因山為基水𨗳山下西北流謂之武陽溝又西至即丘縣注于沭沭水又南徑東海郡即丘縣故春秋之祝丘也桓公五年經書齊侯鄭伯如紀城祝丘左傳曰齊鄭朝紀欲襲之漢立為縣王莽更之就信也郡國志曰自東海分屬琅邪闞駰曰即祝魯之音蓋字承讀變矣沭水又南徑東海厚丘縣今為淮南府沐陽縣故城在縣北六十里王莽更之祝其亭也分為二瀆齊乘曰沭水自厚邱縣分為二今名南漣北漣也西南出今無水世謂之枯沭一瀆南徑建陵縣故城東故城在沭陽縣西北一百五里建陵山下漢景帝八年封石綰為侯國按漢表景帝六年封衛綰為建陵侯此云八年及石綰皆誤王莽更之曰付亭也沐水又南徑陵山西魏正元中齊王之鎮徐州也立大堰遏水西流兩瀆之會置城防之曰曲沭戍流三十里西注沭水舊瀆謂之新渠自厚邱西南出左會新渠南入淮陽宿預縣今宿遷縣注泗水地理志所謂至下邳注泗者也下邳故城在今邳州東三十里有直河入泗即古沭水也經言於陽都入沂非矣沭水左瀆自大堰水斷故瀆東南出桑堰水注之水出襄賁縣泉流東注沭瀆又南左合橫溝水水發瀆右東入沭之故瀆又南暨于堰其水西南流徑司吾山東又徑司吾縣故城西今宿遷北有司吾故城春秋左傳楚執鍾吾子漢志應劭曰吳執鍾吾子以為司吾縣王莽更之息吾也又西南至宿預注泗水也沭水故瀆自下堰東南徑司吾城東又東南厯柤口城中柤水出于楚之柤地春秋襄公十年經書公與晉及諸侯㑹吳于柤杜預曰楚地音莊加反京相璠曰宋地今彭城逼陽縣西北有柤水溝去逼陽八十里東南流徑逼陽縣故城東北地理志曰故逼陽國也春秋左傳襄公十年夏四月戊午會于柤晉荀偃士丐請伐逼陽而封宋向戍焉荀罃曰城小而固勝之不武弗勝為笑固請丙寅圍之弗克孟氏之臣秦堇父輦重如役逼陽人啓門諸侯之士門焉懸門發聊人紇抉之以出門者狄虒彌建大車之輪而䝉之以甲以為櫓左執之右拔㦸以成一隊孟獻子曰詩所謂有力如虎者也主人懸布堇父登之及堞而絶之墜則又懸之蘇而復上者三主人辭焉乃退帶其斷以徇於軍三日諸侯之師久於逼陽請歸智伯怒曰七日不克爾乎取之以謝罪也偃士攻之親受矢石遂滅之以逼陽子歸獻于武宮謂之夷俘逼陽妘姓也漢以為縣漢武帝元朔三年封齊孝王子劉就為侯國王莽更之輔陽也按史表劉就封博陽侯索隱曰志屬汝南漢志汝南郡博陽侯國莽曰樂家此云封逼陽未詳按逼陽即漢志博陽屬楚國莽曰輔陽郡國志屬彭城國有柤水左傳襄公十年滅逼陽杜預曰即此縣也據此則博陽與傅陽自是兩縣而酈注乃以博陽屬之傳陽何耶郡國志曰逼陽有柤水柤水而疑作西南亂於沂而注于沭謂之柤口城得其名矣東南至朐縣入游注海也禹貢錐指曰以今輿地言之沭水出沂水縣厯莒州沂州郯城至沭陽縣西北分為二水其一南至邳州入泗即齊乘所謂南漣水也其一為左瀆北至海州與安東之游水合自下游沭通稱又北至贑榆入海即齊乘所謂北漣水也巨洋水出朱虛縣泰山北過其縣西泰山即東小泰山也巨洋水即國語所謂具水矣袁宏謂之巨昧王韶之以為巨何氏從通鑑注改蔑亦或曰胊瀰皆一水也而廣其目焉其水北流徑朱虛縣故城西朱虛故城在今青州府臨胊縣境漢縣屬琅邪郡後漢屬北海國隋省入郚城唐省郚城入安邱漢惠帝二年封齊悼惠王子劉章為侯國地理風俗記曰丹山在西南丹水所出東入海丹水由朱虛邱阜矣故言朱虛城西有長坂逺峻名為破車峴城東北二十里有丹山世謂之几山在今濰縣西南八十里山形如几西丹水發源于此縣在西南非山也丹几字相類音從字變也漢志朱虛縣几山丹水所出東北至壽光入海山𨗳丹水有二源各𨗳一山世謂之東丹西丹水也西丹自穴山北流徑劇縣故城東東丹水注之出方山在今昌樂縣東二十里東丹水發源于此山有三水一水即東丹水也北徑縣合西丹水而亂流又東北出徑渏薄澗北渏水亦出方山流入平壽縣積而為渚水盛則北朱云當作注東南流屈而東北流徑平壽縣故城西平壽故城在今登州府濰縣西南三十里漢縣屬北海郡隋廢而北入丹謂之魚合口丹水又東北徑望望下疑漏海字今萊州府有望海臺疑即此也詳見後又東北入于海臺東東北注海蓋亦縣所氏者也又北過臨朐縣東巨洋水自朱虛北入臨胊縣熏冶泉水注之熏冶泉在臨朐縣西南二十五里昔歐冶子鑄劍之地水出西溪飛泉側瀨於窮坎之下泉溪之上源麓之側有一祀目之為冶泉祀按廣雅金神謂之清明斯地蓋古冶官所在故水取稱焉水色澄明而清泠特異淵無潜石淺鏤沙文中有古壇參差相對後人微加功飭以為嬉遊之處南北邃岸凌空踈木交合先公以太和中作鎮海岱余總角之年持節東州至若炎夏火流間居倦想提琴命友嬉娛永日桂筍尋汳朱云當作桂棹尋波輕林委浪琴歌既洽歡情亦暢是焉棲寄實可慿襟小東有一湖佳饒鮮筍匪直芳齊勺藥實亦潔並飛鱗其水東北流入巨洋謂之熏冶泉又徑臨朐縣故城東城古伯氏駢邑也漢武帝元朔二年封菑川懿王子劉奴為侯國應劭曰臨胊山名也故縣氏之朐亦水名其城側川臨朐是以王莽用表厥稱焉其城上下㳂水悉是劉武皇北伐廣固營壘所在矣明一統志廣固城在今青州府城西堯山之陽晉永嘉後前趙于此築城有大澗甚廣因之為固故名後為宋武帝所夷巨洋又東北徑委粟山東在今臨朐縣東北三里孤阜秀立形若委粟又東北洋水注之水西出石膏山西北石澗口東南徑逢山下祠在今臨朐縣西二十五里山麓有殷諸侯逢伯陵祠故名西洋水又南東厯逢山下即石膏山也在今青州府城西南二十五里石色潤澤如膏故名麓麓上疑有脫文三成壁立直上山上有石鼓鳴則年凶郭緣生續述征記曰逢山在廣固南三十里有祠并石鼓齊地將亂石人輒打石鼓聞數十里洋水厯其隂而東北流世謂之石溝水東北流出於委粟山北而東注于巨洋謂之石溝曰疑作口然是水下流亦有時通塞及其春夏水泛川瀾無輟亦或謂之為龍泉水地理志石膏山洋水是出也今於此縣唯是瀆當之似符羣證矣巨洋又東北得邳泉口泉源西出平地東流注于巨洋巨洋又北會建德水水西發逢山阜而東流入巨洋水也又北過劇縣西明一統志壽光縣西南三十里有紀城春秋紀國城中有臺俗曰紀臺城旁有劇城漢之劇縣也巨洋水又東北合康浪水明一統志源出臨淄縣西一十里平地北流與系水合水發縣西南􅛲山無事樹木而員峭孤峙㠝岏分立左思齊都賦曰􅛲嶺其左是也康浪水北流注于巨洋巨洋又東北徑劇縣故城西古紀國也春秋莊公四年紀侯不能下齊以與弟季大去其國違齊難也後改曰劇故魯連子曰朐劇之人辨者也漢文帝十八年别為菑川國後并北海漢武帝元朔二年封菑川懿王子劉錯為侯國王莽更之愈縣也城之北側有故臺臺西有方池晏謨曰西去齊城九十七里耿弇破張步於臨淄追至巨洋水上僵尸相屬即是水也巨洋又東北徑晉龍驤將軍幽州刺史辟閭渾墓東而東北流渾墓側有一墳甚高大時人咸謂之為焉陵一作馬陵而不知誰之邱壟也巨洋水又東北徑益縣故城東益縣故城在今壽光縣南十里漢屬北海郡寰宇記以為魏益都城非也益都城在縣西二十里王莽更之滌蕩也按漢志莽曰探陽晏謨曰南去齊城五十里司馬宣王伐公孫淵北徙豐人住於此城遂改名為南豐城也又東北積而為潭枝津出焉謂之百尺溝西北流徑北益都城也漢武帝元朔三年封菑川懿王子劉胡為侯國又西北流而注于巨淀矣朱云當作巨洋又東北過壽光縣西今屬青州府巨洋水自湖東北流徑縣故城西王莽之翼平亭也漢光武建武二年封更始子鯉為侯國城之西南水東有孔子石室故廟堂也中有孔子像弟子問經既無碑志未詳所立巨洋又東北流堯水注之水出劇縣南有崩山即故義山也俗人以其山角因名為角崩山亦名為角林山皆世俗音訛也水即㽔水矣地理志曰劇縣有義山㽔水所出也地理志曰劇縣義山㽔水所出北注壽光入海北徑􅛲山東俗亦名之為青水矣堯水又東北徑東西壽光二城間應劭曰壽光縣有灌亭杜預曰在縣東南斟灌國也斟灌城在壽光縣東四十里又言斟亭在平壽縣東南平壽故城平壽故城在今萊州府濰縣西南三十里漢縣屬北海郡隋廢在白狼水西今北海郡治水上承營陵縣今為昌樂縣之下流東北徑城東西入别畫湖亦曰朕懷湖湖東西二十里南北三十里東北入海斟亭在溉水東斟亭在今濰縣東北三十里水出桑犢亭東覆甑山亭故高密郡治世謂之故郡城山謂之塔山水曰鹿孟水亦曰戾孟水皆非也地理志曰桑犢故亭北海之屬縣矣有覆甑山溉水所出北徑斟亭西北今曰疑作白狼水按地理志北海有斟縣京相璠曰故斟尋國禹後西北去灌亭九十十下當有里字朱云當作九里溉水又北徑寒亭西郡國志曰平壽有疑作在斟灌東郡國志北海國平壽縣有斟城有寒亭薛瓚漢書集注云按汲郡古文相居斟灌東郡灌是也明帝以封周後改曰衛斟尋在河南非平壽也又云太康居斟尋羿亦居之桀又居之尚書序曰太康失國兄弟五人徯于洛汭此即太康之居為近洛也余考瓉所據今河南有尋也疑訛當作邑衛國有觀土國語曰啓有五觀謂之姦子五觀蓋其名也所處之邑其名曰觀皇甫謐曰衛也又云夏相徙南邱依同姓之諸侯于斟灌斟尋氏即汲冡書云相居斟灌也既依斟尋明斟尋非一居矣窮后既仗善射篡相寒浞亦因逢蒙弒羿即其居以生澆因其室而有殪故春秋襄公四年魏絳曰使澆用師滅斟灌及斟尋氏處澆于過處殪于戈杜預曰過戈皆國名東萊掖縣北有過鄉戈在宋鄭之間是以伍員言於吳子曰過澆殺斟灌以伐斟尋是也有夏之遺臣曰靡事羿羿之死也逃于鬲氏今隔縣也收斟灌尋二國之餘燼殺寒浞而立少康滅之有窮遂亡也是蓋寓其居而生其稱上下疑有訛誤宅其業而表其邑縱遺文㳂禠亭郭有傳未可以彼有灌目謂此疑衍專此為為下疑有脫文宋本作未可以彼為灌目謂專此為非捨此尋名而專彼為是以上疑訛推傳應氏之據亦可按矣堯水又東北注巨洋伏琛晏謨並言堯嘗頓駕於此故受名焉非也地理志曰㽔水自劇東北至壽光入海㳂其逗疑作徑趣即是水也又東北入于海巨洋水東北徑望海臺西東北流伏琛晏謨並以為平望亭在平壽縣故城西北八十里古縣又或言秦始皇升以望海因曰望海臺未詳也按史記漢武帝元朔元年封菑川懿王子劉賞為侯國按漢表劉賞封平望侯又東北注于海也淄水出泰山萊蕪縣原山明一統志萊蕪縣今屬泰安州原山在縣東五十里連淄川縣界今名嶽陽山淄水出其隂汶水出其陽淄水出縣西南山下世謂之原泉地理志曰原山淄水所出故經有原山之論矣括地志曰淄州淄川縣東北七十里原山淄水所出俗傳云禹治水功畢土石黑數里之中波若漆故謂之淄水齊乘曰淄水出今益都縣嶽陽山東麓地名泉河古萊蕪北嶽陽即原山也淄多伏流上下有十八漏益都新志淄水源在泉河頭泉在縣西南一百三十里淮南子曰水出自飴山蓋山别名也東北流徑萊蕪谷谷在今益都縣西南元和志淄水西去益都縣五十五里屈而西北流徑其縣故城南禹貢錐指曰元和志云萊蕪縣故城在今淄州東南六十里按故城明初割屬益都今在其西南或仍謂在淄川縣界者誤也今萊蕪本漢嬴縣唐省入博城後復以其地置萊蕪縣在泰安州東一百二十里從征記曰錐指引此作述征記城在萊蕪谷當路岨絶兩山間道由南北門漢末有范史雲為萊蕪令言萊蕪在齊非魯所得引舊說云齊靈公滅萊萊民播流此谷邑落荒蕪禹貢所謂萊蕪也夾谷之會齊侯使萊人以兵劫魯侯宣尼稱夷不亂華是也余按太無萊柞並山名也郡縣取目焉漢高祖置左傳曰與之無山按左𫝊昭七年辭以無山與之萊祚乃有無之無非山名何酈氏忽改易𫝊文曰與之無山及萊祚豈不謬誤之甚乎何氏所考同及萊祚是也應劭十三州記曰太山萊蕪縣魯之萊祚邑淄水又西北轉徑城西又東北流與一水合水出縣東南俗謂之家桑谷水從亦當作述征記名曰聖水列仙傳曰鹿皮公者淄川人也少為府小史才巧舉手成器岑山上有神象人不能到小史白府君請木工斧三十人作祠屋留止其傍其二間以自固食芝華飲神泉七十餘年淄水未下當從朱本作來山下呼宗族得六十餘人命上山半水出盡漂一郡沒者萬計小史辭遣宗室令下山著鹿皮衣升閣而去後百餘年下賣藥齊市也其水西北流注淄水淄水又北出山謂之萊蕪口東北流者也齊乘曰淄水自萊蕪谷又北徑長峪青州舊志自臨淄西南至古萊蕪有長峪界兩山間踰二百里中通淄河按長峪本名馬陘亦名弇中見春秋傳又東北過臨淄縣東今臨淄縣乃漢營陵縣漢臨淄故城在青州府北五十里即所謂齊城也淄水自山東北流徑牛山西又東徑臨淄縣故城南東得天齊水口水出南郊山下謂之天齊淵五泉並出南北三百步廣十步山即牛山也左思齊都賦曰牛嶺鎮其南者也水在齊八祠中齊之為名起於此矣八祠事具史記封禪書地理風俗記曰齊所以為齊者即天齊淵名也其水北流注于淄水淄水又東徑四豪冡北水南山下有四冡方基員墳咸高七尺東西直列是田氏四王冡也淄水又東北徑陽隂里項本作蕩隂里然下有陽里則此亦當作陽里西水東有冡一基三墳東西八十步是列士公孫接田開疆古冶子之墳也晏子惡其勇無禮投桃以斃之死葬陽里即此也晏子春秋曰晏子惡三人之無禮也請公使人餽之二桃曰三子計功而食桃公孫接曰接一搏􅢢而再搏乳虎可以食桃矣田開疆曰吾伏兵而却三軍者再亦可以食桃矣古冶子曰吾嘗從君濟于河黿銜左驂以入砥柱之流吾潜行逆流百步順行九里殺黿而出可以食桃無與人同矣二子何不反桃抽劍而起二子皆挈領而死古冶子亦自挈領而死淄水又北徑其城東城臨淄水故曰臨淄王莽之齊陵縣也爾雅曰水出其前左為營丘武王以其地封太公望賜之以四履都營丘為齊或以為都營陵史記周成王封師尚父于營丘東就國道宿行遲萊侯與之爭營丘逆旅之人曰吾聞時難得而易失客寢安殆非就封者也太公聞之夜衣而行至營丘陵亦丘也獻公自營丘徙臨淄余按營陵城南無水唯城北有一水世謂之白浪水西出丹山俗謂九山也東北流山疑衍或訛爾雅出前左之文不得以為營丘矣營丘者山名也詩所謂子之營兮遭我乎峱之間兮作者多以丘陵號同又去萊差近咸言太公所封考之春秋經書諸侯城緣陵左傳曰遷杞也毛詩鄭注並無營字瓉以為非近之今臨淄城中有丘在小城內周回三百步高九丈北降丈五淄水出其前故有營丘之名與爾雅相符城對天齊淵故城有齊城之稱是以晏子言始爽鳩氏居之逢伯陵居之太公居之又曰先君太公築營之丘季札觀風聞齊音曰泱泱乎大風也哉表東海者其太公乎田巴入齊過淄自鏡新序田巴臨淄水而觀形自知醜惡郭景純言齊之營邱淄水徑其南及東也非營陵明矣獻公之徙其猶晉氏深翼居絳非謂自營陵而之也其外郭即獻公所徙臨淄城也世謂之虜城言齊湣王伐燕燕王噲死虜其民寶居因郭以名之上下疑有訛錯朱云當作虜其民實居郭因以名之秦始皇三十四歲滅齊為郡治臨淄漢高帝六年封子肥於齊為王國王莽更名濟南也戰國䇿曰田單為齊相過淄水有老人涉淄而出不能行坐沙中單乃解裘於斯水之上也又東過利縣東今博興縣東南有利縣故城淄水自縣東北流徑東安平城北禹貢錐指云應劭曰博昌縣西南三十里有安平亭故縣也按淄水自利縣東又東北流不得過博昌之西南今臨淄縣東有安平故城若以為是則當先安平後利縣豈注文偶爾失次耶不然則道元誤引利縣東北當别有東安平城也又東徑巨淀漢志齊郡巨定即此縣故城南城在今樂安縣東北征和四年漢武帝幸東萊臨大海三月耕巨淀即此也縣東南則巨淀原本訛澱湖蓋以水受名也淄水又東北徑廣饒縣故城南城亦在樂安縣東北漢廣饒巨淀二縣屬齊郡後漢省晉復置廣饒劉宋改曰千乘厯代因之金改曰樂安元和志淄水南去千乘縣二十八里漢武帝元鼎按表是元狩中封菑川靖王子劉國為侯國淄水又東北馬車瀆水注之在今樂安縣東北齊乘云今樂安高家港也縣志云在縣東五十里清水泊北受巨淀受上疑有首字淀即濁水所注也呂忱曰濁水一名溷水出廣縣為山世謂之治嶺山東北流徑廣固城西城在廣縣今青州府治益都縣乃漢廣縣地西北四里四周絶澗岨水深隍晉水嘉中東萊人曹嶷所造也水側山際有五龍口義熙五年劉武帝伐慕容超於廣固也以籍當作藉􅕑難攻兵力勞弊河間人𤣥文說裕云昔趙攻曹嶷望氣者以為繩水何氏云繩水之繩當從水帶城非可攻拔若塞五龍口城當必陷石虎從之嶷請降降後五日大雨雷雷震開後慕容恪之攻拔龕按十六國春秋秋當作假龕十旬不拔塞口而龕降後無幾又震開之舊基猶存宜加修築裕塞之超及城內男女皆悉腳弱病者太半超遂出奔為晉所擒也然城之所跨實慿地􅕑其不可固城者在此濁水東北流徑堯山東從征記曰廣固城北三里有堯山祠堯因巡狩登此山後人遂以名山廟在山之左麓廟像東靣華宇修整帝圖嚴飾軒冕之容穆然山之上頂舊有上疑衍祠今也毁廢無復遺式盤石上尚有人馬之跡徒黃石而已唯刀劒之蹤逼真矣至於燕鋒岱鍔魏鋏齊鋩與今劒莫殊以蜜模寫知人功所制矣朱謀㙔曰莊子云天子之劒以燕溪石城為鋒齊岱為鍔晉魏為脊周宋為鐔韓魏為夾以密模寫疑當作蜜謂以蠟模榻其迹也晉書山濤傳有蜜章亦謂以蠟封奏章也西望胡公陵孫暢之所云青州刺史傳𢎞仁言得銅棺𨽻書處濁水又東北流徑東陽城北在青州府城宋武伐燕廢廣固築此東北流徑廣縣故城西舊有州刺史治亦曰青州城陽水又東北流石井水注之水出南山頂洞開望若門焉俗謂是山為劈頭山其水北流注井井際廣城東側三靣積石高深一匹有餘長津激浪瀑布而下澎贔之音驚川聒谷漰渀之勢狀同洪井北流入陽水余生長東齊極遊其下於中闊絶乃積綿載後因王事復出海岱郭金紫惠同石井賦詩言意爾日嬉娛尢慰羇心但恨此水時有通塞耳陽水東徑故七級寺禪房南水北則長廡遍駕逈閣承阿上下有脫文林之際則繩坐疏班錫鉢閒設所謂修修釋子眇眇禪棲者也陽水又東東徑疑作徑東陽城東南義熙中晉青州刺史羊穆之築此以在陽水之東即謂城疑衍之東陽城世以濁水為西陽水故也水流亦有時窮通信為靈矣昔在宋世是水絶而復流劉晃賦通津焉魏太和中此水復竭輟流積年先公滁疑作除州即任未朞北史酈範字世則范陽涿鹿人太武時給事東宮太武踐祚追録先朝舊勳賜爵永寧男後為青州刺史進爵為侯是水復通澄映盈川所謂幽谷枯而更溢窮泉輟而復流矣海岱之士又頌通津焉平昌耆民孫道相頌曰唯彼繩泉竭踰三齡祈盡圭璧謁窮斯牲道從隆替降由聖明耆民河間趙嶷頌云敷化未朞𤣥澤潜施枯源揚瀾涸川滌陂北海郭欽曰先政輟津我后通洋但頌廣文煩難以具載陽水又北屈徑漢城陽景王劉章廟東東注于巨洋後人堨斷令北注濁水時人通謂濁水為陽水故有南陽北陽水之論二水渾流世謂之為長沙水也亦或通名之為澠水故晏謨伏琛為齊記並云東陽城既在澠水之陽宜為繩陽城非也世又謂陽水為洋水余按羣書盛言洋水出臨朐縣而陽水導源廣縣兩縣雖鄰川土不同於事疑焉濁水又北徑臧氏臺西又北徑益城西又北流注巨淀地理志曰廣縣為山濁水所出東北至廣饒入巨淀巨淀之右又有女水注之水出東安平縣之蛇頭山從征記曰水西有桓公冢甚高大墓方七十餘丈高四丈員墳圍二十餘丈高七丈餘一墓方七丈二墳晏謨曰依陵記非葬禮上下疑有訛脫如承世故與其母同墓而異墳伏琛所不詳也冢東山下女水原有桓公祠侍其衡侍其雙姓酈食其之後奏魏武王所立曰近日路次齊郊瞻望桓公墳壟在南山之阿請為立祀為塊然之主郭緣生述征記曰齊桓公冢在齊城南二十里因山為墳大冢東有女水或云齊桓公女冢在其上故以名水也女水導川東北流甚有神焉化隆則水生政薄則津竭燕建平六年水忽暴竭𤣥明惡之寢病而亡燕太上四年女水又竭慕容超惡之燕祚遂淪女水東北流徑東平安當作平安縣故城南續述征記曰女水至安平城南在今臨淄縣東一十里伏流一十五里然後更流注北陽水城故􅈶亭也春秋魯莊公三年紀季以􅈶入齊公羊傳曰季者何紀侯弟也賢其伏罪請􅈶以奉五祀公羊傳曰紀季者何紀侯之弟也何以不名賢乎紀季服罪也其服罪奈何魯子曰請後五廟以存姑姊妹田成子單之故邑也史記齊襄王入臨淄封田單為安平君集解云安平城在青州臨淄縣東十九里古紀之酅邑也後以為縣博陵有疑漏安字平故此加東也世祖建武七年封菑川王子劉茂為侯國按後漢書宗室五王傳泗水王歙光武族父也歙子終與光武少相親愛建武二年立歙為泗水王終為淄川王終長子柱封邔侯少子鳯封曲陽侯歙從父弟茂漢兵起亦聚衆京密間後率衆降封為中山王十三年宗室為王皆降為侯更侯茂為穰侯傳所載甚明淄川王子無名茂亦無封安平侯者至于茂于淄川王為從父叔亦不封安平侯不知此注何所本也又徑安平城東東北徑壟邱東東北入淀地理志曰葂頭山按漢志作菟頭山女水所出東北至臨淄入巨淀又北為馬車瀆北合淄水又北時繩之水注之時水出齊城西南通鑑注作西北二十五里二十五里平地出泉即如水也朱本云當作而水愚謂當作耐水亦謂之源水因水色黑俗又目之為黑水明一統志時水在臨淄縣西南二十五里一名耐左傳齊晉盟于耐是也其源淺旱則涸故又名乾時左傳公與齊侯戰于乾時是也其色黑故俗名烏河西北徑黃山東又北厯愚山山東有愚公冢時水又屈而徑杜山北有愚公谷齊桓公時公隱於溪鄰有認其駒者公以與之山即杜山之通阜以其人狀愚故謂之愚公衍山韓非子曰齊桓公入山問父老此名何谷答曰臣舊畜牛生犢以子買駒少年謂牛不生駒遂持而去人謂臣愚遂名為愚公谷今愚公山在臨淄縣西二十里東有愚公冢北有愚公谷水有石梁亦謂為石梁水又有澅一作下同水注之水出時水東去臨淄城十八里所謂中也俗以水為宿留水西北入于時水孟子去齊三宿而後出故世以此而變水名也水南山西有王歜墓昔樂毅伐齊賢而封之歜不受自縊而死水側有田引水溉跡尚存時水又西北徑西安縣故城南故城在今臨淄縣西三十里本渠也齊大夫雍禀之邑矣王莽更之曰東寧時水又西至石洋堰分為二水謂之石洋口枝津西北至梁鄒入泲時水又北徑西安城西又北京水系水注之水出齊城西南世謂寒泉也東北流直申門西京相璠杜預並言申門即齊城南靣西第一門矣為申池昔齊懿公遊申池邴戎庸職二人害公於竹中左傳作邴歇閻職二人害齊侯懿公于竹中今池無復髣佛然水側尚有小小竹木以時遺生也左思齊都賦注申池在海濵齊藪也余按春秋襄公十八年晉伐齊戊戌伐雍門之荻己亥焚雍門壬寅焚東北二郭甲辰東侵及沂而不言北掠于海且晉獻子尚不辭死以逞志何容封仇敵而不徵暴草木于海嵎乎又炎夏火流非逺遊之辰懿公見弒蓋是白龍魚遁見困近郊矣說苑伍子胥曰昔白龍下清泠之淵化為魚豫且射中其目此蓋用其事也左氏捨近遺逺考古非議何氏云疑有脫文杜預泛言有推據耳系水傍城北流徑陽門西水次有故封處所謂齊之稷下也當戰國之時以齊宣王喜文學遊說之士鄒衍淳于髠田駢接于愼到之徒七十六人皆賜列第為上大夫不治而論議是以齊稷下學士復盛且數百十人劉向别録以稷為齊城門名也談說之士期會於稷門下故曰稷下也鄭志曰張逸問贊云何氏云贊上當有書字我先師棘下生何時人鄭𤣥答云齊田氏時善學者所㑹處也齊人號之棘下生無常人也余按左傳昭公二十二年莒子如齊盟于稷門之外漢以叔孫通為博士號稷嗣君史記音義曰欲以繼蹤齊稷下之風矣然棘下又是齊何氏校改魯城內地名左傳定公八年陽虎劫公伐孟氏入自上東門戰于南門之內又戰于棘下者也蓋亦儒者之所萃焉故張逸疑而發問鄭𤣥釋而辨之雖異名于見大歸一也城內有故臺有營邱有故景王祠即朱虛侯章廟矣晉起居注云齊有大蛇長三百步負小蛇長百餘步徑於市中市人悉觀自北門所入處也北門外東北二百步有齊相晏嬰冢宅左傳晏子之宅近市景公欲易之而嬰弗更為誡曰吾生則近市死豈易志乃葬故宅後人名之曰清節里系水又北徑臨淄城西門北而西流徑梧宮南昔楚使聘齊齊王饗之梧宮即是宮矣其地猶漏名字梧臺里臺甚層秀東西一百餘步南北加減即古梧宮之臺臺即關子所謂宋愚人得燕石處關子曰宋之愚人得燕石于梧臺之東歸而藏之以為寶周客聞而求觀主人齊戒七日端冕以發革匱十重緹巾十襲客見之掩口笑曰此特燕石耳與瓦甓不殊臺西有石杜碑碑猶存漢靈帝喜平五年立其題云梧臺里系水又西徑葵丘北春秋莊公八年襄公使連稱管至父戌葵丘京相璠曰齊西五十里有葵丘地若是無戌之此句疑有脫誤僖公九年齊桓會諸侯于葵丘宰孔曰齊侯不務修德而勤逺略葵丘不在齊也引胡廣汾隂葵丘山陽西戎葵城宜在此非也余原左傳連稱管至父之戌葵丘以瓜時而往還之期請代弗許將為齊亂故令無寵之妹候公於宮因無知之出遂害襄公若出逺無代寧得謀及婦人而為公室之亂乎是以杜預稽春秋之㫖即傳安之注于臨淄西不得捨近託逺茍成已異於異可殊即義為負然則葵丘之戌即此地也朱曰㙔按左傳齊桓公葵丘之㑹宰孔曰齊侯不務修德而勤逺略故北伐山戎南伐楚西為此㑹也且天子使賜桓公于文武之胙知與王都近矣故胡廣有山陽西北葵城之說而杜預說連稱管至父葵丘之戌云在臨淄西有地名葵丘酈疑胡廣傳㑹故發此論時水西左迤為潭又西徑高陽僑郡南魏所立也又西北流注于時時水又東北流澠水注之水出營城東世謂之漢溱水也西北流徑營城北漢景帝四年封齊悼惠王子劉信都為侯國澠水又西徑樂安南疑作國博昌縣故城南故城在今博興縣東二十五里應劭曰昌水出東萊昌陽縣今為登州府萊陽縣道逺不至取其嘉名闞駰曰縣處勢平故曰博昌澠水西厯貝丘京相璠曰博昌縣南近澠水有地名貝丘在齊西北四十里春秋莊公八年齊侯田于貝丘見公子彭生豕立而泣齊侯墜車傷足於是處也澠水又西北入時水從征記又曰水出臨淄縣北徑樂安博昌南界西入時水者也自下通謂之為澠也昔晉侯與齊侯宴齊侯曰有酒如澠指喻此水也時水又屈而東北徑博昌城北時水又東北徑齊郡利縣故城北又東北徑巨淀縣故城北又東北徑廣饒縣故城北東北入淄水齊乘曰時水之源南近淄水詳其地形蓋伏淄所發土人名曰烏河一名耐水亦名如水澠水北流勢極屈曲俗稱九里十八灣地理風俗志曰淄入濡淮南子曰白公問微言曰若以水投水如何孔子曰淄澠之水合易牙嘗而知之謂斯水矣淮南所引孔子白公語出列子說符篇及呂氏春秋審應覽俱作淄澠音緇乘列子曰口將爽者先辨淄澠張湛注云淄水出齊郡萊蕪縣澠水出北海郡千乘縣界流至壽光縣二水相合又東北入于海淄水入馬車瀆東北徑琅槐故城南應劭曰博昌北八十里有琅槐鄉故縣也今樂安縣東北一百十里琅槐故城是又東北徑馬井城北與時繩之水互受通稱故邑流其號又東北至皮丘沈入于海字典云齊人謂湖曰沈郭緣生述征記有鳥當沈按沈疑當作坈述征記亦作馬常坈故晏謨伏琛並言淄繩之水合於皮丘沈西元和志壽光縣淄澠二水西自千乘縣界流入去縣四十里地理志曰馬車瀆至琅槐入于海也蓋舉縣言也謂言琅槐而不言皮丘坈也禹貢錐指云以今輿地言之淄水出益都縣東南嶽陽山厯臨淄博興樂安至壽光縣北由清水泊入海並屬青州府元和志渤海在壽光縣東北一百十里據琅槐故城在今樂安縣界則淄水入海不當在壽光然清水泊跨二縣之境必皆漢琅槐地馬車瀆近海處豈即古之皮丘坈與元和志十乘縣北青丘齊景公田于青即此齊乘云清水泊是也朱長孺曰淄水地志云入濟水經云入海者馬車瀆以下乃濟水入海處淄水入海之道與濟水正同非經志互有齟齬也渭按濟由馬車瀆入海自金皇統中始前此不爾也河渠書云于齊通淄濟之間故淄得由博昌入濟水地志謂淄入濟水經謂淄入海杜預謂淄入汶鄭樵以入汶為是今按左傳昭二十六年成人伐齊師之飲馬于淄者注云淄水出泰山梁父縣西北入汶此淄即柴汶也杜注左傳不誤鄭據以為禹貢之淄則誤耳汶水出朱虛縣泰山漢志琅邪郡朱虛縣東泰山汶水所出東至安邱入濰師古曰前言汶水出萊蕪入濟今此又言出朱虛入濰將桑欽所說有異或者有二汶水乎曾彥曰汶水有二出蕪原山入濟者徐州之汶也出朱虛泰山入濰者青州之汶也胡渭曰原山北接淄州延袤跨青徐之境汶雖徐水其𨗳源處猶為青域故禹貢青之貢道猶書浮于汶云朱虛城在今臨朐縣界漢縣屬琅琊郡東海屬北海國隋省入郚城今為安邱縣地山上有長城西接岱山東連琅耶巨海千有餘里蓋田氏之所造也竹書紀年梁惠成王二十年齊築防以為長城竹書又云晉列公十二年王命韓景子趙列侯翟員伐齊入長城按竹書紀年晉烈公十二年王命韓景子趙烈侯及我師伐齊入長城此引頗誤史記所謂齊威王越趙侵伐我長城者也伏琛晏謨並言水出縣東南峿山山在小泰山東者也北過其縣東汶水自縣東北徑峿城北地理風俗記曰朱虛縣東四十里有峿城亭故縣也峿當作郚按春秋莊公元年齊遷紀郚杜預曰郚在朱虛縣東南今安邱西南六十里有郚城又東北徑管寧冢東故晏謨言柴阜西南有魏獨行君子管寧墓墓前有碑又東北徑柴阜山北山之東有徴士邴原冢碑志存焉汶水又東北徑漢青州刺史孫嵩墓西有碑碣汶水又東徑安丘縣故城北漢高帝八年封將軍張說為侯國地理志曰王莾之誅郅也孟康曰今渠丘亭莒渠丘城是也伏琛晏謨齊記並言亭在丘城東北十里非城也城對牟山山之西南有孫賔碩兄弟墓碑志並在也又北過淳于縣西又東北入于縣故夏候氏之斟灌國也周武王以封淳于公號曰淳于國春秋桓公六年冬周公如曹按春秋當作州公如曺杜預曰州國名淳于州國所都城陽淳于縣也傳曰淳于公如曹度其國危遂不復也其城東北則兩川交㑹也濰水出琅邪箕縣日知録曰濰水出琅邪郡箕屋山書禹貢濰淄其道左傳襄公十八年晉師東侵及濰是也其字或省水作維或省系作淮又或從心作惟總是一字漢書地理志琅琊郡朱虛下箕下作維靈門下橫下折泉下作淮上文引禹貢惟災其道又作惟一卷之中異文三見通鑑梁武帝紀魏李叔仁擊邢杲于惟水古人之文或省或借其旁並從鳥隹之隹則一爾後人誤讀淮沂其乂之淮而呼此水為槐河失之矣琅邪山名也越王勾踐之故國也勾踐并吳欲霸中國徒都琅邪秦始皇二十六年滅齊以為郡城即秦王之所築也遂登琅邪大樂之山作層臺於其上謂琅邪臺琅邪臺在諸城縣琅邪山臺在城東南十里孤立特顯出于衆山上下周二十里餘傍濵巨海秦王樂之因留三月乃徙黔首二萬戶於琅邪山下復十二年所作臺基三層層髙三丈上級平敞方二百餘步高五里刋石立碑紀秦功德臺上有神淵淵主靈焉人汙之則竭齊潔則通神廟在齊八祠中漢武帝亦嘗登之漢髙帝呂后帝后並舉疑有誤七年以為王國文帝三年更名為郡王莾改曰填夷矣濰水𨗳源濰山元和志濰山在密州莒縣東北八十三里濰水所出許慎吕忱云濰水出箕屋山胡氏曰說文濰水出琅邪箕屋謂琅邪郡箕縣之屋山非山名箕屋也淮南子曰濰水出覆舟山蓋廣異名也東北徑箕縣故城西又西析泉水注之水出析泉縣北按漢志琅邪郡有折泉縣此云析誤下同松山東南流析泉縣東又東南徑仲固山東北流入于濰地理志曰至箕縣北入濰者也濰水又東北徑諸縣故城西城在今諸城縣西南春秋文公十二年季孫行父城諸及鄆傳曰城其下邑也王莽更名諸并矣濰水又東北涓水注之出馬耳山在諸城縣西南六十里山高百丈上有二石並舉望齊馬耳故世取名焉東去常山三十里涓水發于其隂北徑婁鄉城東春秋昭公五年經書夏莒牟夷以牟婁防兹來奔者也又分諸縣之東為海曲縣故俗人謂此城為東諸城涓水又北注于濰水東北過東武城縣西當作東武縣錐指引此亦作東北徑東武縣故城西縣因岡為城城周三十里漢髙帝六年封郭嘉按史表當作郭䝉為侯國王莽更名之曰祥善矣又北左合扶淇之水水出西南常山東北流注濰晏謨並以濰水為扶淇之水以扶淇之水為濰水非也按經脉志濰自箕縣北徑東武縣西北流合扶淇之水晏謨伏琛云東武城西北二里濰水者即扶淇之水也濰水又北右合盧水即久台水也地理志曰水出琅邪橫縣故山按漢志琅邪郡橫縣下云故山名台水所出此云久台水似誤按故山名者即指橫而言非橫縣有故山也今云水出橫縣故山則似竟有其山矣總因以名字訛作久字遂以故山為句而訛作久台水也王莽之合邱也按志莽曰令邱今云合訛山在東武縣故城東南東武漢琅邪郡治也今為諸城縣治世謂之盧山也西北流徑疑漏平字昌縣故城西平昌故城在今安丘縣西南六十里東北流齊地記曰東武城東南有盧水水側有勝火木方俗音曰柳子其木經野火燒死炭不滅故東方朔朔下疑有脫文不灰之木者也其水又東北流徑東武縣故城東而西北入濰地理志曰久疑訛台水出東南徑東武入濰者也尚書所謂濰淄其道矣又北過平昌縣東濰水又北徑石泉縣故城西王莽之養信也地理風俗記曰平昌縣東南四十里有石泉亭故縣也濰水又北徑平昌縣故城東在今安邱縣西南六十里荆水注之水出縣南荆山阜東北流徑平昌縣故城東漢文帝封齊悼惠王肥子永為侯國按史漢表齊悼惠王子卬封平昌侯今云永誤城之南角有臺臺下有井與荆水通物墜於井則取之荆水昔常有龍出入于其中故世亦謂之龍臺城也荆水又東北流注于濰水又北浯水注之水出浯山世謂之巨平山也地理志曰靈門縣有高原山與浯一山按漢志靈門縣有高䂞山壺山浯水所出師古曰䂞即柘字也今云原訛浯一山亦當作壺山浯水所出東北入濰今是山西接浯山許愼說文言水出靈門山世謂之浯汶矣其水東北徑姑幕縣故城東薄姑城在今博興縣東一十五里又有姑幕城在莒州境內漢縣北齊省入東莞縣有五色土王者封建諸侯隨方受之故薄姑氏之國也闞駰曰周成王時薄姑與四國作亂周公滅之以封太公是以地理志曰或言薄姑也王莽曰季睦矣應劭曰左傳曰薄姑氏國太公封焉薛瓉漢書注云博昌有薄姑城未知孰是浯水又東北徑平昌縣故城北古堨以溢溉田南注荆水浯水又東北流而注于濰水也又北過高密縣西今屬萊州府應劭曰縣有密水故有高密之名也然今世所謂百尺水者蓋密水也水有二源西源出奕山亦曰鄣日山晏謨曰山狀鄣日是有此名伏琛曰山上鄣日故名鄣日山也其水東北流東源出五弩山西北流同瀉一壑俗謂之百尺水古人堨以溉田數十頃北流徑高密縣西下注濰水自下亦兼通稱焉亂流厯縣西碑産山西又東北水有故堰舊鑿石堅柱斷濰水廣六十許步掘東岸激通長渠東北徑高密故城南明帝中元明帝無中元之號誤見下中封鄧震為侯國後漢書鄧禹封高密侯禹卒長子震嗣縣南十里蓄以為塘方二十餘里古所謂高密之南都也溉田一頃許陂水散流下注矣疑訛當作夷安澤濰水自堰北徑高密縣故城西城在今縣西南元和志濰水在高密縣西南去縣四十里漢文帝十六年别為膠西國宣帝本始元年更為高密國王莽之章牟也濰水又北昔韓信與楚將龍且夾濰水而陳於此信夜令為萬餘囊盛沙以遏濰水引軍擊且僞退且追北信決水水大至且軍半不得渡遂斬龍且於是水水西有鴈阜阜上有漢司農卿鄭康成冢在今髙密縣西北五十里石碑猶存又北徑昌安縣故城東在今安丘縣西南十里漢明帝中元明帝止永平一號無所謂中元者鄧禹傳襲于永平元年封中封鄧襲為侯國也郡國志曰漢安帝延光元年復也又北過淳于縣東今安丘縣東北有淳于故城濰水在縣東五十里濰水又北左會汶水胡云此東汶也出朱虛縣小泰山北徑平城亭西又東北徑密鄉亭西郡國志淳于縣有密鄉地理志皆北海之屬縣也應劭曰淳于縣東北六十里有平城亭又四十里有密鄉亭故縣也今昌邑縣南有平城故城東南有密鄉故城濰水又東北徑下密縣故城西城在昌邑縣東南與濰縣接界濰縣本唐北海縣元和志海在北海縣東北一百二十里濰水南去縣五十五里城東有密阜地理志曰有三戶山祠余按應劭密者水名是有下密之稱俗以之名阜非也又東北徑都昌縣東今為萊州府昌邑縣晉省都昌入掖縣宋建隆三年始以其地改置昌邑縣濰水東北徑逢萌墓萌縣人也少有大節恥給事縣亭遂浮海至遼東復還在不其山隱學不其山在即墨縣東南四十里明帝安車徴萌以佯狂免又北徑都昌縣故城東漢髙祖六年封朱軫為侯國北海相孔融為黃巾賊管亥所圍於都昌也太史慈為融求救劉備持的突圍其處也吳志北海相孔融數遣人訊問太史慈之母并致餉遺後融出屯都昌為黃巾賊管亥所圍慈自遼東還家母令慈往赴其難時賊圍甚密慈請于融帶鞬攝乃上馬將兩騎自隨各作一的持之開門直出外圍下馬植的射之徑入閉門明日復如此射的賊或起或卧又明晨出射無復起者慈乃鞭馬直突圍馳詣劉偹于平原得救兵來賊遂解去又東北入于海元和志萊州掖縣海在縣北五十二里禹貢錐指云以今輿地言之濰水出莒州東北濰山厯諸城屬青州府髙密萊州府安邱青州府濰縣至昌邑東北五十里入海也並萊州府膠水出黔陬縣今為萊州府膠州膠山北過其縣西膠水源發膠州鐵撅山北過密州五弩山鹵水入焉又北過高密縣注豬澤與張奴水合自澤北入新河經平度州昌邑縣界入海齊記曰膠水出五弩山蓋膠山之殊名也北徑祝兹縣故城東漢武帝元鼎中封膠東康王子延為侯國按漢表膠東康王子延年封祝兹侯此漏年字又徑扶何氏校漢志作邞縣故城西地理志琅邪之屬縣也漢文帝元年封吕平為侯國按漢志琅邪郡邞縣膠水所出師古曰音扶縣名本不作扶又按史漢表吕平封扶栁侯索隱曰縣名屬信都國與此之邞縣無涉不知酈注何據耶膠水又北徑黔陬陬下當有縣字故城西袁嵩郡國志曰縣有介亭地理志曰故介國也春秋僖公九年按左傳是僖公二十九年今云九年誤介葛盧來朝聞牛鳴曰是生三犧皆用之問之果然晏謨伏琛並云縣有東西二城相去四十里有膠水非也斯乃拒艾水也水出縣西南拒艾山即齊記所謂黔艾山也東北流徑拒縣故城西王莽之祑國也按漢志琅邪郡有櫃縣如淳曰音巨不作拒又云根艾水東入海亦不作拒艾水莽曰祓同亦不曰祑國此注所引皆誤世謂之王城又謂是水為洋洋水矣又東北徑晏伏所謂黔陬城西四十里有膠水者也又東入海地理志曰琅邪有櫃縣拒艾水出焉東入海即斯水也今膠水北徑晏伏所謂西黔陬城東高密郡側有黔陬縣地理志曰膠水出邞縣當作邞縣王莽更之純德矣疑即是縣所未詳又北過夷安縣東縣王莽更名之曰原亭也應劭曰故萊夷按漢志漏維字邑也太史公曰晏平仲萊之夷維之人也漢明帝中元誤見前中封鄧珍為侯國西去濰水四十里膠水又北徑膠陽東晏伏並謂之東亭自亭結路南通夷安地理風俗記曰淳于縣東南五十里有膠陽亭故縣也又東北徑左會一水世謂之張奴水水發夷安縣東南阜下西北流厯膠陽縣注于膠水之左東北為澤水渚百許里謂之夷安潭潭之澤周四十里亦濰水枝津之所注也膠水又東北徑下密縣故城東又東北徑膠東縣故城西漢髙帝元年别為國景帝封子寄為王國王莽更之郁祑按漢志作秩也今長廣郡治伏琛晏謨言膠水東北回達于膠東城北百里流注于海又北過當利縣西北入于海縣故王莽更之東萊亭也又北徑平度縣漢武帝元朔二年封菑川懿王子劉行為侯國王莽更名之曰利盧也縣有土山膠水北厯土山注于海海南土山以北悉鹽坈相承修煮不輟北眺巨海杳冥無極天際兩分白黑方别所謂之溟海者也故地理志曰膠水北至平度入海者也水經注集釋訂訛卷二十六
