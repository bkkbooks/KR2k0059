湟水又東右控四水道源四溪東北流注于湟湟水又東逕赤城北而東入經戎峽山右合羌水出西南山下逕䕶羌城東故䕶羌校尉治又東北逕臨羌城西東北流于湟湟水又東逕臨羌縣故城北漢武帝元狩元年以封孫都為侯國按漢書功臣表武帝元封元年封孫都為臨蔡侯酈云臨羌不知何本又按元狩元年别無封爵今云元狩亦疑誤王莽之監羌也漢志臨羌縣注莽曰鹽羌今酈注作鹽羌未知孰是謂之緩戎城非也湟水又東盧溪水注之水出西南盧川東北流注于湟水湟水又東逕臨羌新縣故城南闞駰曰臨羌新縣在郡西百八十里湟水逕城南也城有東西門西北隅有子城湟水又東右合溜溪伏溜石杜蠡四川東北流注之左會臨羌溪水水發新縣西北東南流歷縣北東南入湟水湟水又東龍駒川水注之水又出西南山下東北流逕龍駒城北流注於湟水湟水又東長寧川水注之水出松山東南流逕晉昌川晉昌川水注之長寕水又東南養女川水注之水發養女北山有二源皆長湍逺發南總一川逕養女山謂之養女川闞駰曰長寜亭北有養女嶺即浩亹之西平之北山也亂流出峽南逕長寕亭東城有東西門東北隅有金城西平西北四十里西平上疑脱在字或去字十三州志曰六十里遠矣長寜水又東南與二水合水出西山東南流水出南山此四字疑衍上有風伯祠春秋祭之其水東南逕長寕亭南東入長寜水長寜水又東南流注于湟水湟水又東牛心川水注之水出南南逺山南南譌上南字朱本改其字東北流逕牛心惟東惟字疑誤朱云按太平御覧湟水條云有養女嶺彼羌多禱而祈女又有牛心堆皆湟水源山名則惟字當是堆字又北逕西平亭西東北入湟水湟水又逕西平城北東城即故亭也漢景帝六年封隴西太守北地公孫渾邪為侯國按史漢功臣表俱作平曲今云西平未知所本魏黄初中立西平郡慿依故亭増築南西北三城以為郡治湟水又東逕土樓南樓北倚山原峰髙三百尺有若削成樓下有神祠彫牆故壁存焉闞駰曰西平亭北有土樓神祠者也今在亭東北五里右則五泉注之泉發西平亭北雁次相綴東北流至土樓南北入湟水湟水又東右合蔥谷水水有四源各出一溪亂流注于湟水又東逕東亭北東出漆峽山峽也東流右則漆谷常溪注之左則甘夷川水入焉湟水又東安夷川水注之水發遠山西北逕控衆川北屈逕安夷城西北東入湟水湟水又東逕安夷縣故城有東西門去西平亭東七十里闞駰曰四十里湟水又東左合宜春水水出東北宜春溪西南流至於安夷南入湟水湟水又東勒且溪水注之水出縣東南勒且溪北流逕安夷城東而北入湟水湟水有勒且之名疑即此號也按後漢書耿㳟𫝊恭留擊諸羌未服者首虜千餘人獲牛羊數萬頭勒姐燒何羌等十三種數萬人皆詣恭降此之勒且當即勒姐也姐音紫其外尚有累姐牢姐彡姐等種闞駰曰金城河初與浩亹河合又與勒且河合者也湟水又東左合承流谷水南入右會逹扶東西二溪水參差北注亂流東出六山名也東流期頓雞谷二水北流注之吐朱云疑作那孤長門何云句讀未詳兩水南流入湟水湟水又東逕樂都城南東流又合來谷乞斤流二水左會陽非流溪細谷三水東逕破羌縣故城南應劭曰漢宣帝神爵二年置城省南門十三州志曰湟水河在南門前東過六谷水自南破羌川自北左右翼注湟水又東南逕小晉興城北故都尉治闞駰曰允吾縣西四十里有小晉興城也湟水又東與閤門河合即浩亹河也按漢書地理志注浩亹水出西塞外東至允吾入湟水孟康曰浩亹音合門師古曰浩音誥浩水名也亹者水流峽山岸深詩大雅曰鳬鷖在亹亦其義也今俗呼此水為閤門河盖疾言之浩為閤耳出西北塞外東入塞逕敦煌酒泉張掖南東南逕西平之鮮谷塞尉故城南又東南與湛水合水有二源西水白嶺下東源發于白岸谷合為一川東南流至霧山注閤門河閤門河又東逕養女北山北原本譌作此東南左合南流川水出北山南流入于閤門河河又東逕浩亹故城南王莽改曰興武矣闞駰曰浩讀閤也故亦曰閤門水兩兼其稱矣又東流注于湟水故地理志曰浩亹水東至允吾入湟水又東逕允吾縣北為鄭伯津與潤水合按漢志令居縣注澗水出西塞外至縣西南入鄭伯津今云潤水恐是譌字水出縣北令居縣西北塞外令孟康音連師古音零原本譌作合南流逕其縣故城西漢武帝元鼎二年置王莽之罕虜也又逕永登亭西歷黒石谷南流注鄭伯津湟水又東逕允街縣故城南漢宣帝神爵二年置王莽之修逺亭也縣有龍泉出允街谷泉眼之中水文成蛟龍或試撓破之尋平成龍畜生将飲者皆畏避而走謂之龍泉下入湟水湟水又東逕枝陽縣逆水注之水出允吾縣之參街谷東南流逕街亭城南又東南逕陽非北亭又東南逕廣武城西故廣武都尉治郭淮破叛羌故無載於此處也按魏志郭淮𫝊正始八年隴西諸羌相結叛亂攻圍城邑凉州名胡治無載復叛應之據此則故字當是治字城之西南二十許里水西有馬蹄谷漢武帝聞大宛有天馬遣李廣利伐之始得此馬有角為竒故漢賦天馬之歌曰天馬來兮歷無草逕千里兮巡東道按漢書禮樂志作天馬徠歴無草逕千里循東道胡馬感北風之思遂頓羇絶絆驤首而馳晨發京城食時至敦煌北塞外長鳴而去因名其處曰候馬亭今晉昌郡南及廣武馬蹄谷盤石上馬跡若踐泥中有自然之形故其俗號曰天馬徑夷人在邊效刻足有大小之迹體状不同視之便别逆水又東逕枝陽縣故城南東南入于湟水地理志曰逆水允吾東至枝陽入湟河漢書地理志逆水出允吾參街谷東逕枝陽又東流注于金城河即積石之黄河也闞駰曰河至金城縣謂之金城河隨地為名也釋氏西域記曰牢蘭海東伏流龍沙堆在屯皇東南四百里河歩于歩字疑譌鮮卑山東流至金城為大河出崑崙崑崙即阿耨逹山也元和志云湟水名湟河亦謂樂都水出青海東北亂山中東南流至蘭州西南入黄河按蘭州本漢金城縣允吾浩亹枝陽今皆在其境州西百二十里有允吾故城後漢靈帝光和六年金城河水溢出二十餘里即此河也河水又東逕石城南謂之石城津闞駰曰在金城西北矣今蘭州西有石城津河水又東南逕金城縣故城北按故城即今蘭州治應劭曰初築城得金故曰金城也漢書集注薛瓉云金者取其堅固也故墨子有金城湯池之言矣王莽之金屏也世本曰鯀作城風俗通曰城盛也從土成聲筦子曰内為之城外為之郭郭外之土開池髙則溝之命之曰金城十三州志曰大河在金城北門東流有梁泉注之出縣之南山按耆舊下疑漏傳字言梁暉字始娥漢大将軍梁冀後冀誅入羌後其祖父為羌所推為渠帥而居北城土荒民亂暉将移居枹罕出頓此山為羣羌圍廹無水暉以所執榆鞭竪地以青羊祈山神泉湧出榆木成林其水自縣北流注于河也又東過榆中縣北榆中今在蘭州東北昔䝉恬為秦北逐戎人開榆中之地按地理志曰金城郡之屬縣也故徐廣史記音義曰榆中在金城即阮嗣宗勸進文所謂榆中以南者也又東過天水北界菀川水出勇士縣之子城南山東北流歷此城川疑作成世謂之子城川又北逕牧師菀故漢牧菀之地也羌豪迷吾等萬餘人到襄武首陽平襄勇士至抄此菀焉此句疑有譌誤朱云焉疑作馬焚燒亭驛即此處也又曰菀川水地為龍馬之沃土故馬援請與田戸中分以自給也有東西二菀城相去七里西城即乞佛所都也又北入于河也今靖遠衛西有菀川城黄河自蘭州界東北流越亂山中二百餘里入衞界始瀉落巨川如瀑布然土沿山引水灌田甚廣又北過武威媪圍縣東北河水逕其界東北流縣西南有泉源東逕其縣南又東北入河也今寜夏中衞西南有温圍水下流入黄河通鑑晉咸寧五年馬隆討凉州鮮卑渡温圍水胡三省曰漢武威郡有媪圍縣此水或因以名媪譌温也又東北過天水勇士縣北今靖逺衞西二百里有勇士縣故城地理志曰蒲福也屬國都尉治蒲福當作滿福前漢地志勇士縣注屬國都尉治滿福王莽更名之曰紀德水出縣山世謂之二十八渡水東北流溪澗縈曲途出其中逕二十八渡行者勤于遡涉故因名焉北逕其縣而下注河又有赤曄川水南出赤蒿谷北流逕赤曄川又北逕牛官川又北逕義城西北北流歴三城川而北流注于河也又東北過安定北界麥田山河水東北流逕安定祖厲縣故城西北漢志注應劭曰祖音罝師古曰厲音賴漢武帝元鼎五年幸雍遂踰隴登空同西臨祖厲河而還即于此也空同山名在今平凉府城西三十里王莽更名之曰鄉禮也李斐曰音賴又東北祖厲川水注之水出祖厲南山北流逕祖厲縣而西北流注于河水祖厲故城在今靖逺衞西南一百三十里麥田城在靖逺衞北晉咸和四年乞伏述延見趙亡懼自苑川遷于麥田即此按晉書載記及十六國春秋俱云述延死子傉大寒立會石勒滅劉曜懼而遷于麥田則遷者乃述延之子傉大寒非述延也河水又東北逕麥田城西又北與麥田泉水合水出城西北西南流注于河河水又東北逕麥田山西一云宋鈔本西下有谷川二字在安定西北六百四十里河水又東北逕于黒城北又東北髙平川水注之即若水也水出髙平大壟山若水谷建武八年世祖征隗囂漢從髙平第一若水谷入即是谷也按髙平第一乃城名漢志屬安定郡東北流逕髙平縣故城東漢武帝元鼎三年疑脱置字安定郡治也王莽更名其縣曰鋪睦西十里有獨阜阜上有故臺臺側有風伯壇故世俗呼此阜為風堆元和志秦長城在髙平縣北十里今平凉府荘浪縣西二十里有苦水川自靜寜流入又北入鎮原界為髙平川髙平故城在今平凉府固原州西二里明一統志云在鎮原縣東其水東北龍泉水注之水出縣東北七里龍泉東北流注髙平川川水又北出秦城秦下疑脱長字長城在縣北一十五里又西北流逕東西二太朱云太字疑誤婁故城門北合一水水有五源咸出隴山西東水發源縣西南二十六里湫淵淵在四山中湫水北流西北出長城北與次水會水出縣西南四十里長城西山中北流逕魏行宫故殿東又北次水注之出縣西南四十里山中北流逕行宫故殿西又北合次水水出縣西南四十八里東北流又與次水合水出縣西南六十里醎陽山東北流左會右疑譌或是若水總為一川東逕西婁北東注若水段熲為護羌校尉於安定髙平若水討先零斬首八千級於是水之上若水又北與石門水合水有五源東水導源髙平縣西八十里西北流次水注之水出縣西百二十里如州泉東北流右入東水亂流左會三川參差相得東北同為一川混濤歷峽峽即隴山之北垂也謂之石門口水曰石門水在縣西北八十餘里石門之水又東北注高平川川水又北自延水注之西出自延溪東流歷峡謂之自延口縣之西北一百里又東北逕延城南東入髙平川川水又北逕亷城東按地理志曰北地有亷城縣闞駰言在富平北自昔匈奴侵漢新秦之土率為狄場故城舊壁盡從故目地理淪移不可復識當是世人誤證也川水又北若水注之水發縣東北百里山流注髙平髙平又北逕三水縣西肥水注之水出髙平縣西北二百里牽條山西東北流與若勃溪水合有二源縂歸一瀆東北流入肥肥水又東北流違泉水注焉泉流所發導于若勃溪東東北流入肥肥水又東北出峽注于髙平川水東有山山東有三水縣故城本屬國都尉治王莽之廣延亭也西南去安定郡三百四十里侍郎張奐為安定屬國都尉治此按後漢書張奐𫝊奐以舉賢良對䇿第一拜議郎永夀元年遷安定屬國都尉今云侍郎恐誤當是議郎羌有獻金馬者奐召主簿張祁入於羌前以酒酹地曰使馬如羊不以入廏使金如粟不以入懷盡還不受威化大行縣東有温泉温泉東有鹽池故地理志曰縣有鹽官今於城之東北有故城城北有三泉疑即縣之鹽官也髙平川水又北入於河河水又東北逕眴卷縣故城應劭曰眴音旬日之旬卷音箘輅之箘故城在今寜夏中衞東唐為靈州鳴沙縣地地理志曰河水别出為河溝東至富平北入河河水於此有上河之名也水經注集釋訂訛卷二
