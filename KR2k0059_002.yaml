body:
  text: 水經注集釋訂訛卷二歸安沈炳巽撰河水二河水又南入葱嶺山河水重源有三非為二也一源西出身董氏云身他本作捐毒之國葱嶺之上西去休循二百餘里皆故塞種也南屬葱嶺髙千里西河舊事曰葱嶺在敦煌西八千里其山髙大上生葱故曰葱嶺也河源潜發其嶺分為二水一水西逕休循國南在葱嶺西郭義恭廣志曰休循國居葱嶺其山多大葱又逕難兠國北北接休循西南去罽賔國三百四十里河水又西逕罽賔國北月氏之破塞王南君罽賔治循鮮城土地平和無所不有金銀珍寳異畜竒物踰於中夏大國也山􅕑有大頭痛小頭痛之山赤土身熱之坂人畜同然按漢書西域𫝊罽賔國又歴大頭痛小頭痛之山赤土身熱之阪令人身熱無色頭痛嘔吐驢畜盡然河水又西逕月氏國南治監氏城其俗與安息同匈奴冐頓單于破月氏殺其王以頭為飲器國遂分逺過大宛按漢書西域𫝊作乃逺去過大宛西居大夏為大月氏其餘小衆不能去者共保南山羌中號小月氏故有大月氏小月氏之名也又西逕安息南城臨媯水地方數千里最大國也有商賈車船行旁國原本此下係西逕陀衛國注錯簡于此今從朱本改正畫革旁行為書記也按漢書西域傳安息國臨媯水商賈車船行旁國書革旁行為書記則畫字當作書也字衍師古注曰今西方胡國及南方材邑之徒書皆横行不直下也革謂皮之不柔者河水與蜺羅跂禘水同注雷翥海釋氏西域記曰蜺羅跂禘出阿耨逹山西之北逕于闐國漢書西域𫝊曰于闐以西水皆西流注于西海又西逕四大塔北釋法顯所謂竺糺一作刹尸羅國漢言截頭也佛為菩薩時以頭施人故因名國國東有投身飼一作餧餓虎處皆起塔又西逕陀衛國北是阿育王子法益所治邑佛為菩薩時亦於此國以眼施人其處亦起大塔又有佛樓沙國天帝釋變為牧牛小児聚土為佛塔法王因而成大塔所謂四大塔也法顯𫝊曰國有佛鉢月氏王大興兵衆来伐此國欲持鉢去置鉢象上象不能進更作四輪車載鉢八象共牽復不進王知鉢縁未至於是起塔留鉢供養鉢容二斗雜色而黒多四際分明厚可二分甚光澤貧人以少華投中便滿富人以多華供養正復百千萬斛終亦不滿佛圖曰佛鉢青玉也受三斗許彼國寳之供養時願終日香華不滿則如言願一把滿則亦便如言又按道人竺法維所説佛鉢在大月氏國起浮圖髙三十丈七層鉢處第二層金絡絡鎖懸鉢鉢是青石或云懸鉢虚空須菩提置鉢在金杋當是杌上佛一足跡與鉢共在一處國王臣民悉持梵香七寶璧玉供養塔跡佛牙袈裟頂相舍利悉在佛樓沙國釋氏西域記曰㨗陀越王城西北有鉢吐羅越城佛袈裟王城也東有寺重復尋川水西北十里有河歩羅龍淵疑有譌脫佛到上浣衣處浣石尚存其水至安息注雷翥海又曰㨗陀越西西海中有安息國竺枝扶南記曰安息國去私訶條國二萬里國土臨海上即漢書天竺安息國也戸近百萬最大國也漢書西域𫝊又云梨軒當是犁靬靬音軒條支臨西海長老𫝊聞條支有弱水西王母亦未嘗見自條支乘水西行可百餘日近可十日按漢書無可十日三字日所入也或河水所通西海矣故凉土異物志曰葱嶺之水分流東西西入大海東為河源禹記所云崑崙者焉張騫使大宛而窮河源謂極於此而不逹於崑崙者也河水自葱嶺分源東逕伽舍羅國釋氏西域記曰有國名伽舍羅逝此國狹小而縂萬國之要道無不由城南有水東北流出羅逝西山山即葱嶺也逕岐沙谷出谷分為二水一水東流逕無雷國北治盧城俗與其西夜子合同朱云當作其俗與西夜子合同又東流逕依䘏國當作依耐國北去無雷五百四十里俗同子合又東逕滿犁國治滿犁谷北去漢書作至䟽勒五百五十里俗與子合同河水又東逕皮山國北治皮山之城西北去莎車三百八十里其一源出于闐國南山北流與葱嶺河合東注蒲昌海河水又東與于闐河合朱云按玉海引水經其一源以下至蒲昌海是經文河水又東與于闐河合是注文南源𨗳于闐南山俗謂之仇摩置自置北流逕于闐國西治西域按漢書當是西城上多玉石西去皮山三百八十里東去陽闗五千餘里釋法顯自烏帝西南行朱云按佛國記作自夷西南行路中無人民沙一作涉行艱難所行之苦人理莫比在道一月五日得逹于闐其國殷庶民篤信大乘學威儀齊整器鉢無聲南城二十五里有利刹寺中有石鞾石上有足跡彼俗信是辟支佛跡法顯所不𫝊疑非佛跡也又西北流注于河即經所謂北注葱嶺河也南河又東逕于闐北釋氏西域記曰河水東流三千里至于闐屈東北流者也漢書西域𫝊曰于闐以東水皆東流南河又東逕扞彌國北漢書西域𫝊扞彌作杆彌注音烏治扞彌城西去于闐三百九十里南河又東逕精絶國北西去扞彌四百六十里南河又東逕且末國北又東右會阿耨逹大水釋氏西域記曰阿耨逹山西北有大水北流注牢蘭海者也其水北流逕且末南山又北逕且末城西國治且末城西通精絶二千里東去鄯善七百二十里種五榖兵俗畧與漢同又曰且末河東北流逕且末北又流而左會南河會流東逝通為注濵河注濵又東逕鄯善國北治伊循城故樓蘭之地也樓蘭王不恭於漢元鳯四年霍光使平樂監傅介子刺殺之更立後王漢又立其前王質子尉屠為王原本譌作主更名其國為鄯善百官祖道横音光門其王自請天子曰漢書無其字身在漢乆恐為前王子所害國有伊循城土地肥美願遣将屯田積粟令得依威重遂置田以鎮撫之敦煌索勱何氏云索勱事他無所考疑其上有脱文字彦義有才畧刺史毛奕表行貳師将軍将酒泉敦煌兵千人至樓蘭屯田起白屋召鄯善馬耆龜兹三國兵各千横㫁注濵河河㫁之日水奮勢激波淩冐隄勱厲聲曰王遵建節河堤不溢王霸精誠呼沱不流水德神明古今一也勱躬禱祀水猶未減乃列陣被仗鼔譟讙叫且刺且射大戰三日水乃迴減灌浸沃衍胡人稱神屯田三年積粟百萬威服外國其水東注澤澤在樓蘭國北扞泥城其俗謂之東故城去陽闗千三百里當從漢書作六百里西北去烏壘千七百五十里按漢書作去都䕶治所千七百八十五里至黒山國一千三百六十五里按漢書作至山國千八百六十五里師古曰此國山居故名山國也據此則黒字屬衍文三百當作八百西北至車師千八百九十里土地沙鹵少田仰穀傍國出玉按漢書國下更有一國字多葭葦檉栁胡桐白草國在東垂當白龍堆乏水草常主發𨗳負水擔粮迎送漢使故彼俗謂是海為牢蘭海也釋氏西域記曰南河自于闐東於衍字北三千里至鄯善入牢蘭海者也北河自岐沙東分南河即釋氏西域記所謂二支北流逕屈茨烏夷鄯善入牢蘭海者也北河又東北流分為二水枝流出焉北河自踈勒逕流南河之北漢書釋氏西域𫝊曰按漢書無所謂釋氏西域𫝊且無此文則漢書二字是衍文𫝊當作記葱嶺以東南北有山相距千餘里東西六千里河出其中暨于温宿之南左合枝水上承北河于踈勒之東西北流逕踈勒國又東北與踈勒北山水合水出北谿東南流逕踈勒城下南去莎車五百六十里有市列當大月氏大宛康居道釋氏西域記曰此句衍國有佛浴床赤真檀木作之方四尺王于宫中供養漢永平十八年耿恭以戊巳校尉為匈奴左鹿蠡王所逼恭以此城側澗傍水按後漢書耿恭傳作恭以䟽勒有澗水可固今云側澗傍水似有脱誤自金蒲遷居此城匈奴又來攻之壅絶澗水恭於城中穿井深一十五丈不得水吏士渴乏笮馬糞汁飲之恭乃仰天嘆曰昔貳師㧞佩刀刺山飛泉湧出今漢德神明豈有窮哉整衣服向井再拜為吏士禱之有頃水泉奔出衆稱萬嵗乃揚水示之虜以為神遂即引去後車師叛與匈奴攻恭食盡窮困乃煮鎧弩食其筋革恭與士卒同死生原本漏卒字咸無二心圍恭不能下闗寵上書求救建初元年明帝納司徒鮑昱之言按建初乃肅宗章帝年號今云明帝似誤遣兵救之至栁中以校尉闗寵分兵入髙昌壁攻交河城車師降遣恭軍吏范羌将兵二千人迎恭遇大雪丈餘僅能至城中夜聞兵馬大恐羌遥呼曰我范羌也城中皆稱萬嵗開門相持涕泣尚有二十六人衣屨穿决形容枯槁相依而還按後漢書耿恭𫝊比此較詳附録於後單于益兵圍恭不能下初闗寵上書求救時肅宗新即位乃詔公卿㑹議司空第五倫以為不宜救司徒鮑昱議曰今使人于危難之地急而棄之外則縱蠻夷之暴内則傷死難之臣誠令權時後無邊事可也匈奴如復犯㓂為陛下将何以使将帝然之遣兵救之建初元年正月會栁中撃車師攻交河城車師復降先是恭遣軍吏范羌至敦煌迎兵士寒服羌因隨所遣兵出塞羌固請迎恭諸将不敢前乃分兵三千人與羌從山北迎恭遇大雪丈餘軍僅能至城中夜聞兵馬聲以為虜大驚羌乃遥呼曰我范羌也漢遣軍迎校尉耳城中皆稱萬嵗開門共持涕泣明日遂相隨俱歸虜兵追之且戰且行發踈勒時尚有二十六人隨路死没三月至玉門唯餘十三人衣屨穿决形容枮槁中郎将鄭衆為恭以下洗沐易衣冠北河又東逕莎車國南治莎車城西南去蒲犁一百四十里漢書作七百四十里漢武帝開西域田于此疑當作屯田于此有鐵山出青玉北河之東南逕温宿國治温宿城土地物類與鄯善同北至烏孫赤谷六百一十里東通姑墨二百七十里於此枝河右入北河北河又東逕姑墨國南入姑墨川水注之導姑墨西北赤沙山東南流逕姑墨國西治南至于闐馬行十五日土出銅鐵及雌黄其水又東南流右注北波河又東逕龜兹國南又東左合龜兹川水有二源西源出北大山南釋氏西域記曰屈茨北二百里有山夜則火光晝日但烟人取此山石炭冶此山鐵恒充三十六國用故郭義恭廣志龜兹能鑄冶其水南流逕赤沙山釋氏西域記曰國北四十里山上有寺名雀離大清凈又出山東南流枝水左𣲖焉又東南水流三分右二水俱東南流注此河又東川水龜兹東北赤沙積梨南流何氏云句讀未詳枝水右出西南入龜兹城音屈茨也故延城矣漢書有龜兹西域記有屈茨酈注合而詁之謂龜兹即屈茨也西去姑墨六百七十里川水又東南流逕于輪臺之東也昔漢武帝初通西域置校尉屯田于此搜粟都尉桑𢎞羊奏言故輪臺以東地廣饒水草有溉田五千頃以上其處温和田美可益通溝渠種五穀收穫與中國同時匈奴弱不敢近西域於是徙莎車相去千餘里即是臺也其水又東南流右㑹西川枝水水有二源俱受西川東流逕龜兹城南合為一水水間有故城盖屯校所守也其水東南注東川東川水又東南逕烏壘國南治烏壘城西去龜兹三百五十里東去玉門陽闗二千七百四十八里與渠犂田官相近土地肥饒於西域為中故都䕶治焉漢使持節鄭吉并䕶北道故號都䕶都䕶之起自吉置也漢書注師古曰都猶總也言總䕶南北諸道其水又東南注大河大河又東右㑹敦薨之水其水出焉耆之北敦薨之山在匈奴之西烏孫之東山海經曰敦薨之水出焉而西流注于泑澤出于崑崙之東北隅實惟河源者也二源俱道西源東流分為二水西南流出於焉耆之西經流焉耆之野屈南疑當作而東南流注於敦薨之渚右水東南流又分為二左右焉耆之國城居四水之中在河水之洲治員渠城西去烏壘三百里南㑹兩水同注敦薨之浦東源東南流分為二水但澗瀾雙引洪湍濬發俱東南流逕出焉耆之東導于危須城西西去焉耆百里又東南流注于敦薨之藪川流所積渾水斯漲溢而為海史記曰焉耆近海多魚鳥東北隔大山與車師接敦薨之水自西海逕尉犁國國治黎域治下脱尉字黎當作犂域當是城西去都䕶治所三百里北去焉耆百里其水又西出沙山鐵闗谷又西南流連城别注裂以為田桑𢎞羊曰臣愚以為連城以西可遣屯田以威西國即此處也漢書西域𫝊云自敦煌西至鹽澤徃徃起亭而輪臺渠犂皆有田卒數百人置使者校尉領䕶以給使于外國者其水又屈而南逕渠犂國西故史記曰西有大河即斯水也又東南流逕渠犂國治渠犂城西北去烏壘三百四十里漢武帝通西域屯渠犂即此處也南與精絶接北與尉犂接又南流注于河山海經曰敦薨之水西流注於泑澤盖亂河流自西南注也河水又東逕墨山國南治墨山城西至尉犂二百四十里河水又東逕注賔城南又東逕樓蘭城南而東注盖發田土所屯故城禪疑當作擅國名耳河水又東注於泑澤即經所謂蒲昌海也水積鄯善之東北龍城之西南龍城故姜賴之靈朱云當作虚胡之大國也蒲海溢盪覆其國城基尚存而至何氏云二字疑誤元晨發西門暮逹東門澮何氏云以下必有脱誤其岸岸疑當作崖岸餘溜風吹稍成龍形皆西面向海因名龍城地廣千里皆為鹽而剛堅也朱云此注譌錯難以意通據御覧所引凉州異物志云姜賴之虚今稱龍城恒溪無道以感天庭上帝赫怒海溢盪傾剛鹵千里蒺藜之形其下有鹽累碁而生即此事也行人所逕畜産皆布氊臥之掘發其下有大鹽方如巨桃以次相累類霧氣雲浮寡見星日少禽多鬼怪西接鄯善東連三沙為海之北隘矣故蒲昌亦有鹽澤之稱也山海經曰不周之山注云此山形有缺不周匝處因名云西北不周風自此山出北望諸毗之山臨彼岳崇之山東望泑澤河水之所潜也其源渾渾泡泡者也注云河南出崑崙潜行地下至葱嶺出于闐國復分流岐出合而東流注泑澤已復潜行南出于積石山而為中國河也名泑澤即蒲澤一名蒲昌海廣三四百里其水停冬夏不増減去玉門關三百餘里即河之重源所謂潜行也渾渾泡泡水濆涌之聲也衮咆二音東去玉門闗一千三百里按上郭注作三百餘里廣袤四百里其水澄渟冬夏不減其中洄湍電轉為隱淪之脉當環流之上飛禽奮翮于霄中者無不墜於淵波矣即河水之所潜而出於積石也此下宜從禹貢錐指接前卷末條又出海外南至積石山有石門河水冐以西流經文海蒲昌海也又東入塞過敦煌酒泉張掖郡南敦煌今肅州西八百里廢沙州衛酒泉今肅州衛張掖今甘州衞河自蒲昌有隱淪之證並間闗入塞之始自此經當求實致也河水重源又發於西塞之外出於積石之山山海經曰積石之山其下有石門河水冐以西流是山也萬物無不有焉禹貢所謂導河自積石也孔頴逹尚書䟽曰釋水云河千里一曲一直則河從積石北行又東乃南行至於龍門漢書西域𫝊云河有兩源一出葱嶺一出于闐于闐在南山下其河北流與葱嶺河合東注蒲昌海蒲昌海一名鹽澤去玉門陽闗三百餘里廣袤三百里其水停居冬夏不増減皆以為潜行地下南出於積石為中國河禹貢錐指曰導者循行之謂先儒皆以為施功故其説多誤洪水為帝都切近之災龍門未闢而先從事於積石舍近圖逺無是理也漢志金城郡河闗縣下云積石山在西南羌中河水行塞外東北入塞内漢河闗縣今陜西西寧衞西南塞外西域𫝊云鹽澤水潜行地下南出於積石為中國河後漢縣屬隴西郡志云積石山在西南河水出此禹貢之積石也叚熲𫝊自張掖追西羌且鬭且行四十餘日至河首積石山出塞二千餘里唐書侯君集等追吐谷渾王伏允至星宿川又逹柏海北望積石山觀河源之所出是皆河闗縣西南羌中之積石自隋大業二年平吐谷渾於赤水城置河源郡以境有積石山名唐儀鳯二年改置河源軍在鄯州西百二十里鄯州即西平郡治湟水縣今為西寧衞治又於澆河故城置積石軍在廓州西南百五十里廓州治化城縣其故城在今西寕衞南百八十里元和志云積石軍西臨大澗北據黄河即隋澆河郡所治而積石之名遂移於塞内杜氏通典云積石山在今西平郡龍支縣内即禹貢導河積石蔡𫝊承其誤曰地志積石在金城郡河闗縣西南羌中今鄯州龍支縣界也閻百詩為之辯曰漢河闗縣宣帝神爵二年置後梁吕光龍飛二年克河闗凡四百五十七年為郡縣後沒入吐谷渾遂不復况積石又在其西南羌中乎當在漢西海郡之外是真當日大禹導河處龍支縣近在今西寜衞東南八十里本漢金城允吾縣地後漢為龍耆音支城元和志積石山在龍支縣西九十八里南與河州枹音孚罕縣分界枹罕今臨洮府之河州積石山在州西北七十里積石闗則又在西北百二十里所謂兩山如削河流經其中是較禹所導之積石河隔千有餘里豈在其縣界者乎縣界之積石乃小積石山即酈注之唐述山耳大小積石之名莫明辯於唐人魏王泰曰大積石山在吐谷渾界小積石在枹罕縣西北張守節曰河自鹽澤潜行入吐谷渾界大積石山又東北流至小積石山李吉甫曰河出積石山西南羌中今人目彼為大積石此為小積石然則蔡𫝊當云何曰引地志下當云今鄯州西南塞外山也漢在羌中唐在吐谷渾界今河州枹罕縣鄯州龍支縣界有積石山雖河所經非禹所導者按吐谷渾本遼東鮮卑種也在河湟之間即先零燒當諸羌故地積石在其西南南枕賜支河昔大禹導河自此始山在西羌之中燒當所居也延熹二年西羌燒當犯塞䕶羌校尉叚熲討之追出塞至積石山斬首而還司馬彪曰西羌者自析支以西濵河首濵下當有於字左右居也河水屈而東北流逕於析支之地是為河曲矣應劭曰禹貢析支屬雍州在河闗之西東去河闗千餘里羌人所居謂之河曲羌也後漢書西羌𫝊西羌之本出自三苗姜姓之别也及舜流四凶徙之三危河闗之西南羌地是也濵於賜支至乎河首綿地千里賜支者禹貢所謂析支者也南接蜀漢徼外蠻夷西北鄯善車師諸國所居無常依隨水草周之犬戎秦之義渠皆其種也羌無弋爰劍者秦穆公時為秦所執以為奴𨽻後得亡歸秦人追之藏於巖穴中秦人焚之有景象如虎為其蔽火得以不死亡入三河間三河即黄河賜支河湟河是也諸羌見其被焚不死怪其神共畏事之推以為豪後爰劍種五世至研研最豪健自後以研為種號十三世至燒當復豪健其子孫更以燒當為種號禹貢錐指曰渭按應劭云析支東去河闗千餘里河首積石南枕析支則縣距此山亦千餘里可知矣自東晉以後縣為吐谷渾所據遂以枹罕為華戎之界故唐初太子賢注後漢書誤認龍支之積石為禹貢之積石後漢桓帝紀延熹二年燒當等冦隴右䕶羌校尉叚熲追撃于羅亭破之注云東觀記曰追到積石山即與羅亭相近今鄯州三年燒當羗叛叚熲追撃于積石大破之注云積石山在今鄯州龍支縣南即禹貢導河積石是也而中葉已知其非獨杜佑不審耳宋咸平四年真宗指甘沙伊凉等州圖謂輔臣曰此圖載黄河所出之山乃在積石外與禹貢所述異盖亦以龍支之積石為禹迹也蔡氏承誤以釋經學者宗之故元都實窮河源仍以廓州西南之積石州為積石而至正中修宋史河渠志亦云黄河自貴德西寧之境至積石經河州昔郭景純注山海經曰名實相亂莫矯其失習非勝是終古不悟此之謂矣漢志馮翊夏陽縣下云禹貢龍門山在北劉昭注補郡國志云太史公曰遷生龍門韋昭謂在縣北也水經注引魏土地記曰梁山北有龍門山後魏志夏陽縣有龍門山隋改縣曰韓城今陜西西安府韓城縣也故括地志云龍門山在韓城縣北五十里此河西之山東與壺口隔水相望通典云同州韓城綘州龍門二縣有龍門山即禹所鑿是河東亦有龍門山矣然經所謂龍門在雍域不在冀孔䟽謂積石在龍支又據釋水之文故云至龍門三千餘里然其實不止於此約計有四千三百餘里若禹貢之積石更在龍支縣西南塞外一千二百餘里則自積石至於龍門當有五千五百餘里也龍門以下記河行方向甚詳而其上絶不言方向蔡𫝊云荒逺其所畧也今按龍門以上禹功所不加故數千里之河縂括為一句河自積石東北流至寧夏折而北至廢豐州折而東至東受降城折而南方向不一難以屬辭故略之非為荒逺也河自積石至於龍門所行皆雍州之域不可謂荒逺宋人見朔方西凉不入其版圖遂以荒逺目之耳東北逕歴敦煌酒泉張掖南應劭地理風俗記曰敦煌酒泉其水甘若酒味故也張掖言張國臂掖以威戎狄説文曰郡制天子地方千里分為百縣縣有四郡故春秋𫝊曰上大夫縣下大夫郡至秦始置三十六郡以監縣矣從邑君聲釋名郡羣也人所羣聚也黄義仲十三州記曰郡之言君也改公侯之封而言君者至尊也郡守専權君臣之禮彌崇今郡字君在其左邑在其右君為元首邑以載民故取名於君謂之郡漢官曰秦用李斯議分天下為三十六郡凡郡或以列國陳魯齊吳是也或以舊邑長沙丹陽何改楊是也或以山陵太山山陽是也或以川原西河河東是也或以所出金城城下得金酒泉泉味如酒豫章樟樹生庭雁門鴈之所育是也或以號令禹合諸侯大計東冶之山會計國名會稽是也河逕其南而纒絡逺矣河水又東自河曲逕西海郡南漢平帝時王莽秉政欲耀威徳以服逺方諷羌獻西海之地置西海郡而築五縣焉周海亭燧相望莽簒政紛亂郡亦廢棄禹貢錐指曰漢志金城臨羌縣西北塞外有僊海鹽池古音西與僊同僊海即西海也一名卑禾羌海亦曰青海又曰鮮水海趙充國請治湟陿以西道橋令可至鮮水左右王莽誘塞外羌獻鮮水海允谷鹽池是也郡治龍夷城在臨羌新縣西三百十里元和志云鄯州西至西海三百七十里龍夷城即今西北三百五十里威戎城也今為西寜衛西塞外地臨羌故城在衞西二百八十里浩亹河南河水又東逕允川而歴大榆小榆谷北羌迷唐鍾存所居也永元元年按後漢西羌𫝊當是五年貫友代聶尚為䕶羌校尉攻迷唐斬獲八百餘級收其熟麥數萬斛於逢留河上築城以盛其麥作大船於河峽作橋渡兵迷唐遂逺依河曲永元元年按𫝊當是九年迷唐復與鍾存東冦而還十年謁者王信耿譚西擊迷唐降之詔聼還大小榆谷迷唐種人以漢造浮橋兵來無時故地不可居復叛居河曲與羌為讐種人與官兵擊之允川去迷唐數十營止遣輕兵挑戰因引還迷唐追之至營因戰迷唐敗走於是西海及大小榆谷無復聚落隃糜縣名屬右扶風相曹鳳上言建武以來西戎數犯法常從燒當種起所以然者以其居大小榆谷土地肥美又近塞内與諸種相傍南得鍾存以廣其衆北阻大河因以為固又有西海魚鹽之利繽出沿河四字譌按𫝊當是縁山濵水以廣田畜故能强大常雄諸羌今黨援沮壞按𫝊當作黨援壞阻親屬離畔其餘勝兵不過數百宜及此時建復西海郡縣規固二榆廣設屯田隔塞羌胡交闗之路殖榖富邊省輸轉之役上拜鳯為金城西部都尉遂開田二十七部朱箋云後漢書作開屯田二十七部列屯夾河夾河與建威相首尾後羌反乃罷按叚國沙州記吐谷渾於河上作橋謂之河厲長一百五十步兩岸累石作基陛節節相次大木縱横更鎮壓兩邊俱字疑譌或作徃字來相去三丈並大材以板横次之施鉤欄甚嚴飾橋在清水川東也錐指允川在西寧衞西南塞外大小榆谷即唐之九曲也東去積石軍三百里水甘草良宜畜牧睿宗時楊矩為鄯州都督奏請黄河九曲之地以為金城公主湯沐之所吐蕃既得頓兵畜牧又與唐境接近自是復叛天寶中哥舒翰為隴右節度使復收九曲置澆河洮陽二郡髙適作九曲詞以美其功乂東過隴西河闗縣北洮從注當是澆水從東南來流注之隴西今臨洮府河闗縣在今河州西河水右當是又逕沙州北段國曰澆河朱云段國沙州記云洮水與墊江水俱出嵹臺山而此注説澆水知經文洮字乃傳冩之誤耳西南一百七十里有黄沙沙南北一百二十里東西七十里西極大楊川望黄沙猶若人委干于地太平御覽引作若人委乾糒于地都不生草木蕩然黄沙周迴數百里沙州於是取號焉地理志曰漢宣帝神爵二年置河闗縣盖取河之闗塞也風俗通曰百里曰同縂名為縣縣𤣥也首也從系倒首與縣易偏矣言當𤣥静徭役也朱云御覧引作𤣥静平徭役今本風俗通缺釋名又曰縣也懸於郡矣按釋名云縣懸也懸係于郡也黄義仲十三州記曰縣弦也弦以貞直言下體之居鄰民之位二句疑誤居或當作君鄰或當作臨不輕其誓施繩用法不曲如弦弦聲近縣故以取名今縣字在半也漢帝元年令天下縣邑城按漢書髙帝紀六年令天下縣邑城今云元年誤張晏曰令各自築其城也河水又東北流入西平郡界左合二川南流入河又東北濟川水注之後漢建安中析金城郡臨羌等縣置西平郡治西都縣後魏置鄭州隋改縣曰湟水其故城即今西寕衞治元和志云湟水縣本漢破羌縣也水西南出濫瀆東北流入大谷謂之大谷水北逕澆河城西南北流注于河河水東又逕澆河故城北南凉秃髪烏孤以河南地為澆河郡治此城唐于此復置澆河郡其東為積石軍有二城東西角倚當作掎東北去西平二百二十里宋少帝景平中拜吐谷渾阿豺為安西将軍澆城公即此城也宋書吐谷渾阿豺表獻方物詔嘉其慕義授安西將軍沙州刺史澆河公河水又東北逕黄川城河水又東逕石城南左合北谷水昔段熲擊羌於石城投河墜坑而死者八百餘人即於此也按後漢書段熲𫝊延熹三年熲追虜至河首積石山出塞二千餘里分兵擊石城羌斬首溺死者千六百人與此稍異後魏石城縣廢帝改化隆唐改化城廓州治焉元和志云黄河在縣南八十里河水又東北逕黄河城南黄河廣違二城俱在廓州境内西北去西平二百一十七里河水又東北逕廣違城北又合馬頭川水水發逺川引納支津北逕城東而北流注于河河水又東逕邯川城南廢廓州城東南有邯川城秃髪傉檀所置邯川䕶軍也城之左右歴谷有三水導自北山南逕邯亭注于河河水又東臨津溪水注之水自南山北逕臨津城西而北流注于河河水又東逕臨津城北白土城南十三州志曰左南津西六十里白土城城在大河之北而為縁河濟渡之處北魏凉州刺史郭淮何氏云北字衍淮領雍州非凉州也破羌遮寒魏志作遮塞於白土即此處矣臨津城在今河州西北一百二十里隋曰臨津闗大業五年自将伐吐谷渾出臨津闗渡黄河至西平即此城也白土城在今西寕衛南河水又東左會白土川水水出白土城西北下東南流逕白土城北又東南注于河河水又東北會兩川右合二水參差夾岸連壤負嶮相望河北有層山山甚靈秀山峰之上立石數百丈亭亭桀竪競勢爭髙逺望嵾嵾若攅圖之託霄上其下層巖峭舉壁岸無階懸崖之中多石室焉室中若有積卷矣而世士罕有津逮者因謂之積書巖巖堂之内每時見神人往還矣盖鴻衣羽裳之士練精餌食之夫耳俗人不悟其仙者乃謂之神鬼彼羌目鬼曰唐述復因名為唐述山指其堂宻之居謂之唐述窟其懷道宗𤣥之士皮冠浄髪之徒亦徃棲託焉故秦州記曰河峽崖傍有二窟一曰唐述窟髙四十丈西二里有時亮窟髙百丈廣二十丈深三十丈藏古書五字朱云當作五笥亮南安人也下封朱云當作崖下有水導自是山谿水南注河謂之唐述水西寜衞東南八十里有龍支故城本漢允吾縣地後漢置龍耆城和帝以曹鳯為金城西部都尉屯龍耆是也後魏於此置北金城縣西魏改曰龍支元和志積石一名唐述山今名小積石山在鄯州龍支縣西九十八里河州枹罕縣北七十里黄河在龍支縣西南六十里枹罕縣北五十里河水又東得野亭南又東北流歷研川謂之研川水又東北注于河謂野城口河水又東歷鳯林北鳯林今在河州北隋志枹罕縣有鳯林山元和志云在縣北三十五里鳯林山名也五巒俱峙耆諺云昔有鳯鳥飛遊五峰故山有斯目矣秦州記曰枹罕原北名鳯林川川中則黄河東流也河水又東與灕水合水導源塞外羌中故地理志曰其水出西塞外東北流歴野虜中逕消銅城西又東逕河列城東考地説無目盖出自戎方矣左右列水水出西北溪東北流逕列城北又入灕水城居二水之會也灕水又北逕可石孤城西西戎之名也又東北石朱云當是右合黒城溪水水出西北谿下東南流逕黒城南又東南枝水左出焉又東南入灕水又東北逕榆城東榆城溪水注之水出素和細越西北山下東南流逕于細越川夷俗鄉名也又東南出狄周峽東南右合黒城溪之枝津津水上承溪水東北逕黒城東東北注之榆溪又東南逕榆城南東北注灕水灕水又東北逕石門口山髙嶮絶對岸若門故峽得厥名矣疑即臯蘭山門也漢武帝元狩三年驃騎霍去病出隴西至臯蘭應謂是山之闗塞也漢書音義曰臯蘭應在隴西白石縣塞外河名也孟康曰山闗名也今是山去河不逺故論者疑目河山之間矣灕水又東北臯蘭山水自山左右翼注灕水灕水又東白石川水注之水出縣西北下東南流枝津東注焉白石川水又南逕白石城西而注灕水水又東逕白石縣故城南王莽更曰順礫闞駰曰白石縣在狄道西北二百八十五里灕水逕其北今灕水逕東南注之而不出其北也灕水又東逕白石山北應劭曰白石山在東羅溪注之水出西南山下東入灕水灕又東左合罕开南谿水出罕开西東南流逕罕开南十三州志曰廣大坂在枹罕西北罕开在焉昔慕容吐谷渾自燕歷隂山西馳而創居於此灕水又東逕枹罕縣故城南應劭曰故罕羌侯邑也十三州志曰枹罕縣在郡西二百一十里灕水在城南門前東過也灕水又東北故城川水注之水有二源南源出