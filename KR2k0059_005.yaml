文安知此二句不是前條之注誤作經文恐因歴久𫝊訛遂致舛錯亦未可定耳又屈逕其城東故瀆廣四十步又東北逕重丘縣故城西重丘在今東昌府城東南跨荏平縣界春秋襄公二十五年秋同盟重丘伐齊故也應劭曰安徳縣五十里有重丘鄉故縣也又東北逕西平昌縣故城北西平昌今為濟南府徳平縣北海有平昌縣故加西漢宣帝元康元年封王長君為侯國按史記褚先生補表作元康元年封帝舅王長君名無故漢書外戚恩澤侯表作地節四年封帝舅節侯王無故此盖従史記故渠川𣲖東入般縣為般河何氏云疑即勾盤也葢亦九河之一道也漢書稱公孫瓚破黄巾于般河即此瀆也又東為白鹿淵水南北三百步東西千餘步深三丈餘其水冬清而夏濁渟而不流若夏水洪泛水深五丈方乃通注般瀆又逕般縣故城北王莽更之曰分明也東逕樂陵縣故城北樂陵縣今屬濟南府地理志曰故都尉治伏琛晏謨言平原邑今分為郡又東北逕陽信縣故城南東北入海今屬濟南府屯氏河故瀆自别河東逕甘陵之信鄉縣故城南地理志曰安帝更名安平應劭曰甘陵西北十七里有信鄉故縣也屯氏故瀆又東逕甘陵縣故城北逕靈縣北又東北逕鄃縣與鳴犢河故瀆合上承大河故瀆于靈縣南地理志曰河水自靈縣别出為鳴犢河者也東北逕靈縣東東入鄃縣而北合屯氏瀆原本譌以酈注接經文今從朱本改正屯氏瀆兼鳴犢之稱也又東逕鄃縣城北東北合大河故瀆謂之疑漏鳴犢二字按漢書溝洫志元帝永光五年河決清河靈鳴犢口在今高唐州界口十三州志曰鳴犢河東至修入屯氏考瀆則不至也又東北右過衛國縣南又東北逕濮陽縣北瓠子河出焉河水東逕鐡丘南春秋左氏𫝊哀公二年鄭罕達帥師郵無恤御簡子衛太子為右登鐡上按左𫝊注云鐡丘名望見鄭師衛太子自投車下即此處也京相璠曰鐡丘名也杜預曰在戚南河之北岸有目城後漢書郡國志作河牧城城戚邑也東城有子路冢明一統志子路墓有三一在清豐縣西南三十里一在開州北十里一在長垣縣北三里盖子路嘗為蒲宰後死孔悝之難蒲人塟之然三墓未知孰是河北有竿城宋本作河之西岸有竿城郡國志曰衛縣有竿城者也河南有龍淵宫武帝元光中河決濮陽汜郡十六發卒十萬人塞決河起龍淵宫葢武帝起宫於決河之傍龍淵之側故曰龍淵宫也元和志鐡丘在衛南縣東南本漢濮陽縣地在今大名府開州北五里河水東北流而逕濮陽縣北為濮陽津濮水在今開州東南六十里故城在南與衛縣分水城北十里有瓠河口有金堤宣房堰粤在漢世河決金隄涿郡王遵按漢書當作尊下同自益州刺史按漢書當作自徐州刺史遷東郡太守河水盛溢泛浸瓠子金隄決壞遵躬率民吏投沈白馬祈水神河伯親執圭璧請身填堤廬居其上吏民皆走遵立不動而水波齊足而止公私壯其勇節濮陽故城今在開州西南二十里河水又東北逕衛國縣南今為東昌府觀成縣東為郭口津河水又東逕鄄城縣北一作國口故城在河南一十八里王莽之鄄良也沇州舊治魏武創業始自於此河上之邑最為峻固晉八王故事曰東海王越治鄄城城無故自壞七十餘丈越惡之移治濮陽城南有魏使持節征西將軍太尉方城侯鄧艾廟廟南有艾碑秦建元十二年廣武將軍沇州刺史闗内侯安定彭超立河之南岸有新城宋寧朔將軍王𤣥謨前鋒入河所築也北岸有新臺鴻基層廣高數丈衛宣公所築新臺矣詩齊何氏云齊字疑姜所賦也為廬關津臺東有小城崎嶇䫋側臺枕河俗謂之底閣城疑故關津都尉治也所未詳矣漢志東郡有畔觀縣後漢更名為衛國今東昌府觀成縣地及清豐之南境開州之北境皆是鄄城縣故城在河南十八里今在濮州東二十里河水又東北逕范縣之秦亭西今東昌府范縣東南有范縣故城春秋經書築臺扵秦者也左𫝊莊三十一年築臺扵秦地道記在縣西北河水又東北逕委粟津大河之北即東武陽縣也寰宇記觀成縣東南六十七里有委粟城盖與津相近東武陽即今東昌府朝城縣左㑹浮水故瀆故瀆上承大河扵頓丘縣而北出頓丘縣即今大名府清豐縣其故城在縣南二十五里東逕繁陽故城南繁陽故城在大名府内黄縣東六十里故應劭曰縣在繁水之陽明統志繁水在南樂縣闕三十五里元志在内黄縣東二十六里張晏曰縣有繁淵春秋襄公二十年經書公與晉侯齊侯盟于澶淵杜預曰在頓丘縣南今名繁汙澶淵即繁淵也亦謂之浮水焉今開州城南有澶淵城昔魏徙大梁趙以中牟易魏故志曰趙南至浮水繁陽即是瀆也故瀆東絶大河故瀆東逕五鹿之野晉文公受塊于野人即此處矣京相璠曰今衛國縣西北三十里有五鹿地今屬頓丘縣明一統志大名府城東有五鹿墟晉文公受塊于野人即此處又開州南三十里有五鹿城魯伐衛取五鹿葢此城也浮水故瀆又東南逕國邑城北故衛公國也漢光武以封周後也又東逕衛國縣故城南古斟觀應劭曰夏有觀扈即此城也竹書紀年梁惠成王二年齊田壽帥師伐趙圍觀觀降竹書作伐我浮水故瀆又東逕河牧城而東北出郡國志曰衛國姚姓有河牧城後漢書郡國志曰衛本觀故國姚姓此漏本觀故三字又東北入東武陽縣東入河又有漯水出焉戴延之謂之武陽也地理志曰漯水出東郡武陽縣今漯水上承河水于武陽縣東南西北逕武陽新城東曹操為東郡所治也引水自東門石竇北注于堂池池南故基尚存中城内又立一石甚大城西門名氷井門門内曲中氷井猶存門外有故臺號武陽臺匝臺俱有隅雉遺迹武陽臺在今東昌府莘縣界内河水又東逕武陽縣東范縣西而東北流也又東北過東阿縣北河水於范縣東北流為倉亭津東阿縣今屬兖州府述征記曰倉亭津在范縣界去東阿六十里魏土地記曰津在武陽縣東北七十里津河濟名也漢東阿故城在今陽榖縣東北范縣即今范縣倉亭津在縣西北河水又歴柯澤春秋左𫝊襄公十四年衛孫文子敗公徒于柯澤者也按左𫝊作阿澤杜注云濟北東阿縣西南有大澤逕東阿縣故城西而東北流注此下疑漏鄧里渠三字河水枝津東出謂之鄧里渠也又東北過茌平縣西河自鄧里渠東北逕昌鄉亭北逕碻磝城西茌平前漢書作茬平後漢書作荏平水經注作茌平宋宋景文曰當作茌述征記曰嚚磝朱本云當作碻磝津名也自黄河泛舟而渡者皆為津也其城臨水西南崩于河宋元嘉二十七年以王𤣥謨為寧朔將軍前鋒入河平碻磝守之都督劉義恭以沙城不守召𤣥謨令毁城而還按宋書王𤣥謨𫝊作江夏王義恭以為碻磝不可守召令還今此漏可字後登城之魏立濟州治此也王海引此作後更城之魏置鎮守名濟州闗按魏書地形志濟州治濟北碻磝城泰當八年置河水衝其西南隅又崩扵河即故茌平縣也應劭曰茌山名也縣在山之平陸故曰茌平也王莽之功崇矣經曰大河在其西鄧里渠歴其東即斯邑也昔石勒之𨽻師懽屯耕扵茌平聞鼔鞞之聲扵是縣也朱云十六國春秋後趙録石勒年二十餘為司馬騰所執賣充軍實至平原賣與茌平人師懽為奴每屯耕于野嘗聞鞞鐸之音勒以告諸奴而與柳城分河茌平今屬東昌府其故城在縣西三十里縣南有濟州城即古碻磝城河水又與鄧里渠水上承大河于東阿縣西東逕東阿縣故城北故衛邑也應仲瑗曰有西故稱東魏封曹雄為侯國朱云按魏志曹植自雍丘王徙封東阿王非侯國也宗室中亦無名雄者大城北門内西側臯上有大井其巨若輪深六七丈嵗嘗煮膠以貢天府本草所謂阿膠也故世俗有阿井之名阿井今在陽榖縣東北六十里水清冽而甘煮草為膠可以愈疾舊屬東阿故名阿井縣出佳繒縑故史記云秦昭王服太阿之劒阿縞之衣也又東北逕臨邑縣臨邑今屬濟南府與將渠合又北逕茌平縣東臨邑縣故城西北流入于河河水又東北流逕四瀆津原本漏逕字長通典盧縣東有漢臨邑縣故城盧縣今為濟南府清縣四瀆津當在縣界臨邑故城東北津西側岸臨河有四瀆祠東對四瀆口河水東分濟亦曰泲水受河也然滎口水右斷門不通始自是出東北流然字之下疑有譌脫逕九里與清水合放泲瀆也自河入濟自泲入淮自淮達江水徑周通故有四瀆之名也昔趙殺鳴犢仲尼臨河而歎自是而返曰丘之不濟命也夫朱箋史記孔子世家孔子既不得用扵衛將西見趙簡子至扵河而聞竇鳴犢舜華之死也臨河而歎曰美哉洋洋乎丘之不濟此命也夫子貢趨而進曰敢問何謂也孔子曰竇鳴犢舜華晉國之賢大夫也趙簡子未得志之時須此兩人而後従政及其已得志殺之乃從政丘聞之也刳胎殺夭則麒麟不至郊竭澤涸魚則蛟龍不合隂陽覆巢毁卵則鳯凰不翔何則君子諱傷其類夫鳥獸之不義也尚知避之而况乎丘哉乃還索隠曰家語云聞趙簡子殺竇犨鳴犢及舜華國語云鳴鐸竇犨則竇犨字鳴犢聲轉字異琴操以為孔子臨狄水而歌矣狄水衍兮風揚波船楫顛倒更相加余按臨濟故狄也是濟所逕也得其通稱河水又逕楊墟縣之故城東俗猶謂是城曰陽疑當作楊城矣河水又逕茌平縣東城内有故臺世謂之時平城非也盖茌時音相近耳疑縣徙也又東北過高唐縣界河水於縣何氏云河水扵縣漯水注之八字疑屬經文漯水注之此下原本有地理志曰至遺迹止一百字已見前注譌覆于此當屬衍文従朱本刪水自城東北逕東武陽縣故城南應劭曰縣在武水之陽王莽之武昌也然則漯水亦或武水也臧洪為東郡太守治此曹操圍張超扵雍丘洪以情義請袁紹救之不許洪與紹絶紹圍洪城中無食洪呼吏士曰洪扵大義不得不死諸君無事空受此禍衆泣曰何忍捨明府也男女八千餘人按後漢書臧洪𫝊當作七八十人相枕而死洪不屈紹殺洪邑人陳容為丞謂曰寧與臧洪同日死不與將軍同日生紹又殺之士為傷歎今城四周紹圍郭尚存水匝隍壍扵城東北合為一瀆東北出郭逕陽平縣之岡城西陽平故城今為東昌府莘縣治岡城在縣西南七里新志云故流今堙惟縣城西門外少南三里許有大陂廣十餘里其勢突城而東與陽榖縣西陂連夏秋積潦并成巨浸相𫝊為古漯河匪流處郡國志曰陽平縣有岡成亭逕陽平縣故城東漢昭帝元平元年封丞相蔡義為侯國漯水又北逕莘道城之西在今莘縣北北有莘亭春秋桓十年衛宣公使伋使諸齊令盜待扵莘伋壽繼殞扵此亭按左𫝊盜殺二子乃桓公十六年今云十年漏六字京相璠曰今平陽二字疑衍或當作東郡陽平縣北一十里有故莘亭道阨限蹊四字疑有譌誤要自衛適齊之道也望新臺扵河上感二子扵宿齡朱云宿當作夙詩人乗舟誠可悲矣今縣東有二子廟猶謂之孝祠矣漯水又東北逕樂平縣故城東故城在今堂邑縣東南三十里縣故清也漢高帝八年封宫中同於清朱箋按史記功臣表高祖八年封清簡侯空中漢功臣表作室中同徐廣曰一作窒中索隠曰窒中姓也無作宫中者宫字誤宣帝封許廣漢少弟翁孫為朱本作于樂平並為侯國王莽之清治矣漢章帝建始中更従今名也漯水又北逕聊城故城西聊城縣今為東昌府治古聊城在府城西北一十五里城内有金城周匝有水南門有馳道絶水南出自外泛舟而行矣東門側有層臺秀出魯仲連所謂還高唐之兵郤聊城之衆者也漯水又東北逕清河縣故城東城在今清平縣南清平本漢貝丘縣其西南有貝丘城地理風俗記曰甘陵故清河清河在南一十七里今扵甘陵縣故城東南無城以擬之直東二十里有艾亭城東南四十里有此城疑即清河城也後蠻居之故世稱蠻城也朱本無也字漯水又東北逕文鄉縣城東南又東北逕博平縣文鄉城亦在清平縣南博平城在今博平縣西北三十里故城内有層臺秀上王莽改之曰加睦也右與黄溝同注川澤黄溝承聊城郭水水泛則津注水耗則輟流自城東北出逕清河城南又東北逕攝城北春秋所謂聊攝以東也俗稱郭城非也城東西三里南北二里東西隅有金城城卑下墟郭尚存左右多墳隴京相璠曰聊城縣東北三十里有故攝城今此城西去聊城二十五六里許即攝城者也攝城在今博平縣西南二十里又東逕文鄉城又東南逕王城北魏太常七年安平王鎮平原所築世謂之王城太和二十三年罷鎮立平原郡治此城也黄溝又東北逕左與漯水隠覆勢鎮河陸東出扵高唐縣大河右迤東注漯水矣桑欽地理志曰地理志非桑欽所撰何得曰桑欽地理志盖漯水出高唐句乃地理志引桑欽之言當云地理志曰桑欽言漯水出高唐方是漯水出高唐余按竹書穆天子𫝊稱丁卯天子自五鹿東征釣于漯水以祭淑人是曰祭丘己巳天子東征食馬于漯水之上尋其沿歴逕趣不得近出高唐也桑氏所言盖津流出次于所間去聲也俗以是水上承于河亦謂之源河矣禹貢錐指曰源河乃漯之再出者桑欽惟知此而不知起東武陽則疎矣河既與漯合復分為二漯由漯隂故城北河由平原故城東盖自高唐以西至武陽河在南而漯在北自高唐以東至海則漯在南而河在北矣今禹城縣南有源陽故城唐縣在源河之北故名漯水又東北逕援縣故城西王莽之東順亭也杜預釋地曰濟南祝阿縣西北有援城援城今在禹城縣西南漢志作瑗漯水又逕高唐縣故城東昔齊威王使盻子守高唐趙人不敢漁扵河即魯仲連子謂田巴曰今楚軍南陽趙伐高唐者也春秋左𫝊哀公十年趙鞅帥師伐齊取黎及轅毁高唐之郭杜預曰轅即援也祝阿縣西北有高城高唐城今在濟南府禹城縣西四十里禹城本漢祝阿縣漯水又東北逕漯隂縣故城北縣故黎邑也漢武帝元光三年封匈奴降王王莽更名翼城歴北漯隂城南伏琛謂之漯陽城南有魏沇州刺史劉岱碑地理風俗記曰平原漯隂縣今巨漯亭是也按臨邑縣西有漯隂故城元和志漯水北去臨邑縣七里漯水又東北逕著縣故城南城在今濟陽縣西南又東北逕崔氏城北城今在章丘縣西北春秋左傳襄公二十七年崔成請老扵崔氏按左傳無氏字者也杜預釋地曰濟南東朝陽縣西北有崔氏城漯水東南逕東朝陽縣故城南城亦在章丘縣西北漢高帝六年按漢表是七年封都尉華寄為侯國地理風俗記曰南陽有朝陽縣故加東地理志曰王莽之修治也漯水又東逕漢徴君伏生墓南碑碣尚存以明經為秦博士秦坑儒士伏生隠焉漢興教扵齊魯之間文帝撰五經尚書太傅安帝徴之年老不行及使掌故歐陽生等受尚書于徴君號曰伏生者也漯水又東逕鄒平縣故城北今濟南府青城縣界有東鄒故城有原本譌作右鄒侯國舜後姚姓也漯水又東北逕建信縣故城北今在青州府高苑縣西北漢高帝七年封婁敬為侯國按史漢功臣表俱不列婁敬封國漢志建信下亦不曰侯國敬𫝊亦但云封敬二干石為闗内侯號建信侯則知建信之號乃虚名非封國也今云封為侯國恐非是應劭曰臨沛縣西北五十里臨沛當作臨泲有建信侯疑屬衍文城都尉治故城者也漯水又東北逕千乗縣二城間漢高帝六年以為千乗郡王莽之建信也章帝建初四年為王國和帝永元七年改為樂安郡故齊也伏琛曰千乘城疑漏在字齊城西北一百五十里隔㑹水即漯水之别名也元和志千乗故城在淄州高苑縣北二十五里又東北為馬常坈朱箋玉篇坈音而勇切地名今按下文里數則坈乃澱泊之類韻補云與坑同坈東西八十里南北三十里亂河枝流而入扵海河海之饒兹焉為最地理風俗記曰漯水東北至千乗入海河盛則通津委海水耗則㣲涓絶流書浮扵濟漯亦是水者也禹貢錐指曰此自西漢末以迄後魏漯川之原委也以今輿地言之濬縣滑縣開州清豐並屬直𨽻大名府觀成濮州范縣朝城莘縣堂邑聊城清平博平並屬山東東昌府禹城臨邑濟陽章丘鄒平齊東青城並屬濟南府高苑屬青州府諸州縣界中皆古漯水之所經自宋世河決商胡疑當作河朝城流絶而舊迹之存者鮮矣又東北過楊墟縣東商河出焉地理志曰楊墟平原之𨽻縣也漢景帝四年按漢書王子侯表是文帝四年今云景帝誤以封齊悼恵王子將廬按史記齊悼恵王世家及漢表俱作將閭今云將廬従史表也為侯國也城在高唐城之西南經次扵此是不比也商河首受河亦漯水及澤水所潭水也禹貢錐指引此作澤水所澤也淵而不流世謂之清水自此雖沙漲填塞厥迹尚存歴澤而北俗謂之落里坈逕張公城西又北重源潛發世謂之落里坈亦曰小漳河商漳聲相近故字與讀移耳元和志云漢鴻嘉四年河水泛溢河隄都尉許商鑿此河通海故以商為名商河行大河之南漯水之北商河又北逕平原縣東又逕安徳縣故城南又東北逕昌平縣故城南又東逕般縣故城南又東逕樂陵縣故城南般縣故城在今徳平縣東北樂陵故城在今樂陵縣界漢宣帝地節四年封侍中史子長為侯國漢表史高封樂陵侯今云子長高字也商河又東逕初鄉縣故城南初鄉故城在今商河縣西北高后八年封齊悼恵王子劉辟光為侯國也王莽更之曰張鄉也應劭曰般縣東南六十里有初鄉城故縣也按漢志平原郡朸縣莽曰張鄉應劭曰音力絶無所謂初鄉縣者况劉辟光亦封朸侯則應作朸縣明矣鄉字亦疑衍又按史漢表悼恵王子辟光于文帝四年封朸侯今云高后八年亦誤沙溝水注之水南出大河之陽泉源之不合河者二百步其水北流注商河商河又東北流逕馬嶺城西北而流二字疑衍屈而東注南轉逕城東城在河曲之中東海王越斬汲桑扵是城朱箋十六國春秋後趙録永嘉元年冬并州人田蘭等起兵斬汲桑于樂陵晉書載記石勒奔樂平東海王越追斬汲桑于平原商河又東北逕冨平縣故城北今濟南府陵縣東北二十里有厭次故城地理志曰侯國也王莽曰安樂亭應劭曰明帝更名闞駰四厭次縣本冨平矣車騎將軍張安世之封邑非也按漢書昭帝元鳯六年封右將軍張安世為富平侯薨子延壽嗣國在陳留别邑按漢書此下尚有在字魏郡陳留風俗𫝊曰陳留尉氏縣安陵鄉故冨平縣也是乃安世所食矣歲入租千餘萬延壽自以身無功徳何堪久居先人大國上書減户天子以為有讓徙封平原并食一邑户口如故而稅減半十三州志曰明帝永平五年改曰厭次矣按史記高祖功臣侯者表高帝六年封元頃為侯國徐廣音義曰漢書作侯爰類字按漢表作厭次侯爰類是知厭次舊名非始明帝盖復故耳縣西有東方朔冢東方朔墓今在陵縣東北二十二里有唐顔魯公所書碑刻側有祠祠有神驗水側有雲城漢武帝元封四年封齊孝王子劉信為侯國也按漢書王子侯表雲侯信乃元朔四年封非元封也商河又分為二水南水謂之長聚溝東流傾注為海溝南海疑作水側有蒲臺臺高八丈方二百步三齊略記曰鬲城東南有蒲臺秦始皇東遊海上於臺下蟠蒲繫馬至今嵗疑漏一歲字蒲生縈委若有繫狀似水楊可以為箭今東去海三十里蒲臺今為縣屬濟南府北水世又謂之白薄瀆東北流注扵海水矣大河又東北逕高唐縣故城西春秋左𫝊襄公十九年齊靈公廢太子光而立公子牙以夙沙衛為少傅齊侯卒崔杼逆光光立殺公子牙于句瀆之丘衛奔高唐以叛京相璠曰本平原縣也為為字誤朱本改作魏謝云當作齊之西鄙也大河逕其西而不出其東經言出東誤耳高唐故城在今禹城縣西四十里本齊高唐邑齊趙以河為境威王曰吾臣有盻子使守高唐則趙人不敢漁扵河即此河也大河又北逕張公城臨側河湄魏青州刺史張治此故世謂之張公城水有津焉名之曰張公渡在今平原縣南六十里河水又北逕平原縣故城東故城在今縣南地理風俗記曰原博平也故曰平原矣縣故平原郡治矣漢高帝六年置王莽改曰河平也晉灼曰齊西有平原河河水北過高唐縣即平原也故經言河水逕高唐縣東非也按地理志曰高唐平原也高唐漯水所出平原則篤馬河導焉明平原非高唐大河不得出其東審矣大河右溢世謂之甘棗溝水側多棗故俗取名焉河盛則委泛水耗則輟流故瀆又東北歴長堤逕温隂縣北按漢志有漯隂而無温隂宋本亦作漯隂恐當依宋本為是下同東逕著城北東為波淀淵潭相接世謂之穢野薄河水又北逕陽阿縣故城東朱本作西漢高帝六年封郎中萬訢為侯國按史漢功臣表俱無陽阿侯萬訢其人者且漢志陽阿屬上黨郡河水扵此非入上黨之所恐有譌誤應劭曰温亦當作漯隂縣東南五十里有阿陽鄉故縣也按陽阿縣屬上黨郡漯隂縣屬平原郡一在并州一在青州相去遼逺必非河水同逕之地按平原郡有阿陽與漯隂相連則宜作阿陽無疑但所謂侯國則史漢表有陽阿而無阿陽恐所云萬訢者不足憑也又東北過漯陽縣北按漯水下注云北漯隂城伏琛謂之漯陽城在今青城縣界漯水之北河水自平原左逕安徳城東而北為鹿角津今陵縣治即安徳故城縣東南有鹿角闗因津為名與臨邑縣接界東北逕般縣樂陵朸鄉厭次縣南為厭次河漢安帝永初二年劇賊畢毫等數百乗船㓂平原縣令劉雄門下小吏所輔浮舟追至厭次津與賊合戰並為賊擒求代雄毫縱雄扵此津所輔可謂孝盡愛敬義極君臣矣河水又逕漯隂縣故城北一作右逕王莽之臣武縣也河水又東北為漯沃津漯沃縣故城南王莽之近亭者也地理風俗記曰千乗縣西北五十里有大河河北有漯沃城故縣也魏改為後部亭今俗遂名之曰右輔城今蒲臺縣東有漯沃故城河水又東逕千乗城北伏琛之所謂千乗北城者也今高苑縣北有千乗故城未知是此城否又東北過黎城縣北禹貢錐指據濟水經文改作利縣云彼注云地理志齊郡有利縣晏謨曰縣在齊城北五十里今博興縣東有利縣故城又東北過甲下邑濟水従西來注之又東北入于海河水又東分為二水枝津東逕甲下城南東南歴常沇按上文有馬常坈經文此當云歴馬常坈為是注濟經言泲水注河水自枝津東北流至甲下邑北世謂之倉子城非也又東北流入于海淮南子曰九折注為海而流不絶者崑崙之輸也尚書禹貢曰夾石碣石入于河山海經曰碣石之山繩水出焉東流注于河河之入海舊在碣石今川流所導非禹瀆也周定王五年河徙故瀆故班固曰商渇朱本作碣周移也又以漢武帝元光二年河又徙東郡更注渤海是以漢司空掾王横言曰往者天常連北風海水溢西南出寖數百里故張君云碣石在海中葢淪扵海水也昔燕齊遼曠分置營州今城届海濵海水北侵城垂淪平謝云宋本作城垂淪者半王横之言信而有徴碣石入海非無證禹貢錐指以今輿地言之滑縣開州並屬直𨽻大名府觀城濮州范縣朝城並屬山東東昌府陽榖屬兖州府茌平屬東昌府禹城平原陵縣徳平樂陵商河武定青城蒲臺並屬濟南府高苑博興並屬青州府諸州縣界中皆東漢以後大河之所行也水經注集釋訂訛卷五
