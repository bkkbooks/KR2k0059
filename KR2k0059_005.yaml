body:
  text: 水經注集釋訂訛卷五歸安沈炳巽撰河水五漯水河水又東過平隂縣北湛水従北來注之河水又東逕河陽縣故城南湛水篇云湛水岀河内軹縣西北山東南流當平隂懸之東北南入扵河今懷慶府濟源縣西南有湛水春秋經書天王狩于河陽壬申公朝于王所晉侯執衛侯而歸于京師春秋左𫝊僖公二十八年冬㑹于温執衛侯是㑹也晉侯召襄王以諸侯見且使王狩仲尼曰以臣召君不可以訓故書曰天王狩于河陽言非其狩地服䖍賈逵曰河陽温也班固漢書地理志司馬彪袁崧郡國志晉太康地道記十三州志河陽别縣非温邑也漢髙帝六年封陳絹按漢書功臣表作涓為侯國王莽之河亭也十三州志曰治河上河孟津河也郭縁生述征記曰踐土今治坂城是名異春秋焉非今河北見者河陽城故縣也在治坂西北葢晉之温地故羣儒有温之論矣魏土地記曰治坂城舊名漢祖渡城嶮固南臨孟津河洛陽西北四十二里故鄧鄉矣今懷慶府孟縣西南三十里有河陽故城相𫝊潘安仁種花滿縣今其地皆斥鹵矣河水又臨平亭北帝王世紀曰光武𦵏臨平亭南西望平隂者也禹貢錐指注曰後漢明帝紀原陵注云臨平亭南去洛陽十五里今按明帝紀中無此注河水又東逕洛陽縣北洛陽故城漢河南郡治在今洛陽縣東北二十里河之南岸有一碑北面題云洛陽北界水二渚分為之也上舊有河平侯祠祠前有碑今不知所在郭頒世語曰晉文王之世晉文王疑有誤大魚見孟津長數百步髙五丈頭在南岸尾在中渚河平侯祠即斯祠也河水又東逕平縣故城北漢河南郡有平縣即今孟津縣西北小平城也杜佑曰在鞏縣西北有津曰小平津漢武帝元朔三年封濟北真王子劉遂為侯國漢書王子侯表平侯遂者濟北式王子史記建元以來年表作濟北貞王子史記表注索隠曰自陪安侯不害已下十一人是濟北貞王子漢書自安陽侯以下八人是濟北式王子同是元朔三年十月封恐因此誤也王莽之所謂治平矣俗謂之小平也有髙祖講武塲河北側岸有二城相對置北中郎府徙諸從𨽻府户并羽林虎賁領隊防之朱引鄭樵通志云四中郎將並後漢置江左彌重或領刺史或持節為之銀印青綬服同將軍後魏靈太后時任城王澄奏宜以東中郎帶滎陽郡南中郎帶魯陽郡西中郎帶𢎞農郡北中郎帶河南郡選一品二品親賢居之配以强兵則深根固本之計也河水南對首陽山春秋所謂首戴原本作戴首也夷齊之歌所矣曰登彼西山謝云宋本作夷齊之歌所以曰登彼西山矣上有夷齊之廟前有二碑並是後漢河南尹廣陵陳導洛陽令徐循與處士平何氏増原字従𨽻釋蘓騰南陽何進等立事見其碑又有周公廟魏氏起元武舘扵芒垂張景陽元武館賦所謂髙樓特起竦跱岧嶤直亭亭以孤立延千里之清飈者也晉張協𤣥武館賦尋厥先之攸基實張氏之舊墟何魏后之周覽遂築館而起廬既號元武是曰石樓於是髙樓特起竦峙岧嶤飛甍四注上槩浮霄直亭亭以孤立迎千里之清飈延賦作迎朝廷又置氷室扵斯阜室内有氷井春秋左𫝊曰日在北陸而藏氷常以十二月採氷于河津之隘峽石之阿北隂之中即邠詩二之日鑿氷沖沖矣而内于氷室所謂納于凌隂者也河南有鉤陳壘世𫝊武王伐紂八百諸侯所㑹處尚書所謂不期同時也紫㣲有鈎陳之宿主鬭訟兵陣故遁甲攻取之法以所攻神與鈎陳并氣下制所臨之辰則袟疑誤禽敵是以壘資其名矣河水水一作于一作至斯有盟津之目論衡曰武王伐紂升舟陽侯波起疾風逆流武王操黄鉞而麾之風波畢除中流白魚入扵舟燌以告天與八百諸侯咸同此盟尚書所謂不謀同辭也故曰孟津亦曰盟津尚書所謂東至于孟津者也又曰冨平津晉陽秋曰杜預造河橋于冨平津何氏云元凱以大父死于此故竭思以成之所謂造舟為梁者也又謂之曰陶河魏尚書僕射杜畿以帝將許朱引魏志作帝幸許都試樓船覆于陶河謂此也魏志杜畿𫝊帝征吳以畿為尚書僕射統畱事其後帝幸許昌畿復居守受詔作御樓船扵陶河試船遇風没昔禹治洪水觀于河見白面長人魚身出曰吾河精也授禹河圖而還于淵及子朝簒位與敬王戰乃取周之寳玉沈河以祈福後二日津人得之扵河上將賣之則變而為石及敬王位定得玉者獻之復為玉也禹貢錐指曰以今輿地言之河水自陜州又東逕澠池縣北其北岸則垣曲縣澠池在河南河南府西少北一百六十里垣曲在山西絳州西南二百十里黄河在縣南五里俱澠池分水又東逕新安縣北又東逕洛陽縣北又東逕孟津縣北新安在河南府西北七十里黄河去縣七十里洛陽河南府治黄河去縣二十里繞北邙山之麓孟津縣在府東北五十里黄河去縣五里有陶渚其西有硤石馬渚髙渚委粟津皆大河津濟處縣北十五里有羅家灘又西為楊家灘柳灘杏灘及耕子馬墳二灘皆在大河之中其北則濟源縣孟縣濟源在懷慶府西七十里黄河在縣南七十里與新安洛陽分水孟縣在府少西五十五里黄河在縣南二十里南對小平津廣二里有南城北城中潬城河陽三城記曰北城南臨大河長橋架水南城三面臨河屹立水濱中潬表裏二城南北相望黄河兩𣲖貫于三城之間毎秋泛溢南北二城皆有濡足之患而中潬屹然如故此河水又東至孟津之所經也河水又東浿水入焉山海經曰和山上無草木而多瑶碧實惟河之九都是山也五曲九水出焉合而北流注于河其陽多蒼玉吉神泰逢司之是扵萯山之陽朱引山海經作其狀如人而虎尾是好居扵萯山之陽出入有光吕氏春秋曰夏后氏孔甲田扵東陽萯山遇大風雨迷惑入于民室皇甫謐帝王世紀以為即東首陽山也葢是山之殊目矣今扵首東山無水以應之當是今古世懸或川改狀矣一作川域改狀一作山川改狀昔帝堯修壇河洛擇良議沈按竹書紀年擇良下有日字無議沈二字似妥率舜等升于首山而導按竹書作遵理似長河渚有五老遊焉相謂河圖將來告帝以期知我者重瞳也五老乃翻為流星而升于昴即于此也按竹書紀年云洪水既平歸功于舜將以天下禪之乃潔齋修壇塲于河洛擇良日率舜等升首山遵河渚有五老逰焉盖五星之精也相謂曰河圖將來告帝以期知我者重瞳黄姚五老因飛為流星上入昴較此似明而詳朱引論語比考䜟曰堯與舜等遊首山觀河渚有五老遊河一老曰河圖將來告帝期河圖將浮金含玉苞刻版題命可卷金泥玉檢書成知我者重瞳黄姚歌訖五老飛入于昴與此少異又東又上疑漏河水二字沛水注焉孫汝澄云沛水當作泲水泲與濟同此後濟水凡作沛水者並誤又東過鞏縣北鞏縣今屬河南府在府東一百三十里周鞏伯邑西周恵公封少子班于鞏是為東周河水扵此有五社度為五社津建武元年朱鮪遣持節使者賈彊後漢書作疆見冦恂𫝊討難將軍蘓茂將三萬人従五社津渡攻温馮異遣校尉與㓂恂合擊之大敗追至河上生擒萬餘人投河而死者數千人縣北有山臨城謂之崟㟶丘其下有穴謂之鞏穴言潛通浦北達扵河直穴有渚謂之鮪渚朱云後漢書注引水經注云鞏縣北有五社津一名土社津有山臨河其下有穴潛通淮浦有渚謂之鮪渚成公子安大河賦曰鱣鯉王鮪暮來逰按成公子安名綏晉人其大河賦中無此句今備録全賦俟再考賦曰覽百川之𢎞壯分莫尚美于黄河潛崑崙之峻極兮出積石之嵯峨登龍門而南逰兮拂華隂與曲阿凌底柱而激湍兮踰汭洛而揚波體委蛇于后土兮配靈漢于穹蒼貫中夏之畿甸兮經朔狄之遐荒歴二周之北境兮流三晉之南鄉秦自西而啟壤兮齊據東而畫疆殷徒涉而永固衛遷濟而遂强趙決流而却魏嬴引溝而滅梁思先喆之攸歎何水徳之難量賦止此周禮春薦鮪然原本譌作煞非時及佗處則無故河自鮪穴已上又兼鮪稱吕氏春秋稱武王伐紂至鮪水紂使膠鬲侯周師即是五社津在今鞏縣北五里崟㟶邱在縣西北三十里洛水従縣西北流注之洛水于鞏縣而東洛汭北對琅琊渚入于河謂之洛口矣自縣西來而北流注洛清濁異流皦焉殊别應瑒靈河賦曰資靈川之遐源出崑崙之神丘涉津洛之峻泉播九道扵中州者也按應瑒靈河賦有云咨靈川之遐源兮於崑崙之神丘凌層城之隂隅兮賴后土之潛流涉津洛之坂泉播九道之中洲云云與此稍異又東過成臯縣北濟水從北來注之河水自洛口又東左逕平髙當是臯按漢書地理志平臯縣屬河内郡縣南又東逕懷縣南濟水故道之所入與成臯分河水平臯廢縣在今懷慶府温縣東懷縣故城在今懷慶府武涉縣西南河水又逕黄馬坂北謂之黄馬闗今開封府汜水縣西十五里有黄馬闗孫登之去楊駿作書與洛中故人處也河水又東逕旋門坂北今開封府汜水縣西南十里有旋門坂今成臯西大坂者也昇陟此坂而東趣成臯也曹大家東征賦曰望河洛之交流看成臯之旋門者也河水東逕成臯大伾山下孫汝澄云按史記括地志云大伾山今名黎陽東山在衛州黎陽縣南張揖云今成臯非也曲禹貢錐指云按大伾山在汜水縣西一里有大澗九一名九曲山西去洛口裁四十里其非禹貢之大伾山明甚爾雅云山一成謂之伾許慎吕忱等並以為丘一成也孔安國以為再成曰伾亦或以為地名非也尚書禹貢曰過洛汭至大伾者也鄭康成曰地喉也流宋本作沇出伾際矣然則大伾在河内修武武徳之界濟沇之水與熒何氏云熒滎古人通用播澤出入自此然則大伾即是山矣伾北即經所謂濟水從北來注之者也今泲水自温縣入河不扵此也所入者奉溝一作濟水耳即濟黄本作溝沇之故瀆成臯縣之故伾疑當作城上縈帶伾阜絶岸峻周上兩句疑有譌脫高四十許丈城張習一作翕嶮崎而不平春秋𫝊曰制巖邑也虢叔死焉即東虢也漢書地理志成臯故虎牢或曰制魯襄公二年七月晉成公與諸侯㑹于戚遂城虎牢以逼鄭求平也葢修故耳穆天子𫝊曰天子射鳥獵獸扵鄭圃命虞人掠林有虎在乎葭中天子將至七萃之士高奔戎生擒虎而獻之天子命之為柙畜之東虞漢書地理志師古注引此作畜之東虢是曰虎牢矣然則虎牢之名自此始也秦以為闗漢乃縣之城西北隅有小城周三里北面列觀臨河苕苕朱云當作岧岧孤上景明中言之壽春按景明乃元魏世宗年號以上下文義推之言疑當作余之壽春盖自謂也路直兹邑昇眺清逺勢盡川陸羈途遊至有傷深清河水南對玉門昔漢祖與滕公潛出濟扵是處也門東對臨河側岸有土穴魏攻此朱云宋本作宋同州刺史毛徳祖於虎牢戰經二百日不尅城惟一井井深四十丈山勢峻峭不容防捍潛作地道取井余頃因公至彼故往尋之其穴處猶存河水又東合汜水按史記正義曰汜音似汜水在成臯故城東水南出浮戲山世謂之方山也明一統志方山在汜水縣南四十里汜水出焉北流車闗水出于嵩渚之山也泉發于層阜之上一源兩枝分流㵼注世謂之石泉水也東流為索水明統志索水源出滎陽縣小陘山西注為車關按車闗水今為京水明一統志云源出嵩渚山索水下注云北流入京水則京水似即車關矣西北流楊蘭水注之水出非山西北流注為車闗水又西北蒲水入焉水自東浦西流與車關水合而亂流注于汜汜水又北右合石城水水出石城山其山複澗重嶺欹疊若城山頂泉流瀑布懸㵼下有濫泉東流洩注邊有數十石畦畦有聲疑衍宋本作數野蔬巖側石窟數口隠迹存焉而不知誰所經始也又東北流注入于汜水汜水下北合鄤水水西出婁山至冬則暖故世謂之温泉東北流逕田鄤谷謂之田鄤溪水東流注于汜水汜水又北逕虎牢城東漢破司馬欣曹咎于是水之上史記髙帝紀漢四年項羽謂海春侯大司馬曹咎曰謹守成臯若漢挑戰慎勿與戰無令得東而已我十五日必定梁地復従將軍漢果數挑楚軍楚軍不出使人辱之五六日大司馬怒度兵汜水士卒半渡漢擊之大破楚軍大司馬咎長史欣皆自剄汜水上正義曰汜音祀汜水又北流注于河征難賦所謂步汜口之芳草弔周襄之鄙館者也朱云晉盧諶有征艱賦難譌余按先儒之論周襄所居在潁川襄城縣是乃城名非為水目原夫致謬之由俱以汜鄭為名故也是為爽矣又按郭縁生述征記劉澄之永初記並言髙祖即帝位扵是水陽今不復知舊壇所在盧諶崔雲亦言是矣今按高皇帝受天命于定陶汜水又不在此也扵是求壇故無髣髴矣史記高祖紀漢五年還至定陶諸侯將相請尊漢王為皇帝漢王讓不得已乃即皇帝位汜水之陽正義曰汜音敷劍反音汎括地志云高祖即位壇在曹州濟隂縣界張晏曰汜水在濟隂縣界取其汎愛𢎞大而潤下河水又東逕板城北有津謂之板城渚口汜水縣東北二十里即板城渚隋大業初開通濟渠自板渚引河歴滎陽入汴河水又東逕五龍塢北臨長河塢有五龍祠應劭云崑崙山廟在河東滎陽縣疑即此祠所未詳又東過滎陽縣蒗蕩渠出焉大禹塞滎澤開之以通淮泗即經所謂蒗蕩渠也漢平帝之世河汴決壞未及得修汴渠東侵日月彌廣門故處皆在水中按後漢書王景𫝊云初平帝時河汴決壞未及得修後汴渠東侵日月彌廣而水門故處皆在河中據此則門上漏去而水兩字又御覽引水經注作門閭故處漢明帝永平十二年議治汴渠上乃引樂浪人王景問理水形便景陳利害應對敏㨗帝甚善之乃賜山海經河渠書禹貢圖及以錢帛後作隄發卒數十萬詔景與將作謁者王昊朱云按景𫝊作王吳下同共防築堤修堨朱云按御覽引此云詔景與將作謁者王吳治渠築堤防修堨起自滎陽起自滎陽東至千乘海口千有餘里景乃商度地勢鑿山開澗防遏衝要疏決壅積十里一門朱云一下漏水字𫝊云十里立一水門更相迴注無復潰漏之患明年渠成帝親巡行詔濱河郡國置河隄員吏𫝊作史如西京舊制景由是顯名王昊及諸従事者皆増秩一等順帝陽嘉中又自汴口以東縁河積石為堰古口通淮咸曰金堤靈帝建寧中又増修石門以遏渠口水盛則通注津耗則輟流禹貢錐指曰古滎陽今為滎澤河隂二縣地蒗蕩渠首受河處即今河隂縣西二十里之石門渠是也河渠書言滎陽下引河東南為鴻溝亦即其處班志河南滎陽下云有狼湯渠首受泲泲即河也漢人謂濟水截河而南故曰首受泲京相璠所謂出河之濟宋張洎云即鴻溝也蒗蕩渠東南流為滎瀆濟水為官渡水為隂溝汳水浚儀渠其在大梁城南者為鴻溝鴻溝南流兼沙水之目沙水支津又為睢水渦水名稱不一要皆河隂石門河水為之委别而源同也志家不曉繫鴻溝扵今滎陽縣漢京縣地繫蒗蕩渠扵滎澤縣繫石門渠扵河隂縣似各為一水原委不相貫者而又以河隂石門與滎口石門混為一處故詳辨之若隋煬引坂渚口水入汴則在汜水縣東北二十里漢成臯縣地其非古滎陽引河處亦明矣又按今河隂縣西有石門渠滎瀆受河之處即禹貢導滎之導亦曰滎口蘓代曰決滎口魏無大梁信陵君亦云決滎澤而水大梁其後秦王賁果斷故渠引水東南灌大梁亦兼邲之稱晉楚之戰楚軍于邲即此水也建寧中於敖城西北壘石為門以遏浚儀渠口水門廣十餘丈西去河三里水盛則通水耗輟流即酈所云是也魏黄初中河濟泛溢鄧艾議開石門以通之晉武帝時復壞傅祇為滎陽太守造沈菜堰於是兖豫無水患桓温伐燕欲開石門以通水運而不能既而燕率渠屯石門斷温糧道劉裕伐秦遣水軍出石門自汴入河乃於北十里更鑿故渠通之周齊之間名汴口堰隋使梁睿増築漢古堰遏河入汴自是又名梁公堰又開通濟渠自板渚引河歴滎澤入汴唐河南尹李傑奏浚梁公堰以通漕公私便利未幾洛陽人劉宗器請塞汜水舊汴河於梁公堰置斗門通淮汴明年新漕塡塞乃命疏鑿舊河旬日而畢及劉晏為轉運使驗視梁公堰通津渠及李傑新堤盡得其利轉輸無壅後周浚汴口導河達于淮江舟楫始通復命王朴如河隂按行河堤立斗門于汴口既又令韓令坤導汴入蔡以通陳潁之漕胡三省曰自漢築滎陽石門而濟與河合流入海不入滎澤河水又東北逕卷之扈亭北後漢書郡國志卷縣屬河南尹注曰左𫝊成十年晉鄭盟修澤杜預曰縣東有修武亭武按杜預云扈鄭地在滎陽卷縣西北今開封府原縣西北有扈亭春秋左𫝊曰文公七年晉趙盾與諸侯盟于扈竹書紀年晉出公二十二年河絶于扈即于是也按竹書紀年元王二年為晉出公元年河絶于扈乃貞定王六年自元王二年至貞定王六年止十二年今云二十二誤河水又東逕八激堤北漢安帝永初七年令謁者太山于岑於石門東積石八所皆如小山以捍衝波謂之八激堤河水又東逕卷縣北卷縣故城在今原武縣西北七里城東有濟隧濟水上承河水于卷縣北河南與出河之濟㑹晉楚之戰晉軍爭濟舟中之指可掬楚莊祀河告成而還即是處也河水又東北逕赤岸固北而東北注之又東北過武徳縣東沁水注之武徳縣故城在今懷慶府武涉縣河水自武徳縣此句疑是經文接下東至酸棗縣條漢獻帝延康元年封曹叡為國即魏明帝也按後漢書獻帝紀建安二十五年春三月改元延康冬十月禪位于魏魏復改元黄初而司馬通鑑竟稱黄初元年于曹丕即王位之下書云改元延康似屬魏改胡三省註云此漢改元魏志也似屬妥適東至酸棗縣西濮水東出焉漢興三十有九年孝文時河決酸棗東潰金堤大發卒塞之正義曰括地志云金堤一名千里堤在白馬縣東五里故班固云文堙棗野武作瓠歌謂斷此口也酸棗故城在今開封府延津縣北十五里濟水篇云濮水受河于酸棗縣漢世塞之即此也今無水河水乂東北通謂之延津此句疑非經文或連上條之注似妥河水又東北句恐屬下條經文此屬衍石勒之襲劉曜途出於此以河氷泮為神靈之助號是處為靈昌津元和志云滑州靈昌縣有延津即靈昌津在縣東北二十二里今直𨽻大名府滑縣西南有廢靈昌縣津在白馬津之西南又有湖周十里曰靈昌湖按十六國春秋石勒太和元年命石堪石聰等各統見衆㑹滎陽使石虎進據石門勒自統中軍直赴金墉濟自大堨先是流澌風猛軍至而氷泮清和濟畢流澌大至勒以為神靈之助命曰靈昌津昔澹臺子羽齎千金之璧渡河陽侯波起兩鮫挾舟子羽曰吾可以義求不可以威刼操劔斬鮫鮫死波休乃投璧扵河三投而輒躍出乃毁璧而去示無恡意趙建武中造浮橋扵津上採石為中濟石無大小下輒流去用功百萬經年不就石虎親閱作工沈璧于河明日璧流渚上波蕩上岸遂斬匠而還事見十六國春秋後趙録建武十年河水又逕東燕縣故城北則有濟水自北來注之今懷慶府胙城縣古胙國周公别子封胙伯漢置南燕縣屬東郡晉時慕容徳據之號東燕縣今縣東有東燕故城但桑欽漢人不當云逕東燕縣恐當作又東逕燕縣故城河水於是有棘津之名亦謂之濟津故南津也春秋僖公二十一年晉將伐曹曹在縣按左𫝊註云曹在衛東此縣字疑當作衛東假道于衛衛人不許還自南河即此濟也按春秋左𫝊晉將伐曹假道于衛是僖公二十八年今云二十一年誤又𫝊云衛人不許還自南河濟今云即此濟亦誤當作還自南河濟即此也河水於是有棘津之名晉伐陸渾亦於此渡宋元嘉中遣輔國將軍蕭斌率寧朔將軍王元謨北入宣威將軍垣䕶之以水軍守石濟即此處也棘津又名石津河水又東淇水入焉又東逕遮害亭南漢書溝洫志曰在淇水口東十八里有金隄隄高一丈自淇口東地稍下隄稍高至遮害亭高四五丈又有宿胥口舊河水北入也淇水篇淇水出河内隆慮縣西大號山注云淇水南歴枋堰舊淇水南東流逕黎陽縣南入河淇水口亦名清河口以淇清二水合流入河故互受其名也宿胥口在今大名府濬縣西南遮害亭東以今輿地言之河水自孟津北又東逕鞏縣北洛水入焉其北岸則温縣濟水入焉鞏縣在河南府少東一百三十里黄河去縣十里今又東過汜水縣至滿家溝入河温縣在懷慶府東五十里黄河在縣南新志云河舊離城二十里今漸徙而北逼近城隈矣濟水古于武徳縣東入河後徙流逕温縣南至平臯入河今故道盡陷河中又東逕汜水縣北又東逕滎陽縣北其北岸則武涉縣沁水入焉汜水在開封府鄭州西一百十里黄河南去縣二十五里武涉在懷慶府東一百里黄河在縣南十五里沁水在縣東一里入河名南賈口又東逕河隂縣北又東逕滎澤縣北其北岸則獲嘉縣河隂在鄭州西北五十里滎澤在州北五十里獲嘉在衛輝府西南九十里又東逕原武縣北原武在開封府西一百二十里又東逕陽武縣北陽武在府西北九十里又東逕延津縣北又東逕胙城縣北其北岸則新鄉汲縣延津在府西北九十里胙城在衛輝府東南三十五里新鄉在府西南五十里汲縣衛輝府治黄河在縣東南十七里又東北逕濬縣西南古宿胥口大伾山在其東北其南岸則滑縣濬縣在大名府西南一百八十里滑縣在府西南二百里黄河舊在濬縣東南滑縣西北自金明昌中河離汲縣而濬滑之流遂絶此河水東過洛汭至於大伾之所經也河水又右逕滑臺城滑臺城在今滑縣西南即唐滑州治也北直黎陽相距三十里有三重中小城謂之滑臺城舊𫝊滑臺人自修築此城因以名焉城即故鄭廩延邑也下有延津春秋𫝊曰孔悝為蒯聵所逐載伯姬于平陽行于延津是也廩延南故城即衛之平陽亭也今時人謂此津為㢟壽津宋元嘉中右將軍到彦之畱建威將軍朱脩之守此城魏軍南伐脩之執節不下其母悲憂一旦乳汁驚出母乃號踴疑當作踊告家人曰我年老非有乳時今忽如此吾兒必没矣脩之絶援果以其日陷沒城故東郡治續漢書曰延熹九按後漢書五行志是八年九字恐誤年濟隂東郡濟北平原河水清襄楷上疏曰春秋注記未有河清而今有之易乾鑿度曰上天將降嘉應河水先清京房易𫝊曰河水清天下平天垂翼地吐妖民厲疾三者並作而有河清春秋麟不當見而見孔子書以為異河者諸侯之相後漢書作象清者陽明之徴豈獨諸侯有窺後漢書作䂓京師也明年宫車晏駕徴解瀆侯為漢嗣是為靈帝建寧四年二月河水又清也又東北過黎陽縣南黎陽故城在今濬縣東北黎侯國也詩式㣲黎侯寓于衛是也晉灼曰黎山在其南河水逕其東其山上碑云縣取山之名取水之陽以為名也王莽之魏丞也漢書地理志魏郡黎陽縣莽曰黎蒸今黎山之東北故城葢黎陽縣之故城也山在城西城憑山為基東岨為河故劉楨黎陽山賦曰南䕃黄河左覆金城青壇承祀高碑頌靈昔慕容元明慕容德字自鄴率衆南徙滑臺既無舟檝十六國春秋作遇風船没將保黎陽十六國春秋作遇風船沒魏兵垂至衆心惶懼議欲退保黎陽徳不従其夕流澌氷合遂于夜中南渡黎陽昏而流澌氷合於夜中濟訖旦而氷泮燕氏謂是處為天橋津十六國春秋作鄴令韓範言扵徳曰光武渡滹沱河澌流自合大王濟河天橋自成靈命所扶徴兆已見徳大悅遂改黎陽津為天橋津東岸有故城嶮帶長河戴延之謂之違當是逯音龍玉切明壘周二十里言逮亦當作逯明下疑漏在字石勒十八騎中城因名焉按十六國春秋後趙録石勒𫝊云勒招集王陽夔安支雄冀保吳豫劉膺桃豹逯明等八騎為羣盜後郭敖劉徴劉寳張曀僕呼延莫郭黒畧張越孔豚趙鹿支屈六等又赴之號為十八騎郭縁生曰城袁紹時築皆非也余按竹書紀年梁恵成王十三年鄭釐侯使許息來致地平丘户牖首垣諸邑及鄭馳地我取枳道與鄭鹿鄭鹿即是城也今城内有故臺尚謂之鹿鳴臺又謂之鹿鳴城王元謨自滑臺走鹿鳴者也濟取名焉故亦曰鹿鳴津又曰白馬濟津之東南有白馬城衛文公東徙渡河都之故濟取名焉袁紹遣顔良攻東郡太守劉延于白馬關羽為曹公斬良以報效即此處是也白馬有韋鄉韋城故津亦有韋津之稱史記所謂修武下武渡韋津者也河水舊于白馬縣南決通濮濟黄溝故蘓代說燕曰決白馬之口魏無外黄濟陽竹書紀年梁恵成王十二年楚師山謝云竹書紀年作出宋本作決河水以水長垣之外者也金隄既建故渠水斷尚謂之白馬瀆故瀆東逕鹿鳴城南又東北逕白馬縣之涼城北耆舊𫝊云耆舊二字疑衍東郡白馬縣之神馬亭實中層峙南北二百步東西五十許步狀丘斬城也實中句及此句疑有譌字自外耕耘墾斫削落平盡正南有陟躔陛上方軏是由西南此處亦疑有譌脫側城有神馬寺樹木修整西去白馬津二十許里東南距白馬縣故城可五十里疑即開山圖之所謂白馬山也山上常有白馬羣行悲鳴則河決馳走則山崩注云山在鄭故此鄭也所未詳劉澄之云有白馬塞孟達登之長嘆可謂於川土疎妄矣亭上舊曰置源城縣治此此句疑有譌誤白馬瀆又東南逕濮陽縣散入濮水所在決㑹更相通注以成往復也河水自津東北逕凉城縣凉城劉宋置水經不應先有此名按宋書志凉城縣注云二漢東郡有聊城縣晉太康地志無疑此是則此恐亦當作聊城未知當否凉城在今滑縣東北河北有般祠孟氏記云祠疑漏在字河中積石為基河水漲盛恒與水齊戴氏西征記曰今見祠在東岸臨河累石為壁其屋宇容身而已殊似無靈不如孟氏所記將恐言之過也河水又東北逕伍子胥廟南祠在北岸頓丘郡界臨側長河廟前有碑魏青龍三年立河水又東北為長壽津述征記曰凉城到長壽津六十里河之故瀆出焉漢書溝洫志曰河之為中國害尤甚故導河自積石歴龍門二渠以引河一則漯川則今所流也一則北瀆王莽時空一作塞故世俗名是瀆為王莽河也行水金鑑曰河至此與漯别行而東北入海水經謂之大河故瀆已禹貢錐指曰水經東漢人所撰凡稱故瀆者皆時無水戚城以下東灮以上河水不至又無他水行其中孟康所云王莽時遂空者惟此耳故謂之大河故瀆故瀆東北逕戚城西今大名府開州西北有戚城春秋哀公二年晉趙鞅帥師納衛太子蒯瞶于戚宵迷陽虎曰右河而南必至焉今頓丘衛國按晉書地理志頓丘郡有衛縣此國字疑衍縣西戚亭是也為衛之河上邑漢高帝十二年封將軍李必為侯國矣史記功臣表戚圉侯季必師古曰灌嬰𫝊云李必今此作季表𫝊不同當有誤故瀆又逕繁陽縣故城東城在大名府内黄縣東六十里繁水之陽繁水即春秋之澶淵杜預云在頓丘縣南亦謂之浮水史記趙將廉頗伐魏取繁陽者也北逕隂安縣故城西故城在今大名府清豐縣北通典頓丘縣北有隂安城太平寰宇記云王莽河在頓丘縣北十里漢武帝元朔五年封魏不疑為侯國按漢書外戚恩澤侯表隂安侯不疑係衛青次子今云魏誤故瀆又東北逕昌樂縣故城東按明一統志北直𨽻大名府南樂縣注云本漢樂昌縣屬東郡後漢省晉置昌樂縣後魏置昌樂郡隋廢唐復置昌樂縣據此水經不應先有昌樂之名當以樂昌為是况漢書外戚恩澤侯表樂昌共侯王武于地節四年封則宜作樂昌無疑但晉書地理志又無昌樂縣之名不知統志何據而云晉置也惟通典魏郡有昌樂縣則又云漢舊縣所不解矣地理志東郡之屬縣也漢宣帝封王稚君為侯國史記建元以來功臣表樂昌侯王稚君注云名武故瀆又東北逕平邑郭西故城在南樂縣東北七里竹書紀年晉烈公四年趙城平邑按竹書紀年威烈王七年為晉烈公元年趙城平邑乃威烈王八年則當作烈公二年五年田公子居思伐趙鄙圍平邑竹書作圗十年齊田汾竹書作盻及邯鄲韓舉戰于平邑邯鄲之帥竹書作師敗遂獲韓舉取平邑新城又東北逕元城縣城西北而至沙丘堰元城縣今大名府治史記曰魏武侯公子元食邑于此故縣氏焉按此兩句出漢書地理志應劭注非出史記郭東有五鹿墟墟之左右多陷城公羊曰襲邑也說曰襲陷矣郡國志曰五鹿墟故涉當作沙鹿有沙亭周穆王䘮盛姬東征舍于五鹿其女升按穆天子𫝊當作叔㛗届此思哭是曰女㛗之丘為沙鹿之異名也春秋左𫝊僖公十四年沙鹿崩杜預曰沙鹿山名元城縣東有沙鹿土山在晉地晉史卜之曰隂為陽雄土火相乗故有沙鹿崩後六百四十五年宜有聖女興其齊田乎後王翁孺自齊徙元城正直其地日月當之王氏為舜後土也漢火也王禁生政君其母夢月入懷年十八詔入太子宫生成帝為元后漢祚道沿二字疑誤謝兆申云宋本作道汚四世稱制故曰火土相乘而為雄也及崩大夫揚雄作誄曰太隂之精沙鹿按漢書元后𫝊作麓之靈作合扵漢配元生成者也獻帝建安中袁紹曹操相禦于官渡禦後漢書鄭康成𫝊作拒紹逼大司農鄭元載病隨軍届此而卒郡守以下受業者衰絰赴者本𫝊作㑹千餘人元注五經䜟緯候歴天文經通于世故范瞱贊曰孔書遂明漢章中輟矣後漢書注孔書謂六經也輟止也中輟謂曹褒禮不行也縣北有沙丘堰者不遵其道曰降上下疑有譌脫或降下有水字亦曰潰堰障水也至于大陸北播于九河風俗通曰河播也播為九河自此始也禹貢沇州九河既道矣謂徒駭太史馬頰覆釡胡蘓簡潔勾盤鬲津也同為逆河鄭元曰下尾合曰逆河言相承受矣葢所潤下之勢以通河海及齊桓霸世塞廣田居同為一河左𫝊疏云大陸以北播為九河以次而東尚書中候云齊桓之世遏八流以自廣故自堰以北館陶癭陶貝邱鬲般廣川信都東光河間樂成以東城地並存川瀆多亡漢世河決金隄南北離疑譌或當作罹其害議者常欲求九河故迹而川之未知其所是以班固云自兹距漢三入枝者也此句疑有譌脫禹貢錐指曰水經以王莽河為禹河故以沙丘堰為禹迹推其意似謂古河本東行禹作此堰以障之使北而九河自此播焉不遵其道是為降水唐人云河自貴鄉縣界分為九道宗此說也然禹河不經元城此堰必非禹所作黄文叔云今澶州臨河有鯀隄自黎陽入北至恩州清河歴亭皆有之然則降水者自元城以北隄堨之水是也葢以為鯀所作或曰元城為戰國魏地北與趙接壤賈讓云隄防之作近起戰國壅防百川各自為利齊與趙魏以河為境趙魏瀕山齊地卑下作隄遏水使西汎趙魏趙魏亦為隄以防之沙丘堰者疑趙所作以障水使不得北而東注于齊魏所謂以鄰國為壑者也史記趙世家肅侯十八年齊魏伐我我決河水灌之兵去恵文王十八年王再之衛東陽決河水伐魏氏以趙地高而齊魏卑也水經清水注引季長曰晉自朝歌以北至中山為東陽朝歌以南至軹為南陽東陽春秋屬晉戰國屬魏後屬趙河之故瀆自沙丘堰南分屯氏河出焉禹貢錐指大河故瀆北出為屯氏河逕館陶縣東溝洫志曰自塞宣房後河復北決于館陶縣分為屯氏河其故瀆又東北屯氏别河出焉屯氏别河故瀆又東北逕信成縣張甲河出焉地理志曰張甲河首受屯氏别河于信成縣者也張甲故瀆北絶清河于廣宗縣又東北至修縣㑹清河屯氏别河自信成南東北至繹幕縣南分為二瀆其北瀆東北至陽信縣故城北而東注于海南瀆自平原城北首受大河故瀆東出亦謂之篤馬河東北至陽信縣故城南東北入海屯氏河故瀆東逕靈縣北又東北逕鄃縣與鳴犢河故瀆合地理志曰河水自靈縣别出為鳴犢河者也按屯氏河自館陶東北至章武入海過郡四行千五百里屯音豚通典魏州治貴鄉元城二縣貴鄉有大河故瀆俗曰王莽河元和志王莽河西去貴鄉縣三里古堰今名愜山在縣西九里成帝時河決王延世募人益運士塞河之處以其愜當人情故謂之愜山盖即沙丘堰也元和志王莽河在館陶縣東四里愜山在今大名縣北一十五里今館陶縣西有館陶故城信成縣即今清河縣廣宗縣即今廣宗縣修縣即今景州繹幕縣在今平原縣界陽信縣故城在今慶雲縣界靈縣在今博平縣界鄃縣即今夏津縣貴鄉縣即今大名縣元城縣即今大名府治今冠縣西有冠氏縣故城隋析館陶縣地為冠氏縣元和志王莽河北去縣十八里河水故瀆東北逕發干原本譌于縣北城西又屈逕其北發干故城在今山東東昌府堂邑縣西南五十里寰宇記王莽河在堂邑縣北十里王莽之所謂戢楯矣漢武帝以大將軍衛青破左賢王功封其子登為侯國漢書衛青𫝊大將軍青獲匈奴王十有餘人封青子伉為冝春侯子不疑為隂安侯子登為發干侯大河故瀆又東逕貝丘縣故城南故城在今東昌府清平縣西南本漢清陽縣地隋初徙貝丘縣治此後改為清平縣王莽河在縣南十八里應劭曰左氏齊襄公田于貝丘是也余按京相璠杜預並言在博昌漢志屬千乗郡即司馬彪郡國志所謂貝中聚者也應注于此事近迹朱本作違矣大河故瀆又東逕甘陵縣故城南甘陵故城在今直𨽻廣平府清河縣東南地理志之所謂厝也按地理志清河郡厝縣應劭曰安帝以孝徳皇后𦵏于厝改曰甘陵王莽改曰厝治者也漢安帝父孝徳皇以太子被廢為王薨于此乃𦵏其地尊陵曰甘陵後漢書清河王𫝊清河孝王慶肅宗章帝子建初四年立為皇太子七年廢為清河王安帝建光元年追尊父為孝徳皇母為孝徳后桓帝建和元年改曰甘陵縣亦取名焉是周之甘泉市當作币地也陵在瀆北丘墳高巨雖中經發壞猶若層陵矣世謂之唐侯冢城曰邑城皆非也昔南陽文叔良以建安中為甘陵丞夜宿水側趙人蘭襄夢求改葬叔良明疑漏日字或于明上有逮及等字循水求棺果於水側得棺半許落水叔良顧親舊曰若聞人𫝊此吾必以為不然遂為移殯醊而去之大河故瀆又東逕艾亭城南風俗記曰甘陵故城直東二十里有艾亭城葢近今博平縣界又東逕平晉城南平晉城未詳疑當在博平縣北王莽河在博平縣北十八里今城中有浮圖五層上有金露柈題云趙建武八年比釋道龍和上竺浮圖澄樹徳勸化與立神廟浮圖以壞露柈尚存煒煒有光明大河故瀆又北逕靈縣故城南靈縣故城在博平縣東北四十里高唐州西南二十里王莽之播亭也河瀆于縣别出為鳴犢河漢志鳴瀆河東北至蓚入屯氏河河水故瀆又東逕鄃縣故城東城今在平原縣西南五十里吕后四年以父嬰功封子佗史記漢書俱作它龍為侯國按史漢表俱作吕它無龍字表云俞侯吕它父嬰以連敖從高祖破秦入漢功比朝陽侯嬰死子它襲王莽更名之曰善陸鄃縣故城在今濟南府平原縣西南五十里大河故瀆又東逕平原縣故城西而北絶屯氏三瀆北逕繹幕縣故城東北西流逕平原鬲縣故城西括地志平原故城在平原縣東南十里元和志王莽枯河在縣南五里葢本在其北縣徙而北故水出其南屯氏三瀆謂屯氏河及屯氏别河之南北二瀆也寰宇記繹幕故城在平原縣西北二十里鬲縣故城在今濟南府陵縣北左𫝊靡奔有鬲氏即其國也陵縣本安徳唐徳州治州西五十里有長河故城州北五十里有將陵故城元和志王莽枯河在長河縣東五里又在將陵縣西十里長河即今徳州治將陵在州東北志云古黄河在州東南二十餘里今謂之黄河崖地理志曰鬲津也王莽名之曰河平亭故有窮后羿國也應劭曰鬲偃姓咎繇後光武建武十三年封建議將軍朱祐為侯國大河故瀆又北逕修縣故城東又北逕安陵縣西本脩之安陵鄉也地理志風俗記曰