body:
  text: 水經注集釋訂訛卷一歸安沈炳巽撰河水一崑崙墟在西北三成為崑崙丘崑崙説曰崑崙之山三級下曰樊桐一名板松二曰𤣥圃一名閬風上曰層城一名天庭是謂太帝之居按廣雅云崑崙墟有三山䦘風板桐𤣥圃淮南子云縣圃凉風樊桐嵇康遊仙詩云結友家板桐俱作桐無作松者惟樊與板則兩異耳今云板松疑或桐字之譌去嵩五萬里地之中也禹本紀與此同髙誘稱河出崑崙山伏流地中萬三千里禹導而通之出積石山按山海經自崑崙至積石一千七百四十里自積石出隴西郡至洛凖地志可五千餘里又按穆天子𫝊天子自崑崙山入于宗周萬按𫝊當是乃字里西土之數自宗周瀍水以西北按𫝊無北字至于河宗之邦陽紆之山三千有四百里自陽紆西至河首四千里合七千四百里外國圗又云從大晉國正西七萬里得崑崙之墟諸仙居之數説不同道岨且長逕記綿禠朱謀㙔云疑當作經記綿邈水陸路殊徑復不同淺見末聞非所詳究不能不聊述聞見以誌差違也其髙萬一千里山海經稱方八百里髙萬仞郭景純以為自上二千五百餘里淮南子稱髙萬一千一百里一十四歩二尺六寸按淮南子作其髙萬一千里百一十四歩二尺六寸河水春秋説題辭曰河之為言荷也荷精分布懐隂引度也釋名曰河下也隨地下處而通流也考異郵曰河者水之氣四瀆之精也所以流化元命苞曰五行始焉萬物之所由生元氣之腠液也管子曰水者地之血氣筋脉之通流者故曰水其具財也而水為最大水有大小有遠近水出山而流入海者命曰經水引他水入於大水入海者命曰枝水出於地溝流於大水及於海者又命曰川水也荘子曰秋水時至百川灌河經流之大孝經援神契曰河者水之伯上應天漢新論曰四瀆之源河最髙而長從髙注下水流激峻故其流急徐幹齊都賦曰川瀆則洪河洋洋發源崑崙九流分遊朱本云玉海引此作九流分逝北朝滄淵驚波沛厲望按賦作浮沫揚奔風俗通曰江淮河濟為四瀆瀆通也所以通中國垢濁白虎通曰其徳著大故稱瀆釋名曰瀆獨也各獨出其所而入海出其東北陬山海經曰崑崙墟在西北河水出其東北隅爾雅曰按爾雅有河出崑崙墟五字當補入色白所渠并千七百一川色黄物理論曰河色黄者衆川之流葢濁之也百里一小曲千里一曲一直矣漢大司馬史張戎議曰河水濁清澄一石水六斗泥而民競引河溉田今河不通利至三月桃華水至則河決以其噎而不洩也禁民勿復引河是黄河兼濁河之名矣附録漢書溝洫志大司馬史長安張戎言水性就下行疾則自刮除成空而稍深河水重濁號為一石水而六斗泥今西方諸郡以至京師東行民皆引河渭山川水溉田春夏乾燥少水時也故使河流遲貯淤而少淺雨多水暴至則溢決而國家數隄塞之稍益髙于平地猶築垣而居水也可各順從其性毋復灌溉則百川流行水道自利無溢決之害矣述征記曰盟津河津恒濁方江為狹比淮濟為濶寒則氷厚數丈氷始合車馬不敢過要須狐行云此物善聴氷下無水乃過人見狐行方渡余按風俗通云俚語稱狐欲渡河無如尾何且狐性多疑故俗有狐疑之説亦未必一如縁生之言也述征記郭縁生撰屈從其東南流入于渤海山海經曰南即從極之淵也一曰中極之淵深三百仭惟馮夷都焉括地圖曰馮夷恒乗雲車駕二龍河水又出於陽紆陵門之山而注於馮逸之山穆天子𫝊曰天子西征至陽紆之山河伯馮夷之所居地也按穆天子𫝊云河伯無夷之所都居注云無夷馮夷也山海經云氷夷是惟河宗氏天子乃沈珪璧禮焉河伯乃與天子披圖視典以觀天子之寳器玉果璿珠燭銀金槀當是膏等物𫝊注云玉果石如美玉所謂女果者也璿珠璿玉類也音旋燭銀銀有精光如燭金膏亦猶玉膏皆其精汋也皆河圖所載河伯以禮穆王視圖方乃導以西邁矣粤在伏羲受龍馬圖於河八卦是也故命歴序曰河圖帝王之階圗載江河小川宋本作山州界之分野後堯壇於河受龍圗作握河記逮虞舜夏商咸亦受焉李尤盟津銘洋洋河水朝宗於海徑自中州龍圗所在淮南子曰昔禹治洪水具禱陽紆盖於此也髙誘以為陽紆泰藪非也釋氏西域志曰阿耨逹太山其上有大淵水宫殿樓觀甚大焉山即崑崙山也穆天子𫝊曰天子升崑崙封豐隆之葬豐隆雷公也按穆天子𫝊注云豐隆筮御雲得大壮卦遂為雷師亦猶黄帝橋山有墓封謂增髙其上土以摽顯之耳又按淮南子季春三月豐隆乃出以将其雨應劭曰豐隆雨師也雷電龍三字疑誤即阿耨逹宫也其山出六大水山西有大水名新頭河郭義恭廣志曰甘水也在西域之東名曰新陶水山在天竺國西水甘故曰甘水有石鹽白如水精大段朱云當作火煆則破而用之康泰曰安息月支天竺至伽那調御皆仰此鹽釋法顯曰度葱嶺已北入天竺境於此順嶺西南行十五日其道艱阻崖險岸絶朱本改崖岸險絶其山唯石壁立千仭臨之目眩欲進則投足無所下有水名新頭河昔人有鑿石通路施倚朱本作傍梯者凡渡朱本作度七百渡梯已躡懸絙過河河兩岸相去咸八十歩九驛所絶朱本引法顯𫝊作九驛所記謝兆申云驛當作譯漢之張騫甘英皆不至也余診諸史𫝊即所謂罽賔之境有盤石之磴道狹尺餘行者騎歩相持絙橋相引二十許里方到懸度按漢書西域𫝊罽賔國行者騎歩相持繩索相引二千餘里乃到縣度今云二十恐誤險阻危害不可勝言郭義恭曰烏秅之西有懸渡之國山谿不通引繩而渡故國得其名也其人山居佃於石壁間累石為室民接手而飲所謂猨飲也有白羊小歩馬有驢無牛是其懸渡乎釋法顯又言渡河便到烏萇國烏萇國即是北天竺佛所到國也佛遺足跡於此其跡長短在人心念至今猶爾及曬衣石尚在新頭河又西南流屈而東南流逕中天竺國兩岸平地有國名毗荼佛法興盛有逕滿那般河此句有譌誤有當是又滿當是蒲法顯𫝊作捕般字衍河下脱河字邊左右有二十僧伽藍此水逕流逕歴當是摩頭羅國而下合新頭河自河以西天竺諸國自是以南皆為中國人民殷富中國者服食與中國同故名之為朱云疑漏中字國也泥洹已來聖衆所行威儀法則相承不絶自新頭河至南天竺國迄于南海四五萬里也釋氏西域記曰新頭河經罽賔犍越摩河剌諸國而入南海是也阿耨逹山西南有水名遥奴山西南小東有水名薩罕小東有水名恒伽此三水同出一山俱入恒水康泰扶南𫝊曰恒水之源乃極西北出崑崙山中有五大源諸水分流皆由此五大源枝扈黎大江出山西北流東南注大海枝扈黎即恒水也故釋氏西域記有恒曲之目恒北有四國最西頭恒曲中者是也有拘夷那褐褐當作喝國法顯𫝊曰恒水東南流逕拘夷那褐譌同上國南城北雙林間有希連禪河朱本引觀佛三昧經作熈連河佛國記作希連禪河佛本行經作尼連禪河法顯傳無禪字河下疑又有一河字邊世尊於此北首般泥湼朱本引佛國記作北首般泥洹逺法師不敬王者論云與人絶境謂之泥洹今云泥湼誤分舍利處支僧載外國事曰佛泥湼後天人以新白緤裏佛以香花供養滿七日盛以金棺送以出宫渡一小水水名醯蘭那去王宫可三里許在宫北以旃漏檀字木為薪天人各以火燒薪薪了不燃大迦葉從流沙還不勝悲號感動天地從是之後他薪不燒而自燃也王歛舍利用金作斗量得八斛四斗諸國王天龍神王各得少許齎還本國以造佛寺阿育王起浮屠於佛泥湼處雙樹及塔今無復有也此樹名婆依下疑當作娑若凖此下當作婆羅樹其樹華名娑羅法也此花色白如霜雪香無比也竺芝扶南記曰林陽國去金陳國歩道二千里車馬行無水道舉國事佛有一道人命過燒𦵏燒之數千束樵故坐火中乃更著石室中從來六十餘年尸如故不朽竺芝自見之夫金剛常住是明永存舍利利一作刹見畢天不朽所謂智空㒺窮大覺難測者矣其水亂流於恒恒水又東逕毗舍利一作離城北釋氏西域志曰毗舍利維邪離國也支僧載外國事曰維邪離國去王舍城五千由旬城周圓三由旬維詰家在大城裏宫之南去宫七里許屋宇壞盡惟見處所爾釋法顯云城北有大林重閤佛住於此本菴婆羅女家施佛起塔也城之西北三里塔名放弓仗恒水上流有一國王國王小夫人生肉胎大夫人妬之言汝之生不祥之徴即盛一木函擲恒水中下流有國王遊觀見水上木函開看見千小兒端正殊好朱本作特王取養之遂長大甚勇健所往征伐無不摧服朱本作伏次欲伐父王本國王大憂愁朱本作愁憂下同小夫人問何故憂愁王曰彼國王有千子勇健無比欲來伐我國是以愁爾小夫人言勿愁但於城西作髙樓賊來時置我樓上則我能郤之王如其言賊到小夫人於樓上語賊云汝是我子何故反作逆事賊曰汝是何人云是我母小夫人曰汝等若不信者盡張口仰向小夫人即以兩手将乳朱本引佛國記作兩手搆乳乳作五百道俱墜千子口中賊知是母即放弓仗父母作是思維皆得辟支佛今二塔猶在後世尊成道告諸弟子是吾昔時放弓仗處後人得知於此處立塔故以名焉千小児者即賢刼千佛也釋氏西域志曰恒曲中次東有申迦扇奈掲城也也字疑當作即佛下三寳階國也法顯𫝊曰恒水東南流逕僧迦施國南佛自忉利天東下三道寶階為母説法處寶階既没阿育王於寶階處作塔後作石柱柱上作師子像外道少信師子為吼怖效心誠朱云當作怖懼心伏按佛國記云師子乃大鳴吼見證于是外道懼怖心伏而退恒水又東逕罽賔繞夷城南南接恒水城之西北六七里恒水北岸佛為諸弟子説法處恒水又東南逕沙祇國北出沙祇城南門道東佛嚼楊枝刺土中生長七尺不増不減今猶尚在恒水又東南逕迦維羅衛城北故曰凈王宫也城東五十里有王國當是園下同國有池水夫人入池洗浴出池北岸二十歩東向舉手攀樹生太子太子墮地行七歩二龍吐水浴太子遂成井池衆僧所汲養也太子與難陀等撲象角力射箭入地今有泉水行旅所資飲也釋氏西域朱云宋本作西域志城北北三里恒水上父王迎佛處作浮圖作佛朱云疑當作父抱佛像外國事曰迦維羅越國今無復王也城池荒穢惟有空處有優婆塞姓釋可二十餘家是昔净王之苗裔故為四姓朱云詳見摩登伽經住在故城中為優婆塞故尚精進猶有古風彼日浮圖壞盡條王彌更修治一浮圖私訶條王迸物助成今有十二道人住其中太子始生時妙后所攀樹樹名須口朱云須字之下原缺一字因果經云樹名無憂豈即此樹乎阿育王以青石作后像像字疑衍攀疑漏樹字生太子像昔樹無復有後諸沙門取昔樹栽種之展轉相承到今樹枝如昔尚䕃石像又太子見行七歩足跡今日文理見存阿育王以青石挾足跡兩邊復以一長青石覆上國人今日恒以香花供養尚見足七形文理分明今雖有石覆無異或人復以數重古具朱本作貝重覆貼著石上逾更明也太子生時以龍王夾太子左右吐水浴太子見一龍吐水煖一龍吐水冷遂成二池今尚一冷一煖矣太子未出家前十日出往王田閻浮樹下坐樹神以七寶奉太子太子不受於是思維欲出家也王曰去宮一據據左一據據右晉言十里也朱云此處字誤當作王田去宫一據據左一據據者晉言十里也佛國記云城東北數里有王田太子樹下觀耕處可證太子以三月十五日夜出家四天王來迎各捧馬足爾時諸神天人側塞空中散天香花此時以至河南摩强水即於此水邊作沙門河南摩强水在迦維羅越北相去十由旬此水在羅閲祗瓶沙國相去三十由旬菩薩於是蹔過瓶沙王出見菩薩菩薩於瓶沙隨樓那果園中住一日日暮便去半逹鉢愁宿半逹晉言白也鉢愁晉言山也白山此朱云當是北去瓶沙國十里明旦便去暮宿曇蘭山去白山六由旬於是逕詣貝多樹貝多樹在貝多闕祗北去曇蘭山二十里太子年二十九出家三十五得道此言與經異故所記不同朱云按普曜經六菩薩于樹下坐明星出時豁然大悟年十九出家三十成道與此小異竺法維曰迦衛國佛所生天竺國也三千日月萬一本作宫二千天地之中央也康泰扶南𫝊曰昔范旃時有嘾楊國人家翔梨嘗從其本國到天竺展轉流賈至扶南為旃説天竺土俗道法流通金寶安積當作委積山川饒沃恣其所欲左右大國世尊重之旃問之今去何時可到幾年可迴梨言天竺去此可三萬餘里徃還可三年踰及行四年方返以為天竺之中也恒水又東逕藍莫塔塔邊有池池中龍守䕶之阿育王欲破塔作八萬四千塔悟龍王所供知非世有遂止荒蕪無人此節疑有脱誤朱云按佛國記云阿育王欲破八塔作八萬四千塔龍便見身持王入其宫中觀諸供養具知非世有於是便還此中荒蕪無人洒掃羣象以鼻取水洒地若蒼梧會稽象耕鳥耘矣恒水又東至五河合口盖五水所會非所詳矣阿難從摩竭國向毘舍離欲般泥洹諸天告阿闍世王王追至河上毗舍離諸梨車聞阿難來亦復來迎俱到河上阿難思維前則阿闍世王致恨郤則梨車復怨即於中河入火光三昧燒身而般泥洹身二分分各在一岸二王各持半舍利還起二塔渡河南下一曲巡曲巡當是由旬或是由延説見後到摩竭提國邑朱本作巴連佛邑邑即是阿育王所治之城城中宫殿皆起牆闕彫文刻鏤累大石作山山下作石室長三丈廣二丈髙丈餘有大乗婆羅門子名羅状朱本作汰私婆亦名文殊師利住此城裏爽悟多智事無不逹以清凈自居國王宗敬師事之賴此一人𢎞宣佛法外朱云下疑脱道字不能陵凡諸中國惟此城為大民人富盛競行仁義阿育王壞七塔作八萬四千塔最初作大塔在城南二一作三里餘此塔前有佛跡起精舍戸北向塔塔南有石柱大四五圍朱本作丈四五圍髙三丈餘上有銘題云阿育王以閻浮提布施四方僧還以錢贖塔北三四百步阿育王於此作泥犁城翻苑云梵稱泥犁秦言無有言更無赦處是地獄泥犁城一本無此二字中有石柱亦髙三丈餘上有師子柱有銘記曰曰字衍作泥犁城因緣及年數日月恒水東又東南逕小孤石山山頭有石室石室南向佛坐其中天帝釋以四十二事問佛佛以三指畫跡故在朱云此句有誤當云佛一一以指畫石畫跡故在恒水又西逕王舍新城是阿闍世王所造出城南四里入谷至五山裏五山周圍状若城郭即是萍沙王舊城也前云瓶沙此云萍沙一本作䓑沙未知孰是東西五六里南北七八里阿闍世王始欲害佛處其城空荒又無人徑入谷摶山東南上十五里到耆闍崛山未至頂三里有石窟南向佛坐禪處西北四一作三十步復有一石窟阿難坐禪處天魔波旬化作鵰鷲恐阿難佛以神力隔石舒手摩阿難肩怖心下脱即得止三字鳥跡及疑譌當是手字孔悉存故曰鵰鷲窟也其山峰秀端嚴是五山之最髙也釋氏西域記云耆闍崛山在阿耨逹王舍城東北西望其山有朱云舊本此處錯簡不復可讀誤以梵天來諸佛處以下四百二十二字續此吳本亦然今尋繹文義原説鷲嶺首尾相應而波麗國即是佛外祖國也血脉亦復易知遂割正之後于謝耳伯處見宋本正復如是乃可無疑矣兩峰雙立相去二三里中道鷲鳥常居其嶺土人號曰耆闍崛山山名耆闍鷲也又竺法維云胡語羅閲祗國有靈鷲山胡語云耆闍崛山山是青石頭似鷲鳥阿育使人鑿石假安兩翼兩脚鑿治其身今見存逺望如鷲鳥形故曰靈鷲山也數説不同逺邇亦異今以法顯親宿其山誦首楞嚴香花供養聞見之宗也又西逕迦耶耶一作那城南三一作二十里到佛苦行六年其其一作坐樹處有林林下脱木字朱本引佛國記作本苦行六年處處有林木西行三里到佛入水洗浴天王案樹枝得攀出池處又北行二里得彌家女奉佛乳糜處從此行二里佛於大樹下石上東向坐食糜處樹石悉在廣長六尺髙減二尺國中寒暑均調樹木或數千嵗乃至萬嵗從此東北行二十里到一石窟菩薩入中西向結跏趺坐心念若我成道當有神騐石壁上即有佛影現長三尺許今猶明亮時天地大動諸天在空言此非過去當來諸佛成道處去此西南行減半由旬朱本作由延箋云按毗曇論云四肘為一弓五百弓為一拘盧舍今之二里也八拘盧舍為一由旬今十六里也又云梵衆天身長半由延梵福樓天身長一由延而不言由延之數疑與由旬同義而字殊耳貝多樹下是過去當來諸佛成道處諸天導引菩薩起行離樹三十步天授吉祥草菩薩受之復行十五步五百青雀飛來繞菩薩三匝西去西去朱本作而去菩薩前到貝多樹下敷吉祥草東向而坐時魔遣三玉女從北來試菩薩魔王自從南來一本南來下有試字菩薩以足指按地魔兵卻散三女變為老姥不自服不字上疑脱莫字佛於脱尼字拘律樹下方石上東向坐梵天來諸一本作詣佛處四天王捧鉢處皆立塔外國事曰毗婆梨佛在此一樹卞六年長者女以金鉢盛乳糜上佛佛得乳糜住足尼連河浴朱箋云按法苑珠林引佛本行經云佛得乳糜往尼連禪河浴據此住足尼連當作往尼連禪浴竟於河邊噉糜竟擲鉢水中逆流百步鉢没朱本作投河中迦梨郊龍王接取在宫供養先三佛鉢亦見佛於河傍坐摩訶菩提樹摩訶菩提樹去貝多樹二里於此樹下七日思惟道成魔兵試佛釋氏西域記曰尼連水南流恒水水西有佛樹佛於此苦行日食糜六年西去城五里許樹東河上即佛入浴處東上岸尼衢立樹下坐修舍女上糜於此於是西渡水於六年樹南貝多樹下坐降魔得佛也佛圖調曰佛樹中枯其來時更生枝葉竺法維曰六年樹去佛樹五里書其異也法顯從此東南行還巴連佛邑朱本引佛國記作還向巴連弗邑又云巴連弗邑是阿育王所治城中王宫殿皆使鬼神作之順恒水西下得一精舍名曠野佛所住處復順恒水西下到迦尸國波羅奈城竺法維曰波羅奈國在迦維羅衛國南千二百里中間有恒水東南流佛轉法輪處在國北二十里樹名春浮維摩所處也法顯曰城之東北十里許即鹿野苑本辟支佛住此常有野鹿棲宿故以名焉法顯從此還居巴連佛邑又順恒水東行其南岸有瞻婆大國釋氏西域記曰恒曲次東有瞻婆國城南有卜卜字衍佉下蘭池池水恒在北佛不不字疑譌或是所字説戒處也恒水又逕波麗國即是佛外祖國也朱箋云原本外祖下接兩峯雙立今改正移在前法顯曰恒水又東到多摩梨帝國即是海口也釋氏西域記曰大秦一名梨帝康泰扶南𫝊曰從迦那調洲西南入大灣可七八百里乃到扶扈黎大江口渡江徑西行極大秦也又云發拘利口入大灣中正西北入可一年餘得天竺江口名恒江口有國號擔袂屬天竺遣黄門字興為擔袂王釋氏西域記曰恒水東流入東海盖二水所注兩海所納自為東西也釋氏論佛圖調疑有譌誤列山海經曰西海之南流沙之濵赤水之後黒水之前有大山名崑崙又曰鍾山西六百里有崑崙山所出五水粗以佛圖調𫝊也又近推得康泰扶南𫝊𫝊崑崙山正與調合如𫝊自交州至天竺最近泰𫝊亦知阿耨逹山是崑崙山釋云賴得調𫝊豁然為解乃宣為西域圖以語法状當是汰下同法状以常見怪上下疑有譌誤謂漢來諸名人不應何疑當作向在敦煌南數千里而不知崑崙所在也釋云一云下有曰字一云疑無云字朱云釋云當是僧名復書日疑當作曰按穆天子𫝊穆王於崑崙側瑶池上觴西王母云去宗周瀍澗萬有一千一百里何得不如調言子今見泰𫝊非為前人不知也而今以後乃知崑崙山為無熱丘何云乃胡國外乎余考釋氏之言未為佳證穆天子竹書及山海經皆埋緼嵗乆編韋稀絶書䇿落次難以緝綴後人假合多差逺意謝兆申云逺當作違朱云當是意多差違至欲訪地脉川不與經符騐程准途故自無會釋氏不復根其艱歸之鴻致陳其細趣以辨其非非所安也今按山海經曰崑崙墟在西北帝之下都崑崙之墟方八百里髙萬仭山朱本作上有木禾面有九井以玉為檻面有九門門有開明獸守之百神之所在郭璞曰此自别有小崑崙也又按淮南之書崑崙之上有木禾珠樹玉樹瓊樹不死樹沙棠琅玕在其東絳樹在其南碧樹瑤樹在其北傍有四百四十門門間四里里間九純純丈五尺傍有九井玉横維其西北隅北門開以内不周之風傾宫旋室懸圃凉風朱箋云古本作䦘風淮南子作涼風樊桐在崑崙閶闔之中是其䟽圃䟽圃之池淮南子作地浸之黄水黄水三周復其源是謂丹水飲之不死河水出其西北陬赤水出其東南陬洋水出其西北陬按淮南子赤水句下尚有弱水出自窮石至于合黎句故下云四水若節去弱水便只三水矣凡此四水帝之神泉以和百藥以潤萬物崑崙之丘或上倍之是謂凉風之山登之而不死或上倍之是謂𤣥圃之山按淮南子𤣥圃是縣圃無之山二字登之乃靈能使風雨或上倍之乃維上天登之乃神是為太帝之居禹乃以息土填鴻水以為名山掘崑崙墟以下地髙誘曰地或作池山海經曰不周之山不周之北門以納不周之風則以髣髴近浮圖調何氏云浮圖疑作佛圖之説阿耨逹六水葱嶺于闐朱本于闐下有二水兩字之限與經史諸書全相乖異又按十三洲説崑崙山也按十三州志乃闞駰所撰十洲記乃東方朔所撰崑崙等語在十洲記中則三字疑衍説當是記也字亦疑衍似當云十洲記崑崙山在西海之戍地方與原文合而句亦順在西海之戍地北海之亥地去㟁十三萬里有弱水周匝繞按十洲記當作周迴繞匝山東南接積石圃西北接北户之室東北臨大活之井西南至承淵之谷此四角大山實崑崙之支輔也積石圃南頭昔西王母告周穆王去咸陽三十六萬里按十洲記作王母告周穆王云咸陽去此四十六萬里山髙平地三萬六千里上有三角方廣萬里形如覆十洲記作偃盆上有金臺玉闕亦元氣之所合天帝君之所治也按十洲記作亦元氣之所舍天帝居住處也則合字當是舍字君字當是居字所字衍治字當是住字考東方朔之言及經五萬里之文難言浮圖調康泰之是矣六合之内水澤之藏大非為巨小非為細存非為有隱非為無其所苞者廣矣於中同名異域稱謂相亂亦不為寡至如東海方丈亦有崑崙之稱西洲銅柱又有九府之治東方朔十洲記曰方丈在東海中央東西南北岸相去正等方丈方面各五千里上專是羣龍所聚有金玉琉璃之宮三天司命所治處羣仙不欲升天者皆徃来也上廣按十洲記作下狹上廣故曰崑崙故曰崑崙山有三角其一角正北干辰星之燿十洲記作煇名曰閬風巔其一角正西名曰𤣥圃臺十洲記作堂其一角正東名曰崑崙宫其處處十洲記作一角有積金為天墉城面方千里城上安金臺五所玉樓十二其北户出十洲記作山朱本出下有承淵山三字又有墉城金臺玉樓相似如一淵精之闕十洲記作流精之闕光碧之堂瓊華之室紫翠丹房景燭曰暉四字譌按十洲記作錦雲燭日朱霞九光西王母之所治真宫仙靈之所宗上通璿璣元氣流布五常玉衡理九天而調隂陽品物羣生竒特皆出十洲記作希竒特出在於此十洲記在上有皆字天人濟濟不可具記張華叙東方朔神異經曰崑崙有銅柱焉其髙入天所謂天柱也圍三千里貟周如削下有迴屋仙人九府治上有大鳥名曰希有南向張左翼覆東王公右翼覆西王母背上小處無羽一萬九千里西王母嵗登翼上之東王公也故其柱銘曰崑崙銅柱其髙入天貟髙如削膚體美焉其鳥銘曰有鳥希有緑赤煌煌不鳴不食東覆東王公西覆西王母王母欲東登之自通隂陽相須惟㑹益工遁甲開山圖曰五龍見敎天皇被跡望在無外柱洲崐崙山上榮氏法云五龍治在五方為行神五龍降天皇兄弟十二人分五方為十二部法五龍之跡行無為之化天下仙聖治在柱洲崑崙山上無外之山在崑崙東南一萬五千里五龍天皇皆出此中為十二時神也山海經曰崑崙之丘實維帝之下都其神陸吾是司天之九部及帝之囿時郭景純注云主九城之部界天帝菀囿之時節也然六合之内其苞逺矣幽致冲妙難本以情萬像遐淵渾思絶根朱云渾字疑衍謝云根一作垠尋自不以上疑有譌脱登兩龍于雲轍騁八駿于龜途等軒轅之訪百靈方大禹之集會計儒墨之説孰使辨哉又出海外南至積石山下有石門河水冐以西南流山海經曰河水出渤海又海水西北入禹所𨗳積石山山在隴西郡河間當是關漢地理志河縣屬金城郡縣西南羌中余考羣書咸言河出崑崙重源潜發淪于蒲昌出於海水故洛書曰河自崑崙出於重野謂此矣逕積石而為中國河故成公子安大河賦曰覧百川之𢎞壮莫尚美于黄河潜崑崙之峻極出積石之嵯峨釋氏西域記曰河自蒲昌潜行地下南出積石而經文在此似如不比積石宜在蒲昌海下矣禹貢錐指云酈注以此經二十字為錯簡盖以下文南入葱嶺觀之則積石反在葱嶺之北必無是理也宜移在後又東注于泑澤之下則自崑崙而葱嶺而蒲昌而積石原委秩然方位悉當矣又云按水經叙西域兩源較漢書尤為明偹惟是積石一山錯簡在渤海之下蔥嶺之上遂来後人之彈射并其全經而疑之而不知此非其本文乃妄庸人之所竄易也彼見山海經云河水出渤海西北入積石山遂以此經海外之海為渤海殊不知泑澤之一名蒲昌海也彼見此經云河水東入塞過敦煌酒泉張掖郡南遂謂積石距敦煌遼逺而泑澤最近故移積石於渤海之下使泑澤與敦煌相接殊不知三郡界中實無河也盖漢世河闗以西皆為羌中地河水所經人莫能覩故聊假三郡之南以表之非真謂河自鹽澤東流入玉門陽闗也杜佑不察此意而以為纂集之不詳固其宜矣若夫道元之注惟渤海以上博引釋氏怪誕之説甚覺無謂至葱嶺以下發明頗多其言崑崙墟也曰淺見寡聞非所詳究其言積石山也曰宜在蒲昌海下其言葱嶺河也曰河源潜發分為二水其言蒲昌海也曰洄湍電轉為隱淪之􅎃正其謬而補其闕亦可謂精審之至矣杜佑詆水經并詆道元豈通論哉附録杜氏通典論水經所云河出崑崙山者宜出於禹本紀山海經所云南入蔥嶺及出于闐南山者出於漢書西域𫝊而酈道元都不詳正所注河之發源亦引禹紀山經釋法顯遊天竺記釋氏西域記所注南入葱嶺一源出于闐山合流入蒲昌海雖約漢書亦不尋究又水經云出海外南至積石山下有石門然後南流入葱嶺據此則積石山當在葱嶺之北又云入塞過敦煌酒泉張掖南並今郡地也夫山水地形固有定體自葱嶺于闐之東敦煌張掖之間華人来徃非少從後漢至大唐圖籍相承注記不絶大磧亘數千里未有桑田碧海之變陵遷谷移之談此處豈有河流纂集者不詳斯甚西域𫝊云河水一源出葱嶺一源出于闐合流東注蒲昌海皆以潜流地下南出積石為中國河比禹紀山經猶校附近終是紕繆此惟憑張騫使大夏見兩道水從葱嶺于闐合流入蒲昌海其于闐出美玉所以騫𫝊遂云窮河源也按古圖書名河所出曰崑崙山疑所謂古圖書即禹本紀以于闐山出玉乃謂之崑崙即所出便云是河也窮究諸説悉皆繆誤孟堅又以禹貢云導河自積石遂疑潜流從此方出且漢時羣羌種類雖多不相統壹未為强國漢家亦未嘗遣使詣西南羌中或未知自有河也寕有吐蕃中河從西南數千里向東北流見與積石山下河相連聘使涉歴無不言之吐蕃自云崑崙山在國中西南則河之所出也又按尚書云織皮崑崙析支渠搜西戎即叙范曄後漢書云西羌在漢金城郡之西南濵于賜支續漢書云河闗西千餘里河曲羌謂之賜支盖析支也然則析支在積石之西是河之上流明矣崑崙在吐蕃中當亦非謬而不謂河之本源乃引葱嶺于闐之河謂從蒲昌海伏流數千里至積石方出斯又班生之未詳也胡渭云按吐蕃歴周及隋猶隔西羌未通於中國唐貞觀八年始遣使朝貢太宗遣行人馮徳遐徃撫慰之尋復遣使隨徳遐入朝奉表求婚十五年以文成公主妻之杜佑所謂聘使涉歴從此始也積石秦漢時為西羌地晉永嘉以後其地為吐谷渾所據及髙宗龍朔三年吐蕃滅吐谷渾積石遂為吐蕃地自後使命往來皆指吐蕃中水西南來與積石山下河相連者為黄河而吐蕃亦自言崑崙在國中西南河之所出矣水經注集釋訂訛卷一
