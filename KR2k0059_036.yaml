body:
  text: 水經注集釋訂訛卷三十六歸安沈炳巽撰青衣水桓水若水沫水延江水沅酉水存水温水青衣水出青衣縣西䝉山東與沫水合也縣故有青衣羌國也竹書紀年梁惠成王十年瑕陽人自秦道㟭山青衣水來歸漢武帝天漢四年分沈黎郡西部都尉華陽國志作罷沈黎置兩郡都尉一治旄牛主外羌一治青衣主漢民公孫述之有蜀也青衣不服世祖嘉之建武十九年以為郡安帝延光二年置蜀郡屬國都尉青衣王子心慕漢制上求内附順帝陽嘉二年改曰漢嘉一云當有兩嘉字得此良臣也縣有䝉山青衣疑脱水字所發東逕其縣與沫水㑹於越嶲郡之靈闗道青衣水又東邛水注之水出漢嘉嚴道邛來山東至蜀郡臨邛縣東入青衣水至犍為南安縣入於江南安今為嘉定州及眉州丹稜縣地故南安治在今夾江縣西縣東南去州八十里青衣水逕平鄉謂之平鄉江益州記曰平鄉江東逕峨眉山在南安縣界去成都南千里然秋日清澄望見兩山相守如峨眉焉青衣水又東流注於大江禹貢錐指云青衣水自蘆山縣北東流入雅州與沫水合沫水自威州徼外東南流逕天全六蕃招討司西北又東南逕蘆山至雅州東青衣水注之又東洪雅夾江峨眉至嘉定州㑹涐水入大江二水本異源酈注云濛水即大渡水據下流合處言之耳桓水出蜀郡岷山西南行羌中入於南海尚書禹貢岷嶓既藝沱潛既道蔡蒙旅平和夷底績鄭元曰和上夷所居之地也和讀曰桓地志曰桓水出蜀郡蜀山西南行羌中者也尚書又曰西傾因桓是來馬融王肅云西治傾山唯因桓水是來言無他道也余按經據書岷山西傾俱有桓水桓水出西傾山更無别流所𨗳者唯斯原本譌自水耳浮於潛漢而達江沔故晉地道記曰梁州南至桓水西底黒水東限扞闕今漢中巴郡汶山蜀郡漢嘉江陽朱提涪陵隂平廣漢新都梓橦犍為武郡上庸魏興新城皆古梁州之地自桓水以南為夷書所謂和夷底績也然所可當者唯斯水與江耳桓水盖二水之别名為兩江之通稱矣鄭元注尚書言織皮謂西戎之國也西傾雍州之山也雍戎二野之間人有事於京師者道當由此州而來桓是隴坂名其道盤桓旋曲而上故名曰桓是今其下民謂是坂曲為盤也斯乃元之别致恐乖尚書因桓之義非浮潛入渭之文余考校諸書以具見聞今畧緝綜川流注㳂之緒雖今古異容本其流俗粗陳所由然自西傾至葭萌入於西漢即鄭元之所謂潛水者也自西漢遡流而届於晉夀界阻漾枝津南歴罡穴迤邐而接漢㳂此入漾書所謂浮潛而逾沔矣歴漢川至南鄭縣屬於裒水遡裒暨於衙嶺之南溪川皮胡云川皮當作水支字之譌也灌於斜川届於武功而北達於渭水此乃水陸之相闗川流之所經復不乖禹貢入渭之宗實符尚書亂河之義也禹貢錐指云漢志蜀郡下云禹貢桓水出蜀山元和志茂州通化縣本漢廣柔縣地蜀山在縣東北六里西南行羌中入南海水經同今按此别是一水行羌中入南海不復經中國指為禹貢之桓水何其謬也孔傳曰西傾山名桓水自西傾山南行因桓水是來浮於潛酈道元云岷山西傾俱有桓水此亦為班孔作調人耳桓字古有和音鄭康成讀和夷之和曰桓謂水上即夷所居晉地道記云梁州之地自桓水以南為夷書所謂和夷底績也依鄭説其所指者當為漢之涐水唐之大渡河而謂此水即西傾所因之桓大非鄭既破和為桓其於因桓是來則又云桓是隴坂其道盤桓旋曲而上故名曰桓支離舛錯殊不可通若水出蜀郡旄牛徼外東南至故闗為若水也司馬相如傳曰畧定西南夷邊闗益斥西至沫若水又曰闗沬若是若水故有闗也山海經曰南海之内黑水之間有木名曰若木若水出焉又云灰野之山有樹焉青葉赤華厥名若木生崑崙山西附西極也淮南子曰若木在建木西木有十華淮南子作末注曰末端也華光也言木末有光如華也其光照下地故屈原離騷天問曰羲和未陽若華何光是也然若木之生非一所也黑水之間厥木所植水出其下故水受其稱焉若水㳂流間闗蜀土黄帝長子昌意徳劣不足紹承大位降居斯水為諸侯焉娶蜀山氏女生顓頊於若水之野有聖徳二十登帝位承少皥金官之政以水徳寳歴矣若水東南流鮮水注之漢志鮮水出旄牛徼外南入若水一名州江大度水出徼外至旄牛道南流入於若水又逕越嶲大莋縣入繩繩水出徼外山海經曰巴遂之山繩水出焉東南流分為二水其一水枝流東出逕廣柔縣今為石泉縣東流注於江其一水南逕旄牛道至大莋與若水合自下亦通謂之為繩水矣莋夷也汶山曰莋南中曰昆彌蜀曰卭漢嘉越雋曰莋皆夷種也南過越嶲邛都縣西直南至㑹無縣今為㑹川營地淹水東南流注之邛都縣漢武帝開邛莋置之縣陷為池今因名為邛池南人謂之河河中有蛙字疑譌嶲山有嶲水言越此水以章休盛也後復反叛元鼎六年漢兵自越嶲水伐之以為越嶲郡治邛都縣王莽遣任貴為領戎大尹守之更名為集嶲也縣故邛都國也越嶲水即繩若矣似隨水地而更名矣又有温水冬夏常熱其源可燖雞豚下湯沭洗能治宿疾昔李驤敗李流於温水是也胡渭曰按此温水源流不逺非漢志牂柯郡鐔封縣下之温水東至廣欎入欎者金吉甫謂漢志以瀘為温字後省誤非也邛都唐為嶲州越嶲縣今建昌衛四川行都司治領營四㑹川鹽井冕山越嶲若水又逕㑹無縣元和志㑹川縣北至嶲州三百七十里本漢㑹無縣也今為㑹川營地縣有駿馬河水出縣東高山山天馬徑厥跡存焉馬日行千里民家馬牧之山下或産駿駒言是天馬子河中有貝子胎銅朱云胎銅謂銅璞也今華陽國志云河中有銅鉛鉛乃胎字之誤耳以羊祠之則可取也又有孫水焉水出臺高縣即臺登縣也孫水一名白沙江南流逕卭都縣司馬相如定西夷橋孫水即是水也又南至㑹無入若水漢志臺登縣孫水南至㑹無入若行七百五十里元和志嶲州臺登縣正南微西至州一百七十里念諾水本名繩水流入瀘水在縣西北七十里自羌戎界流入長江水本名孫水出縣西北胡浪山下今冕山營東北有孫水若水又南逕雲南郡之遂乆縣蜻蛉水入焉遂乆縣本屬越嶲郡蜀漢建興三年分益州永昌置雲南郡以遂乆來屬蜻蛉水出蜻蛉縣西東逕其縣下又東注於澠水漢志蜻蛉縣禺同山有金馬碧雞水出蜻蛉縣西東逕其縣下縣以氏焉有石猪圻長谷中有石猪子母數千頭長老傳言夷昔牧此華陽國志作夷昔牧豬於此一朝化為石迄今夷人不敢徃牧貪水出焉蜻蛉水又東注於繩水繩水又逕三絳縣西又逕姑復縣北對三絳縣淹水注之按漢志臺登㑹無遂乆蜻蛉三絳姑復並屬越嶲郡三絳一曰小㑹無故經曰淹至㑹無注若水若水又與母血水合水出益州郡弄棟縣東農山母血谷北流逕三絳縣南北入繩繩水又東涂水注之水出建寧郡之牧靡縣漢志益州郡作收靡但後漢書郡國志及華陽國志酉陽雜爼俱作牧靡恐是漢志之誤南山縣山並即草以立名山在縣東北焉句山南五百里山生牧靡可以解毒百卉方盛烏多侯食烏啄口中毒必急飛徃牧靡山啄牧靡以解毒也漢志益州郡收靡南山臘涂水所出西北至越嶲入繩李竒曰靡音麻即升麻後漢書郡國志益州郡牧靡晉書地理志建寧都牧麻酉陽雜爼建寧郡牧靡縣烏句山南五百里牧靡草可以解毒百卉方盛鳥鵲誤食其啄中毒必急飛牧靡上啄牧靡以解也涂水導源臈谷西北流至越嶲入繩漢志益州郡牧靡縣南山臘涂水所出西北至越嶲入繩繩水又逕越嶲郡之馬湖縣今為四川馬湖府謂之馬湖江又左合卑水縣而東流注馬湖江也又東北至犍為朱提縣西西下疑有脱文瀘江水後漢書建武十九年武威将軍劉尚擊西南夷反者棟蠶渡瀘水入益州郡注云瀘水一名若水出旄牛徼外經朱提至僰道入江今在嶲州南朱提山名也應劭曰在縣西南縣以氏焉犍為屬國也在郡南千八百許里建安二十年立朱提郡郡治縣故城胡渭曰朱提郡尋廢諸葛亮南征復置自梁陳以來不復賓服隋開置恭州唐改為曲州元和志云曲州南北四百里東西七百里終年宻霧未嘗覩日月輝光樹木皆衣毛深厚時時多水濕晝夜沾洒上無飛鳥下絶走獸惟夏月頗有蝮蛇土人呼為漏天也郡原本譌邵西南二百里得所綰堂琅縣劉昭曰朱提縣西南有堂琅山多毒草盛夏之月飛鳥過之不能得去西北行上高山羊膓繩屈八十餘里或攀木而升或繩索相牽而上縁陟者若将階天故袁休明巴蜀志云高山嵯峨巖石磊落傾側縈迴下臨峭壑行者扳縁牽援繩索三蜀之人及南中諸郡以為至嶮有瀘津東去縣八十里水廣六七百步深十數丈多瘴氣鮮有行者晉明帝太寧二年李驤等侵越嶲攻臺登縣寧州刺史王遜遣将軍姚岳擊之戰於堂琅驤軍大敗岳追之至瀘水赴水死者千餘人遜以岳等不窮追怒甚髪上衝冠帢裂而死按永昌郡有蘭倉水出西南博南郡宋本作縣漢明帝永平十二年置博南山名也縣以氏之其水東北流出博南山漢武帝時通博南山道渡蘭倉津土地絶逺行者苦之歌曰漢徳廣開不賓渡博南越倉津渡蘭倉為作人華陽國志作為佗人山高四十里蘭倉水出金沙越人收以為黄金又有光珠穴穴出光珠又有琥珀珊瑚黄白青珠也蘭倉水東北逕不韋縣與類水合水出嶲唐縣今雲南大理府地漢武帝置類水西南流曲折又北流東至不韋縣注蘭倉水又東與禁水合水自永昌縣而北逕其郡西水左右甚饒犀象山有鈎蛇長七八丈尾末有岐蛇在山澗水中以尾鈎岸上人牛食之此水旁瘴氣特惡氣中有物不見其形其作有聲中木則折中人則害名曰鬼彈何氏云左思蜀都賦初有鬼彈飛丸礌礉之句後改定無之見世說注惟十一月十二月差可渡正月至十月逕之無不害人故郡有罪人徙之禁傍不過十日皆死也禁水又北注瀘津水又東逕不韋縣北而東北流兩岸皆高山數百丈瀘峯最為高秀孤高三千餘丈是山於晉太康中崩震動郡邑水之左右馬步之徑裁通而特有瘴氣三月四月逕之必死非此時猶令人閟疑作悶吐五月以後行者差得無害故諸葛亮表言五月渡瀘并日而食臣非不自惜也顧王業不可偏全於蜀故也益州記曰瀘水源出曲羅舊下三百里曰瀘水兩峯有殺氣暑月舊不行故武侯以夏渡為艱瀘水又下合諸水而㹅其目焉故有瀘江之名矣自朱提至僰道有水步道有黑水羊官水至嶮難三津之阻行者苦之故俗謂之語曰猶項本作揂溪赤木盤蛇七曲盤羊烏櫳氣與天通看都濩泚住柱疑作林呼尹庲降賈子老疑是左擔原本譌儋七里看都二語未詳華陽國志云庲降賈子左擔七里按庲降屯名也華陽國志建寧郡治故庲降都督屯也李克蜀記曰蜀山自綿谷葭萌道徑險仄北來擔負者不容易肩謂之左擔道又有牛叩頭馬搏頰坂其艱嶮如此也又東北至僰道縣入於江若水至僰道縣又謂之馬湖江繩水瀘水孫水淹水大渡水隨决入而納通稱是以諸書録記羣水或言入若又言注繩亦咸言至僰道入江正是異水沿注通為一津更無别川可以當之水有孝子石西西字當在上句水字下宋本西作昔縣人有隗叔通者性至孝為母給江膂水事具華陽國志江膂作江裔天為出平石至江膂中今猶謂之孝子石可謂至誠發中而休應自天矣禹貢錐指云按今府縣圖志若水在建昌衛俗名打沖河自冕山營西徼外營故寧番衛在建昌衛東北東南流至衛西鹽井營東南與雲南金沙江合營在衛西元和志雋州昆明縣東北至州三百里本漢定苲縣也出鹽鐡夷皆用之漢将張嶷殺其豪率遂獲鹽鐡之利鹽井在縣城中取鹽先積此水燒之以水洗土即成黒鹽凡言苲者夷人以大江水上置藤橋謂之苲其定苲大苲皆是近水置藤橋處金沙江源出吐蕃界至共龍山犛牛石下南流漸廣本名犛水後訛為麗東南流經麗江府北又東經姚江府北合打沖河又東合瀘水又東經㑹川營南通典㑹川縣有瀘水五月渡瀘即此元和志雋州南至瀘渡四百五十里又東至東川府西折而東北經烏蒙府西北又東北經馬湖南又東逕叙州府南而北入大江鹽井東南盖即漢大莋縣界繩若合流處若為建昌衛西之打沖河繩則姚安府北之金沙江也瀘本作盧如盧弓盧矢盧橘之類皆馴黑劉熙釋名土黑曰盧沈括筆談云夷人謂黑為盧漢中山盧奴縣有盧水酈道元云水黑曰盧不流曰奴尤盧水為黑水之切證也牧誓八國有盧人疑即居盧水上者其字後加水作瀘章懐太子注後漢書云瀘水一名若水則瀘若似非異源而酈元引益州記曰瀘水源出曲羅舊下三百里曰瀘水兩峯有殺氣暑月舊不行故武侯以夏渡為艱瀘水又下合諸水而總其目焉故有瀘江之名矣據此則瀘水自出曲羅舊其地當在若水之東下流合若水故若水兼瀘水之目所謂隨决入而納通稱者也元和志云嶲州西瀘縣東北至州二十七里本漢卭都縣地瀘水在縣西一百十二里水峻急而多石土人以牛皮作船而渡一船勝七八人盖即曲羅舊之瀘水也考其源流不出漢越嶲犍為二郡界而杜氏通曲云吐蕃有可跋海去赤嶺百里方圓七十里東南流入西洱河合流而東號漾濞水又東南出㑹川為瀘水瀘水即黑水也程大昌金履祥之説皆出於此漾濞水見唐書在今大理府西百里西洱河即葉榆河也出大理鄧川州㸃蒼山匯為巨湖周三百里亦曰西洱海今按水經注葉榆河出益州郡葉榆縣縣東有葉榆澤葉榆水之所鍾也其水自縣南枝分東北流逕遂乆縣東姑復縣西與淹水合淹水雖合繩若入蜀江而葉榆初無黑水之名也何以知為黑水之源其經流則自邪龍縣東南流逕滇池縣南又東與盤江合又東南至交阯麋冷縣入海此與㑹川相去懸絶並不合繩若入蜀江安得謂漾濞水東南出㑹川為瀘水即滇池縣北所祠之黑水哉杜説非是又按水經注永昌郡有蘭倉水出博南縣漢武帝時通博南山道渡蘭倉津土地絶逺行者苦之歌曰漢徳廣開不賓度博南越倉津其水東北流逕不韋縣與類水合又東與禁水合又北注瀘津水然則此蘭倉水仍東北合瀘水入蜀江也若今之所謂䦨倉江元人指以為禹貢之黑水者則東南流至交阯入海與梁州絶無交涉影響附㑹之談殊不足信漢志滇池澤在滇池縣西北有黑水祠後漢志縣北有黑水祠或以為武帝開置益州郡始立之非也使帝知郡界有黒水而立此祠則班史必知其所在而能言之矣竊謂此祠盖彼中相承已乆黑水即金沙江東經㑹無縣南南直滇池縣縣故滇王國於其北立祠祭之宜矣自周衰以迄漢初聲教阻絶故尚書家莫能言梁州黑水之所在千載而下尚賴有此祠可以推測而得之語云天子失官學在四夷又云禮失而求之野此亦其一端也杜佑以漾濞水經㑹川縣者為黑水樊綽以麗水合瀰渃江者為黑水程大昌以西洱河貫葉榆澤者為黑水元人則以䦨倉江至交阯入海者為黑水而明李元陽引張立道之事以為證此皆轉相附㑹以求合於入南海之文非實有所騐也以是為雍界之黑水吾不敢知如謂梁界之黑水亦即斯川則梁州奄有雲南極於交阯以一州而兼數州之地何至若是之廣逺此可以理斷之而信其必不然者也沫水出廣柔徼外漢志蜀郡有廣柔縣其故城在今威州西今石泉縣是其故地縣有石細宋本作紐鄉禹所生也開山圖注云女狄暮汲石紐山下泉中得月精如雞子吞之遂孕十四月而生禹楊雄蜀本紀云禹本汶川郡廣柔縣也生於石紐括地志云茂州汶川縣石紐山在縣西七十三里今夷人共營之地方百里不敢居牧有罪逃野捕之者不逼能藏三年不為人得則共原之言大禹之神所祐之也東南過旄牛縣北今之黎大所即旄牛縣故地又東至越嶲靈道縣出䝉山南胡渭云越嶲靈闗道去蒙山甚逺沫水所經當屬漢嘉郡之靈闕縣經注並譌靈道縣一名靈闗道漢制夷狄白上下疑有譌字疑白當作曰道縣有銅山山人有劉慈者此下疑有脱文當有晉字大始九年黄龍二見於慈池縣令董𤣥之率吏民觀之以白刺史王濬濬表上之晉朝改䕶龍縣也沫水出岷山西東流過漢嘉郡南流衝一高山山上合下開水逕其間山即蒙山也東北與青衣水合華陽國記曰二水於漢嘉青衣縣東合為一川自下亦謂之為青衣水水又東逕開邦縣故平鄉也晉初置沫水又東逕臨邛南而東出於江源縣也東入於江昔沫水自䝉山至南安而溷崖水脉漂疾故害舟船歴代為患蜀郡大守李冰發卒鑿平溷崖河神贔怒氷乃操刀入水與神闘遂平溷崖通正水路開處即氷所穿也延江水出犍為南廣縣今成都府富順等縣及叙州府慶符縣地又東至䍧牱鄨縣東屈北流鄨縣故犍為郡治也縣有犍山晉建興元年置平夷郡縣有鄨水出鄨邑西不狼山東與温水合温水一曰煖水出犍為符縣今四川瀘州及諸縣地而南入鄨水鄨亦出符縣南與温水㑹闞駰謂之闞水俱南入鄨邑一作水鄨水於其縣而東注於延水延水又與漢水合出犍為漢陽道今叙州府長寜縣王莽之親通也山闗谷東至鄨邑入延江水也漢地理志犍為郡漢陽縣都尉治山闟谷漢水所出東至鄨入延此之山闗當作山闟至巴郡涪陵縣今重慶府涪州及武陵縣注更始水更始水即延江枝分之始也延水北入涪陵水涪陵水出縣東故邑郡之南鄙王莽更名巴亭魏武分巴丘為涪陵郡兩漢地志巴郡俱有涪陵縣晉地志云蜀置涪陵郡領縣五晉因之今云魏武分巴丘為涪陵郡所未詳也按晉書地理志又云漢獻帝建安六年改永寧為巴東以巴郡為巴西又立涪陵郡則涪陵郡之立斷是漢始矣張堪為縣㑹公孫述擊堪同心義士選習水者筏渡堪於小别江即此水也後漢書張堪為謁者使送委輸縑帛并領騎車詣大司馬吳漢伐公孫述在道追拜蜀郡太守時漢軍餘七日糧隂具船欲遁去堪馳徃見漢説述必敗已而果拔成都其水北至枳縣今為重慶府長夀南川二縣地入江更始水東入巴東之南浦縣其水注引瀆水石門空岫隂深䆳澗闇密傾崖上合恒有落勢行旅避瘴将有逕之處無不危心於其下又謂之西鄉水亦謂之西鄉溪溪水間闗二百許里方得出山又通波注逺復二百餘里東南又上下疑有譌字脫文又當作入遷陵縣也又東南至武陵西陽縣按漢志武陵郡有酉陽縣應劭曰酉水所出今云西陽譌入於酉水武陵先賢𫝊曰潘京世長為郡主簿太守趙偉甚器之問京貴郡何以名武陵京答曰鄙郡本名義陵在辰陽縣界與夷相接數為所破光武時移治東山之上遂爾易號傳曰止戈為武詩云高平曰陵於是名焉酉水北岸有疑是黚下同陽縣許慎曰温水南入盖鄨水以下津流㳂注之通稱也故縣受名焉西鄉溪口在遷陵縣故城上五十里左合酉水酉水又東際其故城北又東逕酉陽故縣南而東出也兩縣相去水道可四百許里於酉陽合也酉水東南至玩陸當作沅陵今辰州府治及諸縣地縣入於沅按酉水注錯簡在三十七卷沅水注内今改正於此明一統志酉水在辰州府城西北五里源出酉陽東入沅水酉水𨗳源益州巴郡臨江縣今為重慶府忠州故武陵之充縣酉源山東南流逕陽故縣南陽故上漏無字按漢志武陵郡有無陽遷陵二縣相近後漢志省無陽晉志作舞陽即無陽也又東逕遷陵故縣界與西鄉溪合即延江之枝津更始之下流謂之西鄉溪口酉水又東逕遷陵縣故城北王莽更名曰遷陸也酉水東逕酉陽故縣南縣故酉陵也酉水又東逕沅陵縣北又東南逕潘承明壘西承明討五溪蠻營軍所築吳志潘濬字承明官太常五谿蠻夷叛亂孫權假濬督諸軍討之斬獲萬數自是羣蠻衰弱一易寧静其城跨山枕谷酉水又南注沅水闞駰謂之受水其水所決入名曰酉存水出犍為􅛿鄢縣漢地志作􅛿䣕縣注云䣕音莫亞反王莽之孱鄢也漢志莽曰孱䣕益州大姓雍闈反結壘於山繫馬栁柱柱生成林今夷人名曰雍無梁林梁夷言馬也周水自縣東南流逕牧靡縣北又東逕且蘭縣北今為馬湖府地而東南出也東南至欎林漢欎林郡今為廣西栁州等府定周縣為周水周水又東逕䍧牱郡之無歛縣北漢䍧牱郡今四川馬河府地而東南與無歛水合矣水首受䍧牱水東逕無歛縣為無歛水又東注於存水存水又東逕欎林定周縣為周水盖水變名也又東北至潭中縣今栁州府治及諸縣地注於潭温水出䍧牱夜郎縣縣故夜郎侯國也唐䝉開以為縣王莽名曰同亭矣温水自縣西北流逕談䑓漢志䍧牱郡談槀縣師古曰音丑老反此云談䑓譌與迷水合水西出益州郡之銅瀨矣疑譌是縣當談虜山地理志銅瀨縣注云談虜山迷水所出東逕談䑓縣當作東逕談槀縣右注温水温水又西逕昆澤縣南又逕味縣縣故滇國都也諸葛亮討平南中劉禪建興元年分益州郡置建寧郡於此水側皆是高山山水之間悉是木耳夷居語言不同嗜欲亦異華陽國志云夷人大種曰昆小種曰叟皆曲頭木耳環鐡褁結雖曰山居土差平和而無瘴毒温水又西南逕須當作滇池於疑衍或當作之西北池周三百許里上源深廣下流淺狹似如倒池一作倒流故曰滇池也長老傳下流淺言池中有神馬家馬交之則生駿駒日行五百里晉太元十四年寧州刺史費統言晉寧郡滇池縣兩神馬一白一黑盤戲河水之上有滇州元封三年立益漏州字郡治滇城劉禪晉寧郡治也温水又西㑹水澤與葉榆僕水合漢地志益州有葉榆縣今為大理府治志云葉榆澤在東貪水首受青蛉水南至邪龍入僕温水又東南逕䍧牱之母單縣建興中劉禪割屬建寧郡橋水注之水上承俞亢之南池漢志作俞元今為澂江府治志云池在南橋水所出東至母單入温縣治龍池洲周四十七里一名河水與邪龍分浦後立河陽郡今澂江府治治河陽縣縣在河源州上又有雲平縣並在州疑作洲中橋水東流母單縣注於温温水又東南南下當有逕字興古郡之毋掇縣東按漢志毋掇屬益州郡掇師古曰其字從木音之悦反今從手譌興古郡蜀置晉因之統縣十一晉書地理志作掇此葢從晉書故從手也王莽更名有掇也與南橋水合水出縣之橋山東流梁水注之梁水上承河水與疑作於俞元縣而東南逕興古之勝休縣王莽更名勝僰縣梁水又東逕毋掇縣左注橋水橋水又東注於温温水又東南逕律高縣南劉禪建興三年分䍧牱置興古治宛温縣晉書地道記治此温水又東南逕梁水郡南温水上合梁水故自下通得梁水之稱是以劉禪分興古之盤南置郡於梁水縣也温水又東南逕鐔封縣北又逕來唯縣東而僕水右出焉又東至欎林廣鬱縣今為廣西潯州府貴縣為欎水秦桂林郡也漢武帝元鼎六年更名鬱林郡王莽以為鬱平郡矣應劭地理風俗記曰周禮鬱人掌祼器凡祭醊賓客之祼事和鬱鬯以實樽彛鬱芳草也百草之華煮以合釀黑黍以降神者也或説今鬱金香是也一曰鬱人所貢因氏郡矣温水又東逕増食縣有文象水注之其水道源䍧牱句町縣應劭曰故句町國也王莽以為從化文象水䝉水與盧唯水來細水伐水並自縣東歴黄鬱至増食縣注於鬱水也又東至領方縣東今為廣西栁州府賓州及南寜府治暨諸屬縣地與斤南水合縣有朱涯當作厓下同水出臨塵縣漢志臨塵縣朱涯水入領方東北流驤水注之漢志増食縣驩水首受䍧牱東界入朱涯水今云驤水誤水源上承䍧牱水東逕増食縣而下注朱涯水朱涯水又東北逕臨塵縣王莽之監塵也縣有斤南水侵離水並逕臨塵東入領方縣流注鬱水按漢志臨塵縣有斤員水朱引漢志亦作南豈藏本各異耶東北入於鬱鬱水即夜郎豚水也漢志廣鬱縣鬱水首受夜郎豚水東至四㑹入海漢武帝時有竹王興於豚水有一女子浣於水濱有三節大竹流入女子足間推之不去聞有聲持歸破之得一男兒遂雄夷濮華陽國志作長養有才武遂雄夷狄氏竹為姓所損破竹於野成林王祠竹林是也王嘗從人止大石上命作羹從者曰無水王以劒撃石出水今竹王水是也後唐䝉開䍧牱斬竹王首夷獠咸怨以竹王非血氣所生求為立祠華陽國志作求為立嗣帝封三子為侯及死配父廟今竹王三郎祠其神也豚水東北流逕談槀縣東逕䍧牱郡且蘭縣今為四川播州謂之䍧牱水水廣數里縣臨江上故且蘭侯國也一名頭蘭䍧牱郡治也楚将荘蹻泝沅伐夜郎釋䍧牱繫船因名且蘭為䍧牱矣華陽國志云楚傾襄王時遣荘蹻伐夜郎以且蘭有椓船䍧牱處乃改其名為䍧牱師古曰䍧牱繫船􅍻也􅍻音戈漢武帝元鼎六年開王莽更名同亭在柱浦闗漢志䍧牱郡有柱蒲關䍧牱亦江中兩山名也左思吳都賦云吐浪䍧牱者也元鼎五年武帝伐南越發夜郎精兵下䍧牱江同㑹番禺是也䍧牱水又東南逕毋歛縣西毋歛水出焉又東驩水出焉又逕鬱林廣鬱縣為鬱水又東北逕領方縣北又東逕布山縣北今廣西潯州府治鬱林郡治也吳陸緒謂子績曰從今以去何氏云從今以去云云本陸績語績父名康不知酈氏據何書而云名緒并駕其語於績父也六十年車同軌書同文至太康元年晉果平吳又逕中留縣南今梅州府象州與温水合又東入阿林縣潭水注温疑作之水出武陵郡潭城縣今為辰州府黔陽縣玉山東流逕鬱林郡潭中縣今桞州府治周水自西南來注之潭水又東南流與剛水合水西出䍧牱毋歛縣王莽之有歛也東至潭中縣入潭潭水又逕中留縣今桞州府䝉州東阿林縣西右入鬱水地理志曰橋水東至中留入潭又云領方縣而有橋水余診其川流更無殊津正是橋温亂流故兼通稱作者咸言至中留入潭潭水又得鬱之兼稱而字當為南南橋水也葢書字誤耳今本漢志領方縣下云斤員水入鬱又有橋水不作而鬱水右則留水注之水南出布山縣下逕中留入潭潭水東逕阿林縣又東逕猛陵縣今為梧州府藤縣浪水注之山海經作泿水三十七卷泿水南至鬱林潭中縣與隣水合則此亦當作泿水又東逕蒼梧廣信縣今廣西梧州府治及廣東肇慶府封川縣灕水注之鬱水又東封水注之出臨賀郡晉地理志臨賀郡領縣六曰臨賀謝沐馮乘封陽興安富川今廣西平樂府賀縣乃漢臨賀縣地馮乘縣西謝沐縣東界牛屯山謂之臨賀疑當作臨水東南流萌渚嶠西又東南左合嶠水庾仲初云水出萌渚嶠南流入於臨臨水又逕臨賀縣東又南至郡左㑹賀水水出東北興安縣西北有羅山東南流逕興安縣西盛𢎞之荆州記云興安縣水邊有平石上有石履言越王渡溪脫履於此賀水又西南流至臨賀郡東右注臨水郡對二水之交㑹故郡縣取名焉臨水又西南流逕郡南又西南逕封陽縣東今廣東肇慶府為封溪水故地理志曰縣在封水漢志封陽下應劭曰在封水之陽此漏之陽兩字又西南流入廣信縣南流注於鬱水謂之封溪水口者也鬱水又東逕高要縣今為肇慶府治牢水注之牢水南出交州合浦郡治合浦縣今廣西亷州梧州兩府及各縣地漢武元鼎六年平越所置也王莽更名曰桓合縣曰柦亭孫權黄武七年改曰珠官郡郡不産穀多採珠寳前政煩苛珠徙交阯㑹稽孟伯周為守有惠化去珠復還謝承後漢書孟嘗字伯周為合浦太守郡境舊採珠以易米食先時二千石貪穢使民採珠積以自入珠忽徙去合浦無珠餓死盈路孟嘗行化一年之間去珠復還郡統臨先漢志作臨允縣王莽之大允也牢水自縣北流逕高要縣入於鬱水鬱水南逕廣州南海郡西浪水出焉又南右納西隨三水又南逕四㑹浦水上承日南郡今廣西慶逺府界盧容縣西古郎究浦内漕口馬援所漕水東南屈曲通郎湖湖上承金山郎究究水北流左㑹盧容夀泠二水盧容水出西南區粟城南高山山南長領連接天障嶺西盧容水湊隠山繞西衛北而東逕區粟城北又東右與夀冷水合水出夀泠縣界漢志交阯郡有麊泠縣音糜零後漢郡國志晉地理志作糜泠唯宋書州郡志作夀泠晉武帝太康十年分西卷立夀泠縣屬日南郡今注俱作夀泠從宋志也魏正始九年林邑進侵至夀泠縣以為界疆即此縣也區粟城南長嶺東夀泠縣以水湊故水得其名隐山繞東逕區粟故城南考古志並無區粟之名應劭地理風俗記曰日南故秦象郡漢武帝元鼎六年開日南郡治西捲縣林邑記曰城去林邑步道四百餘里交州外城記曰從日南郡南去到林邑國四百餘里准原本譌淮逕相符然則城故西捲縣也地理志曰水入海有竹可為杖王莽更之曰日南亭林邑記曰其城治二水之間三方際山南北瞰水東西澗浦流湊城下城西折一角周圍六里一百七十步東西度六百五十步磚城二丈上起磚牆一丈開方隟孔塼上倚板板上五重層閣閣上架屋屋上架樓樓高者七八丈下者五六丈城開十三門凡殿南向屋宇二千一百餘間市居周匝上下疑有脫文繞岨峭地險林邑故兵器戰具悉在區粟多城壘自林邑王范胡達始晉書武帝太康中林邑王范逸始來貢獻逸有奴曰文隨商賈徃來見上國制度至林邑教逸作宫室城邑及器械逸死文遂簒其位文死子佛嗣義熙中佛死子胡逹立上書貢金盤椀及金鉦等物秦餘徙民染同夷化日南舊風變易俱盡巢棲樹宿負郭接山榛棘蒲薄騰林拂雲幽烟冥緬非生人所安區粟建八尺表日影度南八寸自此影以南在日之南故以名郡望北辰星落在天際日在北故開北户以向日此其大較也范泰古今善言曰隋志宋車騎将軍范泰撰古今善言三十卷日南張重舉計入洛正旦大㑹明帝問日南郡北向視日也重曰今郡有雲中金城者必不皆有其實日亦俱出於東耳至於風氣暄暖日影仰當官民居止隨情面向東西南北迴背無定人性凶悍果於戰鬭便山習水不閑平地古人云五嶺者天地以隔内外況綿塗於海表顧九嶺而彌邈非復行路之逕岨信幽荒之𡨕域者矣夀泠水自宋本自下有城字西南東與盧容水合東注郎究究水所積下潭為湖謂之狼疑作郎湖浦口有秦時象郡墟域猶存自湖南望外通夀泠從郎湖入四㑹漕元嘉二十年以林邑頑凶歴代難化恃逺負衆慢威背徳北寳既臻南金闕貢乃命偏将與龍驤将軍交州刺史檀和之陳兵日南修文服逺二十三年揚旌從四㑹漕口入郎湖軍次區粟宋書林邑傳云區粟者林邑地界城名也進逼圍城以飛梯雲橋懸樓登壘鉦鼔天作虎士電怒風烈火揚城摧衆陷斬區粟王范扶龍首十五以上戮截無赦樓閣雨血填尸城疑作成觀自四㑹南入得盧容浦口晉太康三年省日南部屬國都尉以其所統盧容縣置日南郡及象林縣之故治晉書地道記曰郡去盧容浦口二百里故秦象郡象林縣治也永和五年征西桓温遣督䕶膠畯率交㑹兵伐范文於舊日南之盧容縣為文所敗即是處也晉書云范文襲九真害士庶十八九征西都䕶滕畯率交廣之兵伐文於盧容為文所敗云云則膠畯當作滕畯交㑹當作交廣矣退次九真更治兵文被創死子佛代立七年畯與交州刺史楊平復進軍夀泠浦入頓郎湖討佛於日南故治佛蟻聚連壘五十餘里畯平破之佛逃竄川藪遣大帥面縳請罪軍門遣武陳延勞佛子與盟而還康泰扶南記曰從林邑至日南盧容浦口可二百餘里從口南發徃扶南諸國常從此口出也故林邑記曰盡紘滄之徼逺極流服之無外地濱滄海衆國津逕鬱林一作水南倉通夀泠即一浦也浦上承交阯郡南都官塞浦林邑記曰浦通銅鼔外越安定黄岡心口葢籍度銅鼔即越駱也有銅鼓因得其名馬援取其鼔以鑄銅馬至鑿口馬援所鑿内通九真浦陽晉書地道記九徳郡有浦陽縣交州記曰鑿南塘者九真路之所經也去州五百里建武十九年馬援所開林邑記曰外越紀粟望都紀粟出浦陽渡便州至與宋本作典由渡故縣至咸驩咸驩屬九真咸驩已南麞麑滿岡鳴咆命疇警嘯聒野孔雀飛翔蔽日籠山渡治日一作口至九徳按晉書地道記有九徳縣交州外城記曰九徳縣屬九真郡在郡之南與日南接蠻盧舉居其地死子寳綱代孫黨服從吳化定為九徳郡又為隷之林邑記曰九徳九夷所極故以名郡郡名所置周越裳氏之夷國周禮九夷逺極越裳白雉象牙重九譯而來自九徳道宋本作通類口水源從西北逺荒逕寧州界來也九徳浦内逕越裳究九徳究南陵究按晉書地道記九徳郡有南陵縣縣下疑脫晉字置也宋書州郡志交州九徳郡南陵縣晉武帝立笁芝扶南記山溪瀨中謂之究地理志曰郡有小水五十二并行大川皆究之謂也林邑記曰義煕九年交阯太守杜慧度造九真水日與林邑王范胡達戰擒斬胡達二子虜獲百餘人胡達限五月慧度自九真水歴都粟浦復襲九真長圍跨山重柵斷浦驅象前鋒接刃城下連日交戰傷殺乃退地理志曰九真郡漢武帝元鼎六年開治胥浦縣王莽更之曰驩城也晉書地道記曰九真郡有松原縣林邑記曰松原以西鳥獸馴良不知畏弓寡婦孤居散髮至老南移之嶺崪不喻仞倉庚懐春於其北翡翠熙景乎其南雖嚶讙接響城隔殊非獨步難遊俗姓塗分故也自南陵究出於南界蠻進得横山太和三年范文侵交州於横山分界度此景廟此朱本作北但後有比景縣恐此亦當作比廟亦當作縣也由門浦至古戰灣吳赤烏十一年魏正始元年交州與林邑於灣大戰初失區粟也渡盧容縣日南郡之屬縣也自盧容縣至無戀無戀未詳漢志九真郡有無編縣恐是無編之誤越烽火至比景縣日中頭上影當身下與影為比如淳曰故以比影名縣闞駰曰比讀䕃庇之庇影在已下言為身所庇也林邑曰渡比景至朱吾朱吾縣浦今之封界朱吾以南有文狼人野居無室宅依樹止宿魚食生肉上下疑有錯文譌字或是食生魚肉採香為業與人交市若上皇之民矣縣南有文狼究下流逕通晉書地道記曰朱吾縣屬日南郡去郡二百里比朱本作此縣民漢時不堪二千石長吏調求引屈都乾為國林邑記曰屈都夷也朱吾浦内通無勞湖無勞究水通夀泠浦元嘉元年交州刺史阮彌之征林邑楊邁按晉書夷蠻𫝊作林邑王范陽邁今漏范字作楊邁誤所載事亦與傳不合出婚不在奮威将軍阮謙之領七千人先襲區粟以過四㑹未入夀泠三日三夜無頓止處凝海直岸遇風大敗楊邁擕婚都部伍三百許船來相救援謙之遭風餘數船艦夜於夀泠浦裏相遇闇中大戰謙之手射楊邁柂工船敗縱横崑崙單舸接得楊邁謙之以風溺之餘制勝理難自此還渡夀泠至温公浦升平三年温放之征范佛於灣分界隂陽折宋本作圻入新羅灣至焉下一名阿賁浦入彭龍灣隠避風波即林邑之海渚元嘉二十三年交州刺史檀和之破區粟于飛旍葢海将指典沖林邑入浦令軍水進持重故也浦西即林邑都也治典沖去海岸四十里處荒流之徼表國越裳之壃南秦漢象郡之象林縣也東濱滄海西際徐狼南接扶南北連九徳後去象有林邑之號建國起自漢末初平之亂人懐異心象林功曹姓區有子名連攻其縣殺令自號為王值世亂離林邑遂立後乃襲代傳位子孫三國鼎争未有所附吳有交土與之鄰接進侵夀泠以為壃界自區連以後國無文史失其纂代世數難詳宗𦙍滅絶無復種裔外孫范熊代立人情樂推後熊死子逸立有范文日南西捲縣夷帥雅夷奴也雅史作范幼晉書作夷帥范推奴也文為奴時山澗牧羊於澗水中得兩鱧魚隠藏挾歸規欲私食郎知撿求文大慙懼起託云記疑作詐将礪石還非為魚也郎至魚所見是兩石信之而去文始異之石有䥫文入山中就石治銕疑作冶鍛作兩刀舉刃向鄣因祝曰鱧魚變化冶石成刀斫石鄣破者是有靈神文當治此為國君王斫不入者是刀無神靈進斫石鄣如龍淵干将之斬蘆臺御覧作藁由是人情漸附今斫石尚在魚刀猶存傳國子孫如斬蛇之劍也雅嘗使文逺行商賈北到上國多所聞見以晉愍帝建興中南至林邑教王范逸制造城池繕治戎甲經始廟畧宋本作廓畧王愛信之使為将帥能得衆心文讒王諸子或奔或奔上脫或徙二字王乃獨立成帝咸和六年死無𦙍嗣文迎王子於外國海行取水置毒椰子中飲而殺之遂脅國人自立為王取前王妻妾置高樓上有從已者取而納之不從已者絶其飲食乃死江東舊事云范文本揚州人少被掠為奴賣墮交州年十五六遇罪當得杖畏怖因逃隨林邑賈人渡海逺去沒入於王大被幸愛經十餘年王死文害王二子詐殺侯将自立為王威加諸國或夷椎蠻語原本譌作推灣許今據朱本改正口食鼻飲或雕面鏤身上下疑有脫文脫祼種漢魏流赭咸為其用建元二年攻日南九徳九真百姓奔迸千里無烟乃還林邑林邑西去廣州二千五百里城西南角高山長嶺連接天鄣嶺北接澗大源淮水出郍郍逺界三重長洲隠山繞西衛北朱本作山迴東其嶺南開澗小源淮水出松根界上山壑流隠山繞南曲街迴東合淮流以注典沖其城西南際山東北瞰水重壍流浦周繞城下東南壍外因傍薄城東西横長南北縱狹北邊西端迴折曲入城周圍八里一百步塼城二丈上起塼牆一丈開方隟孔上倚板板上層閣閣上架屋屋上構樓高者六七丈下者四五丈飛觀䲭尾迎風拂雲縁山瞰水騫翥嵬㠋但制造壯拙稽古夷俗城開四門東為前門當兩淮渚濱於曲路有古碑夷書銘讚前王胡達之徳西門當兩重壍北迴上山山西即淮流也南門渡兩重壍對温公壘升平三年交州刺史温放之殺交阯太守寳别駕阮郎遂征林邑水陸累戰佛保城自守重求請服聴之今林邑東城南五里有温公二壘是也北門濱淮路斷不通城内小城周圍三百二十步合堂瓦殿南壁不開上下疑有脫文兩頭長屋脊出南北南擬背曰西區城内石山順淮面陽開東向殿飛檐䲭尾青隟丹墀榱項本作榱題桷椽桷椽多諸古法閣殿上柱高城上項本作丈餘五五字下疑有脱文牛尿為埿牆壁青光迴度朱云當作廊曲掖綺牖紫牕椒房嬪媵無别宫觀路寝永巷共在殿上臨踞東軒逕與下語子弟臣侍皆不得上屋有五十餘邱與區同連甍接棟檐宇如承宋本作相承神祠鬼㙮小大八廟層臺重榭狀似佛刹郭無市里邑寡人居海岸蕭條非生民所處而首渠以永安養國十世豈乆存哉元嘉中檀和之征林邑其王楊史作陽邁舉國夜奔竄山藪據其城邑收寳巨億軍還之後楊邁歸國家國荒朱云當作殄時人靡存躊躇崩擗憤絶復蘇即以元嘉二十三年死初楊邁母懐身夢人鋪楊邁金席與其兒落席上金光已起昭晣艷曜華俗謂上金為紫磨金夷俗謂上金為楊邁金父胡達邁父史作范諸農死襲王位能得人情自以靈夢為國祥慶其太子初名咄後楊邁死咄年十九代立慕先君之徳復名楊邁昭穆二世父子共名知林邑之將亡矣其城隍壍之外林棘荒蔓榛梗冥鬱滕槃筀秀参錯際天其中香桂成林氣清烟澄桂父縣人也棲居此林服桂得道時禽異羽翔集間闗兼比翼鳥不比不飛鳥鳴歸飛鳴聲自呼此戀鄉之思孔悲桑梓原本譌俗之敬成俗也豫章俞益期性氣剛直不下曲俗容身無所逺適在南與韓康伯書曰惟檳榔樹最南遊之可觀但性不耐霜不得北植不遇長者之目令人恨深嘗對飛鳥戀土増思寄意謂此鳥其背青其膓當是腹赤丹心外露鳴情未達終日歸飛飛不十千路由萬里何由歸哉九真太守任延始教耕犁俗化交土風行原本譌俗象林知耕以來六百餘年火耨耕藝法與華同名白田種白穀七月火作十月登熟名赤田種赤穀十二月作四月登熟所謂兩熟之稻也更宋本作至於草甲萌芽穀月代種種稑早晚無月不秀耕耘功重收穀利輕熟速故也米不外散恒為豐國桑蠶年八熟繭三都賦所謂八蠶之綿者矣其小水崖羃䍥常吐飛溜或雪霏沙漲清寒無底分溪别壑津濟相通其水自城東北角流水上懸起高橋渡淮北岸即彭龍區粟之通逵也檀和之東橋大戰楊邁被創落象即是處也其水又東南流逕船官口船官川源徐即以下疑有脱文錯簡即字疑當作狼外夷皆躶身男以竹筒掩體女以樹葉蔽形外名狼㬻所謂躶國者也雖習俗躶袒猶恥無蔽惟依暝夜與人交市闇中齅金便知好惡明朝曉看皆如其言自此外行得至扶南按笁芝扶南記曰扶南去林邑四千水步道通檀和之令軍入邑浦據官船當作船官口城六里者也自船官下注大浦之東湖大水連行湖宋本作潮上西流潮水日夜長七八尺從此以西朔望并潮一上七日水長丈六七七日之後日夜分為再潮水長一二尺春夏秋冬厲然一定高下定度水無盈縮是曰海運亦曰象水也又兼象浦之名晉功臣表所謂金潾清逕象渚澄源者也其川浦渚有水蟲彌微攅木食船數十日壊源潭湛瀨有鮮魚色黑身身下當有長字五丈頭如馬首伺人入水便來為害山海經曰離耳國雕題國皆在鬱水南林邑記曰漢置九郡儋耳預焉民好徒跣耳廣垂以為飾雖男女䙝露不以為羞暑䙝薄日自使人黑積習成常以黑為美離騷所謂𤣥國矣然則儋耳即離耳也王氏交廣春秋曰朱崖儋耳二郡與交州俱開皆漢武帝所置大海中南海之外對合浦徐聞縣漢志合浦郡有徐聞縣原本譌作澗懸清朗無風之日逕望朱崖州如囷廩大從徐聞對渡北風舉帆一日一夜而至周迴二千餘里徑渡八百里人民可十萬餘家皆殊種異類被髮雕身而女多姣好白晢長髮美鬢犬羊相聚不服徳教儋耳先廢朱崖數叛先帝以賈捐之議罷郡楊氏南裔異物志曰儋耳俱在朱崖分為東蕃故山海經曰在鬱水南也鬱水又南自夀泠縣注於海昔馬文淵積石為塘達於象浦建金標為南極之界俞益期牋曰馬文淵立兩銅柱於林邑岸北有遺兵十餘家不反居夀泠岸南而對銅柱悉姓馬自婚姻今有二百户交州以其流寓號曰馬流言語飲食尚與華同山川移易銅柱今復在海中正賴此民以識故處也林邑記曰建武十九年馬援樹兩銅柱於象林南界與西屠國分漢之南壃也土人以其流寓號曰馬流世稱漢子孫也山海經曰鬱水出象郡而西南注南海入項陵東南者也應劭曰鬱水出廣信東入海言始或可終則非矣水經注集釋訂訛卷三十六
