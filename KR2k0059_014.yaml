body:
  text: 水經注集釋訂訛卷十四歸安沈炳巽撰濕餘水沽水鮑丘水濡水遼水小遼水水當作浿水後經注皆訛濕餘水出上谷居庸闗東明一統志濕餘河在今順天府昌平縣東南六十里源出渾原山南又折而東入潞河居庸闗在京師北一百二十里兩山夾峙一水旁流關跨南北四十里懸崖峭壁最為險要闗在沮陽城東南六十里居庸界故闗名矣使者入上谷耿况迎之于居庸闗即是闗也朱箋袁宏漢紀更始初立遣使者徇諸國曰先降者復爵位上谷太守耿况出迎使者上印綬其水導源闗山南流歴故闗下溪之東㟁有石室三層其户牖扇扉悉石也盖古闗之候臺矣南則絶谷累石為闗址崇墉峻壁非輕功可舉山岫層深側道褊峽林鄣蘧嶮朱云當作邃險呉本改作據險非是路才容軌曉禽暮獸寒鳴相和羇官逰子聆之者莫不傷思矣其水歴山南逕軍都縣界又謂之軍都闗續漢書曰尚書盧植隠上谷軍都山也其水南流出闗謂之下口水流潛伏十許里是也又東流過軍都縣南今為順天府昌平縣其故城在縣東南又東流過薊縣北濕餘水故瀆東逕軍都縣故城南又東重源潛發積而為潭謂之濕餘潭又東流易荆水注之其水導源西北逕千蓼泉亦曰丁蓼水東南流逕郁山西謂之易荆水公孫瓚之敗於鮑丘也後漢書注曰鮑丘水名走保易荆疑即此水也朱箋按後漢書公孫瓚傳袁紹將麯義合兵十萬共攻瓚破瓚于鮑邱瓚遂退保易京開置屯田稍得自支又按續漢志云瓚所居易京故城在今幽州歸義縣南十八里魏志瓚傳亦云瓚軍數敗乃走還易京此云易荆正同但字異耳今雄縣有易京城南臨易水當即此也易荆水又東左合虎眼泉水出平川東南流入易荆水又東南與孤山之水合水發川左道源孤山東南流入易荆水謂之塔界水又東逕薊城又東逕平昌縣故城南在今昌平縣治西北二十里又謂之昌平水魏氏土地記曰薊城東北一百四十里有昌平城城西有昌平河又東流注濕餘水濕餘水又東南流左合芹城水朱云宋本作芹城水注之芹城在昌平縣界水出北山南逕芹城水水字疑當作南北等字東南流注濕餘水濕餘水又東南流逕安樂故城西在今密雲縣東北五十里更始使謁者韓鴻北徇承制拜呉漢為安樂令即此城也又北屈東南至狐奴縣西入于沽河狐奴城在今順天府順義縣狐奴山昔彭寵使狐奴令王梁南助光武起兵自是縣矣濕餘水于縣西南東入沽河故地理志曰濕餘水自軍都縣東至潞南入沽是也沽河從塞外來沽河一名西潞水一名東潞水沽水出禦夷鎮西北九十里丹花嶺下東南流大谷水注之水發鎮北大谷溪西南流逕獨石北界石孤生不因河而自峙又南九泉水注之水導北川左右翼注入川共成一水故有九源之稱其水南流至獨石注大谷水大谷水又南逕獨石西又南逕禦夷鎮城西魏太和中置以捍北狄也又東南尖谷水注之水源出鎮東北尖溪西南流逕鎮城東西南流注大谷水亂流南注沽水又南出峽岸有二城世謂之獨固門以其藉嶮憑固易為依据兼壁昇聳疎通若門故得是名也沽水又南左合乾溪水引北川西南逕一故亭東又西南注沽水沽水又西南逕赤城東地志云赤城乃古蚩尤所居之處今在直隸萬全衛趙建武年并州刺史王霸為燕所敗退保此城查十六國春秋及晉書載記俱無并州刺史王霸并無為燕所敗退保赤城之事豈二書失載城在山阜之上下抗深隍溪水之名藉以變稱故河有赤地疑當作城之號矣沽水又東南與鵲谷水合有二源南即陽樂水也出且居縣漢志且居縣有樂陽水今云陽樂恐誤地理志曰水出縣東北漢志作水出縣東南入海流疑漏逕字大融山小融山明一統志作大雄小雄在雄縣西北歴女祁縣故城南地理志曰東部都尉治王莽之祁縣也世謂之横水又謂之陽曲河又東南逕一故亭又東左與舊鹵水合水之疑衍出西北山東南流逕舊鹵城北城在居庸縣西北二百里故名云候鹵太和中更名禦夷鎮又東南流注陽樂水陽樂水又東南逕傍狼山南傍字疑衍按明一統志昌平縣西北四十里有狼山疑即此也山石一作白色特上亭亭孤立超出羣山之表又東南逕温泉東泉在山曲之中又逕赤城西屈逕其城南東南入赤城河河水又東南右合髙峯水水出髙峯戍東南城在山上其水西南流又屈而東南入沽水沽水又西南流出山逕漁陽縣故城西在今密雲縣西南而南合七度水水出北山黃頒谷故亦謂之黄頒水東南流注于沽水沽水又南漁水注之水出縣東南平地泉流西逕漁陽縣故城南考諸地說則無聞所識釋上下疑有脫文訛字考地尋川則有應氏亦疑有訛脫自今城在斯水之陽有符文說漁陽之名當屬此秦發閭左戍漁陽即是城也漁水又西南入沽水又南與螺山之水合水出漁陽城南小山魏氏土地記曰城南五里有螺山其水西南入沽水沽水又南逕安樂縣故城東晉書地道記曰晉封劉禪為公國俗謂之西潞水也南過漁陽狐奴縣北西南與濕餘水合為沽河沽水西南流逕狐奴山西又南逕狐奴縣故城西漁陽太守張堪于縣開稻田敎民植種百姓得以殷富童謡歌曰桑無附枝麥秀兩岐張君為政樂不可支視事八年匈奴不敢犯塞沽水又南陽重溝水注之出狐奴山南轉逕狐奴城西王莽之所謂舉符也側城南注右會沽水沽水又南濕餘水注之沽水又南左會鮑丘水世所謂東潞也沽水又南逕潞縣為有潞名潞河也魏氏土地記曰城西三十里有潞河也又東南至雍奴縣西笥溝濕水入焉俗謂之合口也又東鮑丘水于縣西北而東出焉明一統志鮑丘河源自禦夷鎮北塞南流逕九莊嶺五百餘里逕密雲城又南合道人溪水至通州未莊村合沽水經三河縣界入泃河又東至南泉州縣與清河合東入于海清河者𣲖河尾也沽河又東南逕泉州縣故城東王莽之泉調也沽水又東南合清河也今無水清湛漳洹􅋤易淶濡沽虖池同歸于海故經曰𣲖河尾也鮑丘水從塞外來南過漁陽縣東鮑丘水出禦夷北塞中南流逕九莊嶺東俗謂之大榆河又南逕鎮東南九十里西此句有訛脫密雲戍西又南左合道人溪水在密雲縣東北石盤峪源發龍門流逕縣界入潮河水北川南流逕孔山西又歴密雲戍東左合孟廣􅛜水水出􅛜下􅛜甚嶒峻峨峨冠衆山之表其水西逕孔山南上有洞穴開明故土俗以孔山流稱􅛜水又西南至密雲戍東西注道人水亂流西南逕密雲戍城南右會大榆河有東密雲故是城言西矣大榆河又東南流白楊泉水注之北發白楊溪望雖二字疑衍右注大榆河又東南龍蒭溪水自決注之大榆河又東南逕安州舊漁陽郡之滑鹽縣南左合縣之北溪水水出縣北廣長塹南太和中掘此以防北狄其水南流逕滑鹽縣故城東王莽更名匡徳也漢明帝改曰鹽田右承治治疑作沽水世謂之斛鹽城西北去禦夷鎮二百里南注鮑丘水又南逕虎縣故城東王莽更之曰敦徳也漢志漁陽郡厗奚縣莽曰敦徳别無所謂虎縣者孟康曰厗音題或作蹏當是蹏奚訛作虎縣耳鮑丘水又西南逕獷平縣故城東王莽之所謂平獷也又南合三城水水出四里山西逕平獷城謂之三城水又逕香陘山上悉生槀本香世故名焉又西逕石窟南窟内寛廣行者依焉窟内有水淵而不流栖薄者取給焉又西北逕伏凌山南與石門水合水出伏凌山山髙峻巖鄣寒深陰崖積雪凝氷夏結事同離騷峨峨之詠故世人因以名山也水西南流注之是水有桑谷之名盖沿出桑溪故也又西南逕獷平城東南而右注鮑丘水鮑丘水東南逕漁陽郡治也秦始皇二十二年置王莽更名通路縣曰得得下漏漁字鮑丘水又西南流公孫瓚既害劉虞烏丸思劉氏之徳迎其子和合衆十萬破瓚于是水之上斬首一萬後漢書公孫瓚傳瓚既破禽劉虞盡有幽州之地虞從事漁陽鮮于輔等合率州兵欲共報瓚烏桓峭王感虞恩徳率種人及鮮卑七千餘騎與輔南迎虞子和與袁紹將麴義合兵十萬共攻瓚破瓚于鮑丘斬首二萬餘級鮑丘水又西南歴狐奴城東又西南流注之于沽河亂流而南又南過潞縣西今為直隸通州鮑丘水入潞通得鮑丘之稱矣髙梁水注之首受濕水于戾陵堰水北有梁山山有燕刺王旦之陵故以戾陵名堰水自堰枝分東逕梁山南又東北逕劉靖碑北其去朱云宋本作其詞云魏使持節都督河北道道字疑衍分天下為諸道始于唐魏時無所謂道也諸軍事征北將軍建城鄉侯沛國劉靖字文恭魏志劉馥傳馥子靖修廣戾渠陵大堨水溉灌薊南北三更種稻邉民利之登梁山以觀源流相何云字是八分體或漏原字又云疑作相隰水以度形𫝑以度形勢嘉武安之通渠美秦民之殷富乃使帳下督丁鴻軍士千人以嘉平二年立堨朱箋洛陽記云千金堨舊堰穀水積石為堰也于水道髙梁河造戻陵堨開車箱渠其堨表云髙梁河水者出自并州黄河之别源時長岸峻固直截中流積石籠以為主堨髙一丈東西長三十丈南北廣七十餘步依北岸立水門門廣四丈立水朱云水下漏堨長二字十丈山川宋本作水暴戾則乗堨東下平流守常則自門北入灌田歳二千頃凡所封地百餘萬畝至景元三年辛酉按景元是曹魏陳留王奐年號但奐係庚辰元三年當是壬午今云辛酉誤詔書以民食轉廣陸廢不贍遣謁者樊晨更制水門限田千頃刻地四千三百一十六頃出給郡縣改定田五千九百三十頃水流乗車箱渠自薊西北逕昌平東盡漁陽潞縣凡所潤舍宋本作合四五百里所灌田萬有餘頃髙下孔濟原隰厎平疏之斯溉決之斯散導渠口以為濤門灑淲池以為甘澤施加于當時敷被于後世晉元康四年君少子驍騎將軍平鄉侯𢎞受命使持節監幽州諸軍事領䕶烏丸校尉寧朔將軍堨立積三十六載至五年夏六月洪水暴出毁損四分之三乗疑誤北岸七十餘丈上渠車箱疑當作車箱渠所在漫溢追惟前立堨之勲親臨山川指授規畧命司馬闗内侯逢惲内外將士二千人起長岸立石渠修立堨治水門門廣四丈立水疑漏堨字五尺興復載利通塞之宜準遵舊制凡用功四萬有餘焉諸部王侯不召而自至繈負而疑漏趨字事者盖數千人詩載經始勿亟易稱民忘其勞斯之謂乎于是二府文武之士感秦國思鄭渠之績魏人置豹祀之義乃遐慕仁政追述成功元康五年十月十一日刋石立表以紀勲烈并記堨制度永為後式焉事見其碑辭又東南流薊縣北又東至潞縣注于鮑丘之水又南逕潞縣故城西王莽之通潞亭也漢光武遣呉漢耿弇等破銅馬五幡于潞東謂是縣也屈而東南流逕潞城南世祖拜彭寵為漁陽太守治此寵叛光武遣游擊將軍鄧隆伐之軍于是水之南光武策其必敗果為寵所破遺壁故壘存焉鮑丘水又東南入夏澤澤南紆曲渚一十餘里北佩謙澤𦕈望無限也謙澤當作諫澤無限當作無垠又南至雍奴縣北屈東入于海鮑丘水自雍奴縣故城西北舊分笥溝水東出合笥溝斷衆川東注混同一瀆東逕其縣北又東與泃河合明一統志泃河自平谷縣界經三河縣北至寶坁縣境水出右北平無終縣今為順天府玉田縣西山白楊谷西北流逕平谷縣今屬順天府屈西南流獨樂水入焉水出北抱犢固南逕平谷縣故城東後漢建武元年光武遣十二將追大槍五幡及平谷大破之于是縣也朱箋引袁宏漢紀曰光武遣呉漢率耿弇陳俊馬武等十二将軍追戰于潞東及平谷大破之其水南流入于泃泃水又東左合盤山水水出山上其山峻嶮人迹罕交去山三十里許望山上水可髙二十餘里素湍皓然頽波歴溪沿流而下自西北轉注于泃水泃水又東南逕平谷原本漏縣故城平谷故城在今遼州北東南與洳河㑹明一統志洳河源自密雲縣石餓山經三河縣東南平谷故城入泃河水出北山山在蹏奚縣故城東南東南流逕博陸故城北又屈逕其城東世謂之平陸城非也漢武帝封璽書封大司馬霍光為侯國漢書外戚恩澤侯表霍光于昭帝始元二年封今云武帝從光傳也文穎曰博大陸平取其嘉名而無其縣食邑北海河東薛按史表注無薛字瓚曰按漁陽有博陸城謂此也今在居山之陽處平陸之上匝帶川流面據四水文氏所謂無縣目宋本作有嘉美名也洳水又東南流逕平谷縣故城西而東南流注于渠疑衍泃河泃河又南逕紻城東而南合五百溝水水出七山别本作匕山北東逕平谷縣之紻城南東入于泃河泃河又東南逕臨河城北屈而歴其城東側城南出竹書紀年梁惠成王十六年齊師及燕戰于泃水齊師遁即是水也泃水又南入鮑丘水又東合泉州渠口故瀆上承宰池水于泉州縣故以泉州為名北逕泉州縣東又北逕雍奴縣東西去雍奴故城一百二十里自虖池北入其下歴水澤一百八十里入鮑丘河謂之泉州口陳夀魏志曰曹太祖以蹹當作蹋頓擾邊公將征之從泃口鑿渠逕雍奴泉州以通河海者也魏志遼西單于蹋頓尢強數入為害公將征之鑿渠自滹沱入𣲖水名平虜渠又從泃河口鑿入潞河名泉州渠以通海合疑作今無水鮑丘水又東庾水注之水出右北平徐無縣北塞中而南流歴徐無山在玉田縣東北二十里有田疇宅得黑牛谷水又得沙谷水並西出山東流注庾水昔田子泰避難居之衆至五千家魏志田疇子㤗右北平無終人也初為劉虞所辟及虞為公孫瓚所害遂率宗族他附從數百人掃地而盟曰君仇不報吾何可以立于世遂入徐無山中營深險平敞地而居躬耕以養父母百姓歸之數年間至五百餘家開山圖曰山出不炭當作灰之木生火之石案注云其木色黑似炭而無葉有石赤色如丹以一石相磨則火發以然無火可以終身宋本作以然無灰之木可以終身今則無之其水又逕徐無縣故城東王莽之北順亭魏氏土地記曰右北平城東北一百一十里有徐無城其水又西南與周盧溪水合水出徐無山東南流注庾水庾庾下當有水字又西南流灅水注之水出右北平後靡縣王莽之後靡也漢志右北平郡俊靡縣莽曰俊靡今云後靡誤東南流世謂之車軬水又東南流與温泉水合水出北山溪即温源也養疾者不能㵕與澡同其炎漂以其過灼故魏氏土地記曰徐無城東有温湯即此也其水南流百步便伏流入于地下水盛則通注灅水又東南逕石門峽山之髙嶄絶壁立洞開俗謂之石門口漢中平四年漁陽張純反殺右北平太守劉政遼東太守陽終中平五年遣中郎將孟益率公孫瓚討純戰于石門大破之後漢書靈帝紀中平四年漁陽人張純與同郡張舉舉兵叛攻殺右北平太守劉政遼東太守陽終獲烏桓校尉公綦稠等舉自稱天子寇幽冀二州四年九月遣中郎將孟益率騎都尉公孫瓚討漁陽賊張純等十一月公孫瓚與張純戰于石門大破之灅水又東南流謂之北黄水又屈而為南黄水又西南逕無終山在今玉田縣西北三十里即帛仲理所合神丹處也又于是山作金五千斤以救百姓山有陽翁伯玉田在縣西北有陽公壇社即陽公之故居也搜神記曰雍伯雒陽人至性篤孝父母終沒葬之于無終山山髙八十里而上無水雍伯置飲焉有人就飲與石一斗令種之玉生其田北平徐氏有女雍伯求之要以白璧一雙媒者致命伯至玉田求得五雙徐氏妻之遂即嫁嫁疑作家焉陽氏譜叙言翁伯是周景王之孫食采陽樊春秋之末爰宅無終因陽樊而易氏焉愛仁宋本作人博施天祚玉田其碑文云居于縣北六十里翁同之山後路徙于西山之下陽公又遷焉而受玉田之賜情不好寶玉田自去今猶謂之為玉田陽干寶曰于種石處四角作大石柱各一丈中央一頃之地名曰玉田至今相傳云玉田之掲起于此矣而今不知所在同之譜叙自去文矣藍水注之水出北山東屈而南流逕無終縣故城東故城衍無終子國也春秋襄公十四年按左傳無終子云云是襄四年今云十四年誤無終子嘉父使孟樂如晉因魏絳納虎豹之皮請和諸戎是也故燕地矣秦始皇二十二年滅燕置右北平郡治此王莽之所謂北順也漢世李廣為郡出遇伏石謂虎也射之沒羽此處矣魏氏土地記曰右北平城西北百三十里有無終城日知録云水經注言右北平郡西北一百三十里有無終城非也考右北平郡前漢治平剛後漢治土垠酈氏所引魏土地記曰薊城東北三百里有右北平城此後漢所治之土垠而平剛則在盧龍塞外三四百里乃武帝時郡治李廣所守今之塞外其不在土垠明矣今酈氏以土垠之右北平為李廣射石似誤盖太史公所述本無其地必欲指一卷之石以當之不已惑乎其水又南入灅水灅水又西南入于庾水地理志曰灅水出俊靡縣南至無終東入庾水庾水世亦謂之為柘水也南逕燕山上懸巖之側有石鼓去地百餘丈望若數百石囷有石梁貫之鼓之東南有石人援桴狀同擊勢耆舊言燕山石鼓鳴則土有兵庾水又南逕北平城西而南入鮑丘水謂之柘口鮑丘水又東逕右北平郡故城南魏氏土地記曰薊城東北三百里有右北平城鮑丘水又東巨梁水注之水出土垠縣北陳宫山西南流逕觀雞山在密雲縣東北一百八十里謂之觀雞水水東有觀雞寺寺内起大堂甚髙廣可容千僧下悉結石為之上加塗暨暨當作塈書梓材云若作室家既勤垣墉惟其塗塈茨基内疎通枝經脉散基側室外四出㸑火炎勢内流一堂盡温盖以此土寒嚴霜氣肅猛出家沙門率皆貧薄施主慮闕道業故崇斯構是以志道者多栖託焉其水又西南流又宋本作右合區落水出縣北山東南流入巨梁水巨梁水又西逕土垠縣故城西左會寒渡水水出縣東北西南流至縣右注梁河梁河又南澗于水注之水出東北山西