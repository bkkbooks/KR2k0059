志曰遼西人見遼水有浮棺欲破之語曰我孤竹君也汝破我何為因為立祠焉祠在山上城在山側肥如縣南十二里水之㑹也又東南過海陽縣西南入于海濡水自孤竹城在今永平府城西一十五里東南逕主鄉北瓠溝水注之出城東南東流注濡水濡水又逕牧城南分為二水北水枝出世謂之小濡水也東逕樂安亭北東南入海濡水東南流逕樂安亭南東與新河故瀆合自雍奴縣承鮑丘水東出謂之鹽闗口魏太祖征蹋頓與泃口俱導也世謂新河矣陳夀魏志以通河海也魏志鑿渠事見前新河又東北絶庾水又東北出逕右北平絶泃渠之水又東北逕昌城縣故城北王莽之叔漢志作淑武武也新河又東為二水枝瀆東南入海新河自枝渠東出合封大水謂之交流合水出新平縣西南流逕新平按漢志遼西郡有新安平此云新平疑漏安字縣故城西地理志遼西之屬縣也又東南流龍鮮水注之水出縣西北世謂之馬頭山二源俱導南合一川東流注封大水地理志曰龍鮮水東入封大水者也亂流南會新河南入于海地理志曰封大水于海陽縣南入海新河又東出海陽縣與緩虛水㑹水出新平縣東北世謂之大籠山東南流逕令支城西西南流與新河合南流注于海地理志曰緩虛水與封大水皆南入海新河又東與素河㑹謂之白水口出令支縣之藍山南合新河又東南入海新河又東至九過口枝分南注海新河又東逕海陽縣故城南漢髙祖六年封揺毋餘為侯國魏土地記曰令支城南六十里在盧龍縣東南有海陽城者也新河又東與清水㑹水出海陽縣東南流逕海陽城東在今永平府城南三十里又南合新河又南流一十許里西入九過口注海新河東絶清水又東木究水出焉南入海新河又東左迤為孔陽孤淀名宋本無名字右絶新河南注海新河又東㑹于濡漏水字濡水又東南至絫縣碣石山文穎曰碣石在遼西絫縣王莽之選武也絫縣并屬臨渝王莽更臨渝為憑徳地理志曰大碣石山在右北平驪成縣西南今為永平府撫寧縣王莽更曰碣石也明一統志碣石山在昌黎縣西北二十里禹貢注云碣石在北平郡驪成縣西南河口之地今平州之南也酈道元言驪成縣枕海有石如甬道數十里當山頂有大石如柱韋昭以為碣石舊在河口海濱歴世既久為水所漸淪入海已去岸百餘里矣今碣石在平州東離海三十里逺望其山穹窿似冢有石突出山頂其形如柱疑即禹貢之碣石也漢武帝亦常登之以望巨海而勒其石于此今枕海有石如甬道數十里當山頂有大石如柱形往往而見立于巨海之中潮水大至至下疑有脫文及潮平波退不動不没不知深淺世名之天橋柱也狀若人造要亦非人力所就韋昭亦指此以為碣石也三齊略記曰始皇于海中作石橋海神為之豎柱始皇求與相見神曰我形醜莫圖我形當與帝相見乃入海四十里見海神左右莫動手工人潛以脚畫其狀神怒曰帝負約速去始皇轉馬還前脚猶立後脚隨崩僅得登岸畫者溺死于海衆山之石皆傾注今猶岌岌東趣疑即是也濡水于此南入海而不逕海陽縣西也盖經誤證耳又按管子齊桓公二十年征孤竹來至卑耳之谿十里然止瞠然視援弓將射引而未發管子作未至卑耳之谿十里闟然止瞠然視援弓將射謂左右曰見前乎左右對曰不見公曰寡人見長尺而人物具焉左右袪衣走馬馬下當有疾字前豈有人若此乎管仲對曰臣聞登山之神有俞兒長尺人物具管子作登山之神有俞兒者長尺而人物具焉霸王之君興則登山之神見且走馬前走衍導也左袪衣示前有水水下脫今字右袪衣示從右方涉也至卑耳之溪有贊水者從左方涉其深及冠右方涉其深至膝已涉大濟桓公拜曰仲父之聖管子聖下有至若字此寡人之私管子作抵罪也久矣今自孤竹南出則巨海矣而滄海之中山望多矣然卑耳之川若贊溪者亦不知所在也昔在漢世海水波襄吞食地廣當同碣石苞淪洪波也大遼水出塞外衛白平山東南入塞過遼東襄平縣西原本西字訛作注今從朱本改正襄平縣今為盛京奉天府遼陽州遼水亦言出石山自塞外東流直遼東之望平縣西在今盛京錦州府廣寧縣東北王莽之長說也屈而西南流逕襄平縣故城西秦始皇二十二年滅燕置遼東郡治此漢髙帝八年封紀通為侯國王莽之昌平也故平州治又東逕遼隧縣故城西今在奉天府海城縣西六十里王莽更名之曰順睦也公孫淵遣將軍畢衍拒司馬懿于遼隧即是處也遼水又南歴縣下有脫字有小遼水其流注之也又東南過房縣西地理志曰房故遼東之屬縣遼水又右㑹白狼水水出右北平白狼縣東南逕廣成縣北流西流西二字疑倒北屈逕廣成縣故城南王莽之平㓂也俗謂之廣都城又西北石城川水注之水出西南石城山東流逕石城縣故城南在今永平府灤州西九十里地理志曰右北平有石城縣北屈逕白鹿山西即白狼山也魏書國志曰遼西單于蹋頓尢強為袁氏所厚故袁尚歸之數入為害公出盧龍塹山堙谷五百餘里未至柳城二百里尚與蹋頓將數萬騎逆戰公登白狼山望柳城在今永平府西二十里卒與宼遇乗其不整縱兵擊之宼衆大崩魏志作奔斬蹋頓胡漢降者二十萬口英雄記曰曹操于是繫朱云當作擊馬鞍于馬上朱本作山作十片即于此也博物志曰魏武于馬上逢獅子使格之殺傷甚衆王乃統率常從健兒數百人擊之獅子哮呼奪越左右咸驚王忽見一物從林中出如貍超上王車軛上獅子將至此獸便跳上獅子頭上獅子即伏不敢起於是遂殺之得獅子而還未至洛陽四十里洛陽雞狗皆無鳴吠者也其水又東北入廣成縣東注白狼水白狼水北逕白狼縣城東王莽更名伏狄白狼水又東方城川水注之水發川西南山下流北屈逕一故城西世謂之雀目城東屈逕方城北東入白狼水白狼水又東北逕昌黎縣故城西地理志曰交黎也東部都尉治王莽之禽宼也應劭曰今昌黎也髙平川水注之水出西北平川東流逕倭城北盖委也人從之盖委下六字有訛脫又東南逕乳樓城北盖逕戎鄉邑兼夷稱之又東南注白狼水白狼水又東北自魯水注之導西北逺山東南注白狼水白狼水又東北逕龍山西燕慕容皝以柳城之北龍山之南福地也使陽裕築龍城改柳城為龍城縣十二年黑龍白龍見于龍山皝親觀龍去二百步祭以太牢二龍交首嬉翔解角而去皝恱大赦號新宫曰和龍宫立龍翔祠于山上白狼水又北逕黄龍城東十三州志曰遼東屬國都尉治昌黎道有黄龍亭者也魏營州刺史治魏氏土地記曰黄龍城西南有白狼河東北流附城東北下即是也又東北濫真水出西北塞外東南歴重山東南入白狼水白狼水又東北出東流為二水右水疑即渝水也地理志曰渝水首受白狼水西南廵山逕一故城以為河連城疑是臨渝縣之故城王莽曰憑徳者矣渝水南流東屈與一水㑹世名之曰倫水盖戎方之變名耳疑即地理志所謂侯水北入渝者也十三州志曰侯水南入渝地理志言盖自北而南也又西南流注于渝渝水又東南逕一故城東俗曰女羅城又南逕營丘城西營丘在齊而名之于遼燕之間者盖燕齊遼迴僑分所在其水東南入海地理志曰渝水自塞南入海一水東北出塞為白狼水又東南流至房縣注于遼魏氏土地記曰白狼水下入遼也又東過安市縣西南入于海十三州志曰大遼水自塞西南至安市入于海又𤣥兔髙句麗縣有遼山小遼水所出西南至遼隧縣入于大遼水也縣故髙句麗相之國也漢武帝元封二年平右渠置𤣥兔郡于此王莽之下句麗水出遼山西南流逕遼陽縣與大梁水㑹水出北塞外西南流逕至遼水故地理志曰大梁水西南至遼陽入遼郡國志曰縣故屬遼東後入𤣥兔其水西南流故謂之為梁水也小遼水又西南逕襄平縣為淡淵晉永嘉三年涸小遼水又逕襄平縣入大梁水司馬宣王之平遼東也斬公孫淵于斯水之上者也浿水出樂浪鏤方縣東南過于臨浿縣東入于海樂浪郡今為遼東外徼朝鮮國界許慎云浿水出鏤方東入海一曰出浿水縣十三州志曰浿水縣在樂浪東北鏤方縣在郡東盖出其縣而逕鏤方也昔燕人衛滿自浿水而至朝鮮朝鮮故箕子國也箕子教民以義田織信厚約以八法而下知禁遂成禮俗戰國時滿乃王之都王險城地方數十里至其孫右渠漢武帝元封二年遣樓船將軍楊僕左將軍荀彘討右渠破渠于浿水遂滅之史記朝鮮傳秦滅燕以朝鮮屬遼東外徼漢興以其逺難守復修遼東改塞以浿水為界燕王盧綰反入匈奴燕人衛滿亡命聚黨千餘人東走出塞居秦故空地上下鄣稍役屬真畨朝鮮蠻及故燕齊亡命者王之都玉險傳子至孫右渠所誘漢亡命人滋多元封二年漢使誘諭終不奉詔乃遣樓船將軍楊僕左將軍荀彘出遼東討右渠不能下其相參使人殺右渠來降遂定朝鮮為四郡若浿水東流無渡浿之理其地今髙句麗之國治余訪蕃使言城在浿水之陽其水西流逕故樂浪朝鮮縣即樂浪郡治漢武帝置而西北流故地理志曰浿水西至增池縣入海又漢興以朝鮮為逺循遼東故塞至浿水為界考之今古于事差謬盖經悞證也水經注集釋訂訛卷十四
