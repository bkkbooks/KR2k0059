於西城為西北也漢水又東逕猴何氏校改侯經灘山多猴猿好乗危綴飲故灘受斯名焉漢水又東逕大小黄金疑漏戍字南黄金戍在今洋縣黄金谷張魯築城西魏置黄金縣宋乾徳中并入真符縣山有黄金峭水北對黄金谷有黄金戍傍山依峭嶮折七里氐掠漢中岨此為戍與鐵城相對一城在山上容百餘人一城在山下可置百許人言其嶮峻故以金鐵制名矣昔楊難當令魏興太守薛健據黄金姜寳據鐵城鐵城戍在黄金廢縣西北八十里城在山上極險峻故名宋遣秦州刺史蕭思話話令隂平太守蕭祖攻拔之賊退酉水矣宋書蕭思話傳羌帥楊難當冦漢中起思話為横野將軍南梁秦二州刺史遣南漢中太守蕭諱進據磝頭難當焚掠漢中引衆西還留其將趙温守梁州魏興太守薛健據黄金諱遣隂平太守蕭坦赴黄金薛健副姜寳據鐵城鐵城與黄金相對去一里斫樹塞道坦進攻二戍拔之二月趙温又率薛健來攻坦營坦奮擊大破之賊退保西水今云蕭祖誤酉水作西水宋書之誤也漢水又東合蘧蒢溪口水北出就谷在長安西南其水南流逕巴溪戍西又南逕陽都坂東坂自上及下槃折一十九曲西連寒泉嶺漢中記曰自西城涉黄金峭寒泉嶺陽都坂峻崿百重絶日萬尋既造其峰謂以踰崧岱復瞻前嶺又倍過之言陟羊腸超煙雲之際顧看向塗杳然有不測之嶮山豐野牛野羊騰巖越嶺馳走若飛觸突樹木十圍皆倒山殫良岨地窮坎勢矣其水南歴蘧蒢溪謂之蘧蒢水而南流注于漢謂之蒢口陽都坂蘧蒢水皆在洋縣東北又有子午道在縣東一百六十里元和志黄金縣有驛即子午道也舊道在金州安康縣界梁王仁念别開此路漢水又東右㑹洋水明一統志洋水在西鄉縣東二十里自星子山出西北流入木馬河川流漫濶廣㡬里許洋水導源巴山東北流逕平陽城漢中記曰本西鄉縣治也自城固南城南入三百八十里距南鄭四百八十里洋川者漢戚夫人之所生處也髙祖得而寵之夫人思慕本鄉追求洋川朱本作追求洋川米帝為驛致長安髙帝為澤致長安蠲復其鄉更名曰縣又故目其地為洋川用表夫人誕載之休祥也城即定逺矣漢順帝永光七年封班超以漢中郡南鄭縣之西鄉為定逺侯即此也洋水又東北流入漢謂之城陽水口也隋志西鄉縣有洋水元和志經縣東八里平陽城在今西鄉縣南界漢水又東歴敖頭按宋書當作磝頭舊立倉儲之所傍山通道水陸嶮凑魏興安康縣治有戍統領流雜安康縣今為漢隂縣本漢安陽縣屬漢中郡晉改安康縣屬魏興郡漢水又東合直水水北出子午谷岩嶺下又南枝分東注旬水又南南下疑有脱文蓰閣下山上有戍置於崇阜之上下臨深淵張子房燒絶棧閣示無還也又東南歴直谷逕直城西而南流注漢直城西與今石泉縣接界寰宇記漢水在縣東百步漢水又東逕直城南魏地形志金城郡治直城縣其故城在今漢隂縣西又東逕千渡而至蝦蟇嶺原本譌頤歴漢陽潕口而屆于彭溪龍竈矣並溪澗灘磧之名也漢水又東逕晉昌郡之寧都縣南按晉昌郡乃晉恵帝時置後之魏興郡乃曹魏時置水經為漢人所作不當先有晉昌魏興之名恐疑是注譌作經文寧都故城在漢隂縣東七十里晉置屬晉昌郡唐改漢隂寰宇記漢水在漢隂縣南二里今在縣西沈約宋志魏興郡有廣隂縣其故城在今紫陽縣東南漢水在縣南門外縣治松溪口又東逕魏興郡廣城縣治王谷谷道南出巴獠有鹽井食之令人癭疾漢水又東逕魚脯溪口按注則溪字當作谷字舊西城廣城二縣指此谷而分界也又東過西城縣南漢水自紫陽縣界折而東北流入興安州界州本漢西城縣曹魏改魏興郡梁改為東梁州西魏以其地出金改為金州唐宋元明因之本朝改曰興安州領縣五元和志漢水去州城百步水出麩金漢水又東逕鱉池而鯨灘鯨大也蜀都賦曰流漢湯湯驚浪雷奔望之天迥即之雲昏者也漢水又東逕嵐谷北口嶂逺溪深澗峽嶮邃氣蕭蕭以瑟瑟風颼颼而飀飀故川谷擅其目一作美矣漢水又東右得大勢勢岨急溪故亦曰急勢也依山為城城周二里在峻山上梁州督護吉挹所治苻堅遣偏軍韋鍾伐挹挹固守二年不能下無援遂陷晉書忠義傳吉挹字祖沖馮翊蓮勺人也孝武初為魏興太守加輕車將軍領晉昌太守苻堅遣將韋鍾攻魏興挹遣衆拒之斬首七百餘級加督五郡軍事鍾率衆欲趣襄陽挹又邀擊斬五千餘級鍾怒迥軍圍之挹又屢挫其鋭其後賊衆繼至挹力不能抗城遂陷挹引刀欲自殺其友止之挹不從其友逼奪其刀㑹賊執之挹閉口不言不食而死漢水右對月谷口山有坂月川於中黄壤沃衍而桑麻列植佳饒水田故孟達與諸葛亮書善其川土沃美也漢水又東逕西城縣故城南地理志曰西城故漢中郡之屬縣也漢末為西城郡建安二十四年劉備以申儀為西城太守儀據郡降魏魏文帝改為魏興郡治故西城縣之故城也氐略漢川梁州私朱箋曰舊本作私治謂氐略漢川梁州而私治于此也吳改𢎞治孫云當作移治何氏云作移為得吳謬矣治於此城内有舜祠在西鄉縣境内漢髙帝廟在城固縣東十里置民九户嵗時奉祠焉漢水又東為鱣湍洪波渀盪漰浪雲頽古耆舊言有鱣魚奮鰭遡流望濤直上至此則暴鰓失濟故因名湍矣漢水又東合旬水在今洵陽縣治南漢志漢中旬陽縣北山旬水所出南入沔水北出旬山東南流逕平陽戍下與直水枝分東注逕平陽戍入旬水旬水又東南逕旬陽縣今屬興安州與柞水合水西出柞溪南流逕重崖堡西屈而東流逕其堡南東南注于旬水旬水又東南逕旬陽縣南縣北山有懸書崖髙五十丈刻石作字今人不能上不知所道山下石壇上有馬跡五所名曰馬跡山旬水東南流注漢謂之旬口漢水又東逕木蘭塞南石岸有城名陵城周迴數里左岸壘石數十行重壘數十里中謂是處為木蘭塞云吳朝遣軍救孟達於此矣漢水又東左得育漢錐指作育溪與晉旬陽二縣分界於是谷漢水又東谷谷疑譌或當作合錐指作左得朱本作東注甲水口水出秦嶺山東南流逕金井城南又東逕上庸郡北與關柎水合水出上洛陽亭縣北青泥西山南逕陽亭聚西俗謂之平陽水南合豐鄉川水水出𢎞農豐鄉東山西南流逕豐鄉故城南京相璠曰南鄉浙縣有故酆鄉春秋所謂酆浙也左傳作豐析漢志𢎞農郡有析縣於地理屬𢎞農今屬南鄉何氏云南鄉當作南陽或作内鄉又西南合關柎水關祔水又南入上津注甲水甲水又東南逕魏興郡之與陽南宋本作興陽南按晉書地志魏興郡六縣有洵陽而無興陽宋本亦誤晉武帝太康中立甲水又東右入漢水漢水又東為龍淵淵上有胡鼻山石類胡人鼻故也下臨龍井渚淵深數丈漢水又東逕魏興郡之錫縣故城北此經文亦疑是注接為白石灘句文亦順為白石灘縣故春秋之錫穴地也故屬漢水衍中王莽之錫治也縣有錫義山在今鄖縣一名天心山方圓百里形如城四面有門上有石壇長十餘丈世傳列仙所居今有道士被髮餌术恒數十人山髙谷深多生嶶蘅草其草有風不偃無風獨搖漢水又東逕長利谷南入谷有長利故城舊縣也漢志漢中長利縣有鄖關其故城在今鄖西縣西南漢水又東歴姚方葢舜後枝居是處故地留姚稱也此下經云沔水東過襄陽縣北竊意與上文似不屬疑有錯簡及考胡渭禹貢錐指此下接沔水下篇東過堵陽縣云云至東逕隆中廿一節而後接東過襄陽北一卷為分三江入海而止相其文義殊為條貫但其升下篇于上篇之末而退中篇于沔水之尾必有所本東樵先生既赴玉樓無從親質姑從其改定之本撮録以俟再考水經注集釋訂訛卷二十七
