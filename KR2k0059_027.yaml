body:
  text: 水經注集釋訂訛卷二十七歸安沈炳巽撰沔水上沔水岀武都沮縣東狼谷中漢志沮水出沮縣東狼谷南至沙羨南入江過郡五行四千里師古曰沮音夷沔水一名沮水闞駰曰以其初出沮洳然故曰沮水也縣亦受名焉導源南流泉街水注之出河池縣東南流入沮縣㑹于沔元和志沮水出興州順政縣東北八十里按沮縣故城在今漢中府略陽縣界晉永嘉後沒于氐羌縣廢後魏改置武興縣又僑置略陽西魏改略陽曰漢曲隋又改曰順政唐為興州治宋復改順政曰略陽今在寧羌州北二百二十里河池今徽州屬鞏昌府泉街水在略陽縣北沔水又東南逕沮水戍而東南流注漢曰沮口沮水戍在略陽縣東南沔縣志曰沮水在縣西七十里與略陽接界漢水自寧羌州西北流逕沔縣故大安軍南又東北至青羊驛沮口在焉宋開禧二年金人陷大散關叛將吳曦退屯置口旅還興州置口即沮口也所謂沔漢者也尚書曰嶓冢導漾東流為漢山海經所謂漢出鮒嵎山也按山海經作鮒魚之山東北流得獻水口庾仲雍云是水南至關城合西漢水漢水又東北合沮口同為漢水之源也故如淳曰北方人謂漢水為沔水故孔安國曰漾水東流為沔葢與沔合也至漢中為漢水是互相通稱矣沔水又東逕白馬戍南濜水入焉水北發武都氐中南逕張魯城東魯沛國張陵孫曾學道於蜀鶴鳴山傳業衡衡傳於魯魯至行寛恵百姓親附供道之費米限五㪷故世號五㪷米道初平中劉焉以魯為督義司馬往漢中斷絶閤道用逺城治因即崤嶺周迴五里東臨濬谷杳然百尋西北二面連峰接崖莫究其極從南為盤道登陟二里有餘濜水又南逕張魯治東水西山上有張天師堂于今民事之庾仲雍謂山為白馬塞堂為張魯治東對白馬城一名陽平關濜水南流入沔謂之濜口其城西帶濜水南面沔川城側二水之交故亦曰濜口城矣後魏地形志沔陽縣冇白馬城今在沔縣西南即漢陽平闗亦曰白馬戍濜水在縣西三十里沔水又東逕武侯壘南此條經文疑俱是注盖經文不應先有武侯壘之名也諸葛武侯所居也南枕沔水水南有亮壘背山向水中有小城迴隔難解沔水又東逕沔陽故城南此十字宋本作經文原本譌作注文今從宋本改定城舊漢祖在漢中此句疑有譌誤言蕭何所築也漢建安二十四年劉備并劉璋北定漢中始立壇即漢中王位于此城沔陽故城寰宇記在西縣東南十六里在今沔縣東南十里其城南臨漢水北帶通逵南面崩水三分之一觀其遺略厥狀時傳南對定軍山曹公南征漢中張魯降乃命夏侯淵等守之劉備自陽平關南渡沔水遂斬淵首保有漢中諸葛亮之死也遺令塟乎宋本作于其山因即地勢不起墳壟唯深松茂柏攢蔚川阜莫知墓營所在在今沔縣東南一十里山東名髙平是亮宿營處有亮廟亮薨百姓野祭步兵校尉習隆中書郎向充共表云臣聞周人思邵伯之徳甘棠為之不伐越人懷范蠡之功鑄金以存其像亮徳軌遐邇勲盖來世王室之不壞實賴斯人而使百姓巷祭戎夷野祀非所以存徳念功追述在昔者也今若盡順民心則黷而無典建之京師又逼宗廟此聖懷所以惟疑也臣謂宜近其墓立之沔陽斷其私祀以崇正禮始聴立祀斯廟盖所啓置也鍾士季征蜀枉駕設祠營東即八陣圖也遺基略在崩禠難識沔水又東逕西樂城北在山上周三十里甚嶮固城側有谷謂之容裘谷道通益州山多羣獠諸葛亮築以防違宋本作遏梁州刺史楊亮以即嶮之固保而居之為符堅所敗後刺史姜守潘猛亦相仍此城城東容裘溪注之俗謂之洛水也水南遵巴嶺山東北流水左有故城憑山即嶮四面岨絶言先主遣黄忠據之以拒曹公溪水又北逕西樂城東而北流注于漢漢水又左得度口水疑當作度水口在沔縣南二里出陽平北山水有二源一曰清檢出佳鱯二曰濁檢出好鮒常以二月八月取之美珍常味鱯華陽國志作􅧖案爾雅云大者鱯小者鮡郭注云鱯似鮎而大白色音晝華陽國志作􅧖或是蜀語或冩誤耳廣雅云鮒一名鰿今之鯽也度水南逕陽平縣故城東又南逕沔陽縣故城東而南流注于漢水又上疑有漢水字又東右㑹温泉水口水發山北平地方數十步泉源沸湧冬夏湯湯望之則白氣浩然言能瘥百病云洗浴者皆有硫黄氣赴集者常有百數池水通注漢水漢水又東黄沙水左注之沔縣東四十里有沙水水北出逺山山谷邃嶮人跡罕交溪曰五丈溪水側有黄沙屯諸葛亮所開也其水南注漢水南有女郎山在今褒城縣西南山上有女郎冢逺望山墳嵬嵬壯髙及即其所裁有墳形山上直路下出不生草木世人謂之女郎道下有女郎廟及擣衣石言張魯女也有小水北流入漢謂之女郎水漢水又東合褒水明一統志褒水發源漢中府洋縣太白山一名黑龍江又名紫金水經鳯縣南流出褒谷入漢江入谷十餘里有石在水中如兜鍪狀號曰將軍石又有大白石如盆名曰白玉盆宋文同常刻詩其上水西北出衙嶺山東南逕大石門歴故棧道下谷俗謂千梁無柱也諸葛亮與兄瑾書云前趙子龍退軍燒壞赤崖以北閣道縁谷一百餘里其閣梁一頭入山腹其一頭立柱於水中今水大而急不得安柱此其窮極不可强也又云頃大水暴出赤崖以南橋閣悉壞時趙子龍與鄧伯苗一戍赤崖屯田一戍赤崖口但得縁崖與伯苗相聞而已後諸葛亮死于五丈原魏延先退而焚之謂是道也自後案舊修路者悉無復水中柱逕涉者浮梁振動無不搖心眩目也褒水又東南逕三交城城在三水之㑹故也一水北出長安一水西北出仇池一水東北出太白山是城之所以取名矣褒水又東南得丙水口水上承丙穴穴出嘉魚常以三月出十月入地穴口廣五六尺去平地七八尺泉上疑有脱文泉懸注魚自穴下透入水穴口向丙故曰丙穴下注褒水故左思稱嘉魚出於丙穴良木攢於褒谷矣褒水又東南歴小石門門穿山通道六丈有餘刻石言漢明帝永平中司𨽻校尉犍為楊厥之所開逮靈帝建和二年漢太中大夫同郡王升嘉厥開鑿之功琢石頌徳以為石牛道在今褒城縣境來攻本蜀論云來攻當作來敏蜀志云來敏字敬達義陽新野人涉獵書籍善左氏春秋尤精倉雅訓詁為太子家令累遷光禄大夫秦恵王欲伐蜀而不知道作五石牛以金置尾下言能屎金蜀王負力令五丁引之成道秦使張儀司馬錯尋路滅蜀因曰石牛道厥盖因而廣之矣蜀都賦曰岨以石門其斯之謂也門在漢中之西褒中之北褒水又東南歴褒口即褒谷之南口也北口曰斜所謂北出褒斜褒水又南逕褒縣故城東褒中縣也本褒國矣漢昭帝元鳯六年置褒水又南流入于漢漢水又東逕萬石城下城在髙原上原髙十餘丈四面臨平形若覆瓮水南遏水為岨西北並帶漢水其城宿是流雜聚居故世亦謂之流雜城元和志褒谷山在褒城縣北五里南口為褒北口為斜長四百七十里褒水萬石城俱在褒城縣東漢水又東逕漢廟堆下在今南鄭縣西南昔漢女所遊側水為釣臺後人立廟於臺上世人覩其頽基崇廣因謂之漢廟堆傳呼乖實又名之為漢武堆非也又東過南鄭縣南今漢中府治縣故褒之附庸也周顯王之世蜀有褒漢之地至六國楚人兼之懷王衰弱秦略取焉周赧王二年秦恵王置漢中郡因水名也耆舊傳云南鄭之號始於鄭桓公柦公死於犬戎其民南奔故以南為稱即漢中郡治也漢髙祖入秦項羽封為漢王蕭何曰天漢美名也遂都南鄭今陜西漢中府治大城周四十二里城内有小城南憑北結環雉金墉漆井皆漢所修築地沃川嶮魏武方之雞肋曰釋騏驥而不乗焉皇皇而更求遂留杜子緒鎮南鄭而還晉咸康中梁州刺史司馬勲斷小城東面三分之一以為梁州漢中郡南鄭縣治也自齊宋魏咸相仍焉水南即漢隂城也相承言吕后所居也有㢘水出巴嶺山北流逕㢘川故水得其名㢘水又北注漢水漢水右合池水水出旱山山下有祠列石十二不辨其由盖社主之流百姓四時祈禱焉俗謂之獠子水夾溉諸田散流左注漢水錐指以今輿地言之漾水出寧羌州北嶓冢山寧羌在漢中府西北三百八十里東北流逕沔縣西南合沔水又東逕沔縣南沔縣在府西少北九十里又東逕褒城縣南在府西北四十里沔水去縣二十四里又東逕南鄭縣南為漢水去縣三里經所謂嶓冢𨗳漾東流為漢者也漢志隴西氐道下云禹貢養水所出至武都為漢師古曰氐夷種名也氐之所居故曰氐道邑有蠻夷曰道晉永嘉後地沒于氐羌縣多荒廢氐道今不知所在武都郡武都縣下云東漢水受氐道水一名沔過江夏謂之夏水入江武都本白馬氐地漢元鼎六年開以為武都郡治武都縣今鞏昌府成縣西北百里有仇池山山上有仇池城城東南有武都縣故城即漢武都郡治也水經漾水出隴西氐道縣嶓冢山東至武都沮縣為漢水常璩華陽國志漢水有二源東源出武都氐道縣漾山為漾水禹貢𨗳漾東流為漢是也此皆依漢志以為言然氐道漾水至武都為東漢水卒莫有能言其所經者今按酈注濁水出濁城北今成縣有濁水戍亦曰濁水城胡三省云在上禄縣東南武街城西北東流與丁令溪水㑹又東逕武街城南今廣業郡治城在今成縣西三十里又東𢎞休水注之又東逕白石縣南白石今為成縣治又東南渥陽水注之又東南與仇鳩水合又東與河池水合又東南兩當水注之水出陳倉縣之大散嶺西南流入故道川謂之故道水西南逕故道城東又西南入廣漢郡界與沮水枝津合謂之兩當溪水上承武都沮縣之沮水瀆沮縣今略陽沮水在縣東西南流注於兩當溪又西南注於濁水濁水南逕槃頭郡東今略陽縣西北一百里有長舉廢縣後魏於此置槃頭郡而南合鳯溪水又東注於漢水觀此文則漢志以沮水枝津上承氐道水下為東漢水可知也氐道雖未詳其處所以地望度之當在西縣之東河池之西上邽之南下辨之北濁水所受有丁令溪水𢎞休水渥陽水皆出其北盖自氐道來也其中或有漢志所謂養水者但今無可考耳然沮水枝津上承沮瀆自東入西非自西入東也昔之觀水作記者不察地勢之髙下不辨川流之去來遂以為氐道養水合濁水兩當溪由枝津以達沮沔是為東漢之源而不知其非也班固因之故有此誤水經於武都下加沮縣二字盖亦以氐道水下通沮水為東漢之源也然漢志不言養水出何山而水經復附㑹之曰嶓冢則氐道亦有嶓冢山矣常璩知其非是故又因水以名其山曰漾山而為之殊目要知氐道水所出别是一山非嶓冢也近世言漢水者皆知班固之誤而不知其誤所由來故詳著其原委如此漢志隴西西縣下云禹貢嶓冢山西漢水所出括地志秦西垂宫即漢西縣在秦州上邽縣西南九十里元和志嶓冢山在上邽縣西南五十八里然則山在故西縣東北去西縣三十二里也上邽漢屬隴西郡唐為秦州治今鞏昌府秦州是志云西縣故城在州西南一百二十里嶓冢山在州西南六十里山不甚髙而峯岫延長連屬若冢是山在西縣故城東北六十里也與括地元和二志里數不同盖唐之上邽在今州之西南去西縣故城當較近但山不當更差二十八里耳州志城與山必有一誤南入廣漢白水東南至江州入江元和志利州景谷縣本漢白水縣屬廣漢郡宋為平興縣隋改曰景谷今四川保寕府昭化縣之白水鎮是也鎮在縣西百里白水在縣北二十里至縣東三里合嘉陵江漢巴郡治江州縣其故城在今重慶府巴縣西大江在縣東南嘉陵江至此入大江過郡四隴西武都廣漢巴郡行二千七百六十里此與氐道之養水全無交涉水經非一時一手作漾水篇首云漾水出隴西氐道縣嶓冢山東至武都沮縣為漢水此不過依漢志氐道一條以立文惟加嶓冢沮縣為不同耳其所謂漢水即東漢亦與西縣之西漢全無交涉及觀下文東南逕白水葭萌閬中至江州入江則又確是西漢水與武都一條全無交涉矣首尾横決必魏晉間人所續也經文有曰廣魏者故廣漢也盖曹氏改名漢後人續經此亦其一證尋其意指盖以氐道水南合濁水兩當溪歴槃頭郡東而南為西漢水也槃頭治長舉亦漢沮縣地故酈注以為東西兩川俱出嶓冢而同為漢水其言曰劉澄之云有水從沔陽縣南至梓童漢夀入大穴暗通罡山郭景純亦言是矣罡山穴小本不容水水成大澤而流與漢合庾仲邕又言漢水自武遂川南入蔓葛谷越野牛逕至關城合西漢水故諸言漢者多言西漢水至葭萌入漢則兩川通波更在沮縣之南矣嘗試以圖志考之漾沮雖有枝津與西漢通要皆自東入西非自西入東也盖嶓冢亘絶東西俗謂之分水嶺地勢東髙而西下故西漢水自略陽縣南入寧羌州界即折而西南避髙就下其性則然豈有東入之理澄之所言即禹貢之潛仲邕所言即通谷水也二水皆東漢之枝津西流入西漢水而説者乃謂西漢水至葭萌入漢顛倒之矣今嶺東漾沮枝津皆入西漢嶺西谿澗之水亦皆入西漢川流去來有目者盡能驗之其可是古而非今乎酈道元雖有東西兩川俱出嶓冢之説而終以西漢為主注云今西縣嶓冢山西漢水所導也西流與馬池水合又西南合楊㢘川水又西南逕始昌峽始昌縣故城西城在今西和縣北又西南逕宕備戍南戍在西和縣東北又西南逕祁山軍南祁山在嶓冢之西七十許里今在西和縣西北七十里又西逕蘭倉城南今禮縣東南有蘭倉故城又南入嘉陵道而為嘉陵水禮縣本漢嘉陵道地屬武都郡西漢水至此為嘉陵水傅同叔云嘉陵江出鳯州大散關西南嘉陵谷至興州北境當㑹東漢水而東行安得越東漢而為西漢乎宋人以故道水為嘉陵江大非近志皆承其謬故道水合濁水至槃頭郡入西漢水至今猶然何言㑹東漢而不為西漢即又東南逕瞿堆西又屈逕瞿堆南瞿堆即仇池山在今成縣西北百里又東南逕濁水城南亦曰濁水戍在成縣西又東南逕修城道南今略陽縣西北有修城廢縣漢志作循城屬武都治又東南於槃頭城南與濁水合詳見前又東逕武興城南今略陽縣治即武興故城唐為興州順政縣元和志嘉陵江經順政縣南去縣百步又西南逕關城北關城即今陽平關在寧羌州西北八十里東至沔縣一百七十里又西南逕通谷唐武徳二年分緜谷縣之通谷鎮置金牛縣在今寧羌州金牛驛西三十里庾仲邕曰漢水自武遂川南入蔓葛谷越野牛逕至關城合西漢盖即此通谷水也通溪上承漾水曰獻水口又西南寒水注之寰宇記大寒水在三泉故縣南十五里西流至龍門山入大石穴龍門山在故三泉縣西七十里今在廣元縣東北八十二里其水即禹貢之潛郭璞所謂從沔陽南流至漢夀入大穴中通峒山下西南潛出者也又西逕石亭戍又逕晉夀城西又南合漢夀水在今廣元縣南水經又東南至葭萌縣東北與羌水合注云白水西北出臨洮縣西傾山又東南逕白水縣故城東又東南逕小劒戍北西去大劒三十里又東南至吐費城南即西晉夀之東北也東南流注漢水水有津關元和志晉夀故城在利州益昌縣東南五十里本漢葭萌縣也此為西晉夀今在昭化縣界白水即桓水嘉陵江自陜西寧羌州界東南流逕四川廣元縣西又西南逕昭化縣東南又南逕劒州東又東南入倉溪縣界白水關在寧羌州西南九十里接昭化界東北去關城一百八十里水經又東南逕巴郡閬中縣注云巴西郡治也閬水出閬陽縣而東逕其縣南又東注漢水又東南逕宕渠縣又東南合宕渠水水北出南鄭縣南巴嶺謂之北水東南流與難水合又東南流逕宕渠縣謂之宕渠水又東南入漢三巴記云閬白二水南流曲折三回如巴字即嘉陵江也自蒼溪縣界東南流逕閬中縣西南又東南逕南部縣東北又東南逕蓬州東又西南逕南充縣東又南入定逺縣界寰宇記云嘉陵水又名閬中水亦曰閬江亦曰渝水華陽國志曰閬中有渝水賨民多居水左右天性勁勇鋭氣善舞今所謂巴渝舞也宕渠故城在今渠縣東北七十里宕渠水亦名渠江重慶府志云嘉陵江自定逺縣流入合州界又一百九十里合渠江又十里至州城東南合涪江又南四十里入巴縣酈道元以宕渠水為禹貢之潛非是水經又東南逕江州縣東南入於江注云涪水注之故仲邕謂涪内水者也江州作江津誤今據漢志改正以今輿地言之秦州西和禮縣成縣並屬陜西鞏昌府略陽寧羌並屬漢中府廣元昭化劒州蒼溪閬中南部並屬四川保寧府蓬州南充並屬順慶府定逺合州巴縣並屬重慶府諸州縣界中皆西漢水之所經也禹貢雖無西漢水然必周知其所歴之地而後可以折東漢受氐道水之妄且廣元以下即禹貢之潛昭化合白水亦即禹貢之桓皆有關於經故備著之禹貢以嶓冢繫梁州而漢志嶓冢在雍域之隴西一誤也禹貢云嶓冢導漾而漢志以嶓冢所出為西漢水其漾水則出氐道二誤也禹貢之潛乃漾水枝津西出為西漢水而漢志西漢水出西縣之嶓冢三誤也漢志不言漾水出何山而水經云出氐道縣嶓冢山是氐道亦有嶓冢四誤也漾者東漢之源而續水經者以西漢接漾水為一川五誤也漾沔枝津皆自東入西而酈注從舊説云西漢水至葭萌入漢六誤也川流離合地上灼然可見而酈注惑闞駰之説以為原始要終潛流或一故東西俱受漢漾之名七誤也羣言殽亂學者靡所折衷今説漢水當排棄諸家專主禹貢以沮沔為漢之别源以西漢為漾之枝津而氐道水則存而不論是亦理亂絲解連環之術也按今陜西通志漢中府寧羌州有嶓冢山在州北九十里形如冢漢水所出東入襄陽禹貢嶓冢導漾即此沔縣有漾水在舊大安軍南禹貢