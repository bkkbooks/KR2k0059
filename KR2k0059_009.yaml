body:
  text: 水經注集釋訂訛卷九歸安沈炳巽撰清水沁水淇水蕩水洹水清水出河内修武縣之北黑山河内今為河南懷慶府治修武在府城東一百二十里清水源出衛輝府輝縣西南七十里黑山在輝縣北四十里在縣地一作北一作境白鹿山在輝縣西北五十里東清水所出也上承諸陂散泉積以成川南流西南屈朱箋御覽引此作南流屈曲瀑布垂巖縣河注壑二十餘丈雷扑之聲震動山谷左右疑漏石字壁層深獸跡不交隍中散水霧合視不見底南峯北嶺多結禪栖之士東巖西谷又是刹靈之圖竹柏之懷與神心妙逺仁智之性共山水效深更為勝處也其水歴澗流飛清洞觀朱箋御覽引此作清泠可觀謂之清水矣溪曰瑶溪又曰瑶澗水又南與小瑶水合水近出西溪北窮溪東南流注之清水清水又東南流吳澤陂水注之水上承吳陂於修武縣故城西北修武故寗也亦曰南陽矣馬季長曰晉地自朝歌以北至中山為東陽朝歌以南至軹為南陽故應劭地理風俗記云河内殷國也周名之為南陽又曰晉始啓南陽今南陽城是也秦始皇改曰修武徐廣王隱並言始皇改瓚注漢書云案韓非書秦昭王越長平西伐修武時秦未兼天下修武之名久矣余案韓詩外𫝊言武王伐紂勒兵於寗更名寗曰修武矣魏獻子田大陸還卒於寗是也漢高帝八年封都尉魏遫為侯國亦曰大修武有小故稱大小修武在東漢祖與滕公濟自玉門津而宿小修武者也大陸即吳澤矣魏土地記曰修武城西北二十里有吳澤水陂南北二十許里東西三十里西則蔡溝入焉水有二源北水上承河内野王縣今為懐慶府治河内縣東北界溝為長明溝分枝津東逕雍城南寒泉水注之水出雍城西北泉流南注逕雍城西春秋僖公二十四年王將以狄伐鄭富辰諫曰雍文之昭也京相璠曰今河内出山陽西有故雍城在今修武縣西又東南注長明溝溝水又東逕射犬城北漢大司馬張楊為將楊醜所害眭固殺醜屯此欲北合袁紹典略曰眭固字白兎或戒固曰將軍字兎而此邑名犬兎見犬其勢必驚宜急去兎不從漢興平四年按獻帝興平止二年其斬固是建安四年今云興平誤魏太祖斬之於此魏志張楊傳漢大司馬張楊素與吕布善太祖之圍布楊欲救之不能乃出兵東市遥為之勢其將楊醜殺楊以應太祖楊將眭固殺醜將其衆欲北合袁紹太祖遣史渙邀擊破之于犬城斬固盡收其衆魏略曰固字白兎既殺楊醜軍屯射犬時有巫誡固曰將軍字兎而此邑名犬兎見犬其勢必驚宜急移去固不從遂戰死以魏种為河内太守守之兖州叛太祖曰唯种不棄孤及走太祖怒曰种不南走越北走胡不置汝也射犬平禽之公曰難其才也釋而用之魏志武帝紀建安四年以魏种為河内太守屬以河北事初公舉种孝亷兖州叛公曰惟魏种且不棄孤也及聞种走公怒曰种不南走越北走胡不置汝也既下射犬生禽种公曰唯其才也釋其縳而用之故長明溝水東入石澗東流蔡溝水入焉水上承州縣北漢志河内郡有州縣白馬溝東分為之蔡溝東㑹長明溝水又東逕修武縣之具亭宋本作吳亭北東入吳陂又次北有茍泉水入焉水出山陽縣故修武城西南同源分派裂為二水南為茍泉北則吳瀆二瀆雙導俱東入陂山陽縣東北二十五里有陸真亭南有皇母馬鳴二泉明一綂志作黄母泉在修武縣西北一十五里又有招鳥泉馬鳴泉巧婦泉並在本縣六真鄉東南合注于吳陂也次陸真阜之東北得覆釡堆堆南有三泉相去四五里參差合次南注于陂泉在濁鹿城西建安二十五年魏封漢獻帝為山陽公濁鹿城即是公所居也濁鹿城一名山陽城在修武縣西北六十里陂水之北陂澤側有隤地疑作城也春秋隱公十一年王以攢茅隤十二邑與司冦蘇忿生者也京相璠曰河内修武縣北有故隤城實中今世俗謂之皮塏宋本作皮垣方四百歩實中高八丈際陂北隔水一十五里俗所謂蘭丘也方二百步西一十里又有一丘際陂原本作三宋本作山或作之今依朱本作陂世謂之勑丘方五百步形狀相類疑即古攢茅也杜預曰二邑在修武縣北所未詳也又東長泉水注之原出白鹿山東南伏流逕一十三里重源濬發於鄧城西北東南伏流世亦謂之重泉水也又逕七賢祠東左右筠篁列植冬夏不變貞萋魏歩兵校尉陳留阮籍中散大夫譙國嵇康晉司徒河内山濤司徒琅邪王戎黄門郎河内向秀建威叅軍沛國劉伶始平太守阮咸等同居山陽結自得之遊時人號之為竹林七賢也向子期所謂山陽舊居也後人立廟於其處廟南又有一泉東南流注于長泉水郭縁生述征記所云白鹿山東南二十五里有嵇公故居以居時有遺竹焉葢謂此也其水又南逕鄧城東名之為鄧瀆又謂之為白屋水也昔司馬懿征公孫淵還達白屋即於此也其水又東南流逕隤城北又東南厯澤何氏云疑有脫文注于陂泉水東流謂之八光溝而東流注于清水謂之長清河而東周永豐塢一作城有丁公泉發于焦泉之右次東又得焦泉泉發于天門之左天井固石天門山石自空狀若門焉廣三丈高兩匹深丈餘更無所出世謂之天門也東五百餘歩中有石穴西向裁得容人平得二字疑誤一云當作平行東南入徑至天井直上三匹有餘扳躡而昇至上東平疑作平東西二百歩南北七百歩四面嶮絶無由昇陟矣上有比丘釋僧訓精舍寺十有餘僧給養難周多出下平二字疑誤有志者居之寺左右雜樹踈挺有一石泉方丈餘清水湛然嘗無增減山居者資以給飲北有石室二間舊是隱者念一之所今無人矣泉發於北阜南流成漢疑譌當作溪也也字疑衍世謂焦泉也次東得魚鮑泉次東得張波泉次東得三淵泉楩河參連女宿相屬朱云一本作梗河參連女宿相屬吳本改作挭柯誤矣按隋天文志梗河三星在火角北而女宿或是須女李克家云梗河三星女宿即須女四星此葢謂魚鮑張波三淵之三泉如梗河之參連并焦泉為四似女宿之相屬也是四川在重門城西並單川南注也重門城昔齊王芳為司馬師廢之宫於此即魏志所謂送齊王于河内重門者也城在共縣今為衛輝府輝縣故城西北二十里城南有安陽陂次東又得卓水陂穴在今輝縣西平地湧出東有北門陂陂方五百歩在共縣故城西漢高帝八年封旅罷師為共嚴侯國按史記表作共莊侯盧罷漢表作共嚴侯旅罷葢古盧與玈通用故漢書譌作旅而此承其誤耳不曰莊而曰嚴者避明帝諱也即共和之故國也共伯既歸帝政逍遥于共山之上山在國北所謂共北山也吕氏春秋云共伯和修其行好賢仁而海内皆以來為稽矣周厲之難天子曠絶天下皆來謂矣莊子云共伯得乎共首司馬彪注云厲王之難共伯即于王位十四年大旱屋焚召公卜之曰厲王為祟乃立宣王共伯復歸于宗逍遥得意共山之首仙者孫登之所處袁彦伯竹林七賢傳嵇叔夜嘗採藥山澤遇之於山冬以被髮自覆夏則編草為裳彈一絃琴而五聲和其水三川南合謂之清川又南逕凡城東司馬彪袁崧郡國志曰共縣有汎亭詩凢伯國春秋隱公七年經書王使凢伯來聘是也杜預曰汲郡共縣東南有凢城在今輝縣西南二十里今在西南其水又西南與前四水總為一瀆又謂之陶水南流注于清水清水又東周新豐塢又東注也東北過獲嘉縣北漢書稱越相吕嘉反武帝元鼎六年巡行於汲郡漢書武帝紀作至汲新中鄉師古曰汲河内縣新中其鄉名也今云汲郡誤中鄉得吕嘉首因以為獲嘉縣後漢封侍中馮石為侯國縣故城西有漢桂陽太守趙越墓冢北有碑越字彦善縣人也累遷桂陽郡五官將尚書僕射遭憂服闋守河南尹建寧中卒碑東又有一碑碑北有石柱石牛羊虎俱碎淪毁莫記清水又東周新樂城城在獲嘉縣故城東北即汲縣新鄉也又東過汲縣北今為衛輝府治縣故汲郡治晉太康中立城西北有石夾水飛湍濬急也人亦謂之磻溪言太公常釣於此也城東門北側有太公廟衛輝府城西北二十五里有太公泉上有吕望廟廟前有碑碑云太公望者河内汲人也縣民故㑹稽太守杜宣白令崔瑗曰太公本生於汲舊居猶存君與高國同宗太公載在經傳今臨此國宜正其位以明尊祖之義於是國老王喜廷掾鄭篤功曹邵勤等咸曰宜之遂立壇祀為之位主城北三十里有太公泉泉上又有太公廟廟側高林秀木翹楚競茂相𫝊云太公之故居也晉太康中范陽盧無忌為汲令立碑於其上太公避紂之亂屠隱市朝遁釣魚水何必渭濵然後磻溪茍愜神心曲渚則可磻溪之名斯無嫌矣清水又東逕故石梁下梁跨水上橋石崩禠餘基尚存清水又東與倉水合水出西北方上山西倉谷谷有倉玉珉石故名焉其水東南流潛行地下又東南復出俗謂之雹水東南厯坶野坶同牧說文武王與紂戰于坶野自朝歌以南南暨清水土地平衍㨿臯跨澤悉坶野矣郡國志曰朝歌縣南有牧野竹書紀年曰周武王率西矣當作夷諸侯伐殷敗之于坶野詩所謂坶野洋洋檀車煌煌者也有殷大夫比干冢前有石銘題𨽻云殷大天比干之墓所記唯此今已中折不知誰所誌也太和中高祖孝文皇帝南巡親幸其墳而加吊焉刋石樹碑列于墓隧矣雹水又東南入于清水又東南逕合城南故三㑹亭也以淇清合河故受名焉清水又屈而南逕屬皇臺東北南注之也又東入于河謂之清口即淇河口也葢互受其名耳地理志曰清河水出内黄縣南無清水可來所有者唯鍾是水耳葢河徙南注清水瀆移上下疑有譌字闕文唯流逕絶餘目故東川有清河之稱相嗣不斷目尚存故東川曹公開白溝遏水北注方復故瀆矣沁水出上黨沮縣謁戾山沮當作湼按漢志上黨郡有湼縣今為山西沁州武鄉縣山海經曰謁戾之山沁水出焉南流注于河沁水即洎疑當作湼按漢志湼氏縣注師古曰湼水出焉故以名縣也水也或言出榖逺縣今為沁州沁源縣及平陽府岳陽縣地羊頭山也靡谷三源竒注逕㵼一隍又南㑹三水厯洛出左右近溪參差翼注之也南過榖逺縣東又南過猗氏縣東猗氏縣今屬平陽府榖逺縣王莽之榖近也沁水又南逕猗氏縣故城東劉聰以詹事魯繇為冀州治此也沁水又南厯猗氏闗又南與驫驫水合水出東北巨峻山乘高㵼浪觸石流響世人因聲以納稱西南流注于沁沁水又南與秦川水合水出巨峻山東帶引衆溪積以成川又西南逕端氏縣故城東昔韓趙魏分晉遷晉君於端氏縣即此是也端氏故城在今山西澤州沁水縣東九十里史記趙世家成侯十六年與韓魏分晉封晉君于端氏漢為縣屬河東郡唐置澤州治端氏縣其水南流入于沁水又南過陽阿縣東沁水南逕陽阿縣故城西魏土地記曰建興郡治陽阿縣郡西四十里有沁水南流沁水又南與濩澤水合水出澤城西白澗嶺下東逕濩澤明一綂志作獲澤今之澤州陽城縣即漢之獲澤縣墨子曰舜漁獲澤應邵曰澤在縣西北又東逕獲澤縣故城南在今澤州陽城縣西三十里葢以澤氏縣也竹書紀年梁惠成王十九年晉取𤣥武獲澤者也竹書注云即雷澤舜漁處其水際疑譌城東注又東合清淵水水出其縣北東南經澤城東又南入于澤水澤水又東得陽衆水宋本作陽泉水口出鹿臺山在今澤州沁水縣南三十里山上有水淵而不流其水東逕陽陵城南即陽阿縣之故城也漢高帝七年封卞訴為侯國按史漢表高帝七年封其石為陽河侯索隱曰縣名屬上黨郡但上黨有陽阿而無陽河則表之譌阿為河可知然所謂卞訴者並無其人惟琴操云卞和獻玉于楚王封為陵陽侯辭不受云云又與此不合殊不可解水厯焦一本作憔燒山東下與黒嶺水合水出西北黒嶺下即開蹬也其水東南流逕北卿亭下又東南逕陽陵城東南注陽泉水陽泉水又南注獲澤水又東南又有上澗水注之水導源西北輔山東逕銅于崖南厯析城山在今陽城縣西南七十里北山在獲澤南禹貢所謂厎柱析城至于王屋也山甚高竣上平坦下有二泉東濁西清左右不生草木數十歩外多細竹其水自山隂東入獲澤水獲澤水又東南注于沁水沁水又東南陽阿水左入焉水北出陽阿川南流逕建興郡而其水又東南流逕午壁亭東而南入山㳂波潄石漰澗八丈環濤轂轉西南流入于沁水又南五十餘里汾里下疑有脫文汾宋本作沿上下歩逕裁通小竹細筍被于山渚蒙籠㧞宋本作密竒宋本作最為翳薈也又南出山過沁水縣北今屬澤州沁水南逕石門也謂之沁口魏土地記曰河内郡野王縣西七十里有沁水左逕沁水城西附城東南流也石門是晉安平獻王司馬孚之為魏野王典農中郎將之所造也案其表云臣孚言臣被明詔興河内水利臣既到檢行沁水源出銅提山屈曲周廻水道九百自太行以西王屋以東層巖高峻天時霖雨衆谷走水小口漂迸宋本作水石漂迸木門朽敗稻田汎灠歲功不成臣輙按行去堰五里以外方石可得數萬餘枚臣以為方石為門若天亢旱增堰進水若天霖雨陂澤充溢則閉石御覽引此作閉防斷水空渠衍澇足以成河雲雨由人經國之謀暫勞永逸聖王所許願陛下特出臣表勑大司農府給人工勿使稽延以贊時要臣孚言詔書聽許於是夾岸累石結以為門用伐御覽引此作代木門枋故石門舊有枋口之稱矣溉田頃畝之數間二此二字疑譌歲月之功事見門側石銘矣水西有孔山山上石穴洞開穴内石上有車轍牛跡耆舊傳云自然成者非人功所就也其水南分為二水一水南出為朱溝水沁水有逕沁縣故城北葢藉水以名縣矣春秋之少水也京相璠曰晉地矣又云少水今沁水也沁水又東逕沁水亭北世謂之小沁城沁水東右合小沁水水出北山臺渟淵南流為臺渟水南東入沁水沁水又東倍澗水注之水北出五行之山南流注于沁水又東過野王縣北今為河南懷慶府治河内縣沁水又東䢴水注之出太行之阜山則五行之異名也淮南子曰武王欲築宫於五行之山周公曰五行嶮固德能覆也内貢廻矣使吾暴亂則伐我難矣君子以為能持滿淮南子氾論訓曰武王尅殷欲築宫于五行之山周公曰不可夫五行之山固塞嶮阻之地也使我德能覆之則天納其貢職者逥也使我有暴亂之行則天下之伐我難矣此所以三十六世而不奪也周公可謂能持滿矣高誘云今太行山也在河内野王縣西北上黨關也詩所謂徒殆野王道傾葢上黨關即此山矣其水南流逕䢴城西故䢴關也城南有䢴臺春秋僖公二十四年王將伐鄭富辰諫曰䢴武之穆也按左傳邘晉應韓武之穆也杜注邗邘音于今云䢴誤下凢邘俱誤作京相璠曰今野王西北三十里有故邘城邘臺是也在今懐慶府城西北三十里今為邘臺村今故城當太行南路道出其中漢武帝封李壽為侯國邘水又東南逕孔子廟東廟庭有碑魏太和元年孔靈度等以舊宇毁落上上字下疑有脫文求修復野王令范衆愛河中宋本作河内太守元真刺史咸陽公高允表聞立碑於廟治中劉明疑漏别字駕吕次父主簿向班虎荀靈龜以宣尼大聖非碑頌所稱宜立記焉云仲尼傷道不行欲北從趙鞅聞殺鳴犢遂旋車而反及其後也晉人思之於太行嶺南為之立廟葢往時迴轅處也余按諸子書及史籍之文並言仲尼臨河而嘆曰丘之不濟命也夫是非太行迴轅之言也碑云魯國孔氏官於洛陽因居廟下以奉蒸嘗斯言至矣葢孔因遷山下追思聖祖故立廟存饗耳其猶劉累遷魯立堯祠於山矣非謂迴轅於此也䢴水東南逕邘亭西京相璠曰又有亭在橋一作臺西南三十里今是亭在邘城東南七八里葢京氏之所謬耳或更有之余所不詳其水又南流注于沁沁水東逕野王縣故城北秦昭王四十四年白起攻太行道絶而韓之野王降始皇㧞魏東地置東郡衞元君自濮陽徙野王即此縣也史記衞世家秦㧞魏東地置東郡更徙衞野王縣而并濮陽為東郡漢高帝元年為殷國二年為河内王莽之後隊縣曰平野矣魏懷州刺史治皇都遷洛省州復郡水北有華嶽廟廟側有攢柏數百根對郭臨川負岡䕃渚青青彌望竒可翫也懷州刺史頓丘李洪之之所經構也廟有碑焉是河内郡功曹山陽荀靈龜以和平四年造天安元年立沁水又東朱溝枝津入焉又東與丹水合水出上黨高都縣今為山西澤州地其故城在州城東三十里故城東北阜下俗謂之源源水山海經曰沁水之東有林焉名曰丹林丹水出焉即斯水矣丹水自源東北流又屈而東注左會絶水地理志曰高都縣有莞谷丹水所出東南入絶漢志作泫水水是也絶水出泫氏縣今為山西澤州陵川縣西北楊谷故地理志曰楊谷絶水所出東南流左會長平水水出長平縣長平故城在今澤州高平縣西北小山東南流逕其縣故城泫氏之長平亭也史記曰秦使左庶長王齕攻韓取上黨上黨民走趙趙軍長平使亷頗為將後遣馬服君之子趙括代之秦密使武安君白起攻之括四十萬衆降起起坑之於此上黨記曰長平城在郡之南秦壘在城西二軍共食流水澗相去五里秦坑趙衆收頭顧築臺於壘中因山為臺崔嵬桀起今仍號曰白起臺今澤州高平縣西五里有頭顱山山上有白起臺秦白起坑趙卒四十萬後人收頭顱葬于此山因名城之左右㳂山亘隰南北五十許里東西二十餘里悉秦趙故壘遺壁舊疑作猶存焉漢武帝元朔二年以封將軍衞青為侯國其東南流注絶水絶水又東南流逕泫氏縣故城北竹書紀年曰晉烈公元年趙獻子城泫氏絶水東南與泫水會水導源縣西北𤣥谷東流逕一城故南疑有譌誤俗謂之都鄉城又東南逕泫氏故城南世祖建武六年封萬普為侯國而東會絶水亂流東南入高都縣右入丹水上黨記曰長平城在郡南山中丹水出長平北山南流秦坑趙衆流血丹川朱本作丹山由是俗名為丹水明一綂志丹水在澤州東北三十里舊號泫水源出高平縣西北仙公山南流合白水入沁河斯為不經矣丹水又東南流注于丹谷即劉越石扶風歌所謂丹水者也晉書地道記曰縣有太行關丹溪為關之東谷途自此去不復由關夫疑作矣丹水又逕二石入北二石入北四字疑有譌誤而各在一山角倚相望南為河内北曰上黨三宋本作二郡以之分境丹水又東南厯西巖下巖下有大泉湧發洪源巨輪朱云宋本作洪流巨輪疑當作洪流巨輪淵深不測蘋藻冬疑誤芹竟川含綠雖嚴辰肅月燕麥暄萋丹水又南白水注之水出高都縣故城西所謂長平白水也東南流厯天井關地理志曰高都縣有天井關蔡邕曰太行山上有天井關在井北遂因名焉故劉歆遂初賦曰馳太行之嶮峻入天井之高關太元十五年晉征虜將軍朱序破慕容永於大行遣軍至白水去長子一百六十里白水又東天井溪水會焉水出天井關北流注白水世謂之北流泉白水又東南流入丹水謂之白水交丹水又東南出山逕鄈城西城在山際俗謂之期城非也司馬彪郡國志曰山陽有鄈城京相璠曰河内山陽西北六十里有鄈城竹書紀年曰梁惠成王元年趙成侯偃韓懿侯若伐我葵即此城也丹水又南屈而西轉光溝水出焉丹水又西逕苑鄉城北南屈東轉逕其城南東南流注于沁謂之丹口竹書紀年曰晉出公五年丹水三日絶不流幽公九年丹水出相反擊今竹書作潔即此水也沁水又東光溝水注之也疑衍水首受丹水東南流界溝水出焉又南入沁水又東南流逕成鄉城北又東逕中都亭南又合界溝水水上承光溝東南流長明溝水出焉又南逕中都亭西而南流注于沁水也又東過周縣北縣故周也春秋左傳隱公十有一年周以賜鄭公孫叚按鄭公孫叚一見于襄公二十九年一見于昭公元年其去隱公逺甚且左傳從無此文不知何據云然六國時韓宣子宣子是晉悼公時人伊時三家尚未分晉何得云六國時也徙居之按史記韓世家宣子徙居州洼曰州縣屬河内郡則經文之周縣疑當作州有白馬溝水注之水首受白馬湖湖一名朱管陂陂上承長明溝湖水東南流逕金亭西分為二水一水東出為蔡溝一水南流于沁也又東過邢丘一曰懐縣之北今為懐慶府武涉縣韓詩外傳曰武王伐紂到邢丘更名邢丘曰懐今韓詩作懷寗春秋時赤翟伐晉圍懷是也王莽以為河内故河内郡治也舊三河之地矣韋昭曰河南河東河内為三河也縣北有沁陽城沁水逕其南而東注也又東過武德縣南武德故城在今懷慶府東南五十里又東南至滎陽縣北東入于河沁水於縣南水積為陂通結數湖有朱溝水注之其水疑有譌脫上承沁水於沁水縣西北自方口東南流奉溝水右出焉又東南流右泄為沙溝水也其水又東南於野王城西枝渠左水焉以周城溉東逕野王城南又屈逕其城東而北注沁水朱溝自枝渠東南逕州城南又東逕懷城南又東逕殷城北郭緣生述征記曰河之北岸河内懷縣有殷城或謂楚漢之際殷王卬治之非也余按竹書紀年云秦師伐鄭次于懷城殷殷即是城也然殷之為名久矣知非從卬始昔劉聰以郭黙為殷州刺史督緣河諸軍事治此朱溝又東南注于湖湖水又右納沙溝水水分朱溝南派東南逕安昌城在今懐慶府東南六十里西漢成帝河平四年封丞相張禹為侯國今城之東南有古冢時人謂之張禹墓余按漢書禹河内軹人徙冢蓮芍鴻嘉元年禹以老乞骸自治冢塋起祠堂於平陵平之肥牛亭近延陵奏請之詔為徙亭哀帝建平二年薨遂葬於彼此則非也漢書張禹傳張禹字子文河内軹人也徙家蓮勺鴻嘉元年以老病乞骸骨禹年老自治冢塋起祠室好平陵肥牛亭部處地又近延陵奏請求之上以賜禹詔令平陵徙亭他所沙溝又東逕隰城北春秋僖公二十五年取大叔於溫殺之於隰城是也京相璠曰在懷縣西南又逕殷城西東南流入於陂陂水又值東南流入於河先儒亦咸謂是溝為沛渠故班固及闞駰並言沛水至武德入河葢沛水枝瀆條分所在布稱亦兼丹水之目矣朱本引孫克家云沛渠沛水俱當作泲淇水出河内隆慮縣今為河南彰德府林縣西大號山明一綂志云淇水在臨河廢縣東南五里源出林慮山中綿厯太行而東至于濬縣枋頭東流入衞河山海經曰淇水出沮如山水出山側頽波漰注衝激横山山上合下開可減六七十歩巨石磥砢交積隍澗傾澗渀盪御覽引此作傾瀾莽盪勢同雷轉激水散氛曖若霧合又東北活水注之水出壺關縣今屬山西潞州東玷臺下石壁崇高昻藏隱天泉流發于西北隅與金谷水合金谷即玷臺之西溪也東北會水又東流注淇水又逕南羅川又厯之羅城北東北與女臺水會合水發西北三女臺下東北流注于淇淇水又東北逕淇陽川逕石城西北城在原上帶澗枕淇淇水又東北西流水注之水出東大嶺下西流逕石樓南在北陵石上練垂桀立亭亭極峻其水西流水也又東逕馮都壘南世謂之淇陽城在西北三十里淇水又東出山分為二水㑹立石堰遏水以沃白溝左為菀一作宛水右則淇水自元甫城東南逕朝歌縣北今濬縣西南有古朝歌城竹書紀年晉定公二十八年按竹書紀年淇絶于舊衞乃敬王二十六年晉定公即位于敬王九年至二十六年乃十八年二字屬衍文淇絶于舊衞即此也淇水又東屈而西轉逕頓丘原本漏今濬縣有頓丘故城北故闞駰云頓丘在淇水南又屈逕頓丘西爾雅曰山一成謂之頓丘釋名謂一頓而成丘無高下大小之殺也按釋名云名一成曰頓丘一頓而成無上下大小之殺也詩所謂送子渉淇至于頓丘者也魏徙九原西河出軍諸胡置五軍於丘側故其名亦曰五軍也太和泉源水水有二源一水出朝歌城西北東南南下疑有闕文老人晨將渡水而沉吟難濟紂問其故左右曰老者髓不實故暑疑譌當作畏寒也紂乃於此腊脛而視髓也其水南流東屈逕朝歌城南晉書地道記曰本沬邑也詩云爰采唐矣沬之鄉矣殷王武丁始遷居之為殷都也胡渭云武丁當作武乙殷本紀曰武乙復去亳徙河北此即紂都朝歌也武丁自鄴南復遷于亳至武乙則又自亳遷于朝歌酈注引晉書地道記謂武丁遷居沬邑葢誤以武乙為武丁耳禹貢紂都在冀州大陸之野即此矣有糟丘酒池之事焉有新聲靡樂號邑朝歌晉灼曰史記樂書紂為朝歌之音朝歌者歌不時也故墨子聞之惡而迴車不逕其邑論撰考䜟曰邑名朝歌顔淵不舍七十弟子掩目宰予獨顧由蹷墮車宋均曰子路患宰予顧視㓙地故以足蹷之使墮車也今城内有殷鹿臺在濬縣西北六十里衞輝府琪縣亦有此臺紂昔自投於火處也竹書紀年曰武王親禽帝受于南單之臺遂分天之明南單之臺葢鹿臺之異名也武王以殷之遺民封紂子武庚於兹邑分其地為三曰邶鄘衞使管叔蔡叔霍叔輔之為三監叛周討平以封康叔為衞箕子佯狂自悲故琴操有箕子操逕其墟父母之邦也不勝悲作麥秀歌地居河淇之間戰國時皆屬於趙男女淫縱有紂之餘風後乃屬晉山嶮原本作王嶮朱本改作山嶮多冦漢以虞詡為令朋友以難治致弔詡曰不遇盤根錯節何以别利器乎又東與左水合謂之馬溝水水出朝歌城北東流南屈至其城東又東流與美溝合水出朝歌西北大嶺下更出逕駱駞谷於中逶迤九十曲故俗有美溝之目矣厯十二崿崿流相承泉響不斷返水捍注倦後疑譌未詳深隍隍間積石下原本作千吳本改作下通水穴為變宋本作萬變似是觀者若思上下疑有脫文譌字不周賞情之若疑作苦賞情亦疑誤之疑作乏圖狀矣其水更逕朝歌城北又東南流注馬溝水又東南注淇水為肥泉也故衞詩曰我思肥泉兹之永嘆毛注云同出異歸為肥泉爾雅曰歸異出同曰肥釋名曰本同出時所浸澗水所歸枝散而多似肥者也按釋名曰所出同所歸異曰淝泉本同出時所浸潤少所歸各枝散而多似淝者也據此則浸潤當作浸潤水當作少歸下漏各字犍為舍人曰水異出流行合同曰肥今是水異出同歸矣博物志謂之澳水詩云瞻彼淇澳菉竹猗猗毛云菉王蒭也竹編竹也毛傳注作篇竹爾雅作篇蓄漢武帝塞決河斬淇園之竹木以為用冦恂為河内守伐竹淇川治矢百餘萬以益軍資後漢書冦恂傳恂為河内太守伐淇園之竹為矢百餘萬養馬二千匹收租四百萬斛轉以給軍今通望淇川無復此物唯王蒭編草不異毛興宋本作毛注又言澳隈也鄭亦不以為津源而張司空專以為水流入於淇非所究也然斯水即詩所謂泉源之水也故衞詩云泉源在左淇水在右衞女思歸指以為喻淇水左右葢舉水所入為左右也淇水又南厯枋堰舊淇水南東流逕黎陽縣界今為濬縣其故城在縣西二里南入河地理志曰淇水出共漢志共縣屬河内郡東至黎陽入河溝洫志曰在遮害亭西一十八里至淇水口漢建安九年魏武王於水口下大枋木以成堰遏淇水東入白溝以通漕運故時人號其處為枋頭枋頭在濬縣西南八十五里淇水之北即淇水口魏志曹操于淇水口下大枋木以成堰遏淇水東入白溝以通漕運故名枋頭晉書桓温伐慕容暐暐將慕容垂拒温大破之遂至枋頭即此地也是以盧諶征艱賦曰後背洪枋巨堰深渠高堤者也自後遂廢魏熈平中復通之故渠厯楊城北東出今瀆破故堨其堰悉鐵柱木石參用其故瀆南逕枋城西又南分為二水一水南注清水水流上下更相通注河清水盛北入故渠自此始矣一水東流逕枋城南東與宛口合宛水上承淇水於元甫城西北自石堰東注宛城西屈逕其城南又東南流厯五軍東北得舊石沮故五水分流世號五穴口今惟通井宋本作并為二一水西注淇水謂之天井溝一水逕五軍東分為蓼溝東入白祀陂又南分東入同山陂溉田七十何氏云十疑作千餘頃二陂所結即臺隂野矣宛水東南入淇水淇水右合宿胥故瀆瀆受河於頓丘縣遮害亭東亭在濬縣西南五十里黎山西北會淇水處立石堰遏水令更東北注魏武開白溝因宿胥故瀆而加其功也故蘓代曰決宿胥之口魏無虛頓丘即指是瀆也淇水又東北流謂之白溝逕雍榆城南在濬縣西南一十八里春秋襄公二十三年叔孫豹救晉次于雍榆城者也淇水逕其城東東北逕同山東明一綂志同山在濬縣西南四十五里新志云其麓綿亘四十餘里有龍脊岡岡之西有山相輔而行西屬太行曰連西岡又北逕其城東東北逕帝嚳冢西世謂之頓丘臺非也皇覽曰帝嚳冢在東郡濮陽頓丘城南臺隂野中者也又北逕白祠山東厯廣陽里逕顓頊冢西俗謂之殷王陵非也二陵俱在滑縣東北七十里帝王世紀曰顓頊葬東郡頓丘城南廣陽里大冢者是也淇水又北逕頓丘縣故城西古文尚書以為觀地矣葢太康弟五君之號曰五觀者也朱箋引國語士亹曰啟有五觀湯有太甲韋昭注云五觀啓子太康昆弟也今山東東昌府觀城縣境有五觀城竹書紀年晉定公三十一年城頓丘皇覽曰頓丘者城門名頓丘道世謂之殷皆非也葢因丘而為名故曰頓丘矣淇水東北逕柱人山東楊慎曰柱人當作枉人見哀江南賦乃今本傳寫之譌元和志云枉人山在黎陽縣西北四十五里俗言紂殺比干于此故名寰宇記曰在縣西北十三里俗名上陽三山明一綂志云在濬縣西北二十五里去内黄縣西南六十里北連跨巨岡左右溪澗不啻數百又按蕩水篇注云宜師溝東逕蕩隂縣南又東逕枉人山東北至内黄澤右入蕩水湯隂縣志云枉人山在縣東南二十五里與濬縣接界是一山而跨三縣之境也牽城西在内黄縣西南一十二里春秋左傳定公十三年按春秋是十四年今云十三年誤公㑹齊侯衞侯于牽者也杜預曰黎陽東北有牽城即此城矣淇水又東北逕石柱岡枉人山北連跨巨岡石柱之類是也東北注矣又東過内黄縣今屬大名府南為白溝淇水又東北逕并陽城西世謂之辟陽城非也即郡國志所謂内黄縣有并陽聚者也白溝又北左合陽水又東北流逕内黄縣故城南縣右對黄澤郡國志曰縣有黄澤者地理風俗記曰陳留有外黄故加内史記曰趙亷頗伐魏取黄即此縣屈從縣東北與洹水合白溝自縣北逕戲陽城東世謂之義陽郭春秋昭公十年按左傳是昭公九年今云十年誤晉荀盈如齊逆女還卒戲陽是也杜預注魏郡内黄縣北有戲陽城戲音許宜反白溝又北逕高城亭東又洹水從西南來注之又北逕問亭東即魏界也應邵曰縣故城魏武侯之别都也城内有武侯臺王莽之魏城亭也左與新河合洹水枝流也白溝又東北逕銅馬城西葢光武征銅馬所築也故城得其名矣白溝又東北逕羅勒城東又東北漳水注之謂之利漕口自下清漳白溝淇河咸得通稱也又東北過館陶縣北又東北過清淵縣西清淵縣今為臨清州地白溝水又東北逕趙城西又北阿難河出焉葢魏將阿難所導以利衡瀆首疑譌有阿難之稱矣白溝又東北逕空陵城西又北逕喬亭城西東去館陶縣故城十五里縣即春秋所謂冠氏也魏陽平郡治也其水又屈逕其縣北又東北逕平恩縣故城東地理風俗記曰縣故館陶之别鄉也漢宣帝元康三年置以封后父許伯為侯國地理志王莽之延平縣矣淇水又東過清淵縣故城西又厯縣之西北為清淵故縣有清淵之名矣世謂之魚池城非也淇水又東北逕榆陽城北漢昭帝封太常江德為侯國按漢表無此封文頴曰邑在魏郡清淵世謂之清淵城非也又東北過廣宗縣今屬直𨽻順德府東為清河清河東北逕廣宗縣故城南順帝永元五年封皇太子萬年為王國按後漢書章帝八王傳廣宗殤王萬歲以永元五年封分鉅鹿為國其年薨今云萬年誤永元乃和帝年號今云順帝亦誤至云皇太子尤誤萬歲乃章帝㓜子母氏亦不可考故史傳不載豈有册立為儲君之事耶田融言趙立建興郡於城内置臨清縣於水東自趙石始也清河之右有李雲墓雲字行祖甘陵人好學善隂陽舉孝亷遷白馬令中常侍單超等立掖庭民女亳氏為后按後漢書桓帝鄧后紀后本鄧香女隨母改嫁梁紀遂日月姓梁氏進入掖庭為米女絶幸梁冀誅立為皇后帝惡梁氏改姓為薄則亳冝作薄但袁記亦作亳豈薄與亳古字相通耶后家封者四人賞賜巨萬雲上書移列三府曰孔子云帝者諦也今尺一拜用不逕御者是帝欲不諦乎帝怒下獄殺之後冀州刺史賈瑶使行部過祠雲墓刻石表之後漢書李雲傳雲字行祖甘陵人性好學善隂陽舉孝亷遷白馬令桓帝延熹二年誅大將軍梁冀而中常侍單超等五人皆以誅冀功並封列侯又立掖庭民女亳氏為皇后后家封者四人賞賜巨萬雲素剛憂國將危心不能忍乃露布上書移副三府曰孔子曰帝者諦也今尺一拜用不經御省是帝欲不諦乎帝怒下獄殺之後冀州刺史賈琮使行部過祠雲墓刻石表之云云今所引多譌字故偹錄之今石柱尚存俗猶為之李氏石柱清河又東北逕界城亭東水上有大梁謂之界城橋英雄記曰公孫瓚擊青州黄巾賊大破之還屯廣宗袁本初自徃征瓚合戰于界橋南二十里紹將鞠後漢書作趜義破瓚於界城橋斬瓚冀州刺史嚴綱又破瓚殿兵於橋上即此梁也世謂之鬲城橋葢傳呼失實矣清河又東北逕信鄉西地理風俗記曰甘陵西北十七里有信鄉故縣也今直𨽻廣平府清河縣西北有甘陵故城清河又北逕信城縣故城西應邵曰甘陵西北五十里有信城亭故縣也趙置水東縣於此城故亦曰水東城清河又東北逕清陽縣故城西在今清河縣東本漢縣屬清河郡後漢省入甘陵漢高帝置清河郡治此中元二年漢表作三年景帝封皇子乘為王國王莽之河平也漢光武建武二年西河鮮于冀為清河太守作公廨未就而亡後守趙高計功用二百萬五官黄秉功曹劉適言四百萬錢於是兾乃鬼見白日道從入府與高及秉等對共計校定為適秉所割匿兾乃書表自理其略言高貴不尚節畝壟之夫而箕踞遺類研密失機婢妾其性媚世求顯偷竊銀艾鄙辱天官易譏負乗誠高之謂臣不勝鬼言謹因千里驛聞待原本譌侍宋本作付高上之便西北去三十里車馬皆滅不見秉等皆伏地物故高以狀聞詔下還冀西河田宅妻子焉兼為差代以旌幽中之訟漢桓帝建和二年改清河為甘陵王國後漢書桓帝紀建和二年六月改清河為甘陵立安平王得子經侯理為甘陵王以下五字疑冇譌誤王妖言徙其年立甘陵郡治此焉又東北過東武城縣西東武故城在今山東青州府諸城縣境漢縣屬琅琊郡隋改曰諸城清河又東北逕陵鄉西應劭曰東武城西南七十里有陵鄉故縣也後漢封太僕梁松為侯國故世謂之梁侯城遂立侯城縣治也清河又東北逕東武城縣故城西史記趙公子勝號平原君以解邯鄲之功受封于此定襄有武城故加東矣清河又東北逕復陽縣故城西漢高帝七年封右司馬陳㫖為侯國漢表高帝七年封右司馬陳胥為復陽侯今云㫖誤王莽更名之曰樂歲地理風俗記曰東武城西北三十里有復陽亭故縣也世名之曰檻城非也清河水又東北流經棗强縣故城西今屬直𨽻正定府史記建元以來王子侯者年表云漢武帝元朔二年封廣川惠王子嬰為侯國也按史記表元朔三年封廣川惠王子晏為棗彊侯今云二年及王子嬰俱誤應劭地理風俗記曰東武城西北五十里有棗彊城故縣也疑當作棗彊縣故城也又北過廣川縣東今棗强縣東有廣川縣故城清水北逕廣川縣故城南闞駰曰縣有長河為流故曰廣川也水側有羗壘姚氏之故居也今廣川縣治清河又東北逕厯縣故城南地理志信都之屬縣也王莽更名曰厯寧也應劭曰廣川縣西北三十里有厯城亭故縣也今亭在縣東如疑譌或當作而此水濟尚謂之為厯口渡也今正定府寧晉縣東有厯城城下藪澤周囬百餘里有魚藕菱芡之利又東過修縣南又東北過東光縣西漢志修縣屬信都國師古曰修音條清河又東北左與張甲屯絳故瀆合阻深堤高鄣無復有水矣又逕修縣故城南屈逕其城東修音條王莽更名之曰治修按漢志莽曰修治郡國志曰故屬信都清河又東北左與黄漳板津宋本作枝津故瀆合又東北逕修國故城東漢文帝封周亞夫為侯國故世謂之北修城也清河又東北逕邸閣城東城臨側清河晉修縣治城内有縣長魯國孔明碑清河又東至東光縣西南逕胡蘓亭者是世謂之羌城非也又東北右會大河故瀆又逕東光縣故城西後漢封耿純為侯國初平二年黄巾三十萬人入北海據後漢書當作渤海公孫瓚破之於東光界追奔是水斬首三萬流血丹水即是水也後漢書公孫瓚傳初平二年青徐黄巾三十萬衆入渤海界瓚率步騎二萬人逆擊于東光南大破之斬首三萬餘級賊棄其輜重奔走渡河瓚因其半濟薄之賊復大破死者數萬流血丹水又東北過南皮縣西今屬直𨽻河間府清河又東北無棣溝出焉東逕南皮縣故城南南皮故城在今縣東北衞河在縣西二十里與交河縣分水通典云無棣溝隋末填癈永徽元年薛大鼎為刺史奏開之外引魚鹽于海百姓歌其利又東逕樂亭北地理志之臨樂縣故城也王莽更名樂亭晉書地道志太康地記樂陵國有新樂縣即此城矣又東逕新鄉城北即地理志高樂故城也王莽更之曰為鄉矣無棣溝又東分為二瀆無棣溝又東逕於樂陵郡北又東屈而北出又東轉逕宛鄉故城南又東南逕高成縣故城南與枝瀆合溝上承無棣溝南逕樂陵郡西又東南逕千童縣故城東史記建元以來王子侯者年表曰故重也一作千鍾漢武帝元朔四年封河間靖王子劉隂為侯國應邵曰漢靈帝改曰饒安也按史記建元以來王子侯表元朔四年封河間獻王子隂為千鍾侯徐廣曰一作重索隱曰漢表作重侯屬平原郡地理志有重丘據此則劉隂所封乃平原之重丘一作千鍾若勃海之千童應邵曰靈帝改曰饒安無一作千鍾之文亦非劉所封史表漢志可據酈元渾二為一似誤劉隂史表作劉揺一云劉隂漢表作擔滄州治枝瀆又南東屈東北注無棣溝無棣溝又東北逕一故城此疑作北世謂之功城也又東北逕鹽山東北入海春秋僖公齊楚之盟於邵陵也管仲曰昔召康公錫命先君太公履北至於無棣葢四履之所也京相璠曰舊說無棣在遼西孤竹縣二說參差未知所定然管仲以責楚無棣在此方之為近既世傳以文二字疑譌或當作已久且以聞見書之清河又東北逕南皮縣故城西十三州志曰章武有北皮亭故此曰南皮也王莽之逆河亭漢志作迎河亭史記惠景侯者年表云漢文帝後元年中封孝文后兄子竇彭祖為侯國漢建安中魏武擒袁譚於此城也清河又北逕皮城東左會潭地宋本作池别瀆謂之合故謂之合城也地理風俗記曰南皮城北五十里有北皮城也又東北逕浮陽縣西今為河間府滄州河東北浮水故瀆出焉明一綂志浮水在舊滄州南十里自東光縣南界永濟渠分出東北流經州境又東北入海漢于此置縣以在浮水之陽故名浮陽按史記趙之南界有浮水焉浮水在南而此有浮陽之稱者葢浮水出入津流同逆混并清漳二瀆河之舊道浮水故迹又自斯别是縣有浮水之名也首受清河於縣界東北逕高城縣之宛鄉城北又東逕章武縣之故城在今河間府塩山縣西北漢文帝後元中封孝文后弟竇廣國為侯國王莽更名桓章晉太始中立章武郡治此浮水故瀆又東逕篋山北魏氏土地記曰高城東北五十里有篋山長七里浮瀆又東北逕栁縣故城南在今鹽山縣東七十里漢武帝元朔四年封齊孝王子劉傷為侯國按史表元朔四年封齊孝王子劉陽為栁侯漢表作陽已今云劉傷誤地理風俗記曰高城縣東北五十里有栁亭故縣也世謂之辟亭非也浮瀆又東北逕漢武帝望海臺又東注于海應劭曰浮縣浮水所出入海朝夕徃來日再今溝無復有水也清河又北分為二瀆枝分東出又謂之浮瀆清河又北逕浮陽故城西王莽之㳅漢志作浮成也建武十五年更封騎將軍平鄉侯劉歆為侯國浮陽郡治又東北當作滹沲别瀆注焉謂之合河也又東北過濊邑北濊水出焉在河間府青縣又東北過鄉邑南清河又東分為二水枝津右出焉東逕漢武帝故臺北漢武臺在今鹽山縣魏氏土地記曰章武縣東一百里有武帝臺南北有二臺相去六十里基高六十丈俗云漢武帝東巡海上所築又東注于海清河又東北逕紵姑邑南俗謂之新城非也又東北逕窮河邑南清河又東北逕窮河邑南俗謂之三女城非也東北至泉周縣北入滹沲水經曰疑作白笥疑作溝泉周縣東南與清河合者目下為清河下邑也又東泉周縣出焉又東北過漂榆邑入于海清河又東逕漂榆邑故城南俗謂之角飛城趙記云石勒使王述煑鹽於角飛即城異名矣魏土地記曰高城縣東北一百里北盡漂榆東臨巨海民咸煑海水藉鹽為業即此城也清河自是入于海蕩水出河内蕩隂縣西山東蕩隂縣今屬河南彰徳府今曰湯隂蕩水出縣西石尚山蕩水源出湯隂縣治因元泉流經五十里過内黄縣界入衞河泉流逕其縣故城南縣因水以取名也晉伐成都王頴敗帝于是水之南晉書惠帝永興初左衞將軍陳昣等奉大駕討頴馳檄四方赴者雲集軍次安陽衆十餘萬頴遣奮武將軍右超率衆五萬次于蕩隂超衆奄出王師敗績矢及乗輿侍中嵇紹死于帝側盧林四王起事曰惠帝征成都王頴戰敗時舉輦司馬八人輦猶在肩上軍人競就殺舉輦者乗輿頓地帝傷三矢百僚奔散唯侍中嵇紹扶帝疑脫軍字士將兵之帝曰吾吏也勿害之衆曰受太弟命唯不犯陛下一人耳遂斬之血汙帝袂將洗之帝曰嵇侍中血勿洗也此則嵇延祖殞命之所又東北至内黄縣屬大名府入于黄澤羑水出蕩隂西北羑水源出湯隂縣西北鶴山流至羑城東會防水入蕩水韓大牛泉地理志曰縣之西山羑水所出也卷水又東逕韓附壁北又東流逕羑城此疑作北故羑里也在湯隂縣北九里一名牖城又名防城史記音義曰牖里在蕩隂縣廣雅稱獄犴也夏曰夏臺殷曰羑里周曰囹圄皆圜土昔殷紂納崇侯虎之言囚西伯於此散宜生南宫括見文王乃演易用明否泰始終之義焉羑城北水積成淵方一十餘歩深一丈餘東至内黄與防水㑹防水在彰德府安陽縣西南二十里水出西山馬頭澗東逕防城北盧諶征艱賦所謂越防者也其水東南流注于羑水又東厯黄澤入蕩水地理志曰羑水至内黄入蕩者也蕩水又東與長沙溝水合其水導源里山北谷東流逕晉鄙故壘北謂之晉鄙城名之為魏將城昔魏公子無忌矯奪晉鄙軍於是處故班叔皮遊居賦曰過蕩隂而弔晉鄙責公子之不臣者也淇水又東謂之宜師溝又東逕蕩隂原本漏縣南又東逕枉人山東北至内黄澤右入蕩水亦謂之黄雀溝是水秋夏則泛春冬則耗水又逕内黄城南陳留有外黄故稱内也東注白溝洹水出上黨沍氏縣漢志上黨郡有泫氏縣沍字誤當作泫今為山西澤州陵川縣按明一綂志安陽河一名洹水源自故洹縣東至林安陽二縣屢伏屢見東入衞河水出洹山山在長子縣也今屬山西潞安府東過隆慮縣北今為河南彰德府林縣縣北有隆慮山在林縣西北二十五里南負太行北接恒嶽景最竒絶昔帛仲理之所遊神也縣因山以取名漢高帝六年封周竈為侯國應邵曰殤帝曰隆故改從林也縣有黄水出于神囷之山黄華谷地宋本作北崖山高十七里明一綂志黄華山在林縣西二十里一名林慮山下有黄華谷北巖出瀑布水出木門帶帶即山之第三級也去地七里懸水東南注壑直㵼巖下狀若雞翹史游急就章曰春草雞翹鳬翁濯顔師古曰雞翹雞尾之曲垂也故謂之雞翹洪葢亦天台赤城流也其水東流至谷口潛入地下東北一十里復出名栁渚渚周四五里是黄水重源冄發也東流葦泉水注之葦泉在林縣西北林慮山泉傍多葦故名出林慮川北澤中東南流與雙泉合水宋本水下有出字魯般門東下流入葦泉水葦泉水又東南流注黄水謂之陵陽水又東入於洹水也又東北出山逕鄴縣南古鄴城在今彰德府臨漳縣西二十里本戰國魏之鄴邑曹魏後魏前燕東魏皆都於此洹水出山連逕殷墟北竹書紀年曰盤庚即位自奄遷于此遂曰殷竹書紀年曰盤庚十四年自庵遷于北蒙曰殷則此遂二字恐當作北䝉昔者項羽與章邯盟於此地矣洹水又東枝津出焉東北流逕鄴城南謂之新河又東分為二水北水逕東明觀下昔慕容儁夢石虎齧其臂寤而惡之購求其尸而莫知之後宫嬖妾言虎葬東明觀下於是掘焉下度三泉得其棺剖棺得尸尸僵不腐儁罵之曰死胡安敢夢生天子也使御史中尉陽約數其罪而鞭之此葢虎始葬處也又北逕建春門石梁不高大治石工密舊橋首夾建兩石柱螭短疑有譌字一作矩趺勒甚佳乗輿南幸以其作制華妙致之平城東側西屈宋本作闕北對射堂宋本作渌水平潭碧林浦側可遊意矣其水際其西逕魏武𤣥武故苑苑舊有𤣥武池以肄舟楫有魚梁釣臺竹木灌叢今池林絶滅略無遺跡矣其水西流注于漳南水又東北逕女亭城北又東北逕高陵城南東合坰溝又東逕鸕鷀陂北與台陂水合陂東西三十里南北注白溝河溝上承洹水北絶新河北逕高陵城東又北逕斥丘縣故城西今為直𨽻廣平府成安縣其故城在縣西縣南角有斥丘葢因丘以氏縣故乾侯矣春秋經書昭公二十八年公如晉次于乾侯也漢高帝六年封唐廣為侯國按史表作唐厲此云唐廣誤王莽之利丘矣又屈逕其北城東北流注于白溝洹水自鄴東逕安陽縣故城原本漏今彰德府治北徐廣晉紀曰石遵自孚城北入軒疑譌當是斬張豹於安陽是也魏土地記曰鄴城南四十里有安陽城城北有洹水東流者也洹水又東至長樂縣左側則溝出焉洹水又東逕長樂縣故城南按晉書地理志曰魏郡有長樂縣也又東過内黄縣北東入于白溝洹水逕内黄縣北東流注于白溝世謂之洹水也許慎說文吕忱字林並云洹水出晉魯之間昔聲伯夢涉洹水或與其瓊漿而食之泣而又與瓊瓌盈其懷矣從而歌曰濟洹之水贈我以瓊瑰歸乎歸乎瓊瑰盈吾懷乎後言之暮而卒即是水也水經注集釋訂訛卷九
