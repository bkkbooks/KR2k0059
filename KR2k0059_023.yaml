body:
  text: 水經注集釋訂訛卷二十三歸安沈炳巽撰陰溝水汳水獲水陰溝水出河南陽武縣今屬開封府蒗蕩渠陰溝首出于大河卷縣故瀆東南逕卷縣故城南又東逕蒙城北史記秦莊襄王元年䝉驁擊取成臯滎陽初置三州郡疑即驁所築也于是宋本作事未詳故瀆東分為二世謂之陰溝京相璠以為出河之濟又非所究俱東絶濟隊右溝東西逕陽池城北東南絶長城逕安亭北又東北㑹左瀆左瀆又東絶長城逕垣雍城南昔晉文公戰勝于楚周襄王勞之于此故春秋書甲午至于衡雍作王宫于踐土吕氏春秋曰尊天子于衡雍者也郡國志曰卷縣有垣雍城即史記所記韓獻秦桓公按史記秦本紀昭襄王四十八年韓獻垣雍注引郡國志曰河南卷縣有垣雍城此云桓公誤是也又東逕開光亭南又東逕清陽亭南又東合右瀆又東南逕封丘縣絶濟瀆東南至大梁合蒗蕩渠梁溝既開蒗蕩渠故瀆實兼陰溝浚儀之稱故云出武陽逕大梁城北左屈溝與梁合俱東南流同受鴻溝也故目宋本作同受鴻溝沙水之目其川流之㑹左瀆東導者即汳水也盖津源之變名矣故經云陰溝出蒗蕩者也東南至沛為濄水陰溝始亂蒗蕩終别於沙而濄水出焉濄水受沙水於扶溝縣爾雅曰濄為洵郭景純曰大水溢出别為小水也吕忱曰洵濄水也濄水逕大扶城西城之東北悉諸袁舊墓碑字傾低羊虎碎折唯司徒滂蜀郡大守騰博平令光碑字所存唯此自餘殆不可尋濄水又東南逕陽夏縣西今為開封府太康縣又東逕邈城北城實中而西有璅郭濄水又東逕大棘城南在今寧陵縣西南七十里故鄢之大棘鄉也春秋宣公二年宋華元與鄭公子歸生戰于大棘獲華元左傳曰華元殺羊食士其御羊斟不與及戰曰疇昔之羊子為政今日之事我為政遂御入鄭故見獲焉後其地為楚莊所并故圈稱曰大棘也地有楚太子建之墳及伍員釣臺池沼具存濄水又東逕安平縣故城北陳留風俗傳曰大棘鄉故安平縣也士人憝惷易以統御濄水又東逕鹿邑城北世謂之虎鄉城非也春秋之鹿鳴矣杜預曰陳國武平西南有鹿邑亭是也城南十里有晉中散大夫胡均碑元康八年立濄水之北有漢温令許續碑續字嗣公陳國人也舉賢良拜議郎遷温令延熹中立濄水又東逕武平縣故城城之西南七里許有漢尚書令虞詡碑碑題云虞君之碑諱詡字定安虞仲後為朝歌令武都大守文字多缺不可復尋按范曄漢書詡字升卿陳國武平人祖為縣獄吏治存寛恕嘗曰于公為里門子為丞相吾雖不及于公子孫亦不失為九卿故字詡曰升卿定安盖其幼字也魏武王初封於此終以武平華夏矣魏志建安元年車駕自洛陽出轘轅而東以大祖為大將軍封武平侯自天子西遷朝廷日亂至是宗廟社稷制度始立濄水又東逕廣鄉城北圈稱曰襄邑有蛇丘亭故鄉矣改曰廣世後漢順帝陽嘉四年封侍中摯原本訛縶填為侯國即廣鄉也濄水又東逕苦縣西南分為二水枝流注于東北賴城入谷謂死濄也濄水又南東屈逕苦縣故城南郡國志曰春秋之相也王莽更名之曰賴陵矣城之四門列築馳道東起賴鄉南自南門越水直指故臺西面南門列道徑趣廣鄉道西門馳道西屆武平北門馳道暨于北臺濄水又東而北屈至賴鄉谷水注之谷水首受渙水於襄邑縣今為歸徳府睢州東東逕承匡城東春秋經書夏叔仲彭生㑹晉郄缺于承匡左傳曰謀諸侯之從楚也京相璠曰今陳留襄邑西三十里有故承匡城谷水又東南逕已吾縣故城西在今寧陵縣西南三十里陳留風俗傳曰縣故宋也雜以陳楚之地故梁國寧陵縣之徙種龍鄉也以成哀之世户至八九千冠帶之徒求置縣矣永元十一年陳王削地後漢書明帝八王傳陳王鈞坐殺人事削西華項新陽三縣以大棘鄉直陽鄉十二年自隠隸之命以嘉名曰已吾猶有陳楚之俗焉谷水又東逕柘縣故城今歸徳府柘城縣東地理志淮陽之屬縣也城内有柘令許君清徳頌石碎字紊唯此文現碑城西南里許有漢陽種令許叔臺碑光和中立又有漢故樂成令太尉掾許嬰碑嬰字虞卿司隸校尉之子建寧六年黄本大建寧年固誤朱本改建寧六年亦誤建寜止四年無六年當從隸釋作元年為是立餘碑文字碎滅不復可觀當似司隸諸碑也谷水又東逕苦縣故城中水泛則四周隍壍耗則孤津獨逝谷水又東逕賴城鄉南其城實中東北隅有臺偏髙俗以是臺在谷水北原本漏其城又謂之谷陽臺非也谷水自此東入濄水濄水又北逕老子廟東廟前有二碑在南門外漢桓帝尼宫當從宋本作桓帝遣宦官管霸祠老子命陳相邊韶作碑北有雙石闕甚整頓石闕南側魏文帝黄初三年逕譙所勒闕北東側有孔子廟廟前有一碑西面是陳相魯國孔疇建和三年立北則老君廟廟東院中有九井焉又北濄水之側又有李老母前廟疑當作李老君母廟廟在老子廟北廟前有李母冢冢東有碑是永興元年譙令長沙王阜所立碑云老子生於曲濄間許慎又云濄水首受淮陽扶溝縣蒗蕩渠不得至沛方為濄水也濄水又屈東逕相縣故城南其城卑小實中邊韶老子碑又云老子楚相縣人也相縣虛荒今屬苦故城猶存在賴㳺卿之東濄水處其陽然疑作疑即此城也自是無郭以應之濄水又東逕譙縣故城北春秋左傳僖公二十二年楚成得臣帥師伐陳遂取譙城頓而還是也左傳僖二十三年楚成得臣帥師伐陳遂取焦夷城頓而還注云焦今譙縣也夷一名城父今譙郡城父縣二地皆陳邑頓國今汝陰南頓縣王莽之延成亭也魏立譙郡沇州治沙水自南枝分北逕譙城西而北注濄濄水四周城側城南有曹嵩冢冢北有碑碑北有廟堂餘基尚存柱礎仍在廟北有二石闕雙峙髙一丈六尺榱櫨及柱皆雕鏤雲炬上罘罳已碎闕北有圭碑題云漢故中常侍長樂太僕特進費亭侯曹君之碑延熹三年立碑陰又刋何氏校改詔石策二碑文同夾碑東西列對兩石馬髙八尺五寸石作粗拙不匹光武隧道所表象馬也有騰兄冢有上疑有脫文冢東有碑題云漢故潁川太守曹君墓延熹九年卒而不刋樹碑歳月墳北有其元子熾冢冢北有碑題云漢故長水校尉曹君之碑歴大中大夫司馬長史引侍中遷長水年三十九卒熹平六年造熾弟𦙍冢冢東有碑題云漢謁者曹君之碑熹平六年立城東有曹太祖舊宅所在負郭對㕓側隍臨水魏書曰太祖作議郎告疾歸鄉里築室城外習讀書傳按魏書曰春夏習讀書傳秋冬弋獵以自娯樂此漏春夏二字秋冬射獵以自娯樂文帝以漢中平四年生於此上有青雲如車盖終日乃解即是處也後文帝以延康元年幸譙大饗父老立壇於故宅壇前樹碑碑題云大饗之碑碑之東北濄水南有譙定王司馬士㑹冢冢前有碑晉永嘉三年立碑南二百許步有兩石柱髙丈餘半下為束竹交文作制乃士疑訛當作制作工巧石牓云晉故使持節散騎常侍都督楊州江州諸軍事安東大將軍譙定王河内温公司馬墓之神道朱云當作河内温司馬公墓晉書譙剛王遜字子悌宣王弟魏中郎將進之子也封涇陽男武帝受禪封譙王子隨嗣隨薨諡定王濄水又東逕朱龜墓北東南流逕冢南冢南枕道有碑碑題云漢故幽州刺史朱君之碑龜字伯靈光和六年卒官故吏别駕從事史右北平無終年化上下疑有訛字朱云當作牟化即造碑故吏姓名也中平二年造碑陰刋故吏姓名悉薊涿及上谷北平等人濄水東南逕層丘北丘阜獨秀巍然介立故壁壘所在也濄水又東南逕城父縣故城沙水枝分注之水上承沙水於思善縣世謂之漳水故有漳頭之名也東北流逕城父故城西側城東北流入于濄濄水又東逕下城父北郡國志曰山桑縣有下父聚者也按郡國志曰山桑縣有下城父聚有垂惠聚濄水又屈逕其聚東郎山西又東南屈逕郎山南山東有垂惠聚世謂之禮城袁崧郡國志曰山桑縣有垂惠聚即此城也濄水又東南逕濄陽城北側臨濄水魏太和中為州治以盖表為刺史後罷州立郡按後魏地形志景明中置濄陽郡孝昌中陷武定七年復置州治濄陽城據此則置郡在前置州在後而此則云先置州後罷州立郡似與魏志不符矜帶遏疑作邊戍濄水又東南逕龍亢縣故城南漢建武十三年世祖封傅昌為侯國按後漢書傅俊傳俊于建武二年封昆陽侯七年卒子昌嗣徙封蕪湖侯從無龍亢之封此不知何據故語曰沛國龍亢至山桑者也濄水又屈而南流出石梁梁石崩褫浹岸積石髙二丈水歴其間又東南流逕荆山而東流注也又東南至下邳淮陵縣入于淮下邳今為淮安府邳州濄水又東左合北肥水肥水出山桑縣西北澤藪東南流左右翼佩數源異出同歸盖㣲脉涓注耳東南流逕山桑邑南俗謂之北平城昔文欽之封山桑侯疑食邑於此城東南有一碑碑文悉破無驗唯碑背故吏姓名尚存熹平元年義北何氏校改義士門生沛國蕭縣劉定興立北肥水又東逕山桑縣故城南俗謂之都亭城非也今城内東側猶有山亭桀立陵阜髙峻非洪臺所擬十三州志所謂山生於邑其亭有桑因以氏縣者也郭城東有文穆碑塚三世二千石穆郡户曹史徵試博士太常丞以明氣候擢拜侍中右中郎將遷九江彭城陳留四部何氏校改郡光和中卒故吏涿郡太守彭城吕䖍等立北肥水又東積而為陂謂之瑕陂陂水又東南逕瑕城南春秋左傳成公十六年楚師還及瑕即此城也故京相璠曰瑕楚地北肥水又東南逕向縣故城南地理志曰故向國也世本曰許州向中中疑訛當作甲姜姓也炎帝後京相璠曰向沛國縣今并屬譙國龍亢也杜預曰龍亢縣東有向城漢世祖建武十三年更封富波侯王霸為侯國即此城也俗謂之圓城非也又東南逕義城南世謂之楮城非也又東入于濄濄水又東注淮經言下邳淮陵入淮誤矣汳水出陰溝逕浚儀縣北陰溝即蒗蕩渠也亦言汳受旃然水又云丹泌亂流於武徳絶河南入滎陽合汳故汳兼丹水之稱河沛何氏校作泲水新宋本作斷汳承旃然而東自王實灌大梁王實當作王賁史記秦始皇二十二年王賁攻魏引河溝灌大梁大梁城壞其王請降水出縣南而不逕其北夏水洪泛則是瀆津通故渠即陰溝也于大梁北又曰浚水矣故圈稱著陳留風俗傳曰浚水逕其北者也又東汳水出焉故經云汳出陰溝於浚儀縣北也汳水東逕倉垣城南即大梁縣之倉垣亭也城臨汳水陳留相畢邈治此征東將軍茍晞之西也邈走歸京晞使司馬東萊王讚代據倉垣斷留漕運晉書茍晞傳晞字道將河内山陽人行兗州刺史破汳桑敗石勒威名甚盛時人擬之韓白進位征東將軍開府儀同三司加侍中假節鉞晞以京邑荒饉㓂難交至表請遷都俄而京師陷晞與征虜將軍王讚屯倉垣汳水又東逕陳留縣之鉼鄉亭北陳留風俗傳所謂縣有鉼鄉亭即斯亭也汳水又逕小黄縣故城南在今開封府城東北神仙傳稱靈夀光扶風人死于江陵胡罔家罔殯埋之後百餘日人有見光于此縣寄書於罔罔發視之唯有履存汳水又東逕鳴鴈亭南春秋左傳成公十六年衛侯伐鄭至于鳴鴈者也杜預釋地云在雍丘縣今為杞縣故城北逕陽樂城南西征記曰城在汳北一里周五里雍丘縣界汳水又東有故渠出焉南通睢水謂之董生決或言董氏作亂引水南通睢水故斯水受名焉今無水汳水又東枝津出焉俗名之為洛架口西征記曰洛架水名也續述征記曰在董生決下二里汳水又逕外黄縣南外黄故城在今杞縣東北又東逕莠倉城北續述征記曰莠倉城去大㳺墓二十里又東逕大齊城南陳留風俗傳曰外黄縣有大齊亭又東逕科城北陳留風俗傳曰縣有科稟亭是則科稟亭也汳水又東逕小齊城南汳水又南逕利望亭南風俗傳曰故曰衍成安也地理志曰陳留舊名漢武帝以封韓延年為侯國汳水又東龍門故瀆出焉瀆舊通睢水故西征記曰龍門水名也門北有土臺髙三丈餘上方數十步汳水又東逕濟陽考城縣今屬歸徳府故城南為菑獲渠考城縣周之采邑也於春秋為戴國矣左傳莊公十年秋宋衛蔡伐戴是也漢髙帝十一年秋封彭祖為侯國史記髙祖功臣表十一年三月封彭祖為戴侯索隠曰戴地名音再應劭曰章帝改曰考城在故甾縣陳留風俗傳曰秦之穀縣也後遭漢兵起邑多災年故改曰甾縣王莽更名嘉穀章帝東廵過縣詔曰陳甾縣其名不善髙祖鄙柏人之邑世宗休聞喜而顯獲嘉應亨吉疑漏之字元符嘉皇靈之顧賜越有光列考武王其改甾縣曰考城是瀆盖因縣以得名矣汳水又東逕寧陵縣今屬歸徳府之沙陽亭北故沙隨國矣春秋左傳成公十六年秋㑹于沙隨謀伐鄭也杜預釋地曰在梁國寧陵縣北沙陽亭是也世以為堂城非也汳水又東逕黄蒿塢北續述征記曰堂城至黄蒿二十里汳水又東逕斜城下續述征記曰黄蒿到斜城五里陳留風俗傳曰考城縣有斜亭汳水東逕周塢側續述征記曰斜城東三里晉義熙中劉公遣周超之自彭城縁泛宋本作汳故溝斬樹穿道七百餘里以開水路停薄于此故兹塢流稱矣汳水又東逕葛城北在今寧陵縣北一百里故葛伯之國也孟子曰葛伯不祀湯問曰何為不祀稱無以供祭祠遺葛伯葛伯又不祀湯又問之曰無以供犧牲湯又遺之又不祀湯又問之曰無以供粢盛湯使亳衆往為之耕老弱饋食葛伯又率民奪之不授者則殺之湯乃伐葛葛于六國屬魏魏襄王以封公子無咎號信陵君按史記信陵君列傳魏公子無忌者魏昭王少子而魏安釐王異母弟也昭王薨安釐王即位封公子為信陵君今云魏襄王以封公子無咎號信陵君似誤又按魏世家襄王立十六年卒子哀王在位二十三年卒子昭王嗣位十九年卒而後安釐立其距襄王已四十餘年矣其地葛鄉即是城也在寧陵縣四千里當作在寧陵縣西十里郡國志云寧陵縣故屬陳留有葛鄉故葛伯國也汳水又東逕神坈塢又東逕夏侯長塢續述征記曰夏侯塢至周塢各相距五里汳水又東逕梁國雎陽縣故城北而東歴襄鄉塢南續述征記曰西去夏侯塢二十里東一里即襄鄉浮圖也汳水逕其南漢熹平君所立按熹平是漢靈帝年號此當云熹平某年某君所立死因葬之方順今但云熹平君所立似有訛脫死因葬之刻石樹碑以旌厥徳隧前有師子天鹿累塼原本訛博作百達柱八所荒蕪頽毁彫落畧盡矣又東至梁郡蒙縣為濉水餘波南入淮陽何氏校改睢陽城中汳水又東逕貫城南俗謂之薄城非也闞駰十三州志以為貫城也在蒙縣西北春秋僖公二年齊侯宋公江黄按春秋當作江人黄人盟于貫杜預以為貫當作貰杜預曰貫與貰字相似音市夜反又音世也云貫貰字相似貫在齊謂貫澤也是以非此也今於此地更無他城在䝉西北唯是邑耳考文凖地貫邑明矣非亳可知汳水又東逕違縣故城北俗謂之小蒙城也西征記城在汳水南十五六里即莊周之本邑也為蒙之漆園吏郭景純所謂漆園有傲吏者也悼惠施之沒杜門于此邑矣荘子云莊子送葬過惠子之墓謂從者曰自夫子之死也吾無以為質矣吾無與言之矣汳水自縣南出今無復有水唯睢陽城南側有小水南流入于睢城南二里有漢太傅掾橋載墓碑載字元賓梁國睢陽人也睢陽公子熹平五年立城東百步有石室刋石宋本作云漢鴻臚橋仁祠城北五里有石虎石柱而無碑誌不知建也宋本作不知何時建也汳水又東逕大䝉城北自古不聞有二蒙疑即䝉亳也所謂景薄為此宋本作此亳矣椒舉云商湯有景亳之命者也闞駰曰湯都也亳本帝嚳之墟在禹貢豫州河洛之間今河南偃師城西二十里尸鄉亭是也皇甫謐以為考之事實學者失之如孟子之言湯居亳與葛為鄰是即亳與葛比也湯地七十里葛又伯耳封域有限而寧陵郡國志云寧陵故葛伯國今屬歸徳府去偃師八百里不得童子饋餉而為之耕今梁國自有二亳南亳在穀熟北亳在蒙非偃師也古文仲虺之誥曰葛伯仇餉征自葛始即孟子之言是也崔駰曰湯冢在濟隂薄縣北皇覽曰薄城北郭東三里平地有湯冢冢四方方各十步髙七尺上平也漢哀帝建平元年大司空史卻長卿按行水災因行湯冢在漢屬扶風今徵之迴渠亭有湯地宋本作池徵陌是也然不經見難得而詳按秦寧公本紀云二年伐湯三年與亳戰亳王奔戎遂滅湯史記秦本紀寧公二年遣兵伐蕩社徐廣曰蕩音湯社一作杜索隠曰西戎之君號曰亳王盖成湯之𦙍其邑曰蕩社徐廣曰一作湯杜言湯邑在杜縣之界故曰湯杜也皇甫謐曰亳王號湯西夷之國也然則周穆衍桓王時自有亳王號湯為秦所滅乃西戎之國葬於徵者也非殷湯矣劉向言殷湯無葬處為疑杜預曰梁國䝉縣北有薄伐城城中有成湯冢其西有箕子冢今城内有故冢方墳疑即杜元凱之所謂湯冢者也而世謂之王子喬冢冢側有碑題云仙人王子喬碑曰王子喬者盖上世之真人聞其仙不知興何代也博問道家或言潁川或言產䝉初建此城則有斯丘傳承先民四字疑有訛脫曰王氏墓上下疑有訛脫暨于永和之元年冬十二月當臘之時夜上有哭聲其音甚哀附居者王伯怪之明則祭而察焉時天鴻雪下無人徑有大鳥跡在祭祀處左右咸以為神其後有人著大冠絳單衣杖竹立冢前呼採薪孺子伊永昌曰我王子喬也勿得取吾墳上樹也忽然不見時令太山當作太山令萬喜朱云當作熙稽故老之言感精瑞之應乃造靈廟以休厥神於是好道之儔自逺方集或絃琴以歌太一或譚思以歴丹田知至徳之宅兆實真人之祖先延熹八年秋八月皇帝遣使者奉犧牲致禮祠濯之敬一作祇懼之敬肅如也國相東萊王璋字伯義以為神聖所興必有銘表乃與長史邊乾遂樹之𤣥石紀頌遺烈觀其碑文意似非逺既有經見不能不書存朱本下有焉字何校改耳字獲水出汳水於梁郡蒙縣北漢書地理志曰獲水也十三州志曰首受甾獲渠亦兼丹水之稱也竹書紀年曰宋殺其大夫皇緩竹書紀年作瑗于丹水之上又曰宋大夫按今竹書無又曰宋大夫五字恐屬衍文丹水壅不流盖汳水之變名也獲水自蒙東山水南有漢故繹幕令匡碑匡字公輔魯府君之少子也碑字碎落不可尋識竟不知所立歳月也獲水又東逕長樂固北已氏縣南東南流逕于蒙澤十三州志曰蒙澤在縣東春秋莊公十二年宋萬與公爭博殺閔公於斯澤矣史記宋㣲子世家湣公十年宋伐魯戰于乗丘魯虜宋南宫萬宋人請萬萬歸宋十一年秋湣公與南宫萬獵因博爭行湣公怒辱之曰始吾敬若今若魯虜也萬有力病此言遂以局殺湣公于䝉澤汳水又東逕虞縣今歸徳府虞城縣故城北古虞國也昔夏少康逃奔有虞為之庖正虞思于是妻之以二姚者也王莽之陳定亭也城東有漢司徒公盛允墓碑何氏云王代姓氏急就篇有盛兊疑即此人公字伯世梁國虞人也其先奭氏至漢中葉避孝元皇帝諱改姓曰盛世濟其美以迄于公察孝㢘除郎累遷司空司徒延熹中立墓中有石廟廟宇原本訛字傾頽基構可原本訛有尋獲水又東南逕空桐澤北澤在虞城東南春秋哀公二十六年冬公宋景公也逰于空澤辛巳卒于連中杜預曰空澤宋邑連中館名大尹左師興空澤之士壬申按黄本作壬申固誤呉本改作壬午亦誤左傳哀公二十六年宋景公遁于空澤辛巳卒于連中大尹興空澤之士壬申奉公自空桐入如沃宫社預注曰空澤宋邑連中館名千甲甲士千人今訛千甲為壬申非是朱箋已明奉公自空桐入如沃宫者矣獲水又逕龍譙國又東合黄水口上承黄陂下注獲水獲水又東入櫟林世謂之九里祚祚宋本作柞陸機詩疏云秦人謂柞為櫟河内人謂木蓼為櫟獲水又東南逕下邑縣故城北楚考烈王滅魯頃公亡遷下邑又楚漢彭城之戰吕后弟周軍於下邑今歸徳府夏邑縣髙祖敗還從周軍子房肇捐地之策收垓下之師史記髙祖本紀漢二年漢王入彭城項羽引兵出胡陵與漢大戰大破漢軍時吕后兄周吕侯為漢將兵居下邑漢王從之稍收士卒又張良傳曰漢王兵敗而還至下邑漢王下馬據鞍而問曰吾欲捐關已東等棄誰可與共功者良曰九江王布楚梟將與項王有隙彭越與齊王田榮反梁地此兩人可急使而漢王之將獨韓信可屬大事當一面即欲捐之捐之此三人可破也髙紀又云漢四年漢王追項羽至陽夏與信越期㑹擊楚至固陵不㑹楚擊漢軍大破之問張良計于是信越皆往五年髙祖與諸侯兵共擊楚軍與項羽決勝垓下大敗楚軍追殺項羽于東城陸機所謂即謀下邑者也王莽更名下治按漢志當作下洽矣獲水又東逕碭縣今為徐州府碭山縣故城北應劭曰縣有碭山山在東出文石秦立碭郡盖取山之名也王莽之節碭縣也山有梁孝王墓其冢斬山作郭穿石為藏行一里到藏中有數尺水水有大鯉魚黎民謂藏有神不敢犯之凡到藏皆潔齋而進不齋者至藏輒有獸噬其足獸難得見見者云佀狗所未詳也山上有梁孝王祠獲水又東穀水注之上承陽陂陂中有香城城在泗水之中承諸陂散流謂零水瀤水清水也積而成潭謂之碭水趙人有琴髙者以善鼓琴為康王舍人行彭涓之術浮逰碭郡間二百餘年後入碭水中取龍子與弟子期曰皆潔齋待於水傍設屋祠果乗赤鯉魚出入坐祠中碭中有千萬人觀之留月餘復入水也陂水東注謂之穀水東逕安山北即碭北山也山有陳勝墓秦亂首兵伐秦弗終厥謀死葬於碭諡曰隠王也穀水又東北注于獲水獲水又東歴藍田鄉郭又東逕梁國杼秋縣故城南王莽之子按漢志當作予秋也獲水又東歴洪溝東注之水南北各一溝溝首獲世謂之洪溝非也春秋昭公八年秋蒐于紅杜預曰沛國蕭縣西有紅亭即地理志之虹縣髙后三年封楚王元子富為侯國漢書王子侯表孝景元年封楚元王子富為休侯三年以兄子戊反免後更封紅侯此云髙后三年封誤王莽之所謂貢矣盖溝名是同非楚漢所分也又東過蕭縣南今徐州府治獲水北流注之蕭縣南對山世謂之蕭城南山也戴延之謂之同孝山云取漢陽城侯劉徳所居里名目山也劉澄之云縣南有冒山未詳孰是也山有箕谷谷水北流注獲世謂之西流水言水上承梧桐陂陂水西流因以為名也余嘗逕蕭邑城右唯是水北注獲水更無别水疑即經所謂睢水也城東西及南三面側臨獲水故沛郡治縣亦同居矣城南舊有石橋處耗二字疑衍積石為梁髙二丈今荒毁殆盡亦不具誰所造也縣本蕭叔國宋附庸楚滅之春秋宣公十二年楚伐蕭蕭潰申公巫臣曰師人多寒王廵三軍拊而勉之三軍之士皆同挾纊盖恩使之然矣蕭女聘齊為頃公之母卻克所謂蕭同叔子也獲水又東歴龍城不知誰所創築也獲水又東逕同孝山北山陰有楚元王冢上圓下方累石為之髙十餘丈廣百許步經十餘墳悉結石也獲水又東淨淨溝水宋本作淨溝下同注之水上承梧桐陂西北流即劉中書澄之所謂白溝水也朱本云當作白瀆又北入于獲俗名之曰淨浄溝也又東至彭城縣北今徐州府東入于泗獲水自淨淨溝東逕阿育王寺北或言楚王英所造非所詳也盖遵育王之遺法因以名焉與安陂水合水上承安陂餘波北逕阿育王寺側水上有梁謂之𤣥注橋水傍有石墓宿經開發石作工竒殊為莊溝宋本作壯構而不知誰冢疑即澄之所謂凌冢也水北流注于獲獲水又東逕彌黎城北劉澄之永初記所謂城之西南有彌黎城者也獲水於彭城西南迴而北流逕彭城城西北舊有楚大夫龔勝宅即楚老哭勝處也獲水又東轉逕城北而東注泗水北三里有石冢被開傳言楚元王之孫劉向冢未詳是否城即殷大夫老彭之國也於春秋為宋地楚伐宋并之以封魚石崔子季珪述初賦曰想黄公於邳汜勒魚石於彭城即是縣也孟康曰舊名江陵為南楚陳為東楚彭城為西楚朱本引史記正義曰淮南北沛郡汝南郡為西楚彭城以東東海呉廣陵為東楚衡山九江江南豫章長沙為南楚文頴曰彭城故東楚也項羽都謂之西楚漢祖定天下以為楚郡封弟交為楚王都之宣帝地節元年更為彭城郡史記楚元王世家髙祖六年封弟交為楚王都彭城子王戊與呉王合謀反起兵昌邑南楚王戊自殺孝景帝以元王子禮為楚王奉元王宗廟地節二年中人上書告楚王謀反王自殺國除入漢為彭城郡王莽更之曰和樂郡也徐州治城内有漢司徒袁安魏中郎徐庶等數碑並列植於街右咸曽為楚相也大城之内有金城東北小城劉公更開廣之皆壘石髙四丈列壍環之小城西又一城是大司馬琅邪王所修因項羽故臺經始即構宫觀門閤惟新厥制義熙十二年霖雨驟澍汴水暴長城遂崩壞冠軍將軍彭城劉公之子登更築之悉以塼壘宏壯堅峻樓櫓赫奕南北所無宋平北將軍徐州刺史河東薛安都舉城歸魏魏遣博陵公尉茍仁城陽公孔伯恭援之邑閤如初觀不異昔自後毁撤一時俱盡聞遺工雕鏤尚存龍雲逞勢竒為精妙矣城之東北角起層樓於其上號曰彭祖樓地理志曰彭城縣故彭祖國也世本曰陸終之子其三曰籛是為彭祖彭祖城是也下曰彭祖冢彭祖長年八百綿夀永世於此有冢盖亦元極之化矣其樓之側汴帶泗東此疑作北為二水之㑹也聳望川原極目清野斯為佳處矣水經注集釋訂訛卷二十三
