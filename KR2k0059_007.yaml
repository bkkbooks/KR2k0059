body:
  text: 水經注集釋訂訛卷七歸安沈炳巽撰濟水一濟水出河東垣縣東王屋山為沇水王屋山在今河南懷慶府濟源縣西北八十里本漢軹縣屬河内郡隋改置濟源縣縣西有王屋故城後周所置本垣縣地元和志云王屋山在王屋縣北十五里元省縣入濟源故濟源有王屋山西南接垣曲縣界垣曲故垣縣也山海經曰聨水出焉西北流注于泰澤郭景純云聨沇聲相近即沇水也潛行地下至共山在濟源縣北十二里南復出于東丘今原城東北有東丘城括地志云沇水出王屋山頂崖下石泉渟而不流其深莫測既見而㐲至濟源縣西北二里平地其源重發而東南流孔安國曰泉源為沇流去為濟春秋說題辭曰濟齊也齊度也員也一作貞風俗通曰濟出常山房子縣贊皇山廟在東郡臨邑縣濟齊其度量也余按二濟同名也所出不同鄉源亦别斯乃應氏之非矣今濟水重源出温城西北平地水有二源東源出原城東北昔晉文公伐原以信而原降即此城也俗以濟水重源所發因復謂之濟源城其水南逕其城東故縣之原鄉杜預曰沇水縣西北有原城者也是南流與西源合西源出原城西東沇水注之水出西南東北流注于濟禹貢錐指曰元和志濟水在濟源縣東北三里其深莫測西源周圍六百八十五步深一丈皆繚之以周墻李濂逰濟瀆記云濟瀆廟後有池是為東池即東源周僅百餘步池西有石橋橋西為西池周如東池舊記濟水出王屋山頂太乙池伏流地中東行九十里復見于此其太乙池今已涸矣劉漪西源辨曰濟水二源舊志惟以廟垣石橋為界按水經注二源一在原城東北一在原城西南為地殊逺不可以一橋之界遂分東西而謂二源俱在是也意此為池之東源信矣池西二里又有一源舊稱為龍潭時出時沒不闗水旱下流經濟廟南會池水於東北當是西源無疑也濟水又東逕原城南東合北水亂流東南注分為二水一水東南流俗謂之為衍水即沇水也衍沇聲相近傳呼失實也濟水又東南逕郗城今懷慶府河内縣西南有絺城北元和志濟水經河内縣西南去縣三十里而出於温今屬懷慶府矣其一水枝津南流注于湨明一統志湨水在濟源縣其源有三一出原山俗呼為白澗水一出縣二十里曲陽城西南山一出陽城南溪俱東南流與沇水合又東南至温縣入于黄河水出原城西北原山勲掌谷俗謂之為白澗水南逕原城西春秋會于湨梁謂是水之墳梁也爾雅曰梁莫大於湨梁梁水堤也湨水又東南逕陽城東與南源合水出陽城南溪陽亦樊也一曰陽樊國語曰王以陽樊賜晉陽人不服文公圍之倉葛曰陽有夏商之嗣疑當作祀典樊仲之官守焉君而殘之無乃不可乎公乃出陽人春秋樊氏叛惡案左傳莊公二十九年樊皮叛王杜注樊皮周大夫樊其采地皮名今云樊氏則以采地為氏矣當從傳皮為是惡朱本改作惠亦誤當是王字王使虢公伐樊執仲皮歸于京師即此城也其水東北流與漫流水合水出軹闗南東北流又北注于漫謂之漫流口湨水又東合北水亂流東南左會濟水枝渠溴水又東逕鍾繇塢北世謂之鍾公壘又東南塗溝水注之水出軹縣西南山下北流東轉入軹縣故城中又屈而北流出軹郭漢武帝元年封薄昭為侯國也按漢書外戚恩澤侯表孝文元年封薄昭為軹侯今云武帝誤又東北流注于湨湨水又東北逕波縣故城北孫云波縣當作汲縣按史表髙帝十一年封公上不害為汲侯索隠曰汲縣屬河内郡里汲縣在衛輝府西南二十五漢髙帝封公上不害為侯國湨水又東南流天漿水澗水注之水在軹南畢朱箋宋本作睪向城今在開封府尉氏縣西南北在睪上俗謂之韓王城非也京相璠曰或云今河内軹西有地名向今無杜元凱春秋釋地亦言是矣盖相襲之向故不得以地名而無城也闞駰十三州志曰軹縣南山西曲有故向城即周向國也傳曰向姜不安于苢而歸者矣汲郡竹書紀年曰鄭侯使韓辰歸晉陽按竹書紀年陽下尚有一及字向二月城陽向更名陽為河雍向為髙平即是城也其水有二原俱導各出一溪東北流合為一川名曰天漿溪又東北逕一故城俗謂之治城亦曰治水又東流注于湨湨水又東南流右會同水水出南源下東北流逕白騎塢南塢在原上為二溪之會北帶深隍三面岨嶮唯西被宋本作版築而已東北流逕安國城西又東北注湨水湨水東南逕安國城東又南逕毋辟邑西世謂之無北城亦曰馬髀城皆非也朝廷以居廢太子謂之河陽庶人也湨水又南注於河也又東至温縣西北為濟水又東過其縣北濟水於温城西北與故瀆分南逕温縣故城西周畿内國司寇蘇忿生之邑也春秋僖公十年秋按春秋僖公十年狄滅温温子奔衛今云秋誤滅温温子奔衛周襄王以賜晉文公濟水南歴虢公臺西皇覽曰温城南有虢公臺基趾尚存虢公臺在温縣治西南周封虢仲之地因名晉宣帝過故邑嘗進温父老宴賀于此故又名賀酒臺濟水南流注于河郭縁生述征記曰濟河内温縣注于河盖沿歴之實證非為謬說也濟水故瀆於温城西北東南出逕温城北又東逕虢公冡北皇覽曰虢公冡在温縣郭東濟水南大冡是也濟水當王莽之世川瀆枯竭其後水流逕通津渠勢改尋梁脉水不與昔同胡云按濟水故瀆即漢志所謂東南至武徳入河者盖禹迹也第五卷河水注云成皋大伾山在河内修武武徳之界濟沇之水與榮播澤出入自此即經所謂濟水從北來注之者今濟水自温縣入河不於此也所入者奉溝水耳即濟沇之故瀆矣正與此相發明濟水于武徳入河南直成皋今汜水河陰之界是也其後由温縣入河則南直鞏縣所謂津渠勢改不與昔同者也今其故道又盡陷河中濟水惟從枝津之合湨水者至盂縣東南入河南直孟津縣其流益短矣由大禹而來濟之入河凡再變屈從縣東南流過墳城今在温縣界黄河在温縣南與河南府鞏縣分水鞏縣故城在今縣西南三十里西又南當鞏縣北南入于河濟水故瀆東南合奉溝水水上承朱溝於野王城西東南逕陽鄉城北又東南流逕李城西秦攻趙邯鄲且降傳舍吏子李同說平原君勝分家財饗士得敢死者三千人李同與赴秦軍秦軍退李同死封其父為李侯故徐廣曰河内平臯縣有李城即此城也于城西南為陂水淹地百許頃蕪葭萑葦生焉號曰李陂又逕墳城西屈而東北流逕其城北又東逕平臯城南平臯故城在今懷慶府城東左𫝊赤翟伐晉圍祁丘注云今河内平臯縣是也應劭曰邢侯自襄國徙此當齊桓公時衛人伐邢邢遷于夷儀其城屬晉號曰邢丘以其在河之臯處勢平夷故曰平臯瓚注漢書云春秋狄人伐邢邢遷夷儀不至此今襄國西有夷儀城去襄國一百餘里平臯是邢丘朱作邢是丘名非國也非國也余案春秋宣公六年赤狄伐晉圍邢丘昔晉侯送女于楚送之邢丘即是此處也非無城之言竹書紀年曰梁惠成王三年鄭城邢丘司馬彪後漢郡國志云縣有邢丘故邢國周公子所封矣漢髙帝六年封碭郡長項它為侯國賜姓劉氏按史記表項它是七年封武帝以為縣其水又南注于河也與河合流又東過成臯縣北即春秋之虎牢漢置縣屬河南郡今為氾水縣又東過滎陽縣北此猶合河濟而言之也即孔傳所云濟水入河並流數十里而南截河又並流數里溢為滎澤者自下專言濟水又東至北礫溪南胡云北礫溪未詳盖在河南濟北其水西注于河者東出過滎陽北本韓滎陽邑漢為縣今滎澤河陰二縣皆其地釋名曰濟濟也源出河北濟河而南也晉地道志曰濟自大伾入河與河水鬭南泆為滎澤尚書曰滎波既瀦孔安國曰滎波水以成瀦闞駰曰滎波嶓孫云音波澤名也故吕忱云嶓水在滎陽也也字疑衍謂是水也昔大禹塞其淫水而于滎陽下引河東南以通淮泗濟水分河東南流漢明帝之世司徒伏恭薦樂浪人王景字仲通好學多藝善能治水顯宗詔與謁者王昊始作浚儀渠昊用景法水乃不害此即景作所修故瀆也渠流東注浚儀今河南開封府祥符縣故復謂之浚儀渠也明帝永平十五年東廵至無鹽帝嘉景功拜河堤謁者漢靈帝建寧四年于敖城西北壘石為門以遏渠口謂之石門石門即賈讓所謂滎陽漕渠也其水門但用木與土至是壘石為之故世亦謂之石門水門廣十餘丈西去河三里石銘云建寧四年十一月黄場石也而主吏姓名磨滅不可復識魏太和中又更修之撤故增新石字淪落無復在者水北有石門亭戴延之所云新築城周城三百歩滎陽太守所鎮者也水南帶三錐指三下有皇字山即皇室山亦謂之為三室山也郡國志注引西征記云滎陽有廣武城在三皇山上或謂之三室山濟水又東逕西廣武城北廣武山在今滎澤縣西二十里接河陰縣界劉昭云山有二城曰東廣武西廣武各在山一頭相去二百步楚明統志云廣武三皇二山相聨其上有東西二城即漢相拒處郡國志滎陽縣有廣武城城在山上漢所城也髙祖與項羽臨絶澗對語責羽十罪羽射漢祖中胷處也山下有水北流入濟世謂之柳泉也濟水又東逕東廣武城北楚項下脫羽字城之漢破曹咎羽還廣武為髙爼置太公其上曰漢不下吾烹之髙祖不聽將害之項伯曰為天下者不顧家但益怨耳羽從之今名其壇曰項羽堆亦疑有訛闕朱本作夾城之間有絶澗斷山謂之廣武澗項羽叱婁煩於其上婁煩精魄喪歸矣濟水又東逕敖山北敖山有城秦置倉于其中故亦曰敖倉城括地志云敖倉在滎澤縣西北十五里石門之東北臨汴水南帶三皇山按今滎澤縣在隋縣南五里則敖城東南去今縣當二十里也詩所謂薄狩于敖者也其山上有城即殷帝仲丁之所遷也皇甫謐帝王世紀曰仲丁自亳徙囂于河上者也或曰敖矣秦置倉於其中故亦曰敖倉城也濟水又東合滎瀆朱本作滎澤瀆首受河水有石門謂之為滎口石門也石門南際河有故碑云陽嘉三年立激岸側以捍鴻波按蘇代曰決滎口魏無大梁即此處也首受河水以上承河陰石門水而言然昔人導澤水以為川從此而出故謂之滎口石門禹貢錐指注又曰河陰石門漢建寧四年立在敖城西北滎口石門漢陽嘉三年立在敖山東時地各别近志混而為一大謬而地形殊卑盖故滎播孫云書作滎波所道自此始也門南際河有故碑云惟陽嘉三年二月丁丑使河堤謁者王誨疏達河川遂荒庶土云大河衝塞侵齧金堤以竹籠石葺葺土而為遏壞隤無已功消億萬請以濱河郡徒疏山采石壘以為鄣功業既就徭役用息未詳朱云玉海引此文無未詳二字疑衍詔書許誨立功府鄉規基經始詔策加命遷在沇州乃簡朱軒授使司馬登令纘茂前緒稱遂休功登以伊洛合注大河南則緣山東過大伾回流北岸何云疑有脫文其勢鬱幪濤怒湍急激疾一有決溢彌原淹野蟻孔之變害起不測盖自姬氏之所常蹙昔崇鯀所不能治我二宗之所劬勞于是乃跋涉躬親經之營之比率百姓議之于臣伐石三谷水匠致治立激岸側以捍鴻波隨時慶賜說以勸之川無滯越水土通演役未踰年而功程有畢斯乃元勲之嘉課上徳之𢎞表也昔禹修九道書録其功后稷躬稼詩列于雅夫不憚謙之勤夙興厥職充國惠民安得湮沒而不章焉故遂刊石記功垂示于後其辭云云使河堤謁者山陽東昏司馬登字伯志代東萊典城王誨字孟堅河内太守守城向豺何校守作宋豺作豹字伯尹丞汝南鄧方字徳山懷令劉丞字季意河堤掾匠等造陳留浚儀邊韶字孝先頌石銘歳逺字多淪㩾其所滅盖闕如也滎瀆又東南流注于浦今無水次東得宿須水口水受大河渠側有扈城水自亭東南流注于濟水今無水宿須在河之北不在此也盖名同耳自西縁帶山隰秦漢以來亦有通否濟水與河渾濤東注晉太和中桓温北伐將通之不果而還義熙十三年劉公西征又命寧朔將軍劉遵考仍此渠而漕之始有激湍東注而終山崩壅塞劉公於北十里更鑿故渠通之合則南瀆通津川澗是導耳濟水於此又兼邲目春秋宣公十三年晉楚之戰楚軍于邲即是水也昔卞何云疑有脫誤京相璠曰在敖北濟水又東逕滎陽縣北上文東過滎陽縣北謂河濟並流此專指濟水而言宋白續通典云滎陽故城在滎澤縣南十七里今按滎澤縣北五里有滎澤故城隋置明洪武八年為河水所圯移今治是滎陽故城東北去今治止十二里也曹太祖與徐榮戰不利曹洪授馬于此處也朱箋魏志太祖起義兵討董卓至滎陽為卓將徐榮所敗太祖失馬賊追甚急曹洪下以馬授太祖渡汴水奔譙濟水又東南礫石溪水注之胡云按又東二字為句石字衍觀注云經所謂礫溪可知上有北礫溪故此為南礫溪余兄東甫云按下文礫石澗則石字似未可云衍或注脫石字耳且前此北礫溪既云未詳則亦安知更有南礫溪耶以南字屬下亦恐未安水出滎陽城西南李澤澤中有水即古馮池也地理志曰滎陽縣馮池在西南是也東北流歴敖山南春秋晉楚之戰設伏于敖前謂是也逕虢亭北池水又東北逕滎陽縣北斷山東北注于濟世謂之礫石澗即經所謂礫溪矣經曰濟出其南非也濟水又東索水注之索水源出開封府滎陽縣小陘山北流入京水水出京縣京縣今為滎陽縣西南嵩渚山在今滎陽縣東南二十五里一名小陘山與東闗分水即古旃水也其水東北流器難之水注之山海經曰小山海經作少陘之山器難之水出焉而北流注于侵下脫水字即此水也山海經作北流注于役水郭注云一作侵其水北流逕金亭又北逕京縣故城西入于旃然之水朱箋左傳襄公十八年楚伐鄭次于魚陵右師城上棘遂陟潁次于旃然注云旃然水出滎陽成臯縣東入汴城故鄭邑也莊公以居弟段號京城大叔祭仲曰京城過百雉國之害也城北有壇山罡趙世家成侯二十年魏獻滎陽因以為壇臺罡也按史記趙世家成侯二十年魏獻榮椽因以為檀臺原文如此並不云魏獻滎陽檀亦不作壇且無罡字不知道元何㨿引此況索隠注云劉氏曰榮椽地名其中有髙處可以為臺非也按榮椽是良材可為椽登飾有光榮所以魏獻之故趙因之以為檀臺又正義曰榮屋翼也說文云椽榱也屋梠之兩頭起者為榮也據此則為榮椽無疑然作椽解又與上下文所引不類不知何故豈北魏時古本作滎陽不作榮椽也其水亂流北逕小索亭西京相璠曰京有小索亭世語以為本索氏兄弟居此故號小索者也又為索水索水又北逕大柵城東晉滎陽民張卓董邁等遭荒鳩聚流離堡固名為大柵塢至太平真君年潁州刺史崔白自虎牢移州治此又開廣舊城創制改築焉太和十七年遷都洛邑省州置郡索水又屈而西流與梧桐澗水合水出原本漏西南梧桐谷東北流注于索斯水亦時有通塞而不常流也索水又北屈東逕大索城南春秋傳曰鄭子皮勞叔向於索水即此城也晉地道志所謂京有大索小索亭漢書京索之間也史記項羽本紀與漢戰滎陽南京索間應劭曰京縣名屬河南郡有索亭杜預曰成臯東有大索城又有小索城城在滎陽縣北四里又云京縣有大索亭小索亭晉灼曰索音柵明一統志云大索城在滎陽縣西五十里小索城在大索東北索水又東逕虢亭南應劭曰滎陽故虢漏公字之國也今虢亭是矣故馬淵郡國志曰縣有虢亭俗謂之平咷城城内有大冡名管叔冡或亦謂之號咷城非也盖號虢字相類字轉失實也風俗通曰俗說髙祖與項羽戰於京索遁於薄中羽追求之時鳩止鳴其上追之者以為必無遂得脱及即位異此鳩故作鳩杖以扶老案廣志楚鳩一名㘁啁號咷之名盖因鳩以起目所未詳也索水又東北流須水古疑作右入馬疑作焉水近出京城東北二里榆子溝亦曰㮏榆溝也又亦或謂之為小索水東北流木蓼溝水注之水上承京城南淵世謂之車輪淵淵水東北流謂之木蓼溝又東北入于須水湏水出滎陽縣萬山北流入汴河湏水又東北流于滎陽城西南北注索索水又東逕滎陽縣故城南漢王之困滎陽也紀信曰臣詐降楚王宜間出信乃乗王車出東門稱漢降楚楚軍稱萬歳震動天地王與數十騎出西門得免楚圍羽見信大怒遂烹之信冢在城西北三里故蔡伯喈述征賦曰過漢祖之所隘弔紀信于滎陽其城跨倚崗原居山之陽王莽立為新隊備周六隊之制魏正始三年歳在甲子被癸丑詔書割河南郡鞏縣自關以東創建滎陽郡并户二萬五千以南鄉築陽城鄉亭侯李勝字公照為郡守顧原武典農校尉政有遺惠民為立祠於城北五里號曰李君祠廟前有石蹠蹠上有石的朱曰謝兆申云石的疑當作石碣㙔按會稽記縣東有石的山山有石壁方二丈的的如射侯則此石的即其類也石的銘具存其畧云百族欣戴咸推厥誠今猶祀禱焉索水又東逕周苛冢北漢祖之出滎陽也令御史大夫周苛守之項羽拔滎陽獲苛曰吾以公為上将軍封三萬户侯能盡莭乎苛瞋目罵羽羽怒烹之索水又東流北屈西轉北逕滎陽城東而北流注濟水杜預曰旃然水出滎陽成臯縣東入汴春秋襄公十八年楚伐鄭石當作右師渉潁次于旃然即是水也濟渠水㫁汴溝唯承此始故云吸受旃然矣亦謂之鴻溝水盖因漢楚分王指水為斷故也郡國志曰滎陽有鴻溝水是也盖因城地而變名為川流之異目濟水又東逕滎陽澤北故胡作古亦通滎水所都朱云疑作瀦也京相璠曰滎澤在滎陽縣東南與濟隧合濟隧上承河水于卷縣北河南逕卷縣故城東漢字河南郡有卷縣其故城在今原武縣西七里又南逕衡雍城西左傳晉文公敗楚師于城濮甲午至于衡雍作王宫于踐土杜注云衡雍鄭地今滎陽卷縣衡雍城在今原武縣西北五里春秋左傳襄公十一年諸侯伐鄭西濟於濟隧杜預闕其地而名之水也京相璠曰鄭地也言濟水滎澤中北流至衡雍西與出河之濟濟水伏流自河而出故謂之出河之濟會南去新鄭新鄭縣今屬開封府百里斯盖滎播河濟往復逕通矣出河之濟即陰溝之上源也濟隧絶焉故世亦或謂其故道為十字溝自于岑造八激堤於河陰水脉徑斷故瀆難尋又南會于滎澤然水既斷民謂其處為滎澤春秋衛侯及翟人戰于滎澤而屠懿公𢎞演報命納肝處也呂氏春秋云狄人殺衛懿公食之遺其肝𢎞演使返報命肝下自剖其腹納懿公之肝有垂隴城濟瀆出其北春秋文公三年左傳作二年晉士縠盟于垂隴者也京相璠曰垂隴鄭地今滎陽東二十里有故隴城即此是也世謂之都尉城盖滎陽典農都尉治故變垂隴之名矣澤際又有沙城城左佩濟瀆竹書紀年梁惠成王九年王會鄭釐侯于巫沙者瀆際有故城世謂水城非也史記秦昭王三十二年魏冉攻魏走芒卯入北宅史記穰侯傳昭王三十二年穰侯為相國將兵攻魏走芒夘入北宅徐廣曰魏惠王五年與韓會宅陽正義曰竹書云宅陽一名北宅括地志云宅陽故城在鄭州滎陽縣西南十七里即故宅陽城也竹書紀年曰惠王十三年王及鄭釐侯盟于巫沙朱云今竹書巫沙之盟是顯王十一年事以釋宅竹書紀年作它陽之圍歸釐于鄭者也竹書紀年晉出公六年齊鄭伐衛荀瑶城宅陽按竹書紀年貞定王七年晉荀瑶城南梁無城宅陽之文俗言水城非矣濟水自澤東出即是始矣王隠曰河決為滎濟水受焉故有濟堤矣為北濟也濟水又東南逕釐城東春秋經書公會鄭伯于時來左傳所謂釐也京相璠曰今滎陽縣東四十里有故釐城也濟水又合黄水黄水發源京縣黄淮止疑訛當作山東南流名祝龍泉泉勢沸湧狀若巨鼎湯湯西南流謂之龍項口世謂之京水也京水源出滎陽嵩渚山徑鄭州西南十五里東北入鄭水又屈而北注魚子溝水入朱本作北注于濟魚水入焉焉水出石暗澗東北流又北與濏濏水合水出西溪東流水上有連理樹其脫樹字柞櫟也南北對生凌空交合溪水歴二樹之間東流注于魚水魚水又屈而西北注黄水黄水又北逕髙陽亭東又北至故市縣重泉水注之水出京城西南小宋本作少陸山東北流又北流逕髙陽亭西東北流注于黄水又東北逕故市縣故城南溪髙帝六年封閻澤母赤為侯國屬縣也按漢書表髙帝六年封閻澤赤為故市侯三年薨九年子母害嗣令云閻澤母赤是二人合為一人矣黄水又東北至滎澤南分為二水一水北入滎澤下為船塘俗謂之郟城陂東西四十里南北二十里竹書穆天子傳曰甲寅天子浮于滎水乃奏廣樂是也一水東北流即黄雀溝矣穆天子傳曰壬寅天子東至于雀梁者也又東北與靖水枝津合二水之會為黄泉北流注于濟水又東過陽武縣北陽武縣今屬河南開封府濟水又東南流入陽武縣歴長城東南流蒗蕩渠出焉濟水又東北流南濟也逕陽武縣故城南王莽更名之曰楊桓矣又東為白馬淵淵東二里南北一百五十歩泉流名為白溝又東逕房城北穆天子傳曰天子里圃田之路東至于房疑即斯城也郭注云以為趙郡房子也余謂穆王里鄭圃田郭以趙之房邑為疆更為非矣濟水又東逕封丘縣南今屬開封府又東逕大梁城北今祥符縣西北有浚儀故城即大梁城也東左何校宋本改南逕倉垣城倉垣城在今陳留縣西又東逕小黄縣在今陳留縣西北二十里之故城北縣有黄亭說濟疑訛或是臨溝又謂之曰黄溝縣故陽武之東黄鄉也故朱本云疑脫因字水以名縣沛公起兵野戰喪皇妣于黄鄉天下平定乃使使者脫以字梓宫招魂幽野于是丹旐目水濯洗入于梓宫朱箋按陳留風俗傳云有丹蛇自灑濯入于梓宫則丹旐當作丹蛇目水當作自水其浴處有遺髮焉故諡曰昭靈夫人因作寢以寧神也濟水又東逕東昏縣故城北今蘭陽縣東北二十里有東昬縣故城陽武縣之户牖鄉矣漢丞相陳平家焉平少為社宰以善均肉稱今民祠其社平有功于髙祖封户牖侯是後置東昏縣也王莽改曰東明矣濟水又東逕濟陽縣故城南今蘭陽縣東五十里有濟陽縣故城故武父城也城在濟水之陽故以為名王莽改之曰濟前者也光武生濟陽宫光明昭室即其處也東觀漢記曰光武以建平元年生於濟陽縣是歳有嘉禾生一莖九穗大于凡禾縣界大熟因名曰秀又東過封丘縣北北濟也自滎澤東逕滎陽卷縣之武修亭南春秋左傳成公十五年左傳作十年鄭子然盟于修澤者也鄭地矣杜預曰卷東有修武亭濟水又東逕原武縣故城南春秋之原圃也穆天子傳曰祭父自圃鄭來謁天子穆天子傳無天子二字夏庚午天子飲于洧上乃遣祭父如圃鄭是也王莽之原桓矣濟瀆又東逕陽武縣故城北又東絶長城築也案竹書紀年梁惠成王十二年龍賈率師築長城于西邊自亥谷以南鄭所城矣竹書云是梁惠王十五年築也郡國志曰長城自卷逕陽武到密者是矣濟瀆又東逕酸棗縣之烏巢澤北酸棗縣今為開封府延津縣澤有故亭晉太康地記曰澤棗之東南宋本作澤在酸棗之東南昔曹太祖納許攸之䇿破袁紹軍處也濟瀆又東逕封丘原本訛立縣南燕縣之延鄉也其在春秋為長丘焉應劭曰左傳宋敗狄于長丘獲長狄縁斯是也漢髙帝封翟旴按史記表髙祖十一年封翟旴為衍侯索隠曰漢志闕從無封丘之封不知酈道元何自云然存疑俟質濮水出焉炳巽按上下文義漢髙帝封翟旴六字似是他處之注錯簡于此不然翟旴當有為侯國等字而濮水出焉句亦與上文不接其為錯無疑濟瀆又東逕大梁城之赤亭北而東注下疑有脫文又東過平丘縣南北濟也平丘縣今為開封府封丘縣縣故衛地也春秋魯昭公十三年諸侯盟于平邱是也縣有臨濟亭田儋死處也又有曲濟亭皆臨側濟水者又東過濟陽縣北濟也自武父城北圈稱曰朱箋按隋經籍志闞駰撰十三州志十卷議郎圈稱撰陳留風俗傳三卷則圈稱曰下應有别文或闞駰曰三字是衍文闞駰曰在縣西北鄭邑也東逕濟陽縣故城北朱本陳留上有圏稱二字陳留風俗傳曰縣故宋地也竹書紀年梁惠成王三十年城濟陽漢景帝中元六年封梁孝王子明為濟川王應劭曰濟川今陳留濟陽縣是也又東過寃朐縣南今兖州府曹州西有寃朐縣故城又東過定陶縣南南濟也禹貢錐指曰謂之南濟實濟水之經流也自滎口石門至此皆禹後代人所導職方豫州之川水經謂之滎瀆而河濟合焉者也過此則為陶丘復出之濟矣以今輿地言之河南開封府之滎澤原武陽武封丘祥符陳留蘭陽山東兖州府之曹州諸州縣界中皆滎瀆之所經也自鴻溝既開滎澤為河水所亂已非其舊逮東漢之世滎澤亦塞而禹迹蕩然無存矣滎瀆非滎澤也鄭康成云滎澤在滎陽縣東杜預同京相璠云在縣東南滎澤縣志在縣南其說不同按今縣西南十二里有滎陽故城漢縣也昔時澤在滎陽縣東今則在滎陽縣南矣鄭杜說是滎澤西北距滎口二十餘里其間必有水道水道相通而志家不詳余按水經注黄水自京縣東北流入滎澤下為船塘俗謂郟城陂東西四十里南北二十里穆天子傳曰浮于滎水乃奏廣樂是也北流注于濟水此皆昔人導澤為川之路澤水從此北出而為滎瀆故謂之滎口濟水自敖山又東不得便合滎澤以是知經之澤字當作瀆也又曰河與滎瀆相亂其來已久而滎澤在西漢時依然無恙故班固云濟水軼出滎陽北地中謂滎澤也至東漢乃塞為平地不知何故酈道元云昔大禹塞其淫水而於滎陽下引河東南以通淮泗又云大禹塞滎澤開蒗蕩渠以通淮泗夫滎澤何以謂之淫水經曰滎波既豬禹方陂之以蓄其水何以塞之誕妄不足深辨或云王莽時濟竭而不復出故滎澤遂塞斯言亦大可疑按司馬彪郡國志河内温下云濟水出王莽時大旱遂枯絶河南滎陽下云有鴻溝水而不言滎澤豈以其時已塞為平地乎濟枯之語繫之温縣盖專謂北源故酈注於温縣濟水故瀆下言之然北源東漢復出水經歴歴可考彪何以直言枯絶而滎澤無文則又似專指南源此後人所以移其說于滎陽也程大昌云世惡莽居下流故河徙濟枯皆歸于莽余謂河徙事見王莽傳無可疑者濟枯亦理之所有但濟水因旱而枯旱止則當復舊夏季伊洛竭商季河竭周幽王時三川竭諸水不聞自此遂絶也濟河獨一枯而不復出且南北二源同此一濟北源復出南源何以終絶殊不可曉積思久之竟不知滎澤之塞為何故頃讀後漢書而得之王景傳云平帝之世河汴決壞未及得修汴渠東侵日月侵毁建武十年陽武令張氾上言河決積久日月侵毁濟渠所漂數十許縣明帝紀永平十三年詔亦言自汴渠決敗六十餘歳加頃年以來雨水不時汴渠東侵日月益甚水門故處皆在河中漭瀁廣溢莫測垠岸當時汴濟之區河災之羨溢為害如此濟渠即滎瀆南去滎澤不過二十餘里則固在所漂數十縣之中者也河水氾濫必至其處歴六十年而後已填淤之久空竇盡窒地中伏流不能上涌滎澤之塞實由於此豈因旱乾而遂塞哉余闕曰河天下之濁水也水一石率泥數斗嘗道出梁榮觀決河凡水之所被比其去即穹居大本盡没地中漫不見踪跡然則河侵滎澤去後安得不塞為平地鉅鹿縣志云元末河決入鉅野及徙後澤遂化為平陸其明徵也彪得之傳聞不暇深究故言之不詳世遂附㑹以為滎澤陻之故殊非事實故不可以無辨濟瀆自濟陽縣故城南東逕戎城北春秋𨼆公二年公會戎于潛杜預曰陳留濟陽縣東南有戎城是也濟水又東北菏水東出焉菏水故道在今曹州境内今涸濟水又東北逕寃朐縣故城南吕后元年按漢表乃景帝元年四月封封楚元王子劉執為侯國王莽之濟平亭也濟水又東逕秦相魏冉冢日知録顧炎武云今曹縣有冉堌為秦相穰侯魏冉之冢史記穰侯卒于陶遂塟焉宋本冢下有一南字冉秦宣太后弟也代客卿夀燭為相封於穰益封于陶號曰穰侯富于王室范睢說秦秦王悟其擅權免相就封出闗輜車千乗卒于陶而因葬焉世謂之安平陵墓南崩碑尚存濟水又東北逕定陶恭王陵南漢哀帝父也帝即位母丁太后建平二年崩上曰宜起陵于恭皇之園送葬定陶貴震山東王莽秉政貶號丁姬開其槨尸按漢書外戚傳當作户火出炎四五丈吏卒以水沃滅乃得入燒燔槨中器物公卿遣子弟及諸生四夷十餘萬人操持作具助將作掘平共王母傅太后墳及丁姬冢二旬皆平莽又周棘其處以為世戒云時有羣鷰數千銜土投于丁姬竁中竁漢書作穿師古曰謂壙中也今其墳冢巍然尚秀隅阿相承列郭數周面開重門南門内夾道有崩碑二所世尚謂之丁昭儀墓又謂之長隧陵盖所毁者傅太后陵耳丁姬墳墓事與書違不甚過毁未必一如史說也瀆南魏郡治也世謂之左城亦名之曰葬城盖恭王之陵寢也濟水又東北逕定陶縣故城南定陶縣今屬山東兗州府側城東注也朱云也字疑訛似當作此縣故三鬷國也湯追桀三鬷即此周武王封弟叔振鐸之邑也謝云宋本也字在曹國下故曹國漢宣帝甘露二年更濟隂為定陶國王莽之濟平也戰國之世范蠡既雪㑹稽之恥乃變姓名寓之於陶為朱公以陶天下之中諸侯四通貨物之所交易也治產致千金富好行徳子孫修業遂致巨萬故言富者皆曰陶朱公也又屈從縣東北流南濟也又東北右合菏水水瀆上承濟水于濟陽縣東世謂之五丈溝又東逕陶丘北地理志曰禹貢定陶西南有陶丘陶丘亭在南墨子以為釜丘也禹貢錐指曰按漢志陶丘在定陶縣西南則濟水當先經陶丘而後至故城此經不合恐是錯簡又東北逕定陶縣故城南十字當在引竹書薛侯來㑹王于釡丘者也下竹書紀年魏襄王十九年薛侯來㑹王于釜丘者也禹貢錐指曰按自滎口至陶丘皆後世滎瀆之所經非禹迹也今曹州定陶界中並有濟水故道禹時則濟水伏流涌自陶丘之北而東注于菏澤無上源也陶丘漢志云在定陶縣西南而郭璞言在城中盖其時郡徙西南包陶丘而為城耳今縣則又徙于東北故陶丘與漢城皆在西南也尚書所謂導菏水自陶丘北謂此也菏水東北出于定陶縣北屈左合汜水氾水西分濟瀆東北逕濟陰郡南爾雅曰濟别為濋呂忱曰水别復入為氾廣異名也汜水又東合于菏瀆昔漢祖既定天下即帝位於定陶汜水之陽張晏曰汜水在濟隂界取其汜愛𢎞大而潤下也汜水名於是乎在矣汜水又東北逕定陶縣南又東北右合黄水枝渠渠上承黄溝東北合河而北注濟瀆也禹貢錐指曰菏澤在陶丘之東北相去不逺濟水伏流至陶丘北上奮馳波跳沫東北匯于菏澤又東北絶鉅野至琅槐入海者為濟瀆其一枝東南流至湖陵入泗者後人目之曰菏水漢志湖陵縣下云菏水在南者是湖陵今為魚臺縣地也許慎云菏澤水在湖陵謂澤之下流入河者亦未為誤自孔傳襲其文曰菏澤在湖陵而遺一水字則在湖陵者為澤矣釋此至于菏又增一水字曰菏澤之水則定陶之菏澤與湖陵之菏水無别矣酈道元時孔傳已盛行故宗其說言尚書有導菏澤之說自陶丘北東至于菏水又以湖陵入泗為澤水所鍾而不知此特菏澤之下流其所鍾則在定陶也且豫州導菏澤被孟豬乃導澤水之餘波南入于孟豬非謂東南至湖陵入泗之菏水酈乃混而為一種種紕繆皆為孔傳所誤說禹貢者當以漢志為正經文三菏字皆以澤言在定陶與湖陵無涉也菏之為澤也濟貫其中大半是濟水所匯酈注云即泲水之所包注以成湖澤是也然亦必有旁源酈注云濟水自定陶故城南又東北右合菏水水上承濟水于濟陽縣東今蘭陽曹州之間世謂之五丈溝又東北出定陶縣北屈左合汜水汜水西分濟瀆東北逕濟陰郡南又東合于菏又東北逕定陶縣南又東北右合黄水枝渠而北注濟瀆是氾水與五丈溝之會于澤者亦皆濟水之分流也寰宇記云菏水亦名南濟水近志以北清河為北濟南清河為南濟誤由于此俗謂之五丈河西自考城縣界來程大昌曰樂史寰宇書云濟陰有山是為菏山菏水西自考城來考城在濟陰西濟之正流未嘗經考城可見菏水自為一𣲖而濟來㑹之甚明也水經以此水為五丈溝即近世命為五丈河者此正菏水首末也按曹州志菏山在州東南三十里以近菏澤而言盖澤本名菏後人因澤以名其山也說者謂菏水出菏山非是據酈注菏水分濟于定陶東北此即經所謂濟水東至乗氏縣西分為二南為菏水北為濟瀆者也乗氏故城在今鉅野縣西南漢置然曹州之東境亦兼得乗氏地州東南與定陶接界菏澤在焉注所謂定陶東北即經所謂乗氏縣西也但不言菏澤為疎漏耳菏水只自菏澤分流酈以濟陽所出之五丈溝為菏水盖雜採他說而有此繆元和志因目魚臺之菏水曰五丈溝而程氏據以為菏水之首末正當如此皆非地志水經之菏水起乗氏訖湖陵之本意也濟水有三伏三見之說或謂出于近世之俗學殊不可信王綱振云如時以東流為濟溢為滎為見則瀁東流為漢匯為彭蠡亦可為見乎又若以入于河為伏則渭入于河洛入于河亦可為伏乎況經明言浮于濟漯達于河河濟本通而此曰流曰溢曰入曰出曰至曰會亦並無間斷不知三伏三見何據但沿襲既久為之曲解非本注也渭按伏見之說二孔無之然有所自來泰澤一伏東丘一見本水經注武徳入河再伏滎陽軼出再見本地理志滎東又洑為三伏出曹濮間為三見本唐書許敬宗傳此豈創自近世但以入河為伏義有未安耳滎澤自周以前已導為滎川與陶丘復出之濟相接故漢志于軼出滎陽地中下即繼之曰又東至琅槐入海而定陶縣下亦止云禹貢陶丘在西南不引東出之文盖三見之迹不可得見久矣鴻溝既開滎瀆為濁河所亂陶丘之竇日就填淤而滎澤之澄泓如故其後滎澤亦塞則河南由是無濟水而再見之迹亦亡水經以河濟合流分入滎瀆者為濟水京相璠謂之出河之濟酈道元宗之而班固之所謂軼出地中者絶口不談矣或以為河中截留而過孔安國或以為河厎穴地而來蔡沈或以為河濟相亂南出還清孔穎達或以為適會河滿溢出南岸程大昌各持所見終非定論余竊謂河南之濟即奮自河南之地中未必與入河之濟為一脈譬如人之鼻息總出丹田氣海中呼者豈必其吸者之復出邪沈括云歴下凡發地皆是流水世傳濟水經過其下東阿之井乃濟水所為曾鞏云泰山諸谷之水自渇馬崖潛流地中至歴城西復出為趵突旁溢十數泉蔡傳引以證濟之伏見重源顯發所在多有元和志云鄭州管城縣京水出縣南平地新鄭縣溱水出縣西北三十里平地二處並在河南密爾滎澤尤為明驗盖濟瀆所經之地其下皆有伏流遇空竇即便涌出故一見于滎澤再見于陶丘不必以入河之濟為上源亦不必幷泰山澤東丘數之為三伏三見也草廬之說雖聖人復作無以易之矣東坡惠泉詩云兹山定空中乳水滿其腹遇隙則發見臭味實一族余謂濟水亦然今年逰歴下觀諸泉尤信水經注集釋訂訛卷七
