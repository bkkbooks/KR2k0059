body:
  text: 水經注集釋訂訛卷三歸安沈炳㢲撰河水三河水又北過北地富平縣西富平縣即今靈州所地河側有兩山相對水出其間即上河峽即今寧夏衛西南一百四十里峽口山是明一統志云在衛西南一百四十里兩山相夾黃河經其中一名青銅峽上有古塔一百八座世謂之青山河水厯峽北注枝分東出河水又北徑富平縣西今靈州所西南有富平縣故城秦置北地都尉治縣城王莽名郡為威戎按漢志作威成一本作威武縣曰特武漢志作持武建武中曹鳳字仲理為北地太守政化尤異黃龍應於九里谷髙岡亭角長三丈朱本作尺大十圍稍至十餘丈天子嘉之賜帛百匹加秩中二千石河水又北徑薄骨律鎮城城在河渚上赫連果城錐指作果園也桑果餘林仍列洲上但語出戎方不究城名訪諸耆舊咸言故老宿彥言赫連之世有駿馬死此取馬色以為邑號故目城為白口騮韻之謬朱云韻字下當有轉字謂白口騮轉讀薄骨律耳遂仍今稱所未詳也錐指云薄骨鎮城在今蘭州所境唐朔方節度使治所元和志靈州理廽樂縣本漢富平縣縣枕黃河後魏刁雍為薄骨律鎮將上表請開富平西三十里舊渠通河水溉公私田四萬餘頃人大獲其利又薄律骨渠在縣南六十里溉田千餘頃靈武縣東南至靈州十八里黃河自回樂縣界流入漢渠在縣南五十里從漢渠北流四十餘里始為千金大陂其左右又有胡渠御史百家等八渠溉田五百餘頃按五代唐長興中朔方帥張希崇亦引河渠興屯田以省漕運民夷愛之今靈州所境田多沃饒恆無暵涸之患賴黃河之灌溉也河水又徑典農城東世謂之胡城又北徑上河城東世謂之漢城薛瓉曰上河在西河富平縣即此也馮參為上河典農都尉所治也何氏云漢書馮參傳無典字蓋典農之名始于建安也續書百官志云邊郡置農都尉主屯田殖穀河水又北徑典農城東按錐指引此作又徑北典農城東二城皆上河典農都尉馮參所治也在今靈州所界俗名謂之吕城皆參所屯以事農朱校宋本農下有一毗字河水又東北徑廉縣故城東廉縣漢屬北地郡其故城當在今靈州所西南王莽之西河亭地理志曰卑移山在西北河水又與北枝津合水受大河東北徑富平城所在分裂以溉田圃北流入河今無水爾雅曰澭反入言河復決入者也河之有澭若漢之有潜也河水又東北徑渾懷鄣西地理志曰渾懷都尉治塞外者也太和初三齊平徙厯下民居此遂有厯地之名矣南去北城三百里南去北城恐誤漢志渾懷都尉在北地郡富平縣疑當作南去北地元和志懷逺縣在靈州東北隔河一百二十里廢靈武城在縣東北隔河一百里其城本蒙恬所築古謂之渾懷鄣河水又東北厯石崖山西今在平羅所東去北城城亦當作地五百里山石之上自然有文盡若戰馬之狀粲然成著類以圖焉朱云當作頗似圖畫故亦謂之畫石山也又北過朔方臨戎縣西河水東北徑三封縣故城東漢武帝元狩三年置十三州志曰在臨戎縣西一百四十里按漢志三封屬朔方郡其故城在今榆林衛界廢夏州西南長澤縣北二十里河水又北徑臨戎縣故城西漢元年立按漢志臨戎縣武帝元朔五年置今云漢元年誤舊朔方郡治王莽之所謂推武也河水又北有枝渠東出謂之銅口東徑沃野故城南元和志沃野故城在天德軍城北六十里即後魏六鎮從西第一鎮也刁雍上表云臣鎮去沃野鎮八百里道多深沙輕車往來猶以為難漢武帝元狩三年立王莽之綏武也枝渠東注以溉田所謂智通在我矣河水又北屈而為南河出焉河水又北迆西溢於窳渾縣故城東漢武帝元朔二年開朔方郡治又有西部都尉治有道自縣西北出雞鹿塞王莽更郡曰溝搜縣曰極武其水積而為屠申澤澤東西一百二十里故地理志曰屠申澤在縣東即是澤也闞駰謂之渾澤矣屈從縣北流漢甘露三年董忠送韓邪單于出雞鹿塞後漢永元初竇憲出雞鹿塞伐胸奴是也窳渾縣故城今在廢賔州西北河水又屈而東流為北河徑高闕南地理志曰朔方臨戎縣北有連山險于長城其山中斷兩峯俱峻俗名為高闕也史記趙武靈王既襲胡服自代並隂山下至高闕為塞山下有長城長城之際連山刺天其山中斷兩岸雙闕善能雲舉望若闕焉節狀表目故有高闕之名也自闕北出荒中闕口有城跨山結局謂之高闕戍上古迄今朱箋云大事記注引此作峩然雲舉節狀作即狀上古迄今作自古及今常置重捍以防塞道漢元朔四年衛青將十萬人敗右賢王於高闕即此處也漢書胸奴傳元朔四年春漢遣衛青將六將軍十餘萬人出朔方高闕右賢王以為漢兵不能至飲酒醉漢兵出塞六七百里夜圍右賢王右賢王大驚脫身逃走精騎往往隨後去漢將軍得右賢王人衆男女萬五千人禆小王十餘人河水又東徑臨河縣故城北漢武帝元朔三年封代恭王子劉賢為侯國王莽之監河也漢武帝元朔二年大將軍衛青絶梓嶺梁北河是也漢書衛青傳上曰車騎將軍青度西河至高闕絶梓嶺梁北河如淳曰絶度也為北河作橋梁也按通典曰河經靈武郡西南便北流凡千餘里過九原郡乃東流漢人謂之西河自九原以東漢人謂之北河然北河之名秦已有之史記惠文王後五年遊北河昭襄王十八年又之上郡北河是也至河目縣西河水自臨河縣東徑陽山南臨河故城在今榆林衛西北漢書注曰陽山在河北指此山也東流徑石跡阜西是阜破石之文悉有鹿馬之跡故斯阜納稱焉南屈徑河目縣西西朱本作左董訥夫云疑在為左字之訛作左為是北假地名也自高闕以東夾山帶河陽山以去謝云宋本作陽山以西皆北假也史記曰秦使蒙恬將十萬人北擊胡度河取高闕據陽山北假中是也史記注北假北方田官主以田假貧人故云北假應劭曰北假在北地陽山北正義曰括地志云漢五原郡河目縣故城在北假中北假地名也在河北今屬勝州銀城縣北河又南合南河上承西河東徑臨戎縣故城北又東徑臨河縣南又東徑廣牧縣故城北又朱本作有東部都尉治王莽之鹽官也徑流二百許里東會于河錐指云陽山即隂山也山在中國之極北故名隂山水北曰陽山河水之北故亦謂之陽山徐廣云隂山在河南陽山在河北非也漢書侯應曰北邊塞至遼東外有隂山東西千餘里草木茂盛多禽獸本冒頓依阻其中治作弓矢求出為冦是其苑囿也孝武出師征伐斥奪此地攘之于漢北建塞徼起亭隧築外城列屯戍以守之然後邊境得用少安計隂山綿亘千餘里直抵遼東非河南所能容益信徐說之謬王莽傳云五原北假膏壤殖穀臨戎縣見前廣牧縣故城在今榆林衛地界河水又南徑馬隂山西史記音義曰五原安陽縣北有馬隂山漢書音義曰陽山在河北隂山在河南謂是山也而即實不在河南史記音義曰五原安陽縣北有馬隂山今山在縣北言隂山在河南又傳疑之非也余按南河北河及安陽縣以南悉沙阜耳無他異山故廣志曰朔方郡北移沙七所而無山以擬之是議志何改志之僻也隂山在河東南則可矣河水又東南徑朔方縣故城東朱本下有北字詩所謂城彼朔方也漢元朔二年大將軍衛青取河南地為朔方郡使校尉蘇建築朔方城即此城也王莽以為武符者也按地理志云金連青澤鹽澤並在縣南矣按漢書地理志朔方縣注金連鹽澤青鹽澤並在南今云青澤鹽澤恐誤又按魏土地記曰縣有大鹽池其鹽大而青白名曰青鹽又名戎鹽入藥分漢志典官鹽池去平地朱云平地疑作平城宮千二百里在新秦之中服䖍曰新秦地名在北方千里如淳曰長安以北朔方以南也薛瓉曰秦逐胸奴收河南地徙民以實之謂新秦也屈南過五原西安陽縣南朔方縣故城漢朔方郡治元和志什賁故城在夏州朔方縣東北即漢朔方縣之故城自漢至今常為關中根植什賁之號蓋番語也河水自朔方東轉徑渠搜縣故城北地理志曰朔方有渠搜縣中部都尉治王莽之溝搜亭也禮三朝記曰北發渠搜南撫交址此以北對南禹貢之所云析支渠搜矣朔方中部都尉治在廢夏州北此非禹貢之渠搜說見後禹貢錐指云傅同叔云陸氏曰漢志朔方郡有渠搜縣武紀云北伐渠搜是也以余考之漢朔方之渠搜非此所謂渠搜此亦當是金城以西之戎也後世種落遷徙故漢有居朔方者若禹時渠搜居朔方則不應浮積石陸說非也渭按水經河水自朔方東轉徑渠搜縣故城北注云禮三朝記曰北發渠搜南撫交址此以北對南禹貢之所云析支渠搜矣誤始道元陸氏因之大戴禮漢武帝詔並有三朝記語渠搜與交址對舉則不在朔方可知龜兹國王治去長安七千四百八十里而上郡有龜兹縣師古曰龜兹國人來降附者處之於此故以名云朔方之渠搜亦此類也周書王會篇曰渠搜以䶂犬注云露犬也能飛食虎豹凉土異物志曰古渠搜國在大宛北界隋書西域傳曰鏺汗國都葱嶺之西五百餘里古渠搜國也渠搜之在西域有明徵矣據漢書大宛北與康居接並在葱嶺西而異物志言渠搜在大宛北界豈漢時康居部落即古渠搜之地與或曰鏺汗在葱嶺之西以為渠搜毋乃太逺曰奚有於是條支國臨西海去玉門陽關四萬里漢時猶且來獻今鏺汗國都去長安不過一萬二千二百五十餘里浮河而下至平陽則視長安又差近何言太逺也且後世德不足以及逺尚能威行萬里之外况舜禹之聲名洋溢無逺弗屆者哉禹貢首崑崙次析支次渠搜蓋以入貢之序為先後也河水又徑西安縣故城按漢志五原郡有西安陽縣莽曰鄣安則此縣字當作陽字王莽更之曰鄣安矣安陽故城在廢豐州東北河水又東徑田辟城南地理志曰故西部都尉治也屈東過九原縣南漢志五原郡成宜縣下云中部都尉治原亭西部都尉治田辟辟讀曰璧原亭田辟蓋皆縣界之地名河水又東徑成宜縣故城南城在廢豐州界王莽更曰艾虜也師古曰艾讀曰刈河水又東徑原亭城南闞駰十三州志曰中部都尉治河水又東徑宜梁縣之故城南今在廢豐州東闞駰曰五原西南六十里今世謂之石崖城河水又東徑稒陽城南稒陽城即稒陽塞在稒陽縣西北後漢永元初竇憲出雞鹿塞鄧鴻出稒陽塞即此城東部都尉治徑河隂縣故城北河隂屬漢五原郡又東徑九原縣故城南秦始皇置九原郡治此漢武帝元朔二年更名五原也王莽之獲降郡成平縣矣西北接對一城蓋五原縣之故城也王莽之填河亭也竹書紀年魏襄王十七年邯鄲命吏大夫奴遷于九原又命將軍大夫適子伐吏皆貂服矣按今竹書紀年作適子代史皆貂服其城南面長河北背連山秦始皇逐胸奴並河以東屬之陶山築亭鄣以為河上塞徐廣史記音義曰陶山在五原北即此山也始皇二十四年起自臨洮東暨遼海西並隂山築長城及南越地晝警夜作民勞怨苦故楊泉物理論曰秦始皇使蒙恬築長城死者相屬民歌曰生男愼勿舉生女哺用餔不見長城下尸骸相支柱其寃痛如此矣蒙恬臨死曰夫起臨洮屬遼東城塹萬餘里不能不絶地脉此固當死也又東過臨沃縣南按臨沃屬五原當在稒陽縣西王莽之振武也河水又東枝津出焉河水又東流石門水南注之水出石門山地理志曰北出石門鄣即此山也西北趣光祿城甘露三年呼韓邪單于還詔遣長樂衛尉高昌侯董忠車騎都尉韓昌等將萬六千騎送單于居幕南堡光祿徐自為所築城也故城得其名矣城東北即懷朔鎮城也其水自障東南流徑臨沃城東東南注于河河水又東徑稒陽縣故城南王莽之固隂也地理志曰自縣北出石門障河水决其西南隅又東南枝津出焉水上承大河於臨沃縣東流七十里北溉田南北二十里注于河五原郡東部都尉治在今榆林衛廢勝州西南漢志稒陽縣北出石門障得光祿城太初三年光祿徐自為出五原塞築亭障西北至盧朐山謂之光祿塞即此按中受降城本秦九原郡地唐置天德軍元和志云武川城在軍北三百里後魏六鎮從西第三鎮也自北出石門障即光祿城古入胸奴之大路河水又東徑塞泉城南而東注又東過雲中楨陵縣南又東過沙南縣北從縣東屈南過沙陵縣西塞泉城在今廢勝州界大河東徑咸陽縣故城南王莽之賁武也河水屈而下疑漏東西等字流白渠水注之水在塞外西徑定襄武進縣故城北西部都尉治王莽更曰伐蠻世祖建武中封趙慮為侯國也白渠水西北徑成樂北郡國志曰成樂故屬定襄也魏土地記曰雲中城東八十里有成樂城今雲中郡治一名石盧城也白渠水又西徑魏雲中宮南魏土地記曰雲中宮在雲中故城東四十里白渠水又西南徑雲中故城南故趙地虞氏記云趙侯自五源河曲築長城東至隂山又於河西造大城一箱崩不就乃改卜隂山河曲而禱焉晝見羣鵠遊於雲中徘徊經日見大一作火灮在其下武侯曰此為我乎乃即于其處築城今雲中城是也秦始皇十三年立雲中郡縣曰逺服矣按漢志雲中縣注莽曰逺服則縣字疑當作莽字白渠水又西北徑沙陵縣故城南王莽之希恩縣也其水西注沙陵湖又有芒湖水朱本作芒于水出塞外南徑鍾山山即隂山故郎中侯應言於漢曰隂山東西千餘里單于之苑囿也自孝武出師攘之于漠北胸奴失隂山過之未嘗不哭謂此山也其水西南徑武臯縣王莽之永武也又南徑原陽縣故城西又西南與武泉水合其水東出武泉縣之故城西南縣即王莽之所謂順泉者也水南流又西屈徑北輿縣故城南按地理志曰五原有南輿縣王莽之南利也故此加北舊中部都尉治十三州志曰廣陵有輿故此加北疑太疏逺也按今本漢書地理志五原郡有南興縣莽曰南利而無南輿酈注作南輿豈古本是輿而後人訛作興耶其水又西南入芒于水西南徑白道南谷口有長城在右策朱本作側然谷口二句疑尚有訛脫帶長城背山面澤謂之白道南谷口有城自城北出有高坂謂之白道嶺㳂路惟土穴出泉挹之不窮余每讀琴操此下疑有訛誤恐不接此見琴愼相和雅歌録云飲馬長城窟及其扳陟斯途逺懷古事始知信矣非虛言也顧瞻左右山樹朱本注謝兆申云宋鈔本作山椒之上有垣若頽基焉㳂溪亘嶺東西無極疑趙武靈王之所築也芒于水又南西徑雲中城北白道中溪水注之水發源武川北塞中其水南流徑武川鎮城以景明中築以禦北狄矣其水西南流厯谷徑魏帝行宮東世謂之阿計頭殿宫城在北門嶺北阜上其城員角而不方四門列觀城內惟臺殿而已其水又西南厯中溪出山西南流於雲中城北於雲中城北五字疑衍南注芒于水芒于水又西下有訛誤塞水出懷朔鎮東北芒中南流徑廣德殿西山下余以太和十八年從高祖北巡屆於隂山之講武臺臺之東有高祖講武碑碑文是中書郎高聰之辭也自臺西出南上山山無樹木惟童阜耳即廣德殿之所在也其殿四柱兩厦堂宇綺拱圗畫奇禽異獸之象殿之西北便得焜煌堂雕盈鏤角取狀古之溫室也其時帝幸龍荒遊鸞朔北南秦王仇池楊難當捨蕃委誠重譯拜闕陛見之所也故殿以廣德為名魏太平真君三年刻石樹碑勤宣時事碑頌云肅清帝道振攝四荒有蠻有戎自彼氐羌無思不服重譯稽顙恂恂南秦斂斂推亡峩峩廣德奕奕焜煌侍中司徒東郡公崔浩之辭也碑隂題宣成公李孝伯尚書盧遐等從臣姓名若新鏤焉其水厯谷南出隂山西南入芒于水芒于水又西南注沙陵湖湖水西南入于河河水南入楨陵縣西北緣胡山上下疑有訛誤或連上經文俱是注厯沙南縣東北兩山二縣之間南出余以太和中為尚書郎從高祖北巡親所徑涉縣在山南王莽之楨陸也北去雲中城一百二十里縣南六十許里有東西大山山西枕河河水南流脉水尋經殊乖川去之次似非關究也錐指云緣胡山在今平虜衛西北黃河西來折而南流處楨陵即廢東勝州也其故城在衛西北河東岸沙南故城在西岸榆林塞外唐為勝州地經文當云又南徑雲中楨陵縣西又南徑沙南縣東則與道元所見者符矣又南過赤城東又南過定襄桐過縣西定襄郡漢髙六年置王莽之得降也桐過縣王莽更名椅桐者也河水於二縣之間濟有君子之名今山西平虜衛西有君子濟此條疑是注昔漢桓帝十三年西幸榆中東行代地洛陽大賈齎金貨隨帝後行夜迷失道往投津長曰子封朱云御覽引此無曰子封三字疑當作田子封是津長姓名送之渡河賈人卒死津長埋之其子尋求父喪發冢舉尸資費一無所損其子悉以金與之津長不受事聞於帝朱云御覽有兩帝字曰君子也即名其津為君子濟濟在雲中城西二百餘里河水又東南左合一水水出契吳東山西徑故里南而北俗謂之契吳亭其水又西流注于河河水又南樹頽水注之水出東山西南流右合中陵川水水出中陵縣縣下黃本闕一字吳本補作東字謝兆申云宋本作西字東南山下北俗謂之大浴山其水亦取名焉東北流徑中陵縣故城東北俗謂之北右突城王莽之遮害也十三州志曰善無縣南七十五里有中陵縣世祖建武二十五年置其水又西北右合一水水出東山北俗謂之貸敢山水又受名焉其山自西北流注于中陵水又西北流徑善無縣故城西王莽之隂館也十三州志曰舊定襄郡治地理志曰雁門郡治其水又西北流又會一水水出東山下北俗謂之吐文水山又取名焉北流徑鋤亭南西流土璧亭南西出峽左入中陵水水又北分為二水一水東北流謂之流水又東徑沃陽縣坎城南坎城當作故城北俗謂之可不埿城王莽之敬陽也又東北徑沃陽城東又東合可不埿水出東南六十里山下西北流注沃水又會東徑參合縣南會字疑衍魏因參合陘以即名也北俗謂之倉鶴陘道出其中亦謂之參合口徑在縣之西北朱本作徑左縣之西北愚意當是陘在縣之西北即燕書所謂太子寶自河還師參合三軍奔潰即是處也魏立縣以𨽻凉城郡也西去沃陽縣故城二十里縣北十里有都尉城地理志曰沃陽縣西部都尉治者也北俗謂之阿養城沃陽衛在今平鹵衛東南其水又東合一水水出縣東南六十里山下北俗謂之災豆渾水西北流注于沃水又東北流注鹽池地理志曰鹽澤在東北者也今鹽池西南去沃陽故城六十五里池水澄渟淵而不流東西三十里南北二十里池北七里即凉城郡注疑作治池西有舊城俗謂之凉城也郡取名焉地理志曰澤有丞長朱云漢書地理志沃陽下注云鹽澤在東北有長丞則此丞長當作長丞此丞即長丞所治也城西三里有小阜阜下有泉東南流注池北俗謂之大谷此隹疑當作此阜水亦受目焉中陵川水自枝津西北流右合一水于連嶺北出沃陽縣東北山下北俗名之烏伏真山水曰誥升袁河朱云當作緣河愚謂當作袁水西南流徑沃陽縣左合中陵川亂流西南與一水合北俗謂之樹頽水水出東山下西南流右合誥升袁水亂流西南注分為二水左水枝分南出北俗謂之太河羅朱本云太河羅當作太羅河右水西徑故城南北俗名之昆新城其水自城西南流注于河河水又南太羅水注之水源上承樹頽河南流西轉徑武縣當是武州縣故城南武縣故城在今繁峙縣界十三州志曰武縣在善無西百五十里北俗謂之太羅城水亦藉稱焉其水西南流右水注之水𨗳故城西北五十里南流徑城西北名之曰故槃回城又南流注太羅河太羅河又西南流注于河河水又左得湳水口平虜衛西有吕梁山湳水口當在今河曲縣西北天橋峽也水出西河郡美稷縣東南流東觀記曰郭伋細侯郭伋下疑脫字字為并州牧前在州素有恩德老小相携道路行部到西河美稷數百小兒各騎竹馬迎拜伋問兒曹何自逺來曰聞使君到喜故迎伋謝而發去諸兒復送郭外問使君何日還伋計日告之及還先期一日念小兒即止野亭須期至乃往其水又東南流羌人因水以氏之漢冲帝時羌湳狐奴歸化蓋其渠帥也其水俗亦謂之遄波水東南流入長城東鹹水出長城西鹹谷東入湳水又東徑西河富昌縣故城南王莽之富城也湳水又東流入于湳水左合一水出善無縣故城西南八十里其水西流厯于吕梁之山而為吕梁洪其巖層岫衍澗曲崖深巨石崇竦壁立千仭河流激蕩濤湧波襄雷奔雲泄震天動地曰吕梁未闢河出孟門之上蓋大禹所闢以通河也司馬彪曰吕梁在離石縣西今於縣西厯山尋河乃無過峘朱云當作遏岨至是乃為河之巨嶮即吕梁矣在離石北以東可二百有餘里也一本無也字又南過西河圁音銀陽縣東輿地廣記唐立銀州東北有無定河即圁水也後人因潰沙急流深淺不定故更今名名明一統志無定河一名奢延水又圁水西河郡漢武帝元朔四年置王莽改曰歸新圁水出上郡白土縣圁谷東徑其縣南地理志曰圁水出其西東入河王莽更曰黃土也東至長城與神銜朱本作神御下同水合水出縣南銜山峽山東出至長城入于圁圁水又東徑鴻門縣縣故鴻門亭地理風俗記曰圁隂縣西五十里有鴻門亭天封菀火井廟火從地中出按漢志云鴻門有天封宛火井祠火從地出則菀當作宛張衡南都賦云天封大狐列仙之陬圁水又東梁水注之水出西北梁谷東南流注圁水又東徑圁隂縣北漢惠帝五年立王莽改曰方隂矣又東桑谷水注之水出西北桑溪東北桑溪東北桑溪四字疑衍東北流入于圁圁水又東徑圁縣南東流注于河按禹貢錐指引此作又東徑圁陽縣南又東注于河云今米脂縣西北有圁隂縣故城圁陽當在其東北也史記晉文公攘戎翟居于圁洛之間即此水河水又東端水入焉水西出號山山海經曰其山木多陘㮨按山海經當作漆棕其草多芎窮是多冷石朱云按山海經作汵石郭注音金今云冷石未詳端水出焉而注于河河水又南諸次之水出焉水出上郡諸次山山海經曰諸次之山諸次水出孫云山海經作諸次之山諸次之水出焉是山多木無草鳥獸莫居是多衆蛇其水東徑榆林塞世又謂之榆林山即漢書所謂榆溪舊塞者也上郡即今陜西延安府綏德州榆林塞在廢勝州南界自溪西去悉榆林黃作栁朱作林之藪矣緣厯沙陵屆龜兹縣西出故謂廣長榆也王恢云樹榆為塞謂此矣蘇林以為榆中在上郡非也按始皇本紀西北逐胸奴自榆中並河以東屬之隂山然榆中在金城東五十許里隂山在朔方東以此推之不得在上郡漢書音義蘇林為是非也其水東入長城小榆林水合焉厯澗朱本作厯源西北窮谷其源也又東合首積水西出首積溪溪東注諸次水又東入于河山海經曰諸次之水東流注于河即此水也河水又南湯水注之山海經曰水出上申之山上無草木而多硌石郭注作硌磊硌大石貌也硌音洛下多榛楛湯水出焉東流注于河又南錐指引此南下有徑字離石縣西奢延水注之離石縣今永寧州奢延故城在廢夏州西南水西出奢延縣西南赤沙阜東北流山海經曰曰字疑衍所謂生水出盂山者也郭景純曰盂或音明漢破羌將軍假熲破羌於奢延澤虜走洛川洛川在南俗因縣土謂之奢延水又謂之朔水矣東北流徑其縣故城南王莽之奢節也赫連龍升七年按十六國春秋赫連無龍升七年其年改元鳳翔于是水之北黑水之南遣將作大匠梁公叱于阿梨按夏録作叱于阿利改築大城名曰統萬城蒸土加功雉堞雖久崇墉若新并造五兵器鋭精利乃成百鍊為龍雀大環號曰大夏龍雀銘其背曰古之利器吳楚湛盧大夏龍雀名冠神都可以懷逺可以柔逋夏録作柔邇如風靡草咸服九區夏録作九域世甚珍之又鑄銅為大鼓及飛廉翁仲銅駝龍虎皆以黃金飾之列于宫殿之前則今夏州治也夏録較詳附録于後十六國春秋夏録曰鳳翔元年春三月大赦境內殊死以下改元鳳翔以叱干阿利領將作大匠發嶺北夷夏十萬餘户改築都城于朔方水之北黑水之南名曰統萬城下書曰古人制起城邑或因山水或以義立名今城已建萬堵斯作克成弗逺宜有美名朕方統一天下君臨萬邦可以統萬為名阿利性尤工巧然殘忍刻暴視民如草芥乃蒸土加功以錐刺之錐入一寸即殺作人而并築之刺之不入即殺行錐者勃勃以為忠故委以營繕之任又使造五兵器鋭利尤甚乃成百錬既成呈之工匠必有死者射甲不入即斬弓人如其入也則斬鎧匠又造百鍊剛刀五口背上為龍雀大環兼以金縷作一龍形長三尺九寸號曰大夏龍雀銘其背曰古之利器吳楚湛盧大夏龍雀名冠神都可以懷逺可以柔邇如風靡草威服九域世甚珍之復鑄銅為一大鼓及飛廉翁仲銅駝龍虎之形皆以黃金飾之列於宫殿之前凡殺工匠數千餘人以是器物莫不精麗奢延水又東北與溫泉合源而北出沙溪而東南流注奢延水奢延水又東黑水入焉出奢延縣黑澗按朱云當作奢延水又東與黑水合黑水出奢延縣黑澗謝云按宋本黑水入焉水出奢延縣黑澗宋刻本無焉水二字東南厯沙陵注奢延水奢延水又東合交蘭水出龜兹交蘭谷東南流注奢延水奢延水又東北流與鏡波水合水源出南邪山南谷東北流注于奢延水奢延水又東徑膚施縣帝原水西北出龜兹縣東南流縣因處龜兹降胡著稱又東南注奢延水又徑膚施縣南秦昭王三年置上郡治漢髙祖并三秦復以為郡王莽以漢馬員為增山連率歸世祖以為上郡太守司馬彪曰增山者上郡之别名也東入五龍山地理志曰縣有五龍山帝原水自下亦為通稱也按漢地志上郡膚施縣有五龍山帝源水陽周縣橋山有黃帝冢而西河自有增山縣厯長城東出于赤翟白翟之中又有年水宋本作平水出西北平溪東南入奢延水又東走馬水注之水止疑誤當作出西南長城北陽周縣故城南昔二世賜䝉恬死于此王莽更名上陵畤山上有黃帝冢故也帝崩惟弓劍存焉故世稱黃帝仙矣其水東流昔假熲追羌出橋門至走馬水聞羌在奢延澤即此處也門即橋山之長城門也始皇令太子扶蘇與䝉恬築長城起于臨洮至于碣石即是城也其水東北流入長城又東北注奢延水又東與白羊水合其水出于西南白羊溪巡溪東北注于奢延水奢延又東入于河山海經曰生水東流注于河河水又南陵水注之水出陵川北溪南徑其川西轉入河河水又南得離石水口離石何云離石上當有水出二字北山南流徑離石縣故城西史記云秦昭王伐趙取離石者也漢武帝元朔三年封代共王子劉歸按史記表當是劉綰為侯國後漢西河郡治也其水又徑隰城故城南隰城故城在今孝義縣界漢武帝元朔三年封代共王子忠為侯國王莽之兹平亭也按漢志莽曰慈平亭胡俗語訛尚有千城何云千疑作平之稱其水西流注于河也又南過中陽縣西中陽縣即今孝義縣界中南疑是陽縣故城在東東翼汾水隔越重山不濵于河也又南過土軍縣西今山西汾州石樓縣有土軍縣故城吐京郡治故城即土軍縣之故城也胡漢譯言音訛僞變矣其城員長而不方漢高帝十一年以封武侯宣義為侯國縣有龍泉出城東南道左山下牧馬川上多産名駒駿同滇池元朱云元下脫一馬字河其水西北流至其城東南土軍水出道左高山西南注之龍泉水又北屈徑其城東西北入于河河水又南合契水傍溪東入窮谷其源也又南至祿谷水口水源東窮此溪也河水又南得大蛇水發源溪首西流入河河水又右納辱水朱本作又南又納辱水山海經曰辱水出于鳥山其上多桑其下多楮陰多鐵陽多玉其水東流注于河俗謂之秀延水東流得浣水合傍溪西轉窮溪便即浣水之源也延水又東會于根水西流溪下根水所發而東北注延水東南露跳水西出露溪東流又東北入延水亂流注于河河水又南左合信支水水發源東露西流入于河河水又南左會石羊水徑溪東入道源窮谷西流注于河又南過上郡髙奴縣東今延安府膚施縣北百里有金明城即漢高奴縣也城谷水東啓荒源西厯長溪西南入于河水又南合溪口北出孔山南厯溪西流注于河孔山之上有穴如車輪三所東西相當相去各二丈許南北直通故謂之孔山也山在莆城朱本云莆城當作蒲城西南三十餘里河水又右會區水山海經曰次四經之首曰陰山西北百七十里曰申山其上多穀柞其下多杻橿按山海經此下脫其陽二字多金玉區水出焉而東流注于河世謂之清水上郡東流入于長城徑老人山下又東北流至老人谷傍水北出極溪便得水源清水又東得龍尾水口水出北地神泉鄣北山龍尾溪東北注清水又東會三湖水水出南山三湖谷東北流入清水清水又東徑髙奴縣合豐林水地理志謂之洧水也故言高奴縣有洧水肥可㸐㸐古燃字黃本訛作醮水上有肥可接取用之博物志稱酒泉延壽縣南山出泉水大如莒注地為溝水有肥如肉汁取著器中始黃後黑如凝膏然極明與膏無異膏車及水碓缸甚佳彼方人謂之石漆水肥亦所在有之非止高奴縣洧水也項羽以封董翳為翟王居之三秦此其一也漢高祖破以縣之王莽之利平矣民俗語訛謂之高樓城也豐林川長津瀉注北流會洧洧水又下疑漏東西等字有溪谷水注之水西出奚川東南流入洧水又東注于河河水又南疑脫徑字蒲川石樓山南徑蒲城東即重耳所奔之處也又南厯蒲子縣故城西今大魏之汾州治徐廣晉紀稱劉淵自離石南移蒲子者也闞駰曰蒲城在西北漢武下漏帝字置按漢志河東郡蒲子縣注應劭曰武帝置師古曰重耳所居也又蒲反縣下注莽曰蒲城朱本引應劭云即蒲反舊邑其水南出得黃盧水口東出厯蒲子城南東北入谷極溪便水之源也又南合紫川水水出東北出疑作山紫川谷西南合江水江水出江谷西北入紫水紫水又西北入蒲水蒲水又西南入于河水河水入南黑水水出定陽縣西山二源竒發同瀉一壑東南流徑其縣北又東南流右合定水俗謂之白水也水西出其縣南山定水谷更徑定陽縣故城南應劭曰縣在定水之陽也定水又東注于黑水亂流東南入于河蒲子縣故城今在隰州水經注集釋訂訛卷三
