body:
  text: 水經注集釋訂訛卷三十七歸安沈炳巽撰淹水葉榆水夷水油水澧水沅水泿水淹水出越嶲遂久縣徼外吕忱曰淹水一曰復水也東南至蜻蛉縣縣有禺同山明一統志作碧雞山在雲南府城西三十里其山神有金馬碧雞光景倏忽民多見之漢宣帝遣諫大夫王褒祭之欲致其雞馬褒道病而卒是不果焉王褒碧雞頌曰敬移金精神馬縹碧之雞王褒碧雞頌曰持節使者敬移金精神馬彯彯碧雞歸來歸來漢德無疆黃龍見兮白虎仁歸來歸來可以為倫歸來翔兮何事南荒也故左太沖蜀都賦曰金馬騁光而絶影碧雞倏忽而耀儀又東過姑復縣南東入於若水淹水徑縣之臨池澤而東北徑雲南縣西今屬大理府東北注若水也益州葉榆河出其縣北界屈從縣東北流縣故滇池葉榆之國也漢武帝元封二年使唐蒙開之以為益州郡郡有葉榆縣今為大理府治縣西北十里有吊烏山衆鳥千百為郡共會鳴呼啁哳每嵗七八月至十六七日則止一嵗六至雉雀來吊夜然火而取之其無嗉不食似特悲者以為義鳥則不取也俗言鳯凰死於此山故衆鳥來吊因名曰吊烏明一統志鳯羽山在大理府浪穹縣三十里相傳蒙氏細奴邏興時有鳯翔於此故名鳯羽後鳯死每嵗衆鳥哀吊其上故又名鳥吊至今土人以鳥來時舉火取之鳥見火輒赴火自死郭義恭廣志楪榆縣屬永昌郡有吊鳥山在縣西北八十里有阜山衆鳥千百群共會嗚呼啁哳每嵗七月八月晦望至集六日則止嵗凡六至雉雀來吊特悲九州要記云雲南葉榆廢邑吊鳥山有鳥千百羣飛啁啾一嵗必一度大集是鳯凰死也李彤四部云弔鳥山俗傳鳯死於上每嵗七月至九月羣鳥常來集其處縣之東有葉榆澤葉榆水所鍾而為此川藪也過不韋縣縣故九隆哀牢之國也有牢山其先有婦人名沙臺後漢書作一華陽國志作壺居於牢山捕魚水中觸沉木若有感因懷孕産十子後沉木化為龍出水九子驚走小子不能去背龍而坐龍因拖之後漢書作砥之其母鳥語謂背為九謂坐為隆因名為九隆及長諸兄遂相共推九隆為王後牢山下有一夫一婦生十女九隆皆以為妻後漢書作九隆兄弟皆娶以為妻遂因孳育皆畫身像龍文衣皆著尾九隆死世世不與中國通漢建武二十三年王遣兵乘革船後漢書作箄船下同注云箄音蒲隹反縛竹木為箄以當船也南下水攻漢鹿崩後漢書作鹿茤下同音多民鹿崩民小弱將為所擒於是天大震雷疾雨南風漂起水為逆流波湧二百餘里革船沉沒溺死數千人後數年復遣六王將萬許人攻鹿崩鹿崩王與戰殺六王哀牢耆老共埋之其夜虎掘而食之明旦但見骸骨驚怖引去乃懼謂其耆老小王曰哀牢犯徼自古有之今此攻鹿崩輒被天誅中國有受命之王乎何天祐之明也即遣使道一作詣越嶲奉獻求乞內附長保塞徼漢明帝永平十二年置為永平郡當作永昌郡後漢書郡國志明帝永平十二年分益州置永昌郡郡治不韋縣蓋秦始皇徙吕不韋子孫於此故以不韋名縣後漢書郡國志不韋縣下引華陽國志曰孝武置不韋縣徙南越相吕嘉子孫宗族居之因名不韋以彰其先人之惡此注云秦始皇徙不韋子孫於此故以名縣未詳孰是北去葉榆六百餘里榆水不徑其縣自不韋北注者盧倉禁水耳榆水自縣南徑遂久縣東又徑姑復縣西與淹水合又東南徑永昌邪龍縣縣以建興三年劉禪分隸雲南於不韋縣為東北東南出益州界葉榆水自邪龍縣東南徑秦藏漢志作秦臧縣也南與濮漢志作僕水同注滇澤於連然雙柏縣也漢志秦臧連然雙柏並屬益州郡榆水自澤又東北流滇池縣南又東徑同並縣南又東徑漏江縣伏流山下復出蝮口謂之漏江左思蜀都賦曰漏江伏流潰其阿汨若湯谷之揚濤沛若濛汜之湧波諸葛亮之平南中也戰於是水之南榆水又徑賁古縣北東與盤江合盤水出津高縣東南盤町山盤町當作盢町漢志律高縣下西石空山出錫東南盢町山出銀鉛師古曰盢音呼鵙反町音挺東徑梁水郡北梁水當作渒水漢志越嶲郡有渒水縣賁古縣南水廣百餘步深處十丈甚有鄣氣朱裒之反李恢追至盤江者也蜀志李恢傳恢字德昻建寧俞元人也先主領益州牧恢為功曹歷交州刺史先主薨朱褒反叛於牂牱丞相亮南征先由越嶲而恢案道白建寧諸縣大相糾合圍恢軍於昆明時恢衆少敵倍又未得亮聲息紿謂南人曰官軍糧盡欲規退還吾中間久斥鄉里今乃得旋不能復北欲還與汝等同計謀故以誠相告南人信之故圍守怠緩於是恢出擊大破之追奔逐北南至槃江東接牂牱與亮聲勢相接南土平定恢功居多建武十九年伏波將軍馬援上言從麋泠出賁古擊益州臣所將越駱萬餘人便習戰鬪者二千兵以上弦毒矢利以數發矢注如雨所中輒死愚以行兵此道最便蓋承藉原本訛籍水利用為神捷也盤水又東徑漢興縣山溪之中多生邛竹桄榔樹樹出麵而夷人資以自給故蜀都賦曰邛竹緣嶺又曰麵有桄榔博物志云蜀中有樹名桄榔皮裏出屑如麵用作餅餌謂之桄榔麵後漢夜郎傳牂牱句叮縣有桄榔木可為麵注木皮有毛如栟櫚木剛如鐡皮中有如搗稻米片又如麥麵中作餅餌魏王花木志曰桄榔出興古者樹高七八丈其大者一樹出麵百斛盤水北入榆水諸葛亮入南中戰於盤中宋本作東是也入牂牱郡西隨縣北為西隨水又東出進桑關進桑縣牂牱之南部都尉治也水上有關故曰進桑關也故馬援言從麋泠水道出進桑王國至益州賁古縣轉輸通利蓋兵車資運所由矣自西隨至交址崇山接險水路三千里榆水又東南絶溫水而東南注於交址過交址麋泠原本訛作麊泠縣北分為五水絡交址郡中至東一作南界復合為三水東入海尚書大傳曰堯南撫交址於禹貢荆州之南垂幽荒之外故越下疑有裳字也周禮南八蠻雕題交址有不粒食者焉春秋不見於傳不通於華夏在海島人民鳥語秦始皇開越嶺南立蒼梧南海交址象郡漢武帝元鼎二年始并百越啓七郡於是乃置交址刺史以督領之初治廣信所以獨不稱州時又建朔方郡已始開北至遂交址於南上下疑有訛脫北至當作北垂遂下疑漏辟字為子孫交宋本作基址也麋泠縣漢武帝元鼎六年開都尉治交址外域記曰越王令二使者與主交址九真二郡民後漢遣伏波將軍路博德討越五路將軍到合浦令越王二使者齎牛百頭酒千鐘及二郡民户口簿詣路將軍乃拜二使者為交址九真太守主諸雒將主民如故交址郡及州本治於此也州名為交州後朱鳶漢志朱鳶縣名屬交址郡雒將子名詩索麋泠雒將女名徴側為妻側為人有膽勇將詩起賊攻破州郡服諸雒將皆屬徴側為王治麋泠縣得交址九真二郡民二嵗調賦後漢遣伏波將軍馬援將兵討側詩走入金溪究三嵗乃得爾時西蜀並遣兵共討側等悉定郡縣為令長也後漢書西南夷傳建武十六年交址女子徴側及其妹徴二反攻郡徴側者麋泠縣雒將之女也嫁為朱鳶人詩索妻甚雉勇交址太守蘇定以法繩之側忿故反於是九真日南合浦蠻里皆應之凡略六十五城自立為王交址刺史及諸太守僅得自守十八年遣伏波將軍馬援樓船將軍假志發長沙桂陽零陵蒼梧兵萬餘人討之明年夏四月援破交址斬徴側徴二等餘皆降散嶺表悉平山多大蛇名曰髯地長十丈圍七八尺常在樹上伺鹿獸鹿獸過便低頭繞之有頃鹿死先濡令濕訖便吞頭角骨皆鑽皮出山夷始見蛇不動時便以大竹籖籖蛇頭至尾殺而食之以為珍異故楊氏南裔異物志曰髯惟大蛇既洪且長采色駮犖其文錦章食灰疑訛當作豕吞鹿服成養創賓享嘉宴是豆是觴言其養創之時肪腴甚肥搏之以婦人衣投之則蟠而不起走便可得也此二水左水東北徑望海縣南建武十九年馬援征徴側置又東徑龍淵縣北又東合南水自麋泠縣東徑封溪縣北交州外域記曰交址昔未有郡縣時土地有雒田其田從潮水上下民墾食其田因名為雒民設雒王雒侯主諸郡縣縣多為雒將雒將銅印青綬後蜀王子將兵三萬來討雒王雒侯服諸雒將蜀王子因稱為安陽王後南越王尉他舉衆攻安陽王安陽王時有神人名臯通下輔佐為安陽王治神弩一張一發殺三百人南越王知不可戰却軍住武寧縣按晉太康記縣交址一本縣下有屬字但此句在後此處八字與上下不相接疑是衍文越遣太子名始降服安陽王稱臣事之安陽王不知通神人遇之無道通便去語王曰能持此弩王天下不能持此弩者亡天下通去安陽王有女名曰眉珠見始端正珠與始交通始問珠令取父弩視之始見弩便盜以鋸截弩訖便逃歸報越王越進兵攻之安陽王發弩弩折遂敗安陽王下船徑出於海今平道縣後王宫城見有故處晉太康地記縣屬交址越遂服諸雒將馬援以西南治逺路徑千里分置斯縣治城郭穿渠通道溉灌以利其民縣有猩猩獸形若黃狗又狀貆豚人面頭顔端正善與人言音聲麗妙如婦人好女對語交言聞之無不酸楚其肉甘美可以斷穀窮年不厭又東徑浪泊馬援以其地高自西里進屯此又東徑龍淵縣故城南又東左合此疑作北水建安二十三年立州之始蛟龍磐編於水南北二津故改龍淵以龍編為名也盧循之冦交州也交州刺史杜惠當作慧下同度率水步晨出南津以火箭攻之燒其船艦一時潰散循亦中矢赴火而死於是斬之傳首京師惠度以斬循勳封龍編侯晉書盧循傳循攻交州至龍編刺史杜慧度譎而敗之循勢屈知不免先鴆妻子十餘人因自投於水慧度取其尸斬之傳首京師史云投水此云赴火未知孰是劉欣期交州記曰龍編縣功曹左飛曽化為虎數月還作吏既言其化亦化上下疑有訛字無不在牛哀易虎不識厥兄當其革狀安知其訛變哉淮南子牛哀病七日化為虎其兄掩户而入覘之虎搏而殺之其水又東徑曲易縣東流注於浪鬱漢志交址郡曲易縣師古曰易古陽字浪當作浪經言於郡東界復合為三水此其一也其次一水東徑封溪縣南郡國志封溪縣屬交址郡建武十九年置又東南徑西子縣南西子漢志屬交址郡郡國志作西于又東徑羸􅖮縣北又東徑北帶縣南又東徑稽徐縣涇水注之水出龍編縣高山東南流入稽徐縣注於中水中水又東徑羸􅖮縣南交州外域記曰縣本交址郡治也林邑記曰縣本自交址南行都官塞浦出焉其水自縣東徑安定縣北帶長江江中有越王所鑄銅船潮水退時人有見之者交州記曰越人鑄銅為船在安定江潮退時見其水又東流隔水有泥黎城言阿育王所築也又東南合南水南水又東北徑九德郡北交州外城當作域記曰交址郡界有扶嚴究在郡之北隔渡一江即是水也江北對交址朱鳶縣又東徑浦陽縣北又東無功縣北漢志九真郡武帝元鼎六年開領縣七無功其一也郡國志作無功晉書地理志有九真郡復有九德郡此蓋從晉志也浦陽晉志屬九德郡建武十九年九月馬援上言臣謹與交址精兵萬二千人與大兵合二萬人船車大小二千艘自入交址於今為盛十月援南入九真至無功縣賊渠降進入餘發漢志餘發縣屬九真郡渠帥朱伯棄郡亡入深林巨藪犀象所聚羣牛數千頭時見象數十百為羣援又分兵入無編縣王莽之九真亭至居風縣帥不降並斬級數十百九真乃靖其水又東徑茍漏縣漢志茍漏屬交址郡縣帶江水江水對安定縣林邑記所謂外越安定縣紀粟者也縣江中有潛牛形似水牛上岸鬭角軟還入江水角堅復出又東與北水合又東注鬱亂流而逝矣此其三也平撮二字疑訛通稱同歸鬱海故經有入海之文矣夷水出巴郡魚復縣江今為奉節縣夔州府治魚復故城在縣西夷水即佷山清江也水色清照十丈分沙蜀人見其澄清因名清江也昔廩君浮土舟於夷水據捍關而王巴是以法孝直有言魚復捍關臨江據水實益州禍福之門夷水又東徑建平沙縣晉地志建平郡有沙渠縣此漏渠字今為夔州府大昌縣元和志施州清江縣本漢南郡巫縣地吳之沙渠縣也縣有巫城南岸水山道五百里其水歷縣東出焉東南過佷山縣南漢志佷山屬武陵郡後漢屬南郡晉屬宜都郡皆作佷此云狼誤今為荆州府長陽縣縣西有佷山故城夷水自沙渠入縣水流淺狹裁得通船東徑難留城南城即山也獨立峻絶西面上里餘得石穴把火行百許步得二大石磧並立穴中相去一丈俗名隂陽石隂石常濕陽石常燥每水旱不調居民作威儀服飾往入穴中旱則鞭隂石應時雨多雨則鞭陽石俄而天晴相承所説往往有效但捉鞭者不夀人頗惡之故不為也東北面又有石室可容數百人每亂民入室避賊無可攻理因名難留城也昔巴蠻有五姓未有君長俱事鬼神乃共擲劍於石穴約能中者奉以為君巴氏子務相乃中之人又令乘土舟約浮者當以為君惟務相獨浮因共立之是為廩君乃乘土舟從夷水下至鹽陽鹽水有神女謂廩君曰此地廣大魚鹽所出願留共居廩君不許鹽神暮原本訛慕輒來宿旦化為蟲羣飛蔽日天地晦暝積十餘日廩君因伺便射殺之天乃開明廩君乘土舟下及夷城夷城石岸嶮曲其水亦曲廩君望之而歎山崖為崩廩君登之上有平石方二丈五尺因立城其傍而居之四姓臣之死精魂化而為白虎故巴氏以虎飲人血遂以人祀鹽水即夷水也又有鹽石即鹽陽石也盛𢎞之以是推之疑即廩君所射鹽神處也將知是隂石是對陽石立名矣事既鴻古難為明徴夷水又東徑石室在層巖之上石室南向水出其下懸崖千仞自水上徑望見每有陟山嶺者扳木側足而行莫知其誰村人駱都小時到此室邊採蜜見一仙人坐石牀上見都凝矚不轉都還招村人重往則不復見鄉人今名為仙人室袁嵩云都孫昔尚孝朱本云孝字當作存夷水又東與溫泉三水合大溪南北夾岸有溫泉對注夏暖冬熱上常有霧氣痬疾百病浴者多愈父老傳此泉先出於鹽於今水有鹽氣夷水有鹽水之名此亦其一也夷水又東徑佷縣故城南縣即山名也孟康曰音恆出藥草恆山今世以銀為音也舊武陵之屬縣南一里即清江東注矣南對長楊溪隋改佷山縣曰長楊以溪得名唐又改楊為陽溪水西南潛穴穴在射堂射射疑衍朱云宋本作村東六七里谷中有石穴清泉濆流三十許步復入穴即長楊之源也水中有神魚大者二尺小者一尺居民釣魚先陳所須多少拜而請之拜訖投釣餌得魚過數者水輒波湧暴風卒起樹木摧折水側生異花路人欲摘者皆當先請不得扳取水源東北之疑作有風井山回曲有異勢穴口大如盆袁嵩云夏則風出冬則風入春秋分則靜余往觀之其時四月中去穴數丈須臾寒栗卒至六月中尤不可當往人有冬過者置笠穴中風吸之經月還步楊溪得其笠則知潛通矣其水重源顯發北流注於夷水此水清冷甚於大溪縱暑伏之辰尚無能澡其津流也縣北十餘里有神穴平居無水時有渴者誠啓請乞輒得水或戲求者水終不出縣東十許里至平樂村又有石穴出清泉中有潛龍每至大旱平樂村左近村居輦草穢著穴中龍怒須臾水出蕩其草穢傍側之田皆得澆灌從平樂順流五六里東亭村北山甚高峻上合下空空徼東西廣二丈許起高如屋中有石林甚整頓傍生野韭人往乞者神許則風吹别分隨偃而揃不得過越不偃而揃輒凶往觀者去時持平暨處自然恭肅矣又東過夷道縣北今為荆州府宜都縣故城在縣西夷水又東徑虎灘岸石有虎像故因以名灘也夷水又東徑釡瀨其石大者如釡小者如刁斗形色亂真雜石何氏改惟實中耳夷水又東北有水注之其源百里與丹水出西南望州山山形竦峻峯秀甚高東北白巖壁立西南小演通行登其頂平可有三畝許上有故城城中有水登城望見一州之境故名望州山世俗語訛今名武鍾山山根東有湧泉成溪即丹水所發也下注丹水天隂欲雨輒有赤氣故名曰丹水矣丹水又徑亭訛字下有石穴甚深未嘗測其逺近穴中蝙蝠大者悉多倒懸玄中記曰蝙蝠百嵗者倒懸得而服之使人神仙穴中有泉冬溫夏冷秋則入藏春則出遊民至秋闌斷水口得魚大者長四五尺骨軟肉美異於餘魚丹水又徑其下積而為淵淵有神龍每旱村人以芮草疑漏投字淵上流魚則多死龍怒當時大雨丹水又東北流兩岸石上有虎迹甚多或深或淺皆悉成就自然咸非人工丹水又北注於夷水水色清徹與大溪同夷水又東北徑夷道縣北而東注東入於江夷水又徑宜都北東入大江有涇渭之比亦謂之佷山北溪水所經皆石山略無土岸其水虛映俯視遊魚如乘空也淺處多五色石冬夏激素飛清傍多茂木空岫靜夜聽之恆有清響百鳥翔禽哀鳴相和巡頽浪者不覺疲而忘歸矣禹貢錐指曰渭按夷水首出魚復江尾入宜都江行五百餘里是亦荆州之沱也古時自巴入楚避三峽之嶮皆由此路史記張儀説楚王曰秦西有巴蜀大船積粟起於汶山浮江以下至楚三千餘里舫船載卒一日行三百餘里不至十日而拒扞關扞關驚則從境以東盡城守矣黔中巫郡非王所有黔中漢為武陵郡即今常德府巫郡漢為巫縣即今巫山巴東建始三縣及施州衛地也此言舟師由夷水入楚也何以知之楚世家肅王四年蜀伐楚取兹方於是楚為扞關以拒之後漢書李熊説公孫述曰東守巴郡拒扞關之口徐廣曰巴郡魚復有扞水扞關後漢志同章懷太子賢曰扞關故基在今峽州巴山縣寰宇記云廢巴山縣在長陽縣南七十里即古捍關是也唐志巴山縣隋分佷山縣置天寶八年省入長陽水經注江水自江關東徑弱關捍關江關在今奉節縣東瞿唐峽口注云弱關在建平秭歸界秭歸今歸州也蓋大江出三峽徑弱關江沱出佷山徑捍關劃然兩道儀言浮江以下拒捍關則不經巫峽明矣夷水受江處不知何時日就堙塞後漢建武中公孫述遣將田戎等乘枋箄下江關拔夷道夷陵光武命岑彭吳漢伐之彭擊破戎等率舟師長驅入江關漢留夷陵裝露橈船將三萬人泝江而上則皆取道於三峽而不復由夷水矣蓋其時水已淺狹不勝戰艦自後荆梁有事茍用舟師未有不由峽江者然酈注云沙渠裁得通船則後魏時水道猶存下逮唐初建始之北遂成斷港故章懷注西南夷傳云今施州清江縣夷水一名鹽水源出縣西都亭山清江廢縣亦在長陽縣界寰宇記云夷水自施州開蠻界流入長陽縣明一統志云夷水源出舊施州開蠻界流經建始巴東長陽至宜都入江蓋不復知此水出西北奉節之大江而以為西南施州衛之山源矣其所謂都亭山者即在開蠻界也然自漢志已不言首受江未知何故班氏疏略頗多水經注原委詳明而又有張儀之言以為證無可疑者禹導江自浮入荆必浮此水也油水出武陵孱陵縣西界東過其縣北東過五字據宋本補入孱陵縣今為荆州府公安縣又嶽州府安鄉縣縣有白石山油水所出東徑其縣西與洈水合水出高城縣洈山東徑其縣下東至孱陵縣入油水也縣治故城在今公安縣一名孫夫人城王莽更名孱陵按漢志當作陸也劉備孫夫人權妹也又更修之其城背油向澤又東北入於江油水自孱陵縣之東北徑公安縣西又北流注於大江澧水出武陵充縣今嶽州府慈利縣所轄永定九溪二衛皆漢充縣地歷山在永定衛西澧水自衛界流徑九溪衛西西歷山東過其縣南漢注充縣歷山澧水所出東至下雋入沅師古曰澧音禮澧水自縣東徑臨澧零陽二縣故界按晉地志二縣屬天門郡吳置今為澧州石門縣水之南岸白石雙立厥狀類人髙各三十丈周十四丈古老傳言昔充縣尉與零陽尉共論封境因相傷害化而為石東標零陽西碣充縣廢省臨澧即其地縣臨封縣之故治臨側澧水即為縣名晉太康四年置澧水又東茹水注之水出龍茹山水色清徹漏石分沙莊辛説楚襄王所謂飲茹溪之流者也茹水東流入澧水明一統志澧水源出嶽州府慈利縣西歷山流至石門縣會泄水又流至澧州城下合涔淡二水入于洞庭又東過零陽縣之北澧水東與溫泉水會水發北山石穴中長三十丈冬夏沸湧常若湯焉溫水南流注於澧水澧水又東合零溪水源南出陵當作零陽之山歷溪北注澧水澧水又東九渡水注之水南出九渡山山下有溪又以九渡為名山獸咸飲此水而徑越他津皆不飲之九渡水北徑仙人樓下傍有石形極方峭世名之為仙樓水自下歷溪曲折逶迤傾注行者間關每所褰泝山水之號蓋亦因事生焉九渡水又北流注於澧水澧水又東婁水入焉水源出巴東界東徑天門郡婁中晉地志作漢中縣北又東徑零陽縣注於澧水澧水又東徑零陽縣南今慈利縣北有零陽故城藴郡上下疑有訛字零溪以著稱矣澧水又東徑澧陽縣右會泄泄下當有水字泄水出建平郡東徑泄陽縣南謂之泄口今石門縣西北有泄水晉太康中置泄水又左合黃水黃水出零陽縣西北連巫山溪出雄黃頗有神異採常以冬月祭祀鑿石深數丈方得佳黃故溪水取名焉黃水北流注於泄水泄水又東注澧水謂之泄口澧水又東徑澧陽縣南南臨澧水晉太康四年立天門郡治也在今澧州西一百十里吳永安六年武陵郡嵩梁山高峯孤竦素壁千尋望之苕亭有似香爐其山洞開玄朗如門高二百丈廣二百丈孫休以為嘉祥分武陵置天門郡澧水又東歷層步出疑作山高秀特山疑作出下有峭澗泉流所發南流注於澧水又東過作唐縣北後漢郡國志武陵郡有作唐縣今為安鄉縣在澧州東南一百二十五里北至公安界六十里故城在今安鄉縣東南作唐縣後漢分孱陵置澧水入縣左合涔水水出西北天門郡界南流徑涔一作岑評屯岑評屯在今澧州界州在嶽州府西四百二十里北至公安縣八十里本漢零陽縣地隋析置澧陽縣其故城即今州治澧水在州南三里屯堨涔水溉田數千頃又東南流注於澧水澧水又東淡水出焉澧水又南徑故郡城東東轉徑作唐縣南澧水又東徑安南縣南今華容縣是晉太康元年分孱陵立淡水注之水上承澧水於作唐縣東徑其縣北又東注於澧謂之淡口王仲宣贈孫文始詩曰悠悠淡澧者也澧水又東與赤沙湖水會湖水北通江而南注澧謂之決口明一統志赤沙湖在洞庭湖西秋夏水泛與洞庭湖為一涸時惟見赤沙舊記云洞庭南達青草西亘赤沙七八百里又謂之三湖禹貢錐指按赤沙湖在今華容縣西南亦謂之赤亭湖西接安鄉縣界澧水又東南注於沅水曰澧口蓋其枝瀆耳離騷曰沅有芷兮澧有蘭又東至長沙下巂縣西北東入於江澧水流注於洞庭湖俗謂之曰澧江口也禹貢錐指云澧水自石門以西與導江無涉其南江會澧故道參以近志有可得而言者江陵縣西南二十里有虎渡口在龍州之南後漢郡守法雄有異政猛虎渡江去因名宋乾道七年湖北漕臣李燾修虎渡隄即此水經注江水自枚回洲分為南北二江北江有故鄉洲其下為龍洲南江從此東南流注於澧水同入洞庭蓋即所謂涔水也澧州志云涔水為岷江别派從公安入境為四水口在州北七十里東接安鄉湖口北連荆江又東南流過焦圻一箭河至匯中入澧故稱涔澧楚辭望涔陽兮極浦今公安舊縣東南有涔陽鎮即其地也澧水又東徑安鄉縣南會赤沙湖東距巴陵縣百里而東入洞庭湖湖在巴陵縣西南一百五十步見元和志此導江東至於澧過九江至於東陵之故道也沅水出牂牱且蘭縣為旁溝水明一統志沅水源出四川播州流徑沅州入常德府至辰州入江又東至鐔城縣為沅水東徑無陽縣朱本云此六字宋本作經文無水出故且蘭南流至無陽故縣漢志武陵郡無陽縣無水首受故且蘭南入沅八百九十里後漢省無陽故曰無陽故縣縣對無水因以氏縣無水又東南入沅謂之無口沅水東徑無陽縣南臨運水水源出東南岸許山西北徑其縣南注於熊溪熊溪南帶移山山本在水北夕多風雨旦而山移水南故山以移為名蓋亦蒼梧郁州佐山之類也熊溪下注沅水沅水又東徑辰陽縣今為辰州府辰溪縣縣有龍溪水南出於龍橋一作嶠之山北流入於沅沅水又一一字疑訛當作東滏水注之水南出扶陽之山北流會於沅沅水又東與序溪合水出義陵郡義陵縣今為辰州府溆浦縣按漢志義陵縣屬武陵郡兩漢及晉宋俱無義陵郡此云義陵恐當作武陵為是鄜梁山西北流徑義陵縣王莽之建平縣也治序溪其城劉備之秭歸焉出五溪此下疑有訛誤綏撫蠻夷亮率諸蠻所築也所治序溪最為沃壤良田數百頃特宜稻修作無廢又西北入於沅沅水又東合柱水水導源柱溪北流注沅沅水又東徑辰陽縣南東合辰水水出縣三山谷東南流獨母水注之水源南出龍門山歷獨母溪北入辰水辰水又徑其縣北舊治在辰水之陽故即名焉楚辭所謂夕宿辰陽者也王莽更名會真矣漢志作會亭辰水又右會沅水名之為辰溪口武陵有五溪謂雄溪構溪力溪無溪酉溪按宋書五溪有辰溪而無力溪辰溪其一焉夾溪悉是蠻左右所居此四字疑當在夾溪下文氣方順或所字是雜字故謂此蠻為五溪蠻也辰水又徑沅陵縣西今辰州府治及諸縣有武溪源出武山與酉陽分山水源石上有盤瓠迹猶存矣盤瓠者高辛氏之畜狗也其毛五色高辛氏患犬戎之暴乃募天下有能得犬戎之將軍吳將軍頭者妻以少女下令之後盤瓠遂銜吳將軍之首於闕下帝大喜未知所報女聞之以為信不可違請行乃以配之盤瓠負妻入南山上石室中所處嶮絶人迹不至帝悲思之遣使不得進經二年生六男六女盤瓠死因自相夫妻織績木皮染以草實好五色衣裁置皆有尾其母白帝賜以名山其後滋蔓號曰蠻夷今武陵郡夷即盤瓠之種落也其狗皮毛嫡孫世寶録之武水南流注於沅沅水又東施水注之水南出施山溪源有陽欺崖崖色純素望同積雪下有二石先有人居處其間細泉輕流望川競注故不可以言也施水北流會於沅沅水又東徑沅陵縣北漢故頃侯吳陽之邑也王莽改曰沅陸縣北枕沅水沅水又東徑縣故治北移縣治之舊城置都尉府因岡傍阿勢盡川陸臨沅對酉二川之交會也原本誤以酉水之注錯簡於此今從禹貢錐指改正在前沅水又徑竇應明城側應明以元嘉初伐蠻所築也沅水又東溪水南出茗山一作沅水又合東溪溪水南出茗山山深回嶮人獸岨絶溪水北瀉沅川水沅水又東與諸魚溪水合水北出諸魚山山與天門郡之澧陽郡分嶺溪水合南流會於沅沅水又東夷水入焉水南出夷山北流注沅夷山東接胡頭山後漢郡國志沅陵縣有壺頭山馬援傳亦同此云胡疑訛明一統志壺頭山在辰州府東一百三十里以山頭似東海方壺故名後漢建武間武陵蠻叛遣馬援等征之進營壺頭會暑甚士卒多疾死援穿崖為室以避炎暑今山邊有石窟即援所居室也山高一百里廣圓三百里山下水際有新恩侯馬援征武溪蠻停軍處胡頭徑曲多險胡頭按傳作壺頭注引武陵記曰此山頭與東海方壺山相似因名壺頭此云胡頭誤其中紆折千灘援就胡頭希效早成道遇瘴毒終沒於此忠公獲謗信可悲矣事具馬援傳劉澄之曰沅水自胡頭分枝跨三十三渡徑交址龍編縣東北入於海脈水尋梁乃非關究但古人許以傳疑聊書所聞耳又東北過臨沅縣南今常德府治臨沅縣與沅南縣分水後漢郡國志武陵郡沅南縣建武二十六年置沅南縣西有夷望山孤竦中流浮嶮四絶昔有蠻民避冦居之故為夷望也南有夷望溪水南出重山逺注沅沅水又東得關下山東帶關溪瀉注沅瀆沅水又東歷臨沅縣西為明月池白璧灣灣狀半月清潭鏡徹上則風籟空傳下則泉響不斷行者莫不擁楫嬉遊徘徊愛玩沅水又東歷三石澗鼎足均跱秀若削成其側茂竹便娟致可玩也又東帶緑羅山頽巖臨水懸蘿釣渚漁詠幽谷浮嚮若鐘沅水又東徑平山西南臨沅水寒松上蔭清泉下注栖託者不能自絶於其側沅水又東徑臨沅縣南縣縣下當有臨字沅水因以為名漢志臨沅下應劭曰沅水出牂牱入于江荆州記曰臨沅縣南臨沅水源出牂牱且蘭縣至郡界分為五溪王莽更之監沅漢志作原縣也縣南有晉徴士漢夀詩宋本作人龔元之墓銘太元中車武子立晉書隱逸傳龔元之字道元武陵漢夀人也好學潛默安於陋巷州舉秀才公府辟不就孝武帝聞其名徴為散騎常侍領國子博士苦辭疾篤不行尋卒墓在常德府武陵縣南縣治武陵郡下本楚之黔中郡矣秦昭襄王二十七年使司馬錯以隴蜀軍攻楚割漢北與秦至三十年又取楚巫黔及江南地以為黔中郡漢高祖二年割黔中故治為武陵郡王莽更之達平都也漢志王莽更武陵郡曰建平此當作王莽更之曰建平郡也南對沅南縣後漢建武中所置也縣在沅水之隂因以沅南為名縣治故城昔馬援討臨鄉所築也沅水又東歷小灣謂之枉渚在今常德府渚東里許便得枉人山山西帶循溪一百餘里茂竹便娟披溪隂渚長川徑引逺注於沅沅水又東入龍陽縣晉縣屬武陵郡今屬常德府有淡水出漢夀縣西楊山南流東折徑其縣南縣治索城即索縣之故城也漢順帝陽嘉中改從今名闞駰以為興水所出東入沅而是水又東歷諸湖方南注沅亦曰漸水也漢志索縣下漸水東入沅水所入之處謂之鼎口沅水又東歷龍陽縣之泛洲朱本作汜洲明一統志橘洲在龍陽縣西北五十里本名泛洲長二十里即吳李衡種橘處洲長二十里吳丹陽太守李衡植柑於其上臨死勑其子曰吾洲里有木奴千頭不責衣食嵗絹千匹太史公曰江陵千樹橘可當封君此之謂矣吳末衡柑成嵗絹千匹今洲上猶有陳根餘枿蓋其遺也沅水又東徑龍陽縣北城側沅水沅水又東合夀溪內通大溪口有木連理根各一岸而凌空交合其水上承諸湖下注沅水又東至長沙下雋縣西北入於江沅水下注洞庭湖方會於江泿水出武陵鐔城漢志作成縣今為辰州府黔陽縣北界沅水谷山海經禱過之山泿水出焉而南流注於海是也山海經注泿音銀南至鬱林潭中縣今廣西栁州府治及所轄諸縣地與鄰水合水出無陽縣縣故鐔城也晉義熙中改從今名俗謂之移溪溪水南歷潭中注於泿水又東至蒼梧猛陵縣為鬱溪又東至高要縣為大水猛陵縣今為廣西梧州府藤縣高要今為廣東肇慶府治鬱水出鬱林之阿林縣東徑猛陵縣猛陵縣在廣信之西南今為梧州府治及肇慶府之封川縣王莽之猛陸也泿水於縣左合鬱溪亂流徑廣信縣地理志曰蒼梧郡治武帝元鼎六年開王莽之新廣郡縣曰廣信亭王氏交廣春秋曰元封五年交州自羸􅖮縣移治於此建安十六年吳遣臨淮步隲為交州刺史將武吏四百人之交州道路不通蒼梧太守長沙吳臣擁衆五千隲有疑於臣先使喻臣臣迎之於零陵遂得進州臣既納隲而後有悔隲以兵少恐不存立臣有都督區景勇略與臣同士為用隲惡之隂使人請臣臣往告景勿詣隲隲請不已景又往乃於廳事前中庭俱斬以首徇衆即此也吳臣當作吳巨按吳志步隲傳隲領交州刺史拜使持節征南中郎將劉表所拜蒼梧太守吳巨隂懷異心外附內違隲降意懷誘請與相見因斬徇之鬱水又徑高要縣晉書地理志曰縣東去郡五百里刺史夏避毒徙縣水居也縣有鵠奔亭廣信蘇施妻始珠鬼訟於交州刺史何敞處事與釐亭女鬼同搜神記九江何敞為交州刺史行部到蒼梧高要宿鵠奔亭夜半有一女子自稱蘇娥字始珠廣信人嫁施氏夫死有雜繒帛百二十匹及婢一人名致富欲之傍縣賣繒貨牛車一乘到此亭為亭長龔夀所殺刺致富亦死掘樓下合埋之取財物去無所告訴故來自歸於明使君敞乃遣吏捕問具服并其父母兄弟皆斬之謝承後漢書所記事同但作鵲巢亭為異王氏交廣春秋曰步隲殺吳臣區景使嚴舟船合兵二萬下取南海蒼梧人衡毅錢博宿臣部伍興軍逆隲於蒼梧高要峽口兩軍相逢於是遂交戰毅與衆投水死者千有餘人又東至南海畨禺縣西今為廣州府治及所轄各縣分為二其一南入於海鬱水分泿南注其一又東過縣東南入於海泿水東别徑畨禺山海經謂之賁禺者也交州治中合浦姚文式問云何以名為畨禺答曰南海郡昔治在今州城中與畨禺縣連接今入城東南偏有水上下疑有訛字坈陵城倚其上聞此縣人名之為畨山縣名畨禺儻謂畨山之禺也漢書所謂浮牂牱下離津同會畨禺蓋乘斯水西入越也秦并天下略定揚越置東南一尉西北一候開南海以謫徙民至二世時南海尉任囂召龍川令趙他曰聞陳勝作亂豪桀叛秦吾欲起兵阻絶新道漢書注師古曰秦所開越道也畨禺負嶮可以為國會病綿篤無人與言故召公來告以大謀囂卒他行南海尉事則拒關門設守以法誅秦所置吏以其黨為守自立為王高帝定天下使陸賈就立他為越王剖符通使至武帝元鼎五年遣伏波將軍路博德等攻南越王五世九十二嵗漢書九十三嵗而亡以其地為南海蒼梧鬱林合浦交址九真日南也建安中吳遣步隲為交州刺史隲到南海見土地形勢觀尉他舊治處負山帶海博敞渺目高則乘土下則沃衍林麓鳥獸於何不有海怪魚鱉黿鼉鮮鰐珍怪異物千種萬類不可勝記他因罡作臺北面朝漢圓基千步直峭百丈頂上三畝復道環回逶迤曲折朔望升拜名曰朝臺明一統志作朝漢臺在廣州府治西五里前刺史郡守遷除新至未嘗不乘車升履於焉逍遙隲登高逺望覩巨海之浩茫觀原藪之殷阜乃曰斯誠海島膏腴之地宜為都也宋本作都邑建安二十二年遷州番禺築立城郭綏和百越遂用寧集交州治中文武問答云朝臺在州城東北三十里裴淵廣州記曰城北有尉他墓明一統志趙他墓在畨禺縣自雞籠山以北連岡連嶺相傳他墓在焉莫知的處墓後有大罡謂之馬鞍罡在今廣州府城北十里秦時占氣者言南方有天子氣始皇發民鑿破此罡地中出血今鑿處猶存以狀取目故罡受厥稱焉王氏交廣春秋曰越王趙他生有奉制稱蕃之節死有祕異宋本作奧神密之墓他之葬也因山為墳其壠塋可謂奢大葬積珍玩吳時遣使發掘其墓求索棺柩鑿山破石費日損力卒無所獲他雖奢儉慎厥其身乃令後人不知其處有似松喬遷景牧竪固無所殘矣鄧德明南康記曰昔有盧耽仕州為治中少棲仙術善解雲飛每夕輒陵虛歸家曉則還州嘗於元會至朝不及朝列化為白鵠至閣前回翔欲下威儀以石擲之得一隻履耽驚還就列內外左右莫不駭異時步隲為廣州意甚惡之便以狀列聞遂至誅滅廣州記稱晉盧循為刺史按盧循當作滕修三國吳志吕岱傳注引王隱交廣記曰吳置廣州以南陽滕修為刺史或語修蝦鬚長一丈修不信其人後至東海取蝦鬚長四丈四尺封以示修修方服之循鄉人語循蝦鬚長一尺循以為虛責其人乃至東海取蝦鬚長四尺速送示循循始復謝厚為遣其一水南入者鬱川分𣲖徑四會四會縣今屬肇慶府入海也其一即川東别徑番禺城下漢書所謂浮牂牱下離津自此至入于越也已見前不宜復見於此疑屬衍文同會畨禺蓋乘斯水而入于越也泿水又東徑懷化縣入於海水有䱜魚裴淵廣州記曰䱜魚長二丈大數圍皮皆疑有訛脫或皆字當作可鑢物生子子小隨母覔食驚則還入母腹吳録地理志曰䱜魚子朝索食暮入母腹南越志曰暮從臍入旦由口出腹裏兩洞腸貯水以養子腸容二子兩則四焉其餘疑作水又東至龍川縣今屬廣東惠州府為涅水屈北入員水泿水枝津衍注自番禺東歷增城縣晉縣屬南海郡南越志曰縣多鵕鸃鵕鸃山雞也光色鮮明五色昡耀利距善鬬世以家雞鬭之則可擒也又徑博羅縣今屬惠州府西界龍川左思所謂目龍川而帶坰者也趙他乘此縣而夸據南越矣員水又東南一千五百里入南海東歷揭揚縣今屬潮州府王莽之南海亭而注於海也水經注集釋訂訛卷三十七
