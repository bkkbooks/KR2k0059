body:
  text: 水經注集釋訂訛卷十五歸安沈炳巽撰洛水伊水瀍水澗水洛水岀京兆上洛縣讙舉山地理志曰洛出冢嶺山山海經曰出上洛西山又曰讙舉之山洛水岀焉東與丹水合水出西北竹山東南流注于洛胡云此别是析入鈞者也丹水非出冢嶺山東至明一統志丹水出商縣竹山東流入河南界洛水又東户水注之户當作尸注同山海經尸水出尸山南流注于洛水水北出户山南流入洛洛水又東得乳水水北出良餘山南南注于洛山海經良餘之山乳水出于其陽而東南流注于洛洛水又東㑹于龍餘之水水出蟲蟲當作蠱山海經蠱尾之山龍餘之水出焉而東南流注于洛尾之山東流入洛水又東至陽虚山合宋本合下有于字𤣥扈之水是也又曰自鹿蹄之山以至𤣥扈之山𤣥扈山在今西安府洛南縣西北一百里洛水經縣北七里凡九山𤣥扈亦山名也而通與讙舉為九山之次焉故山海經曰此二山者洛間也是知𤣥扈之水出于𤣥扈之山盖山水兼受其目矣其水逕于陽虚之下山海經曰陽虛之山臨于𤣥扈之水是為洛汭也河圖玉板曰倉頡為帝為帝宋本作隨帝盖隨黄帝南巡狩也南巡登陽虛之山臨于𤣥扈洛汭之水靈龜負書丹甲青文以授之即于此水也又東歴清池山傍東合武里水水南出武里山東北流注于洛洛水又東門水出焉錐指門水東北歴陽華山又東北至靈寶縣入河山海經曰陽華之山門水出焉北流于𢎞農澗爾雅所謂洛别為𣲖也洛水又東要水入焉水南出三要山東北逕拒陽城西而東北流入于洛洛水又東與獲水合水南出獲興胡作輿下同山俗謂之備水也東北逕獲興川世名之為却川東北流注于洛洛水又東逕熊耳山北元和志熊耳山在盧氏縣南五十里明一統志熊耳山在盧氏縣西南五十里山連永寧界禹貢導河自熊耳即此又宜陽縣亦有熊耳山乃漢光武破赤眉積甲宜陽與熊耳山齊是也又陜州東又有熊耳山是達摩葬處其塔猶存禹貢所謂導洛至熊耳博物志曰洛出熊耳盖開其源者是也禹貢錐指云以今輿地言之洛水出陜西西安府商州西熊耳山東北流逕州東商州在府東南三百里春秋晉上洛邑漢為縣又東北逕洛南縣北洛南在州東北九十里本漢上洛縣地禹貢所謂導洛自熊耳者也東北過盧氏縣南今屬河南府洛水逕陽渠闗北陽渠水出南陽渠山即荀渠山也其水一源兩分川流半解一水西北流屈而東北入于洛山海經曰熊耳之山浮豪之水出焉西北流注于洛疑即是水也荀渠山盖熊耳之殊稱若太行之歸山也故地說曰熊耳之山地門也按今盧氏縣西南五十里有熊耳山東聨永寧南接内鄉巒山在縣東南百里一名悶頓嶺伊水所出漢志亦謂之熊耳洛水出其間是亦總名矣其一水東北逕陽渠城西故闗城也其水東北流注于洛洛水又東逕盧氏縣故城南城今在縣東竹書紀年晉出公十九年晉韓龍氏城按竹書紀年作晉韓龎取秦武城此云晉韓龍氏城誤王莽之昌富也有盧氏川水注之水北出盧氏山東南流逕盧氏城東而流注于洛水又東上下疑有脫文譌字龍翼合三川並出縣之南山東北注洛開山圖曰盧氏山宜五穀可避水災亦通謂之石城山山在宜陽山西南千名之山咸處其内陵阜原險易以度身者也又有葛蔓谷水自南山流注洛水洛水又東逕髙門城南在今盧氏縣東即宋書所謂後軍外兵龎季明入盧氏進達髙門水城者也洛水東與髙門水合水出北山東南流合洛水枝津水上承洛水東北流逕石勒城北又東逕髙門城北東入髙門水亂流南注洛洛水又東松楊溪水注之今永寧縣西六十里有松陽闗當與溪相近水出松楊山北流注于洛洛水又東逕黃亭南又東合黄亭溪水水出鵜鶘山有二峯在今永寧縣西八十里峻極于天髙崖雲舉亢石無階猨徒喪其捷巧鼯族窮宋本作謝其輕工及其長霄冒鎮疑訛一作顛一作嶺層霞冠峯方乃宋本作可就辨優劣耳故有大小鵜鶘之名矣溪水東南流歴亭下謂之黄亭溪水而宋本作又東南入于洛水洛水又東得荀公漢朱本作澗錐指作溪口水出南山荀澗即龎季明所入荀公谷今在永寧縣西南者也其水歴谷東北流注于洛水洛水又東逕檀山南其山四絶孤峙山上有塢聚俗謂之檀山塢義熈中劉公西入長安舟師所屆次于洛陽命㕘將戴延之古無㕘將之官疑當作㕘軍與府舍人虞道元即舟溯流窮覽洛川欲知水軍可至之處延之屆此而返竟不達其源也洛水又東庫谷水注之水自宜陽山南三川並發合為一溪東北流注于洛洛水又東得鵜鶘水口水發北鵜鶘澗東南流入于洛洛水又逕僕谷亭北左合北水水出北山東南流注于洛洛水又東侯谷水出南山北流入于洛洛水又東逕龍驤城北在永寧縣西四十里龍驤將軍王鎮惡從劉公西入長安陸徑所由故城得其名洛水又東左合宜陽北山水水自北溪南流注洛洛水又東廣由澗水注之水出南山由溪北溪當作流逕龍驤城東而北流入于洛洛水又東右得直谷水水出南山北逕屯城西北流注于洛水也又東北過蠡城邑之南在今澠池縣西四十里故今永寧縣西有洛水廢縣即蠡城也城西塢水出北四里山上原髙二十五丈故澠池縣治南對金門塢水南五里舊宜陽縣治也洛水右㑹金門溪水水南出金門山在今宜陽縣西六十里北逕金門塢西北流入于洛洛水又東合欵水有二源並發而川疑訛宋本作兩川逕引謂之大欵水也合而東南入于洛洛水又東黍艮胡作良谷水入焉南出金門山開山圖曰山出上下疑有訛多重固在韓建武二年強弩偏將軍陳俊轉擊金門白馬皆破之即此也而東北流注于洛洛水又東左合北溪南流入于洛水也又東過陽市邑南又東北過于父邑之南太陰谷水南出太陰溪北流注于洛洛水又東合白馬溪水出宜陽山澗有太當作大石厥狀似馬故溪澗以物色受名也溪水又東北流注于洛洛水又東有昌澗水注之水出西北宜陽山而東南流逕宜陽故郡南舊陽市邑也故洛陽都典農治此後改為郡其水又東注于洛洛水又東逕一合塢南城在川北原上髙二十丈按晉書一泉塢在宜陽縣西南洛水北原上即此南北東三箱天嶮峭絶唯築西面即為合固一合之名起于是矣劉曜之將攻河南也晉將軍魏該奔于此故于父邑也洛水又東合杜楊澗水水出西北杜楊溪東南逕一合塢東與槃谷水合亂流東南入洛洛水又東合渠谷谷下當有水字水出宜陽縣南女几山在宜陽縣九十里東北流逕雲中塢其山迢帶層峻流烟半垂纓帶山阜故塢受其名水疑衍又東北入洛水臧榮緒晉書稱孫登嘗經宜陽山作炭人見之與語登不應作炭者覺其情神非常咸共傳說太祖聞之使阮籍往觀與語亦不應籍因大嘯登笑曰復作向聲又為嘯求與俱出登不肯籍因别去登上峰行且嘯如簫韶笙簧之音聲振山谷籍怪而問作炭人作炭人曰故是向人聲籍更求之不知所止推問久之乃知姓名余按孫綽之叙髙士傳言在蘇門山又别作登傳孫盛魏春秋亦言在蘇門山又不列姓名阮嗣宗感之著丈人先生論言吾不知其人即一作既神逰自得不與物交阮氏尚不能動其英操復不識何人而能得其姓名又東北過宜陽縣南洛水之北有熊耳山雙巒競舉狀同熊耳此自别山不與禹貢導洛自熊耳同也昔漢光武破赤睂樊崇積甲仗與熊耳平即是山也元和志熊耳山在永寧縣東北四十里今在宜陽縣西南一百里山際有池池水東南流水側有一池世謂之澠池矣又東南逕宜陽縣故城西謂之西度水又東南流入于洛洛水又東逕宜陽縣故城南城今在宜陽縣東北十四里秦武王以甘茂為左丞相曰寡人欲通三川窺周室死不朽矣茂請約魏以攻韓斬首六萬遂拔宜陽城故韓地也後乃縣之漢哀帝封息夫躬為侯國按漢表及傳息夫躬封定陵侯今云宜陽所未詳也城之西門赤睂樊崇與盆子及大將等奉璽綬劍璧處世祖不即見明日陳兵于洛水見盆子等謂盆子丞相徐宣曰不悔乎宣曰不悔上嘆曰卿傭中皦皦鐵中錚錚也後漢書劉盆子傳帝幸宜陽盛兵以邀其走路赤睂忽遇大軍驚震不知所為樊崇將盆子及丞相徐宣以下三十餘人肉袒降上所得傳國璽綬更始七尺寳劍及玉璧各一積兵宜陽城西與熊耳山齊帝謂崇等曰得無悔降乎宣等叩頭曰臣等出長安東都門君臣計議歸命聖徳今日得降猶去虎口歸慈母誠歡誠喜無所恨也帝曰卿所謂鐵中錚錚傭中佼佼者也洛水又東與厭梁之水合水出縣北傳一作傅山大陂山無草木其水自陂北流屈而東南注世謂之五延水又東南流逕宜陽縣故城東東南流注于洛洛水又東南黄中澗水出北阜二源奇發總成一川東流注于洛洛水又東䘵泉注之其水近出北溪洛水又東共水入焉水北出長石之山山無草木其西有谷焉厥名共谷共水出焉南流得尹溪口水出西北尹谷東南注之其水又與西南左澗水會水東出近川西流注于共水共水又南與李谷谷下疑脫水合字水出西北李溪東南注蓁水蓁水發源蓁谷西南流與李谷水合而西南流入共水共水世謂石頭泉而南流注于洛洛水又東黑澗水南出陸渾西山疑當作洛水又東合黑澗水水南出陸渾西山黒澗水在今宜陽縣東北二十里歴于黑澗西北入洛洛水又東臨亭川水注之水出西北近溪東南與湖長澗水㑹水出北山南入臨亭水又東南歴九曲西而南入洛水也又東北出散闗南洛水東逕九曲南今宜陽縣東三十里有九曲城其地十里有坂九曲穆天子傳所謂天子西征升于九阿此是也郭注云今西安縣十里九坂也洛水又東與豪水㑹元和志夀安縣洛水自福昌縣東流入夀安今為宜陽縣地豪水在縣東水出新安縣密山南流歴九曲東而南流入于洛洛水之側有石墨山山石盡黑可以書疏故以石墨名山矣洛水又東枝瀆左出焉東出闗絶惠水又逕清女冢南冢在北山上耆舊傳云斯女清貞秀古跡表來今矣故瀆又東逕周山上有周靈王冢皇覽曰周靈王葬于河南城西南周山上盖以王生而神故諡曰靈其冢人祠之不絶又東北逕柏亭南皇覽曰周山在柏亭西謂斯亭也又東北逕三王陵東北出焉三王或言周景王悼王定王也魏司徒公崔浩注西征賦云定當為敬子朝作難西周政弱人荒悼敬二王與景王俱葬于此故世以三王名陵朱云潘岳西征賦云咨景悼以迄匄政凌遲而彌季崔時所傳或作定悼故云定當作景傳寫者又誤以景作敬耳敬王名匄安得疊言之理乎帝王世記曰景王葬于翟泉今洛陽太倉中大冢是也而復𫝊言在此所未詳矣又悼敬二王稽諸史傳復無葬處今陵東有石碑録赧王以上世王名號考之碑記周墓明矣故瀆東北歴制鄉逕河南縣王城西歴郟鄏陌杜預釋地曰縣西有郟鄏陌謂此也故瀆又北入穀盖經始周啟瀆久廢不修矣洛水自枝瀆又東出闗惠水右注之世謂之八闗水戴延之西征記謂之八闗澤即經所謂散闗鄣自南山横洛水北屬于河皆闗塞也即楊僕家僮所築矣惠水出白石山之陽東南流與瞻水合水東出婁冢之山而南流入惠水惠水又東南謝水山海經作㴬水注云音謝北出瞻諸之山東南流又有交觸之水北出廆山南流俱合惠水惠水又南流逕闗北城二十里者也其城西岨塞垣東抗惠水靈帝中平元年以河南尹何進為大將軍疑漏將字五營士屯都亭置圅谷闗疑衍廣城伊闕大谷轘轅旋門平津孟津等八闗都尉官治此後漢書靈帝紀中平元年以河南尹何進為大將軍將兵屯都亭置八闗都尉官注云都亭在洛陽八闗謂圅谷廣城伊闕大谷轘轅旋門小平津孟津也八闗城今在新安縣東北圅谷舊闗在靈寳縣南一十里新闗在新安縣東二里老聃西度田文東出皆舊闗新闗乃漢船樓將軍楊僕有大功恥為闗外人上書乞以家財東徙闗武帝為移于此圅谷為之首在八闗之限故世人總其統目有八闗之名矣其水又南流入于洛水山海經曰白石之山惠水出其陽而南流注于洛謂是水也洛水又與虢水㑹水出林楮宋本作禇之山山海經扶豬之山虢水出焉而北流注于洛北流注于洛水之南則鹿蹄之山也世謂之下疑有脫文非也宋本作非山其山陰則峻絶百仞陽則原阜隆平甘水發于東麓北流注于洛水也又東北過河南縣南今河南府城西有河南縣故城周書稱周公將致政乃作大邑成周于中土南繫于洛水北因于郟山以為天下之大凑孝經援神契曰八方之廣周洛為中謂之洛邑竹書紀年晉定公二十年洛絶于周魏襄王九九下當有年字洛入城當作成周山水大出南有甘洛城郡國志曰所謂甘城也地記曰洛水東北過五零倍尾北與澗瀍合是二水東入千金渠故瀆存焉禹貢錐指曰以今輿地言之洛水自洛陽縣北又東逕河南府盧氏縣南縣在府西南三百四十里又東北逕永寧縣南縣在府西南二百里又東北逕宜陽縣北縣在府西南七十里又東入洛陽縣界逕河南故城南經所謂又東㑹于瀍澗也自周靈王壅穀水使東出王城北合瀍水南入洛而城西之澗水遂為死穀及漢明帝復堨澗瀍二水使出洛陽故城北為千金渠又東過偃師縣東入于洛偃師在府東七十里而禹貢東會瀍澗之舊迹無復存焉者矣又東過洛陽縣南伊水從西來注之洛陽周公所營洛邑也故洛誥曰我卜瀍水東亦惟洛食其城方七百二十丈南繫于洛水北因于郟山以為天下之凑方六百里因西為千里春秋昭公二十三年晉合諸侯大夫戍成周之城故亦曰成周也遷自序云太史公留滯周南摯仲注曰古之周南今之洛陽漢髙祖始欲都之感婁敬之言不日而駕行矣屬光武中興定居洛邑逮于魏晉咸兩宅焉故魏畧曰漢火行忌水故去其水而加佳魏為土徳土水之牡也水得土而流土得水而柔除佳加水除原本訛作陰長沙耆舊傳曰祝良字召卿為洛陽令歳時亢旱天子祈雨不得良乃曝身階庭吿誠引罪自晨至午紫雲㳫起甘雨登降人為歌曰天久不雨烝人失所天王自出祝令特苦精符感應滂沱下雨則縣司及河南尹治司隸周官也漢武帝使領徒隸董督京畿因名司州焉按司州乃曹魏時所置漢志無司州之名今云漢武恐誤晉書地理志云司州為禹貢豫州之地漢武帝初置司隸校尉所部三輔三河諸郡光武都雒陽司隸所部與前漢不異魏氏受禪即都漢宫司隸所部河南河東河内𢎞農并冀州之平陽合五郡置司州晉仍居魏都乃以三輔還屬雍州分河南立滎陽分雍州之京兆立上洛廢東郡立頓丘遂定名司州以司隸校尉統之地記曰洛水東入于中提山間東流㑹于伊是也昔黄帝之時天大霧三日帝逰洛水之上見大魚煞五牲以醮之天乃甚雨七日七夜魚流始得圖書今河圖視萌篇是也黄帝得圖書見帝王世紀事昔王子晉好吹鳳笙招延與道士浮丘同逰伊洛之浦王子晉浮丘事見列仙𫝊含始又受玉雞之儒衍瑞于此水帝王世紀曰漢髙帝母曰含始逰于洛池有玉雞銜赤珠出刻曰玉英吞此者王含始吞之而生帝也亦洛神宓妃之所在也洛水又東合水南出半石之山北逕今疑作合水塢而東北流注于公路澗公路袁術字也但世俗音訛號之曰光禄澗非也上有袁術固今在偃師縣西南三十五里術置此固四周絶澗可容十萬人一夫守隘千夫莫當四周絶澗迢逓百仞廣四五里有一水淵而不流故溪澗即其名也合水北與劉水合水出半石東山西北流于劉聚三面臨澗在緱氏西南周畿内劉子國故謂之劉澗其水西北流注于合水合水又北流注于洛水也又東過偃師縣南今偃師縣即偃師故城古西亳也洛水東逕計素渚中朝時百國貢計所頓故渚得其名又東逕偃師故縣南與緱氏分水今偃師縣南二十里有緱氏故城又東休水自南注之其水導源少室山西流逕穴山南而北與少室山疑當作水合水出少室北溪西南流注休水休水又左㑹南溪水發大穴南山北流入休水休水又西南北屈潛流地下其故瀆北屈出峽謂之大穴口北歴覆釜堆東盖以物象受名矣又東屆零星塢水流潛通重源又發側緱氏原開山圖謂之緱氏山也亦云仙者昇焉言王子晉控鶴斯阜靈王望而不得近舉手謝而去其家得遺屣俗亦謂之為撫父堆堆上有子晉祠或言在九山非此世代已逺矣莫能辨之劉向列仙傳云世有簫管之聲焉休水又逕延夀城南緱氏縣治故滑費春秋滑國所都也王莽更名中亭即緱氏城也城有仙人祠謂之仙人觀休水又西轉北屈逕其城西水之西南有司空密陵光當作元侯鄭漏袤字廟碑文缺不可復識按晉書鄭袤位司空封密陵侯諡曰元此云密陵光侯鄭廟盖訛元為光而漏袤字耳又有晉城門校尉昌原恭侯鄭仲林碑晉皇始按晉無皇始年號豈是泰始六年立休水又北流注于洛水洛水又東逕百谷塢北戴延之西征記曰塢在川南因而宋本作髙為塢髙一十餘丈劉武王西入長安舟師所堡也洛水又北陽渠水注之今偃師縣南有通濟渠故陽渠也隋時常修導之名曰通濟竹書紀年晉襄公六年洛絶于即此處也洛水又北逕偃師城東東北歴鄩中水南謂之南鄩中水之南鄩亦曰上鄩也逕訾城西司馬彪所謂訾聚也而鄩水注之水出北山鄩溪其水南流世謂之温水泉水側有重一作童人穴穴中有僵尸戴延之從劉武王西征記曰有此尸尸今猶在夫物無不化之理魂無不遷之道而此尸無神識事同木偶之狀喻其推移未若正形之連遷矣宋本作速遷亦猶檀弓死欲速朽之意鄩水又東南于訾城西北東入洛水故京相璠曰今鞏洛渡北有鄩谷水東入洛謂之下鄩故有上鄩下鄩之名亦謂之北鄩于是有南鄩北鄩之稱矣又有鄩城盖周大夫鄩肸之舊邑左傳昭公二十二年王室亂王如平畤次于皇鄩肸伐皇大敗獲鄩肸焚之王城之市洛水又東逕訾城北又東羅水注之訾城在今鞏縣西南四十里出方山羅川西北流蒲池水注之水出南蒲陂西北流合羅水謂之長川羅亦曰羅中也盖肸子鄩羅之宿居故川得其名耳左傳昭公二十三年王子朝入于王朝鄩羅納之莊宫注云鄩羅周大夫鄩肸之子也羅水又西北白馬溪水注之水出崧山北麓逕白馬塢東而北入羅水西北流白相澗水注之水出嵩麓桐溪北流逕九山東又北九山東溪水入焉水出百稱山東谷其山孤峰秀出嶕嶢分立仲長統曰昔密有卜城者身逰九山之上放心不拘之境謂是山也山際有九山廟廟前有碑云九顯靈宋本作靈府君君者太華之元子陽九列名號曰九山府君也南據崧岳北帶洛澨晉元康二年九月太嵗庚午朱云按世譜晉惠帝元康二年太歳在壬子而用歴經推之是年九月乙亥朔無庚午日也帝遣殿中中郎將闗内侯樊廣緱氏令王與傳演朱本作緱氏令王輿主簿傅演奉宣詔命興立廟殿焉又有百蟲將軍顯靈碑碑云將軍姓伊氏諱益字隤敳帝髙陽之第二子伯益者也朱云史記秦本紀顓頊之裔孫大業生大費佐舜調馴鳥獸是為伯翳索隠曰伯翳即尚書之伯益列女傳云臯子五歳而贊禹曹大家注云臯子者臯陶之子伯益也此碑謂益字隤敳帝髙陽之第二子與史記異左傳所記隤敳庭堅並髙陽氏之子杜注又云臯陶字庭堅則父子同在八愷之中不應並時而舉也晉元康五年七月七日順人呉義等建立堂廟永平元年二月二十日按晉書惠帝紀先永平而後元康豈有元康五年立廟永平元年刻石之理乎惟後魏南安王及世宗俱有永平之號此又在劉宋之世相去已逺不應立廟在晉時刻石在宋世所未詳也刻石立頌贊示後賢矣其水東北流入白相澗又北逕袁公塢東盖公路始固二字疑有訛誤有此也故有袁公之名矣北流注于羅水羅水又西北逕袁公塢北又西北逕潘岳子父疑當作父子墓疑漏墓字前有碑岳父茈瑯琊太守碑石破落文字缺敗岳碑題云給事黄門侍郎潘君之碑碑云君遇孫秀之難闔門受禍故門生感覆醢以增慟乃樹碑以記事大常潘尼之辭也羅水又于訾城東北入于洛水也又東北過鞏縣東又北入于河洛水又東明樂泉注之水出南原下三泉並導故世謂之五道泉即古明溪泉也春秋昭公二十二年師次于明溪者也洛水又東逕鞏縣故城南城在今縣西南三十里東周所居也本周之畿内鞏伯國也春秋左傳所謂尹文父一作公涉于鞏即于此矣洛水又東濁水注之即古湟水也水出南原京相璠曰訾城北三里有黄亭即此亭也春秋所謂次于黄者也按郡國志鞏縣有黄亭有湟水春秋昭公二十三年劉子單子以王猛居于湟杜預曰即黄亭在縣西北洛水又東北洞水發南溪石泉世亦名之為石泉也京相璠曰鞏東地名坎欿在洞水東疑即此水也按今鞏縣東南二十里有石子河即此水也又逕盤谷塢東世又名之曰鹽谷水司馬彪郡國志鞏有坎欿聚春秋僖公二十四年王出及坎欿服䖍亦以為鞏東邑名也今考厥文若狀焉而不能精辨耳晉太康地記晉書地道記並言在鞏西非也其水又北入洛洛水又東北流入于河山海經曰洛水成臯西入河是也謂之洛汭劉昭曰洛汭在鞏縣界北三十里即什谷也故張儀說秦曰下兵三川塞什谷之口謂此川也史記音義曰鞏縣有鄩谷水者也史記張儀𫝊儀說秦曰下兵三川塞斜谷之口當屯留之道徐廣音義曰斜一作尋成臯鞏縣有尋口黄帝東廵河過洛修壇沉璧受龍圖于河龜書于赤文篆字堯帝又循壇河洛擇良議沈循壇河洛擇良議沈有考在第五卷河水又東浿水入焉下榮光出河休氣四塞白雲起迴風逝赤文緑色廣袤九尺負理平上有列星之分什政之度帝王録記興亡之數以授之又東沈書于日稷赤光起𤣥龜負書背甲赤文成字遂禪于舜朱本引尚書中候云黄帝東廵河過洛修壇沈璧受龍圖于河龜書于洛赤文綠地廣袤九尺負理平上有列星之分也七政之度帝王録記興亡之數以授之堯帝又修壇河洛昧爽禮備榮光出河休氣四塞白雲起迴風揺又東沈璧于洛日稷赤光起元龜負書背甲赤文成字遂禪于舜舜又習堯祀沈書于日稷赤光起𤣥龜負書至于稷下榮光休至黄龍卷甲書宋本作舒圖壇畔赤文緑錯以授舜舜以禪禹殷湯東觀于洛習禮堯壇降璧三沈榮光不起黄鳥雙躍出濟于壇黑烏以洛朱本作浴隨魚亦上化為黑玉赤勒之書黑龜赤文之題也朱本引尚書中侯云降三分沈璧退立榮光不起黄魚雙躍出濟于壇黑烏以雄隨魚亦止湯以伐桀故春秋說題辭曰河以道坤出天苞洛以流川吐地符王者沈禮焉竹書紀年曰洛伯用與河伯馮夷鬬盖洛水之神也昔夏太康失政為羿所逐其昆弟五人須于洛汭作五子之歌于是地矣元和志鞏縣洛水東經洛汭北對瑯邪渚入河謂之洛口伊水出南陽縣今屬河南南陽府西蔓渠山山海經曰蔓渠之山伊水出焉淮南子曰伊水出上魏山地理志曰出熊耳山即麓大同陵巒互别耳水自熊耳東北逕鸞川亭北葌水出葌山北流際其城東而北入伊水世人謂伊水為鸞水葌水為交水故名斯川為鸞川也又東為淵潭潭渾若沸亦不測其深淺也伊水又東北逕東亭城南又屈逕其亭東東宋本作北流者也禹貢錐指云蔓渠山在今盧氏縣東南盖即熊耳之支峯也括地志云伊水出盧氏縣東巒山一名悶頓嶺今在縣東南百六十里元和志云伊水出鸞掌山疑即是巒山㕘考諸書伊水出盧氏縣熊耳山審矣縣志云熊耳雖有伊源之名而無流衍之迹其實出于悶頓嶺之陽豈知古熊耳山盤基甚廣即悶頓亦熊耳乎酈注所謂即麓大同陵巒互别兩言盡之矣東北過郭落山陽水出陽山陽溪世人謂之太陽谷水亦取名焉東流山海經作北入伊水伊水又東北鮮水入焉水出鮮山北流注于伊尹疑作伊水又與蠻水合水出盧氏縣之蠻谷東流入于伊又東北過陸渾縣南今為河南府嵩縣山海經曰滽滽之水出于釐山南流注于伊水今水出陸渾縣之西南王母澗澗北山上有王母祠故世因以名溪東流注于伊水即滽滽之水也伊水歴崖口山峽也翼崖深髙壁立若闕崖上有塢伊水逕其下歴峽北流即古三塗山也杜預釋地曰山在縣南闞駰十三州志云山在東南今是山在陸渾故城東南八十許里春秋昭公四年司馬侯曰四嶽三塗陽城太室荆山中南九州之險也服䖍曰三塗大行轘轅崤黽非南望京相璠之著春秋地名亦云山名也以服氏之言云塗道也準周書南望之文復言宜為轘轅大道伊闕皆為非也春秋晉伐陸渾請有事于三塗知是山明矣有七谷水注之水西出女桃山當從宋本作女机山下同女几山在今宜陽縣西九十里之南七溪山上有西王母祠東南流注于伊水又北蚤谷水注之水出女机山之東谷東逕故亭南東流又于伊水伊水又東北逕伏流嶺東嶺上有崐崘祠民猶祈焉劉澄之永初記稱陸渾縣西有伏流坂者也今山在縣南崖口北三十里許西則非也今嵩縣北有伏流城北與温泉水合水出新城縣之狼睪山之西南阜下西南流㑹于伊水伊水又東北逕伏睹嶺左納焦澗水水西出鹿髆山東流狐山宋本作孤山南其山界立豐上單秀孤峙故世謂之方山明一統志陸渾山一名方山在嵩縣東北四十里即劉中書澄之所謂縣有孤山者也東歴伏睹嶺南東流注于伊伊水又東北涓水注之水出陸渾西山即陸渾山疑作水者也尋郭文之故居訪胡昭之遺像世去不停莫識所在晉書隠逸傳郭文字文舉河内軹人也少愛山水尚嘉遯父母終服畢不娶辭逰名山歴華陰之崖以觀石室之石圅洛陽陷乃步擔入呉興餘杭大僻山中窮谷無人之地而居焉魏志胡昭字孔明養志不仕居陸渾山中躬耕樂道以經籍自娯寇賊到陸渾自相約誓言胡居士賢者也一不得犯其部落一川賴昭咸無怵惕其水有二源俱導而東注虢畧在陸渾縣西九十里也司馬彪郡國志曰縣西虢畧池春秋所謂東盡于虢畧者也北水東流合侯澗水澗出西北侯溪東南流注于涓水涓水又東逕陸渾縣故城北平王東遷辛有適伊川見有被髮而祭于野者曰不及百年此其戎乎魯僖公二十二年春晉遷陸渾之戎于伊川故縣氏之也涓水東南流左合南水水出西山七谷亦謂之七谷水祖疑訛澗東逝歴其縣南又東南左㑹北水亂流左合禪渚渚水上承陸渾縣東禪渚渚左原上陂方十里佳饒魚蕈一作葦即山海經所謂南望禪渚禹父之所化郭景純注云禪一音暖鯀化羽淵而復在此然已變怪亦無往而不化矣山海經青要之山實維帝之密都北望河曲是多駕鳥南望墠渚禹父之所化郭景純注云墠音填鯀化于羽淵為黄熊今復云在此然則一已有變怪之性者亦無往而不化世謂此澤為慎望陂陂水南流注于涓陽水涓陽水又東南注于伊水昔有莘氏女採桑于伊川得嬰兒于空桑中言其母孕于伊水之濱夢神告之曰臼水出而東走母明視而見臼水出焉告其鄰居而走顧望其邑咸為水矣其母化為空桑子在其中矣莘女取而獻之命養于庖而長有賢徳殷以為尹曰伊尹也伊尹母化空桑事見吕氏春秋又東北過新城縣南今洛陽縣南七十五里有新城春秋蠻子邑漢以為縣馬懷橋長水出新城西山東逕晉使持節征南將軍宋均碑南均字文平縣人也其碑太始三年十二月立其水又東流入于伊又有明水出梁縣西狼睾山何氏云睪與臯通智永千文林睪幸即俗謂之石澗水也西北流逕楊亮壘南西北合康水亦出狼睪山東北流逕范塢北與明水合北汶二字疑衍西南流入于伊山海經曰放睪山海經作臯之山明水出焉南流注于伊水是也伊水又與大㦸水㑹出梁縣西水有二源北水出廣城西南西南逕楊志塢北與南水合水源南出廣城澤西流陸渾河南十二縣薄朱本作簿曰廣城澤在新城縣界黄阜西北流屈而東逕楊塢南又北屈逕其塢東又逕塢北同注老倒澗俗謂之老倒澗水西流入于伊伊水又北逕新城東與呉澗水㑹水出縣之西山東流南屈逕其縣故城西又東轉逕其縣南故蠻子國也縣有鄤聚今名蠻中是也漢惠帝四年置縣其水又東北流注于伊水伊水又逕西北當階城西大狂水入焉水東出陽城縣之大􅟣山山海經曰大􅟣之山多㻯琈之玉其陽狂水出焉西南流按經當有注于伊水四字其中多三足龜人食之者無大疾可以已腫狂水又西逕綸氏縣故城南竹書紀年曰楚吾得帥師及秦伐鄭圍綸氏者也左與倚薄山水合水北出倚薄之山南逕黄城西又南逕綸氏故城東而南流注于狂水狂水又東入宋本作又西八風溪水注之風溪水注之水北出八風山南流逕綸氏城西西南流入于狂水狂水又西得三交水口水有二源各導一溪並出山南合流舍衍故世有三交之名也其水西南流注于狂水狂水又西逕缶髙山北西南與湮水合水出東北湮谷西南流逕武林亭東北又屈逕其亭南其水又西南逕湮陽亭東盖藉水以名亭也又東南流入于狂水狂水又西逕湮陽城南又西逕當階城南而西流注于伊漏水字伊水又上溝水疑有訛脫似當作伊水又北合上溝水水出元望山西上溝一作土溝出𤣥望西山一作山西東逕𤣥望山南又東逕新城縣故城北東流注于伊水伊水又北板橋水入焉水出西山東流入于伊水伊水又北㑹厭澗水水出西山東流逕邥垂亭南春秋左傳文公十七年秋周甘歜敗戎于邥垂者也服䖍曰邥垂在髙都南杜預釋地曰河南新城縣北有邥垂亭司馬彪郡國志曰新城有髙都城今亭在城南七里遺基猶在京相璠曰舊說言邥垂在髙都南今上黨有髙都縣余謂京論疎逺未足以證無知羣說之㫖密矣朱云知羣二字訛當作無如䖍說之㫖密矣其水又東注于伊水伊水又北逕髙都城東今在洛陽縣西南徐廣史記音義曰今河南新城縣有髙都城竹書紀年梁惠成王十七年東周與鄭髙都利竹書紀年無利字者也又來儒之水山海經半石之山來需之水出于其陽而西流注于伊水今云來儒誤下同出于半石之山西南流逕斌輪城北西歴芰澗水以其西流又謂之小狂水也其水又西南逕大石嶺南開山圖所謂大石山也山下有大石嶺碑河南隠士通明以漢靈帝中平六年八月戊辰于山堂立碑文字淺鄙殆不可尋魏文帝獵于此山虎超乗輿孫禮㧞劍投虎于是山魏志孫禮傳明帝獵于大石山虎趨乗輿禮便投鞭下馬欲奮劍斫虎詔令禮上馬今云文帝誤山在洛陽南而劉澄之言在洛東北非也山阿有魏明帝髙平陵在今孟津縣舊河清城界王隠晉書曰惠帝使校尉陳總仲元詣洛南山請雨總盡除小祀惟存大石而祈之七日大雨即是山也來儒之水又西南逕赤睂城南又西至髙都城東西入伊水謂之曲水也又東北過伊闕中伊水逕前亭西左傳昭公三十二年晉箕遺樂徵右行詭濟師取前城者也左傳昭公二十二年晉箕遺樂徵右行詭濟師取前城注曰三子晉大夫濟師渡伊洛也此云三十二年誤京相璠曰今洛陽西南五十里伊闕外前亭矣服䖍曰前讀後漢書郡國志雒陽有前亭注曰前亭即泉戎也為泉周地也伊水又北入伊闕昔大禹疏以通水兩山相對望之若闕伊水歴其間北流故謂之伊闕矣春秋之闕塞焉昭公二十六年趙鞅使女寛守闕塞是也陸機云洛有四闕斯其一焉東巖西嶺並鐫石開軒髙甍架峰西側靈巖下泉流東注入于伊水傅毅反都賦曰困龍門以暢化開伊闕以達聰也闕左壁有石銘云黄初四年六月二十四日辛巳大出水舉髙四丈五尺齊此已下盖記水之漲滅也石壁又有石銘云永康五年河南府君循大禹之軌部督郵辛曜新城令王琨部監作掾董猗李褒斬岸開石平通伊闕石文尚存也按闕塞亦曰龍門山故傅毅反都賦因龍門以暢化開伊闕以達聰也一名闕口山又名鍾山在今洛陽縣西南三十里又東北至洛陽縣南北入于洛伊水自闕東北流枝津右出焉東北引溉東㑹合水同注公路澗入于洛今無水戰國策曰東周欲為田西周不下水蘇子見西周君曰今不下水所以富東周也民皆種他種欲食之不如下水以病之東周不必復種稻種稻而復奪之是東周受于君矣戰國策云今不下水所以富東周也民皆種麥若欲害之不如下水以病之東周必復種稻種稻而復奪之是東周受命于君矣西周遂下水即是水之故渠也伊水又東北枝渠左出焉水積成湖北流注于洛合伊水伊水又東北至洛陽縣南逕員丘東大魏郊天之所準漢故事建之後漢書郊祀志曰建武二年初制郊兆于洛陽城南七里為圜壇八陛中又為重壇天地位其上皆南向其外壇上為五帝位其外為壝重營皆紫以像紫宫按禮天子大裘而冕祭昊天上帝于此今衮冕也壇壝無復紫矣伊水又東北流注于洛水廣志曰與上不接疑有脫文鯢魚聲如小兒有四足形如鱧可以治牛出伊水也司馬遷謂之人魚故其著史記曰始皇帝之葬也以人魚膏為燭徐廣曰人魚似鮎而四足即鯢魚也瀍水出河南穀城縣北山括地志云故穀城在河南縣西北十八里苑中西臨穀水按左傳定八年周大夫儋翩叛單子伐穀城即此漢置穀城縣魏省入河南縣自故縣西北又三十二里有穀城山東連孟津界即博物志所謂潛亭山也縣北有潛亭瀍水出其北梓澤中梓澤地名也澤北對原阜即裴氏墓塋所在碑闕存焉其水歴澤東南流水西有一原其上平敞古舊胡云舊當作朁古潛字亭之處也即潘安仁西征賦所謂越街郵者也東與千金渠合千金渠在今河南府城外三十里周書曰我卜瀍水西謂是水也東南流水西南有帛仲理墓墓前有碑題云真人帛君之表仲理名䕶益州巴郡人晉永寧二年十一月立瀍水又東南流注于穀穀水自千金堨東注謂之千金渠也又東過洛陽縣南又東過偃師縣又東入于洛澗水出新安縣南白石山山海經曰白石之山惠水出于其陽東南注山海經作而南流于洛澗水出于其隂北流經作西北流注于穀世謂是山曰廣陽山水曰赤岸水亦曰石子澗地理志曰澗水出新安縣東南東入洛是為密矣東北流歴圅谷東坂東謂之八特坂在今新安縣東山海經曰北流注于穀摯仲治三輔決録注云馬氏兄弟五人共居澗穀二水之交作五門客因舍以為名今在河南西四十里以山海經推較里數不殊仲治所記水會疑訛尚有故居處斯則澗水也即周書所謂我卜澗水東言水二字疑衍者是也東南入于洛孔安國曰澗水出澠池山今新安縣西北有一水北出澠池界東南流逕新安縣而東南流入于穀水安國所言當斯水也然穀水出澠池下合澗水得其通稱或亦指之為澗水也並未詳之耳今孝水東十里有水世謂之慈澗又謂之澗水按山海經則少水也而非澗水盖習俗之悞耳又按河南有離山水謂之為澗水水西北出離山東南流注于離山澗水也又東南流歴郟山于穀城東而南流注于穀舊與穀水亂流流同疑作同流南入于洛今穀水東入千金渠澗水與之俱東入洛矣或以是水並為周公之所相卜也呂忱曰今河南使水疑其是即此水也然意所未詳故並書存之耳禹貢錐指洛誥周公曰我乃卜澗水東瀍水西惟洛食謂王城也我又卜瀍水東亦惟洛食謂下都也王城即郟邑漢為河南縣其故城在今洛陽縣西北下都即成周漢為洛陽縣河南郡治在今洛陽縣東北二十里二城東西相距四十里而今洛陽縣居其中古時澗水經河南故城西入洛瀍水經河南故城東入洛故澗水東瀍水西為王城而瀍水東為下都也洛誥之文甚明自周靈王壅穀水使東出于王城之北則其勢必入于瀍水而合流歴王城之東以南注于洛時二水猶未經洛陽城也迨東漢建都于此自河南縣東十五里之千金堨引水繞都城南北以通漕而瀍水始與穀水俱東注矣古時瀍不合澗亦不過洛陽縣南而東至偃師也水經注集釋訂訛卷十五
